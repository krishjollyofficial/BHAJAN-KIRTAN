	{"id":1771860763952,"audio":"audio/Do Din Di Ye Jindgani.mp3",
	"pb":{"t":"ਦੋ ਦਿਨ ਦੀ ਏ ਜ਼ਿੰਦਗਾਨੀ","c":"ਦਮ ਦੇ ਉੱਤੇ ਦਮ ਨਾ ਮਾਰੀਂ , ਦਮ ਦੋ ਦਮ ਦਾ ਏਹ ਮੇਲਾ ,\nਆਵਧ ਅਮਲ ਕਮਾ ਲੈ ਕੋਈ , ਫਿਰ ਹੱਥ ਨਹੀਂ ਆਉਣਾ ਵੇਲਾ ।\n\nਦੋ ਦਿਨ ਦੀ ਏ ਜ਼ਿੰਦਗਾਨੀ ਕਿ ਸਦਾ ਰਹਿਣਾ ਨਾਮ ਰੱਬ ਦਾ ,\nਫ਼ਾਨੀ ਜਗ ਦੀ ਏ ਹਰ ਸ਼ੈ ਫ਼ਾਨੀ ਕਿ ਸਦਾ ਰਹਿਣਾ ਨਾਮ ਰੱਬ ਦਾ ।\n\nਏਹ ਦੁਨੀਆ ਯਾਰ ਬੇਗਾਨੀ ਏ , ਨਾ ਤੇਰੀ ਏ ਨਾ ਮੇਰੀ ਏ ,\nਹਰ ਸ਼ੈ ਇਸ ਜਗ 'ਚ ਫ਼ਾਨੀ ਏ , ਨਾ ਤੇਰੀ ਏ ਨਾ ਮੇਰੀ ਏ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਟੁੱਟ ਜਾਣੀ ਡੋਰੀ ਸਾਹਾਂ ਦੀ , ਕਿਸੇ ਭੁੱਲ ਭੁਲੇਖੇ ਵਿੱਚ ਨਾ ਰਹੀਂ ,\nਦਮ ਆਵੇ ਤੇ ਤੂੰ ਆਦਮ ਏ , ਜੇ ਦਮ ਨਾ ਆਵੇ ਕੁਝ ਵੀ ਨਹੀਂ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਐਥੇ ਬੈਠ ਕਿਸੇ ਨੇ ਨਹੀਂ ਰਹਿਣਾ , ਜੋ ਬਣਿਆ ਏ ਆਖਿਰ ਢਹਿਣਾ ,\nਹਰ ਸ਼ੈ ਮਿੱਟੀ ਵਿੱਚ ਮਿਲ ਜਾਣੀ , ਕਿ ਸਦਾ ਰਹਿਣਾ ਨਾਮ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਰਾਜੇ ਮਹਾਰਾਜੇ ਤਾਨਾਸ਼ਾਹ ਰੱਬ ਹੋਣ ਦਾ ਦਾਵਾ ਕਰਦੇ ਸੀ ,\nਦੁਨੀਆ ਤੋਂ ਤੁਰ ਗਏ ਉਹ ਵੀ ਜੋ ਨਿੱਤ ਰਹਿਣ ਦਾ ਦਾਵਾ ਕਰਦੇ ਸੀ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਤੂੰ ਏ ਪਰੌਣਾ ਪਲ ਦੋ ਪਲ ਦਾ , ਮੌਤ ਅੱਗੇ ਕੋਈ ਜੋਰੀ ਨਹੀਂ ਚੱਲਦਾ ,\nਡੋਰੀ ਸਾਹਵਾਂ ਦੀ ਆਖਿਰ ਟੁੱਟ ਜਾਣੀ , ਕਿ ਸਦਾ ਰਹਿਣਾ ਨਾਮ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਬਾਗ ਬਹਾਰਾਂ ਮਹਿਲ ਮੁਨਾਰੇ ਨਹੀਂ ਰਹਿਣੇ , \nਸੂਰਜ ਨਾਲੇ ਚੰਦ ਸਿਤਾਰੇ ਨਹੀਂ ਰਹਿਣੇ ,\nਵਗਦੇ ਦਰਿਆ ਨਦੀ ਕਿਨਾਰੇ ਨਹੀਂ ਰਹਿਣੇ , \nਹੁਸਨ ਜਵਾਨੀ ਦੇ ਲਸ਼ਕਾਰੇ ਨਹੀਂ ਰਹਿਣੇ ,\nਆਵਧ ਦੁਨੀਆ ਚਲੋ-ਚੱਲੀ ਦਾ ਮੇਲਾ ਏ , \nਤੁਰ ਜਾਣੇ ਸਾਰੇ ਦੇ ਸਾਰੇ ਨਹੀਂ ਰਹਿਣੇ , \nਦੋ ਦਿਨ ਦੀ ਏ ...\n\nਆਵਧ ਕੀ ਔਕਾਤ ਹੈ ਤੇਰੀ , ਇੱਕ ਦਿਨ ਬਣਨਾ ਖਾਕ ਦੀ ਢੇਰੀ ,\nਮੁੱਕ ਜਾਣਾ ਜਦੋਂ ਤੇਰਾ ਦਾਣਾ ਪਾਣੀ , ਕਿ ਸਦਾ ਰਹਿਣਾ ਨਾਮ ਰੱਬ ਦਾ ।"},"hi":{"t":"दो दिन दी एह ज़िदगानी","c":"दम दे उत्ते दम ना मारीं , दम दो दम दा एह मेला , \nआवध अमल कमा लै कोई , फिर हत्थ नई औणा वेला ।\n\nदो दिन दी एह ज़िदगानी कि सदा रहणा नाम रब्ब दा , \nफानी जग दी ए हर शय फानी कि सदा रहणा नाम रब्ब दा ।\n\nएह दुनिया यार बेगानी ए , न तेरी ए न मेरी ए , \nहर शय इस जग च फानी ए , न तेरी ए न मेरी ए , \nदो दिन दी ए ...\n\nटुट जाणी डोरी साहां दी , किसे भुल भुलेखे विच न रई , \nदम आवे ते तू आदम ए , जे दम न आवे कुझ वी नई , \nदो दिन दी ए ...\n\nऐथे बैठ किसे ने नई रैहणा , जो बणेया ए आखिर ढैणा , \nहर शय मिट्टी विच मिल जाणी , कि सदा रैहणा नाम ...\n\nसब खाक च खाक हो जाणे ने , कोई वी साथी नई रैहणा , \nमिट्टी विच हर शय मिल जाणी ,\nऐथे कोई वी बाकी नई रैहणा , कि सदा रैहणा नाम ...\n\nराजे महाराजे तानाशाह रब्ब होण दा दावा करदे सी , \nदुनिया तों तुर गये ओह वी जो नित रैहण दा दावा करदे सी , \nदो दिन दी एह ...\n\nइक दिन छडणा पैणा मेला , हथ नई औणा लंघेया वेला , \nसदा रैहणी नईओ हुस्न जवानी कि सदा रैहणा नाम ...\n\nतूं ए परौणा पल दो पल दा , मौत अग्गे कोई जोरी नी चलदा \nडोरी साहवां दी आखिर टुट जाणी , कि सदा रैहणा नाम ...\n\nछडके बंदेया एह दुनिया सारी , सच्चे रब्ब नाल ला लै यारी , \nसदा रब्ब दी ए रैहणी सुलतानी , कि सदा रैहणा नाम ...\n\nबाग बहारां महल मुनारे नई रैहणे , \nसूरज नाले चंद सितारे नई रैहणे , \nवगदे दरिया नदी किनारे नई रैहणे , \nहुसन जवानी दे लश्कारे नई रैहणे , \nदिल दे चैन ते अक्ख दे तारे नई रैहणे , \nनाल हमेशा सांझ सहारे नई रैहणे , \nआवध दुनिया चलो चली दा मेला ए , \nतुर जाणे सारे दे सारे नई रैहणे , \nदो दिन दी ए ...\n\nआवध की औकात है तेरी , इक दिन बनणा खाक दी ढेरी , \nमुक जाणा जदों तेरा दाणा पाणी , कि सदा रैहणा नाम ..."},"en":{"t":"Do Din Di Eh Jindgaani","c":"Do Din Di Eh Jindgaani\nSada Rehna Naam Rabb Da"}},

	"pb":{"t":"ਮੇਰੇ ਠਾਕੁਰ ਭਯੋ ਕਿਰਪਾਲ ਜੀਓ","c":"ਮੇਰੇ ਠਾਕੁਰ ਭਯੋ ਕਿਰਪਾਲ ਜੀਓ ,\nਦਰਸ ਭੇਟਤ ਮਨੁ ਹੋਵੈ ਨਿਹਾਲ ਜੀਓ ।।\nਏਕੋ ਬਸਤ ਬਾਣੀ ਗੁਰ ਜਾਣ , ਕਰ ਸੇਵਾ ਜਪਿ ਮਿਲੇ ਨਾਮੁ ਦਾਨੁ ।।\nਸਤਿਗੁਰੂ ਨਾਨਕ ਪੂਰਨ ਭਗਵਾਨ , ਗੁਰ ਆਪਣੇ ਨਿਰਭਉ ਨਿਰਵਾਨ ।।\nਦਰਸ਼ਨ ਦਾਸ ਕੀ ਸੁਨਹੁ ਬੇਨੰਤੀ , ਸਾਧ ਸੰਗ ਦਿਓ ਮੇਰੇ ਪੁਰਖ ਸੁਜਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मेरे ठाकुर भयो किरपाल जीओ","c":"मेरे ठाकुर भयो किरपाल जीओ , \nदरस भेटत मन होवे निहाल जीओ ।।\nएको बसत बाणी गुर जाण , कर सेवा जप मिले नाम दान ।।\nसतिगुरू नानक पूरन भगवान , गुर आपणे निरभौ निरवान ।।\nदर्शन दास की सुनहो बेनंती , साध संग देओ मेरे पुरख सुजान ।।\n( यकीन )"},"en":{"t":"Mere Thakur Bhayo Kirpaal Jiyo","c":"Mere Thakur Bhayo Kirpaal Jiyo"}},

	{"id":1771925114922,
	"pb":{"t":"ਮੇਰੇ ਠਾਕੁਰ ਰਾਮ ਗੋਪਾਲ","c":"ਮੇਰੇ ਠਾਕੁਰ ਰਾਮ ਗੋਪਾਲ , ਨਾਨਕ ਗੋਬਿੰਦ ਕਲਿ ਮਾਹਿ ਅਵਤਾਰ ।।\nਪ੍ਰਥਮੇ ਕੇਵਲ ਨਾਮੁ ਅਧਾਰ , ਸੰਤ ਸਜਣ ਸੰਗ ਕੀਜੈ ਪਿਆਰ ।।\nਏਹ ਬਿਧਿ ਤਿਨ੍ਹੇਂ ਜਾਣੇਂ , ਜਿਨ੍ਹੇ ਹਰਿ ਰੰਗ ਮਾਣੇਂ ।।\nਦਰਸੁ ਦਿਓ ਮੇਰੇ ਰਾਮ ਪਿਆਰੇ , ਦਰਸ਼ਨ ਕੂਕਰ ਨਿਤ ਦਿਨ ਪੁਕਾਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मेरे ठाकुर राम गोपाल","c":"मेरे ठाकुर राम गोपाल , नानक गोबिंद कलि माहि अवतार ।। \nप्रथमे केवल नाम अधार , संत सजन संग कीजै पिआर ।।\nएह बिध तिनहें जाणें , जिनहे हरि रंग माणें ।।\nदरस देओ मेरे राम पिआरे , दर्शन कूकर नित्त दिन पुकारे ।।\n( यकीन )"},"en":{"t":"Mere Thakur Ram Gopal","c":"Mere Thakur Ram Gopal \nDaras Deyo Mere Ram Pyare"}},

	{"id":1771925600606,
	"pb":{"t":"ਮੇਰੇ ਰਾਮਾ ਮੇਰੇ ਕ੍ਰਿਸ਼ਨਾ","c":"ਮੇਰੇ ਰਾਮਾ ਮੇਰੇ ਕ੍ਰਿਸ਼ਨਾ ਮੇਰੇ ਨੰਦ ਗੋਪਾਲ , \nਦਾਸ ਧਰਮ ਕਰੋ ਪਰਵਾਨ ।।\nਧਨੁ ਧਨੁ ਧਨੁ ਧਨੁ ਧਨੁ ਨਿਰੰਕਾਰ , \nਨਾਨਕ ਗੋਬਿੰਦ ਗੁਰ ਸੰਤ ਸਜਣ ਦਿਓ ਦਾਨ ।।\nਕਰਾਂ ਬੇਨੰਤੀ ਹਰਿ ਆਪਣੇ ਦਾਸ ਧਰਮ ਕਰੋ ਪਰਵਾਨ ,\nਦਾਸ ਦਾਸਨ ਸੇਵ ਕਮਾਵੇ ਕਰਤੇ ਕਰੀਮ ਨਾਨਕ ਭਗਵਾਨ ।।\nਨੈਣ ਤਰਸਨ ਦਰਸ਼ਨ ਕਉ ਦਰਸ ਦਿਓ ਕ੍ਰਿਸ਼ਨ ਸੁਲਤਾਨ ,\nਆਦਿ ਭਵਾਨੀ ਜੁਗਾਦਿ ਹੋ ਜਾਵੇ , ਬੋਲ ਗੁਰੂ ਗੁਰਬਾਣੀ ਸਮਾਨ ।।\nਡੰਡੌਤ ਬੰਦਨਾ ਅਨਿਕ ਬਾਰ , ਕਰਾਂ ਸਚਖੰਡ ਨਾਨਕ ਧਾਮ ।।\nਹੁਕਮੁ ਹੋਵੇ ਜਾਂ ਪਾਰਬ੍ਰਹਮ , ਬਾਹਰ ਹੁਕਮੇ ਨਾ ਜਾਨ ।।\nਬਾਂਧੀ ਛੂਟੇ ਨਾ ਦਾਸ ਕੀ , ਜਿਤੁ ਜਿਤੁ ਤੁਝੇ ਧਿਆਨ ।।\nਦਰਸ਼ਨ ਕਰੇ ਅਰਜੋਈ ਤੁਧੁ ਆਗੇ , ਦਿਓ ਦਾਨ ਮੇਰੇ ਮੇਹਰਬਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मेरे रामा मेरे कृष्णा","c":"मेरे रामा मेरे कृष्णा मेरे नंद गोपाल , \nदेओ प्रीत चरणाये मेरे ठाकुर दातार ।।\nधन धन धन धन धन निरंकार , \nनानक गोबिंद गुर संत सजण देओ दान ।।\nकरां बेनंती हरि आपणे दास धरम करो परवान , \nदास दासन सेव कमावे करते करीम नानक भगवान ।।\nनैन तरसन दर्शन कओ दरस देओ कृष्ण सुलतान ,\nआदि भवानी जुगादि हो जावे , बोल गुरू गुरबाणी समान ।। \nडंडौत बंदना अनिक बार , करां सचखण्ड नानक धाम ।। \nहुकम होवे जां पारब्रह्म , बाहर हुकमे ना जान ।।\nबांधी छूटे ना दास की , जित जित तुझे धिआन ।।\nदर्शन करे अरजोई तुध आगे , देओ दान मेरे मेहरबान ।।\n( यकीन )"},"en":{"t":"Mere Rama Mere Krishna","c":"Mere Rama Mere Krishna"}},

	{"id":1771927153028,"audio":"audio/MEIN SIMBLE DA RUKH.mp3",
	"pb":{"t":"ਮੈਂ ਸਿੰਬਲ ਦਾ ਰੁੱਖ ਵੇ ਸਜਣਾ","c":"ਮੈਂ ਸਿੰਬਲ ਦਾ ਰੁੱਖ ਵੇ ਸਜਣਾ , ਉੱਗ ਪਿਆ ਵਿਚ ਕੁਰਾਹੇ ,\nਨਾ ਕੋ ਮੇਰੀ ਛਾਵੇਂ ਬੈਠੇ , ਨਾ ਕੋ ਫਲ ਫੁੱਲ ਖਾਵੇ ।।\nਪੱਤ ਕੁਸੈਲੇ ਫੁੱਲ ਬਕੇਵੇਂ ਨਾ ਭੌਰਾ ਝੂਮਣ ਆਵੇ ,\nਲੰਮ ਲਮੇਰੀ ਕੂਲੀਆਂ ਸ਼ਾਖਾਂ ਨਾ ਪੰਛੀ ਆਹਲਣਾ ਪਾਵੇ ।।\nਉੱਚੀ ਸੰਘਣੀ ਭਰੀ ਜਵਾਨੀ ਨਾ ਚੰਮ ਕੰਮ ਕੋ ਆਵੇ ,\nਬਿਰਹੋਂ ਦੀ ਅੱਗ ਘੁੱਟੀ ਬੈਠਾ ਨਾ ਛੱਤੀਂ ਬਾਲੇ ਕੋ ਪਾਵੇ ।।\nਕਾਰ ਕਰੇ ਨਾ ਕੋ ਲਕੜਹਾਰਾ , ਨਾ ਬੇਦੀ ਡੋਲੀ ਸਜਾਵੇ ,\nਭਾਗ ਭਰੇਸੀ ਕੋ ਭਾਗਾਂ ਵਾਲੀ , ਦਰਸ਼ਨ ਬਾਬੁਲ ਬਲਮਾ ਗਲ ਲਾਵੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं सिम्बल दा रुख वे सजणा","c":"मैं सिम्बल दा रुख वे सजणा , उग्ग पेया विच कुराहे , \nना को मेरी छावें बैठे , ना को फल फुल खावे ।।\nपत्त कुसैले फुल बकेवें ना भौरा झूमण आवे , \nलम्म लमेरी कूलीआं शाखां ना पंछी आहलणा पावे ।। \nउच्ची संघणी भरी जवानी ना चम्म कम्म को आवे , \nबिरहों दी अग्ग घुट्टी बैठा ना छत्तीं बाले को पावे ।।\nकार करे ना को लकड़हारा , ना बेदी डोली सजावे , \nभाग भरेसी को भागां वाली , दर्शन बाबुल बलमा गल लावे ।।\n( यकीन )"},"en":{"t":"Mein Simbal Da Rukh Ve Sajna","c":"Mein Simbal Da Rukh Ve Sajna"}},

	{"id":1772204598032,
	"pb":{"t":"ਮੈਂ ਗਰੀਬ ਦਾਸ ਤੁਮਾਰਾ","c":"ਮੈਂ ਗਰੀਬ ਦਾਸ ਤੁਮਾਰਾ , ਤੁਝ ਬਿਨੁ ਨਾਹੀ ਅਵਰੁ ਸਹਾਰਾ ।।\nਮੁਝ ਮੇਂ ਤੂੰ ਤਾਂ ਭਉ ਕੇਹਾ , \nਤੁਮਰੇ ਰੰਗ ਰੰਗਾ ਮੋਰਾ ਜੀਆ , ਤੇਰਾ ਰੂਪ ਨਿਆਰਾ ।।\nਹਰ ਪਲ ਮਾਰਗ ਰਾਹ ਦਰਸਾਈ ,\nਨਾਮੁ ਧਨੁ ਪਾਯੋ ਯੁਕਤੀ ਬਤਾਈ , ਖੋਲ੍ਹਿਆ ਮਨ ਕਾ ਦੁਆਰਾ ।।\nਕਿਰਪਾ ਕੀਜੈ ਰਹਿਮਤ ਬਰਸੇ ,\nਮਿਲਣੇ ਕੋ ਮੇਰਾ ਜੀਆ ਤਰਸੇ , ਹੋਵੈ ਦਰਸ਼ਨ ਤੁਮਾਰਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं गरीब दास तुमारा","c":"मैं गरीब दास तुमारा , तुझ बिन नाही अवर सहारा ।। \nमुझ में तूं तां भौ केहा , \nतुमरे रंग रंगा मोरा जीआ , तेरा रूप निआरा ।।\nहर पल मारग राह दरसाई , \nनाम धन पायो युकती बताई , खोला मन का दुआरा ।।\nकिरपा कीजै रहमत बरसे , \nमिलणे को मेरा जीआ तरसे , होवे दर्शन तुमारा ।।\n( यकीन )"},"en":{"t":"Mein Gareeb Das Tumara","c":"Mein Gareeb Das Tumara"}},

	{"id":1772204959604,
	"pb":{"t":"ਮੈਂ ਤਾਂ ਜਾਣਾਂ ਏਕੋ ਦਾਤਾ","c":"ਮੈਂ ਤਾਂ ਜਾਣਾਂ ਏਕੋ ਦਾਤਾ , ਜਿਸ ਇਹ ਉੱਮਤ ਸਜਾਈ ।।\nਨਾ ਮੈਂ ਜਾਣਾਂ ਹਿੰਦੂ ਸਿੱਖ ਨਾ ਮੋਮਨ ਈਸਾਈ ।।\nਜ਼ਾਤ ਪਾਤ ਤੇ ਮਜ਼ਹਬ ਕੌਮ ਇਹ ਹੈ ਸੋਚ ਪਰਾਈ ।।\nਪੁੱਤਰ ਕਪੁੱਤਰ ਸਪੁੱਤਰ ਬਣਨ ਇਹ ਹੈ ਕਰਮ ਕਮਾਈ ।।\nਮਨਮੁਖ ਤੇ ਮਨਮਤੀ ਕਰਨ ਬਹੁਤ ਚਤੁਰਾਈ ।।\nਧਰਮ ਨੂੰ ਭੁੱਲ ਧਰਨੇ ਮਾਰਨ ਹੱਕਾਂ ਖ਼ਾਤਰ ਕਰਨ ਲੜਾਈ ।।\nਕਹੇ ਦਰਸ਼ਨ ਰੱਬ ਨਾ ਵਿਸਾਰੋ ਜਿਸ ਇਹ ਸਾਂਝ ਜਗਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं तां जाणा एको दाता","c":"मैं तां जाणा एको दाता , जिस एह उमत्त सजाई ।। \nना मैं जाणा हिंदू सिख ना मोमन ईसाई ।।\nजात पात ते मज़हब कौम एह है सोच पराई ।। \nपुत्तर कपुत्तर सपुत्तर बनण एह है करम कमाई ।।\nमनमुख ते मनमती करण बहुत चतुराई ।।\nधरम नूँ भुल धरने मारण हक्कां खातर करण लड़ाई ।। \nकहे दर्शन रब्ब ना विसारो जिस एह सांझ जगाई ।।\n( यकीन )"},"en":{"t":"Mein Ta Jana Eko Data","c":"Mein Ta Jana Eko Data"}},

	{"id":1772205217579,
	"pb":{"t":"ਮੈਂ ਤੇਰੇ ਗੁਣ ਗਾਵਾਂ","c":"ਮੈਂ ਤੇਰੇ ਗੁਣ ਗਾਵਾਂ , ਜੋ ਮਾਂਗੂੰ ਸੋ ਫਲੁ ਪਾਵਾਂ ।।\nਕਾਟੋ ਬੰਧਨ ਮੇਰੇ ਕਾਟਨਹਾਰ , ਬਖ਼ਸ਼ੋ ਪਾਪ ਮੇਰੇ ਪਾਲਨਹਾਰ ।।\nਤੂੰ ਮੇਰੇ ਠਾਕੁਰ ਗੋਬਿੰਦ ਪਿਆਰੇ , ਜਾਊਂ ਕੁਰਬਾਨ ਮੇਰੇ ਰਾਮ ਪਿਆਰੇ ।।\nਬੰਦਨਾ ਕਰਾਂ ਤੁਧੁ ਆਗੇ ਮੇਰੇ ਨਾਨਕ , ਦਿਓ ਦਰਸ਼ਨ ਸੋਢੀ ਪਿਆਰੇ ।।\nਹੋਵੈ ਪਰਵਾਨ ਜੇ ਕਰਾਂ ਅਰਜੋਈ , ਦਰਸੁ ਦਿਓ ਮੇਰੇ ਰਾਮ ਦੁਲਾਰੇ ।।\nਰਾਮ ਰਾਮ ਸਿਮਰਾਂ ਮੈਂ ਨਾਓ , ਦਰਸ਼ਨ ਦੁੱਖ ਕਾਟੋ ਹਮਾਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं तेरे गुण गावां","c":"मैं तेरे गुण गावां , जो मांगूँ सो फल पावां ।।\nकाटो बंधन मेरे काटनहार , बख्शो पाप मेरे पालनहार ।। \nतूं मेरे ठाकुर गोबिंद पिआरे , जाऊँ कुरबान मेरे राम पिआरे ।।\nबंदना करां तुध आगे मेरे नानक , देओ दर्शन सोढी पिआरे ।।\nहोवे परवान जे करां अरजोई , दरस देओ मेरे राम दुलारे ।।\nराम राम सिमरां मैं नाओ , दर्शन दुख काटो हमारे ।।\n( यकीन )"},"en":{"t":"Mein Tere Gun Gava","c":"Mein Tere Gun Gava"}},

	{"id":1772205494843,
	"pb":{"t":"ਮੈਂ ਨਿਮਾਣੀ ਮਾਣ ਕਰੇਸਾਂ","c":"ਮੈਂ ਨਿਮਾਣੀ ਮਾਣ ਕਰੇਸਾਂ ਤੁਧੁ ਪੈ ਮੇਰੇ ਸਾਂਈ ,\nਐਸੇ ਤੜਫਾਂ ਜੈਸੇ ਮੀਨਾ ਬਿਨੁ ਪਾਣੀ ਮਰਿ ਜਾਈ ।।\nਮੇਰੇ ਸਾਹਿਬਾ ਵਾਂਗ ਮਿਰਗਾਵਲੀ ਤ੍ਰਿਹਾਈ ,\nਤਾਕ ਪਰਾਈ ਤਾਤ ਬੇਗਾਨੀ ਦੋਨੋਂ ਮੇਂ ਸੁਖ ਨਾਹੀਂ ।।\nਆਪਣਾ ਬੀਜੇ ਆਪਣਾ ਕਾਟੇ ਬਿਨੁ ਹਰਿ ਸਿਉਂ ਪ੍ਰੀਤ ਨਾ ਭਾਈ ।।\nਸੁਖ ਸੰਘੇੜੇ ਹਰਿ ਸੰਗ ਆਪੇ ਕਿਸੇ ਵਿਰਲੇ ਜਾਤਾ ਭਾਈ ।।\nਮੈਂ ਬਾਵਰੀ ਐਸੀ ਭਯੋ ਰੂਪ ਨਾ ਧਨ ਨਾਹੀ ,\nਮੇਰਾ ਸਾਂਈ ਸੁੰਦਰ ਸੰਘੇੜਾ ਹਰਿ ਸਿਉਂ ਮਿਲੇਓ ਭਾਈ ।।\nਦਰਸ਼ਨ ਪਿਆਸੀ ਚੇਤਨਾ ਨੈਣੀ ਨੀਰ ਬਹਾਈ ,\nਹਿਰਦੇ ਵਸੋ ਮੇਰੇ ਸਾਹਿਬਾ ਅਰਜ ਸੁਣੋ ਮੇਰੇ ਸਾਂਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं निमाणी माण करेसां","c":"मैं निमाणी माण करेसां तुध पे मेरे सांई , \nऐसे तड़फां जैसे मीना बिन पाणी मर जाई ।।\nमेरे साहिबा वांग मिरगावली त्रिहाई , \nताक पराई तात बेगानी दोनो में सुख नाहीं ।।\nआपणा बीजे आपणा काटे बिन हरि सिओं प्रीत ना भाई ।। \nसुख संघेड़े हरि संग आपे किसे विरले जाता भाई ।।\nमैं बावरी ऐसी भयो रूप ना धन नाही , \nमेरा सांई सुंदर संघेड़ा हरि सिओं मिलेओ भाई ।।\nदर्शन पिआसी चेतना नैनी नीर बहाई , \nहिरदे वसो मेरे साहिबा अरज सुणो मेरे सांई ।।\n( यकीन )"},"en":{"t":"Mein Nimani Maan Karesa","c":"Mein Nimani Maan Karesa"}},

	{"id":1772205697003,
	"pb":{"t":"ਮੈਂ ਮੂਰਖ ਕੀ ਗਤਿ ਨਹੀਂ ਕੋਈ","c":"ਮੈਂ ਮੂਰਖ ਕੀ ਗਤਿ ਨਹੀਂ ਕੋਈ , ਸਗਲ ਜਹਾਂ ਮੇਂ ਤੂੰ ਪੁਰਖ ਸੁਜਾਨਾ ।।\nਤੁਧੁ ਸੰਗਿ ਨਿਰਮਲ ਹੋਵਾਂ ਹਉਂ ਪਾਪੀ ਕੋ ਨਾਹੀ ਟਿਕਾਣਾ ।।\nਜਨਮ ਜਨਮ ਕੀ ਵਿਗੜੀ ਸੁਲਝੀ ਗੁਰ ਦੀਓ ਮੋਹੇ ਨਾਮੁ ਨਿਧਾਨਾ ।।\nਨੀਚ ਕਮੀਨਾ ਹਉਂ ਦੁਰਾਚਾਰੀ , ਦਯਾਲ ਪੁਰਖ ਸਦ ਮੇਹਰਬਾਨਾ ।।\nਦਰਸ਼ਨ ਭਾਗ ਭਏ ਵਡ ਤੇਰੇ , ਕੀਆ ਤੁਧੁ ਸੰਗਿ ਜੋ ਦਾਸ ਨਿਮਾਣੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मैं मूरख की गत नहीं कोई","c":"मैं मूरख की गत नहीं कोई , सगल जहां में तूं पुरख सुजाना ।। \nतुध संग निरमल होवां हउँ पापी को नाही ठिकाणा ।। \nजनम जनम की बिगड़ी सुलझी गुर दीओ मोहे नाम निधाना ।। \nनीच कमीना हउँ दुराचारी , दयाल पुरख सद मेहरबाना ।। \nदर्शन भाग भये वड तेरे , कीआ तुध संग जो दास निमाणे ।।\n( यकीन )"},"en":{"t":"Mein Murakh Ki Gat Nahi Koi","c":"Mein Murakh Ki Gat Nahi Koi"}},

	{"id":1772205965586,
	"pb":{"t":"ਮੋਹੇ ਆਪਣਾ ਨਾਮੁ ਦਿਓ","c":"ਮੋਹੇ ਆਪਣਾ ਨਾਮੁ ਦਿਓ , ਜਾਂ ਤੁਧੁ ਭਾਵੈ ਸਤਿਗੁਰੂ ।।\nਤੇਰੀ ਮੇਹਰ ਤੇਰੀ ਦਯਾ , ਤੂੰ ਸਭ ਕਾ ਸੁਆਮੀ ਜੀਓ ।।\nਤੇਰਾ ਰੂਪ ਤੇਰਾ ਰੰਗ , ਤੇਰਾ ਖੇਲੁ ਰਚਾਯਾ ।।\nਗੁਰ ਬਿਨੁ ਰੂਪ ਰੰਗ ਸਭ ਫੀਕੇ , ਹਰਿ ਬਿਨੁ ਫੀਕੀ ਸਭ ਮਾਯਾ ।।\nਹਰਿ ਕੀ ਸੇਵਾ ਉੱਤਮ ਸੁਣਿ ਭਾਈ , ਹਰਿ ਕੀ ਸੇਵਾ ਹੋਵੈ ਸਫਲ ਕਮਾਈ ।।\nਨਾਮੁ ਧਿਆਇਨਿ ਹਰਿ ਗੁਣ ਗਾਇਨਿ , ਆਠ ਪਹਰ ਅਰਾਧੀ ।।\nਦਰਸ਼ਨ ਕਹੇ ਸੁਣਿ ਹਰਿ ਮੀਤਾ , ਹਿਰਦੇ ਆਣਿ ਵਸਿਓ ਮੇਰੇ ਚੀਤਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मोहे आपणा नाम देओ","c":"मोहे आपणा नाम देओ , जां तुध भावे सतिगुरू ।। \nतेरी मेहर तेरी दया , तूं सभ का सुआमी जीओ ।। \nतेरा रूप तेरा रंग , तेरा खेल रचाया ।। \nगुर बिन रूप रंग सभ फीके , हरि बिन फीकी सभ माया ।। \nहरि की सेवा उत्तम सुण भाई , हरि की सेवा होवे सफल कमाई ।।\nनाम धिआइन हरि गुण गाइन , आठ पहर अराधी ।।\nदर्शन कहे सुण हरि मीता , हिरदे आण वसेओ मेरे चीता ।।\n( यकीन )"},"en":{"t":"Mohe Apna Naam Deyo","c":"Mohe Apna Naam Deyo"}},

	{"id":1772206255517,
	"pb":{"t":"ਮੱਕੇ ਹੱਜ ਗੁਜ਼ਾਰਨ ਮੋਮਨ","c":"ਮੱਕੇ ਹੱਜ ਗੁਜ਼ਾਰਨ ਮੋਮਨ , ਮਨੋ ਅਭਿਮਾਨ ਨਾ ਜਾਈ ।।\nਕਾਸ਼ੀ ਮਥੁਰਾ ਭਟਕਣ ਹਿੰਦੂ , ਕਰਨ ਜ਼ੁਬਾਨੀ ਚਤੁਰਾਈ ।।\nਹਿਰਦੇ ਵਸੇ ਨਾ ਗੁਰੂ ਗੋਬਿੰਦ , ਫਿਰਨ ਧੌਣ ਅਕੜਾਈ ।।\nਮੱਤ ਪਰਾਈ ਮਰਨ ਅਨਿਆਈ ਮੌਤੇ , ਸ਼ਹੀਦੀ ਆਖਣ ਪਾਈ ।।\nਗੁਰੂ ਨਾ ਜਾਣੇ ਮਤਭੇਦ , ਸਿਖਾਵੇ ਨਾ ਮਨੁੱਖ ਲੜਾਈ ।।\nਪ੍ਰੇਮ ਸ਼ਾਸਤ੍ਰ ਦੇਵਣ ਸਭਹਿ ਮਨਮੁਖ ਸੂਝ ਨਾ ਪਾਈ ।।\nਦਰਸ਼ਨ ਦਾਸ ਰਹਿਮਤ ਮੰਗੇ , ਕਰੋ ਨਾਥ ਰਘੁਰਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मक्के हज्ज गुजारन मोमन","c":"मक्के हज्ज गुजारन मोमन , मनो अभिमान ना जाई ।।\nकाशी मथुरा भटकण हिंदू , करन जुबानी चतुराई ।।\nहिरदे वसे ना गुरू गोबिंद , फिरन धौण अकड़ाई ।।\nमत्त पराई मरण अनियाई मौते , शहीदी आखण पाई ।। \nगुरू ना जाणे मतभेद , सिखावे ना मनुख लड़ाई ।। \nप्रेम शास्त्र देवण सभहि मनमुख सूझ ना पाई ।। \nदर्शन दास रहमत मंगे , करो नाथ रघुराई ।।\n( यकीन )"},"en":{"t":"Makke Haj Gujaran Moman","c":"Makke Haj Gujaran Moman"}},

	{"id":1772206531573,
	"pb":{"t":"ਰਾਜੇ ਰਾਜ ਕਮਾਂਵਦੇ","c":"ਰਾਜੇ ਰਾਜ ਕਮਾਂਵਦੇ ਜ਼ੁਲਮ ਕਰਨ ਦਿਨ ਰਾਤ ।।\nਕੁੱਤਿਆਂ ਵਾਂਗੂ ਭੌਂਕਦੇ ਜਿਵੇਂ ਮੁਰਦਾ ਖਾਵਣ ਕਾਗ ।।\nਮਾਯਾ ਜੱਫੀ ਪਾਂਵਦੇ , ਬਣ ਬੈਠੇ ਕਾਲੇ ਨਾਗ ।।\nਦਰਗਾਹੇ ਢੋਈ ਨਾ ਮਿਲਸੀ , ਜਗਤ ਨਾ ਲਾਗੇ ਲਾਜ ।।\nਮੰਦਰ ਖਾਧੇ ਬਾਹਮਣਾ , ਭਾਈਆਂ ਗੁਰਦੁਆਰ ।।\nਗਿਰਜੇ ਲੁੱਟੇ ਪਾਦਰੀਆਂ , ਮਸੀਤਾਂ ਮੁਸਲਮਾਨ ।।\nਦਰਸ਼ਨ ਲੇਖਾ ਮੰਗੇਸੀ , ਸਾਹਿਬ ਦੇ ਦਰਬਾਰ ।।\n( ਯਕੀਨ )"},"hi":{"t":"राजे राज कमांवदे","c":"राजे राज कमांवदे जुलम करन दिन रात ।। \nकुत्तेयां वांगू भौकदे जिवें मुरदा खावण काग ।। \nमाया जफी पांवदे , बण बैठे काले नाग ।। \nदरगाहे ढोई ना मिलसी , जगत ना लागे लाज ।। \nमंदर खाधे बाहमणा , भाईआं गुरूदुआर ।। \nगिरजे लुट्टे पादरीयां , मसीतां मुसलमान ।। \nदर्शन लेखा मंगेसी , साहिब दे दरबार ।।\n( यकीन )"},"en":{"t":"Raje Raj Kamavde","c":"Raje Raj Kamavde"}},

	{"id":1772206811506,
	"pb":{"t":"ਰਾਮ ਸਿਮਰ ਮਨ ਮੇਰੇ ਸ਼ਬਦ ਅਘਾਈ","c":"ਰਾਮ ਸਿਮਰ ਮਨ ਮੇਰੇ ਸ਼ਬਦ ਅਘਾਈ ,\nਮੁਕਤ ਜੁਗਤ ਸਤਿਗੁਰ ਨਾਮ ਸੇਵਾ ਪਾਈ ।।\nਸਰਬ ਨਿਧਾਨ ਸਰਬ ਵਿਆਪੀ ਠਾਕੁਰ ਦਾਤਾ ,\nਸਚ ਰਾਸ ਤੇਰੀ ਭਗਤ ਕਮਾਈ ।।\nਜਾਪ ਤਾਪ ਸੰਤਾਪ ਸੇ ਸਾਹਿਬ ਤੇਰਾ ਸੇਵਕ ਨਿਆਰਾ ,\nਧਰਤ ਪਾਤਾਲ ਕੀਓ ਚਹੁ ਕੁੰਟ ਗਗਨ ਰੁਸ਼ਨਾਈ ।।\nਆਦਿ ਨਾਰਾਇਣ ਮੇਰੇ ਜਗਦੀਸ਼ ਸੁਆਮੀ ,\nਹਰਿ ਭਗਤੀ ਮਾਰਗ ਰਾਹ ਦਰਸਾਈ ।।\nਜਨ ਦਰਸ਼ਨ ਤੇਰਾ ਦਾਸ ਭਯੋ ,\nਤੁਧੁ ਕਿਰਪਾ ਤੇ ਮਨ ਮੈਲ ਗਵਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"राम सिमर मन मेरे शब्द अघाई","c":"राम सिमर मन मेरे शब्द अघाई , \nमुक्त जुगत सतिगुर नाम सेवा पाई ।।\nसरब निधान सरब विआपी ठाकुर दाता , \nसच रास तेरी भगत कमाई ।।\nजाप ताप संताप से साहिब तेरा सेवक निआरा , \nधरत पाताल कीओ चहुं कुंट गगन रुशनाई ।।\nआदि नारायण मेरे जगदीश सुआमी , \nहरि भगती मारग राह दरसाई ।। \nजन दर्शन तेरा दास भयो , \nतुध किरपा ते मन मैल गवाई ।।\n( यकीन )"},"en":{"t":"Ram Simar Man Mere Shabad Aghai","c":"Ram Simar Man Mere Shabad Aghai"}},

	{"id":1772207262156,
	"pb":{"t":"ਰਾਮ ਨਾਮ ਕੀ ਮਹਿਮਾ ਨਿਆਰੀ","c":"ਸੰਤਾਂ ਸਿਦਕੁ ਹਰਿ ਪੂਰਾ ਕੀਨੇਆ , ਪ੍ਰਭ ਸੰਗਿ ਜਪੇਓ ਨਾਉ ਜੀਓ ।।\nਸਤਿਗੁਰੂ ਸੇਵਾ ਉੱਤਮ ਧਾਰਾ , ਸਗਲ ਥਾਂਉ ਵਸੇਆ ਓਂਕਾਰਾ ।।\nਰਾਮ ਨਾਮ ਕੀ ਮਹਿਮਾ ਨਿਆਰੀ , ਬਿਨੁ ਨਾਮੇ ਜਨਮੁ ਜਾਯੋ ਖੁਆਰੀ ।।\nਅਪਣੇ ਦਾਸ ਕੀ ਸੁਣਿਓ ਪੁਕਾਰ , ਹਰਿ ਦੀਜੋ ਮੋਹੇ ਨਾਮੁ ਅਧਾਰ ।।\nਭਰਮ ਕਲੇਸ ਸਭਹਿ ਨਸਿ ਜਾਸੀ , ਜਨ ਦਰਸ਼ਨ ਗੁਰ ਪੂਰੇ ਪ੍ਰਭ ਅਬਿਨਾਸੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"राम नाम की महिमा निआरी","c":"संतां सिदक हरि पूरा कीनेआ , प्रभ संग जपेओ नाओ जीओ ।।\nसतिगुरू सेवा उत्तम धारा , सगल थांओ वसेआ ओंकारा ।।\nराम नाम की महिमा निआरी , बिन नामे जनम जायो खुआरी ।।\nअपने दास की सुणेओ पुकार , हरि दीजो मोहे नाम अधार ।।\nभरम कलेस सभहि नस जासी , जन दर्शन गुर पूरे प्रभ अबिनासी ।।\n( यकीन )"},"en":{"t":"Ram Naam Ki Mahima Nyari","c":"Ram Naam Ki Mahima Nyari\nSanta Sidak Hari Pura Kineya"}},

	{"id":1772207657513,
	"pb":{"t":"ਰਾਮ ਭਜੁ ਮਨ ਬਾਵਰੇ","c":"ਰਾਮ ਭਜੁ ਮਨ ਬਾਵਰੇ ਜੀਵਨ ਬੀਤਾ ਜਾਏ ,\nਪਲ ਪਲ ਛਿਨ ਛਿਨ ਨਾਮੁ ਧਿਆਲੇ ਤੂੰ ਕਾਹੇ ਵਕਤੁ ਗਵਾਏ ।।\nਬਚਪਨ ਬੀਤਾ ਆਈ ਜਵਾਨੀ ਰੰਗ ਰਲੀਆਂ ਬਹੁ ਮਾਣੀ ,\nਗਈ ਜਵਾਨੀ ਆਇਆ ਬੁਢਾਪਾ ਪਰ ਤ੍ਰਿਸ਼ਨਾ ਵਧਦੀ ਜਾਏ ।।\nਮਨ ਤੇਰੇ ਆਗੇ ਤੂੰ ਮਨ ਕੇ ਪਿੱਛੇ ਭੁੱਲ ਗਏਓ ਨਾਮੁ ਕਮਾਈ ,\nਉਸਨੇ ਭੇਜਿਆ ਸ਼ੁਭ ਕਰਮ ਕਮਾਨੇ ਤੂੰ ਪਾਪ ਕਮਾਤਾ ਜਾਏ ।।\nਇਕ ਦਿਨ ਉੱਡ ਜਾਣਾ ਹੈ ਪੰਛੀ ਤੋੜ ਕੇ ਸੁੰਦਰ ਪਿੰਜਰਾ ,\nਲੁੱਟ ਜਾਵੇਗਾ ਸਭ ਕਿਛੁ ਤੇਰਾ , ਫਿਰ ਮਿਲੇਗਾ ਦਰਸ਼ਨ ਕਿਆ ਪਛਤਾਏ ।।\n( ਯਕੀਨ )"},"hi":{"t":"राम भज मन बावरे","c":"राम भज मन बावरे जीवन बीता जाये , \nपल पल छिन छिन नाम धिआले तँ काहे वक्त गवाये ।।\nबचपन बीता आई जवानी रंग रलीआं बहु माणी , \nगई जवानी आया बुढ़ापा पर तृष्णा वधदी जाये ।।\nमन तेरे आगे तूं मन के पीछे भूल गेओ नाम कमाई , \nउसने भेजा शुभ करम कमाने तूं पाप कमाता जाये ।।\nइक दिन उड जाणा है पंछी तोड़के सुंदर पिंजरा , \nलुट जायेगा सभ किछ तेरा , फिर मिलेगा दर्शन किआ पछताये ।।\n( यकीन )"},"en":{"t":"Ram Bhaj Man Bavare","c":"Ram Bhaj Man Bavare"}},

	{"id":1772207929906,
	"pb":{"t":"ਰਾਮਾ ਤੁਧੁ ਬਿਨੁ ਨਾ ਕੋ ਸਹਾਈ","c":"ਰਾਮਾ ਤੁਧੁ ਬਿਨੁ ਨਾ ਕੋ ਸਹਾਈ ,\nਆਣਿ ਵਸੋ ਮਨ ਮਾਹੇ ਤੁਧੁ ਸੰਗਿ ਪ੍ਰੀਤਿ ਲਗਾਈ ।।\nਹਮ ਪਾਪੀ ਹਮ ਨਿਚਲੇ ਆਸਣ , ਤੁਮ ਵੱਡੇ ਮੇਰੇ ਸਾਂਈ ,\nਮਨੁ ਮੈਲਾ ਹੋ ਕਿੰਨ ਬਿਧਿ ਉਜਵਲ , ਐਸਾ ਗੁਰ ਦਿਓ ਸਾਂਈ ।।\nਸੇਵ ਨਾ ਕੀਨੀ ਨਾਮੁ ਨਾ ਜਪੇਓ , ਬੇਮੁੱਲਾ ਉਮਰ ਗਵਾਈ ,\nਐਸੀ ਰਾਹ ਦਰਸਾਵੋ ਸੁਆਮੀ , ਕੱਟ ਚਉਰਾਸੀ ਜਾਈ ।।\nਦਰਸ ਪਿਆਸੀ ਚੇਤਨਾ ਦਰਸ਼ਨ ਦੇਖਣ ਤਾਂਈ ,\nਕਿਰਪਾ ਕੀਜੈ ਦੀਜੈ ਦਰਸ਼ਨ ਮਨੁ ਤ੍ਰਿਪਤ ਹੋ ਜਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"रामा तुध बिन ना को सहाई","c":"रामा तुध बिन ना को सहाई , \nआन बसो मन माहे तुध संग प्रीत लगाई ।।\nहम पापी हम निचले आसन , तुम वड्डे मेरे सांई , \nमन मैला हो किंन बिध उजवल , ऐसा गुर दो सांई ।।\nसेव ना कीनी नाम ना जपेओ , बेमुल्ला उमर गवाई , \nऐसी राह दरसावो सुआमी , कट्ट चौरासी जाई ।।\nदरस पिआसी चेतना दर्शन देखण तांई , \nकिरपा कीजै दीजै दर्शन मन तृप्त हो जाई ।।\n( यकीन )"},"en":{"t":"Rama Tud Bin Na Ko Sahai","c":"Rama Tud Bin Na Ko Sahai"}},

	{"id":1772208288293,
	"pb":{"t":"ਰੇ ਮਨ ਅਨਹਦ ਸ਼ਬਦੁ ਪਛਾਣ","c":"ਰੇ ਮਨ ਅਨਹਦ ਸ਼ਬਦੁ ਪਛਾਣ ,\nਰਾਮ ਨਾਮ ਕੀ ਧੁਨਿ ਨਿਸਿ ਬਾਜੇ , ਆਠ ਪਹਰ ਸੁਬਹ ਸ਼ਾਮ ।।\nਗੁਰ ਕੇ ਪਾਸਿ ਮਨ ਕੋ ਕੀਨੋ ਕੋਟਿ ਪਰਾਧ ਜਿਸੁ ਹਰਿ ਲੀਨੋ ,\nਗੁਰ ਪੈ ਆਸ ਗੁਰ ਕੀ ਓਟ ਪੂਰਨ ਸਭਹਿ ਕਾਜ ।।\nਆਪਿ ਮਿਲਾਵੈ ਸਤਿਕਰਤਾਰ , ਗੁਰ ਜਬ ਭਯੋ ਦਯਾਲ ,\nਗੁਰ ਕੀ ਸੇਵਾ ਉੱਤਮ ਸੇਵਾ , ਮਿਲੇ ਦਰਗਾਹੇ ਮਾਣ ।।\nਮਨ ਤੂੰ ਛੋਡਿ ਸਭਹਿ ਚਤੁਰਾਈ , ਗੁਰ ਭਗਤੀ ਕਰਿ ਨਾਮ ਕਮਾਈ ,\nਦਰਸ਼ਨ ਕਰਿ ਕਰਿ ਗੁਰ ਆਪਣੇ ਕੇ ਭਵਜਲ ਉਤਰੇਓ ਪਾਰ ।।\n( ਯਕੀਨ )"},"hi":{"t":"रे मन अनहद शब्द पछाण","c":"रे मन अनहद शब्द पछाण , \nराम नाम की धुन निस बाजे , आठ पहर सुबह शाम ।।\nगुर के पास मन को कीनो कोट पराध जिस हर लीनो , \nगुर पे आस गुर की ओट पूरण सभहि काज ।।\nआप मिलावै सतिकरतार , गुर जब भयो दयाल , \nगुर की सेवा उत्तम सेवा , मिले दरगाहे माण ।।\nमन तूं छोड सभहि चतुराई , गुर भगती कर नाम कमाई , \nदर्शन कर कर गुर आपने के भवजल उतरेओ पार ।।\n( यकीन )"},"en":{"t":"Re Man Anhad Shabad Pachhan","c":"Re Man Anhad Shabad Pachhan"}},

	{"id":1772208797043,
	"pb":{"t":"ਰੱਖਣ ਰੋਜ਼ੇ ਮਨਾਵਣ ਈਦਾਂ","c":"ਰੱਖਣ ਰੋਜ਼ੇ ਮਨਾਵਣ ਈਦਾਂ , ਲੁੱਟਣ ਨਿੱਤ ਖੁਦਾਈ ।।\nਕਰਨ ਇਸ਼ਨਾਨ ਨਿੱਤ ਤੀਰਥੀਂ ਮਨੋਂ ਮੈਲ ਨਾ ਗਵਾਈ ।।\nਮੂੰਹ ਦੇ ਮਿੱਠੇ ਦਿਲ ਦੇ ਖੋਟੇ ਬਣ ਬੈਠੇ ਰੱਬ ਦੇ ਈਸਾਈ ।।\nਕੁੱਕੜਾਂ ਵਾਂਗ ਚੂਜ਼ਾ ਮਾਰਨ , ਪੰਜ ਕੱਕਿਆਂ ਲਾਜ ਲਾਈ ।।\nਆਪਣੇ ਆਪ ਆਪੇ ਪਛਾਣੋ , ਭੁੱਲ ਜਾਓ ਸਾਰੀ ਲੜਾਈ ।।\nਦਰਸ਼ਨ ਦਾਸ ਕਰੇ ਅਰਜੋਈ , ਕਰੋ ਦਯਾ ਗੋਸਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"रखण रोजे मनावण ईदां","c":"रखण रोजे मनावण ईदां , लुटण नित खुदाई ।।\nकरन इश्नान नित्त तीरथीं मनो मैल ना गवाई ।।\nमुँह दे मिट्ठे दिल दे खोटे बण बैठे रब्ब दे इसाई ।।\nकुकड़ा वा चुझा मारण , पँज कक्केआं लाज लाई ।।\nआपणे आप आपे पछाणो , भुल जाओ सारी लड़ाई ।।\nदर्शन दास करे अरजोई , करो दया गोसाई ।।\n( यकीन )"},"en":{"t":"Rakhan Roje Manavan Eida","c":"Rakhan Roje Manavan Eida\nRakhan Roze manavan eida"}},

	{"id":1772209021963,
	"pb":{"t":"ਲਾਲ ਦੀਜੈ ਹਰਿ ਨਾਮੁ ਦਾਤਾਰੈ","c":"ਲਾਲ ਦੀਜੈ ਹਰਿ ਨਾਮੁ ਦਾਤਾਰੈ ,\nਪੂਰਨ ਪਾਰਬ੍ਰਹਮ ਆਦਿ ਪੁਰਖ ਮੁਰਾਰੇ ।।\nਏਹ ਜਾਣੇ ਤੁਝੇ ਤਾਹੀ ਮਨੁ ਮਾਨੇ ,\nਅਟਲ ਚਲੀ ਜੋਤਿ ਨਿਰੰਜਨ ।।\nਮੋਹ ਮਮਤਾ ਸਭ ਛੂਟੇ ,\nਦਰਸ਼ਨ ਕਰਮ ਕਮਾਵਾਂ ।।\n( ਯਕੀਨ )"},"hi":{"t":"लाल दीजै हरि नाम दातारै","c":"लाल दीजै हरि नाम दातारै ,\nपूरन पारब्रह्म आदि पुरख मुरारे ।।\nएह जाणे तुझे ताही मन माने ,\nअटल चली जोत निरंजन ।।\nमोह ममता सभ छूटे ,\nदर्शन करम कमावां ।।\n( यकीन )"},"en":{"t":"Laal Dije Hari Naam Datare","c":"Laal Dije Hari Naam Datare"}},

	{"id":1772209343877,
	"pb":{"t":"ਲਾਲ ਰੰਗੀਲੇ ਪ੍ਰਿਤਪਾਲ ਹਰਿ ਰਾਇ","c":"ਸਤਿਗੁਰ ਸਾਜਨ ਸਨੇਂਦੜੇਆ , ਸੰਤ ਸਾਜਨ ਦਿਓ ਦਾਨ ।।\nਭਯੋ ਤ੍ਰਿਪਤ ਮਨੁ ਮੋਰਾ , ਹਉਂ ਗਰੀਬ ਹਮੇ ਦੁੱਖ ਘਨੇਰਾ ।।\nਲਾਲ ਰੰਗੀਲੇ ਪ੍ਰਿਤਪਾਲ ਹਰਿ ਰਾਇ ,\nਤੁਝ ਬਿਨੁ ਜੀਆ ਮਰਿ ਜਾਏ ਹਰਿ ਰਾਇ ।।\nਹਰਿ ਨਾਮੁ ਦਿਓ ਹਰਿ ਨਾਰਾਇਣ , ਨਰ ਨਾਰਾਇਣ ਦੋਨੋ ਮਹਿ ਭੇਦ ਨਾਹੀ ।।\nਤੁਝੇ ਧਿਆਯਾ ਸੁਖੁ ਘਨੇਰਾ ਪਾਯਾ , ਮੇਰੇ ਹਰਿ ਰਾਇਆ ।।\nਹਉਂ ਜਿਥੇ ਜਾਂਈ ਤੇਰੇ ਗੋਸਾਈਂ ਤੇਰੇ ਗੋਸਾਈਂ ,\nਦਰਸ਼ਨ ਅਗੰਮ ਗੋਸਾਈ ਹਰਿ ਰਾਇਆ ।।\n( ਯਕੀਨ )"},"hi":{"t":"लाल रंगीले प्रितपाल हरि राय","c":"सतिगुर साजन सनेंदड़ेया , संत साजन देओ दान ।।\nभयो तृप्त मन मोरा , हउँ गरीब हमे दुख घनेरा ।।\nलाल रंगीले प्रितपाल हरि राय , \nतुझ बिन जीआ मर जाये हरि राय ।।\nहरि नाम देओ हरि नारायण , नर नारायण दोनो महि भेद नाही ।।\nतुझे धिआया सुख घनेरा पाया , मेरे हरि राया ।।\nहउँ जिथे जांई तेरे गोसांई तेरे गोसांई , \nदर्शन अगंम गोसाई हरि राया ।।\n( यकीन )"},"en":{"t":"Laal Rangeele Pritpaal Hari Raye","c":"Laal Rangeele Pritpaal Hari Raye\nSatguru Saajan Sanendreya"}},

	{"id":1772209561534,
	"pb":{"t":"ਲੋਗਨ ਕੀ ਹੈ ਬਾਤ ਨਿਰਾਲੀ","c":"ਲੋਗਨ ਕੀ ਹੈ ਬਾਤ ਨਿਰਾਲੀ , ਜਬ ਕਾਮ ਪਰੇ ਮੁੱਖ ਭੰਵਾਲੀ ।।\nਸੋਚ ਸਮਝ ਕਰਿ ਬਿਚਾਰ , ਗੁਰ ਬਿਨੁ ਨਾਹੀ ਪਾਰਿ ਉਤਾਰ ।।\nਭਲੀ ਚੰਗੀ ਦੁਨੀਆਂ ਮੇਂ , ਅੰਤਿਮ ਰਾਮ ਸਹਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"लोगन की है बात निराली","c":"लोगन की है बात निराली , जब काम परे मुँह भंवाली ।।\nसोच समझ कर बिचार , गुर बिन नाही पार उतार ।।\nभली चंगी दुनिया में , अंतिम राम सहाई ।।\n( यकीन )"},"en":{"t":"Logan Ki Hain Baat Niraali","c":"Logan Ki Hain Baat Niraali"}},

	{"id":1772209965229,
	"pb":{"t":"ਸਹਜ ਸੁਖ ਸੁਨੇਂਦੜੇ ਸਤਿਗੁਰ","c":"ਸਹਜ ਸੁਖ ਸੁਨੇਂਦੜੇ ਸਤਿਗੁਰ ,\nਸੱਚ ਸੰਤੋਖ ਦਯਾ ਨਾਮੁ ਚਹੁ ਧਰਮਾਂ ਦੇ ਸਾਂਈ ।।\nਏਕੋ ਵਰਨੁ ਏਕੋ ਧਰਮੁ ਏਕੋ ਕਰਮੁ ਗੁਸਾਈਂ ਤੂੰ ਸਭਨੀ ਥਾਂਈ ।।\nਸਿਰਜਨਹਾਰ ਸੱਚੇ ਪਾਤਸ਼ਾਹ ਸੱਚ ਤਪੱਸਿਆ ਸੱਚ ਚੰਦਰਮਾਏ ,\nਦਿਸੇ ਨਾਹੀ ਦਿਸਾਏ ।।\nਸਿਦਕ ਭਯੋ ਹਰਿ ਅਰਜਨ ਕੋ ਸ਼ਹਾਦਤ ਸਿਰ ਦੀਜੈ ,\nਗੁਰੂ ਤੇਗ ਬਹਾਦਰ ਪਿਤਾ ਗੋਬਿੰਦ ਰਾਇ , ਜਿਨਹੀ ਦੀਓ ਪੰਥ ਖਾਲਸਾਏ ।।\nਸੱਚ ਸਿਦਕ ਸਰਬੱਤ ਸਾਧ ਸੰਗਤ ਸ਼ਹਾਦਤ ਸਿੰਘ ਜੋ ਬਣ ਜਾਏ ,\nਭੁੱਲ ਗਯੋ ਵਚਨ ਗੁਰੂਵਨ ਕੇ ਦਿਓ ਫਿਰ ਸਮਝਾਏ ।।\nਦਾਸ ਧਰਮ ਚਲੇਓ ਫਿਰ ਕਲਿ ਮਾਹਿ ,\nਜਿਸ ਦੇ ਸਾਂਈ ਦਰਸ਼ਨ ਅਗੰਮ ਗੋਸਾਈਂ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सहज सुख सुनेदड़े सतिगुर","c":"सहज सुख सुनेदड़े सतिगुर , \nसच्च संतोख दया नाम चहुं धरमां दे सांई ।।\nएको वरन एको धरम एको करम गुसांई तूं सभनी थांई ।।\nसिरजनहार सच्चे पातशाह सच्च तप्पसिआ सच्च चंदरमाये , \nदिसे नाही दिसाये ।।\nसिदक भयो हरि अरजन को शहादत सिर दीजै , \nगुरू तेग बहादुर पिता गोबिंद राय , जिनही दीओ पंथ खालसाये ।।\nसच्च सिदक सरबत्त साध संगत शहादत सिंघ जो बण जाये , \nभूल गयो वचन गुरूवन के दीओ फिर समझाये ।।\nदास धरम चलेओ फिर कलि माहि , \nजिस दे सांई दर्शन अगम गोसांई ।।\n( यकीन )"},"en":{"t":"Sehej Sukh Sunendre Satguru","c":"Sehej Sukh Sunendre Satguru"}},

	{"id":1772210203315,
	"pb":{"t":"ਸਜਣ ਸੁੰਦਰ ਮਨਮੋਹਣੇ ਨੂੰ","c":"ਸਜਣ ਸੁੰਦਰ ਮਨਮੋਹਣੇ ਨੂੰ ਦੇ ਸੁਨੇਹਾ ਮਰਦਨ ,\nਤੁਧੁ ਬਿਨੁ ਮਰਦਨ ਮਰਿ ਜਾਈ , ਤੁਧੁ ਬਿਨੁ ਮਰਦਨ ਨਾਹੀ ।।\nਮਰੇ ਮੋਹੇ ਮਨ ਹਉਮੈ ਰੋਗ , ਰੋਗ ਬਿਨਾ ਨਾਹੀ ਵਿਯੋਗ ,\nਜਿਸ ਮਨ ਗੁਰੂ ਵਿਯੋਗ , ਊਹਾਂ ਮੁਕਤ ਜੁਗਤ ,\nਸੁਮੱਤ ਗੁਰਪ੍ਰਸਾਦਿ ਲਏ , ਤੂੰ ਸਭਨੀ ਥਾਂਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सजन सुंदर मनमोहणे नूँ","c":"सजन सुंदर मनमोहणे नूँ दे सुनेहा मरदन ,\nतुध बिन मरदन मर जाई , तुध बिन मरदन नाही ।।\nमरे मोहे मन हउमै रोग , रोग बिना नाही वियोग ,\nजिस मन गुरू वियोग , ऊहां मुक्त जुगत ,\nसुमत्त गुरप्रसादि लये , तूं सभनी थांई ।।\n( यकीन )"},"en":{"t":"Sajan Sundar Manmohne Nu","c":"Sajan Sundar Manmohne Nu"}},

	{"id":1772210432503,
	"pb":{"t":"ਸਤਿ ਨਾਰਾਇਣ ਸਤਿ ਸਿੰਗਾਰੀ","c":"ਸਤਿ ਨਾਰਾਇਣ ਸਤਿ ਸਿੰਗਾਰੀ , ਸਰਸਵਤੀ ਮਾਂ ਆਦਿ ਨਮੈਂ ।।\nਸ੍ਰੀ ਲਕਸ਼ਮੀ ਬਲਬਾਵਨ ਭਯੋ , ਆਦਿ ਨਾਰਾਇਣ ਪੂਰਨ ਕੀਓ ।।\nਸ੍ਰੀ ਲਕਸ਼ਮੀ ਨਾਮੁ ਮਾਯਾ ਨਾਹੀ , ਸ੍ਰੀ ਲਕਸ਼ਮੀ ਨਾਮੁ ਮਾਤ ਜਵਾਲਾ ।।\nਸ੍ਰੀ ਲਕਸ਼ਮੀ ਆਸਣੁ ਜਗਦੀਸ਼ ਮਹਿ ਬੈਠਿਓ , ਲਕਸ਼ਮੀ ਜਗ ਕੀ ਬਾਲਾ ।।\nਓਂਕਾਰ ਨਿਰਾਧਾਰ ਨਿਰਾਕਾਰ ਸੁਆਮੀ , ਹਰਿ ਆਪੇ ਅੰਤਰਯਾਮੀ ।।\nਧਨੁ ਗੋਬਿੰਦ ਠਾਕੁਰ ਤੁਮ ਪੂਰਨ ਪੁਰਖ ਅਬਿਨਾਸੀ , ਸੁਣੋ ਬੇਨਤੀ ਜਗਜੀਵਨ ਦਾਤਾ ।।\nਹਰਿ ਆਪੇ ਤੂੰ ਪਿਤਾ ਮਾਤਾ ਮੋਹੇ ਗੁਣ ਨਾਹੀ ਕੋਏ , ਦਰਸ਼ਨ ਹਰਿ ਤੂੰ ਬੰਧਪ ਭ੍ਰਾਤਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सति नारायण सति सिंगारी","c":"सति नारायण सति सिंगारी , सरसवती माँ आदि नमैं ।।\nश्री लक्ष्मी बलबावन भयो , आदि नारायण पूरन कीओ ।\nश्री लक्ष्मी नाम माया नाही , श्री लक्ष्मी नाम मात ज्वाला ।।\nश्री लक्ष्मी आसन जगदीश महि बैठेओ , लक्ष्मी जग की बाला।।\nओंकार निराधार निराकार सुआमी , हरि आपे अंतरयामी।\nधन गोबिंद ठाकुर तुम पूरण पुरख अबिनासी , सुणो बेनती जगजीवन दाता ।।\nहरि आपे तूं पिता माता मोहे गुण नाही कोये , दर्शन हरि तूं बंधप भ्राता ।।\n( यकीन )"},"en":{"t":"Sat Narayan Sat Sringari","c":"Sat Narayan Sat Sringari"}},

	{"id":1772222844665,
	"pb":{"t":"ਸਤਿਗੁਰ ਆਪਿ ਦਯਾਲ ਭਯੋ","c":"ਸਤਿਗੁਰ ਆਪਿ ਦਯਾਲ ਭਯੋ ਤਾਂ ਹਰਿ ਨਾਮੁ ਜਪੇਸਾ ।।\nਸਾਧੂ ਸੰਗਤਿ ਹਰਿ ਨਿਰਮਲ ਤਾਂ ਗੁਰੂ ਕਿਰਪਾ ਕਰੇਸਾ ।।\nਰਾਖਨਹਾਰ ਰਹੇਓ ਨਿਆਰਾ , ਵਸਹਿ ਦੂਰਿ ਪਰਦੇਸਾਂ ।।\nਕਰੋ ਦਯਾ ਨਾਮੁ ਦਾਨੁ , ਦਰਸ਼ਨ ਦਾਸ ਅਰਜ ਕਰੇਸਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर आप दयाल भयो","c":"सतिगुर आप दयाल भयो तां हरि नाम जपेसा ।।\nसाधू संगत हरि निरमल तां गुरू किरपा करेसा ।।\nराखनहार रहेओ निआरा , वसहि दूर परदेसां ।।\nकरो दया नाम दान , दर्शन दास अरज करेसा ।।\n( यकीन )"},"en":{"t":"Satguru Aap Dayaal Bhayo","c":"Satguru Aap Dayaal Bhayo"}},

	{"id":1772223173246,
	"pb":{"t":"ਸਤਿਗੁਰ ਸੇਵਾ ਸਿੱਖ ਕਮਾਵੈ","c":"ਸਤਿਗੁਰ ਸੇਵਾ ਸਿੱਖ ਕਮਾਵੈ , ਸਤਿਗੁਰ ਸ਼ਰਣਿ ਪਰਮ ਪਦੁ ਪਾਵੈ ।।\nਸਤਿਗੁਰ ਲੀਨ ਸਿੱਖ ਲਿਵ ਲਾਵੈ , ਸਤਿਗੁਰ ਸੋਭਾ ਸਿੱਖ ਜਨੁ ਪਾਵੈ ।।\nਸਤਿਗੁਰ ਸਿੱਖ ਕਾਰ ਨਿਆਰੀ , ਸਤਿਗੁਰ ਸ਼ਬਦ ਸਿੱਖ ਨਾਮੁ ਖੁਮਾਰੀ ।।\nਸਤਿਗੁਰ ਸਤਿ ਸਿੱਖ ਜੋ ਜਾਣੇ , ਸਤਿਗੁਰ ਸਿੱਖ ਸਦਾ ਅਨੰਦੁ ਮਾਣੇ ।।\nਸਤਿਗੁਰ ਸਿੱਖ ਸਗਲ ਸੰਸਾਰ , ਦਰਸ਼ਨ ਜਨ ਤਿਸ ਕੋ ਸਦਾ ਨਮਸਕਾਰ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर सेवा सिख कमावै","c":"सतिगुर सेवा सिख कमावै , सतिगुर शरण परम पद पावै ।।\nसतिगुर लीन सिख लिव लावे , सतिगुर सोभा सिख जन पावै ।।\nसतिगुर सिख कार निआरी , सतिगुर शब्द सिख नाम खुमारी ।।\nसतिगुर सति सिख जो जाणे , सतिगुर सिख सदा अनंद माणे ।।\nसतिगुर सिख सगल संसार , दर्शन जन तिस को सदा नमस्कार ।।\n( यकीन )"},"en":{"t":"Satguru Seva Sikh Kamave","c":"Satguru Seva Sikh Kamave"}},

	{"id":1772223388610,
	"pb":{"t":"ਸਤਿਗੁਰ ਸੇਵਾ ਮਿਲੇ ਵਡਭਾਗੀ","c":"ਸਤਿਗੁਰ ਸੇਵਾ ਮਿਲੇ ਵਡਭਾਗੀ , ਜਾਂ ਗੁਰਮੁਖਿ ਮਨੁ ਚਿਤੁ ਲਾਵੇ ।।\nਹਰਿ ਨਿਰੰਤਰਿ ਵਸੇ ਅਬਿਨਾਸੀ , ਕੋਈ ਵਿਰਲਾ ਕਾਰ ਕਮਾਵੇ ।।\nਹਰਿ ਦਾਸ ਜਪੇਓ ਅਨਹਦ ਬਾਣੀ , ਮਰਨ ਜਨਮ ਦੁੱਖ ਸਭ ਨਾਸੇ ।।\nਦਰਸ਼ਨ ਕਰੇ ਬੇਨੰਤੀ ਪ੍ਰਭ ਤੁਧੁ ਆਗੇ , ਨਾਮੁ ਦੀਜੋ ਮੁਕਤਿ ਕੇ ਦਾਤੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर सेवा मिले वडभागी","c":"सतिगुर सेवा मिले वडभागी , जां गुरमुख मन चित्त लावे ।।\nहरि निरंतर वसे अबिनासी , कोई विरला कार कमावे ।।\nहरि दास जपेओ अनहद बाणी , मरन जनम दुख सभ नासे ।।\nदर्शन करे बेनंती प्रभ तुध आगे , नाम दीजो मुक्त के दाते ।।\n( यकीन )"},"en":{"t":"Satguru Seva Mile Vadpagi","c":"Satguru Seva Mile Vadpagi"}},

	{"id":1772223679799,
	"pb":{"t":"ਸਤਿਗੁਰ ਸੋਭਾ ਜਗ ਸੇ ਨਿਆਰੀ","c":"ਸਤਿਗੁਰ ਸੋਭਾ ਜਗ ਸੇ ਨਿਆਰੀ , ਸਤਿਗੁਰ ਸੇਵਾ ਪ੍ਰਭ ਨਾਮੁ ਖੁਮਾਰੀ ।।\nਸਤਿਗੁਰ ਸਫਲ ਮੂਰਤਿ ਅਕਾਲ , ਸਤਿਗੁਰ ਖ਼ਾਲਸ ਅਟਲ ਰਾਜ ।।\nਸਤਿਗੁਰ ਸੁੰਨ ਸਮਾਧੀ ਓਂਕਾਰ , ਸਤਿਗੁਰ ਸੇਵਨ ਸੁਆਮੀ ਨਿਰਾਕਾਰ ।।\nਸਤਿਗੁਰ ਤ੍ਰਿਲੋਕੀ ਪੂਰਨ ਕਾਜ , ਸਤਿਗੁਰ ਜੋਤੀ ਆਦਿ ਨਿਰਾਧਾਰ ।।\nਸਤਿਗੁਰ ਉਪਦੇਸ਼ ਸ਼ਬਦੁ ਸਵਾਰੀ ,\nਦਰਸ਼ਨ ਸਤਿਗੁਰ ਚਰਣ ਆਤਮ ਪਿਆਰੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर सोभा जग से निआरी","c":"सतिगुर सोभा जग से निआरी , सतिगुर सेवा प्रभ नाम खुमारी ।।\nसतिगुर सफल मूरत अकाल , सतिगुर खालस अटल राज ।।\nसतिगुर सुन्न समाधी ओंकार , सतिगुर सेवन सुआमी निराकार ।।\nसतिगुर त्रिलोकी पूरन काज , सतिगुर जोती आदि निराधार ।।\nसतिगुर उपदेश शब्द सवारी ,\nदर्शन सतिगुर चरण आतम पिआरी ।।\n( यकीन )"},"en":{"t":"Satguru Shobha Sab Se Nyari","c":"Satguru Shobha Sab Se Nyari\nSatguru Sobha Sab Se Nyari"}},

	{"id":1772223920959,
	"pb":{"t":"ਸਤਿਗੁਰ ਕਰੇ ਸਤਿਗੁਰ ਕਰੋ","c":"ਸਤਿਗੁਰ ਕਰੇ ਸਤਿਗੁਰ ਕਰੋ ਸਤਿਗੁਰ ਕਰਨੇਹਾਰ ,\nਮਾਨਸ ਕੇ ਹਥਿ ਕਿਛੁ ਨਾਹੀ , ਜੋ ਕਰੇ ਸੋ ਕਰਤਾਰ ।।\nਜੀਵ ਜੰਤ ਭਯੋ ਪੁਨੀਤ , ਹਰਿ ਕੋ ਗਾਵੇ ਸਹਜ ਸਭ ਗੀਤ ।।\nਕਰਨੇ ਕੋ ਕਿਛੁ ਨਾਹੀ , ਆਪੇ ਆਪਿ ਕਰਨੇ ਜੋਗਾ ,\nਹਰਿ ਕੋ ਹਰਿ ਹੀ ਜਾਣੇ ਭਰਮ ਭਉ ਸਭ ਲੋਕਾਂ ।।\nਸੁਣੋ ਬੇਨੰਤੀ ਕਰੇ ਜਨੁ ਤੁਮਾਰਾ ,\nਬਿਨੁ ਸਤਿਗੁਰ ਕਲਿ ਮਹਿ ਕੌਣ ਪਾਰਿ ਉਤਾਰਾ ।।\nਦਰਸ਼ਨ ਦਾਸ ਹੋਆ ਦਾਸਨ ਕੋ ਦਾਸ , ਹਰਿ ਪੂਰੀ ਕੀਜੈ ਮਨ ਕੀ ਆਸਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर करे सतिगुर करो","c":"सतिगुर करे सतिगुर करो सतिगुर करनेहार ,\nमानस के हथ किछ नाही , जो करे सो करतार ।।\nजीव जंत भयो पुनीत , हरि को गावे सहज सभ गीत ।।\nकरने को किछ नाही , आपे आप करने जोगा ,\nहरि को हरि ही जाणे भरम भौ सभ लोकां ।।\nसुणो बेनंती करे जन तुमारा ,\nबिना सतिगुर कलि महि कौन पार उतारा ।।\nदर्शन दास होआ दासन को दास , हरि पूरी कीजै मन की आसा ।।\n( यकीन )"},"en":{"t":"Satguru Kare Satguru Karo","c":"Satguru Kare Satguru Karo"}},

	{"id":1772224211782,
	"pb":{"t":"ਸਤਿਗੁਰ ਗੁਰੂ ਗਿਆਨੁ ਦੀਆ","c":"ਸਤਿਗੁਰ ਗੁਰੂ ਗਿਆਨੁ ਦੀਆ , ਗੁਰੂ ਹੁਕਮੁ ਮੰਨਿ ਮੇਰੇ ਜੀਆ ।।\nਹੁਕਮੇ ਅੰਦਰਿ ਸੂਰਜ ਚੰਦ ਪਵਨ ਸਭ ਤਾਰੇ ,\nਨਦਰਿ ਕਰੇ ਜੇ ਮੇਰੇ ਰਾਮ ਪਿਆਰੇ ।।\nਕਰਾ ਅਰਜੋਈ ਮੇਰੇ ਸਤਿਗੁਰ ਦਰਸੁ ਦਿਓ ਖਸਮ ਹਮਾਰੇ ,\nਨਾਨਕ ਕਹੇ ਬਿਨੁ ਹੁਕਮ ਨਾ ਤਰਸੈਂ ਹੁਕਮੁ ਮੰਨਿ ਪਿਆਰੇ ।।\nਸੇਵਾ ਸੰਤਨ ਕੀ ਭਲੀ ਸੰਤ ਸੇਵ ਕਮਾਵੇ ,\nਸੇਵਾ ਜਗਤ ਨਾ ਸੰਗਿ ਜਾਸੀ ਨਾਮੁ ਚਿਤੁ ਲਾਏ ।।\nਨਾਮੁ ਸੋ ਜਨੁ ਸਿਮਰੇ ਦਰਸ਼ਨ ਜਿਨ੍ਹੇ ਗੁਰੂ ਜਨਾਏ ,\nਦੁਨੀਆਂ ਦੇ ਵਾਲੀ ਰਾਮ ਦੀਆ ਸੁਗਰੀਵੇ ਰਾਜ ,\nਦੈਤ ਦੁਸ਼ਟ ਮਾਰੇ ਬਾਲੀ ਮਾਰਿ ਦਿਖਾਏ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर गुरू गिआन दीआ","c":"सतिगुर गुरू गिआन दीआ , गुरू हुकम मन्न मेरे जीआ ।।\nहकमे अंदर सूरज चंद पवन सभ तारे ,\nनदर करे जे मेरे राम पिआरे ।।\nकरा अरजोई मेरे सतिगुर दरस देओ खसम हमारे ,\nनानक कहे बिन हुकम ना तरसैं हुकम मन्न पिआरे ।।\nसेवा संतन की भली संत सेव कमावे ,\nसेवा जगत ना संग जासी नाम चित्त लाये ।।\nनाम सो जन सिमरे दर्शन जिनहे गुरू जनाये ,\nदुनिया दे वाली राम दीआ सुगरीवे राज ,\nदैत दुष्ट मारे बाली मार दिखाये ।।\n( यकीन )"},"en":{"t":"Satguru Guru Gyan Diya","c":"Satguru Guru Gyan Diya"}},

	{"id":1772224431496,
	"pb":{"t":"ਸਾਧ ਸੰਗਿ ਜਿਸੁ ਹਰਿ ਹਰਿ ਧਿਆਯਾ ( ਸ਼ਲੋਕ )","c":"ਸਾਧ ਸੰਗਿ ਜਿਸੁ ਹਰਿ ਹਰਿ ਧਿਆਯਾ ।।\nਦਰਸ਼ਨ ਅਗੰਮ ਰੂਪੁ ਜਗ ਮਾਹਿ ਸਮਾਯਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"साध संग जिस हरि हरि धिआया ( श्लोक )","c":"( श्लोक )\nसाध संग जिस हरि हरि धिआया ।।\nदर्शन अगम रूप जग माहि समाया ।।\n( यकीन )"},"en":{"t":"Sadh Sang Jis Har Har Dhyaya ( Shlok )","c":"Sadh Sang Jis Har Har Dhyaya ( Shlok )"}},

	{"id":1772224654903,
	"pb":{"t":"ਸਤਿਗੁਰ ਪੂਰਨ ਪੁਰਖ ਹਮਾਰੇ","c":"ਸਤਿਗੁਰ ਪੂਰਨ ਪੁਰਖ ਹਮਾਰੇ ,\nਮੋਹੇ ਨਾਮੁ ਦੀਜੈ ਠਾਕੁਰ ਦਾਤਾਰੇ ।।\nਹਰਿ ਨਾਮੈ ਮਨਿ ਉਪਜੀ ਪ੍ਰੀਤਿ , ਮੈਂ ਨਾ ਜਾਨੋ ਤੇਰੀ ਪ੍ਰਤੀਤਿ ।।\nਤੁਮਰੇ ਹਮਰੇ ਏਕੋ ਸਾਂਝ , ਕਿਰਪਾ ਕਰੋ ਸਿਮਰਾ ਨਾਮੁ ।।\nਦੀਨ ਦਯਾਲ ਦੁੱਖ ਕਾਟੋ ਹਮਾਰੇ ,\nਦਰਸ਼ਨ ਨੀਚ ਆਯਾ ਦੁਆਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर पूरन पुरख हमारे","c":"सतिगुर पूरन पुरख हमारे ,\nमोहे नाम दीजै ठाकुर दातारे ।।\nहरि नामै मन उपजी प्रीत , मैं ना जानो तेरी प्रतीत ।।\nतुमरे हमरे एको सांझ , किरपा करो सिमरा नाम ।।\nदीन दयाल दुख काटो हमारे ,\nदर्शन नीच आया दुआरे ।।\n( यकीन )"},"en":{"t":"Satguru Puran Purakh Hamare","c":"Satguru Puran Purakh Hamare\nSatguru Pooran Purakh Hamare"}},

	{"id":1772224876075,
	"pb":{"t":"ਸਤਿਗੁਰ ਮੇਰੇ ਪ੍ਰਾਣ ਅਧਾਰੇ","c":"ਸਤਿਗੁਰ ਮੇਰੇ ਪ੍ਰਾਣ ਅਧਾਰੇ ਤੁਧੁ ਪੈ ਹਉ ਜਾਉਂ ਬਲਿਹਾਰੇ ।।\nਕਿਰਪਾ ਨਿਧਾਨ ਕਿਰਪਾਲ ਪ੍ਰਭ ਠਾਕੁਰ , ਅਵਗੁਣ ਨਾ ਚਿਤਾਰੋ ਹਮਾਰੇ ।।\nਗੁਣ ਗਿਆਨ ਗੁਰ ਸ਼ਬਦੁ ਦੀਜੋ , ਹਮ ਮਾਂਗਤੇ ਭੀਖ ਪ੍ਰਭ ਭਿਖਾਰੀ ਤੁਮਾਰੇ ।।\nਆਵਣ ਜਾਵਣ ਜਗਦੀਸ਼ ਸੁਆਮੀ , ਕਾਟੋ ਫੰਧਾ ਆਪਨੀ ਕਿਰਪਾ ਧਾਰੇ ।।\nਦਰਸ਼ਨ ਜਨੁ ਜਪਿ ਜਪਿ ਜੀਵੇ , ਗੁਰ ਸ਼ਬਦ ਪ੍ਰਭ ਤੁਧੁ ਸਹਾਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर मेरे प्राण अधारे","c":"सतिगुर मेरे प्राण अधारे तुध पे हउ जाऊँ बलिहारे ।।\nकिरपा निधान किरपाल प्रभ ठाकुर , अवगुण ना चितारो हमारे ।।\nगुण गिआन गुर शब्द दीजो , हम मांगते भीख प्रभ भिखारी तुमारे ।।\nआवण जावण जगदीश सुआमी , काटो फंधा आपनी किरपा धारे ।।\nदर्शन जन जप जप जीवे , गुर शब्द प्रभ तुध सहारे ।।\n( यकीन )"},"en":{"t":"Satguru Mere Praan Adhaare","c":"Satguru Mere Praan Adhaare\nSatguru Mere Praan Adhare"}},

	{"id":1772225094281,
	"pb":{"t":"ਸਾਧ ਸੰਗਿ ਹਰਿ ਉੱਤਮ ਸੰਗੁ","c":"ਸਾਧ ਸੰਗਿ ਹਰਿ ਉੱਤਮ ਸੰਗੁ , ਵਡਭਾਗੀ ਵਿਰਲਾ ਕੋ ਪਾਵੇ ।।\nਸਿਮਰਤ ਸਿਮਰਤ ਝੂਠੀ ਮਾਯਾ , ਮਨੁ ਮੈਲੁ ਨਾ ਜਾਏ ।।\nਆਪਣੇ ਆਪਣੇ ਸੁਖ ਭਾਲਤੇ , ਸਾਕ ਸੰਗਿ ਸਭ ਮੀਤ ।।\nਨਾਮੁ ਬਿਸਾਰੇ ਦੁੱਖ ਪਾਂਵਦੇ , ਸ਼ਾਂਤਿ ਨਾ ਆਵੇ ਚੀਤ ।।\nਡਿੱਠੇ ਸਭਹਿ ਆਸਰੇ ਜੀਓ , ਅੰਤਿ ਸਭਹਿ ਛੱਡਿ ਜਾਣ ।।\nਸੰਤ ਸੰਗੁ ਨਾ ਛੁੱਟੇਓ ਬੇਦ ਕਤੇਬ ਫਰਮਾਨ ।।\nਰਾਣਾ ਰਹੇਓ ਨਾ ਰੰਕ ਖ਼ਾਕੋ ਖ਼ਾਕ ਮਿਲਿ ਜਾਣ ।।\nਦਰਸ਼ਨ ਦਾਸ ਕਰੇ ਬੇਨੰਤੀ , ਮੇਰੀ ਆਸ ਪੂਰੀ ਕੀਜੈ ਸ਼ਾਹ ਸੁਲਤਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"साध संग हरि उत्तम संग","c":"साध संग हरि उत्तम संग , वडभागी विरला को पावे ।।\nसिमरत सिमरत झूठी माया , मन मैल ना जाये ।।\nआपने आपने सुख भालते , साक संग सभ मीत ।।\nनाम बिसारे दुख पांवदे , शांत ना आवे चीत ।।\nडिडे सभहि आसरे जीओ , अंत सभहि छड जाण ।।\nसंत संग ना छूटेओ बेद कतेब फरमान ।।\nराणा रहेओ ना रंक खाको खाक मिल जाण ।।\nदर्शन दास करे बेनंती , मेरी आस पूरी कीजे शाह सुलतान ।।\n( यकीन )"},"en":{"t":"Sadh Sang Hari Uttam Sang","c":"Sadh Sang Hari Uttam Sang"}},

	{"id":1772225388808,
	"pb":{"t":"ਸਤਿ ਸੰਗਤਿ ਗੁਰੂ ਕੀ ਹਰਿ ਪਿਆਰੀ ( ਦੋਹਾ )","c":"( ਦੋਹਾ )\nਸਤਿ ਸੰਗਤਿ ਗੁਰੂ ਕੀ ਹਰਿ ਪਿਆਰੀ ,\nਜਿਨ ਹਰਿ ਹਰਿ ਨਾਮੁ ਮਨਿ ਭਾਯਾ ।।\nਜਿਨ ਸਤਿਗੁਰੂ ਸਤਿ ਸੰਗੁ ਨਾ ਪਾਯਾ ,\nਸੋ ਭਾਗਹੀਨ ਪਾਪੀ ਜਨੁ ਆਯਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सति संगत गुरू की हरि पिआरी ( दोहा )","c":"( दोहा )\nसति संगत गुरू की हरि पिआरी ,\nजिन हरि हरि नाम मन भाया ,\nजिन सतिगुरू सतिसंग ना पाया ,\nसो भागहीन पापी जन आया ।।\n( यकीन )"},"en":{"t":"Sat Sangat Guru Ki Hari Pyari ( Doha )","c":"Sat Sangat Guru Ki Hari Pyari ( Doha )\nSadh Sangat Guru Ki Hari Pyari ( Doha )"}},

	{"id":1772225720584,
	"pb":{"t":"ਸਤਿਗੁਰ ਪ੍ਰਭ ਭੇਦ ਸਿਮਰਨ ਨਾਮ ਪਰੂਫ","c":"ਸਤਿਗੁਰ ਪ੍ਰਭ ਭੇਦ ਸਿਮਰਨ ਨਾਮ ਪਰੂਫ ।।\nਸਤਿਗੁਰ ਸਾਰ ਸ਼ਬਦ ਸ਼ਰਣਿ ਮਖ਼ਲੂਕ ,\nਸਤਿਗੁਰ ਪ੍ਰਭ ਅਬਿਨਾਸ਼ੀ ਨਿਰਵਾਣ ਸਰੂਪ ।।\nਸਤਿਗੁਰ ਭਗਤੀ ਭਗਤ ਸੰਗਿ ਅਟੂਟ ,\nਸਤਿਗੁਰ ਆਪਿ ਕਰਨੇਹਾਰ , ਦਰਸ਼ਨ ਭਵਜਲ ਪਾਰਿ ਉਤਾਰ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर प्रभ भेद सिमरन नाम परूफ","c":"सतिगुर प्रभ भेद सिमरन नाम परूफ ।।\nसतिगुर सार शब्द शरण मखलूक ,\nसतिगुर प्रभ अबिनासी निरवान सरूप ।।\nसतिगुर भगती भगत संग अटूट ,\nसतिगुर आप करनेहार , दर्शन भवजल पार उतार ।।\n( यकीन )"},"en":{"t":"Satguru Prabh Bhed Simran Naam Paroof","c":"Satguru Prabh Bhed Simran Naam Paroof\nSatguru Prabh Bhed Simran Naam Proof"}},

	{"id":1772226285149,
	"pb":{"t":"ਸਤਿਗੁਰ ਪੂਰਨ ਪੁਰਖ ਸੁਜਾਨ","c":"ਸਤਿਗੁਰ ਪੂਰਨ ਪੁਰਖ ਸੁਜਾਨ , ਸਤਿਗੁਰ ਏਕੋ ਵੈਰੀ ਮੀਤ ਸਮਾਨ ।।\nਸਤਿਗੁਰ ਸੁਭਾਗੇ ਜੀਵ ਜੰਤ ਧਿਆਨ ,\nਸਤਿਗੁਰ ਆਦਿ ਜੁਗਾਦਿ ਮੇਹਰਬਾਨ ।।\nਸਤਿਗੁਰ ਪੰਚ ਸ਼ਬਦ ਫੁਰਮਾਨ , ਸਤਿਗੁਰ ਸੁਰਤਿ ਧਨ ਰਹਿਮਾਨ ।।\nਸਤਿਗੁਰ ਲੀਨ ਸੱਚ ਲਿਵਲਾਨ , ਸਤਿਗੁਰ ਸ਼ਾਹ ਸ਼ਾਹੀ ਸੁਲਤਾਨ ।।\nਸਤਿਗੁਰ ਦਯਾ ਦਯਾਵੰਦ ਮੇਹਰਬਾਨ ,\nਦਰਸ਼ਨ ਜਨ ਸਤਿਗੁਰ ਪਹਿ ਕੁਰਬਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुर पूरन पुरख सुजान","c":"सतिगुर पूरन पुरख सुजान , सतिगुर एको वैरी मीत समान ।।\nसतिगुर सुभागे जीव जंत धिआन ,\nसतिगुर आदि जुगादि मेहरबान ।।\nसतिगुर पंच शब्द फुरमान , सतिगुर सुरत धन रहमान ।।\nसतिगुर लीन सच्च लिवलान , सतिगुर शाह शाही सुलतान ।।\nसतिगुर दया दयावंद मेहरबान ,\nदर्शन जन सतिगुर पहि कुरबान ।।\n( यकीन )"},"en":{"t":"Satguru Pooran Purakh Sujaan","c":"Satguru Pooran Purakh Sujaan\nSatguru Puran Purakh Sujaan"}},

	{"id":1772226540749,
	"pb":{"t":"ਸਤਿਗੁਰੂ ਜੀਓ ਮੇਰੇ ਪੂਰੇ ਹਰਿ ਰਾਇ","c":"ਸਤਿਗੁਰੂ ਜੀਓ ਮੇਰੇ ਪੂਰੇ ਹਰਿ ਰਾਇ ।।\nਜਿਸੁ ਮੋਹੇ ਨਾਮੁ ਦੇਹੋ ਧਨੁ , ਅਪਣੀ ਮੇਹਰ ਦਰਸਾਏ ।।\nਤਿਸੁ ਸਤਿਗੁਰੂ ਕਉ ਬਲਿਹਾਰੀ ਮੇਰੇ ਰਾਮਾ ,\nਜਿਸੁ ਕਿਰਪਾ ਕੀਨੀ ਸਭਹਿ ਦੁੱਖ ਨਸਿ ਜਾਏ ਮੇਰੇ ਰਾਮਾ ।।\nਸਤਿਗੁਰੂ ਮੇਰੇ ਅਗਮ ਅਗੋਚਰ ਠਾਕੁਰ ,\nਜਿਸੁ ਡਿਠੇਆਂ ਮੋਹ ਮਾਯਾ ਛੂਟਿ ਜਾਏ ।।\nਦਰਸ਼ਨ ਦਾਸ ਪ੍ਰਭੁ ਪੂਰਾ ਭੇਟਿਓ , ਪ੍ਰਭ ਕੇ ਗੁਣ ਹਿਰਦੇ ਵਸਾਏ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सतिगुरू जीओ मेरे पूरे हरि राय","c":"सतिगुरू जीओ मेरे पूरे हरि राय ।।\nजिस मोहे नाम देहो धन , अपनी मेहर दरसाये ।।\nतिस सतिगुरू कओ बलिहारी मेरे रामा ,\nजिस किरपा कीनी सभहि दुख नस जाये मेरे रामा ।।\nसतिगुरू मेरे अगम अगोचर ठाकुर ,\nजिस डिटेआं मोह माया छूट जाये ।।\nदर्शन दास प्रभ पूरा भेटेओ , प्रभ के गुण हिरदे वसाये ।।\n( यकीन )"},"en":{"t":"Satguru Jiyo Mere Pure Hari Raye","c":"Satguru Jiyo Mere Pure Hari Raye\nSatguru Jiyo Mere Poore Hari Raye"}},

	{"id":1772227085220,
	"pb":{"t":"ਸਭ ਕਿਛੁ ਮਿਲਾ ਤੁਮ੍ਹੇਂ ਦਾਨ ਮੇਂ ( ਸ਼ਲੋਕ )","c":"( ਸ਼ਲੋਕ )\nਸਭ ਕਿਛੁ ਮਿਲਾ ਤੁਮ੍ਹੇਂ ਦਾਨ ਮੇਂ , ਕਿਆ ਹੈ ਤੇਰਾ ਪਛਾਣ ਰੇ ।।\nਪੂਜਾ ਪਾਠ ਕਰਮ ਹੈ ਤੇਰਾ , ਫਿਰ ਕਾਹੇ ਕਾ ਗੁਮਾਨ ਰੇ ।।\nਕਿਸ ਬਾਤ ਪੇ ਤੂੰ ਮਾਣ ਕਰੇਂ , ਪਹਿਲੇ ਖੁਦ ਕੋ ਖੁਦੀ ਸੇ ਨਿਕਾਲ ਰੇ ।।\nਖਾਨਾ ਪੀਨਾ ਸਭ ਈਸ਼ਵਰ ਦੀਆ , ਇਹ ਸਵਾਸ ਉਧਾਰੇ ਹੈਂ ਜਾਨ ਰੇ ।।\nਸਾਂਸੋਂ ਕੀ ਡੋਰੀ ਪ੍ਰਭ ਕੇ ਹਾਥ , ਨਾ ਕਿਛੁ ਤੇਰੇ ਪਾਸ ਰੇ ।।\nਤੂੰ ਹੈ ਖਿਲੌਨਾ ਤੁਝੇ ਹਰੀ ਨੇ ਬਨਾਯਾ , ਤੂੰ ਹਰੀ ਕਾ ਕਰਲੇ ਧਿਆਨ ਰੇ ।।\nਤੁਝ ਪੇ ਕਿਉਂ ਮੇਹਰਬਾਨ ਹੈ ਦਾਤਾ , ਇਸ ਬਾਤ ਕੋ ਤੂੰ ਬਿਚਾਰ ਰੇ ।।\nਸਭ ਕਾ ਸਿਰਜਨਹਾਰ ਸੁਆਮੀ , ਵੋਹ ਹੈ ਬੜਾ ਦਯਾਵਾਨ ਰੇ ।।\nਸਭ ਕੋ ਦੇਤਾ ਵੋਹ ਦੇਵਨਹਾਰਾ , ਫਿਰ ਕਾਹੇ ਤੂੰ ਬਨੇ ਨਾਦਾਨ ਰੇ ।।\nਦਰਸ਼ਨ ਕਹੇ ਸੁਣ ਮਨ ਚੰਚਲ , ਇਸ ' ਮੈਂ ' ਕੋ ਤੂੰ ਤਿਆਗ ਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सभ किछ मिला तुमहें दान में ( श्लोक )","c":"( श्लोक )\nसभ किछ मिला तुमहें दान में , किआ है तेरा पहचान रे ।।\nपूजा पाठ करम है तेरा , फिर काहे का गुमान रे ।।\nकिस बात पे तूं माण करें , पहले खुद को खुदी से निकाल रे ।।\nखाना पीना सभ ईश्वर दीआ , यह सवास उधारे हैं जान रे ।।\nसांसों की डोरी प्रभ के हाथ , ना किछ तेरे पास रे ।।\nतूं है खिलौना तुझे हरी ने बनाया , तूं हरी का करले धिआन रे ।।\nतुझ पे किओं मेहरबान है दाता , इस बात को तूं बिचार रे ।।\nसभ का सिरजनहार सवामी , वो है बड़ा दयावान रे ।।\nसभ को देता वो देवनहारा , फिर काहे तूं बने नादान रे ।।\nदर्शन कहे सुन मन चंचल , इस मैं को तूं तिआग रे ।।\n( यकीन )"},"en":{"t":"Sab Kichh Mila Tumhe Daan Mein ( Shlok )","c":"Sab Kichh Mila Tumhe Daan Mein ( Shlok )\nSab Kichch Mila Tumhe Daan Mein ( Shlok )"}},

	{"id":1772227394649,
"pb":{"t":"ਹਉ ਕਲਿ ਮਾਹਿ ਨਾਮ ਬਿਨਾ ( ਦੋਹਾ )","c":"( ਦੋਹਾ )\nਹਉ ਕਲਿ ਮਾਹਿ ਨਾਮ ਬਿਨਾ ਨਾਹੀ ਪਾਰਿ ਉਤਾਰਾ ।।\nਹਰਿ ਭਗਤਨ ਨਿਰਭਉ ਨਾਹੀ ਮੋਹ ਨਿਰਵੈਰ ।।\nਨਾਮੁ ਵਸਾਵੇ ਹਿਰਦੇ ਅੰਦਰਿ ਦਰਸ਼ਨ ਨਾ ਜਮਦੂਤ ਸਤਾਵੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"हउ कलि माहि नाम बिना ( दोहा )","c":"( दोहा )\nहउ कलि माहि नाम बिना नाही पार उतारा ।।\nहरि भगतन निरभौ नाही मोह निरवैर ।।\nनाम वसावे हिरदे अंदर दर्शन ना जमदूत सतावे ।।\n( यकीन )"},"en":{"t":"Hau Kal Maahi Naam Bina ( Doha )","c":"Hau Kal Maahi Naam Bina ( Doha )\nHau Kal Mahi Naam Bina ( Doha )"}},

	{"id":1772227596830,
	"pb":{"t":"ਸਭ ਥਾਂ ਸੋਹਣੇ ਮਨਮੋਹਨ ਪਿਆਰੇ","c":"ਸਭ ਥਾਂ ਸੋਹਣੇ ਮਨਮੋਹਨ ਪਿਆਰੇ ।।\nਤੇਰਾ ਰੂਪੁ ਸੁੰਦਰ ਸੋਹਣਾ , ਜੋ ਵਰ ਮਾਂਗੇ ਸੋ ਫਲੁ ਪਾਵੇ ।।\nਆਪਿ ਸਹਾਈ ਹੋਵੇ ਠਾਕੁਰ ਤੇਰੇ ਜਨਮ ਜਨਮ ਗੁਣ ਗਾਵੇ ।।\nਤੇਰੀ ਸੰਗਤਿ ਉੱਤਮ ਸ਼ਰਣਾਗਤਿ , ਸਾਸਿ ਸਾਸਿ ਨਾਮੁ ਧਿਆਵੇ ।।\nਮੇਰੇ ਸੁਆਮੀ ਰਾਖੋ ਸਿਰ ਹਥੁ ,\nਦਰਸ਼ਨ ਜਨੁ ਸਤਿਗੁਰ ਚਰਣੀ ਲਿਵ ਲਾਵੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सभ था सोहणे मनमोहन पिआरे","c":"सभ था सोहणे मनमोहन पिआरे ।।\nतेरा रूप सुंदर सोहणा , जो वर मांगे सो फल पावे ।।\nआप सहाई होवे ठाकुर तेरे जनम जनम गुण गावे ।।\nतेरी संगत उत्तम शरणागत , सास सास नाम धिआवे ।।\nमेरे सुआमी राखो सिर हथ ,\nदर्शन जन सतिगुर चरणी लिव लावे ।।\n( यकीन )"},"en":{"t":"Sabh Tha Sohne Manmohan Pyare","c":"Sabh Tha Sohne Manmohan Pyare"}},

	{"id":1772228138708,
	"pb":{"t":"ਸਵਾਸ ਸਵਾਸ ਪ੍ਰਭ ਨਾਵੈਂ","c":"ਸਵਾਸ ਸਵਾਸ ਪ੍ਰਭ ਨਾਵੈਂ ਲਾਈਐ , ਅੰਤਿ ਕਾਲਿ ਫਿਰਿ ਨਾ ਪਛਤਾਈਏ ।।\nਏਹ ਜੀਵਨੁ ਅਨਮੋਲੁ ਹੈ ਭਾਈ , ਅੰਤਰਿ ਝਾਤਿ ਮਿਲੇਗੀ ਖੁਦਾਈ ,\nਹਰਿ ਏ ਸੱਚੁ ਸੱਚੁ ਮਨਿ ਚ ਵਸਾਈਏ ।।\nਸੋਹਣੇ ਮਹਲ ਮੁਨਾਰੇ ਨਾ ਰਹਣੇ , ਸੰਗੀ ਸਾਥੀ ਸਭ ਛੱਡਿ ਜਾਣੇ ,\nਧਨੁ ਦੌਲਤ ਸਭ ਵਸਤੁ ਪਰਾਈਏ ।।\nਲੇਖਾ ਜੋਖਾ ਪਵੇਗਾ ਦੇਣਾ , ਕਿਉ ਸੋਵਤ ਗਵਾਏ ਰੈਣਾ ,\nਨਾਮੁ ਧਿਆ ਕੇ ਕਰਮ ਕਮਾਈਏ ।।\nਆਤਮ ਰੋ ਰੋ ਕਰੇ ਪੁਕਾਰ , ਕਿ ਭੁੱਲ ਗਏਓਂ ਤੂੰ ਦਾਤਾਰ ,\nਦਰਸ਼ਨ ਗੁਰ ਕੋਈ ਨਾ ਸਹਾਈਏ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सवास सवास प्रभ नावैं","c":"सवास सवास प्रभ नावैं लाइये , अंत काल फिर ना पछताइये ।।\nएह जीवन अनमोल है भाई , अंतर झात मिलेगी खुदाई ,\nहरि ए सच्च सच्च मन च वसाइये ।।\nसोहणे महल मुनारे ना रहणे , संगी साथी सभ छड जाणे ,\nधन दौलत सभ वसतु पराइये ।।\nलेखा जोखा पवेगा देणा , किओ सोवत गवाये रैणा ,\nनाम धिआ के करम कमाइये ।।\nआतम रो रो करे पुकार , कि भुल गेओं तूं दातार ,\nदर्शन गुर कोई ना सहाइये ।।\n( यकीन )"},"en":{"t":"Svas Svas Prabh Nave","c":"Svas Svas Prabh Nave"}},

	{"id":1772228389332,
	"pb":{"t":"ਸਿੱਖ ਸੋ ਜੋ ਖ਼ਿਮਾ ਵਿਚਾਰੇ","c":"ਸਿੱਖ ਸੋ ਜੋ ਖ਼ਿਮਾ ਵਿਚਾਰੇ , ਸਿੱਖ ਸੋ ਜੋ ਪਰਾਯਾ ਹੱਕੁ ਨਾ ਮਾਰੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਖੋਹ ਕੇ ਨਾ ਖਾਵੇ , ਸਿੱਖ ਸੋ ਜੋ ਹੱਕੁ ਹਲਾਲੁ ਵਰਤਾਵੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਲੋਭੁ ਨਾ ਭਾਵੇ , ਸਿੱਖ ਸੋ ਜੋ ਵੰਡਿ ਛਕਾਵੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਸ਼ਬਦੁ ਮਨਿ ਆਵੇ , ਸਿੱਖ ਸੋ ਜੋ ਸਤਿਸੰਗਤਿ ਕਮਾਵੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਸਤਿਗੁਰ ਸ਼ਰਨਿ ਲਿਵ ਲਾਵੈ ,\nਸਿੱਖ ਸੋ ਜੋ ਆਪਿ ਜਪੇ ਅਵਰ ਜਪਾਵੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਸਹਿਜ ਧਾਰੇ , ਸਿੱਖ ਸੋ ਜੋ ਦੁਸ਼ਟ ਮਨੁ ਮਾਰੇ ।।\nਸਿੱਖ ਸੋ ਜੋ ਧਰਮੁ ਧਾਰੇ , ਕਹਿ ਦਰਸ਼ਨ ਸੀਸ ਦੇਹਿ ਸਿਦਕੁ ਨਾ ਹਾਰੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सिख सो जो खिमा विचारे","c":"सिख सो जो खिमा विचारे , सिख सो जो पराया हक्क ना मारे ।।\nसिख सो जो खोह के ना खावे , सिख सो जो हक्क हलाल वरतावे ।।\nसिख सो जो लोभ ना भावे , सिख सो जो वंड छकावे ।।\nसिख सो जो शब्द मन आवे , सिख सो जो सतिसंगत कमावे ।।\nसिख सो जो सतिगुर शरन लिव लावे ,\nसिख सो जो आप जपे अवर जपावे ।।\nसिख सो जो सहज धारे , सिख सो जो दुष्ट मन मारे ।।\nसिख सो जो धरम धारे , कह दर्शन सीस देह सिदक ना हारे ।।\n( यकीन )"},"en":{"t":"Sikh So Jo Khima Vichare","c":"Sikh So Jo Khima Vichare"}},

	{"id":1772229136350,
	"pb":{"t":"ਸੁਣਿ ਬੇਨੰਤੀ ਮੇਰੀ ਪ੍ਰਭ ਕਿਰਪਾਲ","c":"ਸੁਣਿ ਬੇਨੰਤੀ ਮੇਰੀ ਪ੍ਰਭ ਕਿਰਪਾਲ , ਗੁਰ ਕਿਰਪਾ ਠਾਕੁਰ ਭਯੋ ਦਯਾਲ ।।\nਤੂੰ ਹੀ ਤੂੰ ਹਰਿ ਥਾਨ ਸਜਾਏ , ਤੂੰ ਹੀ ਤੂੰ ਹਰਿ ਮਾਹਿ ਸਮਾਏ ।।\nਤੁਧੁ ਬਿਨਾ ਫੀਕੇ ਸਭ ਮਾਹਿ , ਤੁਧੁ ਬਿਨਾ ਕੈਸੇ ਜੀਵਾਂ ਮੈਂ ਹਰਿ ਰਾਇ ।।\nਮੈਂ ਮੈਂ ਕਰਤਾ ਜਗੁ ਬੰਧਾ ਜੀਓ , ਦਰਸ਼ਨ ਬਿਨਾ ਤੇਰੇ ਕੈਸੇ ਜੀਵਾਂ ਜੀਓ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सुण बेनती मेरी प्रभ किरपाल","c":"सुण बेनती मेरी प्रभ किरपाल , गुर किरपा ठाकुर भयो दयाल ।।\nतूं ही तूं हर थान सजाये , तूं ही तूं हर माहि समाये ।।\nतुध बिना फीके सभ माहि , तुध बिना कैसे जीवां मैं हरि राय ।।\nमैं मैं करता जग बंधा जीओ , दर्शन बिना तेरे कैसे जीवां जीओ ।।\n( यकीन )"},"en":{"t":"Sun Beinti Meri Prabh Kirpaal","c":"Sun Beinti Meri Prabh Kirpaal\nSun Benanti Meri Prabh Kirpaal"}},

	{"id":1772229550889,
	"pb":{"t":"ਸੁਣੋ ਬੇਨੰਤੀ ਮੋਹੇ ਨਾਮੁ ਦੀਜੇ","c":"ਸੁਣੋ ਬੇਨੰਤੀ ਮੋਹੇ ਨਾਮੁ ਦੀਜੇ , ਮੋਹੇ ਮਨਿ ਕੀਜੋ ਪ੍ਰਭ ਵਾਸੁ ।।\nਸੰਤ ਜਨ ਹਰਿ ਤੇਰੋ ਮੀਤ , ਸੰਤਨ ਕੀ ਪੈਜ ਰਾਖੋ ਪ੍ਰਭ ਆਪਿ ।।\nਗੁਰੂ ਸੰਗਿ ਹੋਰੁ ਨਾਹੀ ਕੋਏ , ਸਤਿਗੁਰੂ ਸੰਗਿ ਸੇਵਾ ਸਫਲ ਹੋਏ ।।\nਲਖਮੀ ਕੀ ਨਾ ਆਵੇ ਥੋੜ , ਕੀਜੇ ਦਯਾ ਦਰਸ਼ਨ ਕਹੇ ਹਥ ਜੋੜ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सुणो बेनती मोहे नाम दीजे","c":"सुणो बेनती मोहे नाम दीजे , मोहे मन कीजो प्रभ वास ।।\nसंत जन हरि तेरो मीत , संतन की पैज राखो प्रभ आप ।।\nगुरू संग होर नाही कोये , सतिगुरू संग सेवा सफल होये ।।\nलखमी की ना आवे थोड़ , कीजे दया दर्शन कहे हथ जोड़ ।।\n( यकीन )"},"en":{"t":"Suno Benanti Mohe Naam Dije","c":"Suno Benanti Mohe Naam Dije\nSuno Beinti Mohe Naam Dije"}},

	{"id":1772229756835,
	"pb":{"t":"ਸੁਖਦਾਈ ਪ੍ਰਭ ਅਬ ਤਬ ਸਭ ਜਾਣੇ","c":"ਸੁਖਦਾਈ ਪ੍ਰਭ ਅਬ ਤਬ ਸਭ ਜਾਣੇ ,\nਜਦ ਮਨੁ ਹਰਿ ਰਾਇ ਮਨੁ ਹਰਿ ਰੰਗੁ ਮਾਣਿ , ਮੁਖ ਤੋ ਏਹ ਸਮਝਾਈ ।।\nਸਭ ਕਿਛੁ ਤੁਝ ਕੋ ਸੌਂਪਿਆ ਹਉ ਕਿਛੁ ਸੰਗਿ ਨਾ ਜਾਈ ।।\nਭਯੋ ਪ੍ਰਿਤਪਾਲ ਸਤਿਗੁਰ ਦਯਾਲਾ ,\nਏਹ ਸਭ ਮਨਿ ਜਾਈ ,\nਤੂੰ ਸਭਨੀ ਥਾਈਂ ਦਰਸ਼ਨ ਹਉ ਜਿੱਥੇ ਜਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सुखदाई प्रभ अब तब सभ जाणे","c":"सुखदाई प्रभ अब तब सभ जाणे ,\nजद मन हरि राय मन हर रंग माण , मुख तो एह समझाई ।।\nसभ किछ तुझ को सौंपेआ हऊ कुछ संग ना जाई ।।\nभयो प्रितपाल सतिगुर दयाला ,\nएह सभ मन जाई ,\nतूं सभनी थाई दर्शन हॐ जित्थे जाई ।।\n( यकीन )"},"en":{"t":"Sukhdai Prabh Ab Tb Sabh Jane","c":"Sukhdai Prabh Ab Tb Sabh Jane"}},

	{"id":1772230242318,
	"pb":{"t":"ਸੂਰਾ ਸੋ ਜਾਣੇਆ ਜਿਨ ਹਰਿ ਰੰਗੁ ਮਾਣੇਆ","c":"ਸੂਰਾ ਸੋ ਜਾਣੇਆ ਜਿਨ ਹਰਿ ਰੰਗੁ ਮਾਣੇਆ ,\nਤੋਲਿਆ ਤੋਲਣਹਾਰ ਸੁਆਮੀ ਮਾਯਾ ਸੰਗਿ ਤੋਲਿਆ ਨਾ ਜਾਈ ।।\nਪ੍ਰੇਮ ਭਯੋ ਕੰਤ ਰਾਧਾ ਪ੍ਰੇਮ ਸੰਗਿ ਤੁਲਿ ਜਾਈ ,\nਆਪਿ ਸਮਾਣਾ ਆਏ ਸੁਜਾਨਾ ਤੁਝੇ ਧਿਆਨਾ ਮਹਾ ਸੁਖ ਪਾਣਾ , ਤੁਝੇ ਮਨਿ ਭਾਈ ।।\nਬਿਨਾ ਪ੍ਰੇਮ ਨਾ ਕੰਤ ਭਯੋ ਤਨ ਮਨ ਧਨ ਸਭ ਛੂਟਿ ਜਾਈ ।।\nਸੇਵਾ ਸਾਧ ਸੰਗਿ ਕੀਜੈ ਸਾਧੂ ਬਿਨਾ ਨਾ ਸਮਾਈ ,\nਬਿਨ ਸਾਧੂ ਸਭ ਸੰਗੁ ਛੂਟਿ ਜਾਈ ।।\nਸੰਗਿ ਜਾਸੀ ਪ੍ਰੇਮ ਪੀਆ ਦਾਸ ਦੀਨ ਦਯਾ ਦਾਤੇ ,\nਦਰਸ਼ਨ ਅਗੰਮ ਮੁਕਤਿ ਪ੍ਰਭ ਸ਼ਰਣ ਪਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सूरा सो जाणेआ जिन हरि रंग माणेआ","c":"सूरा सो जाणेआ जिन हरि रंग माणेआ ,\nतोलेआ तोलणहार सुआमी माया संग तोलेआ ना जाई ।।\nप्रेम भयो कंत राधा प्रेम संग तुल जाई ,\nआप समाणा आये सुजाना तुझे धिआना महा सुख पाणा , तुझे मन भाई ।।\nबिना प्रेम ना कंत भयो तन मन धन सभ छूट जाई ।।\nसेवा साध संग कीजै साधू बिना ना समाई ,\nबिन साधू सभ संग छूट जाई ।।\nसंग जासी प्रेम पीआ दास दीन दया दाते ,\nदर्शन अगम मुक्त प्रभ शरण पाई ।। \n( यकीन )"},"en":{"t":"Sura So Janeya Jin Hari Rang Maneya","c":"Sura So Janeya Jin Hari Rang Maneya"}},

	{"id":1772230469750,
	"pb":{"t":"ਸਾਹਿਬ ਆਪਣੇ ਕੀ ਕਰੋ ਚਾਕਰੀ","c":"ਸਾਹਿਬ ਆਪਣੇ ਕੀ ਕਰੋ ਚਾਕਰੀ , ਸਭਹਿ ਛੋਡਿ ਚਤੁਰਾਈ ਜੀਓ ।।\nਆਪੇ ਆਪਣਾ ਖੇਲੁ ਕਰਾਯੇਂਦਾ , ਸੇਵਕ ਕੋ ਦੇ ਵਡਿਆਈ ਜੀਓ ।।\nਦਯਾ ਕਰੋ ਮੋਹੇ ਨਾਮੁ ਦੀਜੈ , ਮੇਰੇ ਸਤਿਗੁਰ ਗੋਬਿੰਦ ਗੋਸਾਈ ਜੀਓ ।।\nਚਕੋਰ ਚੰਦ ਸਿਓਂ ਪ੍ਰੇਮ ਜੈਸੇ ਹੋਵੇ , ਤੈਸੀ ਪ੍ਰੀਤਮ ਪ੍ਰੀਤਿ ਹਮਾਰੀ ਜੀਓ ।।\nਦਰਸ਼ਨ ਕਹਤ ਸੁਨਹੋ ਸਾਧੋ , ਗੁਰ ਬਿਨੁ ਮੁਕਤਿ ਨਾ ਪਾਵੈ ਕੋਈ ਜੀਓ ।।\n( ਯਕੀਨ )"},"hi":{"t":"साहिब आपने की करो चाकरी","c":"साहिब आपने की करो चाकरी , सभहि छोड चतुराई जीओ ।।\nआपे आपना खेल करायेंदा , सेवक को दे वडियाई जीओ ।।\nदया करो मोहे नाम दीजै , मेरे सतिगुर गोबिंद गोसाई जीओ ।।\nचकोर चंद सिओं प्रेम जैसे होवे , तैसी प्रीतम प्रीत हमारी जीओ ।।\nदर्शन कहत सुनहो साधो , गुर बिन मुक्त ना पावै कोई जीओ ।।\n( यकीन )"},"en":{"t":"Sahib Apne Ki Karo Chaakri","c":"Sahib Apne Ki Karo Chaakri"}},

	{"id":1772230698087,
	"pb":{"t":"ਸੇਵ ਸੇਵਣ ਰਾਮਾਇਣ ਗੀਤਾ","c":"ਸੇਵ ਸੇਵਣ ਰਾਮਾਇਣ ਗੀਤਾ , ਗੁਰ ਕਿਰਪਾ ਹਰਿ ਉਪਜੀ ਪ੍ਰੀਤਾ ।।\nਭਰਮ ਭਉ ਲਾਥੇ ਨਾਹੀ , ਚਰਨ ਕੰਵਲ ਬਿਨੁ ਚਰਨਾਮਤ ਲੀਤਾ ।।\nਨਵਖੰਡ ਪ੍ਰਥਮ ਦਸ ਇੰਦਰੀਓਂ , ਦਸ ਦੁਆਰ ਬਵੰਜਾ ਕਿੰਗਰੀਆ ।।\nਬਾਰਾ ਥੰਮ ਛੱਤੀ ਹਜ਼ਾਰ ਰਾਗ ਰਾਗਣੀਆਂ ,\nਸੰਤ ਸਹਿਜ ਅਲਖ ਨਾਰਾਇਣ ਏਕੋ ਰਸਨਾ ਸਿਮਰਨੀਆ ।।\nਚਾਰ ਦਿਸ਼ਾ ਤ੍ਰਿਲੋਕੀ ਬਸਤ ਹੈ , ਤਿਸੁ ਊਪਰਿ ਬੈਠੇ ਨਿਰੰਕਾਰ ਲਿਵ ਲਾਏ ।।\nਬਾਹਰਿ ਤਲਾਸ਼ ਕੁਛ ਨਾਹੀ ਪਾਏ , ਅੰਤਰਿ ਦੇਹ ਸਤਿਗੁਰ ਮੀਤਾ ।।\nਦਰਸ਼ਨ ਜਨ ਪ੍ਰਭ ਪਰਉਪਕਾਰੀ , ਜੁਗ ਜੁਗ ਚਲੇਓ ਨਾਮ ਕੀ ਰੀਤਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"सेव सेवण रामायण गीता","c":"सेव सेवण रामायण गीता , गुर किरपा हरि उपजी प्रीता ।।\nभरम भौ लाथे नाही , चरन कंवल बिन चरनामत लीता ।।\nनवखंड प्रथम दस इंदरीओं , दस दुआर बवंजा किंगरीआ ।।\nबारा थम छत्ती हजार राग रागणीआं ,\nसंत सहज अलख नारायण एको रसना सिमरनीआ ।।\nचार दिशा त्रिलोकी बसत है , तिस ऊपर बैठे निरंकार लिव लाये ।।\nबाहर तलाश कुछ नाही पाये , अंतर देह सतिगुर मीता ।।\nदर्शन जन प्रभ परउपकारी , जुग जुग चलेओ नाम की रीता ।।\n( यकीन )"},"en":{"t":"Sev Sevan Ramayan Gita","c":"Sev Sevan Ramayan Gita\nSev Sevan Ramayan Geeta"}},

	{"id":1772230921365,
	"pb":{"t":"ਹਰਿ ਰਾਇ ਸਿਮਰੇ ਸਚਖੰਡ ਵਾਸੀ","c":"ਹਰਿ ਰਾਇ ਸਿਮਰੇ ਸਚਖੰਡ ਵਾਸੀ , ਹਰਿ ਸਿਮਰੇ ਪ੍ਰਭ ਅਬਿਨਾਸ਼ੀ ।।\nਹਰਿ ਸਿਮਰੇ ਦੁੱਖ ਨਾਠੇ , ਕਾਜ ਸਵਾਰੇ ਸੁਖ ਸਹਜ ਸਮਾਏ ।।\nਹਰਿ ਸਿਮਰੇ ਨਾ ਘਣ ਲਾਗੇ , ਹਰਿ ਸਿਮਰੇ ਗੁਰ ਰੰਗੁ ਮਾਣੇ ।।\nਹਰਿ ਸਿਮਰੇ ਨਾਮੁ ਅਧਾਰਾ , ਹਰਿ ਸਿਮਰੇ ਅਠਸਠਿ ਤੀਰਥ ਪਾਰਿ ਉਤਾਰਾ ।।\nਹਰਿ ਸਿਮਰੇ ਮੁਖ ਉਜਿਆਲੇ , ਹਰਿ ਸਿਮਰੇ ਮਨੁ ਛੂਟਿ ਜਾਏ ।।\nਹਰਿ ਸਿਮਰੇ ਪਰਮ ਪਦੁ ਪਾਈ , ਹਰਿ ਸਿਮਰੇ ਦੀਨ ਦਰਦ ਸਭ ਨਸਿ ਜਾਈ ।।\nਹਰਿ ਸਿਮਰੇ ਆਤਮਾ ਜਾਗੇ , ਹਰਿ ਸਿਮਰੇ ਮੋਹ ਮਾਯਾ ਤਿਆਗੇ ।।\nਪੰਚ ਦੁਸ਼ਟ ਜਮ ਲਾਗੇ ਨਾ ਆਸੀ , ਦਰਸ਼ਨ ਗੁਰ ਪੂਰੇ ਪ੍ਰਭ ਅਬਿਨਾਸ਼ੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"हरि राय सिमरे सचखंड वासी","c":"हरि राय सिमरे सचखंड वासी , हरि सिमरे प्रभ अबिनासी ।।\nहरि सिमरे दुख नाठे , काज सवारे सुख सहज समाये ।।\nहरि सिमरे ना घण लागे , हरि सिमरे गुर रंग माणे ।।\nहरि सिमरे नाम अधारा , हरि सिमरे अठसठि तीरथ पार उतारा ।।\nहरि सिमरे मुख उजिआले , हरि सिमरे मन छूट जाये ।।\nहरि सिमरे परम पद पाई , हरि सिमरे दीन दरद सभ नस जाई ।।\nहरि सिमरे आतमा जागे , हरि सिमरे मोह माया तिआगे ।।\nपंच दुष्ट जम लागे ना आसी , दर्शन गुर पूरे प्रभ अबिनासी ।।\n( यकीन )"},"en":{"t":"Hari Rai Simre Sachkhand Vasi","c":"Hari Rai Simre Sachkhand Vasi\nHari Raye Simre Sachkhand Vasi"}},

	{"id":1772231188510,
	"pb":{"t":"ਹਰੀਸ਼ ਚੰਦਰ ਰਾਜਨ ਸਚੁ ਧਨੁ ( ਧਰਮ )","c":"ਹਰੀਸ਼ ਚੰਦਰ ਰਾਜਨ ਸਚੁ ਧਨੁ ਕਮਾਂਵਦੇ ,\nਬਹੁ ਬਿਧਿ ਦਾਨ ਧਰਮ ਕਰਮ ਉਪਕਾਰੀ ।।\nਪ੍ਰਭ ਸੇਵਾ ਹੁਕਮੇ ਗੁਰ ਭਾਣਾ ਮੰਨੇਆ , ਪਤਨੀ ਮੂਲਿ ਗੁਰ ਦਕਸ਼ਣਾ ਤਾਰੀ ।।\nਪੁੱਤਰ ਦਫ਼ਨੀ ਜਗਹ ਨਾ ਮਿਲਸੀ , ਖਸਮੇ ਕਾਰ ਮੇਰੀ ਵਫ਼ਾਦਾਰੀ ।।\nਸਤਿ ਸੰਤੋਖ ਧਰਮ ਰਾਇ ਡੋਲੇਓ , ਜਾਪ ਤਾਪ ਤਾਤ ਵਫ਼ਾ ਇਮਾਨਦਾਰੀ ।।\nਜਨ ਦਰਸ਼ਨ ਦਯਾ ਕਰੋ ਠਾਕੁਰ , ਐਸੀ ਸੁਮੱਤ ਸੋਭਾ ਜੈਸੀ ਤਾਬੇਆਦਾਰੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"हरीश चंदर राजन सच धन ( धर्म )","c":"( धर्म )\nहरीश चंदर राजन सच धन कमांवदे ,\nबहु बिध दान धर्म करम उपकारी ।।\nप्रभ सेवा हुकमे गुर भाणा मन्नेआ , पतनी मूल गुर दक्षणा तारी ।।\nपुत्तर दफनी जगह ना मिलसी , खसमे कार मेरी वफादारी ।।\nसति संतोख धर्म राय डोलेओ , जाप ताप तात वफा ईमानदारी ।।\nजन दर्शन दया करो ठाकुर , ऐसी सुमत्त सोभा जैसी ताबेआदारी ।।\n( यकीन )"},"en":{"t":"Harish Chandra Raajan Sach Dhan ( Dharm )","c":"Harish Chandra Raajan Sach Dhan ( Dharm )"}},

	{"id":1772231427024,
	"pb":{"t":"ਸ਼ਰਨਿ ਪਰੇ ਦੋਇ ਹਥ ਜੋੜਿ","c":"ਸ਼ਰਨਿ ਪਰੇ ਦੋਇ ਹਥ ਜੋੜਿ , ਸੁਣਿ ਲੋ ਅਰਜ਼ ਹਮਾਰੀ ।।\nਦੀਨ ਕੇ ਦਾਤੇ ਪੁਰਖ ਬਿਧਾਤੇ , ਰਾਖੋ ਪੈਜ ਹਮਾਰੀ ।।\nਦਯਾ ਕੀਜੋ ਦਯਾ ਕੇ ਸਾਗਰ , ਮੋਹੇ ਦੀਜੈ ਨਾਮ ਖੁਮਾਰੀ ।।\nਤੇਰਾ ਕੀਰਤਨੁ ਕਿਰਤਿ ਕਮਾਈ , ਨਿਰਮਲ ਬਾਣੀ ਭਵਜਲ ਤਾਰੀ ।।\nਰਾਖੋ ਲਾਜ ਗਰੀਬ ਨਿਵਾਜ , ਕਲਹ ਕਲੇਸ਼ ਦੁੱਖ ਨਿਵਾਰੀ ।।\nਜੀਹਵਾ ਗਾਵੇ ਤੇਰੀ ਮਹਿਮਾ , ਕੀਜੈ ਕਿਰਪਾ ਕਿਰਪਾਧਾਰੀ ।।\nਸੇਵਾ ਸਿਦਕੁ ਦੀਜੈ ਠਾਕੁਰ , ਮਨੁ ਤਨੁ ਲਾਯੋ ਪ੍ਰੀਤਿ ਤੁਮਾਰੀ ।।\nਦਰਸ਼ਨ ਮਾਂਗੇ ਤੇਰੀ ਰਹਮਤਿ , ਪੂਰਨ ਹੋਵੈ ਆਸ ਹਮਾਰੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"शरन पड़े दोये हथ जोड़","c":"शरन पड़े दोये हथ जोड़ , सुन लो अरज़ हमारी ।।\nदीन के दाते पुरख विधाते , राखो पैज हमारी ।।\nदया कीजो दया के सागर , मोहे दीजै नाम खुमारी ।।\nतेरा कीरतन किरत कमाई , निरमल बाणी भवजल तारी ।।\nराखो लाज गरीब निवाज , कलह कलेश दूख निवारी ।।\nजीहवा गावे तेरी महिमा , कीजै किरपा किरपाधारी ।।\nसेवा सिदक दीजै ठाकुर , मन तन लायो प्रीत तुमारी ।।\nदर्शन मांगे तेरी रहमत , पूरन होवै आस हमारी ।।\n( यकीन )"},"en":{"t":"Sharan Pade Dove Hath Jod","c":"Sharan Pade Dove Hath Jod\nSharan Pade Doye Hath Jod"}},

	{"id":1772231774767,
	"pb":{"t":"ਸ਼ਰਨਿ ਪਰੇ ਦੋਇ ਹਥ ਜੋੜਿ , ਸੁਣਿ ਲੋ ਅਰਜ਼ ਹਮਾਰੀ","c":"ਸ਼ਰਨਿ ਪਰੇ ਦੋਇ ਹਥ ਜੋੜਿ , ਸੁਣਿ ਲੋ ਅਰਜ਼ ਹਮਾਰੀ ,\nਦੀਨ ਕੇ ਦਾਤੇ ਪੁਰਖ ਬਿਧਾਤੇ , ਰਾਖੋ ਪੈਜ ਹਮਾਰੀ ।।\nਏਕੋ ਓਟ ਤੁਮਾਰੀ ਦਾਤਾ , ਅਵਰ ਨਾਹੀ ਕੋ ਦੂਜਾ ,\nਅੰਤਰ ਕੀ ਗਤਿ ਤੁਮ ਹੀ ਜਾਣੋ , ਬਿਨਤੀ ਸੁਣੋ ਬਨਵਾਰੀ ।।\nਦੀਨ ਕੇ ਦਾਤੇ , ਦਯਾ ਕੇ ਸਾਗਰ , ਏਹ ਸਭ ਤੇਰੀ ਵਡਿਆਈ ,\nਦਯਾਲ ਹੋਵੇ ਜਨ ਆਪਣੇ ਮੇਰੇ ਰਾਮ ਰਘੁਰਾਈ ।।\nਬਖਸ਼ੋ ਮੋਹੇ ਅੰਮ੍ਰਿਤ ਨਾਮੁ ਮੇਰੇ ਪੂਰਨ ਭਗਵਾਨ ,\nਦਰਸ਼ਨ ਮਾਂਗੇ ਤੇਰੀ ਰਹਮਤਿ ਕਰਿ ਪੂਰੀ ਆਸ ਹਮਾਰੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"शरण पड़े दोये हथ जोड़ , सुण लो अरज हमारी","c":"शरण पड़े दोये हथ जोड़ , सुण लो अरज हमारी ,\nदीन के दाते पुरख बिधाते , राखो पैज हमारी ।।\nएको ओट तुमारी दाता , अवर नाही को दूजा ,\nअंतर की गति तुम ही जाणो , बिनती सुणो बनवारी ।।\nदीन के दाते , दया के सागर , एह सभ तेरी वडियाई ,\nदयाल होवे जन आपणे मेरे राम रघुराई ।।\nबख्शो मोहे अमृत नाम मेरे पूरण भगवान ,\nदर्शन मांगे तेरी रहमत कर पूरी आस हमारी ।।\n( यकीन )"},"en":{"t":"Sharan Pade Doye Hath Jod , Sun Lo Arj Humari","c":"Sharan Pade Doye Hath Jod , Sun Lo Arj Humari"}},

	{"id":1772232044180,
	"pb":{"t":"ਹਰਿ ਕੇ ਬੰਦੇ ਹਰਿ ਕਿਉਂ ਭੁਲਾਯੇਂ","c":"ਹਰਿ ਕੇ ਬੰਦੇ ਹਰਿ ਕਿਉਂ ਭੁਲਾਯੇਂ , ਕਰੇਂ ਚਤੁਰਾਈ ਬਹੁਤੁ ਦੁੱਖੁ ਪਾਯੇ ।।\nਕਰਿ ਬੰਦਗੀ ਤੇਰੇ ਕਾਮਿ ਆਯੇ , ਜਮਪੁਰੀ ਸੇ ਤੁਮ੍ਹੇਂ ਛੁਡਾਯੇ ।।\nਮੈਂ ਮੈਂ ਕਰਤਾ ਮੈਂ ਨਾ ਮਾਰੇਂ , ਮੈਂ ਕੇ ਕਾਰਣਿ ਰਾਮ ਬਿਸਾਰੇਂ ।।\nਕਰੋ ਯਤਨੁ ਮਨੁ ਮਾਨਿ ਜਾਏ , ਪੰਚ ਦੁਸ਼ਟ ਕੋ ਮਾਰਿ ਭਗਾਯੇ ।।\nਜੋ ਪ੍ਰਾਨੀ ਹਰਿ ਗੁਣ ਗਾਯੇ , ਦਰਸ਼ਨ ਸੋਈ ਪਰਮਗਤਿ ਪਾਯੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"हरि के बंदे हरि किओं भुलायें","c":"हरि के बंदे हरि किओं भुलायें , करें चतुराई बहुत दुख पाये ।।\nकर बंदगी तेरे काम आये , जमपुरी से तुमहे छुडाये ।।\nमैं मैं करता मैं ना मारें , मैं के कारण राम बिसारें ।।\nकरो यतन मन मान जाये , पंच दुष्ट को मार भगाये ।।\nजो प्रानी हरि गुण गाये , दर्शन सोई परमगत पाये ।।\n( यकीन )"},"en":{"t":"Hari Ke Bande Hari Kyo Bhulaye","c":"Hari Ke Bande Hari Kyo Bhulaye"}},

	{"id":1772232307605,
	"pb":{"t":"ਹਰਿ ਜੀਓ ਕਿਰਪਾ ਕਰੋ","c":"ਹਰਿ ਜੀਓ ਕਿਰਪਾ ਕਰੋ , ਆਪਣਾ ਨਾਮੁ ਦੇਓ ਮੇਹਰਬਾਨਾ ,\nਨਾਮੁ ਜਪਤ ਹੋਸੀ ਮੋਹੇ ਮਨੁ ਸ਼ਾਂਤਿ ।।\nਬਿਨਾ ਗੁਰੂ ਹਰਿ ਨਾ ਮਿਲਿਆ ਭਾਈ ,\nਨਾਮ ਬਿਨਾ ਹਰਿ ਜਾਣਿਆ ਨਾ ਕੋਈ ।।\nਏਕੁ ਨਾਮੁ ਉੱਤਮ ਹਰਿ ਕਾ , ਹਿਰਦੇ ਵਸੇ ਨਾਮੁ ਪ੍ਰਭ ਤਾਂਕਾ ।।\nਦਰਸ਼ਨ ਦਾਸ ਕੋ ਹਰਿ ਹੋਰੁ ਕੋਈ ਨਾਹੀ ,\nਦਾਸ ਜਨੋ ਕੇ ਕਾਰਜ ਆਣਿ ਆਪਿ ਖਲੋਆ ।।\n( ਯਕੀਨ )"},"hi":{"t":"हरि जीओ किरपा करो","c":"हरि जीओ किरपा करो , आपना नाम देओ मेहरबाना ,\nनाम जपत होसी मोहे मन शांत ।।\nबिना गुरू हरि ना मिलेया भाई ,\nनाम बिना हरि जानेया ना कोई ।।\nएक नाम उत्तम हरि का , हिरदे वसे नाम प्रभ तांका ।।\nदर्शन दास को हरि होर कोई नाही ,\nदास जनो के कारज आन आप खलोआ ।।\n( यकीन )"},"en":{"t":"Hari Jiyo Kirpa Karo","c":"Hari Jiyo Kirpa Karo\nHar Jiyo Kirpa Karo"}},

	"pb":{"t":"ਆਰਤੀ","c":"।। ਆਰਤੀ ਜੈ ਜੈਕਾਰ ਸ਼੍ਰੀ ਓਂਕਾਰ ਪ੍ਰਭ ਜੀ ।।\n\nਧੰਨ ਗੁਰੂ ਨਾਨਕ ਤੇਰੀ ਸ਼ਰਣਾਈ , ਧੰਨ ਗੁਰੂ ਦਰਸ਼ਨ ਤੇਰੀ ਸ਼ਰਣਾਈ ।\nਨਾਨਕ ਨਾਮ ਚੜ੍ਹਦੀ ਕਲਾ , ਤੇਰੇ ਭਾਣੇ ਸਰਬੱਤ ਦਾ ਭਲਾ ।।\n\nਪ੍ਰਭ ਜੀਓ , ਤੇਰਾ ਸਗਲ ਪਸਾਰਾ ।\nਜਲ ਥਲ ਮਹੀਅਲ , ਸਰਬ ਵਿਆਪਕ ਏਕ ਨਾਮੁ , ਕਰਤਾਰਾ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ .....\n\nਤੂੰ ਹੀ ਅੱਲਾ , ਰਾਮ ਰਹੀਮ । ਤੂੰ ਹੀ ਈਸ਼ਵਰ , ਪਾਲਣਹਾਰਾ ।।\nਦਯਾ ਕੇ ਦਾਤਾ , ਜਗ ਕੇ ਮਾਲਿਕ । ਸਬ ਜਗ ਤਾਰਨਹਾਰਾ ।।\nਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ .....\n\nਤੂੰ ਹੈਂ ਦੇਵੀ , ਔਰ ਦੇਵਤਾ , ਤੂੰ ਹੈ ਸਤਿਗੁਰੂ , ਔਰ ਅਵਤਾਰੀ ।\nਤਨ , ਮਨ , ਆਤਮ ਤੁਝ ਕੋ ਅਰਪਣ , ਤੀਨ ਲੋਕ , ਓਂਕਾਰੀ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ .....\n\nਜ੍ਯੋਤ ਸਰੂਪ , ਸਬਮੇਂ ਬਸਤਾ , ਵਿਆਪਕ ਹੋਕਰ ਹੈ ਨਿਰੰਕਾਰੀ ।\nਹਮ ਪਰ ਕ੍ਰਿਪਾ , ਦ੍ਰਿਸ਼ਟਿ ਤੁਮ ਕਰ ਦੋ , ਕੋਈ ਨ ਸੰਗੀ ਸਾਥੀ ।।\nਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ .....\n\nਤੁਮਨੇ ਸਤਿਗੁਰੂ , ਰੂਪ ਧਰਾਯਾ । ਤੁਮਨੇ ਨਾਮ ਕਾ ਦੀਪ ਜਲਾਯਾ ।\nਸੁਰਤਿ ਸ਼ਬਦ ਕਾ , ਭੇਦ ਬਤਾਕਰ , ਧਿਆਨ ਦੇਹੀ ਪ੍ਰਗਟਾਯਾ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ .....\n\nਗੁਰੂ ਕੇ ਦਰਸ਼ਨ , ਜੰਗਮ ਤੀਰਥ , ਗੁਰੂ ਕੀ ਸੇਵਾ ਉੱਤਮ ਕੀਰਤਿ ।\nਗੁਰੂ ਕਾ ਸ਼ਬਦ ਮਹਾ ਰਸੁ ਮੀਠਾ , \nਗੁਰੂ ਕਾ ਗਿਆਨੁ , ਸਭੈ ਘਟਿ ਡਿੱਠਾ ।।\nਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ .....\n\nਗੁਰੂ ਕ੍ਰਿਪਾ , ਹਮ ਪਰ ਜਬ ਕੀਨ੍ਹੀ , ਬਾਂਹ ਪਕੜਿ ਏਹ ਜਗੁ ਕਢਿ ਲੀਨ੍ਹੀ ।\nਜਮ ਕੀ ਫਾਹੀ , ਗੁਰੂ ਮਿਟਾਵੇ , ਪ੍ਰਭ ਦਾਤਾ ਸੇ , ਆਪ ਮਿਲਾਵੇ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ .....\n\nਸਾਧ ਸੰਗਤ ਕੋ , ਭਲਾ ਸਿਖਾਯਾ , ਸੇਵਾ ਸਿਦਕੁ , ਸਚੁ ਵਰਤਾਯਾ ।\nਪੰਚ ਵਿਕਾਰ ਕੀ , ਸ਼ਹਾਦਤ ਲੇਕਰ , ਦਾਸਨ ਦਾਸ , ਸਜਾਯਾ ।।\nਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ .....\n\nਹਮ ਪਾਪੀ , ਹਮ ਅਵਗੁਣ ਹਾਰੇ , ਹਮ ਮੈਲੇ , ਹਮ ਮੁਗਧ ਗਵਾਰੇ ।\nਦੀਨ ਦੁਖੀ ਕੇ , ਤੁਮ ਰਖਵਾਲੇ , ਪਲ ਪਲ ਕਾਜ ਸਵਾਰੇ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ .....\n\nਮੈਂ ਨੀਵਾਂ , ਨਿਮਾਣਾ ਸੇਵਕ , ਕਾਟੋ ਭ੍ਰਮ , ਕਲਹ ਕਲੇਸ਼ ।\nਦੁਖ ਨਿਵਾਰੋ , ਸ਼ਰਣ ਲਗਾਓ , ਤੇਰੀ ਤੂ ਹੀ ਜਾਣੇ ।।\nਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ , ਤੂੰ ਹੀ ਤੂੰ .....\n\nਸ਼੍ਰੀ ਓਂਕਾਰ ਜੀ ਕੀ ਆਰਤੀ ਜੋ ਗਾਵੇ ,\nਪ੍ਰਭ ਕੀ ਸ਼ਰਣ , ਗੁਰੂ ਸੰਗਿ ਪਾਵੇ ।\nਗੁਰੂ ਦਰਸ਼ਨ ਸਬ , ਤੇਰੀ ਵਡਿਆਈ , ਕੋਟਿ-ਕੋਟਿ , ਨਮਸਕਾਰੇ ।।\nਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ , ਦਰਸ਼ਨ ਰਾਮ ਰਾਮ ਰਾਮ ....."},"hi":{"t":"आरती","c":"।। आरती जय जयकार श्री ओंकार प्रभ जी ।।\n\nधन गुरू नानक तेरी शरनाई , धन गुरू दर्शन तेरी शरनाई । \nनानक नाम चढ़दी कला , तेरे भाणे सरबत दा भला ।।\n\nप्रभ जीओ , तेरा सगल पसारा ।\nजल थल महियल , सर्व व्यापक एक नाम , करतारा ।।\nदर्शन राम राम राम , दर्शन राम राम राम .....\n\nतू ही अल्ला , राम रहीम । तू ही ईश्वर , पालनहारा ।। \nदया के दाता , जग के मालिक । सब जग तारनहारा ।।\nतू ही तू , तू ही तू , तू ही तू , तू ही तू .....\n\nतू हैं देवी , और देवता , तू है सतगुरू , और अवतारी । \nतन , मन , आत्म तुझ को अर्पण , तीन लोक , ओंकारी ।। \nदर्शन राम राम राम , दर्शन राम राम राम .....\n\nज्योत सरूप , सबमें बसता , व्यापक होकर है निरंकारी । \nहम पर कृपा , दृष्टि तुम कर दो , कोई न संगी साथी ।। \nतू ही तू , तू ही तू , तू ही तू , तू ही तू .....\n\nतुमने सतगुरू , रूप धराया । तुमने नाम का दीप जलाया । \nसुरत शब्द का , भेद बताकर , ध्यान देही प्रगटाया ।। \nदर्शन राम राम राम , दर्शन राम राम राम .....\n\nगुरू के दर्शन , जंगम तीर्थ , गुरू की सेवा उत्तम कीरत । \nगुरू का शब्द महा रस मीठा , \nगुरू का ज्ञान , सभै घट डिट्ठा ।।\nतू ही तू , तू ही तू , तू ही तू , तू ही तू .....\n\nगुरू कृपा , हम पर जब कीन्ही , बाँह पकड़ एह जग कड लीन्ही । \nजम की फाही , गुरू मिटावे , प्रभ दाता से , आप मिलावे ।। \nदर्शन राम राम राम , दर्शन राम राम राम .....\n\nसाघ संगत को , भला सिखाया , सेवा सिदक , सच वरताया । \nपंच विकार की , शहादत लेकर , दासन दास , सजाया ।। \nतू ही तू , तू ही तू , तू ही तू , तू ही तू .....\n\nहम पापी , हम अवगुण हारे , हम मैले , हम मुगध गवारे । \nदीन दुखी के , तुम रखवाले , पल पल काज सवारे ।। \nदर्शन राम राम राम , दर्शन राम राम राम .....\n\nमैं नीवा , निमांणा सेवक , काटो भ्रम , कलह कलेश । \nदुख निवारो , शरण लगाओ , तेरी तू ही जाने ।। \nतू ही तू , तू ही तू , तू ही तू , तू ही तू .....\n\nश्री ओंकार जी की आरती जो गावे , \nप्रभ की शरण , गुरू संग पावे । \nगुरू दर्शन सब , तेरी वडियाई , कोटि-कोटि , नमस्कारे ।। \nदर्शन राम राम राम , दर्शन राम राम राम ....."},"en":{"t":"Aarti","c":"Aarti\nArti"}},

	"pb":{"t":"ਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ","c":"ਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ ਭਲਾ ਕੌਣ ਨਹੀਂ ਨੱਚਦਾ ,\nਧਰਤੀ ਚੰਨ ਸਿਤਾਰੇ ਨੱਚਦੇ ਸਾਰੇ ਭਗਤ ਪਿਆਰੇ ਨੱਚਦੇ ,\nਰਾਧਾ ਨੱਚਦੀ ਮੀਰਾ ਨੱਚਦੀ ਸਾਰਾ ਆਲਮ ਤੱਕਦਾ ,\nਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ ......\n\nਧੁਰ ਦਰਗਾਹੋਂ ਆਈ ਮੁਰਲੀ ਜਦ ਹੋਠਾਂ ਨਾਲ ਲਾਈ ਮੁਰਲੀ ,\nਗੀਤ ਪ੍ਰਭੂ ਦੇ ਗਈ ਮੁਰਲੀ ਹੋਕਾ ਦੇ ਗਈ ਸੱਚ ਦਾ ,\nਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ ......\n\nਮਨਮੋਹਨ ਘਨਸ਼ਿਆਮ ਤੂੰ ਹੈਂ ਈਸ਼ਵਰ ਅੱਲਾ ਰਾਮ ਭੀ ਤੂੰ ਹੈਂ ,\nਉਸ ਮਾਲਿਕ ਦਾ ਨਾਮ ਭੀ ਤੂੰ ਹੈਂ ਜੋ ਸਭਨਾ ਵਿਚ ਵੱਸਦਾ ,\nਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ ......\n\nਲਾਲ ਅੌਥੋਲੀ ਵਾਲਾ ਕਹਿੰਦਾ ਕ੍ਰਿਸ਼ਨ ਜੋ ਤੇਰਾ ਨਾਮ ਲੈਂਦਾ ,\nਦੁਨੀਆਂ ਦਾ ਹਰ ਸੁੱਖ ਪਾ ਲੈਂਦਾ ਕੱਖੋਂ ਬਣ ਜੇ ਲੱਖ ਦਾ ,\nਕ੍ਰਿਸ਼ਨਾ ਤੇਰੀ ਮੁਰਲੀ ਤੇ ......"},"hi":{"t":"कृष्णा तेरी मुरली ते","c":"कृष्णा तेरी मुरली ते भला कौन नही नचदा ,\nधरती चन सितारे नच्दे सारे भगत प्यारे नच्दे ,\nराधा नचदी मीरा नचदी सारा आलम तकदा ,\nकृष्णा तेरी मुरली ते ......\n\nधुर दरगहो आई मुरली जद होठा ना लाइ मुरली ,\nगीत प्रभु दे गई मुरली होका दे गी सच दा ,\nकृष्णा तेरी मुरली ते ......\n\nमन मोहन घनश्याम तू है इस्वर अल्लाह राम भी तू है ,\nउस मालिक दा नाम भी तू है जो सबना विच वसदा ,\nकृष्ण तेरी मुरली ते ......\n\nलाल औथोली वाला कहंदा कृष्ण जो तेरा नाम लेनदा ,\nदुनिया दा हर सुख पा लेनदा काखो बन जे लाख दा ,\nकृष्णा तेरी मुरली ते ......"},"en":{"t":"Krishna Teri Murli Te","c":"Krishna Teri Murli Te Bhala Kon Ni Nachda\nKrishna Teri Murli Te Bhala Kaun Ni Nachda"}},

	{"id":1774088583138,"audio":"audio/Ik Bar De Ke Lori.mp3",
	"pb":{"t":"ਇਕ ਵਾਰ ਦੇ ਕੇ ਲੋਰੀ","c":"ਇਕ ਵਾਰ ਦੇ ਕੇ ਲੋਰੀ ਕਰ ਲੈ ਪਿਆਰ ਮੈਨੂੰ ,\nਦੇ ਜਾ ਦੀਦਾਰ ਮੈਨੂੰ ।।\n\nਕਰਮਾਂ ਨੂੰ ਲਾਂਬੂ ਲਾਕੇ ਹਿਰਦੇ ਨੂੰ ਸਾੜਿਆ ਏ ,\nਤੇਰੇ ਵਿਛੋੜਿਆਂ ਨੇ ਸੂਲੀ ਤੇ ਚਾੜ੍ਹਿਆ ਏ ।।\n\nਮੇਰੀ ਜ਼ਿੰਦਗੀ ਦਾ ਦੀਵਾ ਹੁਣ ਟਿਮਟਿਮਾ ਰਿਹਾ ਏ ,\nਵੇਖੀਂ ਇਹ ਬੁੱਝ ਨਾ ਜਾਵੇ ਬੁੱਝਣ ਤੇ ਆ ਗਿਆ ਏ ।।\n\nਵੇਖੇ ਮੈਂ ਸੰਗੀ ਸਾਥੀ ਵੇਖੇ ਨੇ ਮੀਤ ਪਿਆਰੇ ,\nਝੂਠੀ ਏ ਸਾਰੀ ਦੁਨੀਆਂ ਝੂਠੇ ਨੇ ਇਹ ਸਹਾਰੇ ।।\n\nਜੇ ਤੂੰ ਨਾ ਦਵੇਂ ਸਹਾਰਾ ਤਾਂ ਜੀਣਾ ਕਿਹੜੇ ਕੰਮ ਦਾ ,\nਕਰ ਆਸ ਮੇਰੀ ਪੂਰੀ ਭਰੋਸਾ ਨਹੀਂ ਏ ਦਮ ਦਾ ।।\n\nਛੱਡਕੇ ਮੈਂ ਸਾਰੀ ਦੁਨੀਆਂ ਤੇਰੇ ਤੇ ਰੱਖੀਆਂ ਡੋਰਾਂ ,\nਗੋਦੀ ਚ ਲੈ ਲੈ ਮੈਨੂੰ ਜੀ ਲੋਚਦਾ ਏ ਮੇਰਾ ।।\n\nਤੇਰਿਆਂ ਵਿਛੋੜਿਆਂ ਚ ਰੋਣਾ ਵੀ ਪੈ ਗਿਆ ਏ ,\nਹੰਝੂਆਂ ਦੇ ਨਾਲ ਮੂੰਹ ਨੂੰ ਧੋਣਾ ਵੀ ਪੈ ਗਿਆ ਏ ।।"},"hi":{"t":"इक वार दे के लोरी","c":"इक वार दे के लोरी कर लै प्यार मैनूं , \nदे जा दीदार मैनूं ।।\n\nकरमां नूं लांबू लाके हिरदे नूं साड़ेया ए , \nतेरे विछोड़ेयां ने सूली ते चाढ़ेया ए ।।\n\nमेरी जिंदगी दा दीवा हुण टिमटिमा रेहा ए , \nवेखीं एह बुझ ना जावे बुझण ते आ गया ए ।।\n\nवेखे मैं संगी साथी वेखे ने मीत प्यारे , \nझूठी ए सारी दुनिया झूठे ने एह सहारे ।।\n\nजे तूं ना दयें सहारा तां जीणा केहड़े कम दा , \nकर आस मेरी पूरी भरोसा नई ए दम दा ।।\n\nछडके मैं सारी दुनिया तेरे ते रखीयां डोरां , \nगोदी च लै लै मैनूं जी लोचदा ए मेरा ।।\n\nतेरेयां विछोडेयां च रोणा वी पै गया ए , \nहुझुआं दे नाल मुँह नूं धोणा वी पै गया ए ।।"},"en":{"t":"Ik Baar De Ke Lori","c":"Ik Baar De Ke Lori\nIk Bar De Ke Lori"}},

	{"id":1774089184899,"audio":"audio/Baba Ji Sada Hajj Hogaya.mp3",
	"pb":{"t":"ਅਸਾਂ ਲਾਈਆਂ ਨੇ ਦੱਸਾਂਗੇ ਨਿਭਾਕੇ","c":"ਅਸਾਂ ਲਾਈਆਂ ਨੇ ਦੱਸਾਂਗੇ ਨਿਭਾਕੇ , ਸੌਂਹ ਰੱਬ ਦੀ ਦੁਆਰੇ ਤੇਰੇ ਆਕੇ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ ਹੋ ਗਿਆ ,\n\nਤੇਰੇ ਦਰ ਉੱਤੇ ਸਿਰ ਨੂੰ ਝੁਕਾਕੇ ,\nਯਾਰੀ ਰੋਜ਼ੇ ਦੀ ਅੱਖਾਂ ਦੇ ਨਾਲ ਲਾਕੇ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ .....\n\nਤੇਰੇ ਪੈਰੀ ਨਹੀਂ ਜ਼ਮਾਨਾ ਐਵੇਂ ਪਿਆ ਏ , ਦਰ ਤੇਰਾ ਵੀ ਤੇ ਕਾਅਬੇ ਜੇਹਾ ਏ ,\nਅੱਖਾਂ ਜੀਹਨੇ ਜੀਹਨੇ ਤੇਰੇ ਨਾਲ ਲਾਈਆਂ , ਮੂਹੋਂ ਮੰਗੀਆਂ ਮੁਰਾਦਾਂ ਤੈਥੋਂ ਪਾਈਆਂ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ .....\n\nਤੇਰੀ ਗਲੀ ਬਾਬਾ ਜੰਨਤਾਂ ਦੀ ਗਲੀ ਏ , ਤੇਰੀ ਪੁਸ਼ਤ ਉੱਤੇ ਪੀਰ ਮੌਲਾ ਅਲੀ ਏ ,\nਤੇਰਾ ਮੁਖੜਾ ਤੇ ਸਾਡੇ ਲਈ ਕੁਰਆਨ ਏ , ਤੇਰੀ ਦੀਦ ਸਾਡਾ ਦੀਨ ਤੇ ਈਮਾਨ ਏ ਕਿ ,\nਬਾਬਾ ਸਾਡਾ ਹੱਜ .....\n\nਬਾਦਸ਼ਾਹੀ ਨਾਲੋਂ ਤੇਰੀਆਂ ਗੁਲਾਮੀਆਂ , ਐਵੇਂ ਕੀਤੀਆਂ ਨਿਸਾਬੜਿਆਂ ਨਿਜ਼ਾਮੀਆਂ ,\nਚਾਰੇ ਪਾਸੇ ਅੱਜ ਮਚੀਆਂ ਦੁਹਾਈਆਂ , ਰਲ ਆਸ਼ਕਾਂ ਧਮਾਲਾਂ ਅੱਜ ਪਾਈਆਂ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ .....\n\nਮੁਖ ਤੇਰਾ ਜਿਵੇਂ ਚੌਧਵੀਂ ਦਾ ਚੰਨ ਵੇ , ਤੇਰਾ ਵਲੀਆਂ ਚ ਰੁਤਬਾ ਬੁਲੰਦ ਵੇ ,\nਤੈਨੂੰ ਤੱਕਣਾ ਖੁਦਾ ਨੂੰ ਤੱਕ ਲੈਣਾ , ਐਹੋ ਆਸ਼ਕਾਂ ਦੀਵਾਨਿਆਂ ਦਾ ਕਹਿਣਾ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ .....\n\nਤੇਰਾ ਰੂਪ ਤੇ ਬਹੁਰੂਪ ਜਾਣ ਬੈਠੇ ਹਾਂ , ਤਾਈਓਂ ਬੂਹੇ ਤੇਰੇ ਅਸੀਂ ਆਣ ਬੈਠੇ ਹਾਂ ,\nਤੇਰੇ ਨਾਮ ਦੀਆਂ ਵੰਡੀਆਂ ਨਿਆਜ਼ਾਂ , ਵਾਰੀ ਪੜ੍ਹ ਪੜ੍ਹ ਆਖੀਏ ਨਮਾਜ਼ਾਂ ,\nਬਾਬਾ ਜੀ ਸਾਡਾ ਹੱਜ ....."},"hi":{"t":"असां लाईयां ने दस्सांगे निभाके","c":"असां लाईयां ने दस्सांगे निभाके , सौंह रब्ब दी दुआरे तेरे आके , \nबाबा जी साडा हज्ज हो गया ,\n\nतेरे दर उत्ते सिर नूं झुकाके , \nयारी रोजे दी अखां दे नाल लाके , \nबाबा जी साडा हज्ज .....\n\nतेरे पैरी नहीं जमाना ऐवें पेया ए , दर तेरा वी ते काअने काअबे जेहा ए , \nअक्खां जीहने जीहने तेरे नाल लाईयां , मुहों मंगीयां मुरादां तैथों पाईयां , \nबाबा जी साडा हज्ज .....\n\nतेरी गली बाबा जन्नतां दी गली ए , तेरी पुश्त उत्ते पीर मौला अली ए , \nतेरा मुखड़ा ते साडे लई कुरआन ए , तेरी दीद साडा दीन ते ईमान ए कि , \nबाबा साडा हज्ज .....\n\nबादशाही नालों तेरीयां गुलामीयां , ऐवें कीतीयां निसाबड़ेया निजामियां , \nचारे पासे अज्ञ्ज मचीयां दुहाईयां , रल आश्कां धमालां अज्ज पाईयां ,\nबाबा जी साडा हज्ज .....\n\nमुख तेरा जीवें चौधवीं दा चन्न वे , तेरा वलीयां च रुतबा बुलंद वे ,\nतैनूं तकणा खुदा नूनं तक्क लैणा , ऐहो आशिकां दीवानेयां दा कहणा ,\nबाबा जी साडा हज्ज .....\n\nतेरा रूप ते वहरूप जाण बैठे हां , ताईयों बूहे तेरे असीं आण बैठे हां , \nतेरे नाम दीयां वंडी         let currentId = null;
        let fontSize = 1.3;
        const player = document.getElementById('main-player');
        const searchInput = document.getElementById('search-bar');
        const clearBtn = document.getElementById('clear-search');

        // Play/Pause Sync Fix: Update Index when player state changes
        player.onplay = () => renderIndex();
        player.onpause = () => renderIndex();
        player.onended = () => renderIndex();

        function updateUI() {
            const lang = document.getElementById('lang-select').value;
            const ui = { 
                pb: { title: "ਭਜਨ ਕੀਰਤਨ ਐਪ", search: "ਖੋਜੋ...", back: "⬅ ਪਿੱਛੇ", total: "ਕੁੱਲ:" }, 
                hi: { title: "भजन कीर्तन ऐप", search: "खोजें...", back: "⬅ पीछे", total: "Total:" } 
            };
            document.getElementById('app-title').innerText = ui[lang].title;
            document.getElementById('search-bar').placeholder = ui[lang].search;
            document.getElementById('back-btn').innerText = ui[lang].back;
            document.getElementById('shabad-counter').childNodes[0].textContent = ui[lang].total;
            renderIndex(); 
            if (currentId !== null) renderLyricsOnly(); 
        }

        function toggleAudio(e, id) {
            e.stopPropagation();
            const s = shabads.find(x => x.id == id);
            
            // Check if this specific audio is currently loaded and playing
            const isThisAudio = player.src.includes(encodeURI(s.audio));

            if (isThisAudio && !player.paused) {
                player.pause();
            } else {
                if (!isThisAudio) player.src = s.audio;
                player.play();
                
                // Update media session for lock screen
                if ('mediaSession' in navigator) {
                    const lang = document.getElementById('lang-select').value;
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: s[lang]?.t || s.pb?.t,
                        artist: 'Bhajan Kirtan App',
                        artwork: [{ src: 'logo.png', sizes: '512x512', type: 'image/png' }]
                    });
                }
            }
            renderIndex(); // Force refresh to show correct icons
        }

        function openShabad(id) {
            const s = shabads.find(x => x.id == id);
            const wrap = document.getElementById('global-audio-wrap');
            if(currentId !== id && !player.src.includes(encodeURI(s.audio))) { player.src = s.audio || ""; }
            wrap.style.display = (s.audio && s.audio.trim() !== "") ? 'block' : 'none';
            currentId = id;
            history.pushState({view: 'shabad'}, ''); 
            renderLyricsOnly();
            switchView(false);
        }

        function renderLyricsOnly() {
            const lang = document.getElementById('lang-select').value;
            const s = shabads.find(x => x.id == currentId);
            if(!s) return;
            const title = s[lang]?.t || s.pb?.t;
            const content = s[lang]?.c || s.pb?.c;
            document.getElementById('shabad-title-box').innerHTML = `<h2 class="shabad-title">${title}</h2>`;
            document.getElementById('active-container').innerHTML = `<hr><div style="font-size:${fontSize}rem">${content}</div>`;
        }

        function renderIndex() {
            const lang = document.getElementById('lang-select').value;
            const container = document.getElementById('index-links');
            const term = searchInput.value.toLowerCase().trim();
            container.innerHTML = '';
            
            const filtered = shabads.filter(s => {
                const pool = [s.pb?.t, s.hi?.t, s.en?.t, s.pb?.c, s.hi?.c, s.en?.c].join(' ').toLowerCase();
                return pool.includes(term);
            }).sort((a, b) => (a[lang]?.t || a.pb?.t).localeCompare(b[lang]?.t || b.pb?.t));
            
            document.getElementById('count-num').innerText = filtered.length;
            
            filtered.forEach((s, idx) => {
                const item = document.createElement('div');
                item.className = 'index-item';
                item.onclick = () => openShabad(s.id);
                const text = document.createElement('div');
                text.className = 'shabad-link-text';
                text.innerText = `${idx + 1}. ${s[lang]?.t || s.pb?.t}`;
                item.appendChild(text);

                if(s.audio && s.audio.trim() !== "") {
                    const btn = document.createElement('button');
                    btn.className = 'play-index-btn';
                    // Determine if this specific item is playing
                    const isPlaying = !player.paused && player.src.includes(encodeURI(s.audio));
                    btn.innerHTML = isPlaying ? '⏸' : '▶';
                    btn.onclick = (e) => toggleAudio(e, s.id);
                    item.appendChild(btn);
                }
                container.appendChild(item);
            });
        }

        function switchView(isIndex) {
            if(isIndex) {
                document.getElementById('index-view').style.display = 'block';
                document.getElementById('shabad-view').style.display = 'none';
                document.getElementById('back-btn').style.display = 'none';
                document.getElementById('global-audio-wrap').style.display = 'none'; 
                document.body.classList.add('index-active');
                currentId = null;
                renderIndex();
            } else {
                document.getElementById('index-view').style.display = 'none';
                document.getElementById('shabad-view').style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';
                const s = shabads.find(x => x.id == currentId);
                if(s && s.audio) document.getElementById('global-audio-wrap').style.display = 'block';
                document.body.classList.remove('index-active');
            }
            window.scrollTo(0,0);
        }

        window.onpopstate = () => switchView(true);
        document.getElementById('back-btn').onclick = () => history.back();
        document.getElementById('theme-toggle').onclick = () => document.body.classList.toggle('dark-mode');
        document.getElementById('font-increase').onclick = () => { fontSize += 0.1; renderLyricsOnly(); };
        document.getElementById('font-decrease').onclick = () => { if(fontSize > 0.9) fontSize -= 0.1; renderLyricsOnly(); };
        document.getElementById('lang-select').onchange = updateUI;
        clearBtn.onclick = () => { searchInput.value = ''; clearBtn.style.display = 'none'; renderIndex(); };
        searchInput.oninput = function() { clearBtn.style.display = this.value ? 'flex' : 'none'; renderIndex(); };

        let lastST = 0;
        window.addEventListener("scroll", () => {
            let st = window.pageYOffset || document.documentElement.scrollTop;
            if (currentId === null) {
                if (st > 80 && st > lastST) document.getElementById('search-container').classList.add("search-hidden");
                else document.getElementById('search-container').classList.remove("search-hidden");
            }
            lastST = st;
        });

        updateUI();
    </script>
</body>
