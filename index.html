	{"id":1768760161620,
	"pb":{"t":"ਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ","c":"ਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ , \nਮੇਰੇ ਗ੍ਰਿਹਿ ਆਇਆ ਰਾਜਾ ਰਾਮ ਕੋ ਪਿਆਰਾ ॥ \n\nਆਗਨੁ ਬੰਗਲਾ ਭਵਨੁ ਭਯੋ ਪਾਵਨ , \nਹਰਿ ਜਨ ਬੈਠੇ ਹਰਿ ਜਸੁ ਗਾਵਨ , \nਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ ...\n\nਕਰਉ ਡੰਡਉਤ ਚਰਨ ਪਖਾਰਉ , \nਤਨੁ ਮਨੁ ਧਨੁ ਸਭ ਉਨ ਪਰ ਵਾਰਉ , \nਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ ...\n\nਕਥਾ ਕਹੇ ਅਰੁ ਅਰਥੁ ਵਿਚਾਰੇ , \nਆਪਿ ਤਰੇ ਅਉਰਨ ਕਉ ਤਾਰੇ , \nਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ ...\n\nਕਹੈ ਰੈਦਾਸ ਮਿਲੇ ਨਿਜ ਦਾਸਾ , \nਜਨਮ ਜਨਮ ਕੇ ਕਾਟੇ ਪਾਸਾ , \nਆਜੁ ਕੇ ਦਿਵਸ ਮੈ ਜਾਉ ਬਲਿਹਾਰਾ ..."},"hi":{"t":"आज के दिवस मैं जाऊं बलिहारा","c":"आज के दिवस मैं जाऊं बलिहारा ,\nमेरे घर आया राजा राम का प्यारा ।। \n\nआँगन बंगला भवन भयो पावन , \nहरिजन बैठे हरिजस गावन , \nआज के दिवस मैं जाऊं बलिहारा , \nमेरे घर आया राजा राम का प्यारा ।।\n\nकरूँ दंडवत चरण पखारूँ , \nतन मन धन सब उन पर वारूं , \nआज के दिवस मैं जाऊं बलिहारा , \nमेरे घर आया राजा राम का प्यारा ।।\n\nकथा कहे अरु अर्थ विचारे , \nआप तरे औरन को तारे , \nआज के दिवस मैं जाऊं बलिहारा , \nमेरें घर आया राजा राम का प्यारा ।।\n\nकहे रैदास मिले निज दासा , \nजनम जनम के काटे पासा , \nआज के दिवस मैं जाऊं बलिहारा , \nमेरें घर आया राजा राम का प्यारा ।।"},"en":{"t":"Aaj Ke Diwas Mein Jau Balihara","c":"Aaj Ke Diwas Mein Jau Balihara"}},

	{"id":1769018364260,"audio":"audio/KIRPA KARO DARSHAN.mp3",
	"pb":{"t":"ਕਿਰਪਾ ਕਰੋ ਦਰਸਨ ਗੁਣ ਗਾਵੈ","c":"ਹਰਿ ਪ੍ਰਭ ਪੂਰੇ ਠਾਕੁਰ ਸੁਆਮੀ , ਹਰਿ ਥਾਂਈ ਵਸੇ ਪ੍ਰਭ ਅੰਤਰਜਾਮੀ ॥ \nਹਰਿ ਮੇਰਾ ਰਾਮ ਪ੍ਰਭੁ ਅਬਿਨਾਸੀ , ਕਰਿਓ ਦਇਆ ਧ੍ਰੂ ਪ੍ਰਹਿਲਾਦ ਜੈਸੀ ॥ ਰਾਮ ਰਾਮ ਸਾਧੂ ਕੋ ਜੈਕਾਰੁ , ਰਾਮ ਨਾਮ ਕੀ ਮਹਿਮਾ ਅਪਰੰਪਾਰ ॥ \nਕਿਰਪਾ ਕਰੋ ' ਦਰਸਨ ' ਗੁਣ ਗਾਵੈ , ਹਰਿ ਜੀਉ ਉੱਤਮ ਨਾਮੁ ਤੁਮ੍ਹਾਰੋ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"किरपा करो दर्शन गुण गावै","c":"हरि प्रभ पूरे ठाकुर सुआमी , हर थांई वसे प्रभ अंतरयामी ।। \nहरि मेरा राम प्रभ अबिनासी , करेओ दया ध्रुव प्रहलाद जैसी ।। \nराम राम साधू को जैकार , राम नाम की महिमा अपरंपार ।। \nकिरपा करो दर्शन गुण गावै , हरि जीओ उत्तम नाम तुमारो ।।\n( यकीन )"},"en":{"t":"Kirpa Karo Darshan Gun Gaave","c":"Kirpa Karo Darshan Gun Gaave\nHar Prabh Pure Thakur Swami"}},

	{"id":1769018949381,
	"pb":{"t":"ਕਿਰਪਾ ਕਰੋ ਮੋਹੇ ਦਰਸੁ ਦੀਜੈ","c":"ਕਿਰਪਾ ਕਰੋ ਮੋਹੇ ਦਰਸੁ ਦੀਜੈ , ਮੇਰੇ ਸਤਿਗੁਰ ਪੁਰਖ ਬਿਧਾਤੇ ॥ \nਦੀਨ ਦਇਆਲ ਹੋਵੋ ਸਹਾਈ , ਸਿਮਰੇ ਨਾਮੁ ਤੁਮ੍ਹਾਰਾ ਜੀਉ ॥ \nਤੂੰ ਦਾਤਾ ਤੂੰ ਅੰਤਰਜਾਮੀ , ਸਾਜਨ ਸੁਖੁ ਨਿਹਾਰਾਂ ॥ \nਤੇਰੀ ਮਾਇਆ ਤੂੰ ਹੀ ਜਾਣੇ , ਤੁਮ ਵਡਾ ਠਾਕੁਰੁ ਹਮਾਰਾ ॥ \n' ਦਰਸਨ ' ਨੀਚ ਕੋ ਪ੍ਰਭ ਮਿਲਿਓ , ਪ੍ਰਭ ਆਪਣੀ ਕਿਰਪਾ ਧਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"किरपा करो मोहे दरस दीजे","c":"किरपा करो मोहे दरस दीजे , मेरे सतिगुर पुरख बिधाते ।। \nदीन दयाल होवो सहाई , सिमरे नाम तुमारा जीओ ।। \nतू दाता तू अंतरयामी , साजन सुख निहारां ।। \nतेरी माया तूं ही जाणे , तुम वड्डा ठाकुर हमारा ।। \nदर्शन नीच को प्रभ मिलेओ , प्रभ आपनी किरपा धारा ।।\n( यकीन )"},"en":{"t":"Kirpa Karo Mohe Daras Dije","c":"Kirpa Karo Mohe Daras Dije\nTu Data Tu Antaryami "}},

	{"id":1769019191343,
	"pb":{"t":"ਕਿਰਪਾ ਕਰੋ ਮੇਰੇ ਠਾਕੁਰ ਸਾਂਈ","c":"ਕਿਰਪਾ ਕਰੋ ਮੇਰੇ ਠਾਕੁਰ ਸਾਂਈ , ਹਉ ਤੁਧੁ ਪੈ ਵਾਰੀ ਜਾਂਈ ॥ \nਜਪਿ ਜੀਵਾਂ ਤੇਰਾ ਨਾਉ , ਮੇਰੇ ਗੋਬਿੰਦ ਗੁਸਾਂਈ ॥ \nਸਿਮਰਿ ਸਿਮਰਿ ਸਭ ਭਯੋ ਪੁਨੀਤ , ਮੈਂ ਮੂਰਖ ਕਿਆ ਚਤੁਰਾਈ ॥ \nਦੀਨ ਦਰਦ ਦੁਖ ਭੰਜਨਾ , ਕਾਟੋ ਜਮ ਕੀ ਫਾਹੀ ॥ \nਸਭਹਿ ਖੇਲੁ ਆਪੇ ਖੇਲੇ , ਦਾਸ ਜਨੋ ਕੋ ਦੇ ਵਡਿਆਈ ॥ \nਮੇਰੇ ਸਤਿਗੁਰੂ ਕੀਜੋ ਮਿਹਰ , ਰਾਖੋ ਆਪਣੀ ਸਰਣਾਈ ॥ \nਏਕੋ ਟੇਕ ' ਦਰਸਨ ' ਜੀਵੇ , ਕਾਹੇ ਕੋ ਦੇਰ ਲਗਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"किरपा करो मेरे ठाकुर सांई","c":"किरपा करो मेरे ठाकुर सांई , हउ तुध पे वारी जांई ।। \nजप जीवां तेरा नाओ , मेरे गोबिंद गोसांई ।।\nसिमर सिमर सभ भयो पुनीत , मैं मूरख किआ चतुराई ।। \nदीन दरद दुख भंजना , काटो जम की फाही ।। \nसभहि खेल आपे खेले , दास जनो को दे वडिआई ।। \nमेरे सतिगुरू कीजो मेहर , राखो अपनी शरनाई ।। \nएको टेक दर्शन जीवे , काहे को देर लगाई ।।\n( यकीन )"},"en":{"t":"Kirpa Karo Mere Thakur Sai","c":"Kirpa Karo Mere Thakur Sai"}},

	{"id":1769019423510,
	"pb":{"t":"ਕਿਰਪਾ ਨਿਧਾਨ ਕਿਰਪਾ ਕਰੋ ਜਨ ਅਪਨੇ","c":"ਕਿਰਪਾ ਨਿਧਾਨ ਕਿਰਪਾ ਕਰੋ ਜਨ ਅਪਨੇ , \nਹਰਿ ਜੀਉ ਉੱਤਮ ਨਾਮੁ ਤੁਮ੍ਹਾਰੋ ॥ \nਬੁਰਾ ਭਲਾ ਕਿਆ ਜਾਣੋ ਠਾਕੁਰ , ਸਭ ਮਾਹੇ ਤੇਰਾ ਪਸਾਰਾ ॥ \nਹਰਿ ਨਾਰਾਇਣ ਹਰਿ ਸਾਜਨ ਸੁਆਮੀ , ਤੇਰਾ ਸੋਹਣਾ ਸੁੰਦਰ ਮੁਖੁ ਸੁਹਾਵਾ ॥ \nਹਰੀ ਹਰਿ ਹਰਿ ਗੋਬਿੰਦ ਆਪੇ , ਗੁਰ ਸਬਦਿ ਸਹਜਿ ਸਮਾਇਆ ॥ \n' ਦਰਸਨ ' ਪ੍ਰਭ ਕਰੇ ਬੇਨੰਤੀ , ਮੋਹੇ ਨਾਮੁ ਦੀਜੈ ਮੁਕਤਿ ਅਧਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"किरपा निधान किरपा करो जन आपने","c":"किरपा निधान किरपा करो जन आपने , \nहरि जीओ उत्तम नाम तुमारा ।।\nबुरा भला किआ जानो ठाकुर , सभ माहे तेरा पसारा ।। \nहरि नारायण हरि साजन सुआमी , तेरा सोहणा सुंदर मुख सुहावा ।। \nहरी हरि हरि गोबिंद आपे , गुर शब्द सहज समाया ।।\nदर्शन प्रभ करे बेनंती , मोहे नाम दीजे मुक्त अधारा ।।\n(यकीन)"},"en":{"t":"Kirpa Nidhaan Kirpa Karo Jan Aapne","c":"Kirpa Nidhaan Kirpa Karo Jan Aapne"}},

	{"id":1769019762438,
	"pb":{"t":"ਕਿਰਪਾਲ ਕਿਰਪਾ ਨਿਧਾਨ ਕਰਮਯੋਗੀ","c":"ਕਿਰਪਾਲ ਕਿਰਪਾ ਨਿਧਾਨ ਕਰਮਯੋਗੀ ਕਰਮਦਾਤੇ , ਦੇਓ ਨਾਮੁ ਸੁਜਾਨ ॥ \nਦਇਆਲੁ ਹੋਆ ਜਨ ਅਪਨੇ , ਕੀਓ ਤਿਨਹੇ ਪਰਵਾਨ ॥ \nਨਾਮੁ ਧਿਆਵਾਂ ਪਰਮ ਸੁਖੁ ਪਾਵਾਂ , ਸਤਿਗੁਰ ਪੁਰਖ ਸੁਜਾਨ ॥ \nਨਾਨਕ ਪ੍ਰਭੁ ਅਪਣਾ ਸਿਮਰਾਂ , ਦੇਓ ਦਰਸੁ ਪ੍ਰਾਣ ਅਧਾਰ ॥ \nਰਾਖੁ ਲੇਓ ਠਾਕੁਰ ਗੋਬਿੰਦ ' ਦਰਸਨ ' ਕਹੇ ਪੁਕਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"किरपाल किरपा निधान करमयोगी","c":"किरपाल किरपा निधान करमयोगी करमदाते , देओ नाम सुजान ।। \nदयाल होआ जन अपने , कीओ तिनहे परवान ।। \nनाम धिआवां परम सुख पावां , सतिगुर पुरख सुजान ।। \nनानक प्रभ अपना सिमरां , देओ दरस प्राण अधार ।।\nराख लेओ ठाकुर गोबिंद दर्शन कहे पुकार ।। \n( यकीन )"},"en":{"t":"Kirpaal Kirpa Nidhaan Karamyogi","c":"Kirpaal Kirpa Nidhaan Karamyogi"}},

	{"id":1769020032280,
	"pb":{"t":"ਗੁਰ ਸੰਗਿ ਪ੍ਰੀਤਿ ਜੋ ਜਨ ਕਰੇ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ ) \nਗੁਰ ਸੰਗਿ ਪ੍ਰੀਤਿ ਜੋ ਜਨ ਕਰੇ , ਤਿਨਹੇ ਜਮੁ ਨਾ ਡਰਾਵੇ ਨਾ ਮਾਰੇ , \nਅਬ ਤਬ ਸਭ ਜਾਣੋ ਹਰਿ ਰਾਇ , ' ਦਰਸਨ ' ਮੁਕਤਿ ਸਰਣ ਪ੍ਰਭ ਪਾਏ ॥\n( ਯਕੀਨ )"},"hi":{"t":"गुर संग प्रीत जो जन करे ( दोहा )","c":"( दोहा )\nगुर संग प्रीत जो जन करे , तिनहे जम ना डरावे ना मारे , \nअब तब सभ जानो हरि राय , दर्शन मुक्त शरण प्रभ पाये ।।\n( यकीन )"},"en":{"t":"Guru Sang Preet Jo Jan Kare ( Doha )","c":"Guru Sang Preet Jo Jan Kare ( Doha )"}},

	{"id":1769020256184,
	"pb":{"t":"ਕਾਜ ਸਵਾਰੇ ਭਗਤ ਜਨੋ ਕੇ","c":"ਕਾਜ ਸਵਾਰੇ ਭਗਤ ਜਨੋ ਕੇ , ਰਾਖੇ ਪੈਜ ਰਾਖਣਹਾਰਾ , \nਆਪੇ ਵੰਡਦਾ ਨਾਮ ਭੰਡਾਰੇ , ਸੁਖ ਦੇਵੇ ਸਤਿਕਰਤਾਰਾ ॥ \nਨਦਰਿ ਕਰੇ ਸਭ ਉੱਤਮ ਹੋਵੇ , ਚਹੁਕੁੰਟ ਕਰੇ ਉਜਿਆਰਾ , \nਭਲੇ ਬੁਰੇ ਨਾਹੀ ਜਾਨਤ , ਸਚ ਕਾ ਸਦਾ ਕਰੇ ਵਪਾਰਾ ॥ \nਬਾਹਰ ਢੂੰਢੇ ਭੀਤਰ ਨਾ ਜਾਏ , ਭੀਤਰ ਬੈਠਾ ਸਿਰਜਣਹਾਰਾ , \nਜੋ ਜਨ ਸਿਮਰੇ ਮਨ ਚਿੱਤ ਲਾਏ , ਗੁਣ ਗਿਆਨ ਦੇਹੁ ਅਪਾਰਾ ॥ \nਜੋ ਸਮਝੇ ਔਰ ਕਰੇ ਧਿਆਨ , ' ਦਰਸਨ ' ਪਾਵੇ ਬ੍ਰਹਮ ਗਿਆਨ , \nਮੋਹ ਮਾਇਆ ਸਭ ਝੂਠੇ ਬੰਧਨ , ਗੁਰ ਸੰਗ ਛੂਟੇ ਸਭ ਵਿਕਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"काज सवारे भगत जनो के","c":"काज सवारे भगत जनो के , राखे पैज राखनहारा , \nआपे वंडदा नाम भंडारे , सुख देवे सतिकरतारा ।। \nनदर करे सभ उत्तम होवे , चहुँकुँट करे उजिआरा , \nभले बुरे नाही जानत , सच का सदा करे वपारा ।।\nबाहर ढूँढे भीतर न जाये , भीतर बैठा सिरजनहारा , \nजो जन सिमरे मन चित्त लाये , गुण गिआन देहु अपारा ।।\nजो समझे और करे धिआन , दर्शन पावे ब्रह्म गिआन , \nमोह माया सभ झूठे बंधन , गुर संग छूटे सभ विकारा ।।\n( यकीन )"},"en":{"t":"Kaaj Savaare Bhagat Jano Ke","c":"Kaaj Savaare Bhagat Jano Ke"}},

	{"id":1769020459975,
	"pb":{"t":"ਕਾਲਿੰਗਾ ਗੁਣੀ ਗਣੇਸ਼ ਸਾਰੰਗ ਨਾਭੀ","c":"ਕਾਲਿੰਗਾ ਗੁਣੀ ਗਣੇਸ਼ ਸਾਰੰਗ ਨਾਭੀ ਵਿਸ਼ਨੂੰ , \nਹਿਰਦੇ ਬ੍ਰਹਮ ਕੰਠ ਸ਼ਕਤੀ ਨੈਣਣ ਉਮਾ ਮਹੇਸ਼ ॥ \nਮਸਤਕ ਸਤਿਗੁਰ ਸ਼ਰਨ , ਨਾਨਕ ਗੋਬਿੰਦ ਆਦਿ ਨਮੈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"कालिंगा गुणी गणेश सारंग नाभी","c":"कालिंगा गुणी गणेश सारंग नाभी विशनूँ , \nहिरदे ब्रह्म कंठ शक्ती नैनण उमा महेश ।। \nमसतक सतिगुर शरन , नानक गोबिंद आदि नमै ।।\n( यकीन )"},"en":{"t":"Kaalinga Guni Ganesh Saarang Naabhi","c":"Kaalinga Guni Ganesh Saarang Naabhi"}},

	{"id":1769020635119,
	"pb":{"t":"ਗੰਗਾ ਜਮਨਾ ਸਰਸਵਤੀ ਦੇਓ ਏਹ ਵਰਦਾਨ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਗੰਗਾ ਜਮਨਾ ਸਰਸਵਤੀ ਦੇਓ ਏਹ ਵਰਦਾਨ , \nਸ਼ਿਵ ਉਠਾਓ ਗੰਗਾ ਵਿਸ਼ਨੂੰ ਦਾ ਫੁਰਮਾਨ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गंगा जमना सरसवती देओ एह वरदान ( दोहा )","c":"( दोहा )\nगंगा जमना सरसवती देओ एह वरदान , \nशिव उठाओ गंगा विशनूँ दा फरमान ।।\n( यकीन )"},"en":{"t":"Ganga Jamna Saraswati Deyo Eh Vardaan ( Doha )","c":"Ganga Jamna Saraswati Deyo Eh Vardaan ( Doha )"}},
	
	{"id":1769021030738,
	"pb":{"t":"ਕਾਲੀ ਕਾਲਿੰਗਾ ਕਾਇਆ ਕਲਪ ਕਰਮ ਦਾਤੀ","c":"( ਭਾਗ੍ਯ ਵਰਧਕ , ਦਾਤਾਂ ਦੇਣ ਵਾਲੀ , ਕਾਲੀ ਸ਼ਕਤੀ )\n\nਕਾਲੀ ਕਾਲਿੰਗਾ ਕਾਇਆ ਕਲਪ ਕਰਮ ਦਾਤੀ ਮੁਖੋਂ ਏਹ ਸਹਾਏ , \nਬੋਲ ਬਚਨ ਤਹਿਂ ਹਰਿ ' ਦਰਸਨ ' ਅਟਲ ਜਾਏ ॥ \nਅਟਲ ਅਸ਼ਟ ਅਠਸਠਿ ਤੀਰਥ ਇਸ਼ਨਾਨ , ਸਚਖੰਡ ਨਾਨਕ ਧਾਮ ॥ \nਜੋ ਇਸ਼ਨਾਨੁ ਸਰ ਸਰੋਵਰ ਕਰ ਜਾਏ , ਤਿਸੁ ਜਨ ਦੁਖ ਹਰੈ ਸਤਿਗੁਰ ਨਾਮੁ ਧਿਆਏ ॥ \nਨਮੈ ਨਮੈ ਨਮੈ ਨਮੇਓ ਡੰਡਉਤ ਵੰਦਨਾ , ਆਦਿ ਜੁਗਾਦਿ ਹੈ ਭੀ ਹੋਸੀ ,\n' ਦਰਸਨ ' ਪ੍ਰਭ ਤੇਰੀ ਸਰਣਾਈ , ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"काली कालिंगा काया कलप करम दाती","c":"( भाग्य वर्धक , दातें देने वाली , काली शक्ति )\n\nकाली कालिंगा काया कलप करम दाती मुखों एह सहाये , \nबोल बचन तहिं हरि दर्शन अटल जाये ।।\nअटल अष्ट अठसठि तीरथ इश्नान , सचखण्ड नानक धाम ।।\nजो इश्नान सर सरोवर कर जाये , तिस जन दुख हरै सतिगुर नाम धिआये ।।\nनमै नमै नमै नमेओ डंडौत वंदना , आदि जुगादि है भी होसी , \nदर्शन प्रभ तेरी शरनाई , हरि राय ।।\n( यकीन )"},"en":{"t":"Kaali Kalinga Kaaya Kalap Karam Daati","c":"Kaali Kalinga Kaaya Kalap Karam Daati"}},

	{"id":1769021340367,
	"pb":{"t":"ਕੈਸੇ ਕਰੂੰ ਤੇਰੀ ਮੈਂ ਅਰਾਧਨਾ","c":"ਕੈਸੇ ਕਰੂੰ ਤੇਰੀ ਮੈਂ ਅਰਾਧਨਾ ਮੋਹੇ ਗੁਣ ਨਾਹੀ ਰੇ ॥\nਸਾਂਵਲੇ ਰੰਗੀਲੇ ਪ੍ਰੀਤਮ ਪਿਆਰੇ , \nਚਰਨ ਪ੍ਰੀਤਿ ਦੇਹੋ ਮੋਹੇ ਪ੍ਰਤਿਪਾਲੇ , ਮੈਂ ਜਾਊਂ ਬਲਿਹਾਰੇ ॥\nਗੁਰ ਬਿਨੁ ਮੁਕਤਿ ਨ ਪਾਇਓ ਕੋਇ , \nਹਰਿ ਕੀ ਭਗਤੀ ਗੁਰ ਸੰਗਿ ਹੋਏ , ਗੁਰਿ ਗਿਆਨੁ ਬਤਾਇਓ ਰੇ ॥\nਦਾਸ ਕੀ ਆਸ ਪੂਰੀ ਕੀਜੈ , \nਹਿਰਦੇ ਵਾਸੁ ਕਰਿ ਚਰਨੋਂ ਮੇਂ ਲੀਜੈ , ਮੋਹੇ ' ਦਰਸਨ ' ਕੀ ਪਿਆਸ ਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"कैसे करूँ तेरी मैं अराधना","c":"कैसे करूँ तेरी मैं अराधना मोहे गुण नाही रे ।।\nसांवले रंगीले प्रीतम पिआरे , \nचरण प्रीत देहो मोहे प्रितपाले , मैं जाऊँ बलिहारे ।।\nगुर बिन मुक्त ना पायो कोये , \nहरि की भगती गुर संग होये , गुर गिआन बतायो रे ।।\nदास की आस पूरी कीजै , \nहिरदे वास कर चरणों में लीजै , मोहे दर्शन की पिआस रे ।।\n( यकीन )"},"en":{"t":"Kaise Karu Teri Mein Araadhna","c":"Kaise Karu Teri Mein Araadhna"}},

	{"id":1769021625113,
	"pb":{"t":"( ਖ਼ਤਰਾ )","c":"( ਖ਼ਤਰਾ )\n\nਈਮਾਨ ਕੋ ਨਹੀਂ ਇਨਸਾਨ ਕੋ , ਸਾਧੂ ਕੋ ਨਹੀਂ ਸ਼ੈਤਾਨ ਕੋ ॥ \nਬੁਲ ਕੋ ਨਹੀਂ ਗੁਲ ਕੋ , ਖ਼ੁਦਾ ਕੋ ਨਹੀਂ ਖ਼ੁਦ ਕੋ ॥ \nਧਰਮ ਕੋ ਨਹੀਂ ਸ਼ਰਮ ਕੋ , ਸਾਂਝ ਕੋ ਨਹੀਂ ਭਰਮ ਕੋ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"( खतरा )","c":"( खतरा )\n\nईमान को नहीं इन्सान को , साधू को नहीं शैतान को ।। \nबुल को नहीं गुल को , खुदा को नहीं खुद को ।। \nधरम को नहीं शरम को , सांझ को नहीं भरम को ।।\n( यकीन )"},"en":{"t":"Khatra ","c":"Khatra "}},

	{"id":1769022174547,
	"pb":{"t":"ਗੰਭੀਰ ਗੁਸਾਂਈ ਗੁਣੀਆਰ ਬਿਧਾਤੇ","c":"ਗੰਭੀਰ ਗੁਸਾਂਈ ਗੁਣੀਆਰ ਬਿਧਾਤੇ , \nਗੁਰ ਸਾਜਨ ਸਤਿਗੁਰ ਪੁਰਖ ਹਰਿ ਰਾਇ ॥\n\nਗੁਣੀਆਰ ਬਿਧਾਤੇ ਗੁਰੂ ਗੰਭੀਰ ਪੁਰਖ , ਸਤਿਗੁਰ ਸਾਜਨ ਹਰਿ ਰਾਇ ॥ \nਬਿਧਾਤੇ ਪੁਰਖ ਸਾਜਨ ਸਤਿਗੁਰ , ਗੁਰੂ ਗੰਭੀਰ ਹਰਿ ਰਾਇ ॥\n\nਸਤਿਗੁਰੂ ਗੁਰੂ ਗੰਭੀਰ ਗੁਣੀਆਰ ਬਿਧਾਤਾ , ਪੁਰਖੈ ਸੁਜਾਨਾ ਹਰਿ ਰਾਇ ॥ \nਪੁਰਖ ਸੁਜਾਨਾ ਸਤਿਗੁਰ ਗੁਣੀਆਰ , ਗੰਭੀਰ ਬਿਧਾਤੇ ਹਰਿ ਰਾਇ ॥\n\nਸਜਣ ਬਿਧਾਤਾ ਗੁਣੀਆਰ ਗੁਰੂ ਗੰਭੀਰ , ਸਤਿਗੁਰ ਪੁਰਖੈ ਹਰਿ ਰਾਇ ॥ \nਹਮ ਗਰੀਬ ਗੁਣ ਨਾ ਕੋਈ , ਤੁਮ ਦਾਨੁ ਦੇਓ ਮਿਹਰਬਾਨ ॥\n\nਮਿਹਰਬਾਨ ਮਿਹਰਬਾਨ ਹਮ ਗਰੀਬ ਦੇਓ ਦਾਨ , ਮੁਕਤਿ ਭੁਗਤਿ ਮਤਿ ਸੁਜਾਨ ॥ \nਗੁਣੀ ਗੁਣੀਆਰ ਗੁਰੂ ਗੰਭੀਰ ਸਤਿਗੁਰੂ ਮਿਹਰਬਾਨ , \nਗੁਰੂ ਗੰਭੀਰ ਦੇਓ ਦਾਨੁ ਨਾਮੁ ॥\n\nਪ੍ਰਤਿਪਾਲ ਠਾਕੁਰ ਜੀਉ ਜੋ ਤੁਧੁ ਮਨਿ ਭਾਣਾ , \nਦੇਓ ਦਰਸੁ ' ਦਰਸਨ ' ਸਰਣਾਈ ਹਮੇ ਮਿਹਰਬਾਨ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गंभीर गोसांई गुणिआर बिधाते","c":"गंभीर गोसांई गुणिआर बिधाते , \nगुर साजन सतिगुर पुरख हरि राय ।।\n\nगुणिआर बिधाते गुरू गंभीर पुरख , सतिगुर साजन हरि राय ।।\nबिधाते पुरख साजन सतिगुर , गुरू गंभीर हरि राय ।।\n\nसतिगुरू गुरू गंभीर गुणिआर बिधाता , पुरखै सुजाना हरि राय ।। \nपुरख सुजाना सतिगुर गुणिआर , गंभीर विधाते हरि राय ।।\n\nसजन बिधाता गुणिआर गुरू गंभीर , सतिगुर पुरखै हरि राय ।।\nहम गरीब गुण ना कोई , तुम दान देओ मेहरबान ।।\n\nमेहरबान मेहरबान हम गरीब देओ दान , मुक्त भुगत मत्त सुजान ॥\nगुणी गुणिआर गुरू गंभीर सतिगुरू मेहरबान , \nगुरू गंभीर देओ दान नाम ।।\n\nप्रितपाल ठाकुर जीओ जो तुध मन भाणा , \nदेओ दरस दर्शन शरनाई हमे मेहरबान ।।\n( यकीन )"},"en":{"t":"Gambhir Gosai Guniyar Bidhaate","c":"Gambhir Gosai Guniyar Bidhaate"}},

	{"id":1769022488945,
	"pb":{"t":"ਗੁਰੂ ਬਿਨੁ ਨਾਹੀ ਕੋਈ ਸਹਾਰਾ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਗੁਰੂ ਬਿਨੁ ਨਾਹੀ ਕੋਈ ਸਹਾਰਾ , \nਗੁਰ ਸਰਣਿ ਮਿਲੇ ਮੁਕਤਿ ਦੁਆਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू बिन नाही कोई सहारा ( दोहा )","c":"( दोहा )\nगुरू बिन नाही कोई सहारा , \nगुर शरण मिले मुक्त दुआरा ।। \n( यकीन )"},"en":{"t":"Guru Bin Naahi Koi Sahara ( Doha )","c":"Guru Bin Naahi Koi Sahara ( Doha )"}},

	{"id":1769022726794,
	"pb":{"t":"ਗੁਰ ਪਾਰਬ੍ਰਹਮ ਪਰਮੇਸਰ ਦੀਓ ਨਾਮੁ","c":"ਗੁਰ ਪਾਰਬ੍ਰਹਮ ਪਰਮੇਸਰ ਦੀਓ ਨਾਮੁ ਅਧਾਰੁ , \nਸੰਤ ਜਨ ਤੁਧੁ ਨਾਹੀ ਭੇਦ ਪੂਰਨ ਪੁਰਖ ਮੁਰਾਰ ॥ \nਸੇਵ ਭਯੋ ਜਗਤ ਸੰਤਨ ਕੀ ਮੁਕਤਿ ਕੀਓ ਹਰਿ ਰਾਇ , \nਤੁਝ ਮਾਹੇ ਮਨੁ ਮਾਨੇ ਤੁਮ ਹੋਵੋ ਸਹਾਏ , \n' ਦਰਸਨ ' ਸਤਿਗੁਰ ਪੂਰੇ ਮੇਰੇ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुर पारब्रह्म परमेशर दीओ नाम","c":"गुर पारब्रह्म परमेशर दीओ नाम अधार , \nसंत जन तुध नाही भेद पूरन पुरख मुरार ।।\nसेव भयो जगत संतन की मुक्त कीओ हरि राय , \nतुझ माहे मन माने तुम होवो सहाये , \nदर्शन सतिगुर पूरे मेरे हरि राय ।।\n( यकीन )"},"en":{"t":"Guru Paarbhram Parmeshvar Deyo Naam","c":"Guru Paarbhram Parmeshvar Deyo Naam"}},

	{"id":1769022909669,
	"pb":{"t":"ਗੁਰ ਪੂਰੇ ਹਉ ਜਾਊਂ ਕੁਰਬਾਨ","c":"ਗੁਰ ਪੂਰੇ ਹਉ ਜਾਊਂ ਕੁਰਬਾਨ , ਗੁਰ ਪੂਰੇ ਸਦਾ ਸਦਾ ਮਿਹਰਬਾਨ ॥ \nਗੁਰ ਅਠਸਠਿ ਤੀਰਥ ਇਸ਼ਨਾਨ , ਗੁਰ ਪੂਰੇ ਰੱਖ ਆਨ ਮਾਨ ॥ \nਗੁਰ ਪੂਰੇ ਠਾਕੁਰ ਰਾਮ ਸਮਾਨ , ਗੁਰ ਪੂਰੇ ਪੰਚ ਸਬਦ ਗਿਆਨ ॥ \nਗੁਰ ਪੂਰੇ ਦੇਵਤ ਨਾਮ ਦਾਨ , ਗੁਰ ਪੂਰੇ ਵਸਿ ਕ੍ਰੋਧ ਕਾਮ ॥ \nਗੁਰ ਦਰਗਾਹੇ ਪਾਇਓ ਮਾਣ , ਗੁਰ ਕੇ ' ਦਰਸਨ ' ਦੁਖ ਕੱਟੇ ਜਾਣ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुर पूरे हउँ जाऊँ कुरबान","c":"गुर पूरे हउँ जाऊँ कुरबान , गुर पूरे सदा सदा मेहरबान ।।\nगुर अठसठि तीरथ इश्नान , गुर पूरे रख आन मान ।।\nगुर पूरे ठाकुर राम समान , गुर पूरे पँच शब्द गिआन ।।\nगुर पूरे देवत नाम दान , गुर पूरे वस क्रोध काम ।।\nगुर दरगाहे पायो माण , गुर के दर्शन दुख कट्टे जाण ।।\n( यकीन )"},"en":{"t":"Guru Poore Hau Jaau Kurbaan ","c":"Guru Poore Hau Jaau Kurbaan "}},

	{"id":1769023125903,
	"pb":{"t":"ਗੁਰਬਾਣੀ ਗੁੜ ਮਿੱਠੀ ਲਾਗੀ","c":"ਗੁਰਬਾਣੀ ਗੁੜ ਮਿੱਠੀ ਲਾਗੀ , ਗੁਰੂ ਗੁਰੂ ਗੁਰ ਦੀਜੈ ॥\n\nਚਰਣ ਧੋਏ ਗੁਰ ਆਪਣੇ ਜੀਉ , ਚਰਣਾਮਤ ਭਰ ਪੀਜੈ ॥ \nਸਹਜਿ ਨਿਵਾਜੇ ਕਿਰਪਾ ਕਰੋ , ਗੁਰਮੁਖਿ ਗੁਰ ਨਾਮੁ ਦੀਜੈ ॥\n\nਗਗਨ ਗੁਰੂ ਗੰਗਾ ਗੁਰੂ , ਗੁਰੂ ਗੋਦਾਵਰੀ ਜੀਉ ॥ \nਭਗਵਤ ਜੀਉ , ਭਵਜਲ ਪਾਰਿ ਕਰੀਜੈ ॥\n\nਗੁਰੂ ਰਾਮ ਗੁਰੂ ਵਿਸ਼ਨੂੰ ਬ੍ਰਹਮਾ ਗੁਰੂ ਮਹੇਸ਼ ਪਾਰਬਤੀ ਜੀਉ ॥ \n' ਦਰਸਨ ' ਕਹਤ ਗੁਰੂ ਪੂਰੇ , ਮੇਰੇ ਗੋਬਿੰਦ ਦਰਸੁ ਦੀਜੈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरबाणी गुड़ मीठी लागी","c":"गुरबाणी गुड़ मीठी लागी , गुरू गुरू गुर दीजै ।। \n\nचरण धोये गुर आपणे जीओ , चरणामत भर पीजै ।। \nसहज निवाजे किरपा करो , गुरमुख गुर नाम दीजै ।।\n\nगगन गुरू गंगा गुरू , गुरू गोदावरी जीओ ।। \nभगवत जीओ , भवजल पार करीजै ।।\n\nगुरू राम गुरू विशनूँ ब्रह्मा गुरू महेश पारबती जीओ।।\nदर्शन कहत गुरू पूरे , मेरे गोबिंद दरस दीजै ।।\n( यकीन )"},"en":{"t":"Gurubani Gurr Meethi Laage","c":"Gurubani Gurr Meethi Laage"}},

	{"id":1769023403479,
	"pb":{"t":"ਗੁਰੂ ਸਤਿਗੁਰੂ ਭੇਦੁ ਨਾਹੀ ਕੋਇ","c":"ਗੁਰੂ ਸਤਿਗੁਰੂ ਭੇਦੁ ਨਾਹੀ ਕੋਇ , \nਗੁਰੂ ਸਤਿਗੁਰੂ ਇਕ ਥਾਂਏ ਖਲੋਏ ॥\n\nਸਤਿਗੁਰੂ ਦੀਓ ਮੋਹੇ ਪੰਚ ਵਿਕਾਰ , \nਗੁਰੂ ਮੋਹੇ ਦੀਓ ਪਿਆਰ ॥ \n\nਸਤਿਗੁਰੂ ਦੀਓ ਮੋਹੇ ਜਮ ਕਾ ਫੰਧਾ , \nਗੁਰੂ ਮੋਹੇ ਦੀਓ ਨਾਮ ਕਾ ਡੰਡਾ ॥ \n\nਸਤਿਗੁਰੂ ਦੀਓ ਮੋਹੇ ਮਾਇਆ ਜਾਲ , \nਗੁਰੂ ਦੀਓ ਮੋਹੇ ਭਵਜਲ ਨਿਕਾਲ ॥\n\n' ਦਰਸਨ ' ਜਨ ਕਹੇ ਗੁਰੂ ਨਿਆਰਾ ਇਆਂ ਉਆਂ ਬਣੈ ਸਹਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू सतिगुरू भेद नाही कोये","c":"गुरू सतिगुरू भेद नाही कोये , \nगुरू सतिगुरू इक थांये खलोये ।। \n\nसतिगुरू दीओ मोहे पँच विकार , \nगुरू मोहे दीओ पिआर ।।\n\nसतिगुरू दीओ मोहे जम का फँधा , \nगुरू मोहे दीओ नाम का डंडा ।। \n\nसतिगुरू दीओ मोहे माया जाल , \nगुरू दीओ मोहे भवजल निकाल ।। \n\nदर्शन जन कहे गुरू निआरा इआं उआं बणै सहारा ।।\n( यकीन )"},"en":{"t":"Guru Satguru Bhed Naahi Koye","c":"Guru Satguru Bhed Naahi Koye"}},

	{"id":1769023636911,
	"pb":{"t":"ਗੁਰੂ ਨਾਨਕ ਸਭਹਾਂ ਤੋਂ ਵੱਡਾ","c":"ਗੁਰੂ ਨਾਨਕ ਸਭਹਾਂ ਤੋਂ ਵੱਡਾ ਤੇਰਾ ਮਹਲੁ ਚੁਬਾਰਾ ॥ \nਖਿਮਾ ਖੁਮਾਰੀ ਨਾਮੁ ਦੇਓ , ਖੋਜਤ ਮਨੁ ਭਯੋ ਗਵਾਰਾ ॥\n\nਸਗਲ ਸੂਖ ਰਹਿ ਰਵਿਆ ਮੇਰਾ ਸੁਆਮੀ , \nਬੇਅੰਤ ਅਗਮ ਊਚਾ ਤਾਂਕਾ ਦੁਆਰਾ ॥\n\nਦੇਓ ਪ੍ਰੀਤਿ ਅਪਣੀ ਮੇਰੇ ਰਾਮ ਜੀਉ , \nਕਰੇ ਅਰਜੋਈ ' ਦਰਸਨ ' ਬੇਚਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू नानक सभहां तों वड्डा","c":"गुरू नानक सभहां तों वड्डा तेरा महल चुबारा ।। \nखिमा खुमारी नाम देओ , खोजत मन भयो गवारा ।। \n\nसगल सूख रह रवेआ मेरा सुआमी , \nबेअंत अगम ऊचा तांका दुआरा ।।\n\nदेओ प्रीत अपणी मेरे राम जीओ , \nकरे अरजोई दर्शन बेचारा ।।\n( यकीन )"},"en":{"t":"Guru Nanak Sabna To Vadda","c":"Guru Nanak Sabna To Vadda"}},

	{"id":1769023855409,
	"pb":{"t":"ਗੁਰੂ ਨਾਨਕ ਤੇਰੀ ਵਡਿਆਈ","c":"ਗੁਰੂ ਨਾਨਕ ਤੇਰੀ ਵਡਿਆਈ , ਬੇਅੰਤ ਅਪਰੰਪਾਰ ਜੀਉ ॥ \nਮੇਰੇ ਠਾਕੁਰ ਪ੍ਰਭ ਦਾਤਾਰ ਜੀਉ , ਅੰਤਰ ਕੀ ਬਿਧਿ ਤੁਧ ਹੀ ਜਾਨੀ ॥\n\nਸਤਿਗੁਰ ਆਪੇ ਕਰਨੇਹਾਰ ਜੀਉ , ਕਰਿ ਕਿਰਪਾ ਤੇਰਾ ਨਾਮੁ ਧਿਆਈ ॥ \nਤੂੰ ਪ੍ਰਭ ਮੇਰਾ ਬਖ਼ਸ਼ਣਹਾਰ ਜੀਉ , ਤਨੁ ਮਨੁ ਧਨੁ ਸਭ ਤੇਰੀ ਮਾਇਆ ॥\n\nਤੁਮ ਵਡਾ ਹਰਿ ਮਿਹਰਬਾਨ ਜੀਉ , ਹਰਿ ਸੇਉ ਹਰਿ ਮਿਲਿਆ ਮਾਹੇ ॥ \nਮੇਰਾ ਸੁਆਮੀ ਦੀਨ ਦਇਆਲ ਜੀਉ , ਨਾਮੁ ਸਿਮਰਿ ਮੋਹੇ ਮਨਿ ਸ਼ਾਂਤਿ ਆਵੇ ॥\n\nਸਰਬ ਵਿਆਪੀ ਸਤਿਗੁਰ ਮੇਰੇ ਜੀਉ , ਰਹਿ ਰਵਿਆ ਸਭਨੀ ਥਾਂਉ ਜੀਉ ॥ \n' ਦਰਸਨ ' ਦਾਸ ਗੁਰੂ ਨਾਨਕ ਪੂਰਾ ਭੇਟਿਓ , ਤਨੁ ਮਨੁ ਹੋਇਆ ਨਿਹਾਲ ਜੀਉ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू नानक तेरी वडियाई","c":"गुरू नानक तेरी वडियाई , बेअंत अपरम्पार जीओ ।। \nमेरे ठाकुर प्रभ दातार जीओ , अंतर की बिध तुध ही जानी ।।\n\nसतिगुर आपे करनेहार जीओ , कर किरपा तेरा नाम धिआई ।। \nतूं प्रभ मेरा बख्शनहार जीओ , तन मन धन सभ तेरी माया ।। \n\nतुम वड्डा हरि मेहरबान जीओ , हरि सेओं हरि मिलेआ माहे ।।\nमेरा सुआमी दीन दयाल जीओ , नाम सिमर मोहे मन शांत आवे ।।\n\nसरब विआपी सतिगुर मेरे जीओ , रह रवेआ सभनी थांओं जीओ ।। \nदर्शन दास गुरू नानक पूरा भेटेओ , तन मन होया निहाल जीओ ।।\n( यकीन )"},"en":{"t":"Guru Nanak Teri Vadeyai","c":"Guru Nanak Teri Vadeyai"}},

	{"id":1769024182792,
	"pb":{"t":"ਗੁਰੂ ਪ੍ਰਾਣ ਪੰਥ ਪੂਰਾ","c":"ਗੁਰੂ ਪ੍ਰਾਣ ਪੰਥ ਪੂਰਾ , ਗੁਰੂ ਬਿਨੁ ਜਨੁ ਸਦਾ ਅਧੂਰਾ ॥ \nਗੁਰੂ ਪ੍ਰਭੁ ਜਾਣੋ ਏਕ , ਗੁਰੂ ਬਿਨੁ ਨਾਹੀ ਕੋਈ ਟੇਕ ॥ \nਗੁਰੂ ਪ੍ਰਭੁ ਭਰੇ ਭੰਡਾਰ , ਗੁਰੂ ਬਿਨੁ ਨਾਹੀ ਉਤਰੇ ਪਾਰ ॥ \nਗੁਰੂ ਪ੍ਰਭੁ ਏਕੋ ਆਸ , ਗੁਰੂ ਬਿਨੁ ਨਾਹੀ ਕੋਈ ਸੱਚੀ ਰਾਸਿ ॥ \nਗੁਰ ਸਰਣਿ ਮਿਲੇ ਮੁਕਤਿ ਦੁਆਰਾ , ' ਦਰਸਨ ' ਭਵਜਲ ਪਾਰਿ ਉਤਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू प्राण पंथ पूरा","c":"गुरू प्राण पंथ पूरा , गुरू बिन जन सदा अधूरा ।।\nगुरू प्रभ जानो एक , गुरू बिन नाहीं कोई टेक ।।\nगुरू प्रभ भरे भंडार , गुरू बिन नाही उतरे पार ।। \nगुरू प्रभ एको आस , गुरू बिन नाही कोई सच्ची रास ।।\nगुरू शरण मिले मुक्त दुआरा , दर्शन भवजल पार उतारा ।।\n( यकीन )"},"en":{"t":"Guru Praan Panth Poora","c":"Guru Praan Panth Poora"}},

	{"id":1769024382487,
	"pb":{"t":"ਗੁਰੂ ਪ੍ਰੇਮੁ ਸਭ ਸੇ ਨਿਆਰਾ","c":"ਗੁਰੂ ਪ੍ਰੇਮੁ ਸਭ ਸੇ ਨਿਆਰਾ , ਗੁਰ ਸਰਣਿ ਮਿਲਸੀ ਮੁਕਤਿ ਦੁਆਰਾ ॥ \nਗੁਰੂ ਕੀ ਮਹਿਮਾ ਅਪਰੰਪਾਰ , ਗੁਰ ਸੰਗਿ ਭਵਜਲੁ ਹੋਸੀ ਪਾਰ ॥ \nਗੁਰੂ ਸੰਗਿ ਪ੍ਰਭੁ ਸਦਾ ਦਇਆਲ , ਗੁਰੂ ਸੇਵਾ ਕਾਰਜ ਆਵੈ ਰਾਸਿ ॥ \nਗੁਰੂ ਕਿਰਪਾ ਪ੍ਰਭੁ ਹੋਵੈ ਸਹਾਈ , ਗੁਰੂ ਉੱਤਮ ਨਾਮੁ ਕਮਾਈ ॥ \nਗੁਰੂ ਗਿਆਨ ਗੁਣ ਭੰਡਾਰ , ਗੁਰੂ ਕਰਮ ਧਰਮ ਚਾਰ ॥ \nਗੁਰੂ ਭੇਦੁ ਨ ਸਤਿ ਕਰਤਾਰ , ਗੁਰੂ ਹਿਰਦੇ ਵਸੇ ਅਗੰਮ ਦਾਤਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू प्रेम सभ से निआरा","c":"गुरू प्रेम सभ से निआरा , गुरू शरन मिलसी मुक्त दुआरा ।। \nगुरू की महिमा अपरम्पार , गुरू संग भवजल होसी पार ।। \nगुरू संग प्रभ सदा दयाल , गुरू सेवा कारज आवे रास ।। \nगुरू किरपा प्रभ होवे सहाई , गुरू उत्तम नाम कमाई ।। \nगुरू गिआन गुण भंडार , गुरू करम धरम चार ।। \nगुरू भेद ना सतिकरतार , गुरू हिरवे वसे अगंम दातार ।।\n( यकीन )"},"en":{"t":"Guru Prem Sabh Se Nyara","c":"Guru Prem Sabh Se Nyara"}},

	{"id":1769024629663,
	"pb":{"t":"ਗੁਰੂ ਪ੍ਰੇਮੁ ਰੱਖਣਾ ਗੁਰੂ ਹੁਕਮ ਮਾਹਿ","c":"ਗੁਰੂ ਪ੍ਰੇਮੁ ਰੱਖਣਾ , ਗੁਰੂ ਹੁਕਮ ਮਾਹਿ ਚਲਣਾ , \nਹੁਕਮੁ ਮੰਨਿ ਹੋਵੈ ਪਾਰਿ ਉਤਾਰਾ ॥ \n\nਹੁਕਮੁ ਮੰਨੇ ਦਰਗਾਹਿ ਮਾਣੁ ਪਾਵੇ , ਅਠਸਠਿ ਤੀਰਥ ਕਰੇ ਪਾਰਿ ਉਤਾਰਾ ॥\nਹੁਕਮੁ ਮੰਨੇ ਦੁਖੁ ਨਾ ਬਿਆਪੇ , ਸੁਖੁ ਦੇਹੁ ਸਹਜਿ ਕਰਤਾਰਾ ॥ \n\nਹੁਕਮੁ ਮੰਨੇ ਪਰਮਪਦੁ ਪਾਵੈ , ਹੋਸੀ ਊਚਾ ਤੇਰਾ ਸੇਵਾਦਾਰਾ ॥ \nਹੁਕਮੁ ਮੰਨੇ ਜੁਗਾਦਿ ਹੋਸੀ ਸਚੁ , ਨਾਨਕ ਸਚੁ ਹੈ ਨਾਨਕ ਸਦਾ ਹੀ ਸਚੁ ॥\n\nਤੂੰ ਪ੍ਰਭ ਪਾਪ ਬਖ਼ਸ਼ੰਦਾ , ਦਰਸੁ ਦੇਓ ਕਰਾਂ ਬੇਨਤੀ , \n' ਦਰਸਨ ' ਦਾਸੁ ਤੁਮ੍ਹਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू प्रेम रखणा गुरू हुकम माहि","c":"गुरू प्रेम रखणा , गुरू हुकम माहि चलणा , \nहुकम मन्न होवे पार उतारा ।। \n\nहुकम मन्ने दरगाहि मान पावे , अठसठि तीरथ करे पार उतारा ।। \nहुकम मन्ने दुख ना बिआपे , सुख देहु सहज करतारा ।।\n \nहुकम मन्ने परमपद पावै , होसी ऊचा तेरा सेवादारा ।। \nहुकम मन्ने जुगादि होसी सच , नानक सच है नानक सदा ही सच ।।\n\nतूं प्रभ पाप बख्शंदा , दरस देओ करां बेनती , \nदर्शन दास तुमारा ।।\n( यकीन )"},"en":{"t":"Guru Prem Rakhna Guru Hukam Maahi","c":"Guru Prem Rakhna Guru Hukam Maahi"}},

	{"id":1769024905620,
	"pb":{"t":"ਗੁਰੂ ਪੂਰੇ ਮੇਰੇ ਠਾਕੁਰ ਨਾਰਾਇਣ","c":"ਗੁਰੂ ਪੂਰੇ ਮੇਰੇ ਠਾਕੁਰ ਨਾਰਾਇਣ , \nਆਪਣੇ ਸਤਿਗੁਰੂ ਹਉ ਜਾਊਂ ਕੁਰਬਾਨ ਜੀਉ ॥ \nਹਰਿ ਜਨ ਹਰਿ ਏਕੋ ਸਮਾਨ , ਮੇਰੇ ਪ੍ਰੀਤਮ ਭਯੋ ਮਿਹਰਬਾਨ ਜੀਉ ॥ \nਸਾਧ ਸੰਗਿ ਪ੍ਰਭੁ ਹੋਵੈ ਦਇਆਲ , ਨਾਮੁ ਜਪਤ ਸਫਲ ਸਭਹਿ ਕਾਮ ॥\nਸਤਿਗੁਰੂ ਨਾਨਕ ਵੱਡੇ ਸਾਹਿਬ ਸਾਂਈ , \n' ਦਰਸਨ ' ਕਹਤ ਹਰਿ ਸਿਮਰਿ ਮੁਕਤਿ ਪਾਈ , \nਪੂਰਨ ਪੁਰਖ ਬਖ਼ਸ਼ੇ ਜਨ ਆਪਣੇ ਵਡਿਆਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरू पूरे मेरे ठाकुर नारायण","c":"गुरू पूरे मेरे ठाकुर नारायण , \nआपणे सतिगुरू हऊँ जाऊँ कुरबान जीओ ।। \nहरि जन हरि एको समान , मेरे प्रीतम भयो मेहरबान जीओ ।। \nसाध संग प्रभ होवे दयाल , नाम जपत सफल सभहि काम ।। \nसतिगुरू नानक वड्डे साहिब सांई , \nदर्शन कहत हरि सिमर मुक्त पाई , \nपूरन पुरख बख्शे जन आपने वडियाई ।।\n( यकीन )"},"en":{"t":"Guru Poore Mere Thakur Narayan","c":"Guru Poore Mere Thakur Narayan"}},

	{"id":1769025396202,
	"pb":{"t":"ਗੁਰ ਪੂਰੇ ਮੇਰੇ ਪਿਤਾ ਦਸਮੇਸ਼","c":"ਗੁਰ ਪੂਰੇ ਮੇਰੇ ਪਿਤਾ ਦਸਮੇਸ਼ , ਦਇਆਲ ਹੋਵੋ ਕਾਟੋ ਭਰਮ ਕਲੇਸ਼ ॥ \nਸਿਮਰੇ ਨਾਮੁ ਤੁਮ੍ਹਾਰਾ ਮੇਰੇ ਸਾਹਿਬ ਜੀਉ , ਸੰਤ ਰੈਣਿ ਇਸ਼ਨਾਨੁ ਪਰਹਰੇ ਜੀਉ ॥ \nਅੰਧਲ ਟੇਕ ਤੁਮਾਰੀ ਮੇਰੇ ਸੁਆਮੀ , ਭਵਜਲੁ ਪਾਰਿ ਕਰੋ ॥ \nਤਪੋਂ ਰਾਜੁ ਬਿਠਾਇੰਦਾ , ' ਦਰਸਨ ' ਰਾਜੋਂ ਰੰਕੁ ਕਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुर पूरे मेरे पिता दसमेश","c":"गुर पूरे मेरे पिता दसमेश , दयाल होवो काटो भरम कलेश ।।\nसिमरे नाम तुमारा मेरे साहिब जीओ , संत रैण इश्नान परहरे जीओ ।।\nअंधल टेक तुमारी मेरे सुआमी , भवजल पार करो ।।\nतपों राज बिठाइंदा , दर्शन राजों रंक करे ।।\n( यकीन )"},"en":{"t":"Guru Poore Mere Pita Dashmesh","c":"Guru Poore Mere Pita Dashmesh"}},

	{"id":1769025794791,
	"pb":{"t":"ਘਟ ਘਟ ਵਾਸੀ ਪ੍ਰਭੁ ਅਬਿਨਾਸੀ ਅਜਬ  ","c":"ਘਟ ਘਟ ਵਾਸੀ ਪ੍ਰਭੁ ਅਬਿਨਾਸੀ , ਅਜਬ ਤੇਰੀ ਏਹ ਮਾਇਆ ॥ \nਕੋਏ ਨਾ ਜਾਨਤ ਕੋਏ ਨਾ ਸਮਝਤ , ਕਠਿਨ ਏਹ ਖੇਲੁ ਰਚਾਇਆ ॥\n\nਕਰਨ ਕਰਾਵਣਹਾਰੁ ਤੂੰ ਦਾਤਾ , ਤੂੰ ਸਮਰਥੁ ਤੂੰ ਪੁਰਖੁ ਬਿਧਾਤਾ , \nਸਭ ਮਾਹੇਂ ਤੂੰ ਸਮਾਇਆ ॥\n\nਤੂੰ ਸਾਗਰੁ ਤੂੰ ਹੀਰਾ ਕੰਚਨੁ , ਤੂੰ ਸੀਤਲੁ ਤੂੰ ਕੋਮਲੁ ਚੰਚਲੁ , \nਹਰਿ ਰੂਪ ਵਟਾਂਦਾ ਆਇਆ ॥\n\nਜੀਵਨ ਦਾਨੁ ਤੁਧ ਤੇ ਪਾਇਆ , ' ਦਰਸਨ ' ਨੇਹ ਤੁਧੁ ਸੰਗਿ ਲਾਇਆ ,\nਰਾਖੋ ਲਾਜ ਹਰਿ ਰਾਇਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"घट घट वासी प्रभ अबिनासी अजब ","c":"घट घट वासी प्रभ अबिनासी , अजब तेरी एह माया , \nकोये ना जानत कोये ना समझत , कठिन एह खेल रचाया ।।\n\nकरन करावणहार तूं दाता , तूं समरथ तूं पुरख विधाता , \nसभ माहें तूं समाया ।।\n\nतूं सागर तूं हीरा कंचन , तूं शीतल तूं कोमल चंचल , \nहरि रूप वटांदा आया ।।\n\nजीवन दान तुध ते पाया , दर्शन नेह तुध संग लाया , \nराखो लाज हरि राया ।।\n( यकीन )"},"en":{"t":"Ghat Ghat Vaasi Prabh Abhinasi Ajab","c":"Ghat Ghat Vaasi Prabh Abhinasi Ajab"}},

	{"id":1769026166864,
	"pb":{"t":"ਚਤੁਰਭੁਜਾ ਚੌਮੁੰਡਾ ਦੇਓ ਹਰਿ ਰਾਇ","c":"( ਅਸ਼ਟਭੁਜੀ ਸ਼ਕਤੀ , ਵਿਪਦਾ ਟਾਲਣ ਵਾਲੀ ਦੁਖ ਭੰਜਨ )\n\nਚਤੁਰਭੁਜਾ ਚੌਮੁੰਡਾ ਦੇਓ ਹਰਿ ਰਾਇ , \nਦੁਸ਼ਟ ਦੈਤ ਜਿਸ ਸੰਗਿ ਸਭ ਮਰਿ ਜਾਏ ॥\nਦੇਓ ਸ਼ਿਵ ਸਹਜ ਵਰ ਏਹੋ ਦਾਸ ਮਨਿ ਭਾਏ ॥\nਜੋਤਿ ਨਿਰੰਜਨ ਨੀਲਕੰਠ ਨਾਰਾਇਣ ਨਾਰੰਗ ਨਾਰੂਪੀ , \nਨਿਰਭਉ ਨਿਰਵੈਰ ' ਦਰਸਨ ' ਸੰਗਿ ਸਮਾਏ ॥ \nਜਹਾਂ ਦਿਸੇ ਦਾਸ ' ਦਰਸਨ ' ਤਹਾਂ ਹੋਏ ਸਹਾਏ , \nਓਅੰਕਾਰ ਓਮ ਨਮੋ ਸ਼ਿਵ ਸਮਾਏ ਹਰਿ ਰਾਇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"चतरभुजा चौमुंडा देओ हरि राय","c":"( अष्टभुजी शक्ति , विपदा टालने वाली दुख भंजन )\n\nचतरभुजा चौमुंडा देओ हरि राय , \nदुष्ट दैत जिस संग सभ मर जाये ।।\nदेओ शिव सहज वर एहो दास मन भाये ।।\nजोत निरंजन नीलकंठ नारायण नारंग नारूपी , \nनिरभौ निरवैर दर्शन संग समाये ।।\nजहां दिसे दास दर्शन तहां होये सहाये , \nओंकार ओम नमो शिव समाये हरि राय ।।\n( यकीन )"},"en":{"t":"Chaturbhuja Chamunda Deyo Hari Rai","c":"Chaturbhuja Chamunda Deyo Hari Rai"}},

	{"id":1769026410660,"audio":"audio/JAN DARSHAN KI SUNO BENANTIYAN.mp3",
	"pb":{"t":"ਚਵਰੁ ਛਤ੍ਰੁ ਲੇਓ ਬੈਠਿਆ ਠਾਕੁਰੁ","c":"ਚਵਰੁ ਛਤ੍ਰੁ ਲੇਓ ਬੈਠਿਆ ਠਾਕੁਰੁ , ਆਦਿ ਜੁਗਾਦਿ ਰਹਿਆ ਸਮਾਏ ॥ \nਅਗੰਮ ਮੁਗਧ ਰੂਪੁ ਧਾਰਿਆ , ਲਾਜ ਪੈਜ ਹਰਿ ਭਗਤ ਬਚਾਏ ॥ \nਪੰਚ ਨੀਤੀ ਧਰਮੁ ਭਿਖਾਰਿਆ , ਗਿਰਿਆ ਅਸਮਾਨਿ ਚੜ੍ਹਾਏ ॥ \nਉੱਤਮ ਨੀਚ ਭੇਦੁ ਨਾ ਜਾਣਿਆ , ਕੀੜੀ ਸੇ ਗਜੁ ਮਰਵਾਏ ॥ \nਜਨ ' ਦਰਸਨ ' ਪ੍ਰਭ ਸੁਣੋ ਬੇਨੰਤੀ , ਮਨੁ ਚਿੱਤੁ ਪ੍ਰੀਤਿ ਕੈਸੇ ਲਾਏ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"चवर छतर लेओ बैठेआ ठाकुर","c":"चवर छतर लेओ बैठेआ ठाकुर , आदि जुगादि रहेओ समाये ।। \nअगंम मुगध रूप धारेओ , लाज पैज हरि भगत बचाये ।।\nपँच नीती धरम भिखारेओ , गिरेआ असमान चढ़ाये ।।\nउत्तम नीच भेद ना जानेओ , कीड़ी से गज मरवाये ।।\nजन दर्शन प्रभ सुणो बेनंती , मन चित्त प्रीत कैसे लाये ।।\n( यकीन )"},"en":{"t":"Chavar Chatar Leyo Baitheya Thakur","c":"Chavar Chatar Leyo Baitheya Thakur\nJan Darshan Prabh Suno Benantiyaa"}},

	{"id":1769026626520,
	"pb":{"t":"ਚਾਰਮੁਖੀ ਦੀਵਾ ਚਾਰੇ ਧਰਮ ਕਹਾਏ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਚਾਰਮੁਖੀ ਦੀਵਾ ਚਾਰੇ ਧਰਮ ਕਹਾਏ , \nਸਤਿ ਸੰਤੋਖੁ ਦਇਆ ਨਾਮੁ , \nਚਾਰਮੁਖੀ ਦੀਵਾ ਇਕ ਵਰਣ ਸਮਾਏ , \nਸਾਧ ਸੰਗਤਿ ਬਹੁ ਬਿਧਿ ਪਰਮ ਧਾਮ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"चारमुखी दीवा चारे धरम कहाये ( दोहा )","c":"( दोहा )\nचारमुखी दीवा चारे धरम कहाये , \nसति संतोख दया नाम , \nचारमुखी दीवा इक वरण समाये , \nसाध संगत बहु बिध परम धाम ।।\n( यकीन )"},"en":{"t":"Chaarmukhi Diva Chare Dharam Kahaye ( Doha )","c":"Chaarmukhi Diva Chare Dharam Kahaye ( Doha )"}},

	{"id":1769026948255,
	"pb":{"t":"ਛੋਡਿ ਮਨ ਮੋਹ ਮਮਤਾ ਸਤਿਗੁਰ ਸਰਣਿ ਧਾਰਿ","c":"ਛੋਡਿ ਮਨ ਮੋਹ ਮਮਤਾ ਸਤਿਗੁਰ ਸਰਣਿ ਧਾਰਿ , \nਦੇਓ ਦਰਸੁ ਦਾਤਾਰ ਨਾਨਕ ਨਮਹਿ ਅਸ਼ਟ ਮਹੇਸ਼ ਤਿਨ੍ਹੇ ਨਮਸਕਾਰ ॥ \nਮੈਂ ਤੁਝ ਤਾ ਨਹੀਂ ਤੂੰ ਮੁਝ ਮੇਂ , ਈਹਾਂ ਉਹਾਂ ਨਿਰਗੁਣ ਸਰਗੁਣ ਮੇਂ ॥ \nਦਰਸਨੁ ਦੇਖਿ ਜੀਵਾਂ ਪ੍ਰਭ ਤੇਰੇ ਕਾਟੋ ਕਲਹਿ ਕਲੇਸ਼ ਭਰਮ ਮੇਰੇ ॥ \nਵਿਛੜਾਂ ਤੁਝ ਸੇ ਪਤਿਤ ਬਣਿ ਜਾਈ , \nਪਾਵਨ ਪਵਿੱਤਰ ਪੂਰੇ ਗੁਰੂ ਮੇਰੇ , ਨਾਨਕ ਦਾਸ ਗੁਸਾਂਈ ॥ \nਪੰਚ ਦੁਸ਼ਟ ਮਨ ਮੋਹੇ ਬਿਸਾਰਿਓ , ਪੈਰੀਂ ਪਉਣਾਂ ਜਗੁ ਵਰਤਾਓ ॥ \nਸਿਮਰੇ ਰਾਣਾ ਰੰਕ ਬਰਾਬਰ , ਦੇਓ ਦਰਸਨ ਮੇਰੇ ਠਾਕੁਰ ॥ \nਮਨੁ ਮਣਤ ਗੁਣੀ ਗੁਣਿਅੰਤ , ਤੇਰੀ ਵਡਿਆਈ ਕਥੀ ਨਾ ਜਾਈ , \nਕੋਟਿ ਕੋਟਿ ਕੋਟਿ ਪਾਪ ਬਖ਼ਸ਼ੰਦ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"छोड़ मन मोह ममता सतिगुर शरन धार","c":"छोड़ मन मोह ममता सतिगुर शरन धार , \nदेओ दरस दातार नानक नमहि अष्ट महेश तिनहे नमस्कार ।। \nमैं तुझ ता नहीं तूं मुझ में , ईहां उहां निरगुण सरगुण में ।। \nदर्शन देख जीवां प्रभ तेरे काटो कलहि कलेश भरम मेरे ।। \nविछड़ां तुझ से पतित बन जाई , \nपावन पवित्र पूरे गुरू मेरे , नानक दास गोसांई ।।\nपँच दुष्ट मन मोहे बिसारेओ , पैरीं पउणा जग वरताओ ।।\nसिमरे राणा रंक बराबर , देओ दर्शन मेरे ठाकुर ।।\nमन मणत गुणी गुणिअंत , तेरी वडिआई कथी ना जाई , \nकोट कोट कोट पाप बख्शंद ।।\n( यकीन )"},"en":{"t":"Chhor Mann Moh Mamta Satguru Sharan Dhaar","c":"Chhor Mann Moh Mamta Satguru Sharan Dhaar"}},

	{"id":1769027155478,
	"pb":{"t":"ਤੁਮ ਮੇਰੇ ਪ੍ਰੀਤਮ ਪ੍ਰਭ ਕਿਰਪਾਲ","c":"ਤੁਮ ਮੇਰੇ ਪ੍ਰੀਤਮ ਪ੍ਰਭ ਕਿਰਪਾਲ , ਸਬਦੁ ਜਪਤ ਮਨੁ ਭਯੋ ਨਿਹਾਲ ॥ \nਗੁਰ ਬਿਨੁ ਗਿਆਨੁ ਨਾ ਹੋਸੀ ਭਾਈ , ਗੁਰ ਬਿਨੁ ਪੂਰੀ ਭਗਤੀ ਨਾ ਹੋਈ ॥ \nਪ੍ਰਣਵਤ ਪੂਰਨ ਗੁਰੂ ਨਾਨਕ ਸਾਂਈ , ਦਰਸੁ ਦੇਖਤ ਜਮ ਕੀ ਛੂਟੀ ਫਾਹੀ ॥\nਏਕੋ ਤੇਰੀ ਕੁਦਰਤਿ ਮੇਰੇ ਸਤਿਗੁਰੂ , ਏਕੋ ਰੂਪ ਸਾਧ ਸੰਗਤਿ ਸੰਗਿ ਸਮਾਈ ॥ \nਮੈਂ ਨਾ ਜਾਨੋ ਗੁਣ ਅਵਗੁਣ ਧਰਮ ਕਰਮ , ' ਦਰਸਨ ' ਦਾਸ ਗੁਰ ਪੂਰੇ ਸੰਗਿ ਮਿਟੇ ਭਰਮ ॥\n( ਯਕੀਨ )"},"hi":{"t":"तुम मेरे प्रीतम प्रभ किरपाल","c":"तुम मेरे प्रीतम प्रभ किरपाल , शब्द जपत मन भयो निहाल ।।\nगुर बिन गिआन ना होसी भाई , गुर बिन पूरी भगती ना होई ।।\nप्रणवत पूरण गुरू नानक सांई , दरस देखत जम की छूटी फाही ।।\nएको तेरी कुदरत मेरे सतिगुरू , एको रूप साध संगत संग समाई ।।\nमैं ना जानो गुण अवगुण धरम करम , दर्शन दास गुर पूरे संग मिटे भरम ।।\n( यकीन )"},"en":{"t":"Tum Mere Pritam Prabh Kirpaal","c":"Tum Mere Pritam Prabh Kirpaal"}},

	{"id":1769073697094,"audio":"audio/JAG JEEWAN DATA.mp3",
	"pb":{"t":"ਜਗ ਜੀਵਨ ਦਾਤਾ ਮਿਲੇ ਸੰਜੋਗੀ","c":"ਜਗ ਜੀਵਨ ਦਾਤਾ ਮਿਲੇ ਸੰਜੋਗੀ , ਸਤਿਗੁਰ ਮੇਲੁ ਮਿਲਾਵੇ ॥ \nਅਨੰਤ ਬੇਅੰਤ ਮਹਿਮਾ ਉਸਦੀ , ਬੇਦ ਕਤੇਬ ਨਾ ਸਮਾਵੇ ॥ \nਗੁਰੂ ਨਾਰਾਇਣ ਨਿਰੰਜਨੁ ਮਸਤਕਿ , ਅਨਹਦ ਨਾਦੁ ਵਜਾਵੇ ॥ \nਗੁਰ ਗਿਆਨੁ ਮਿਲੇ ਵਡਭਾਗੀ , ਧੁਰਿ ਲਿਖਿਆ ਲੇਖਾ ਪਾਵੇ ॥ \n' ਦਰਸਨ ' ਦਾਸੁ ਕਰੇ ਡੰਡਉਤ ਬੰਦਨਾ , ਕਿਰਪਾ ਕਰੋ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जग जीवन दाता मिले संजोगी","c":"जग जीवन दाता मिले संजोगी , सतिगुर मेल मिलावे ।। \nअनंत बेअंत महिमा उसदी , बेद कतेब ना समावे ।। \nगुरू नारायण निरंजन मसतक , अनहद नाद वजावे ।। \nगुर गिआन मिले वडभागी , धुर लिखेया लेखा पावे ।। \nदर्शन दास करे डंडौत बंदना, किरपा करो हरि राय ।।\n( यकीन )"},"en":{"t":"Jag Jeevan Data Mile Sanjogi","c":"Jag Jeevan Data Mile Sanjogi"}},

	{"id":1769073894876,
	"pb":{"t":"ਜਗਤ ਖੇਲੁ ਮਨਿ ਨਾ ਲਗਸੇ","c":"ਜਗਤ ਖੇਲੁ ਮਨਿ ਨਾ ਲਗਸੇ , ਤੁਧੁ ਕਿਰਪਾ ਨਾਮੁ ਧਿਆਵਾਂ ॥ \nਮੇਰੇ ਸਤਿਗੁਰ ਕੀਜੋ ਮਿਹਰ , ਤੇਰੇ ਸਦਾ ਸਦਾ ਗੁਣ ਗਾਵਾਂ ॥ \nਤੇਰੀ ਸੋਹਬਤ ਤੇਰੀ ਸੰਗਤਿ , ਤੇਰਾ ਸੰਗੁ ਹੈ ਸੱਚਾ ,\nਰਿਸ਼ਤੇ ਨਾਤੇ ਤੋਂ ਵੀ ਗਹਿਰਾ , ਤੇਰਾ ਰੰਗੁ ਹੈ ਪੱਕਾ , \nਮੈਂ ਰੰਗਿ ਤੇਰੇ ਰੰਗਿ ਜਾਵਾਂ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जगत खेल मन ना लगसे","c":"जगत खेल मन ना लगसे , तुध किरपा नाम धिआवां ।। \nमेरे सतिगुर कीजो मेहर , तेरे सदा सदा गुण गावां ।। \nतेरी सोहबत तेरी संगत , तेरा संग है सच्चा , \nरिशते नाते तों वी गहरा , तेरा रंग है पक्का , \nमैं रंग तेरे रंग जावां ।।\n( यकीन )"},"en":{"t":"Jagat Khel Mann Na Lagse","c":"Jagat Khel Mann Na Lagse"}},

	{"id":1769074177813,
	"pb":{"t":"ਜਗਤੁ ਜਲੰਦਾ ਰਾਖਿ ਲਓ","c":"ਜਗਤੁ ਜਲੰਦਾ ਰਾਖਿ ਲਓ , ਪ੍ਰਹਿਲਾਦ ਅਪਣੀ ਕਿਰਪਾ ਧਾਰਿ , \nਜਿਨ੍ਹੇ ਮਨਿ ਹਰਿ ਨਾਮੁ ਵਸੇ ਤਿਨ੍ਹੇ ਨਾ ਸਕੇ ਕੋਈ ਮਾਰਿ ॥ \nਗਜ ਗੁੰਝਲ ਤੰਦ ਦੇਵੇ ਤੋੜੀ ਸੁਣੀ ਮੀਤ ਪੁਕਾਰ , \nਬਖ਼ਸ਼ਿ ਲਓ ਦੇਵ ਦੈਤ ਨਾਨਕ ਪੁਰਖ ਮੁਰਾਰ ॥ \nਦੀਓ ਤਾਜੁ ਸਿਰਿ ਭਗਤਨ ਕੋ ਧਨੁਸ਼ ਰੂਪੁ ਧਾਰਿ , \nਕਾਇਆ ਕਾਮਨ ਇੰਦਰ ਰਾਇ ਦੀਓ ਤਿਨ੍ਹੇ ਸਵਾਰਿ ॥ \nਲੀਓ ਕਲਿ ਮਾਹੇ ਜੋਤਿ ਨਿਰੰਜਨ ਨਾਨਕ ਗੋਬਿੰਦ ਅਵਤਾਰ , \nਚੋਰ ਰਾਖਸ ਠਗ ਸਭਹਿ ਹੀ ਦੀਓ ਨਾਮੁ ਅਧਾਰੁ ॥ \nਸੇਵ ਭਯੋ ਸੰਤ ਪੁਰਖਨ ਕੀ ' ਦਰਸਨ ' ਸੁਣਿਓ ਪ੍ਰੇਮ ਪੁਕਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जगत जलंदा राख लओ","c":"जगत जलंदा राख लओ , प्रहलाद अपनी किरपा धार , \nजिनहे मन हरि नाम वसे तिनहे ना सके कोई मार ।।\nगज गुंझल तंद देवे तोड़ी सुणी मीत पुकार , \nबख्श लेओ देव दैत नानक पुरख मुरार ।।\nदीओ ताज सिर भगतन को धनुष रूप धार , \nकाया कामन इंदर राय दीओ तिनहे सवार ।। \nलीओ कलि माहे जोत निरंजन नानक गोबिंद अवतार , \nचोर राक्षस ठग सभहि ही दीओ नाम अधार ।। \nसेव भयो संत पुरखन की दर्शन सुणेओ प्रेम पुकार ।।\n( यकीन )"},"en":{"t":"Jagat Jalanda Raakh Layo","c":"Jagat Jalanda Raakh Layo\nJinhe Mann Hari Naam Vasse"}},

	{"id":1769074341655,"audio":"audio/JANNAT E JAAN.mp3",
	"pb":{"t":"ਜੰਨਤ ਏ ਜਾਨ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ","c":"ਜੰਨਤ-ਏ-ਜਾਨ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਸੋਢੀ-ਏ-ਸੁਲਤਾਨ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਖੁਦਾਈ-ਏ-ਰਹਿਮਤ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਆਦਮ-ਏ-ਅਹਿਮਦ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਮਕਸ-ਏ-ਮਕਸੂਦ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਖਲਕ ਖਾਲਕ-ਏ-ਮਖਲੂਕ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਸ਼ਮਸ-ਏ-ਸ਼ਮਸ਼ੀਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਆਲਮ-ਏ-ਅਮੀਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥\n\nਕਾਤਬ-ਏ-ਤਕਦੀਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਖੁਦ ਖੁਦਾ-ਏ-ਤਸਵੀਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਹੁਸਨ-ਏ-ਸਰੂਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਦੋਸਤ-ਏ-ਦਸਤੂਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਨਜ਼ਰ-ਏ-ਨੂਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਹਾਦਰਾ-ਏ-ਹਦੂਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥\nਰਾਮ-ਏ-ਰਹੀਮ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਕਰਮ-ਏ-ਕਰੀਮ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥\n\nਨਰ-ਏ-ਨਸੀਬ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਗੁਖ-ਏ-ਗਰੀਬ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਬਾਪਰਵਾਹ-ਏ-ਬੇਪਰਵਾਹ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਬਾਦਸ਼ਾਹ-ਏ-ਸ਼ਾਹ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਬੇਆਸਾ-ਏ-ਆਸ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਮੁਹਤਾਜ-ਏ-ਬੇਮੁਹਤਾਜ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਤਨੁ ਮਨੁ ਧਨੁ ਤਾਣ-ਏ-ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਜਨਕ-ਏ-ਜਾਨ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥\n\nਹਮਦਮ-ਏ-ਦਰਦ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਦੁਖੀ-ਏ-ਹਮਦਰਦ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਦੀਨ-ਏ-ਦਾਤਾ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਕਾਨਾ-ਏ-ਕਾਅਬਾ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਪੂਰਨ-ਏ-ਪੁਰਖ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਆਦਿ-ਏ-ਗੋਰਖ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਰੱਬੀ-ਏ-ਅਵਤਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਦਰਸਨ-ਏ-ਦੀਦਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥\n\nਸੱਚੀ-ਏ-ਸਰਕਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਸ਼ਾਹ-ਏ-ਸ਼ਾਹੂਕਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \nਪੰਚ-ਏ-ਸਤਿਕਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ , ਪੰਚਮ-ਏ-ਏਤਬਾਰ ਗੁਰੂ ਗੋਬਿੰਦ ਸਿੰਘ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जन्नत ए जान गुरू गोबिंद सिंघ","c":"जन्नत ए जान गुरू गोबिंद सिंघ , सोढी ए सुल्तान गुरू गोबिंद सिंघ ।।\nखुदाई ए रहमत गुरू गोबिंद सिंघ , आदम ए अहमद गुरू गोबिंद सिंघ ।।\nमकस ए मकसूद गुरू गोबिंद सिंघ , खलक खालक ए मखलूक गुरू गोबिंद सिंघ ।।\nशमस ए शमशीर गुरू गोबिंद सिंघ , आलम ए अमीर गुरू गोबिंद सिंघ ।।\n\nकातब ए तकदीर गुरू गोबिंद सिंघ , खुद खुदा ए तसवीर गुरू गोबिंद सिंघ ।।\nहुसन ए सरूर गुरू गोबिंद सिंघ , दोस्त ए दसतूर गुरू गोबिंद सिंघ ।\nनज़र ए नूर गुरू गोबिंद सिंघ , हादरा ए हदूर गुरू गोबिंद सिंघ ।।\nराम ए रहीम गुरू गोबिंद सिंघ , करम ए करीम गुरू गोबिंद सिंघ ।।\n\nनर ए नसीब गुरू गोबिंद सिंघ , गुख ए गरीब गुरू गोबिंद सिंघ ।।\nबापरवाह ए बेपरवाह गुरू गोबिंद सिंघ , बादशाह ए शाह गुरू गोबिंद सिंघ ।।\nबेआसा ए आस गुरू गोबिंद सिंघ , मुहताज ए बेमुहताज गुरू गोबिंद सिंघ ।।\nतन मन धन तान ए गुरू गोबिंद सिंघ , जनक ए जान गुरू गोबिंद सिंघ ।।\n\nहमदम ए दरद गुरू गोबिंद सिंघ , दुखी ए हमदरद गुरू गोबिंद सिंघ ।।\nदीन ए दाता गुरू गोबिंद सिंघ , काना ए काअबा गुरू गोबिंद सिंघ ।।\nपूरन ए पुरख गुरू गोबिंद सिंघ , आदि ए गोरख गुरू गोबिंद सिंघ ।।\nरब्बी ए अवतार गुरू गोबिंद सिंघ , दर्शन ए दीदार गुरू गोबिंद सिंघ ।।\n\nसच्ची ए सरकार गुरू गोबिंद सिंघ , शाह ए शाहूकार गुरू गोबिंद सिंघ ।।\nपंच ए सतिकार गुरू गोबिंद सिंघ , पंचम ए एतबार गुरू गोबिंद सिंघ ।।\n( यकीन )"},"en":{"t":"Jannat e Jaan Guru Gobind Singh","c":"Jannat e Jaan Guru Gobind Singh"}},

	{"id":1769074972188,
	"pb":{"t":"ਜਨਮੁ ਦੀਓ ਸੰਗਿ ਦੀਓ ਗੁਜਰਾਨ","c":"ਜਨਮੁ ਦੀਓ ਸੰਗਿ ਦੀਓ ਗੁਜਰਾਨ , ਨਾਮੁ ਭੀ ਦੀਜੋ ਕਿਰਪਾ ਨਿਧਾਨ ॥ \nਨਾਮੁ ਜਪੇ ਮਨੁ ਉਜਵਲੁ ਹੋਵੇ , ਜਿਨ ਭੇਟਿਆ ਜਾਣੇ ਜਨੁ ਸੋਏ , \nਅੰਤਰਿ ਉਪਜੇ ਗੁਣ ਗਿਆਨ ॥\n\nਦੇਹ ਸੇਵਾ ਸੰਤੋਖੁ ਸਿਦਕ ਸਹਾਰੇ , ਮੈਂ ਕਾਰ ਕਮਾਵਾਂ ਦਿਨ ਰਾਤ ਪਿਆਰੇ , \nਰਾਖਿ ਲੇਓ ਪ੍ਰਭ ਮੇਰਾ ਮਾਣੁ ॥\n\nਮੇਰੀ ਅਰਜ ਸੁਣਿਓ ਸੁਆਮੀ , ਜਾਨ ਲੇਓ ਪ੍ਰਭ ਅੰਤਰਜਾਮੀ , \n' ਦਰਸਨ ' ਧਿਆਊਂ ਨਿਸ ਦਿਨ ਨਾਮੁ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जनम दीओ संग दीओ गुजरान","c":"जनम दीओ संग दीओ गुजरान , नाम भी दीजो किरपा निधान ।। \nनाम जपे मन उजवल होवे , जिन भेटेआ जाणे जन सोये , \nअंतर उपजे गुण गिआन ।।\n\nदेह सेवा संतोख सिदक सहारे , मैं कार कमावां दिन रात पिआरे , \nराख लेओ प्रभ मेरा मान ।।\n\nमेरी अरज सुणेओ सवामी , जान लेओ प्रभ अंतरयामी ,\nदर्शन धिआऊँ निस दिन नाम ।।\n( यकीन )"},"en":{"t":"Janam Diyo Sang Diyo Gujraan","c":"Janam Diyo Sang Diyo Gujraan"}},

	"pb":{"t":"ਜਿਸੇ ਦੇਖਿਆ ਸੋ ਦੁਖੀ ਹਰਿ ਨਾਮ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਜਿਸੇ ਦੇਖਿਆ ਸੋ ਦੁਖੀ ਹਰਿ ਨਾਮ ਸੰਗਿ ਭਯੋ ਸਭ ਸੁਖੀ , \nਜਿਸੁ ਹਰਿ ਨਾਮੁ ਮਨਿ ਭਾਏ , ਸੋ ਜਨੁ ਮੁਕਤਿ ਪਾਏ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जिसे देखा सो दुखी हरि नाम ( दोहा )","c":"( दोहा )\nजिसे देखा सो दुखी हरि नाम संग भयो सभ सुखी , \nजिस हरि नाम मन भाये , सो जन मुक्त पाये हरि राय ।। \n( यकीन )"},"en":{"t":"Jise Dekha So Dukhi Hari Naam ( Doha )","c":"Jise Dekha So Dukhi Hari Naam ( Doha )"}},

	{"id":1769075846017,
	"pb":{"t":"ਜਿਸਨੇ ਖੋਜਿਆ ਉਸਨੇ ਪਾਇਆ","c":"ਜਿਸਨੇ ਖੋਜਿਆ ਉਸਨੇ ਪਾਇਆ , ਹਿਰਦੇ ਅੰਦਰਿ ਨਾਮੁ ਵਸਾਇਆ ॥ \nਪੂਰਨ ਪੁਰਖ ਅਚੁਤ ਅਬਿਨਾਸੀ , \nਅਗੰਮ ਰੂਪ ਹਰਿ ਸਚਖੰਡ ਵਾਸੀ , ਕਿਸੇ ਵਿਰਲੇ ਭੇਦੁ ਪਾਇਆ ॥\n\nਹਰਿ ਸੰਗਿ ਪ੍ਰੀਤਿ ਗੁਰ ਸੰਗਿ ਨਾਤਾ , \nਪੂਰਨ ਗੁਰੂ ਗੁਣੀ ਗੁਣਿਅੰਤਾ , ਜਿਸਨੇ ਰਾਹੁ ਦਿਖਲਾਇਆ ॥\n\nਗੁਰ ਕੀ ਟੇਕ ਗੁਰ ਕੀ ਓਟ , \nਇੱਛਾ ਪੂਰਨ ਨਾ ਆਵੇ ਤੋਟ , ' ਦਰਸਨ ' ਕੰਤ ਲਿਵ ਲਾਇਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जिसने खोजा उसने पाया","c":"जिसने खोजा उसने पाया , हिरदे अंदर नाम वसाया ।। \nपूरन पुरख अचुत अबिनासी , \nअगंम रूप हरि सचखंड वासी , किसे विरले भेद पाया ।।\n\nहरि संग प्रीत गुर संग नाता , \nपूरण गुरू गुणी गुणिअंता , जिसने राह दिखलाया ।।\n\nगुर की टेक गुर की ओट , \nइच्छा पूरन ना आवे तोट , दर्शन कंत लिव लाया ।।\n( यकीन )"},"en":{"t":"Jisne Khoja Usne Paya","c":"Jisne Khoja Usne Paya"}},

	{"id":1769076039499,
	"pb":{"t":"ਜਿਤੁ ਦੇਖੂੰ ਮੈਂ ਤੁਧੁ ਪਾਊਂ","c":"ਜਿਤੁ ਦੇਖੂੰ ਮੈਂ ਤੁਧੁ ਪਾਊਂ , ਮੇਰੋ ਦੋ ਨੈਣਣ ਕੋ ਆਸ , \nਮੋਹੇ ਨਾ ਭਾਵੇ ਤੁਧ ਬਿਨ ਕੋਏ , ਮਨੁ ਤੜਫੇ ਦਿਨ ਰਾਤ ॥ \nਜਨਮ ਜਨਮ ਕੇ ਪਿਆਸੇ ਨੈਣਾ , ਰਾਹ ਨਿਹਾਰੇ ਤੇਰੀ ਸਾਹਿਬਾ , \nਕਰੂੰ ਬਿਨਉ ਤੁਧੁ ਆਗੇ ਮੈਂ , ਥੱਕ ਹਾਰੀ ਮੈਂ ਪਰਵਰਦਿਗਾਰ ॥\n\nਮਨ ਅੰਨ ਪਾਣੀ ਕਿਛੁ ਨਾਹੀ ਭਾਵੇ , ਬਿਨ ਦਰਸਨ ਮੋਹੇ ਚੈਨ ਨਾ ਆਵੇ ,\nਦੇਓ ਦਰਸੁ ਮੇਰੇ ਰਾਮ ਰਘੁਰਾਈ , ਮੁਝ ਹੋਵੋ ਪ੍ਰਭ ਆਪਿ ਦਇਆਲ ॥ \nਮਨੁ ਤ੍ਰਿਪਤੇ ਆਤਮਾ ਜਾਗੇ , ਤੁਧੁ ਕਿਰਪਾ ਤੇ ਸਭ ਦੁਖ ਭਾਗੇ , \nਮੈਂ ਨਿਮਾਣੀ ਕੀ ਸੁਣਿਓ ਪੁਕਾਰ , ' ਦਰਸਨ ' ਦੀਜੋ ਕਰੋ ਨਦਰਿ ਨਿਹਾਲ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जित देखूँ मैं तुध पाऊँ","c":"जित देखूँ मैं तुध पाऊँ , मेरो दो नैनण को आस , \nमोहे ना भावे तुध बिन कोये , मन तड़फे दिन रात ।।\nजनम जनम के पिआसे नैना , राह निहारे तेरी साहिबा , \nकरूँ बिनओ तुध आगे मैं , थक्क हारी मैं परवरदिगार ।।\n\nमन अन्न पाणी किछ नाही भावे , बिन दर्शन मोहे चैन ना आवे ,\nदेओ दरस मेरे राम रघुराई , मुझ होवो प्रभ आप दयाल ।। \nमन तृप्ते आतमा जागे , तुध किरपा ते सभ दुख भागे , \nमैं निमाणी की सुणेओ पुकार , दर्शन दीजो करो नदर निहाल ।।\n( यकीन )"},"en":{"t":"Jit Dekhu Mein Tudh Paau","c":"Jit Dekhu Mein Tudh Paau"}},

	{"id":1769076263429,
	"pb":{"t":"ਜੋ ਜਨੁ ਕਰੇ ਸੇਵਨੁ ਮਦਿਰਾ ਮਾਸੁ","c":"ਜੋ ਜਨੁ ਕਰੇ ਸੇਵਨੁ ਮਦਿਰਾ ਮਾਸੁ , ਹੋ ਜਾਤਾ ਤਨ ਕਾ ਨਾਸੁ ॥ \nਜੀਤੇ ਜੀ ਅੰਦਰਿ ਦੇਹੀ ਹੋਵੇ ਭੂਤਨ ਕਾ ਵਾਸੁ ॥ \nਦੇਹੀ ਰੋਗੀ ਮਨੁ ਮੈਲਾ ਕਾਮ ਕ੍ਰੋਧ ਨਾਲਿ , \nਚਿੱਤ ਨਾ ਆਵੇ ਪ੍ਰਭ ਕਾ ਸਿਮਰਨੁ ਹਉਮੈ ਚਲੈ ਨਾਲਿ ॥\n\nਵਿਸ਼ੇ ਵਿਕਾਰੋਂ ਮੇਂ ਮਨੁ ਡੂਬੈ ਆਤਮਾ ਰਹੇ ਕੁਰਲਾਤੀ , \nਕੋਈ ਨਾ ਸੂਝੇ ਰਾਸਤਾ ਨਸ਼ੇ ਕੀ ਲਤ ਐਸੀ ॥ \nਜੈਸਾ ਖਾਏ ਅੰਨੁ ਤੈਸੜਾ ਹੋਵੇ ਮਨੁ , \n' ਦਰਸਨ ' ਚਖਿ ਨਾਮ ਰਸੁ ਸਦਾ ਰਹੇ ਸੁਆਦੁ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जो जन करे सेवन मदिरा मास","c":"जो जन करे सेवन मदिरा मास , हो जाता तन का नास ।।\nजीते जी अंदर देही होवे भूतन का वास ।।\nदेही रोगी मन मैला काम क्रोध नाल , \nचित ना आवे प्रभ का सिमरन हउमै चलै नाल ।।\n\nविशे विकारों में मन डूबै आतमा रहे कुरलाती , \nकोई ना सूझे रास्ता नशे की लत ऐसी ।।\nजैसा खाये अन्न तैसड़ा होवे मन , \nदर्शन चख नाम रस सदा रहे सुआद ।।\n( यकीन )"},"en":{"t":"Jo Jan Kare Sevan Madira Maas","c":"Jo Jan Kare Sevan Madira Maas"}},

	{"id":1769076488569,
	"pb":{"t":"ਤਨੁ ਮਨੁ ਧਨੁ ਤੁਧੁ ਆਗੇ ਪਿਆਰੇ","c":"ਤਨੁ ਮਨੁ ਧਨੁ ਤੁਧੁ ਆਗੇ ਪਿਆਰੇ , ਜਨਮ ਮਰਣੁ ਛੂਟਿ ਜਾਵੇ ॥ \nਜਪਤ ਸਪਤ ਤਪਤ ਹਿਰਦੇ ਠਾਰੇ , ਤੁਧੁ ਪੈਰੀ ਪ੍ਰੀਤਿ ਸਮਾਵੇ ॥ \nਰਾਖ ਸਾਕ ਸਭ ਜੀਵਤ ਜੀਵਾਂ , ਅੰਤਿ ਰਾਸਿ ਸਾਥਿ ਨਾ ਆਵੇ ॥ \n' ਦਰਸਨ ' ਦਇਆ ਦੀਨਾ ਨਾਥ ਕੀਜੋ , ਡੰਗੋ ਡੰਗ ਕਾਰ ਕਮਾਵੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तन मन धन तुध आगे पिआरे","c":"तन मन धन तुध आगे पिआरे , जनम मरण छूट जावे ।। \nजपत शपत तपत हिरदे ठारे , तुध पैरी प्रीत समावे ।। \nराख साक सभ जीवत जीवां , अंत रास साथ ना आवे ।। \nदर्शन दया दीना नाथ कीजो , डंगो डंग कार कमावे ।।\n( यकीन )"},"en":{"t":"Tan Man Dhan Tudh Aage Pyare","c":"Tan Man Dhan Tudh Aage Pyare"}},

	{"id":1769076657000,
	"pb":{"t":"ਤਰਸੁ ਭਯਾ ਸਤਿਗੁਰ ਕੋ ਹਰਿ ਨਾਮੁ ਦੀਓ","c":"ਤਰਸੁ ਭਯਾ ਸਤਿਗੁਰ ਕੋ ਹਰਿ ਨਾਮੁ ਦੀਓ , ਨਾਮੁ ਜਪਤ ਸਭਿ ਦੁਖ ਨਾਠੇ ॥ \nਭਰਮੁ ਭਯੋ ਭਯੋ ਦੀਵਾਨਾ , ਦਾਨੁ ਦੇਹ ਕਾ ਦਾਨੁ ਨਾਹੀ ॥ \nਤੂੰ ਸਭਨੀ ਥਾਂਈ , ਤੂੰ ਸਭਨੀ ਥਾਂਈ , ਜਗ ਮਾਹਿ ਮਨ ਮਾਹਿ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तरस भया सतिगुर को हरि नाम दीओ","c":"तरस भया सतिगुर को हरि नाम दीओ , नाम जपत सभ दुख नाठे।।\nभरम भयो भयो दीवाना , दान देह का दान नाही ।। \nतूं सभनी थांई , तूं सभनी थांई , जग माहि मन माहि ।।\n( यकीन )"},"en":{"t":"Taras Bhaya Satguru Ko Hari Naam Diyo","c":"Taras Bhaya Satguru Ko Hari Naam Diyo"}},

	{"id":1769076820703,
	"pb":{"t":"ਤੁਮ ਦਾਨੁ ਦੇਓ ਹਰਿ ਭਗਤਨ ਕੋ","c":"ਤੁਮ ਦਾਨੁ ਦੇਓ ਹਰਿ ਭਗਤਨ ਕੋ ਹਰਿ ਰਾਇ , \nਤੁਮ ਦਇਆਲ ਭਯੋ ਹਰਿ ਪੁਰਖਨ ਕੋ ਹਰਿ ਰਾਇ ॥ \nਦਇਆ ਕਰੋ ਦੀਨ ਦਇਆਲ ਬਿਧਾਤੇ , \nਹਰਿ ' ਦਰਸਨ ' ਸੰਗਿ ਮਨੁ ਹਰਿ ਰੰਗਿ ਰਾਤੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुम दान देओ हरि भगतन को ( दोहा )","c":"( दोहा )\nतुम दान देओ हरि भगतन को हरि राय , \nतुम दयाल भयो हर पुरखन को हरि राय ।। \nदया करो दीन दयाल बिधाते , \nहरि दर्शन संग मन हरि रंग राते ।।\n( यकीन )"},"en":{"t":"Tum Daan Deyo Hari Bhagtan Ko ( Doha )","c":"Tum Daan Deyo Hari Bhagtan Ko ( Doha )"}},

	{"id":1769077201468,
	"pb":{"t":"ਤ੍ਰੇਤਾ ਰਾਮ ਅਵਤਾਰੁ ਧਾਰੇ","c":"ਤ੍ਰੇਤਾ ਰਾਮ ਅਵਤਾਰੁ ਧਾਰੇ , ਦਸ਼ਰਥ ਰਾਜਨ ਆਂਗਣਿ ਕੁਸ਼ਲਿਆ ਨਾਰੀ ॥\nਰਾਜੁ ਤਿਆਗਿ ਚਲੇ ਬਨ ਕੋ ਲਖਮਣ ਸੰਗਿ ਜਾਨਕੀ ਪਿਆਰੀ ॥ \nਹੱਕੁ ਦਿਵਾਵਣ ਭਗਤ ਸੁਗ੍ਰੀਵੇ ਪਰਲੋਕ ਭੇਜਿਓ ਬਾਲੀ ਹੰਕਾਰੀ ॥\n\nਜਾਤਿ ਪਾਤਿ ਭੇਦੁ ਛੋਡਿ ਸਭਹਿ ਭੀਲਣ ਨੀਚ ਜੀਉ ਕਿਰਪਾ ਧਾਰੀ ॥ \nਰਘੁਕੁਲ ਰੀਤਿ ਰਾਖੀ ਲਾਜ ਲੰਕੇਸ਼ ਮਾਰਿ ਪ੍ਰਜਾ ਸਵਾਰੀ ॥ \n' ਦਰਸਨ ' ਕਹਤ ਪ੍ਰਭ ਕਿਰਪਾ ਕੀਨੋ ਮੋਹੇ ਨੀਚ ਕੋ ਅਬ ਓਟ ਤੁਮਾਰੀ \n( ਯਕੀਨ )"},"hi":{"t":"त्रेता राम अवतार धारे","c":"त्रेता राम अवतार धारे , दशरथ राजन आंगन कुशलेआ नारी ।।\nराज तिआग चले बन को लखमन संग जानकी पिआरी ।।\nहक्क दिवावण भगत सुगरीवे परलोक भेजेओ बाली हंकारी ।।\n\nजात पात भेद छोड़ सभहि भीलण नीच जीओ किरपा धारी ।।\nरघुकुल रीत राखी लाज लंकेश मार प्रजा सवारी ।।\nदर्शन कहत प्रभ किरपा कीनो मोहे नीच को अब ओट तुमारी ।।\n( यकीन )"},"en":{"t":"Treta Ram Avtaar Dhaare","c":"Treta Ram Avtaar Dhaare"}},

	{"id":1769077448459,
	"pb":{"t":"ਤਿਸੁ ਸਤਿਗੁਰ ਮਹਿ ਜਾਊਂ ਬਲਿਹਾਰ","c":"ਤਿਸੁ ਸਤਿਗੁਰ ਮਹਿ ਜਾਊਂ ਬਲਿਹਾਰ , ਜਿਸੁ ਗੁਰੂ ਮਿਲਾਇਓ ਮਿਹਰਬਾਨ ॥\nਤਿਸੁ ਸਤਿਗੁਰ ਮਹਿ ਕਰੂੰ ਬੇਨੰਤੀ , ਜਿਸੁ ਗੁਰੂ ਦਯੋ ਦਇਆਵਾਨ ॥ \nਤਿਸੁ ਸਤਿਗੁਰ ਮਹਿ ਸੇਵ ਕਮਾਵਾਂ , ਜਿਸੁ ਗੁਰੂ ਭੇਦੁ ਇਕ ਸਮਾਨ ॥ \nਤਿਸੁ ਸਤਿਗੁਰ ਮਹਿ ਕਰੂੰ ਚਾਕਰੀ , ਜਿਸੁ ਗੁਰੂ ਮਨਿ ਮਾਨੇ ਮਾਨ ॥ \nਮੇਰੇ ਮਨਿ ਹਰਿ ਪ੍ਰੀਤਿ ਲਾਗੀ , ' ਦਰਸਨ ' ਛੂਟੇ ਸਭਿ ਅਭਿਮਾਨ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तिस सतिगुर महि जाऊँ बलिहार","c":"तिस सतिगुर महि जाऊँ बलिहार , जिस गुरू मिलायो मेहरबान ।।\nतिस सतिगुर महि करूँ बेनंती , जिस गुरू दयो दयावान ।।\nतिस सतिगुर महि सेव कमावां , जिस गुरू भेद इक समान ।।\nतिस सतिगुर महि करूँ चाकरी , जिस गुरू मन माने मान ।।\nमेरे मन हरि प्रीत लागी , दर्शन छूटे सभ अभिमान ।।\n( यकीन )"},"en":{"t":"Tis Satguru Mein Jayu Balihaar","c":"Tis Satguru Mein Jayu Balihaar"}},

	{"id":1769089443879,
	"pb":{"t":"ਤੁਝ ਤੇ ਬਿਛੁੜੇ ਗੋਬਿੰਦ ਠਾਕੁਰ","c":"ਤੁਝ ਤੇ ਬਿਛੁੜੇ ਗੋਬਿੰਦ ਠਾਕੁਰ ਦਾਤ ਸੰਗ ਕੀਏ ਪਿਆਰ , \nਦਾਤਾਰ ਦਾਤੇ ਨਾਨਕ ਗੋਬਿੰਦ , ਤਿਨ੍ਹੇ ਡੰਡਉਤ ਨਮਸਕਾਰ ॥ \nਕਾਲ ਭਾਨੀ ਦੀਜੈ ਦਾਨ ਅਪਣੀ ਕਿਰਪਾ ਧਾਰ , \nਆਦਿ ਨਾਰਾਇਣ ਆਦਿ ਨਾਰੀ ਮਹਾਦੇਵਾ ,\n\nਨਵ ਸ਼ਕਤੀ ਪਾਰਵਤੀ ਗੁਰੂ ਬ੍ਰਹਮਾ ਬਿਸ਼ਨੂੰ ਮਹੇਸ਼ ॥ \nਕਾਰਤਿਕ ਕੀਓ ਕੀਰਤੀ ਗੁਣ ਗੁਣਿਆਈ ਮੰਗਲ ਗਣੇਸ਼ , \nਨਾਸੁ ਕੀਓ ਦੁਸ਼ਟ ਪੈਂਤ ਰਾਵਣ ਕੰਸ ਹਰਨਾਕਸ਼ , \nਚੰਡ ਮੁੰਡ ਨਰਸਿੰਘ ਕੀਓ ਆਦੇਸ਼ ॥\n\nਕੀਓ ਪ੍ਰਗਟ ਭਗਉਤੀ ਚੰਡੀ ਪਿਤਾ ਦਸ਼ਮੇਸ਼ , \nਪੁੱਤਰ ਕੀਓ ਪ੍ਰਭ ਕੇ ਅਧੀਨ ਨਾਨਕ ਪ੍ਰਾਪਤ ਕਾਇਆ ਕਲਪ ਕਾਲਿੰਗਾ , ਸਤਿਗੁਰ ਸਤਿਪੁਰਖ ਸੰਤ ਸੁਜਾਨ ॥ \nਆਦਿ ਜੁਗਾਦਿ ਹੈ ਭੀ ਹੋਸੀ ਸਚੁ ਸੇਵਾ ' ਦਰਸਨ ' ਨਾਮ ਅਧਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुझसे बिछुड़े गोबिंद ठाकुर","c":"तुझसे बिछुड़े गोबिंद ठाकुर दात संग कीये पिआर , \nदातार दाते नानक गोबिंद , तिनहे डंडौत नमस्कार ।।\nकाल भानी दीजै दान अपणी किरपा धार , \nआदि नारायण आदि नारी महादेवा , \n\nनव शक्ती पारवती गुरू ब्रह्मा विशनूँ महेश ।।\nकारतिक कीओ कीरती गुण गुणिआई मंगल गणेश ,\nनास कीओ दुष्ट पैंत रावण कंस हरनाकश , \nचंड मुंड नरसिंघ कीओ आदेश ।।\n\nकीओ प्रगट भगवती चंडी पिता दशमेश , \nपुत्तर कीओ प्रभ के अधीन नानक प्रापत काया कलप कालिंगा , \nसतिगुर सतिपुरख संत सुजान ।।\nआदि जुगादि है भी होसी सच सेवा दर्शन नाम अधार ।।\n( यकीन )"},"en":{"t":"Tujhse Bichde Gobind Thakur","c":"Tujhse Bichde Gobind Thakur"}},

	{"id":1769089611443,
	"pb":{"t":"ਤੁਝ ਬਿਨੁ ਜਿੰਦ ਜੁਦਾਈਆਂ","c":"ਤੁਝ ਬਿਨੁ ਜਿੰਦ ਜੁਦਾਈਆਂ ਸਹਿਂਦੀ , \nਤੁਝ ਬਿਨੁ ਜਿੰਦ ਜਗ ਮਾਹਿ ਨਾਹੀ ਰਹਿੰਦੀ ॥ \nਤੂੰ ਸੁਰਾਹੀ ਤੂੰ ਸਾਕੀ ਤੂੰ ਸਤਿਗੁਰ ਪੁਰਖੁ ਬਿਧਾਤਾ , \nਸਹਜਿ ਸਮਾਏ ਜਿੰਦ ਤੁਝ ਬਿਨੁ ਜੁਦਾਈਆਂ ਸਹਿਂਦੀ ॥\n\nਆਖਾਂ ਤੁਧੁ ਨੂੰ ਦੇਓ ਦਾਨੁ ਨਾਮੁ ਅਪਣੇ ਚੇਰੇ , \nਹਮ ਗਰੀਬ ਦੁਖ ਘਨੇਰੇ ਤੂੰ ਠਾਕੁਰ ਪ੍ਰਤਿਪਾਲ ਹਮਾਰੇ ॥ \nਦੇਓ ਦਰਸੁ ਅਗੰਮ ਗੋਸਾਂਈ ਤੇਰੇ ਸਾਂਈ ਤੇਰੇ ਸਾਂਈ ਤੇਰੇ ਸਾਂਈ , \nਤੇਰੇ ਸਾਂਈ ਤੇਰੇ ਸਾਂਈ ਦਰਸਨ ਅਗੰਮ ਗੋਸਾਂਈ ਤੂੰ ਸਭਨੀ ਥਾਂਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुझ बिन जिंद जुदाईयां","c":"तुझ बिन जिंद जुदाईयां सैहंदी , \nतुझ बिन जिंद जग माहि नाही रैहंदी ।।\nतूं सुराही तूं साकी तूं सतिगुर पुरख बिधाता , \nसहज समाये जिंद तुझ बिन जुदाईयां सैहंदी ।।\n\nआखां तुध नूँ देओ दान नाम आपणे चेरे , \nहम गरीब दुख घनेरे तूं ठाकुर प्रितपाल हमारे ।।\nदेओ दरस अगंम गोसांई तेरे सांई तेरे सांई तेरे सांई , \nतेरे सांई तेरे सांई दर्शन अगंम गोसांई तँ सभनी थांई ।।\n( यकीन )"},"en":{"t":"Tujh Bin Jind Judaiyaan","c":"Tujh Bin Jind Judaiyaan"}},

	{"id":1769089767760,
	"pb":{"t":"ਤੁਝ ਬਿਨੁ ਦੁਖ ਘਨੇਰੇ ਸਹਿਨੇ","c":"ਤੁਝ ਬਿਨੁ ਦੁਖ ਘਨੇਰੇ ਸਹਿਨੇ , ਰਾਮ ਦਇਆਲ ਪੁਰਖ ਸਾਜਨੜੇ ਸੁਹੇਲੇ ,\nਭਯੋ ਤ੍ਰਿਪਤਿ ਸਤਿਗੁਰ ਮੇਲੇ ॥ \nਸੱਚੁ ਸਰਬੱਤ ਸਾਧ ਸੰਗਤਿ ਸਿਦਕ ਸ਼ਹਾਦਤ , ਦਾਸ ਧਰਮ ਮਾਹਿ ਸਮਾਏ ,\nਸੋ ਦਾਸੁ ' ਦਰਸਨ ' ਮੁਖਿ ਬੋਲੇ , ਮੇਰੇ ਸਾਜਨ ਸੋਹਣੇ ਸੁਹੇਲੜੇ ॥ \nਤੂੰ ਸਭਨੀ ਥਾਂਈ ਜਿਥੇ ਹਊਂ ਜਾਂਈ , ਦਰਸਨ ਅਗੰਮ ਗੋਸਾਂਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुझ बिन दुख घनेरे सहने","c":"तुझ बिन दुख घनेरे सहने , राम दयाल पुरख साजनड़े सुहेले , \nभयो तृप्त सतिगुर मेले ।।\nसच सरबत्त साध संगत सिदक शहादत , दास धरम माहि समाये ,\nसो दास दर्शन मुख बोले , मेरे साजन सोहणे सुहेलड़े ।। \nतूं सभनी थांई जिथे हऊँ जांई , दर्शन अगंम गोसांई ।।\n( यकीन )"},"en":{"t":"Tujh Bin Dukh Ghanere Sehne","c":"Tujh Bin Dukh Ghanere Sehne"}},

	{"id":1769089911463,
	"pb":{"t":"ਤੁਝ ਬਿਨੁ ਪ੍ਰੇਮੁ ਨਾ ਉਪਜੇ","c":"ਤੁਝ ਬਿਨੁ ਪ੍ਰੇਮੁ ਨਾ ਉਪਜੇ , ਮੇਰੇ ਪ੍ਰੀਤਮ ਸਤਿਗੁਰ ਸਾਂਈ ॥ \nਤੁਝ ਬਿਨੁ ਮਨੁ ਲੋਚਦਾ ਹਰਿ ਰਾਇ , ਤੁਝ ਬਿਨੁ ਨੀਂਦ ਨੈਣਣ ਨਾ ਆਏ ॥\nਤੁਝ ਜੇ ਮਨਿ ਭਾਵੈ ਦਰਸਨੁ ਦੇਓ ਮੇਰੇ ਹਰਿ ਰਾਇ , \nਤੁਝੇ ਧਿਆਇਆ ਸਭਨੀ ਥਾਂਈ ਪਾਇਆ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुझ बिन प्रेम ना उपजे","c":"तुझ बिन प्रेम ना उपजे , मेरे प्रीतम सतिगुर सांई ।। \nतुझ बिन मन लोचदा हरि राय , तुझ बिन नींद नैनण ना आये ।।\nतुझ जे मन भावै दर्शन देओ मेरे हरि राय , \nतुझे धिआया सभनी थांई पाया हरि राय ।। \n( यकीन )"},"en":{"t":"Tujh Bin Prem Na Upaje","c":"Tujh Bin Prem Na Upaje"}},

	{"id":1769090065177,
	"pb":{"t":"ਤੁਝ ਬਿਨੁ ਮਨੁ ਲੋਚਦਾ ਹਰਿ ਰਾਇ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਤੁਝ ਬਿਨੁ ਮਨੁ ਲੋਚਦਾ ਹਰਿ ਰਾਇ , ਤੁਝ ਬਿਨੁ ਨੀਂਦ ਨੈਣਣ ਨਾ ਆਏ ॥ \nਮੇਰੇ ਮੀਤ ਸੁਣੇਂਦੜੇ ਰੰਗ ਰੰਗੀਲੇ ਹਰਿ ਰਾਇ , \nਬਿਨੁ ਤੁਝ ਮਰਿ ਜਾਈ , ਯਾ ਯਕੀਨ ਮੀਨਾ ਜਲ ਬਿਨੁ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुझ बिन मन लोचदा हरि राय ( दोहा )","c":"( दोहा )\nतुझ बिन मन लोचदा हरि राय , तुझ बिन नींद नैनण ना आये ।। \nमेरे मीत सुनेंदड़े रंग रंगीले हरि राय , \nबिन तुझ मर जाई , या यकीन मीना जल बिन हरि राय ।।\n( यकीन )"},"en":{"t":"Tujh Bin Mann Lochda Hari Rai ( Doha )","c":"Tujh Bin Mann Lochda Hari Rai ( Doha )"}},

	{"id":1769090389630,
	"pb":{"t":"ਤੁਮ ਮੇਰੋ ਸਾਹਿਬੁ ਊਚ ਮਹਾਨ","c":"ਤੁਮ ਮੇਰੋ ਸਾਹਿਬੁ ਊਚ ਮਹਾਨ , \nਮਨਮੋਹਨ ਤੇਰੇ ਬਲਿ ਬਲਿ ਜਾਊਂ ਦੀਜੋ ਮੋਹੇ ਵਰਦਾਨ ॥\n\nਰਾਮ ਨਾਮ ਕੀ ਬਰਖਾ ਹੋਏ , ਪ੍ਰੇਮ ਰਸੁ ਦੀਜੋ ਮੋਹੇ , \nਮਿਟੇ ਜਨਮੋਂ ਕੀ ਪਿਆਸ ॥\n\nਵੱਡੇ ਤੇਰੇ ਮਹਿਲ ਚੁਬਾਰੇ , ਖੇਲੇ ਖੇਲ ਜਗ ਸੇ ਨਿਆਰੇ , \nਬੇਦ ਕਤੇਬ ਕਰੇ ਬਖਾਨ ॥\n\nਤੂੰ ਸਾਜਨੁ ਤੁਮ ਪ੍ਰੀਤਮ ਪਿਆਰੇ , ਦੀਜੋ ਸਰਣਿ ਦਾਸੁ ਪੁਕਾਰੇ , \n' ਦਰਸਨ ' ਜਾਊਂ ਬਲਿਹਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुम मेरो साहिब ऊच महान","c":"तुम मेरो साहिब ऊच महान , \nमनमोहन तेरे बलि बलि जाऊँ दीजो मोहे वरदान ।।\n\nराम नाम की बरखा होये , प्रेम रस दीजो मोहे , \nमिटे जनमों की पिआस ।।\n\nवड्डे तेरे महल चुबारे , खेले खेल जग से निआरे , \nबेद कतेब करे बखान ।।\n\nतूं साजन तुम प्रीतम पिआरे , दीजो शरण दास पुकारे , \nदर्शन जाऊँ बलिहार ।।\n( यकीन )"},"en":{"t":"Tum Mero Sahib Uch Mahan","c":"Tum Mero Sahib Uch Mahan"}},

	{"id":1769090660679,
	"pb":{"t":"ਤੁਮ ਮੇਰੇ ਠਾਕੁਰ ਰਾਮ ਰਘੁਰਾਈ","c":"ਤੁਮ ਮੇਰੇ ਠਾਕੁਰ ਰਾਮ ਰਘੁਰਾਈ , ਤੁਧੁ ਬਿਨੁ ਨੈਣਣ ਨੀਂਦ ਨਾ ਆਈ , \nਮੋਰੇ ਰਾਮ ਰਘੁਰਾਈ ॥ \nਮਨਿ ਚੈਨੁ ਨਾ ਮੋਹੇ ਸੁਖੁ ਵਿਹਾਇਆ ਤੁਧੁ ਬਿਨੁ ਮੇਰੇ ਪ੍ਰੀਤਮ , \nਸਭਿ ਦਿਸਨਿ ਪਰਾਇਆ , ਮੋਹੇ ਰਾਮ ਰਘੁਰਾਈ ॥ \nਹੇ ਰਾਮਾ ਸਾਵਣੁ ਆਇਆ , ਮੋਰੇ ਅੰਗਣਾ ਰਿਮਝਿਮ ਲਾਇਆ , \nਸਭਿ ਸਖੀਆ ਮਾਣਨਿ ਰੰਗ ਰਲੀਆਂ , \nਬਿਨੁ ਸਾਜਨ ਮੋਹੇ ਕਿਛੁ ਨਹੀਂ ਭਾਇਆ , ਮੇਰੇ ' ਦਰਸਨ ' ਸਾਂਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुम मेरे ठाकुर राम रघुराई","c":"तुम मेरे ठाकुर राम रघुराई , तुध बिन नैनण नींद ना आई , \nमोरे राम रघुराई ।।\nमन चैन ना मोहे सुख विहाया तुध बिन मेरे प्रीतम , \nसभ दिसन पराया , मोहे राम रघुराई ।।\nहे रामा सावन आया , मोरे अंगना रिम झिम लाया , \nसभ सखीआं मानण रंग रलीआं , \nबिन साजन मोहे किछ नहीं भाया , मेरे दर्शन सांई ।।\n( यकीन )"},"en":{"t":"Tum Mere Thakur Ram Raghurai","c":"Tum Mere Thakur Ram Raghurai"}},

	{"id":1769090912076,
	"pb":{"t":"ਤੂੰ ਅੱਲ੍ਹਾ ਤੂੰ ਰਾਮੁ ਰਹੀਮੁ","c":"ਤੂੰ ਅੱਲ੍ਹਾ ਤੂੰ ਰਾਮੁ ਰਹੀਮੁ , ਤੁਮ ਮਾਨਿਆ ਮਨੁ ਮਾਨੇ ॥ \nਠਾਕੁਰ ਪ੍ਰਤਿਪਾਲ ਸਤਿਗੁਰ , ਤੂੰ ਜਿਨ੍ਹੇ ਜਣਾਏ ਸੋਈ ਜਾਣੇ ॥ \nਸਾਧ ਸੰਗਿ ਜਿਸੁ ਹਰਿ ਹਰਿ ਨਾਮੁ ਧਿਆਇਆ , \n' ਦਰਸਨ ' ਮੁਕਤਿ ਅਧਾਰਾ , ਨਾਮ ਰਸੁ ਫਲੁ ਪਾਇਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं अल्ला तूं राम रहीम","c":"तूं अल्ला तूं राम रहीम , तुम मानेआ मन माने ।। \nठाकुर प्रितपाल सतिगुर , तूं जिनहे जनाये सोई जाने ।। \nसाध संग जिस हरि हरि नाम धिआया , \nदर्शन मुक्त अधारा , नाम रस फल पाया ।।\n(यकीन)"},"en":{"t":"Tu Allah Tu Ram Raheem","c":"Tu Allah Tu Ram Raheem"}},

	{"id":1769091122071,
	"pb":{"t":"ਤੂੰ ਸਖੀ ਤੂੰ ਸਖਾ","c":"ਤੂੰ ਸਖੀ ਤੂੰ ਸਖਾ , ਨਾਨਕ ਪ੍ਰਭ ਗੁਰਮੁਖਿ ਰਾਖਾ ਜੀਉ ॥ \nਨੈਣ ਤਰਸਨ ਤੁਮਾਰੇ ਦਰਸਨ , ਮਨੁ ਸਾਧ ਸੰਗਤਿ ਬਿਗਾਸਾ ॥ \nਤੂੰ ਮੇਰਾ ਬੰਧਪੁ ਤੂੰ ਮੇਰਾ ਸੁਆਮੀ , ਹਰਿ ਤੁਮ ਆਪਿ ਭ੍ਰਾਤਾ ॥ \nਮਨ ਪਿਆਸ ਸਤਾਵੇ ਦਿਨ ਰਾਤੀ , ਅੰਮ੍ਰਿਤ ਨਾਮੁ ਪ੍ਰਭ ਤਾਂਕਾ ॥ \nਹਾਥ ਜੋੜਿ ਬੰਦਨਾ ਤੁਧੁ ਆਗੇ , ' ਦਰਸਨ ' ਨਿਮਾਣੇ ਕਾਟੋ ਪਾਪ ਹਮਾਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं सखी तूं सखा","c":"तूं सखी तूं सखा , नानक प्रभ गुरमुख राखा जीओ ।। \nनैन तरसन तुमारे दर्शन , मन साध संगत बिगासा ।। \nतू मेरा बंधप तू मेरा सुआमी , हरि तुम आप भ्राता ।। \nमन पिआस सतावे दिन राती , अमृत नाम प्रभ तांका ।। \nहाथ जोड़ बंदना तुध आगे , दर्शन निमाणे काटो पाप हमारे ।।\n( यकीन )"},"en":{"t":"Tu Sakhi Tu Sakha","c":"Tu Sakhi Tu Sakha\nTu mera Bandhap Tu Mera Swami"}},

	{"id":1769091523534,
	"pb":{"t":"ਤੂੰ ਸਭਨੀ ਥਾਂਈ ਜਿਥੇ ਹਉਂ ਜਾਂਈ ","c":"ਤੂੰ ਸਭਨੀ ਥਾਂਈ ਜਿਥੇ ਹਉਂ ਜਾਂਈ , \nਤੇਰੇ ਗੋਸਾਈ , ਤੇਰੇ ਸਾਂਈ , ਤੇਰੇ ਸਾਂਈ ॥ \nਸੁਣੇਂਦੜੇ ਸੋਹਣੇ ਸੁੰਦਰ ਸ਼ਾਮ ॥\n\nਰਾਧਾ ਕੰਤ ਭਏ ਹੋਏ ਸਹਾਈ , \nਤੂੰ ਸਭਨੀ ਥਾਂਈ ਤੂੰ ਸਭਨੀ ਥਾਂਈ , \nਤੂੰ ਸਭਨੀ ਥਾਂਈ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं सभनी थांई जिथे हउँ जांई","c":"तूं सभनी थांई जिथे हउँ जांई , \nतेरे गोसाई , तेरे सांई , तेरे सांई ।।\nसुनेंदड़े सोहणे सुंदर शाम , \n\nराधा कंत भये होये सहाई , \nतूं सभनी थांई तूं सभनी थांई , \nतूं सभनी थांई हरि राय ।।\n( यकीन )"},"en":{"t":"Tu Sabhni Thai Jithe Hau Jai","c":"Tu Sabhni Thai Jithe Hau Jai"}},

	{"id":1769091730125,
	"pb":{"t":"ਤੂੰ ਸਾਂਈ ਦੀਨ ਦਇਆਲਾ ( ਦੋਹਰੇ )","c":"( ਦੋਹਰੇ )\nਤੂੰ ਸਾਂਈ ਦੀਨ ਦਇਆਲਾ , ਤੂੰ ਮੇਰਾ ਪ੍ਰੀਤਮ ਪ੍ਰਤਿਪਾਲਾ ॥ \nਤੂੰ ਨਦਰਿ ਕਰੇ ਜਿਸ ਤੇ ਕਰਤਾਰ , ਸੋਈ ਉਤਰੇ ਭਵਜਲੁ ਪਾਰ ॥ \nਤੂੰ ਸਭ ਤੋਂ ਸੁਘੜੁ ਸਿਆਣਾ , ਮੁਝ ਨਾਹੀ ਗੁਣ ਸਾਰ ਨਾ ਜਾਣਾ ॥ \nਨਾਮੁ ਰਤਨੁ ਤੁਧੁ ਸਿਉਂ ਪਾਏ , ਤੇਰੀ ਉਪਮਾ ਜੀਹਵਾ ਗਾਏ ॥ \nਰੋਮ ਰੋਮ ਮੇਂ ਨਾਮੁ ਸਮਾਏ , ' ਦਰਸਨ ' ਨਦਰਿ ਕਰੋ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तू सांई दीन दयाला ( दोहे )","c":"( दोहे )\nतू सांई दीन दयाला , तू मेरा प्रीतम प्रितपाला ।। \nतू नदर करे जिस ते करतार , सोई उतरे भवजल पार ।। \nतूं सभ तों सुघड़ सिआणा , मुझ नाही गुण सार ना जाणां ।। \nनाम रतन तुध सिओं पाये , तेरी उपमा जीहवा गाये ।। \nरोम रोम में नाम समाये , दर्शन नदर करो हरि राय ।।\n( यकीन )"},"en":{"t":"Tu Sai Deen Dayaal ( Doha )","c":"Tu Sai Deen Dayaal ( Doha )"}},

	{"id":1769092185463,
	"pb":{"t":"ਦੀਨ ਕੇ ਦਾਤਾ ਗਰੀਬੋਂ ਕੇ ਵਾਲੀ ( ਆਸ )","c":"( ਆਸ )\nਦੀਨ ਕੇ ਦਾਤਾ ਗਰੀਬੋਂ ਕੇ ਵਾਲੀ , ਰੱਖਿਆ ਕਰੋ ਆਪ ਬਣ ਪਾਲੀ ॥ \nਹਉਂ ਨਿਰਬਲ ਨੀਚ ਨਿਮਾਣਾ , \nਤੁਮਰੀ ਉਸਤਤਿ ਕਰਨਾ ਨਾ ਜਾਣਾਂ , ਕਰੇ ਬੇਨੰਤੀ ਤੇਰੇ ਦਰ ਪੇ ਸਵਾਲੀ ॥\nਤੁਧੁ ਕਿਰਪਾ ਤੇ ਨਾਮੁ ਕਮਾਊਂ , \nਭਵਸਾਗਰ ਸੇ ਮੁਕਤਿ ਹੋ ਜਾਊਂ , ਦਾਸ ਕੀ ਬੇਨੰਤੀ ਕਭੀ ਨਾ ਟਾਲੀ ॥\nਤੂੰ ਹੀ ਤੂੰ ਮਨ ਹਰ ਵੇਲੇ ਬੋਲੇ , \nਬਾਵਰੇ ਨੈਣ ਪ੍ਰੀਤਮ ਕੋ ਟੋਲੇ , ' ਦਰਸਨ ' ਦਾਸ ਕਰੋ ਆਪ ਰਖਵਾਲੀ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"दीन के दाता गरीबों के वाली ( आस )","c":"( आस )\nदीन के दाता गरीबों के वाली , रक्षा करो आप बण पाली ।।\nहउँ निरबल नीच निमाणा , \nतुमरी उसतत करना ना जाणा , करे बेनती तेरे दर पे सवाली ।।\nतुध किरपा ते नाम कमाऊँ , \nभवसागर से मुक्त हो जाऊँ , दास की बेनती कभी ना टाली ।। \nतू ही तूं मन हर वेले बोले , \nबावरे नैण प्रीतम को टोले , दर्शन दास करो आप रखवाली ।।\n( यकीन )"},"en":{"t":"Deen Ke Data Gareebo Ke Vaali ( Aas )","c":"Deen Ke Data Gareebo Ke Vaali ( Aas )\nTu Hi Tu Mann Har Vele Bole\n"}},

	{"id":1769092487621,
	"pb":{"t":"ਤੂੰ ਹੀ ਮੇਰਾ ਸਜਣੁ ਪਿਆਰਾ","c":"ਤੂੰ ਹੀ ਮੇਰਾ ਸਜਣੁ ਪਿਆਰਾ , ਤੇਰੇ ਨਾਵੈਂ ਜਨਮੁ ਹਮਾਰਾ ॥ \nਤੇਰੇ ਸੰਗਿ ਭਉ ਨਾ ਲਾਗੇ , ਦੁਸ਼ਟ ਬੈਂਤ ਜਾਯੋ ਭਾਗੇ , ਤੂੰ ਕਸ਼ਟ ਨਿਵਾਰਣਹਾਰਾ ॥\n\nਤੂੰ ਮੇਰਾ ਸ਼ਾਹੁ ਅੱਤਿ ਊਚਾ ਦਾਨਾ , ਨਾਮੁ ਧਨੁ ਦੇਵਹੁ ਨਾਮੁ ਨਿਧਾਨਾ , \nਤੂੰ ਕਰਨ ਕਰਾਵਣਹਾਰਾ ॥\n\nਹਮ ਪਾਪੀ ਤੁਮ ਬਖਸਣਹਾਰ , ਦਇਆ ਮਿਹਰ ਕਰੋ ਕਰਤਾਰ , \nਦੀਜੋ ਆਪਿ ਸਹਾਰਾ ॥\n\nਤੇਰੀ ਕਿਰਪਾ ਹੋ ਤੇਰਾ ਸਹਾਰਾ , ' ਦਰਸਨ ' ਜਨੁ ਫਿਰ ਹੋਵੇ ਨਿਆਰਾ ,\nਚਮਕੇ ਜਗ ਸਿਤਾਰਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं ही मेरा सजन पिआरा","c":"तूं ही मेरा सजन पिआरा , तेरे नावें जनम हमारा ।।\nतेरे संग भौ ना लागे , दुष्ट बैंत जायो भागे , तूं कष्ट निवारणहारा ।।\n\nतू मेरा शाहु अत्त ऊचा दाना , नाम धन देवहु नाम निधाना , \nतूं करन करावणहारा ।।\n\nहम पापी तुम बख्शणहार , दया मेहर करो करतार , \nदीजो आप सहारा ।।\n\nतेरी किरपा हो तेरा सहारा , दर्शन जन फिर होवे निआरा , \nचमके जग सितारा ।।\n( यकीन )"},"en":{"t":"Tu Hi Mera Sajan Pyaara ","c":"Tu Hi Mera Sajan Pyaara "}},

	{"id":1769092947608,
	"pb":{"t":"ਤੂੰ ਜਾਣੇ ਤੁਝ ਤਾਂਹੀ ਮਾਨੈ","c":"ਤੂੰ ਜਾਣੇ ਤੁਝ ਤਾਂਹੀ ਮਾਨੈ , ਤੁਝ ਬਿਨੁ ਮਨੁ ਨਾ ਮਾਨੈ ॥ \nਤੁਝ ਬਿਨੁ ਦੁਖ ਘਨੇਰੇ ਸਹਿਣੇ , \nਮੇਰੇ ਪ੍ਰੀਤਮ ਹਰਿ ਜੋਬਨ ਮੇਂ ਸੁਖ ਸਹਾਏ , ਸਤਿਗੁਰ ਠਾਕੁਰ ਹਰਿ ਰਾਇ ॥\n\nਤੁਝ ਬਿਨੁ ਹਰਿ ਰਾਇ ਮਨੁ ਲੋਚਦਾ ਜਿਉਂ ਚਾਤ੍ਰਿਕ ਬੂੰਦ ਸਤਾਏ ॥ \nਤੁਝ ਬਿਨੁ ਮਨੁ ਮਾਨੇ ਨਾਹੀ ਦੇਓ ਨਦਰਿ ਜੇ ਤੁਝ ਭਾਏ ਹਰਿ ਰਾਇ ॥ \nਤੁਝ ਬਿਨੁ ਨੈਣਣ ਨਾ ਨੀਂਦ ਆਏ , ਪ੍ਰੀਤਮ ਹਰਿ ਰਾਇ ॥\n\nਦੇਹੁ ਨਾਮੁ ਠਾਕੁਰ ਪਿਆਰੇ ' ਦਰਸਨ ' ਏਹ ਮੋਹੇ ਮਨਿ ਭਾਏ ॥ \nਕੂੜੁ ਭਯੋ ਸਗਲ ਸੰਸਾਰ , \nਕਲਿ ਮਾਹਿ ਬਿਨੁ ਨਾਮੇ ਨਾ ਉਤਰੇ ਪਾਰ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं जाने तुझ तांही मानै","c":"तूं जाने तुझ तांही मानै , तुझ बिन मन ना मानै ।।\nतुझ बिन दुख घनेरे सहणे , \nमेरे प्रीतम हर जोबन में सुख सहाये , सतिगुर ठाकुर हरि राय ।।\n\nतुझ बिन हरि राय मन लोचदा जिओं चात्रिक बूँद सताये , \nतुझ बिन मन माने नाही देओ नदर जे तुझ भाये हरि राय ।।\nतुझ बिन नैनण ना नींद आये , प्रीतम हरि राय , \n\nदेहु नाम ठाकुर पिआरे दर्शन एह मोहे मन भाये ।।\nकूड़ भयो सगल संसार , \nकलि माहि बिन नामे ना उतरे पार हरि राय ।।\n( यकीन )"},"en":{"t":"Tu Jaane Tujh Taahi Maane","c":"Tu Jaane Tujh Taahi Maane"}},

	{"id":1769093323497,
	"pb":{"t":"ਨਾਮੁ ਸਿਮਰਿ ਦੁਖ ਕੱਟੇ ਜਾਣ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਨਾਮੁ ਸਿਮਰਿ ਦੁਖ ਕੱਟੇ ਜਾਣ , \nਕਾਮਨਿ ਕੰਤ ਸੰਗਿ ਸੁਹਾਗਣਿ , ' ਦਰਸਨ ' ਪਿਰ ਬਿਨੁ ਮਰਿ ਜਾਣ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"नाम सिमर दुख कट्टे जाण ( दोहा )","c":"( दोहा )\nनाम सिमर दुख कट्टे जाण , \nकामन कंत संग सुहागण , दर्शन पिर बिन मर जाण ।।\n( यकीन )"},"en":{"t":"Naam Simar Dukh Katte Jaan ( Doha )","c":"Naam Simar Dukh Katte Jaan ( Doha )"}},

	{"id":1769093564234,
	"pb":{"t":"ਤੂੰ ਬੇਅੰਤ ਬਖ਼ਸ਼ੰਦ ਬਖ਼ਸ਼ਣਹਾਰ ਬਾਬਾ","c":"ਤੂੰ ਬੇਅੰਤ ਬਖ਼ਸ਼ੰਦ ਬਖ਼ਸ਼ਣਹਾਰ ਬਾਬਾ , \nਗੋਕੁਲ ਮਥੁਰਾ ਰਾਮਾ ਕ੍ਰਿਸ਼ਨਾ ਅੱਲ੍ਹਾ ਹੂ ਏ ਮੱਕਾ ਕਾਅਬਾ ॥ \nਬੇਦ ਪੁਰਾਨ ਕਤੇਬ ਸਭਹਿ ਜੋਗੀ ਜੋਗੇਸ਼ਵਰ ਢੂੰਢਿ ਥੱਕੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तू बेअंत बख्शंद बख्शणहार बाबा","c":"तू बेअंत बख्शंद बख्शणहार बाबा , \nगोकुल मथुरा रामा कृष्णा अल्लाह हू ए मक्का काअबा ।। \nवेद पुराण कतेब सभहि जोगी जोगेशवर ढूँढ थक्के ।।\n( यकीन )"},"en":{"t":"Tu Beyant Bakshand Bakshanhar Baba","c":"Tu Beyant Bakshand Bakshanhar Baba"}},

	"pb":{"t":"ਤੂੰ ਦੇਂਦਾ ਆਇਆ ਦੇਵਣਹਾਰ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਤੂੰ ਦੇਂਦਾ ਆਇਆ ਦੇਵਣਹਾਰ , ਤੂੰ ਕਰਤਾ ਪੁਰਖੁ ਮੁਕੰਦ ਮੁਰਾਰ ॥ \nਤੂੰ ਆਪੇ ਲਾਵੈਂ ਲਿਵ ਕਰਤਾਰ , ਤੂੰ ਆਪੇ ਕਰਦਾ ਭਵਜਲੁ ਪਾਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं देंदा आया देवणहार ( दोहा )","c":"( दोहा )\nतूं देंदा आया देवणहार , तूं करता पुरख मुकंद मुरार ।।\nतूं आपे लावें लिव करतार , तूं आपे करदा भउजल पार ।।\n( यकीन )"},"en":{"t":"Tu Denda Aaya Devanhaar ( Doha )","c":"Tu Denda Aaya Devanhaar ( Doha )"}},

	{"id":1769093948057,
	"pb":{"t":"ਤੂੰ ਪਾਤਸ਼ਾਹਾਂ ਕਾ ਪਾਤਸ਼ਾਹ","c":"ਤੂੰ ਪਾਤਸ਼ਾਹਾਂ ਕਾ ਪਾਤਸ਼ਾਹ , ਸੱਚਾ ਪਰਵਰਦਿਗਾਰ , \nਨਾਮ ਤੇਰੇ ਦੀ ਓਟ ਜੋ ਤੱਕਦੇ , ਭਵਜਲੁ ਉਤਰੇ ਪਾਰ ॥ \nਤੂੰ ਆਪਿ ਕਰੇਂਦਾ ਆਪੇ ਕਰਤਾ , ਤੂੰ ਆਪਿ ਕਰਣੇਹਾਰ , \nਤੇਰੇ ਭਾਣੇ ਵਿਚਿ ਜੋ ਰਹਿੰਦੇ , ਰੰਗੁ ਚੜ੍ਹੇ ਕਰਤਾਰ ॥ \nਰਾਜੁ ਨਾ ਚਾਹੁੰ ਤਾਜੁ ਨਾ ਚਾਹੁੰ , ਮਾਂਗੇ ਤੋਸੇ ਪਿਆਰ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तू पातशाहों का पातशाह","c":"तू पातशाहों का पातशाह , सच्चा परवरदिगार ,\nनाम तेरे दी ओट जो तकदे , भवजल उतरे पार ।।\nतू आप करेंदा आपे करता , तू आप करणेहार ,\nतेरे भाणे विच जो रैहंदे , रंग चढ़े करतार ।।\nराज ना चाहूँ ताज ना चाहूँ , मांगें तोसे पिआर ।।\n(यकीन)"},"en":{"t":"Tu Paatshaho Ka Paatshaho","c":"Tu Paatshaho Ka Paatshaho"}},

	{"id":1769094592732,"audio":"audio/Tu Maharani Jag Kalyani.mp3",
	"pb":{"t":"ਤੂੰ ਮਹਾਰਾਣੀ ਜਗ ਕਲਿਆਣੀ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਤੂੰ ਮਹਾਰਾਣੀ ਜਗ ਕਲਿਆਣੀ , ਨਵਸ਼ਕਤੀ ਮਾਂ ਆਦਿ ਭਵਾਨੀ ॥ \nਮਹਿਸ਼ਾਸੁਰ ਦੈਤ ਸੰਹਾਰੇ , ਚੰਡ-ਮੁੰਡ ਰਾਖਸ਼ ਮਾਰੇ ॥ \nਵਧੁ ਕੀਓ ਭੈਰੋ ਵਲੀ ਕਾ , ਜੈ ਜੈਕਾਰ ਹੋਵੇ ਵੈਸ਼ਨੋ ਰਾਣੀ ॥\n\nਨੈਣਾ ਦੇਵੀ ਰੂਪੁ ਨਿਰਾਲਾ , ਭਦ੍ਰਕਾਲੀ ਮਾਤ ਜਵਾਲਾ ॥ \nਅਸ਼ਟ ਭੁਜੀ ਸਿੰਘ ਸਵਾਰੀ , ਕਲਹ ਕਲੇਸ਼ ਦੁਖ ਨਿਵਾਰੀ ॥ \nਚਿੰਤਾਪੂਰਣੀ ਚਿੰਤਾ ਹਰਿਦੇ , ਮਨਸਾ ਦੇਵੀ ਪੂਰੀ ਮਨਸਾ ਕਰਦੇ ॥\n\nਚਾਮੁੰਡਾ ਦੇਵੀ ਮਾਂ ਸ਼ਾਰਦਾ ਪਿਆਰੀ , ਸੀਤਲਾ ਮਈਆ ਕਰੋ ਆਪ ਰਖਵਾਰੀ ॥ \nਬ੍ਰਹਮਾ ਬਿਸ਼ਨੂੰ ਮਹੇਸ਼ ਧਿਆਵੇ , ਰਿਸ਼ੀ ਮੁਨੀ ਵਰ ਤੁਝ ਤੇ ਪਾਵੇ ॥ \nਮਹਿਮਾ ਤੁਮਰੀ ਜਗ ਸੇ ਨਿਆਰੀ , ' ਦਰਸਨ ' ਦੀਜੋ ਆਦਿ ਕੁਵਾਰੀ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं महाराणी जग कलियाणी ( शक्ति )","c":"( शक्ति )\nतूं महाराणी जग कलियाणी नवशक्ती माँ आदि भवानी ।। \nमहिसासुर दैत संहारे , चंडमुंड राक्षस मारे ।। \nवध कीओ भैरो वली का , जै जैकार होवे वैष्णो राणी ।। \n\nनैना देवी रूप निराला , भद्रकाली मात जवाला ।। \nअष्ट भुजी सिंघ सवारी , कलह कलेश दुख निवारी ।। \nचिंता पुरणी चिंता हरदे , मनसा देवी पूरी मनसा करदे ।।  \n\nचौमुंडा देवी माँ शारदा पिआरी , सीतला मईया करो आप रखवारी ।।\nब्रह्मा विशनूँ महेश धिआवे , रिशी मुनी वर तुझ ते पावे ।। \nमहिमा तुमरी जग से निआरी , दर्शन दीजो आदि कवारी ।।\n( यकीन )"},"en":{"t":"Tu Maharani Jag Kalyaani ( Shakti )","c":"Tu Maharani Jag Kalyaani ( Shakti )"}},

	{"id":1769095107242,
	"pb":{"t":"ਤੂੰ ਮਾਈ ਤਿੰਨਿ ਪੂਤ ਜਾਈ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਤੂੰ ਮਾਈ ਤਿੰਨਿ ਪੂਤ ਜਾਈ , ਬ੍ਰਹਮ ਮਹੇਸ਼ ਬਿਸ਼ਨਵ ਤਾਂਈ ॥ \nਸ਼ਿਵ ਸ਼ਕਤੀ ਬਿਨੁ ਚਲੇ ਨਾ ਖੁਦਾਈ , \nਦਰਸੁ ਦੇਓ ਮੇਰੇ ਨਾਨਕ , ਸੁਣੋ ਬੇਨੰਤੀ ਗੋਬਿੰਦ ਗੋਸਾਂਈ ॥\nਪਰਮਗਤਿ ਜਾਣੀ ਮਨਿ ਮਾਣੀ , \nਗੋਬਿੰਦ ਗੋਬਿੰਦ ਜਪੇ ਮਨੁ ਮੇਰਾ , ਗੁਰ ਬਿਨੁ ਸੰਗੀ ਨਾ ਕੋ ਤੇਰਾ ॥ \nਸਤਿਗੁਰ ਸੰਗਿ ਹਰਿ ਕੀਰਤਨੁ ਗਾਵਾ , \nਚਰਣ ਧੋਵਾਂ ਸੰਤ ਸਜਣ ਕੇ , ਜਨਮ ਜਨਮ ਕੇ ਦੂਖ ਗਵਾਵਾਂ ॥\nਏਹ ਹੁਕਮੁ ਮੰਨਿ ਹੋਵਾਂ ਪਰਵਾਣੁ , ' ਦਰਸਨ ' ਗੁਰ ਆਪਣੇ ਜਾਊਂ ਕੁਰਬਾਣੁ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं माई तिंन पूत जाई ( शक्ति )","c":"( शक्ति )\nतूं माई तिंन पूत जाई , ब्रह्म महेश विशनव तांई ।। \nशिव शक्ती बिन चले ना खुदाई , \nदरस देओ मेरे नानक , सुणो बेनती गोबिंद गोसांई ।।\nपरमगत जानी मन मानी , \nगोबिंद गोबिंद जपे मन मेरा , गुर बिन संगी ना को तेरा ।।\nसतिगुर संग हरि कीरतन गावां , \nचरण धोवां संत सजन के , जनम जनम के दूख गवावां ।।\nएह हुकम मन्न होवां परवान , दर्शन गुर आपणे जाऊँ कुरबान ।।\n( यकीन )"},"en":{"t":"Tu Mai Tin Poot Jaai ( Shakti )","c":"Tu Mai Tin Poot Jaai ( Shakti )"}},

	{"id":1769095412988,
	"pb":{"t":"ਤੂੰ ਮੇਰਾ ਠਾਕੁਰ ਗੋਬਿੰਦ ਗੋਸਾਂਈ","c":"ਤੂੰ ਮੇਰਾ ਠਾਕੁਰ ਗੋਬਿੰਦ ਗੋਸਾਂਈ , ਰਾਖੋ ਪੈਜ ਮੇਰੇ ਸਾਂਈ ਜੀਉ ॥ \nਮੈਂ ਨਿਰਗੁਣ ਕੋ ਗੁਣੁ ਨਾਹੀ , ਸੇਵ ਕਮਾਵਾਂ ਨਾਮੁ ਧਿਆਵਾਂ , \nਤੁਝ ਤੇ ਹਉਂ ਕੁਰਬਾਨੁ ਜਾਵਾਂ ॥\nਚਸਾ ਨਾ ਬਿਛੁੜੇ ਹਰਿ ਜੀਉ , ਸਾਜਨ ਮੀਤ ਧਨ ਥਾਨ ਸੁਹਾਵਾ , \nਅਨਹਦ ਸਬਦੁ ਪ੍ਰਭ ਦੀਜੈ , ਮੇਰੇ ਸਾਜਨ ਮੀਤ ਪਿਆਰੇ ॥\nਆਪੇ ਕਰਤਾ ਆਪਿ ਕਰਾਵੈ , ਨਾਨਕ ਜੋ ਤੁਧੁ ਮਨਿ ਭਾਵੈ , \nਹਮ ਨੀਚ ਕਰਸਾਂ ਅਰਜੋਈ , ' ਦਰਸਨ ' ਨਿਮਾਣੇ ਹਰਿ ਦੀਜੈ ਢੋਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं मेरा ठाकुर गोबिंद गोसांई","c":"तूं मेरा ठाकुर गोबिंद गोसांई , राखो पैज मेरे सांई जीओ ।।\nमैं निरगुण को गुण नाही , सेव कमावां नाम धिआवां , \nतुझ ते हउँ कुरबान जावां ।।\nचसां ना बिछुड़े हरि जीओ , साजन मीत धन थान सुहावा , \nअनहद शब्द प्रभ दीजै , मेरे साजन मीत पिआरे ।।\nआपे करता आप करावै , नानक जो तुध मन भावै , \nहम नीच करसां अरजोई , दर्शन निमाणे हरि दीजै ढोई ।।\n( यकीन )"},"en":{"t":"Tu Mera Thakur Gobind Gosai","c":"Tu Mera Thakur Gobind Gosai"}},

	{"id":1769095922192,
	"pb":{"t":"ਤੂੰ ਮੇਰਾ ਰੰਗ ਰੰਗੀਲਾ ਸਾਜਨ","c":"ਤੇਰੀ ਮਹਿਮਾ ਬੇਦਾਂ ਤਹਿ ਨਾਹੀ ਜਾਣੈ , ਸੰਤ ਕੀ ਸਰਣਿ ਹਰਿ ਰੰਗੁ ਮਾਣੈ ॥ \nਤੂੰ ਮੇਰਾ ਰੰਗ ਰੰਗੀਲਾ ਸਾਜਨ , ਦਰਸੁ ਦੇਓ ਮੇਰੇ ਰਾਮ ਗੋਪਾਲਾ ॥ \nਆਪੇ ਸਾਜੇ ਸਗਲ ਸੰਸਾਰਾ , ਸਗਲ ਵਸਤ ਮਾਹਿ ਤੇਰਾ ਪਸਾਰਾ ॥ \nਇਕ ਵਸਤੂ ਗੁਰੂ ਦੇਵੈ ਭਾਈ , ' ਦਰਸਨ ' ਮੁਕਤਿ ਹਰਿ ਨਾਮ ਬਿਨ ਨਾ ਪਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं मेरा रंग रंगीला साजन","c":"तेरी महिमा बेदां तहि नाही जाणै , संत की शरण हरि रंग माणै ।। \nतूं मेरा रंग रंगीला साजन , दरस देओ मेरे राम गोपाला ।। \nआपे साजे सगल संसारा , सगल वसत माहि तेरा पसारा ।। \nइक वसतू गुरू देवै भाई , दर्शन मुक्त हरि नाम बिन ना पाई ।।\n( यकीन )"},"en":{"t":"Tu Mera Rang Rangeela Saajan","c":"Tu Mera Rang Rangeela Saajan\nTeri Mahima Beda Tahi Naahi Jaano"}},

	{"id":1769096321759,
	"pb":{"t":"ਤੂੰ ਮੇਰੇ ਠਾਕੁਰ ਠਾਕੁਰ ਗੋਸਾਈ","c":"ਤੂੰ ਮੇਰੇ ਠਾਕੁਰ ਠਾਕੁਰ ਗੋਸਾਈ , ਤੁਧੁ ਬਿਨੁ ਨੈਣਣ ਨੀਂਦ ਨਾ ਆਵੇ ॥ \nਨਿੱਤ ਦਿਨ ਯਾਦ ਕਰੇਸਾਂ ਮੇਰੇ ਸਾਹਿਬਾ , ਤੂੰ ਕਾਹੇ ਕੋ ਦੇਰ ਲਗਾਈ ॥ \nਚਾਰੇ ਰੁਤਾਂ ਬਾਰਾਂ ਮਾਹ , ਮੈਂ ਤੁਧੁ ਬਿਨੁ ਸਾਵਣਿ ਤ੍ਰਿਹਾਈ ॥ \nਇਕੋ ਆਸ ਮਨਿ ਲਗਾਸਾਂ , ਕਬ ਦਰਸ ਹੋਣਗੇ ਗੁਸਾਂਈ ॥ \nਮੈਂ ਕਾਮਨਿ ਕੰਤ ਪਿਆਸੀ , ਨਾ ਕੋ ਸੰਗਿ ਸਹਾਈ ॥\n\nਇਕ ਘੜੀ ਮੋਹੇ ਚੈਨ ਨਾ ਆਸੀ , ਤੂੰ ਕਾਹੇ ਕੋ ਦੇਰ ਲਗਾਈ ॥ \nਮੈਂ ਕੋ ਦਰਦ ਬਿਰਹੋਂ ਹੋਸੀ , ਨਾ ਕੋ ਪ੍ਰੀਤਿ ਪਰਾਈ ॥ \nਨੈਣਣ ਉਡੀਕਾਂ ਹੱਡੀਂ ਰਚੀ , ਤੂੰ ਕਾਹੇ ਕੋ ਦੇਰ ਲਗਾਈ ॥ \nਮੈਂ ਕੋ ਤਾਂਘ ਵਧਦੀ ਜਾਸੀ , ਇਕ ਪਲ ਖੁਸ਼ੀ ਤਬ ਹੋਸੀ ॥ \nਦਰਸਨ ਦਿਆਲ ਭਯੋ ਮੇਰੇ ਸਾਹਿਬਾ , ਸਭਹਿ ਅਲਸ ਤੁੱਟਿ ਜਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तू मेरे ठाकुर ठाकुर गोसाई","c":"तू मेरे ठाकुर ठाकुर गोसाई , तुध बिन नैनण नींद ना आवे ।।\nनित्त दिन याद करेसां मेरे साहिबा , तू काहे को देर लगाई ।।\nचारे रुतां बारां माह , मैं तुध बिन सावन त्रिहाई ।।\nएको आस मन लगासां , कब दरस होंगे गुसांई ।।\nमैं कामन कंत पिआसी , ना को संग सहाई ।।\n\nएक घड़ी मोहे चैन ना आसी , तू काहे को देर लगाई ।।\nमैं को दरद बिरहों होसी , ना को प्रीत पराई ।।\nनैनण उडीकां हड्डीं रची , तू काहे को देर लगाई ।। \nमैं को तांघ वधदी जासी , इक्क पल खुशी तब होसी ।। \nदर्शन दयाल भयो मेरे साहिबा , सभहि अलस टुट्ट जाई ।।\n( यकीन )"},"en":{"t":"Tu Mere Thakur Thakur Gosai","c":"Tu Mere Thakur Thakur Gosai\nNitt Din Yaad Karesa Mere Sahiba"}},

	{"id":1769096574193,
	"pb":{"t":"ਫਿਰਤ ਫਿਰਤ ਦਰ ਦਰਵੱਜੇ ( ਦੋਹਰਾ )","c":"( ਦੋਹਰਾ )\nਫਿਰਤ ਫਿਰਤ ਦਰ ਦਰਵੱਜੇ , ਮਿਲਿਆ ਨਾ ਮਨ ਕੋ ਚੈਨ , \nਤੇਰੀ ਬਿਰਹੋਂ ਮਾਰਿਆ ਸਾਹਿਬਾ , ਬਿਨੁ ਤੇਰੇ ਮੇਰੀ ਕਿਵੇਂ ਬੀਤੇ ਰੈਨ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"फिरत फिरत दर दरवज्जे ( दोहा )","c":"( दोहा )\nफिरत फिरत दर दरवज्जे , मिलेआ ना मन को चैन ,\nतेरी बिरहों मारेआ साहिबा , बिन तेरे मेरी किवें बीते रैन ।।\n( यकीन )"},"en":{"t":"Firat Firat Dar Darvaja ( Doha )","c":"Firat Firat Dar Darvaja ( Doha )"}},

	{"id":1769096801381,
	"pb":{"t":"ਤੂੰ ਵੱਡਾ ਤੇਰਾ ਨਾਉਂ ਵੱਡਾ","c":"ਤੂੰ ਵੱਡਾ ਤੇਰਾ ਨਾਉਂ ਵੱਡਾ , ਵੱਡੇ ਤੇਰੇ ਖੇਲ ਪਿਆਰੇ , \nਮੈਂ ਜਾਉਂ ਬਲਿਹਾਰੇ ॥\nਤੇਰੇ ਦਰਬਾਰੇ ਸੋਹਵੇ ਸੰਗਤਿ , ਅਜਬ ਨਿਰਾਲੀ ਤੇਰੀ ਰੰਗਤਿ , \nਮੇਰੇ ਗਿਰਵਰਧਾਰੇ ॥\nਰਾਜਾ ਰੰਕ ਬਰਾਬਰਿ ਜਾਣਿਓ , ਉਤਮ ਨੀਚ ਭੇਦ ਨਾ ਮਾਣਿਓ , \nਮੇਰੇ ਪੁਰਖ ਮੁਰਾਰੇ ॥\nਤੂੰ ਦਇਆਲਾ ਤੂੰ ਕਿਰਪਾਲਾ , ਤੂੰ ਮੇਰਾ ਪ੍ਰੀਤਮ ਪ੍ਰਤਿਪਾਲਾ , \nਦੀਜੋ ਨਾਮੁ ਦਾਤਾਰੇ ॥\nਆਪੇ ਬਖ਼ਸ਼ੇ ਤੂੰ ਵਡਿਆਈ , ਜੋ ਤੇਰੇ ਮਨਿ ਭਾਈ , \n' ਦਰਸਨ ' ਪਾਰ ਉਤਾਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं वड्डा तेरा नाओं वड्डा","c":"तूं वड्डा तेरा नाओं वड्डा , वड्डे तेरे खेल पिआरे , \nमैं जाउँ बलिहारे ।।\nतेरे दरबारे सोहवे संगत , अजब निराली तेरी रंगत , \nमेरे गिरवरधारे ।।\nराजा रंक बराबर जानेओ , उत्तम नीच भेद ना मानेओ , \nमेरे पुरख मुरारे ।।\nतूं दयाला तूं किरपाला , तूं मेरा प्रीतम प्रितपाला , \nदीजो नाम दातारे ।। \nआपे बख्शे तूं वडियाई , जो तेरे मन भाई , \nदर्शन पार उतारे ।।\n( यकीन )"},"en":{"t":"Tu Vadda Tera Naam Vadda","c":"Tu Vadda Tera Naam Vadda"}},

	{"id":1769097129885,
	"pb":{"t":"ਤ੍ਰਿਸਨਾ ਮਿਟੇ ਮੇਰੇ ਮਨ ਤਨ ਕੀ","c":"ਤ੍ਰਿਸਨਾ ਮਿਟੇ ਮੇਰੇ ਮਨ ਤਨ ਕੀ ਐਸਾ ਦੀਜੈ ਗਿਆਨੁ , \nਮੁਝ ਮੇਂ ਗੁਣੁ ਨਾਹੀ ਕੋਏ ਤੁਮ ਹੋ ਗੁਣੀ ਨਿਧਾਨੁ ॥ \nਦੀਨ ਪੇ ਦਇਆ ਕਰੋ ਪ੍ਰਭ ਦਾਤੇ , \nਸਾਜਨ ਪ੍ਰੀਤਮ ਪੁਰਖ ਬਿਧਾਤੇ ਮੇਰੇ ਸਤਿਗੁਰ ਮਿਹਰਵਾਨ ॥\nਤੁਧੁ ਬਿਨੁ ਦੂਜਾ ਨਾ ਮੋਹੇ ਕੋਏ , \nਨਾਮੁ ਸਿਮਰਿ ਮਨੁ ਸ਼ਾਂਤਿ ਹੋਏ ਮੇਰੀ ਬੇਨੰਤੀ ਕਰੋ ਪਰਵਾਨੁ ॥ \nਆਪੇ ਬਖ਼ਸ਼ੋ ਸੁਮਤਿ ਰਘੁਰਾਈ , \n' ਦਰਸਨ ' ਪ੍ਰੀਤਿ ਤੁਧੁ ਸੰਗਿ ਲਾਈ , ਮੋਹੇ ਬਖ਼ਸ਼ੋ ਅੰਮ੍ਰਿਤ ਨਾਮੁ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तृष्णा मिटे मेरे मन तन की","c":"तृष्णा मिटे मेरे मन तन की ऐसा दीजै गिआन , \nमुझ में गुण नाही कोये तुम हो गुणी निधान ।।\nदीन पे दया करो प्रभ दाते , \nसाजन प्रीतम पुरख बिधाते मेरे सतिगुर मेहरबान ।।\nतुध बिन दूजा ना मोहे कोये , \nनाम सिमर मन शांत होये मेरी बेनंती करो परवान ।।\nआपे बख्शो सुमत्त रघुराई , \nदर्शन प्रीत तुध संग लाई , मोहे बख्शो अमृत नाम ।।\n( यकीन )"},"en":{"t":"Trishna Mite Mere Mann Tann Ki","c":"Trishna Mite Mere Mann Tann Ki"}},

	{"id":1769097468420,
	"pb":{"t":"ਤੇਰੀ ਕੁਦਰਤਿ ਤੇਰੀ ਜੰਨਤਿ ( ਸ਼ਲੋਕ )","c":"( ਸ਼ਲੋਕ )\nਤੇਰੀ ਕੁਦਰਤਿ ਤੇਰੀ ਜੰਨਤਿ , ਅਜਬ ਤੇਰਾ ਸੰਸਾਰਾ , \nਤੇਰੀ ਰਚਨਾ ਤੂੰ ਹੀ ਜਾਣੇ , ਮਾਨਸੁ ਥੱਕਿ ਹਾਰਾ ॥\nਮਨ ਤੂੰ ਕਾਹੇ ਫਿਰੇ ਨਾਦਾਨ , ਬਾਹਰਿ ਢੂੰਢੇ ਮਿਲਿ ਨਾਹੀ ਪਾਏ , ਪੂਰਨ ਭਗਵਾਨ ॥ \nਬਾਹਰਿ ਢੂੰਢੇ ਕਿਛੁ ਹਾਥਿ ਨਾ ਆਏ , ਅੰਦਰਿ ਦੇਹੀ ਸਭੁ ਕਿਛੁ ਪਾਏ , \nਏਹ ਬਿਧਿ ਗੁਰ ਆਪਿ ਬਤਾਏ , ਜੋ ਹਰਿ ਸਿਉਂ ਪ੍ਰੀਤਿ ਲਗਾਏ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरी कुदरत तेरी जन्नत ( श्लोक )","c":"( श्लोक )\nतेरी कुदरत तेरी जन्नत , अजब तेरा संसारा , \nतेरी रचना तूं ही जाणे , मानस थक्क हारा ।।\nमन तूं काहे फिरे नादान , बाहर ढूँढे मिल नाही पाये , पूरन भगवान ।। \nबाहर ढूँढे किछ हाथ ना आये , अंदर देही सभ किछ पाये , \nएह बिध गुर आप बताये , जो हरि सिओं प्रीत लगाये ।।\n( यकीन )"},"en":{"t":"Teri Kudrat Teri Jannat ( Shlok )","c":"Teri Kudrat Teri Jannat ( Shlok )"}},

	{"id":1769097659229,
	"pb":{"t":"ਤੇਰੇ ਗੋਸਾਈ ਰਾਮ ਰਹੀਮ ਕਰਤਾ","c":"ਤੇਰੇ ਗੋਸਾਈ ਰਾਮ ਰਹੀਮ ਕਰਤਾ , \nਅਕਾਲ ਨਰ ਨਿਰੰਜਨ ਨਿਰੰਕਾਰ ਗੁਰ ਪ੍ਰਸਾਦਿ ਮੁਕਤਿ ਪਾਏ ॥ \nਤੇਰੇ ਸਾਂਈ ' ਦਰਸਨ ' ਅਗੰਮ ਗੋਸਾਂਈ , \nਰਾਮ ਰਹੀਮ ਬੈਠੇ ਇਕੱਠੇ ਬਖੇਲੀ ਜਗ ਮਾਹਿ ਸਮਾਈ ॥ \nਸੋ ਜਨੁ ਜਾਣੇ ਜਿਨ੍ਹੇ ਜਣਾਏ ਤੇਰੇ ਸਾਂਈ ' ਦਰਸਨ ' ਅਗੰਮ ਗੋਸਾਂਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरे गोसाई राम रहीम करता","c":"तेरे गोसाई राम रहीम करता ,\nअकाल नर निरंजन निरंकार गुर प्रसादि मुक्त पाये ।।\nतेरे साई दर्शन अगंम गोसाई ,\nराम रहीम बैठे इकट्ठे बखेली जग माहे समाई ।।\nसो जन जाणे जिनहे जनाई तेरे सांई दर्शन अगंम गोसाई ।।\n( यकीन )"},"en":{"t":"Tere Gosai Ram Raheem Karta","c":"Tere Gosai Ram Raheem Karta"}},

	{"id":1769098063159,
	"pb":{"t":"ਤ੍ਰੈ ਨਾਰੀ ਤਿਨ੍ਹੇ ਆਦਿ ਕੁਆਰੀ","c":"ਤ੍ਰੈ ਨਾਰੀ ਤਿਨ੍ਹੇ ਆਦਿ ਕੁਆਰੀ , ਬ੍ਰਹਮਾ ਬਿਸ਼ਨੂੰ ਮਹੇਸ਼ ਤਾਰੀ ॥ \nਸਰਸਵਤੀ ਅਸ਼ਟ ਲਕਸ਼ਮੀ ਅਸ਼ਟ , \nਉਮਾ ਅਸ਼ਟ ਵੈਸ਼ਨੂੰ ਅਸ਼ਟ ॥ \nਸਿੰਘ ਨਿਰੰਕਾਰ ਨਿਰੰਜਨ ਨਾਨਕ ਗੋਬਿੰਦ , \nਨਮੈ ਨਮੇਓ ਨਮੇਓ ਨਮੇਓ ਨਮੇਓ ਔਰ ਨਮੇਓ ਗੰਗੋਤਰੀ , \nਤ੍ਰਿਲੋਕੀ ਰਾਮ ਨਮੇਓ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"त्रै नारी तिनहे आदि कुआरी","c":"त्रै नारी तिनहे आदि कुआरी , ब्रह्मा विशनूँ महेश तारी ।।\nसरसवती अष्ट लक्ष्मी अष्ट ,\nउमा अष्ट वैशनूँ अष्ट ।।\nसिंघ निरंकार निरंजन नानक गोबिंद ,\nनमै नमेओ नमेओ नमेओ नमेओ और नमेओ गंगोत्री ,\nत्रिलोकी राम नमेओ ।।\n(यकीन)"},"en":{"t":"Tri Naari Tinhe Aadi Kuaari","c":"Tri Naari Tinhe Aadi Kuaari"}},

	{"id":1769098329846,"audio":"audio/MEIN TUDH PREET LAGAI.mp3",
	"pb":{"t":"ਮੈਂ ਤੁਧੁ ਪ੍ਰੀਤਿ ਲਗਾਈ","c":"ਤੈਂ ਹਰਿ ਨਾਮੁ ਜਪਿਓ ਜਿਸੁ ਉਸ ਨਾ ਦੁਖ ਨਾ ਡਰੁ ਜਮ ਫਾਹੀਦਾ ॥ \nਜਿਸ ਨੂੰ ਮਨਿ ਭਾਵੇ ਤਿਸੁ ਤਿਲੁ ਸਮਾਏ , \nਅਸਾਂ ਆਸ ਲਗਾਏ ਕਬ ਦਰਸੁ ਹੋਸੀ , ਮੋਹੇ ਰਾਮ ਰਘੁਰਾਈ ॥\nਤਬ ਕਰਮ ਕਮਾਊਂ ਜਬ ਅੰਮ੍ਰਿਤ ਨਾਮੁ ਫਲੁ ਪਾਊਂ , \nਤੁਧੁ ਆਵੇ ਖਿਆਲੁ ਮੋਹੇ ਹੋਵੋ ਦਇਆਲ ॥ \nਮੋਕੋ ਦੀਨੁ ਜਾਨੋ ' ਦਰਸਨ ' ਰਾਹੁ ਬਖਾਨਿਓ , ਮੈਂ ਤੁਧੁ ਪ੍ਰੀਤਿ ਲਗਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"मैं तुध प्रीत लगाई","c":"तैंह हरि नाम जपेओ जिस उस ना दुख ना डर जम फाहीदा ।।\nजिस नूँ मन भावे तिस तिल समाये , \nअसां आस लगाये कब दरस होसी , मोहे राम रघुराई ।।\nतब करम कमाऊँ जब अमृत नाम फल पाऊँ , \nतुध आवे खियाल मोहे होवो दयाल ।।\nमोको दीन जानो दर्शन राह बखानेओ , मैं तुध प्रीत लगाई ।।\n( यकीन )"},"en":{"t":"Mein Tudh Preet Lagai","c":"Mein Tudh Preet Lagai\nTeh Hari Naam Japeyo"}},

	{"id":1769098760470,
	"pb":{"t":"ਦਇਆ ਸਤੁ ਸੰਤੋਖੁ ਨਾਮੁ ਚਾਰੇ ਧਰਮ ਕਹਾਵੈ","c":"ਦਇਆ ਸਤੁ ਸੰਤੋਖੁ ਨਾਮੁ ਚਾਰੇ ਧਰਮ ਕਹਾਵੈ ॥ \nਚੌਂਹ ਧਰਮੀ ਧਰਮੁ ਭਯੋ ਇਕ ਵਰਣੀ ਨਾਨਕ ਕਰਤਾ , \nਤਪ ਤਪਸਿਆ ਤਜੇਂਦੇ ਮਾਹੀ ਤੁਝ ਬਿਨੁ ਚਿੱਤ ਨਹੀਂ ਕਰਦਾ ॥\n\nਜੇ ਚਿੱਤ ਆਵੇ ਤੂੰ ਮੇਰੇ ਸਤਿਗੁਰ ਰੱਖਿ ਲੇਓ ਪ੍ਰਤਿਪਾਲ ਗੋਸਾਈ , \nਤੁਝ ਬਿਨੁ ਦੁਖ ਘਨੇਰੇ ਸਹਿਣੇ ਮੇਰੇ ਰਾਮ ਦੀਨ ਦਇਆਲ ਸਾਂਈ ॥ \nਤੁਝੇ ਧਿਆਇਆ ਸੁਖੁ ਘਨੇਰਾ ਪਾਇਆ ਮੇਰੇ ਹਰਿ ਰਾਇਆ ,\n\nਰਾਖਿ ਲੇਓ ਮੇਰੇ ਸਤਿਗੁਰ ਸਾਂਈ ,\nਪਾਰਬ੍ਰਹਮ ਪੂਰਨਬ੍ਰਹਮ ਚੌਹ ਧਰਮਾਂ ਦੇ ਸਾਂਈ , \nਦਾਸ ਦਾਸਨ ਕੋ ਥਾਪਿਆ ਹਮ ਭੂਲੇ ' ਦਰਸਨ ' ਏਕੋ ਠਾਕੁਰ ਦੇਸਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"दया सति संतोख नाम चारे धरम कहावै","c":"दया सति संतोख नाम चारे धरम कहावै ।।\nचौंह धरमी धरम भयो इक वरणी नानक करता ,\nतप तपसिआ तजेंदे माही तुझ बिन चित्त नहीं करदा ।।\n\nजे चित्त आवे तू मेरे सतिगुर रख लेओ प्रितपाल गोसाई , \nतुझ बिन दुख घनेरे सहणे मेरे राम दीन दयाल सांई ।।\nतुझे धिआया सुख घनेरा पाया मेरे हरि राया ,\n\nराख लेओ मेरे सतिगुर सांई , \nपारब्रह्म पूरनब्रह्म चौह धरमां दे सांई ।।\nदास दासन को थापेआ हम भूले दर्शन एको ठाकुर देसा ।।\n( यकीन )"},"en":{"t":"Daya Sat Santokh Naam Chaare Dharam Kahave","c":"Daya Sat Santokh Naam Chaare Dharam Kahave"}},

	{"id":1769098983845,
	"pb":{"t":"ਦਇਆਵੰਦ ਦਇਆਲ ਪੁਰਖ ਖਸਮ ਹਮਾਰੇ","c":"ਦਇਆਵੰਦ ਦਇਆਲ ਪੁਰਖ ਖਸਮ ਹਮਾਰੇ , \nਸੋਹਣੇ ਸੁੰਦਰ ਹਰਿ ਰਾਇ , ਨਾਮੁ ਦੇਓ ਪਿਆਰੇ ॥\nਨਾਮੁ ਵਸਾ ਕੇ ਹਿਰਦੇ ਅੰਦਰਿ ਪਰਮਗਤਿ ਪਾਊਂ , \nਤੇਰਾ ਕੀਰਤਨੁ ਸਦਾ ਸੁਖਦਾਈ , ਤਪਦੇ ਹਿਰਦੇ ਠਾਰੇ ॥\nਹਮ ਗਰੀਬ ਕਿਛੁ ਜਾਨੋ ਨਾਹੀ , ' ਦਰਸਨ ' ਨੀਚ ਢਹਿ ਪਯੋ ਦੁਆਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"दयावंद दयाल पुरख खसम हमारे ","c":"दयावंद दयाल पुरख खसम हमारे ,\nसोहणे सुंदर हरि राय , नाम देओ पिआरे ।।\nनाम वसा के हिरदे अंदर परमगत पाऊँ ,\nतेरा कीरतन सदा सुखदाई , तपदे हिरदे ठारे ।।\nहम गरीब किछ जानो नाही , दर्शन नीच ढहि पयो दुआरे ।।\n( यकीन )"},"en":{"t":"Dayavant Dayaal Purakh Khasam Humare","c":"Dayavant Dayaal Purakh Khasam Humare"}},

	{"id":1769099251935,
	"pb":{"t":"ਦਾੜ੍ਹੀਆਂ ਰੱਖਣ ਕੇਸ ਸਜਾਵਣ","c":"ਦਾੜ੍ਹੀਆਂ ਰੱਖਣ ਕੇਸ ਸਜਾਵਣ , ਜੋਰੀ ਮੰਗਣ ਦਾਨ ਚੜ੍ਹਾਵੇ ਖਾਵਣ ॥ \nਪੋਥੀਓ ਪੜ੍ਹ ਪੜ੍ਹ ਕਾ ਰੌਲਾ ਪਾਵਣ , \nਆਪ ਹਨੇਰੇ ਉਮੰਤ ਚਾਨਣ ਦਿਖਾਵਣ ॥\nਪੜ੍ਹਨ ਨਮਾਜ਼ਾਂ ਮਸੀਤੇ ਜਾਵਣ , ਅੱਲ੍ਹਾ ਦੁਹਾਈ ਮੁਰਦੇ ਖਾਵਣ ॥ \nਤੀਰਥ ਨਹਾਵਣ ਉੱਠ ਮੰਦਰੀਂ ਜਾਵਣ , ਤਿਲਕ ਜੰਜੂ ਪਾ ਕੇ ਹੰਧੇ ਖਾਵਣ ॥\nਕਹੇ ' ਦਰਸਨ' ਸਭ ਭੇਖ ਪਾਖੰਡਾ , ਜਿਸੁ ਹਿਰਦੇ ਵਸੇ ਪਰਮਾਨੰਦਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"दाढीआं रखण केस सजावण","c":"दाढीआं रखण केस सजावण , जोरी मंगण दान चढ़ावे खावण ।।\nपोथीओ पढ़ पढ़ का रौला पावण ,\nआप हनेरे उम्मत चानण दिखावण ।।\nपढ़न नमाज़ा मसीते जावण , अल्ला दुहाई मुरदे खावण ।।\nतीरथ नहावण उठ मंदरीं जावण , तिलक जंजू पाके हंधे खावण ।।\nकहे दर्शन सभ भेख पाखंडा , जिस हिरदे वसे परमानंदा ।।\n( यकीन )"},"en":{"t":"Daadiyaan Rakhan Kesh Sajaavan","c":"Daadiyaan Rakhan Kesh Sajaavan"}},

	{"id":1769099546447,
	"pb":{"t":"ਦਾਸ ਜਨੋ ਕੋ ਪ੍ਰਭ ਭਯੋ ਦਇਆਲੁ","c":"ਦਾਸ ਜਨੋ ਕੋ ਪ੍ਰਭ ਭਯੋ ਦਇਆਲੁ , ਦਾਸ ਜਨੋ ਕੋ ਪ੍ਰਭ ਕਿਰਪਾਲ ॥ \nਦਾਸ ਜਨੋ ਕੀ ਸੁਣੀ ਅਰਜੋਈ , ਹਰਿ ਕੀ ਆਸਾ ਹਰਿ ਸਿਉਂ ਪੂਰੀ ਹੋਈ ॥\nਦਾਸ ਜਨੋ ਕੀ ਸੁਣੀਏ ਪੁਕਾਰ , ਪ੍ਰਭ ਕੀ ਮਹਿਮਾ ਅੰਤੁ ਨਾ ਪਾਰਾਵਾਰ ॥\n\nਦਾਸ ਜਨੋ ਸੰਗਿ ਪ੍ਰਭ ਹੋਏ ਸਹਾਈ , ਪ੍ਰਭ ਕੀ ਕਿਰਪਾ ਹਮ ਸਭ ਤਾਈ ॥\nਦਾਸ ਜਨ ਸਭ ਭਯੋ ਪੁਨੀਤ , ਹਰਿ ਜਨ ਸਿਉਂ ਕਰਿਓ ਜੋ ਪ੍ਰੀਤਿ ॥ \nਆਪਿ ਕਰੇ ਆਪੇ ਕਰਾਏ , ਆਪੇ ਕਰਣੇਹਾਰ ,\nਦਾਸ ਕੀ ਪੈਜ ਰਾਖੇ ਆਪੇ ਪੂਰਾ ਪ੍ਰਭ ਮਿਹਰਵਾਨ ॥\n\nਨਾਨਕ ਨਾਮੁ ਸਭਨਾਂ ਤੋਂ ਉੱਚਾ ,\nਅਗੰਮ ਸਬਦੁ ਸੁਣਿਆਂ ਮਨੁੱਖ ਭਯੋ ਸੁੱਚਾ ॥ \n' ਦਰਸਨ ' ਨੀਚ ਕੀ ਸੁਣਿਓ ਬੇਨੰਤੀਆਂ , \nਪ੍ਰਭ ਕੀਜੇ ਮੋਹੇ ਹਿਰਦੇ ਵਾਸ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"दास जनो को प्रभ भयो दयाल","c":"दास जनो को प्रभ भयो दयाल , दास जनो को प्रभ किरपाल ।।\nदास जनो की सुणी अरजोई , हरि की आसा हरि सेओं पूरी होई ।।\nदास जनो की सुणीये पुकार , प्रभ की महिमा अंत ना पारावार ।।\n\nदास जनो संग प्रभ होये सहाई , प्रभ की किरपा हम सभ ताई ।।\nदास जन सभ भयो पुनीत , हरि जन सेओं करेओ जो प्रीत ।।\nआप करे आपे कराये , आपे करनेहार ,\nदास की पैज राखे आपे पूरा प्रभ मेहरबान ।।\n\nनानक नाम सभहां तो उच्चा ,\nअगंम शब्द सुणेआं मनुख भयो सुच्चा ।।\nदर्शन नीच की सुणेओ बेनंतीआं ,\nप्रभ कीजे मोहे हिरदे वास ।।\n( यकीन )"},"en":{"t":"Das Jano Ko Prabh Bhayo Dayaal","c":"Das Jano Ko Prabh Bhayo Dayaal"}},

	{"id":1769535162294,
	"pb":{"t":"ਮੇਰਾ ਦੇਸ਼ ਬੜਾ ਮਹਾਨ ਹੈ ( ਹਿੰਦੋਸਤਾਨ )","c":"ਮੇਰਾ ਦੇਸ਼ ਬੜਾ ਮਹਾਨ ਹੈ , ਵਸਦਾ ਘਰ ਘਰ ਵਿਚ ਭਗਵਾਨ , \nਹਰ ਕੋਈ ਬੋਲੇ ਮਿੱਠੀ ਜੁਬਾਨ , ਉਸਦਾ ਨਾਮ ਹੈ ਹਿੰਦੋਸਤਾਨ ॥ \nਮੇਰੇ ਦੇਸ਼ ਦਾ ਅਨਮੋਲ ਖਜ਼ਾਨਾ , ਜਿਸ ਨੂੰ ਜਾਣੇ ਸਾਰਾ ਜਮਾਨਾ , \nਚੱਲ ਸਕੇ ਨਾ ਕਿਸੇ ਦਾ ਜੋਰ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਉੱਤੇ ॥\n\nਮੇਰੇ ਦੇਸ਼ ਦੇ ਉੱਚੇ ਖਿਆਲ , ਦੂਜਾ ਨਾਮ ਹੈ ' ਸ਼ੇਰੇ ਪੰਜਾਬ ' , \nਸਭਨੂੰ ਮੰਨਦਾ ਹੈ ਆਪਣਾ ਭਰਾ , ਭਾਵੇਂ ਕਿਸੇ ਦੇਸ਼ , ਕੌਮ ਦਾ ਹੋਵੇ ॥ \nਮੇਰੇ ਦੇਸ਼ ਦੀ ਲੀਲ੍ਹਾ ਨਿਆਰੀ , ਜਿਸਦੀ ਦੀਵਾਨੀ ਦੁਨੀਆਂ ਸਾਰੀ , \nਉਸ ਵਰਗਾ ਨਹੀਂ ਕੋਈ ਦਿਸਦਾ , ਵੇ ਲੋਕੋ ਮੇਰਾ ਹਿੰਦੋਸਤਾਨ ॥\n\nਮੇਰੇ ਦੇਸ਼ ਦੀ ਲੋਕੋ ਮਿੱਟੀ , ਹਰ ਥਾਂ ਤੇ ਮੈਂ ਹੱਸਦੀ ਡਿੱਠੀ , \nਰੱਬ ਵਸਦਾ ਐ ਆਪ ਪਿਆ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥ \nਹਿੰਦੂ ਸਿੱਖ ਮੁਸਲਮਾਨ ਇਸਾਈ , ਸਭਨਾਂ ਨੇ ਉੱਥੇ ਪੂਜਾ ਪਾਈ , \nਉੱਥੇ ਵਸਦੀ ਐ ਮਾਤ ਗੰਗਾ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥\n\nਮੇਰੇ ਦੇਸ਼ ਦੇ ਕਰਮ ਧਰਮ , ਗਹਿਣਾ ਜਿਸਦਾ ਲਾਜ ਸ਼ਰਮ , \nਦੁੱਪਟਾ ਰੱਖਦੀਆਂ ਸਿਰ ਤੇ ਔਰਤਾਂ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥ \nਮੇਰੇ ਦੇਸ਼ ਦੀ ਸੋਹਣੀ ਸ਼ਾਨ , ਬੁੱਢੇ ਬੱਚੇ ਅਤੇ ਜਵਾਨ , \nਦੁੱਖ ਸੁੱਖ ਵਿਚ ਰਲ ਬੈਠਦੇ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥\n\nਮੇਰੇ ਦੇਸ਼ ਦੀ ਕੋਈ ਨਾ ਸਰਹੱਦ , ਜਿਸ ਦਾ ਵਾਲੀ ਗੁਰੂ ਗੋਬਿੰਦ , \nਬੁੱਝੀ ਜੋਤ ਗਿਆ ਏ ਜਗਾ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥ \nਮਹਿਮਾ ਦੇਸ਼ ਦੀ ਹੱਦ-ਬੇਹੱਦ , ਚਾਦਰ ਹਿੰਦ ਦੀ ਗੁਰੂ ਤੇਗ ਬਹਾਦਰ , \nਦਿੱਲੀ ਸੀਸ ਦੇਣ ਲਈ ਆ ਗਿਆ , ਲੋਕੋ ਹਿੰਦੂ ਧਰਮ ਦੀ ਖਾਤਿਰ ॥\n\nਮੁਗਲ ਬਾਦਸ਼ਾਹ ਜੁਲਮ ਕਮਾਵੇ , ਜਬਰਦਸਤੀ ਮੁਸਲਮਾਨ ਬਣਾਵੇ , \nਦਿੱਤਾ ਗੁਰੂਆਂ ਸਰਬੰਸ ਦਾਨ ਚੜ੍ਹਾ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੀ ਖਾਤਿਰ ॥ \nਮੇਰੇ ਦੇਸ਼ ਦੀ ਮਾਇਆ ਨਿਰਾਲੀ , ਬੰਸੀ ਵਾਲਾ ਸੀ ਉਸਦਾ ਵਾਲੀ , \nਦਿੱਤਾ ਕੰਸ ਦਾ ਸੀ ਜੁਲਮ ਮੁਕਾ , ਮੇਰੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਵਿਚ ॥\n\nਰੋਮ ਰੋਮ ਵਿਚ ਵਸਦਾ ਐ ਰਾਮ , ' ਦਰਸਨ ' ਦਾ ਦੇਸ਼ ਹੈ ਹਿੰਦੋਸਤਾਨ ,\nਲੱਖ ਵਾਰੀ ਮੈਂ ਵਾਰੇ ਵਾਰੇ ਜਾਂ , ਆਪਣੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਉੱਤੋਂ ॥ \n' ਦਰਸਨ ' ਦੇ ਦਿਲ ਵਿਚ , ਦਿਲ ਹਿੰਦੋਸਤਾਨ ਦਾ , \nਜਿੱਥੇ ਪੈਰ ਟਿਕਿਆ ਨਹੀਂ ਕਿਸੇ ਵੀ ਸ਼ੈਤਾਨ ਦਾ ,\nਅਸਾਂ ਦੇਣਾ ਐ ਸਿਰ ਨੂੰ ਕਟਾ , ਕਿ ਆਪਣੇ ਹਿੰਦੋਸਤਾਨ ਦੇ ਪਿੱਛੇ ॥"},"hi":{"t":"मेरा देश बड़ा महान है ( हिन्दोस्तान )","c":"मेरा देश बड़ा महान है , वसदा घर घर विच भगवान , \nहर कोई बोले मिट्ठी जुबान , उसदा नाम है हिन्दोस्तान ।।\nमेरे देश दा अनमोल खज़ाना , जिस नूं जाणे सारा जमाना , \nचल सके ना किसे दा जोर , मेरे हिन्दोस्तान दे उत्ते ।।\n\nमेरे देश दे उच्चे ख्याल , दूजा नाम है शेरे पंजाब , \nसबनूं मनदा है अपना भराअ , भांवे किसे देश , कौम दा होवे ।।\nमेरे देश दी लीला न्यारी , जिसदी दीवानी दुनियां सारी , \nउस वरगा नहीं कोई दिसदा , वे लोको मेरा हिन्दोस्तान ।।\n\nमेरे देश दी लोको मिट्टी , हर थां ते मैं हसदी डिट्ठी , \nरब्ब वसदा ऐ आप पेआ , मेरे हिन्दोस्तान दे विच ।।\nहिन्दू सिक्ख मुसलमान इसाई , सबनां ने ओथे पूजा पाई , \nओथे वसदी ऐ मात गंगा , मेरे हिन्दोस्तान दे विच ।।\n\nमेरे देश दे कर्म धर्म , गहणा जिसदा लाज शर्म , \nदुप्पटा रखदीयां सिर ते औरतां , मेरे हिन्दोस्तान दे विच ।।\nमेरे देश दी सोहणी शान , बुढ्ढे बच्चे अते जवान , \nदुख सुख विच रल बैठदे , मेरे हिन्दोस्तान दे विच ।।\n\nमेरे देश दी कोई ना सरहद , जिस दा वाली गुरु गोविंद , \nबुझी जोत गया ए जगा , मेरे हिन्दोस्तान दे विच ।।\nमहिमा देश दी हद-बेहद , चादर हिन्द दी गुरु तेग बहादुर , \nदिल्ली सीस देन लई आ गया , लोको हिन्दू धर्म दी खातिर ।।\n\nमुगल बादशाह जुल्म कमावे , जबरदस्ती मुसलमान बनावे , \nदित्ता गुरूओं सरबंस दान चढ़ा , मेरे हिन्दोस्तान दी खातिर ।।\nमेरे देश दी माया निराली , बंसी वाला सी उसदा वाली , \nदित्ता कंस दा सी जुल्म मुका , मेरे हिन्दोस्तान चों विच ।।\n\nरोम रोम विच वसदा ऐ राम , ' दर्शन ' दा देश है हिन्दोस्तान , \nलख वारी मैं वारे वारे जां , अपने हिन्दोस्तान दे उत्तों ।।\n' दर्शन ' दे दिल विच , दिल हिन्दोस्तान दा , \nजित्थे पैर टिकेआ नहीं किसे वी शैतान दा , \nअसां देना ऐ सिर नूं कटा , कि अपने हिन्दोस्तान दे पिछे ।।"},"en":{"t":"Mera Desh Bada Mahaan Hain ( Hindostaan )","c":"Mera Desh Bada Mahaan Hain ( Hindostaan )"}},

	{"id":1769535398048,
	"pb":{"t":"ਆਵੇਗਾ ਸੁਨੇਹਾ ਜਦੋਂ","c":"ਆਵੇਗਾ ਸੁਨੇਹਾ ਜਦੋਂ ਤੈਨੂੰ ਮੇਰੀ ਮੌਤ ਦਾ , \nਮੁੱਕ ਜਾਏਗਾ ਝਗੜਾ ਨਿੱਤ ਵਾਲੀ ਸੋਚ ਦਾ ॥\n\nਆਵੇਗਾ ਖਿਆਲ ਜਦੋਂ ਸੌਂਹ ਮੇਰੀ ਖਾਧੀ ਦਾ , \nਪੁੱਛੇਗਾ ਸਵਾਲ ਜੱਗ ਤੈਥੋਂ ਮੇਰੀ ਬਰਬਾਦੀ ਦਾ , \nਗਸ਼ ਖਾ ਕੇ ਹੋ ਜਾਵੇਂਗਾ ਬੇਹੋਸ਼ ਮੇਰੇ ਦੋਸਤਾ ॥\n\nਆਉਣਗੀਆਂ ਯਾਦਾਂ ਜਦੋਂ ਤੈਨੂੰ ਮੇਰੀਆਂ , \nਵੇਖ ਵੇਖ ਰੋਵੇਂਗੀ ਤਸਵੀਰਾਂ ਮੇਰੀਆਂ , \nਖੁਸ਼ੀ ਮਰ ਜਾਊਗੀ , ਮਰ ਜਾਊ ਚਾਅ ਓ ਦੋਸਤਾ ॥\n\nਸੋਚਿਆ ਸੀ ਜੋ ਉਹੋ ਨਈਓਂ ਹੋਇਆ ਵੇ , \nਮਰਾਂਗੇ ਇਕੱਠੇ ਮੈਂ ਕੱਲਾ ਨਈਓਂ ਮੋਇਆ ਵੇ , \nਇਕ ਮੈਂ ਦੂਜੀ ' ਦਰਸਨ ' ਯਾਦ ਤੇਰੀ ਦੋਸਤਾ ॥"},"hi":{"t":"आवेगा सुनेहा जदों","c":"आवेगा सुनेहा जदों तैनू मेरी मौत दा , \nमुक जाएगा झगड़ा नित वाली सोच दा ।।\n\nआवेगा ख्याल जदों सौंह मेरी खाधी दा ,\nपुछेगा सवाल जग तैथों मेरी बरबादी दा ,\nगश खा के हो जावेंगा बेहोश मेरे दोस्ता ।।\n\nऔणगीयां यादां जदों तैनू मेरीयां , \nवेख वेख रोवेंगी तस्वीरों मेरीयां , \nखुशी मर जाऊगी , मर जाऊ चाअ ओ दोस्ता ।।\n\nसोचेया सी जो ओहो नईयों होया वे , \nमरांगे इकट्ठे मैं कला नईयों मोया वे , \nइक मैं दूजी ' दर्शन ' याद तेरी दोस्ता ।।"},"en":{"t":"Aavega Suneha Jado","c":"Aavega Suneha Jado"}},

	{"id":1769536472613,
	"pb":{"t":"ਓ ਮਿਤਵਾ","c":"ਮੈਂ ਬੈਰਾਗਣ ਬਿਰਹੋਂ ਦੀ ਮਾਰੀ , ਤੜਫਸ ਦਿਨਸੁ ਰਾਤਿ , \nਬਰਸਨ ਅੱਖੀਆਂ ਤੁਧੁ ਬਿਨੁ ਮਿਤਵਾ , ਜਿਵੇਂ ਸਾਵਣ ਬਰਸਾਤ ॥\n\nਮਿਤਵਾ , ਯਾਦ ਕਰੇਸੈਂ ਮੇਰਾ ਪਿਆਰ , \nਆਜਾ ਆ ਗਈ ਸਾਵਣ ਬਹਾਰ ॥\n\nਮੈਂ ਨਿਮਾਣੀ ਦਾ ਤੂੰ ਮਾਣ ਵੇ ਸਾਈਆਂ , \nਸਾਨੂੰ ਮੁਹੱਬਤਾਂ ਰਾਸ ਨਾ ਆਈਆਂ , \nਕੋਈ ਨਹੀਂ ਕਰਦਾ ਇਤਬਾਰ ॥\n\nਸੁਣਿਆ ਜੁਦਾਈਆਂ ਦੇ ਸੱਲ ਸਾਈਆਂ ਮਾਰੇ , \nਰਾਤਾਂ ਲੰਘਾਈਆਂ ਗਿਣ-ਗਿਣ ਕੇ ਤਾਰੇ , \nਨਹੀਂ ਮੁੱਕਿਆ ਅਜੇ ਇੰਤਜ਼ਾਰ ॥\n\nਹਰ ਰਾਤ ਆਵੇ ਯਾਦ ਜਦੋਂ ਤੇਰੀ ਸਾਈਆਂ , \nਬਿਰਹੋਂ ਨੇ ਬਿੰਗ ਕੀਤਾ ਮਾਰਿਆ ਕਸਾਈਆਂ , \nਕਿਉਂ ਭੁੱਲ ਗਯੋਂ ਕੌਲ ਤੇ ਕਰਾਰ ॥\n\nਉਮਰ ਬਿਤਾਈ ਅਸਾਂ ਉੱਫ ਨਹੀਓਂ ਕੀਤੀ ਵੇ , \nਬੈਠੇਸ਼ਾਂ ਸਾਲ ਬਹੁਤੇ ਸੁੱਧ ਨਹੀਂ ਲੀਤੀ ਵੇ , \nਰਹਿ ਗਏ ਜ਼ਿੰਦਗੀ ਦੇ ਦਿਨ ਚਾਰ ॥\n\nਯਾਦਾਂ ਤੇ ਜੁਦਾਈਆਂ ਦੇ ਤੂੰ ਕੀ ਜਾਣੇ ਦੁੱਖ ਵੇ , \nਪਿਆਰ ਨਾਲ ਮਿਟਦੀ ਏ ਪਿਆਰ ਵਾਲੀ ਭੁੱਖ ਵੇ , \n' ਦਰਸਨ ' ਰੋਇਆ ਬੇਸ਼ੁਮਾਰ ॥"},"hi":{"t":"ओ मितवा","c":"मैं बैरागण बिरहों दी मारी , तड़फस दिनस रात , \nबरसन अखीयां तुध बिन मितवा , जिवें सावन बरसात ।।\n\nमितवा , याद करेसैं मेरा प्यार , \nआजा आ गई सावन बहार ।।\n\nमैं निमाणी दा तूं मान वे साईयां , \nसानूं मुहब्बतां रास ना आईयां , \nकोई नई करदा एतवार ।।\n\nसुणेया जुदाईयां दे सल्ल साईयां मारे , \nरातां लंघाइयां गिन गिन के तारे , \nनहीं मुक्केया अजे इंतजार ।।\n\nहर रात आवे याद जदों तेरी साईयां , \nबिरहों ने बिंग कीता मारेया कसाईयां , \nक्यों भुल गयों कौल ते करार ।।\n\nउमर बिताई असां उफ नहींयो कीती वे , \nबैठेषां साल बोते ऊध नहीं लीती थे , \nरह गए जिंदगी दे दिन चार ।।\n\nयादां ते जुदाईयां दे तूं की जाने दुख वे , \nप्यार नाल मिटदी ए प्यार वाली भुख वे , \n' दर्शन ' रोया बेशुमार ।।"},"en":{"t":"O Mitva","c":"O Mitva"}},

	{"id":1769536729622,
	"pb":{"t":"ਹੰਝੂ ਤੇਰੇ ਨੇ ਨੈਣ ਮੇਰੇ ਨੇ","c":"ਹੰਝੂ ਤੇਰੇ ਨੇ ਨੈਣ ਮੇਰੇ ਨੇ , \nਹਿਜਰਾਂ ਚ ਰੋਂਦੇ ਪਏ ਜਿਹੜੇ ਨੇ ॥ \n\nਜਮਾਵਾਂ ਹੱਕ ਕਿਹਦੇ ਤੇ ਮੇਰਾ ਹੱਕ ਕੀ ਏ , \nਉਹ ਵੀ ਖੋਹ ਲਏ ਮੈਥੋਂ , ਦਿੱਤੇ ਕਦੇ ਜਿਹੜੇ ਨੇ ॥\n\nਮਰਾਂ ਅਣਿਆਈ ਮੌਤੇ ਮੇਰਾ ਸ਼ੌਕ ਨਹੀਂ , \nਹੋਰ ਵੀ ਜੀਣ ਦੇ ਸਾਡੇ ਸਹਾਰੇ ਕਿਹੜੇ ਨੇ ॥ \n\nਕਰਾਂ ਕੀ ਪੇਸ਼ ਤੈਨੂੰ ਮੈਂ , ਮੇਰੇ ਕੋਲ ਕੀ ਏ , \nਮੇਰੇ ਪੱਲੇ ਅੱਗੇ ਤੇਰੇ ਹੀ ਗ਼ਮ ਬਥੇਰੇ ਨੇ ॥\n\nਕਰਾਂ ਇਤਰਾਜ਼ ਤੇਰੇ ਤੇ , ਮੇਰੀ ਮਜਾਲ ਕੀ ਏ , \nਨਸੀਬ ' ਦਰਸਨ ' ਦੇ ਧੁਰ ਤੋਂ ਹੀ ਹਨੇਰੇ ਨੇ ॥"},"hi":{"t":"हंजू तेरे ने नैण मेरे ने","c":"हंजू तेरे ने नैण मेरे ने , \nहिजरां च रोंदें पये जेहड़े ने ।।\n\nजमावां हक किदे ते मेरा हक की ए , \nओह वी खोह लये मैथों , दित्ते कदे जेहड़े ने ।।\n\nमरां अणिआई मौते मेरा शौक नहीं , \nहोर वी जीण दे साडे सहारे केहड़े ने ।।\n\nकरां की पेश तैनू मैं , मेरे कोल की ए , \nमेरे पल्ले अग्गे तेरे ही गम बथेरे ने ।।\n\nकरां एतराज तेरे ते , मेरी मजाल की ए , \nनसीब ' दर्शन ' दे धुर तों ही हनेरे ने ।।"},"en":{"t":"Hanju Tere Ne Nain Mere Ne","c":"Hanju Tere Ne Nain Mere Ne"}},

	{"id":1769536966149,
	"pb":{"t":"ਜਦੋਂ ਯਾਦ ਤੇਰੀ ਮੈਨੂੰ ਆਵੇ","c":"ਜਦੋਂ ਯਾਦ ਤੇਰੀ ਮੈਨੂੰ ਆਵੇ , \nਅੱਖ ਰੋਵੇ ਤੇ ਦਿਲ ਘਬਰਾਵੇ , \nਕਿ ਮਾਹੀ ਮੇਰਾ ਪਰਦੇਸੀ ਹੋ ਗਿਆ ॥\n\nਦਿਨ ਦੀਆਂ ਸੋਚਾਂ ਨਿੱਤ ਦੇ ਖਿਆਲ , \nਰਾਤਾਂ ਕਾਲੀਆਂ , ਭਰ ਪੋਹ ਦਾ ਸਿਆਲ , \nਜਵਾਨੀ ਚੜ੍ਹਦੀ ਨੂੰ ਆਉਂਦੇ ਨੇ ਭੁਚਾਲ , \nਕਿ ਮਾਹੀ ਮੁੜ ਵਤਨਾਂ ਨੂੰ ਆਵੇ ॥\n\nਸਖੀਆਂ ਸਹੇਲੀਆਂ ਦਾ ਸੰਗ ਨਾ ਭਾਵੇ , \nਮਿੱਠੀ-ਮਿੱਠੀ ਯਾਦ ਤੇਰੀ ਵੱਢ-ਵੱਢ ਖਾਵੇ , \nਸੌਣ ਦਾ ਮਹੀਨਾ ਜਦੋਂ ਸਿਰ ਤੇ ਆਵੇ ॥\n\nਦਿਲ ਦੀਆਂ ਸੱਧਰਾਂ , ਦਿਲ ਵਿਚ ਰਹਿ ਗਈਆਂ ਮੇਰੇ ਹਾਣ ਦੀਆਂ , \nਪੇਕਿਓਂ ਤੁਰ ਗਈਆਂ ' ਦਰਸਨ ' ਉਮਰ ਬੀਤ ਨਾ ਜਾਵੇ ॥"},"hi":{"t":"जदों याद तेरी मैंनूं आवे","c":"जदों याद तेरी मैंनू आवे , \nअख रोवे ते दिल घबरावे , \nकि माही मेरा परदेसी हो गया ।।\n\nदिन दीयां सोचां नित दे ख्याल , \nरातां कालियां , भर पोह दा स्याल , \nजवानी चड़दी नूं औंदे ने भुचाल , \nकि माही मुड़ वतनां नू आवे ।।\n\nसखीयां सहेलीयां दा संग ना भावे , \nमिट्ठी-मिट्ठी याद तेरी वड-वड खावे , \nसौंण दा महीना जदों सिर ते आवे ।।\n\nदिल दीयां सधरां , दिल विच रैह गईयां मेरे हाण दीयां , \nपेकेओं तुर गईयां ' दर्शन ' उमर बीत ना जावे ।।"},"en":{"t":"Jado Yaad Teri Mainu Aave","c":"Jado Yaad Teri Mainu Aave"}},

	{"id":1769537376142,
	"pb":{"t":"ਤੈਨੂੰ ਵਾਸਤਾ ਈ ਡਾਢਿਆ ਰੱਬਾ","c":"ਤੈਨੂੰ ਵਾਸਤਾ ਈ ਡਾਢਿਆ ਰੱਬਾ , \nਕਿ ਮਾਹੀ ਮੇਰਾ ਮੋੜ ਵਤਨੀ ॥\n\nਸਿਰ ਦੇ ਸਦਕੇ ਵੇ ਪੀਰਾ , ਬਕਰਾ ਮੈਂ ਦੇਨੀਆ , \nਹੱਥ ਜੋੜਾਂ , ਅਰਜ਼ ਕਰੇਨੀਆ , \nਕਰਦੇ ਰਹਿਮਤਾਂ , ਤੂੰ ਜਲਵਾ ਦਿਖਾ ਦੇ ॥\n\nਆਸਾਂ ਮੇਰੀਆਂ ਦੇਵੀਂ ਨਾ ਤੋੜ ਵੇ , \nਤੇਰੇ ਬਗੈਰ ਹੋਰ ਕੀਹਦੇ ਉੱਤੇ ਜੋਰ ਵੇ , \nਮੇਰੇ ਸੁੱਤੇ ਹੋਏ ਕਰਮ ਜਗਾ ਦੇ ॥\n\nਮਾਹੀ ਦੇ ਬਾਝੋਂ ਤੂੰ ਵੀ ਚੰਗਾ ਨਈਂਓਂ ਲੱਗਦਾ , \nਮੇਰੇ ਤੋਂ ਬਗੈਰ ਹੋਵੇਂਗਾ , ਤੂੰ ਰੱਬ ਸਬਦਾ , \nਮੇਰੇ ਮਾਹੀ ਦਾ ਮੁੱਖੜਾ ਦਿਖਾ ਦੇ ॥\n\nਮਾਹੀ ਰੁੱਸ ਜਾਵੇ , ਰੁੱਸ ਜਾਵੇ ਸਾਰਾ ਜੱਗ ਵੇ , \nਬਣ ਜਾਣ ਵੈਰੀ ਸਾਰੇ , ਦਿਸਦਾ ਨਾ ਸੱਜਣ ਵੇ , \n' ਦਰਸਨ ' ਮੇਰਾ ਹਬੀਬ ਮਨਾ ਦੇ ॥"},"hi":{"t":"तैनू वास्ता ई डाढिया रब्बा","c":"तेंनू वास्ता ई डाढिया रब्बा , \nकि माही मेरा मोड़ वतनी ।।\n\nसिर दे सदके वे पीरा , बकरा मैं देनीआं , \nहथ जोड़ां , अर्ज करेनीआं , \nकरदे रहमतां , तूं जलवा दिखा दे ।।\n\nआसां मेरीयां देवीं ना तोड़ वे , \nतेरे बगैर होर कीहदे उत्ते जोर वे , \nमेरे सुत्ते होए कर्म जगा दे ।।\n\nमाही दे बाझों तूं वी चंगा नईयों लगदा , \nमेरे तों बगैर होवेंगा , तूं रब्ब सबदा , \nमेरे माही दा मुखड़ा दिखा दे ।।\n\nमाही रुस्स जावे , रुस्स जावे सारा जग वे , \nवन जान वैरी सारे , दिसदा ना सज्जन वे , \n' दर्शन ' मेरा हबीब मना दे ।।"},"en":{"t":"Tenu Vaasta E Dadeya Rabba","c":"Tenu Vaasta E Dadeya Rabba"}},

	{"id":1769612397114,
	"pb":{"t":"ਆਉਂਦੀਆਂ ਨੇ ਯਾਦਾਂ ਜਦੋਂ ਮਾਹੀ","c":"ਆਉਂਦੀਆਂ ਨੇ ਯਾਦਾਂ ਜਦੋਂ , ਮਾਹੀ ਤੇਰੀਆਂ \nਛਮ ਛਮ ਰੋਂਦੀਆਂ ਨੇ , ਅੱਖੀਆਂ ਮੇਰੀਆਂ \nਦਿਲ ਬੈਠਾ ਹੈ ਆਸ ਲਗਾ , \nਆਜਾ ਰੇ ਆਜਾ ਮਾਹੀ ਮੇਰਿਆ ॥\n\nਅੱਖੀਆਂ ਨਿਮਾਨੀਆਂ ਨੇ ਰੱਖ ਲਈ ਆਸ ਏ ,\nਦਿਨ ਰਾਤ ਮੈਨੂੰ ਸਤਾਉਂਦੀ ਤੇਰੀ ਯਾਦ ਏ ,\nਪਾਵਾਂ ਅਉਂਸੀਆਂ ਤੇ ਤਕਾਂ ਤੇਰਾ ਰਾਹ ॥\n\nਗ਼ਮ ਦਾ ਸ਼ਿੰਗਾਰ ਕਰ , ਦਿਲ ਉਡੀਕੇ ਵੇ ,\nਤਾਹਣੇ ਮੇਹਣੇ ਮਾਰਦੇ ਨੇ , ਤੇਰੇ ਸ਼ਰੀਕ ਵੇ ,\nਕਿਹੜੀ ਗੱਲੋਂ ਤੂੰ ਰੁੱਸ ਵੇ ਗਿਆ ॥\n\nਸਖੀਆਂ ਸਹੇਲੀਆਂ ਨੇ , ਕੀਤਾ ਅਵਾਜ਼ਾਰ ਵੇ ,\nਜਦੋਂ ਦਾ ਹੋ ਗਿਆ , ਤੇਰੇ ਨਾਲ ਪਿਆਰ ਵੇ ,\nਮੈਨੂੰ ਇਕ ਪਲ ਵੀ ਚੈਨ ਨਹੀਂ ਆਉਂਦਾ ॥\n\nਕਰ ਕੇ ਕਾਰ ਤੂੰ , ਭੁੱਲ ਗਯੋਂ ਮੈਨੂੰ ਵੇ ,\nਤੇਰੇ ਬਗੈਰ ਦੁੱਖ , ਦੱਸਾਂ ਮੈਂ ਕਿੰਨੂੰ ਵੇ ,\n' ਦਰਸਨ ' ਬਿਰਹੋਂ ਨੇ ਮਾਰ ਸੁਟਿਆ ॥"},"hi":{"t":"आंदीयां ने यादां जदों माही","c":"आंदीयां ने यादां जदों , माही तेरीयां \nछम छम रोंदीयां ने , अखीयां मेरीयां \nदिल बैठा है आस लगा , \nआजा रे आजा माही मेरेया ।।\n\nअखीयां निमानीयां ने रख लई आस ए , \nदिन रात मैंनू सतांदी तेरी याद ए , \nपावां औंसीआं ते तकां तेरा राह ।।\n\nगुम दा शिंगार कर , दिल उडीके वे , \nताहने मेहणे मारदे ने , तेरे शरीक वे , \nकेहड़ी गल्लों तूं रुस्स वे गिया ।।\n\nसखीयां सहेलीयां ने , कीता अवाज़ार वे , \nजदों दा हो गया , तेरे नाल प्यार वे , \nमैंनू इक पल वी चैन नही आंदा ।।\n\nकर के कार तूं , भुल गेयों मैनूं वे , \nतेरे बगैर दुख , दसां में किन्नूं वे \n' दर्शन ' बिरहों ने मार सुट्टेया ।।"},"en":{"t":"Ondiyaan Ne Yaada Jado Mahi Teriyaan","c":"Ondiyaan Ne Yaada Jado Mahi Teriyaan"}},

	{"id":1769612669252,
	"pb":{"t":"ਅੱਖਾਂ ਰੋਂਦੀਆਂ ਨੇ ਹਰ ਰਾਤੀ","c":"ਅੱਖਾਂ ਰੋਂਦੀਆਂ ਨੇ ਹਰ ਰਾਤੀ , \nਮਾਹੀ ਤੈਨੂੰ ਯਾਦ ਕਰਕੇ ॥\n\nਅੱਖੀਆਂ ਦਾ ਉਲਾਂਭਾ ਲਾਹ ਦੇ , \nਦਿਲ ਤੋਂ ਤਾਣਾ ਵੇ ,\nਮਾਰਦਾ ਏ ਬੋਲੀਆਂ ਮੈਨੂੰ ਸਾਰਾ ਜਮਾਨਾ ਵੇ ,\nਜਦੋਂ ਦਾ ਤੂੰ ਪਰਦੇਸੀ ਹੋ ਗਿਆ , \nਰੋਵਾਂ ਯਾਦ ਕਰਕੇ ॥\n\nਲੋਕਾਂ ਵੱਲੋਂ ਮੈਨੂੰ ਕੋਈ ਨਹੀਂ ਡਰ ਵੇ ,\nਮੈਨੂੰ ਤੇਰੇ ਉੱਤੇ ਪੂਰਾ ਇਤਬਾਰ ਵੇ , \nਮੇਰਾ ਦਿਲ ਤਸੱਲੀ ਨਈਂਓਂ ਕਰਦਾ ॥\n\nਕਿਹੜਾ ਕੰਮ ਕਰਾਂ , \nਜੇਹੜਾ ਤੈਨੂੰ ਚੰਗਾ ਲੱਗੇ ਵੇ ,\nਕੋਈ ਵੀ ਪੀਰ ਫ਼ਕੀਰ ਮੈਨੂੰ ਨਾ ਲੱਭੇ ਵੇ , \n' ਦਰਸਨ ' ਦੇਵੇ ਜੋ ਤੇਰੇ ਨਾਲ ਮਿਲਾ ॥"},"hi":{"t":"अखां रोंदीयां ने हर राती","c":"अखां रोंदीया ने हर राती , \nमाही तैनूं याद करके ।।\n\nअंखीयां दा उलाहमां लाह दे , \nदिल तों तानां वे , \nमारदा ए बोलीयां मैनूं सारा जमाना वे , \nजदों दा तूं परदेसी हो गया , \nरोवां याद करके ।।\n\nलोकां वल्लों मैनूं कोई नहीं डर वे , \nमैंनू तेरे उत्ते पूरा एतबार वे , \nमेरा दिल तसल्ली नईओं करदा ।।\n\nकेहड़ा कम करां , \nजेहड़ा तैनूं चंगा लगे वे \nकोई वी पीर फकीर मैनूं न लभ्भे वे \n' दर्शन ' देवे जो तेरे नाल मिला ।।"},"en":{"t":"Akha Rondiyaan Ne Har Raati","c":"Akha Rondiyaan Ne Har Raati"}},

	{"id":1769612925379,
	"pb":{"t":"ਕਿਉਂ ਰੁੱਸ ਬੈਠਾਂ ਐਂ","c":"ਕਿਉਂ ਰੁੱਸ ਬੈਠਾਂ ਐਂ , ਕੀ ਕੀਤਾ ਐ ਕਸੂਰ ,\nਅੱਖੀਆਂ ਮੇਰੀਆਂ 'ਚ ਸੋਹਣਿਆਂ ਤੇਰਾ ਐ ਸਰੂਰ ,\nਦਿਲ ਵਾਰ ਵਾਰ ਕਹੇ , ਤੈਨੂੰ ਤੱਕਾਂ ਦੁਬਾਰਾ ॥\n\nਓਹਦਾ ਮੁੱਖ ਸੀ ਸੋਹਣਾ , ਲੱਗਦਾ ਬੜਾ ਪਿਆਰਾ ,\nਉਸ ਵਿਚ ਦਿਸਦਾ ਸੀ , ਮੈਨੂੰ ਰੱਬ ਵਾਲਾ ਨਜ਼ਾਰਾ ,\nਦਿਲ ਵਾਰ ਵਾਰ ਕਹੇ , ਤੈਨੂੰ ਤੱਕਾਂ ਦੁਬਾਰਾ ॥\n\nਕਰਾਂ ਮਿੰਨਤਾਂ ਤੇ ਕਰਾਂ ਅਰਜੋਈ ,\nਤੇਰੇ ਬਾਝੋਂ ਸਾਡਾ ਹੋਰ ਨਈਂਓਂ ਕੋਈ ,\nਹੁਣ ਤੇਰੇ ਬਾਝੋਂ ਸਾਡਾ ਨਹੀਂ ਗੁਜ਼ਾਰਾ ,\nਦਿਲ ਵਾਰ ਵਾਰ ਕਹੇ , ਤੈਨੂੰ ਤੱਕਾਂ ਦੁਬਾਰਾ ॥\n\nਕੂਕ ਮੇਰੀ ਸੁਣ ਮੈਂ ਅਉਸੀਆਂ ਪਾਵਾਂ ,\nਦਰਦ ਵਿਛੋੜੇ 'ਚ ਚੰਨਾ ਮਰਦੀ ਜਾਵਾਂ ,\n' ਦਰਸਨ ' ਆਵੇ ਮਾਹੀ ਮੈਂ ਕਾਗ ਉਡਾਵਾਂ ,\nਦਿਲ ਵਾਰ ਵਾਰ ਕਹੇ , ਤੈਨੂੰ ਤੱਕਾਂ ਦੁਬਾਰਾ ॥"},"hi":{"t":"क्यों रुस्स बैठां ए","c":"क्यों रुस्स बैठां ए , की कीता ए कसूर , \nअखीयां मेरीयां च सोहनियां तेरा ए सरूर , \nदिल बार बार कहे , तैनूं तक्कां दुबारा ।।\n\nओहदा मुख सी सोहना , लगदा बड़ा प्यारा , \nउस विच दिसदा सी , मैनूं रब्ब वाला नज़ारा , \nदिल बार बार कहे , तैनूं तक्कां दुबारा ।।\n\nकरां मिन्नतां ते करां अरजोई , \nतेरे बाझों साडा होर नईओं कोई , \nहुण तेरे बाझों साडा नहीं गुजारा , \nदिल बार बार कहे , तैनूं तक्कां दुबारा ।।\n\nकूक मेरी सुन मैं औसीयां पावां , \nदर्द विछोड़े 'च चन्ना मरदी जावां , \n' दर्शन ' आवे माही मैं काग उडावां , \nदिल बार बार कहे , तैनूं तक्कां दुबारा ।।"},"en":{"t":"Kyo Russ Baitha E","c":"Kyo Russ Baitha E"}},

	{"id":1769613192102,
	"pb":{"t":"ਓਹ ਕਿਸ ਤਰਾਂ ਭੁੱਲ ਜਾਵਾਂ","c":"ਓਹ ਕਿਸ ਤਰਾਂ ਭੁੱਲ ਜਾਵਾਂ , \nਬੀਤੇ ਹੋਏ ਦਿਨਾਂ ਦੀ ਯਾਦ ,\nਮੇਰੀ ਸੁਣਦਾ ਨਈਂਓਂ ਰੱਬ ਫਰਿਆਦ ,\nਮਿੰਨਤਾਂ ਕਰ-ਕਰ ਥੱਕ ਗਈ ਸੋਹਣਿਆਂ ॥\n\nਬੀਤੇ ਦਿਨਾਂ ਦੀ ਯਾਦ ਸਤਾਵੇ , \nਦਿਲ ਮੇਰੇ ਨੂੰ ਚੈਨ ਨਾ ਆਵੇ ,\nਮਾਹੀ ਆਵੇ ਨਾ ਪੱਤਣਾਂ ਤੋਂ ਪਾਰ ॥\n\nਦਿਲ ਤੇ ਕਹਿੰਦਾ ਮੈਂ ਭੁੱਲ ਜਾਵਾਂ , \nਯਾਦ ਤੇਰੀ ਨੂੰ ਮਾਰ ਮੁਕਾਵਾਂ ,\nਯਾਦ ਕਰਾਂ ਨਾ ਮੈਂ ਯਾਦ ਆਵਾਂ ,\nਮਾਹੀ ਆ ਵੇ ਪੱਤਣਾਂ ਤੋਂ ਪਾਰ ॥\n\nਇਸ ਦਿਲ ਨੂੰ ਆਖਾਂ ਚੁੱਪ ਵੇ ਹੋ ਜਾ , \nਅੱਖੀਆਂ ਨੂੰ ਆਖਾਂ ਹੁਣ ਤੂੰ ਸੌਂ ਜਾ ,\n' ਦਰਸਨ ' ਥੱਕ ਗਈਆਂ ਕਰ ਇੰਤਜ਼ਾਰ , \nਮਾਹੀ ਆ ਜਾ ਪੱਤਣਾਂ ਤੋਂ ਪਾਰ ॥"},"hi":{"t":"ओह किस तरां भुल जावां","c":"ओह किस तरां भुल जावां , \nबीते होए दिनां दी याद , \nमेरी सुनदा नईयों रब्ब फरियाद , \nमिन्नतां कर-कर थक गई सोहणेयां ।।\n\nबीते दिनां दी याद सतावे , \nदिल मेरे नूं चैन ना आवे , \nमाही आवे ना पत्तनां तों पार ।।\n\nदिल ते कैंहदा मैं भुल जावां , \nयाद तेरी नूं मार मुकावां , \nयाद करां न मैं याद आवां , \nमाही आ वे पत्तनां तो पार ।।\n\nइस दिल नूं आखां चुप वे हो जा , \nअखीयां नूं आखां हुण तूं सौं जा , \n' दर्शन ' थक गईयां कर इंतजार , \nमाही आ जा पत्तनां तो पार ।।"},"en":{"t":"Oh Kis Tarah Bhul Java ","c":"Oh Kis Tarah Bhul Java "}},
