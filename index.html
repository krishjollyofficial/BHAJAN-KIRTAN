	"pb":{"t":"ਤੇਰੇ ਸਹਾਰੇ ਮੇਰੇ ਰਾਜ ਦੁਲਾਰੇ","c":"ਤੇਰੇ ਸਹਾਰੇ ਮੇਰੇ ਰਾਜ ਦੁਲਾਰੇ , ਹਰਿ ਰਾਇ ॥ \nਪ੍ਰੇਮੁ ਭਯੋ ਮਨਿ ਚਾਉ ਲਾਗਾ ਹੈ , ਨਾਮੁ ਦੇਹੁ ਦਾਤਾਰ ਜੀਉ ॥ \nਬੇਅੰਤ ਬੇਪਰਵਾਹੋ ਬੇਮੁਹਤਾਜ , ਬਾਪਰਵਾਹਾਂ ਗੋਬਿੰਦ ਸਰਣਿ ਤਾਰੇ ॥ \nਹਰਿ ਮੇਲੋ ਸੇਵ ਕਮਾਵੈ , ਜੇ ਮਸੋਲਾ ਕਿਰਪਾ ਧਾਰੇ ॥ \nਖਸਮ ਪਿਆਲਾ ਪੀਆ ਖਸਮਾਣੇ , ਖਿਨ-ਖਿਨ ਕਾਜ ਸਵਾਰੇ ॥ \n'ਦਰਸਨ' ਕੂਕਰੁ ਕਰੇ ਬੇਨਤੀ , ਸੁਣਹੁ ਸਤਿਗੁਰ ਮੇਰੇ ਪਿਆਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरे सहारे मेरे राज दुलारे","c":"तेरे सहारे मेरे राज दुलारे , हर राए ।।\nप्रेम भयो मन चाओ लागा है , नाम देओ दातार जीओ ।।\nबेअंत बेपरवाहो बेमुहताज , बापरवाहाँ गोबिन्द शरण तारे ।।\nहर मेलो सेव कमावै , जे मसोला कृपा धारे ।।\nखसम प्याला पीया खसमानै , खिन-खिन काज संवारे ।।\n'दर्शन' कूकर करे बेनती , सुनो सतगुरु मेरे प्यारे ।। \n( यकीन )"},"en":{"t":"Tere Sahare Mere Raj Dulaare","c":"Tere Sahare Mere Raj Dulaare"}},

	{"id":1768412128181,"audio":"audio/HUM KARNE AAYE LOK BHALAI.mp3",
	"pb":{"t":"ਹਮ ਕਰਨੇ ਆਏ ਲੋਕ ਭਲਾਈ","c":"ਹਮ ਕਰਨੇ ਆਏ ਲੋਕ ਭਲਾਈ , ਦੁਖ ਹਰਿ ਸਤਿਗੁਰ ਨਾਮੁ ਥਿਆਈ ॥ ਕਰਮ ਧਰਮ ਏਕੋ ਕੀਨੇ , ਗੁਰਦੇਵ ਸੰਗਿ ਪ੍ਰਭੁ ਹੋਵੋ ਸਹਾਈ ॥ \nਰਾਜੁ ਤਾਜੁ ਤੁਝੁ ਮੋਹੇ ਦੀਨੋ , ਦਾਸਨ ਦਾਸ ਸੁਣੀ ਅਰਜੋਈ ॥ \nਰਾਖੁ ਸਰਣਿ ਅਪਣੀ ਠਾਕੁਰ ਜੀਉ , ਪੂਰਨ ਪੁਰਖ ਬਨਤ ਬਣਾਈ ॥ \nਆਪੇ ਹਰਿ ਪੂਰੇ ਪਰਮੇਸ਼ਵਰ , 'ਦਰਸਨ' ਦਾਸ ਰਾਖੋ ਸਰਣਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"हम करने आए लोक भलाई","c":"हम करने आए लोक भलाई , दुख हर सतगुर नाम थियाई ।।\nकरम धरम ऐको कीने , गुरदेव संग प्रभ होवो सहाई ।।\nराज ताज तुझ मोहे दीनो , दासन दास सुणी अरजोई ।।\nराखो शरण अपनी ठाकुर जीओ , पूरण पुरख बनत बनाई ।।\nआपे हर पूरे परमेश्वर , दर्शन दास राखो शरणाई ।।\n( यकीन )"},"en":{"t":"Hum Karne Aaye Lok Bhalai","c":"Hum Karne Aaye Lok Bhalai"}},
	
	{"id":1768412379135,"audio":"audio/GUR PURA WADBHAGI PAWAN.mp3",
	"pb":{"t":"ਗੁਰੂ ਪੂਰਾ ਵਡਭਾਗੀ ਪਾਵਾਂ","c":"ਗੁਰੂ ਪੂਰਾ ਵਡਭਾਗੀ ਪਾਵਾਂ , ਜਨਮ ਜਨਮ ਕੀ ਮੈਲੁ ਗਵਾਵਾਂ ॥ \nਗੁਰੁ ਮਿਲਿ ਹੋਸੀ ਨਾਮੁ ਅਧਾਰਾ , ਗੁਰ ਮਹਿਮਾ ਤੇਰੀ ਅੰਤੁ ਨ ਪਾਰਾ ॥ \nਗੁਰ ਬਿਨੁ ਨ ਕੋਈ ਸੰਗੀ , ਗੁਰ ਸੰਗਿ ਜਮੁ ਨੇੜੇ ਨ ਆਸੀ ॥ \nਗੁਰੁ ਪਾਰਬ੍ਰਹਮ ਪਰਮੇਸ਼ਵਰ ਪੁਰਖ ਹਮਾਰੇ , ਨਾਨਕ ਪ੍ਰਭ ਦਰਸੁ ਦੇਹੁ , 'ਦਰਸਨ' ਦੇਹੁ ਪਿਆਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरु पुरा बडभागी पावां","c":"गुरु पुरा बडभागी पावां , जनम जनम की मैल गवांवा ।।\nगुर मिल होसी नाम अधारा , गुर महिमा तेरी अन्त न पारा ।।\nगुर बिन न कोई संगी , गुर संग जम नेडे न आसी ।। \nगुर पारब्रह्म परमेश्वर पुरख हमारे , नानक प्रभ दरस देओ , \n'दर्शन' देओ पिआरे ।।\n( यकीन )"},"en":{"t":"Guru Pura Vadpagi Pavaan","c":"Guru Pura Vadpagi Pavaan"}},
	
	{"id":1768413365470,"audio":"audio/MERE RAM RAMAIYA.mp3",
	"pb":{"t":"ਮੇਰੋ ਰਾਮ ਰਮਈਆ ਤੇਰਾ ਅੰਤੁ ਨ ਜਾਣਾ","c":"ਮੇਰੋ ਰਾਮ ਰਮਈਆ ਤੇਰਾ ਅੰਤੁ ਨ ਜਾਣਾ , ਤੂੰ ਠਾਕੁਰ ਸਰਬ ਕਲਾ , \nਤੂੰ ਆਪੇ ਸਰਬ ਸਮਾਣਾ ॥ \nਸੰਤ ਸੰਗਿ ਮਨੁ ਹਰਿ ਰੰਗਿ ਰਾਤਾ , ਤੂੰ ਮਾਤ ਪਿਤਾ ਪੁਰਖੁ ਬਿਧਾਤਾ ਜੀਉ ॥ ਮੇਰੇ ਸੁਆਮੀ ਗੋਬਿੰਦ ਗੋਸਾਈਂ , ਬਿਨੁ ਨਾਮੇ ਜਨਮੁ ਬਿਰਥਾ ਜਾਈ ॥ \nਤੁਮ ਬਖ਼ਸ਼ੰਦ ਸੇਵਕ ਅਪਣੇ ਸਾਹਿਬ ਜੀਉ , ਜੇ ਤੁਧੁ ਨਾਮੁ ਧਿਆਈ ॥ ਸਿਮਰਿ ਨਾਮੁ ਪ੍ਰਭ ਗੋਬਿੰਦ ਠਾਕੁਰ ਜੀਉ , ਭਵਜਲੁ ਪਾਰਿ ਉਤਰਿ ਜਾਈ ॥ ਹਾਦਰਾ ਹਦੂਰਿ ਅਨਹਦ ਬਾਣੀ , ਏਹ ਮਨਿ ਭਾਈ ਏਹ ਮਨਿ ਗਾਈ ॥ 'ਦਰਸਨ' ਦਾਸ ਦਰਸੁ ਦੀਜੈ , ਗੁਰੂ ਨਾਨਕ ਦਾਸ ਮੇਰੇ ਸਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"मेरो राम रमैया तेरा अंत न जाणा","c":"मेरो राम रमैया तेरा अंत न जाणा , तू ठाकुर सरब कला , \nतू आपे सरब समाणां ।।\nसंत संग मन हर रंग राता , तू मात पिता पुरख विधाता जीओ ।।\nमेरे स्वामी गोबिन्द गोसाई , बिन नामे जन्म बिरथा जाई ।।\nतुम बखशंद सेवक अपने साहिब जीओ , जे तुध नाम धियाई ।।\nसिमर नाम प्रभ गोबिन्द ठाकुर जीओ , भवजल पार उतर जाई ।।\nहादरा हदूर अनहद बाणी , एह मन भाई एह मन गाई ।।\n'दर्शन' दास दरस दीजै , गुरु नानक दास मेरे साई ।।\n( यकीन )"},"en":{"t":"Mere Ram Ramaiya","c":"Mere Ram Ramaiya"}},
	
	{"id":1768413656791,"audio":"audio/KAHE RE MAN KI.mp3",
	"pb":{"t":"ਕਾਹੇ ਰੇ ਮਨ ਕੀ ਡਗਰੀਆ ਡੋਲੇ","c":"ਕਾਹੇ ਰੇ ਮਨ ਕੀ ਡਗਰੀਆ ਡੋਲੇ , \nਅੰਮ੍ਰਿਤ ਵੇਲੇ-ਅਨਹਦ ਸ਼ਬਦ , ਬਾਬੀਹਾ ਬੋਲੇ ॥ \nਅਧਲ ਟੇਕ ਤੁਮਾਰੀ ਰਾਮ ਜੀਉ , ਹਮ ਸਭ ਠਹਿਰੇ ਭਿਖਾਰੀ ॥ \nਸੇਵਕ ਸੇਵ ਭਗਤ ਕਮਾਈ , ਤੁਧ ਤੇ ਹੈ ਰਾਮਾ ਪਾਈ ॥ \nਤੂੰ ਦਰਿਆਉ ਤੂੰ ਹੀ ਬੰਧੁ , ਤੂੰ ਬੰਧੂ ਤੂੰ ਹੀ ਭ੍ਰਾਤਾ ॥ \nਮਨਿ ਮਾਨੇ ਹਰਿ ਨਾਮ ਸਿਮਰਿ ਜੀਉ , ਗੁਰ ਸਬਦਿ ਭੇਦ ਬਤਾਈ ॥ \nਹਰਿ ਰੰਗਿ ਰਾਤਾ ਪੁਰਖ ਬਿਧਾਤਾ , ਨਾਨਕ ਨਾਮ ਕੋ ਵਿਰਲਾ ਜਾਤੇ ॥ \nਸਾਧੂ ਸੰਗਿ ਪਰਮ ਪਦ ਪਾਈ , \n'ਦਰਸਨ' ਕਹਤ ਦੁਖ ਕਲੇਸ , ਸਭਹਿ ਨਸਿ ਜਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"काहे रे मन की डगरिया डोले","c":"काहे रे मन की डगरिया डोले ,\nअमृत वेले-अनहद शब्द , बाबीहा बोले ।।\nअधल टेक तुमारी राम जीओ , हम सब ठहरे भिखारी ।।\nसेवक सेव भगत कमाई , तुध ते है रामा पाई ।।\nतू दरियाओं तू ही बंध , तू बंधू तू ही भ्राता ।।\nमनि माने हरि नाम सिमर जीओ ,\nगुर शब्द भेद बताई ।।\nहरि रंग राता पुरख विधाता , नानक नाम को विरला जाते ।।\nसाधु संग परम पद पाई , \n'दर्शन' कहत दुख क्लेस , सबहि नस जाई ।।\n( यकीन )"},"en":{"t":"Kahe Re Man Ki Dagariya Dole","c":"Kahe Re Man Ki Dagariya Dole"}},

	{"id":1768413889511,"audio":"audio/NA CHITARE.mp3",
	"pb":{"t":"ਨ ਚਿਤਾਰੇ ਅਵਗੁਣ ਹਮਾਰੇ","c":"ਨ ਚਿਤਾਰੇ ਅਵਗੁਣ ਹਮਾਰੇ , ਤੁਮ ਐਸੇ ਮਿਹਰਵਾਨ ॥ \nਕਿਰਪਾ ਕੀਜੋ ਹਮ ਪਰ ਸਾਹਿਬਾ , ਹਮ ਮੂਰਖ ਨਾਦਾਨ ॥ \nਤੁਮਹੀ ਹੋ ਬੰਧੂ , ਤੁਮਹੀ ਸੁਖਦਾਤਾ , \nਹੋ ਤੁਮਹੀ ਹਮਾਰੇ ਭ੍ਰਾਤਾ ਦਇਆ ਕਰੋ ਦਇਆਵਾਨ ॥ \nਮਾਤ-ਪਿਤਾ ਤੁਮ ਜੀਵਨਦਾਤਾ , ਜਨਮ-ਜਨਮ ਸੇ ਤੁਮਸੇ ਨਾਤਾ , \nਨ ਵਿਸਰੇ ਮਨ ਸੇ ਨਾਮ ॥ \nਆਇਓ ਨਾਥ ਤੇਰੀ ਸ਼ਰਣਾ , 'ਦਰਸਨ' ਵਿਪਦਾ ਤੁਮ ਹੀ ਹਰਣਾ , \nਤੁਮ ਪੇ ਹੈ ਬਹੁਮਾਣ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"न चितारे अवगुण हमारे","c":"न चितारे अवगुण हमारे , तुम ऐसे मेहरबान ।।\nकिरपा कीजो हम पर साहिबा , हम मूर्ख नादान ।।\nतुम्ही हो बन्धु , तुम्ही सुखदाता , \nहो तुम्ही हमारे भ्राता दया करो दयावान ।।\nमात-पिता तुम जीवनदाता , जन्म-जन्म से तुमसे नाता , \nन विसरे मन से नाम ।।\nआइयो नाथ तेरी शरणा , 'दर्शन' विपदा तुम ही हरणा , \nतुम पे है बहुमाण ।।\n( यकीन )"},"en":{"t":"Na Chitaare Avagun Hamare ","c":"Na Chitaare Avagun Hamare"}},

	{"id":1768421034641,"audio":"audio/kantkamann.mp3",
	"pb":{"t":"ਕੰਤ ਕਾਮਨ ਮੇਰਾ ਸੋਹਣਾ ਜੀਉ","c":"ਕੰਤ ਕਾਮਨ ਮੇਰਾ ਸੋਹਣਾ ਜੀਉ , ਸੋਹਣਾ ਸੁੰਦਰ ਰਾਮ ਰਮਈਆ ॥ \nਸੁਣਾਂ ਗੁਣਾਂ ਗੁਣਿਆਈ ਚਾਰ , ਮੇਰੀ ਮਹਿਮਾ ਅੰਤ ਨ ਪਾਰਾਵਾਰ ॥ \nਮਨਮੁਖ ਘ੍ਰਿਗ ਜੀਵਣਾ , ਮਰਣ ਜਨਮ ਵਾਰੋਵਾਰ ॥ \nਗੁਰਮੁਖ ਮੁਖ ਉਜਵਲ , ਸੁਖ ਦੇਹੁ ਸਤਿ ਕਰਤਾਰ ॥ \nਸਚੁ ਬੋਲਣਾ ਸਚੁ ਕਮਾਵਣਾ , ਸਚੁ ਤਪਸਿਆ ਸਚੁ ਸਹਜੁ \n'ਦਰਸਨ' ਕਹੇ ਮੇਰੇ ਮਿਹਰਵਾਨ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"कंत कामन मेरा सोहणा जीओ","c":"कंत कामन मेरा सोहणा जीओ , सोहणा सुन्दर राम रमैया ।।\nसुणां गुणां गुणिआई चार , मेरी महिमा अन्त न पारावार ।।\nमनमुख घ्रिग जीवणां , मरण जन्म वारोवार ।।\nगुरमुख मुख उज्जवल , सुख देओ सतकरतार ।।\nसच बोलणा सच कमावणां , सच तपस्या सच सहज \n'दर्शन' कहे मेरे मेहरबान ।।\n( यकीन )"},"en":{"t":"Kant Kaaman Mera Sohna Jeeyo","c":"Kant Kaaman Mera Sohna Jeeyo"}},

	{"id":1768474169613,
	"pb":{"t":"ਗੁਰੂ ਨਾਨਕ ਦਾ ਜਪੀਓ ਨਾਮ ਪਹਿਲਾ","c":"ਗੁਰੂ ਨਾਨਕ ਦਾ ਜਪੀਓ ਨਾਮ ਪਹਿਲਾ , ਜਿਸਨੂੰ ਸਿਮਰਦਾ ਸਾਰਾ ਸੰਸਾਰ ਡਿੱਠਾ ॥ \nਡਿੱਠੇ ਬ੍ਰਹਮਾ ਵਿਸ਼ਨੂੰ ਮਹੇਸ਼ੇ ਨਾਲੇ , ਰਾਮ ਤੇ ਰਹਮਾਨ ਡਿੱਠਾ ॥ \nਦੇਵੀ ਦੇਵਤੇ ਜਾਪ ਕਰਦੇ , ਈਸ਼ਵਰ ਅੱਲ੍ਹਾ ਕ੍ਰਿਸ਼ਨ ਭਗਵਾਨ ਡਿੱਠਾ ॥ \nਰਿਸ਼ੀ ਮੁਨੀ ਸੰਤ ਮਹਾਤਮਾ ਦੇ ਭੇਦ ਛੁਪਾਕੇ , ਖੁਦ ਖੁਦਾ ਨਰ ਨਾਰਾਇਣ ਡਿੱਠਾ ॥ \n'ਦਰਸਨ' ਦਾਸ ਵੀ ਆਖੇ ਰੱਬ ਹੈ ਏਕੋ , ਨਾਨਕ ਨਾਮ ਨਵਾਂ ਰੱਖ ਦਿੱਤਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"गुरु नानक दा जपीऔ नाम पहला","c":"गुरु नानक दा जपीऔ नाम पहला , जिसनू सिमरदा सारा संसार डिठा ।।\nडिठे ब्रह्मा विष्णु महेशे नाले , राम ते रहमान डिठा ।।\nदेवी देवते जाप करदे , ईश्वर अल्ला कृष्ण भगवोन डिठा ।।\nऋषि मुनी संत महात्मा दे भेद छुपाके , खुद खुदा नर नारायण डिठा ।।\n'दर्शन' दास वी आखे रब है ऐको , नानक नाम नवां रख दित्ता ।।\n( यकीन )"},"en":{"t":"Guru Nanak Da Japiye Naam Pehla","c":"Guru Nanak Da Japiye Naam Pehla"}},

	{"id":1768474439545,
	"pb":{"t":"ਤੇਰਾ ਕੀਰਤਨੁ ਕੀਰਤੀ","c":"ਤੇਰਾ ਕੀਰਤਨੁ ਕੀਰਤੀ , ਕਿਰਤਿ ਕਰਾਂ ਦਿਨ ਰਾਤੀ ॥ \nਬੈਕੁੰਠਿ ਬਸੈ ਰਾਮੁ ਦਇਆਲਾ ਜੀਉ , ਬਿਨੁ ਨਾਮੈ ਹਉ ਕਮ ਜਾਤੀ ॥ \nਨਾਮੁ ਕਮਾਵੈ ਹਰਿ ਗੁਣ ਗਾਵੈ , ਸਤਿਗੁਰ ਸਰਣਿ ਅੰਮ੍ਰਿਤ ਭੋਜਨੁ ਪਾਵਾਂ ॥ ਹਰਿ ਵੇਲੇ ਵਾਹੋ ਵਾਹੋ ਗੁਰੂ ਰਸਨ ਪਰਵਾਨੇ , ਕਿਰਪਾ ਕਰਹੁ ਮੇਰੇ ਠਾਕੁਰ ਮਿਹਰਵਾਨੈ ॥ \nਮਨਿ ਅੰਨੁ ਪਾਣੀ ਨ ਭਾਵੈ ਜੀਉ , 'ਦਰਸਨ' ਨਿਮਾਣੇ ਤੁਝ ਬਿਨੁ ਕਿਵੈ ਸੁਖੁ ਪਾਵੈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरा कीर्तन कीरती","c":"तेरा कीर्तन कीरती , किरत करा दिन राती ।।\nबैकुंठ बसै राम दइआला जीओ , बिन नामै हऊ कम जाती ।।\nनाम कमावै हरि गुण गावै , सतिगुरु शरण अमृत भोजन पावां ।।\nहर वेले वाहो वाहो गुरु रसन पारवाने , किरपा करो मेरे ठाकुर मेहरबानै ।।\nमन अन्न पाणी न भावै जीओ , दर्शन निमाणे तुझ बिन किवै सुख पावे ।।\n( यकीन )"},"en":{"t":"Tera Kirtan Keerti","c":"Tera Kirtan Keerti"}},

	{"id":1768474736952,
	"pb":{"t":"ਚਿੰਤਾ ਚਿਤਿ ਨ ਆਵੈ","c":"ਚਿੰਤਾ ਚਿਤਿ ਨ ਆਵੈ , ਜਾ ਸਤਿਗੁਰੁ ਮਨਿ ਭਾਵੈ ॥ \nਰਾਮ ਨਾਮੁ ਦੇਹੁ ਮੇਰੇ ਹਰਿ ਰਾਇ , ਊਚ ਅਪਾਰ ਠਾਕੁਰ ਦਾਤਾਰ ਜੀਉ ॥ \nਪਾਪ ਖੰਡਨੁ ਕਰਹੁ ਮੇਰੇ ਮਿਹਰਬਾਨਾ , ਚਸਾ ਨ ਬਿਛੁੜੇ ਮੇਰੇ ਪ੍ਰਭ ਦਾਸੁ ਤੁਮਾਰਾ ,\nਸੁਣਾਂ ਪੜ੍ਹਾਂ ਨਿਤ ਤੇਰੀ ਬਾਣੀ , ਗੁਰ ਸੰਗਿ ਨਿਸਿ ਹਰਿ ਤੇਰੀ ਮਾਣੀ , \nਬੈਕੁੰਠਿ ਬਸੈ ਮੇਰਾ ਅੰਤਰਯਾਮੀ , ਭੋਜਨੁ ਭੋਜੁ ਕਰੇ ਅੰਮ੍ਰਿਤ ਨਾਮੁ ॥ \nਗੁਰ ਕਿਰਪਾ ਹੋਸੀ ਅਗਮ ਗਿਆਨੁ , 'ਦਰਸਨ' ਪ੍ਰਭ ਪੂਰੇ ਜਾਉ ਕੁਰਬਾਨੁ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"चिंता चित न आवे","c":"चिंता चित न आवे , जा सतिगुर मन भावै ।।\nराम नाम देओ मेरे हर राये , ऊच अपार ठाकुर दातार जीओ ।।\nपाप खण्डन करो मेरे मेहरबाना , चस्सा न बिछड़े मेरे प्रभ दास तुम्हारा ,\nसुणां पढ़ा नित तेरी बाणी , गुर संग निस हरि तेरी माणी , \nबैकुण्ठ बसे मेरा अंतरयामी , भोजन भोज करे अमृत नाम ।।\nगुर किरपा होसी अगम गिआन , 'दर्शन' प्रभ पूरे जाऊ कुर्बान ।।\n( यकीन )"},"en":{"t":"Chinta Chitt Na Aave","c":"Chinta Chitt Na Aave"}},

	{"id":1768475095659,
	"pb":{"t":"ਤੇਰਾ ਨਾਮੁ ਪ੍ਰਾਣਧਾਰਾ ( ਪ੍ਰਾਣ ਪੂਜਾ )","c":"( ਪ੍ਰਾਣ ਪੂਜਾ )\nਤੇਰਾ ਨਾਮੁ ਪ੍ਰਾਣਧਾਰਾ , ਪ੍ਰਤਿਪਾਲ ਠਾਕੁਰ ਦਾਤਾਰ ਜੀਉ ॥ \nਰਾਖੋ ਲਾਜ ਪ੍ਰਭ ਜਨ ਅਪਣੇ , ਅਪਣੀ ਕਿਰਪਾ ਧਾਰਾ ॥ \nਸੁਣਿ-ਸੁਣਿ ਜੀਵਾਂ ਅੰਮ੍ਰਿਤ ਬਾਣੀ , ਤੇਰੀ ਪਾਲਣਹਾਰਾ ॥ \nਮਨਮੋਹ ਹੋਮੇ , ਰੋਗੁ ਕਾਟੋ , ਬੰਧਨਾਂ ਕਰਾਂ ਬਖ਼ਸ਼ਣਹਾਰਾ ॥ \n' ਦਰਸਨ ' ਸਰਣਿ ਦੇਹੁ ਪ੍ਰਭ ਮੇਰੇ , ਹਾਥ ਬਾਂਧਿ ਅਰਜ ਗੁਜਾਰਾਂ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरा नाम प्राणधारा ( प्राण पूजा )","c":"( प्राण पूजा )\nतेरा नाम प्राणधारा , प्रितपाल ठाकुर दातार जीओ ।।\nराखो लाज प्रभ जन अपने , अपनी किरपा धारा ।।\nसुन सुन जीवां अमृतबाणी , तेरी पालन हारा ।।\nमनमोह होमे , रोग काटो , बन्धना करा बक्खन हारा ।।\n' दर्शन ' शरण देओ प्रभ मेरे , हाथ बांध अरज गुजारां ।।\n( यकीन )"},"en":{"t":"Tera Naam Pranadhara ( Praan Pooja )","c":"Tera Naam Pranadhara\nSun Sun Jeeva Amritbani"}},

	{"id":1768475512517,"audio":"audio/Satguru Pura Aradhiye.mp3",
	"pb":{"t":"ਸਤਿਗੁਰੁ ਪੂਰਾ ਅਰਾਧੀਏ","c":"ਸਤਿਗੁਰੁ ਪੂਰਾ ਅਰਾਧੀਏ , ਮਨੁ ਸ਼ਾਂਤਿ ਹੋ ਜਾਏ ॥ \nਸਤਿਗੁਰੁ ਪੂਰਾ ਭੇਟੀਐ , ਜਮੁ ਲਾਗੇ ਨਾ ਆਵੈ ॥ \nਸਤਿਗੁਰੁ ਸਾਜਨੁ ਹਰਿ ਪੂਰਾ , ਮੇਰੇ ਪ੍ਰਭ ਸੁਆਮੀ ॥ \nਸਤਿਗੁਰੁ ਗੁਰ ਮੇਲਿ ਮਿਲਾਇੰਦਾ , ਮੇਰੇ ਪ੍ਰਭ ਅੰਤਰਯਾਮੀ ॥ \nਸਭਿ ਜਗਤੁ ਸੁਖੀ ਖਾਵੈ ਅਉਰ ਸੋਵੈ , \n' ਦਰਸਨ ' ਨੀਚੁ ਦੁਖੀ ਜਾਗੈ ਅਉਰ ਰੋਵੈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"सतगुर पूरा अराधिये","c":"सतगुर पूरा अराधिये , मन शांत हो जाये ।।\nसतगुर पूरा भेटिएं , जम लागे ना आवे ।।\nसतगुर साजन हर पूरा , मेरे प्रभ सुआमी ।।\nसतगुर गुर मेल मिलाइन्दा , मेरे प्रभ अर्न्तयामी ।।\nसबहि जगत सुखी खावे और सोवे , \n' दर्शन ' नीच दुःखी जागे और रोवे ।।\n( यकीन )"},"en":{"t":"Satguru Pura Aradhiye","c":"Satguru Pura Aradhiye"}},

	{"id":1768476208669,
	"pb":{"t":"ਤੇਰੇ ਭਰੇ ਭੰਡਾਰੇ ਲਾਲ ਜੀਉ","c":"ਤੇਰੇ ਭਰੇ ਭੰਡਾਰੇ ਲਾਲ ਜੀਉ , ਤੇਰੇ ਖੇਲ ਨਿਆਰੇ ॥ \nਜੁਗਾਂ ਜੁਗੰਤਰ ਹਰਿ ਆਪੇ ਵੰਡਦਾ ਆਇਆ , ਭਗਤ ਵਛਲ ਤੇਰੇ ਨਾਮ ਦੁਆਰੇ ॥ \nਤਨੁ ਕੁਲੀ ਗੁਲੀ ਸਿਮਰਨੁ ਤੇਰਾ , ਚਮਕੀ ਜੁਲੀ ਸਬੰਸਤ ਪੰਚ ਪਿਆਰੇ ॥ \nਲੇਵਤ ਦੇਵਤ ਕਰਤਾ ਆਇਆ , ਸੇਵ ਗੁਰੂ ਚੌਂਹ ਧਰਮ ਤੁਮਾਰੇ ॥ \nਦਰਸਨ ਦਾਸ ਤੇਰੀ ਮਹਿਮਾ ਗਾਵੈ , ਅਨੰਤ ਬੇਅੰਤ ਤਾਂਕੇ ਊਚੇ ਦੁਆਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरे भरे भंडारे लाल जीओ","c":"तेरे भरे भंडारे लाल जीओ , तेरे खेल निआरे ।।\nजुगां जुगंतर हरि आपे वंडदा आया , भगत वसल तेरे नाम दुआरे ।। \nतन कुल्ली गुल्ली सिमरन तेरा , चमकी जुल्ली सबंसत पँच पिआरे ।।\nलेवत देवत करता आया , सेव गुरू चौंह धरम तुमारे ।। \nदर्शन दास तेरी महिमा गावै , अनंत बेअंत तांके ऊँचे दुआरे ।।\n( यकीन )"},"en":{"t":"Tere Bhare Bhandare Laal Jeeyo","c":"Tere Bhare Bhandare Laal Jeeyo"}},
	
	{"id":1768477528304,"audio":"audio/charna ch lagaya.mp3",
	"pb":{"t":"ਚਰਣਾਂ ਚ ਲਗਾਇਆ ਈ","c":"ਚਰਣਾਂ ਚ ਲਗਾਇਆ ਈ , ਚਰਣਾਂ ਚ ਲਗਾਏ ਰੱਖਣਾ ॥ \nਅਸੀਂ ਬਾਲ ਨਿਆਣੇ ਹਾਂ , ਹੱਥ ਪਿਆਰ ਦਾ ਸਿਰ ਰੱਖਣਾ ॥ \nਅਸੀਂ ਪਿਆਸੇ ਸੀ ਦਰਸ਼ਨ ਦੇ , ਦਰਸ਼ਨ ਨੂੰ ਤਰਸਦੇ ਸੀ ॥ \nਏਹ ਨੈਣ ਨਿਮਾਣੇ ਵੀ ਪਏ ਛਮ-ਛਮ ਬਰਸਦੇ ਸੀ ॥ \nਨੈਣਾਂ ਚ ਵਸਾਇਆ ਈ , ਨੈਣਾਂ ਚ ਵਸਾਏ ਰੱਖਣਾ ॥ \nਅਸੀਂ ਅਉਗਣਹਾਰੇ ਹਾਂ , ਤੇਰੇ ਗਮ ਦੇ ਮਾਰੇ ਹਾਂ ॥ \nਲੱਖਾਂ ਦਰਦ ਮਿਲੇ ਸਾਨੂੰ , ਪਰ ਤੇਰੇ ਸਹਾਰੇ ਹਾਂ ॥ \nਸਾਡਾ ਦਰਦ ਵਧਾਇਆ ਈ , ਸਾਡਾ ਦਰਦ ਵਧਾਏ ਰੱਖਣਾ ॥ \nਆਸਾਂ ਤੇ ਉਮੰਗਾਂ ਦਾ , ਇਕ ਤੂੰ ਹੀ ਸਹਾਰਾ ਐ ॥ \nਤੇਰੇ ਨਾਮ ਦੀ ਮਸਤੀ ਦਾ ਸਾਨੂੰ ਮਿਲਿਆ ਨਜ਼ਾਰਾ ਹੈ ॥ \nਕਦਮਾਂ ਚ ਬਿਠਾਇਆ ਈ , ਕਦਮਾਂ ਚ ਬਿਠਾਏ ਰੱਖਣਾ ॥ \nਅਸੀਂ ਸ਼ੇਰ ਦੇ ਬੱਚੇ ਹਾਂ , ਅਸਾਂ ਮਰਕੇ ਵੀ ਜੀ ਲਾਂਗੇ ॥ \nਏ ਜਾਮ ਸ਼ਹੀਦੀ ਦਾ , ਅਸਾਂ ਹੱਸ-ਹੱਸ ਪੀ ਲਾਂਗੇ ॥"},"hi":{"t":"चरणां च लगाया ई","c":"चरणां च लगाया ई , चरणा च लगाये रखना ।। \nअसी बाल न्याने हा , हथ प्यार दा सिर रखना ।।\nअसी प्यासे सी दर्शन दे , दर्शन नू तरसदे सी ।। \nएह नैन निमाणे वी पये छम-छम बरसदे सी ।। \nनैनां च वसाया ई , नैना च वसाये रखना ।।\nअसी औगणहारे हां , तेरे गम दे मारे हां , \nलखां दर्द मिले सानू , पर तेरे सहारे हां ।। \nसाडा दर्द बडाया ई , साडा दर्द बडाये रखना ।।\nआसा ते उमंगा दा , इक तू ही सहारा ऐ , \nतेरे नाम दी मस्ती दा सानमू मिलया नजारा है ।। \nकदमां च बिठाया ई , कदमा च बिठाए रखना ।।\nअस्सी शेर दे बच्चे हां , अस्सा मरके वी जी लांगे ।।\nए जाम शहीदी दां , अस्सा हस-हस पी लांगे ।।"},"en":{"t":"Charna Ch Lagaya ","c":"Charna Ch Lagaya "}},

	{"id":1768478085537,
	"pb":{"t":"ਰਹਿਮਤਾਂ ਕਰਦਾ ਏ","c":"ਰਹਿਮਤਾਂ ਕਰਦਾ ਏ , ਝੋਲੀਆਂ ਭਰਦਾ ਏ , \nਪੀਰਾਂ ਦਾ ਪੀਰ ਮੇਰਾ ਸ਼ਾਹੀ ਫਕੀਰ , ਮੇਰਾ ਦਰਸ਼ਨ ਬਾਬਾ ਹੈ ॥ \nਏਹ ਵੇਖੋ ਰੱਬ ਹੈ ਸੱਚਾ , ਸਮਝੇ ਨ ਕੋਈ ਬੰਦਾ , \nਏਹ ਕੱਟ ਦੇਂਦਾ ਹੈ ਪਲ ਵਿਚ ਚੌਰਾਸੀ ਵਾਲਾ ਫੰਦਾ , \nਦੇਰ ਨਹੀਂ ਲਾਂਦਾ ਹੈ ਦੁਖੜੇ ਮਿਟਾਂਦਾ ਏ ॥ \nਜੋ ਆਣ ਪਿਆ ਗੁਰੁ ਸ਼ਰਣੀ , ਕਰ ਦੇਂਦਾ ਮਾਲੋਮਾਲ , \nਏ ਲੁੱਟ ਲਓ ਸੰਗਤੋ ਮੌਜਾਂ , ਮੇਰਾ ਦਰਸ਼ਨ ਦੀਨਦਇਆਲ , \nਭਰੇ ਭੰਡਾਰੇ ਨੇ , ਆਖਦੇ ਸਾਰੇ ਨੇ ॥ \nਏ ਦਾਸਨ ਦਾਸ ਪੁਕਾਰੇ ਮੇਰਾ ਦਰਸ਼ਨ ਦੀਨਦਇਆਲ , \nਓ ਮਿਹਰਾਂ ਦੇ ਸਾਈਆਂ ਕਰ ਨਦਰੀ ਨਦਰਿ ਨਿਹਾਲ , \nਕੇ ਸਾਰੇ ਆ ਜਾਓ , ਭੁੱਲਾਂ ਬਖ਼ਸ਼ਾ ਜਾਓ ॥"},"hi":{"t":"रहमता करदा ए","c":"रहमता करदा ए , झोलिया भरदा ए , \nपीरा दा पीर मेरा शाही फकीर , मेरा दर्शन बाबा है ।।\nएह वेखो रब है सच्चा , समझे न कोई बंदा , \nएह कट देंदा है पल विच चौरासी वाला फंदा , \nदेर नहीं लांदा है दुखडे मिटादा ऐ ।।\nजो आन पडा गुरु शरणी , कर देंदा मालोमाल , \nऐ लूट लो संगतो मौजा , मेरा दर्शन दीनदयाल , \nभरे भण्डारे ने , आखदे सारे ने ।।\nए दासन दास पुकारे मेरा दर्शन दीनदयाल , \nओ मेहरां दे साईयां कर नदरी नदर निहाल , \nके सारे आ जाओ , भुला बक्शा जाओ ।।"},"en":{"t":"Rehmta Krda Ae","c":"Rehmta Krda Ae"}},

	{"id":1768478475053,
	"pb":{"t":"ਪਾਦੇ ਖੈਰ ਫਕੀਰਾਂ ਨੂੰ","c":"ਪਾਦੇ ਖੈਰ ਫਕੀਰਾਂ ਨੂੰ , ਤੇਰੇ ਭਰੇ ਰਹਿਣ ਭੰਡਾਰੇ ॥ \nਸਿੱਧੀਆਂ ਕਰ ਤਕਦੀਰਾਂ ਨੂੰ , ਤੇਰੇ ਭਰੇ ਰਹਿਣ ਭੰਡਾਰੇ ॥ \nਮੈਂ ਸੁਣਿਆ ਹੈ ਦਰ ਤੇਰੇ ਤੋਂ , ਜੋ ਮੰਗੀਏ ਸੋ ਮਿਲਦਾ ॥ \nਸਾਗਰ ਵਿਚੋਂ ਬੂੰਦ ਜੋ ਨਿਕਲੇ , ਫਰਕ ਨਹੀਂ ਕੋਈ ਪੈਂਦਾ ॥ \nਰਿਸ਼ੀ ਮੁਨੀ ਤੇ ਦੇਵੀ ਦੇਵਤੇ ਪੂਜਨ ਤੇਰਾ ਡੇਰਾ ॥ \nਕਿਸਨੇ ਤੈਥੋਂ ਖੈਰ ਨ ਮੰਗੀ , ਉਹ ਫਰਿਸ਼ਤਾ ਕਿਹੜਾ ॥ \nਦੇਣਾ-ਦੇਣਾ ਹਰ ਕੋਈ ਆਖੇ ਬੜਾ ਹੈ ਮੁਸ਼ਕਿਲ ਦੇਣਾ ॥ \nਪਰ ਮੇਰੇ ' ਦਰਸਨ ' ਨੂੰ ਦੇ ਕੇ ਕਦੇ ਨ ਮਾਰਿਆ ਮੇਹਣਾ ॥ \nਸਭਨਾ ਦਾ ਤੂੰ ਪਾਲਣਹਾਰਾ , ਤੇਰੇ ਕੋਲੋਂ ਮੰਗਣਾ ॥ \nਧਨ ਦੌਲਤ ਨਹੀਂ ਮੰਗਦੇ ਦਾਤਿਆ , ਨਾਮ ਦਾ ਧਨ ਹੈ ਮੰਗਣਾ ॥"},"hi":{"t":"पादे खैर फकीरा नू","c":"पादे खैर फकीरा नू , तेरे भरे रहन भण्डारे , \nसिद्धियां कर तकदीरां नू , तेरे भरे रहन भण्डारे ।।\nमैं सुनया है दर तेरे तो , जो मंगिये सो मिलदा , \nसागर विचो बूँद जो निकले , फर्क नहीं कोई पैंदा ।।\nऋषि मुनि ते देवी देवते पूजन तेरा डेरा , \nकिसने तेथो खैर न मंगी , ओह फरिश्ता केहडा ।।\nदेना-देना हर कोई आखे बड़ा है मुश्किल देना , \nपर मेरे ' दर्शन ' न देके कदे न मारेया मेहणा ।।\nसबना दा तू पालनहारा , तेरे कोलो मंगना , \nधन दौलत नहीं मंगदे दातेया , नाम दा धन है मंगना ।।"},"en":{"t":"Paade Khair Fakira Nu ","c":"Paade Khair Fakira Nu"}},

	{"id":1768479246462,"audio":"audio/mainteripatang.mp3",
	"pb":{"t":"ਮੈਂ ਤੇਰੀ ਪਤੰਗ ਦਾਤਿਆ","c":"ਮੈਂ ਤੇਰੀ ਪਤੰਗ ਦਾਤਿਆ , ਤੇਰੇ ਹੱਥ ਡੋਰ ॥ \nਹੱਥੋਂ ਛੱਡ ਨ ਦੇਵੀਂ , ਲੁੱਟੇ ਨ ਕੋਈ ਹੋਰ ॥ \nਤੇਰੀ ਦਇਆ ਨਾਲ ਉੱਡਦੀ ਫਿਰਦੀ ਜਿਉਂ ਬਾਦਲ ਅਸਮਾਨੀ ॥ \nਤੇਰੇ ਨਾਮ ਵਿਚ ਮੈਂ ਤਾਂ ਦਾਤਿਆ , ਹੋ ਗਈ ਪ੍ਰੇਮ ਦੀਵਾਨੀ ॥ \nਤੂੰ ਹੈਂ ਮੇਰਾ ਚੰਦ ਦਾਤਿਆ , ਮੈਂ ਤੇਰੀ ਚਕੋਰ ॥ \nਅਸੀਂ ਚਾਰ ਚੌਰਾਸੀ ਵਾਲੀ ਜੋਨੀ ਕੋਲੋਂ ਬਚਾਵੀਂ ॥ \nਅਪਣੇ ਚਰਣਾਂ ਵਿਚ ਦਾਤਿਆ , ਬਿਨਤੀ ਮੇਰੀ ਲਗਾਵੀਂ ॥ \nਭਰੇ ਤੇਰੇ ਭੰਡਾਰੇ ਦਾਤਿਆ , ਖ਼ਾਲੀ ਨਾ ਤੂੰ ਮੋੜ ॥ \nਤੇਰੇ ਦਰ ਤੇ ਝੁਕਦੇ ਵੇਖੇ ਰਾਜੇ ਕਈ ਫਕੀਰ ॥ \nਮੇਰੀ ਵੀ ਇਹ ਗੱਲ ਸੁਣ ਦਾਤਿਆ ਤੇਰੇ ਨਾਲ ਪ੍ਰੀਤ ॥ \nਭਰੇ ਤੇਰੇ ਭੰਡਾਰੇ ਦਾਤਿਆ , ਖ਼ਾਲੀ ਨਾ ਤੂੰ ਮੋੜ ॥"},"hi":{"t":"मैं तेरी पतंग दातेया","c":"मैं तेरी पतंग दातेया , तेरे हथ डोर , \nहथ्थो छड न देवी , लूटे न कोई होर ।।\nतेरी दया नाल उडदी फिरदी ज्यो बदल असमानी , \nतेरे नाम विच मैं ता दातेया , हो गई प्रेम दीवानी ।।  \nतू हैं मेरा चन्द दातेया , मैं तेरी चकोर ।।\nअस्सी चार चौरासी वाली योनि कोलो बचावी , \nअपने चरणां विच दातेया , विनती मेरी लगावी , \nभरे तेरे भण्डारे दातेया, खाली ना तू मोड़ ।।\nतेरे दर ते झुकदे वेखे राजे कई फकीर , \nमेरी वी एह गल सुन दातेया तेरे नाल प्रीत , \nभरे तेरे भण्डारे दातेया, खाली न तू मोड़ ।।"},"en":{"t":"Mein Teri Patang Dateya","c":"Mein Teri Patang Dateya"}},

	{"id":1768479950512,
	"pb":{"t":"ਆ ਜਾਓ ਮਹਾਰਾਜ ਦੇਰ ਕਿਉਂ ਲਾਈ ਹੈ","c":"ਆ ਜਾਓ ਮਹਾਰਾਜ ਦੇਰ ਕਿਉਂ ਲਾਈ ਹੈ , \nਰੂਹ ਨਿਮਾਣੀ ਹੋਕੇ ਤੇਰੇ ਦਰ ਆਈ ਹੈ ॥ \nਇਸ ਪਾਪ ਦੀ ਨਗਰੀ ਅੰਦਰ , ਮੇਰਾ ਜਰਾ ਵੀ ਦਿਲ ਨਹੀਓਂ ਲਗਦਾ ॥ ਇਸ ਮਨ ਮੰਦਿਰ ਦੇ ਅੰਦਰ , ਤੇਰੇ ਨਾਮ ਦਾ ਦੀਪਕ ਜਗਦਾ , \nਕੇ ਜੋਤ ਜਗਾਈ ਐ ॥ \nਜਿਸ ਮਨ ਵਿਚ ਤੇਰਾ ਵਾਸਾ ਉਸ ਮਨ ਨੂੰ ਕਿਵੇਂ ਸਮਝਾਵਾਂ ॥ \nਇਕ ਤੇਰਾ ਦੁਆਰਾ ਛੱਡ ਕੇ , ਮੈਂ ਕਿਹੜੇ ਦੁਆਰੇ ਜਾਵਾਂ , \nਕੇ ਆਸ ਲਗਾਈ ਐ ॥ \nਰਾਤਾਂ ਦੇ ਗਿਣ-ਗਿਣ ਤਾਰੇ , ਦਿਨ ਰੋ-ਰੋ ਕੇ ਮੈਂ ਗੁਜ਼ਾਰਾਂ ॥ \nਇਕ ਤੇਰਾ ਪ੍ਰੇਮ ਸਤਾਵੇ , ਦੂਜੇ ਲੋਕੀਂ ਤਾਣੇ ਮਾਰੇ , \nਕੇ ਪ੍ਰੀਤ ਲਗਾਈ ਐ ॥ \nਮੈਂ ਢੂੰਢ ਲਿਆ ਜੱਗ ਸਾਰਾ , ਮੈਂਨੂੰ ਤੇਰੇ ਜਿਹਾ ਨਹੀਂ ਮਿਲਿਆ ॥ \nਜਦ ਦਰਸ਼ਨ ਤੇਰੇ ਕੀਤੇ , ਮੇਰਾ ਤਨ ਮਨ ਅੰਦਰੋਂ ਠਰਿਆ , \nਕੇ ਜਾਵਾਂ ਬਲਿਹਾਰੀ ਐ ॥"},"hi":{"t":"आ जाओ महाराज देर क्यो लाई है","c":"आ जाओ महाराज देर क्यो लाई है , \nरुह निमाणी होके तेरे दर आई है ।।\nइस पाप दी नगरी अन्दर , मेरा जरा वी दिल नहीयो लगदा ,\nइस मन मन्दिर दे अन्दर , तेरे नाम दा दीपक जगदा , \nके जोत जगाई ऐ ।।\nजिस मन विच तेरा वासा उस मन नू किवे समझावां , \nइक तेरा द्वारा छड के , मैं केहडे द्वारे जावां , \nके आस लगाई ए ।।\nरातां दे गिन-गिन तारे , दिन रो-रो के मैं गुजारां इक तेरा प्रेम सतावे , \nदूजे लोकी ताने मारे , के प्रीत लगाई ए ।।\nमैं ढूंढ लिया जग सारा , मैंनू तेरे जिहा नहीं मिलया , \nजद दर्शन तेरे कीते , मेरा तन मन अन्दरो ठरिया , \nके जावां बलिहारी ए ।।"},"en":{"t":"Aa Jaao Maharaj Der Kyo Laayi Hain","c":"Aa Jaao Maharaj Der Kyo Laayi Hain"}},

	{"id":1768480284689,
	"pb":{"t":"ਕੋਈ ਕਹੇ ਤੈਨੂੰ ਦਰਸ਼ਨ ਪਿਆਰਾ","c":"ਕੋਈ ਕਹੇ ਤੈਨੂੰ ਦਰਸ਼ਨ ਪਿਆਰਾ , ਕੋਈ ਕਹੇ ਮਹਾਰਾਜ , \nਮੈਂ ਕੀ ਆਖਾਂ ਮੇਰੇ ਦਾਤਾ , ਮੇਰੇ ਗਰੀਬ ਨਿਵਾਜ ॥ \nਗੋਰਾ ਮੁਖੜਾ ਤੇ ਅੱਖ ਮਸਤਾਨੀ , ਹੰਸਾ ਵਰਗੀ ਚਾਲ , \nਜਿਨ੍ਹਾਂ ਰਾਹਵਾਂ ਤੋਂ ਲੰਘ ਜਾਵੇ ਤੂੰ , ਸਜਦੇ ਕਰਨ ਹਜ਼ਾਰ ॥ \nਤੱਕ-ਤੱਕ ਤੇਰਾ ਰੂਪ ਇਲਾਹੀ , ਪਾਪੀ ਲੱਖਾਂ ਤਰਦੇ , \nਤੱਕ ਲਵੇ ਜਿਨੂੰ ਇਕ ਵਾਰੀ ਤੂੰ , ਤੇਰਾ ਹੋਕੇ ਮਰਦੇ ॥ \nਚੌਹੀਂ ਕੁੱਟੀ ਨਾਮ ਹੈ ਤੇਰਾ , ਦੁਨੀਆਂ ਦੇ ਦੁੱਖ ਹਰਦਾ , \nਨਾਮ ਤੇਰੇ ਦੀ ਓਟ ਜੋ ਲੈਂਦਾ ਭਵਸਾਗਰ ਤੋਂ ਤਰਦਾ ॥ \nਤੇਰੇ ਦਰਸ਼ਨ ਮਿਲੇ ਨਸੀਬਾਂ , ਮੈਂ ਗਰੀਬ ਨਿਮਾਣਾ , \nਤੇਰੀਆਂ ਤੂੰ ਹੀ ਜਾਣੇ ਪਿਆਰੇ , ਮੈਂ ਕੀ ਸਾਰ ਤੇਰੀ ਜਾਣਾ ॥ \nਲੱਖਾਂ ਤਰ ਗਏ , ਲੱਖਾਂ ਤਰਦੇ , ਲੱਖਾਂ ਨੇ ਤਰ ਜਾਣਾ , \nਲੈਣਾ ਉਹਨਾਂ ਤੇਰੇ ਕੋਲੋਂ ਜਿਨ੍ਹਾਂ ਨਾਮ ਧਿਆਉਣਾ ॥ \nਡੋਰੀ ਮੇਰੀ ਹੱਥ ਤੇਰੇ ਸਜਣਾ , ਤਾਰੇ ਜਾਂ ਨ ਤਾਰੇ ॥ \nਮੇਰੇ ਵਰਗੇ ਲੱਖਾਂ ਤੇਰੇ ਦਾਸ ਸਜਣ ਪਿਆਰੇ ॥ "},"hi":{"t":"कोई कहे तैनू दर्शन प्यारा","c":"कोई कहे तैनू दर्शन प्यारा , कोई कहे महाराज , \nमैं की आखां मेरे दाता , मेरे गरीब नवाज ।।\nगोरा मुखडा ते अख मस्तानी , हंसा वरगी चाल , \nजिनां राहवां तों लंघ जावे तू , सजदे करण हजार ।।\nतक-तक तेरा रुप इलाही , पापी लखां तरदे , \nतक लवे जिनू इक वारी तू , तेरा होके मरदे ।।\nचौही कुटी नाम है तेरा , दुनिया दे दुख हरदा , \nनाम तेरे दी ओट जो लेंदा भवसागर तो तरदां ।।\nतेरे दर्शन मिले नसीबां , मैं गरीब निमाणां , \nतेरियां तू ही जाने प्यारे , मैं की सार तेरी जाणां ।।\nलखां तर गए , लखां तरदे , लखां ने तर जाणा , \nलैणां ओहना तेरे कोलो जिनां नाम ध्यानां , डोरी मेरी हथ तेरे सजणां , \nतारे या न तारे , मेरे वरगे लखां तेरे दास सजन प्यारे ।।"},"en":{"t":"Koi Kahe Tenu Darshan Pyara","c":"Koi Kahe Tenu Darshan Pyara"}},

	{"id":1768480725436,
	"pb":{"t":"ਅੱਖਾਂ ਖੋਲ੍ਹਾਂ ਤੇ ਦੇਖਾਂ ਸੰਸਾਰ ਮਾਲਕਾ","c":"ਅੱਖਾਂ ਖੋਲ੍ਹਾਂ ਤੇ ਦੇਖਾਂ ਸੰਸਾਰ ਮਾਲਕਾ , ਬੰਦ ਕਰਾਂ ਤੇ ਤੁਹੀਓ ਮੇਰੇ ਨਾਲ ਮਾਲਕਾ ॥ \nਚਿੱਟਾ ਕੁੜਤਾ ਪਜਾਮਾ ਤੇ ਦਸਤਾਰ ਮਾਲਕਾ , ਸੋਹਣੀ ਲਗਦੀ ਹੈ ਸਾਨੂੰ ਤੇਰੀ ਚਾਲ ਮਾਲਕਾ ॥ \nਦੇ ਦੋ ਦਰਸ਼ਨ ਤੇ ਹੋਵਾਂ ਮੈਂ ਨਿਹਾਲ ਮਾਲਕਾ ॥ \nਲੋਕੀ ਕਹਿੰਦੇ ਨੇ ਗਮ ਐਥੇ ਮਿੱਟ ਜਾਵੰਦੇ , ਸਤਿਗੁਰੂ ਪਿਆਰੇ ਆਕੇ ਸਾਨੂੰ ਮਿਲ ਜਾਂਵਦੇ ॥ \nਦੇ ਦੋ ਦਰਸ਼ਨ ਤੇ ਹੋਵਾਂ ਮੈਂ ਨਿਹਾਲ ਮਾਲਕਾ ॥ \nਸਾਰੀ ਦੁਨੀਆ ਦਾ ਇਕੋ ਰਿਸ਼ਤੇਦਾਰ ਤੁਹੀਓਂ ਐ , \nਮੇਰੀ ਜ਼ਿੰਦਗੀ ਦਾ ਇਕੋ ਠੇਕੇਦਾਰ ਤੁਹੀਓਂ ਐ ॥ \nਕਰੋ ਕ੍ਰਿਪਾ ਤੇ ਹੋਵਾਂ ਮੈਂ ਨਿਹਾਲ ਮਾਲਕਾ ॥"},"hi":{"t":"अक्खां खोला ते देखा संसार मालका","c":"अक्खां खोला ते देखा संसार मालका , बन्द करां ते तुहियो मेरे नाल मालका ।।\nचिट्टा कुर्त्ता पाजमा ते दस्तार मालका , सोहनी लगदी है सानू तेरी चाल मालका \nदे दो दर्शन ते होवां में निहाल मालका ।।\nलोकी कहन्दे ने गम ऐथे मिट जावंदे , सतगुरु प्यारे आके सानू मिल जांवदे , \nदे दो दर्शन ते होवां मैं निहाल मालका ।।\nसारी दुनिया दा ईको रिश्तेदार तुहिआ ऐ , मेरी जिन्दगी दा ईको ठेकेदार तुहिआ ऐ \nकरो कृपा ते होवां मैं निहाल मालका ।।"},"en":{"t":"Akha Khola Te Dekha Sansar Malka","c":"Akha Khola Te Dekha Sansar Malka"}},

	{"id":1768481130987,
	"pb":{"t":"ਕਿਉਂ ਲੁਕ-ਲੁਕ ਪਾਪ ਕਮਾਨਾ ਐ","c":"ਕਿਉਂ ਲੁਕ-ਲੁਕ ਪਾਪ ਕਮਾਨਾ ਐ , ਉਹ ਸਭ ਕੁਝ ਜਾਣੇ , \nਦਰਸ਼ਨ ਦੇ ਖੇਲ ਨਿਰਾਲੇ ਨੇ , ਕੋਈ ਵਿਰਲਾ ਜਾਣੇ ॥ \nਮੈਂ ਸਭ ਕੁਝ ਅੱਖੀਂ ਵੇਖਿਆ ਕੀ ਹੋਈ ਕਹਾਣੀ ,\nਨ ਫਲ ਬੂਟੇ ਤੋਂ ਮੁੱਕਿਆ ਨ ਸੁੱਕੀ ਟਹਿਣੀ ,\nਕਈਆਂ ਨੇ ਗੁਰੂ ਲੱਭਿਆ , ਕਈ ਆਏ ਸਿਆਣੇ ॥ \nਕਈ ਰਿੱਧੀਆਂ ਸਿੱਧੀਆਂ ਵਾਲਿਆਂ ਬੜੇ ਜ਼ੋਰ ਲਗਾਏ , \nਕਈ ਹਾਂਡੀਆਂ ਛੱਡ-ਛੱਡ ਹਾਰ ਗਏ , ਕੋਈ ਪੇਸ਼ ਨ ਜਾਏ , \nਉਹ ਠਾਹ ਕੇ ਚਰਣੀਂ ਪੈ ਗਏ ਤੇ ਬਣੇ ਨਿਮਾਣੇ ॥ \nਉਹ ਪੀਰਾਂ ਦਾ ਵੀ ਹੈ ਬੱਚਿਆਂ ਨਾਲ ਬੱਚਾ ,\nਬੜੀ ਮੁਸ਼ਕਿਲ ਦੇ ਨਾਲ ਲੱਭਿਆ ਗੁਰੂ ਦਰਸ਼ਨ ਸੱਚਾ , \nਇਹ ਜਿਸ ਤੇ ਮਿਹਰਾਂ ਕਰ ਦੇਵੇ , ਇਹਨੂੰ ਉਹੀ ਪਛਾਣੇ ॥ \nਕਲਯੁਗ ਦੇ ਅੰਦਰ ਮੁੜ ਫੇਰ ਗੁਰੂ ਨਾਨਕ ਆਇਆ , \nਭਾਈ ਬਾਲੇ ਵਾਲੀ ਸਾਖੀ ਨੇ ਇਹ ਸੱਚ ਸੁਣਾਇਆ ,\nਉਸਨੇ ਸਭ ਕੁਝ ਅੱਖੀਂ ਵੇਖਿਆ ਕੀ ਹੋਈ ਕਹਾਣੀ ॥"},"hi":{"t":"क्यों लुक-लुक पाप कमाना ऐ","c":"क्यों लुक-लुक पाप कमाना ऐ , ओ सब कुछ जाने , \nदर्शन दे खेल निराले ने , कोई विरला जाने ।।\nमैं सब कुछ अखी बेखियाँ की होइ कहानी , \nन फल बूटे तो मुकया न सुकी टहनी , \nकईयां ने गुरु लभयां , कई आए सयाने ।।\nकई रिद्धियां सिद्धियां वालेया बडे जोर लगाए , \nकई हांड़िया छड-छड हार गये , कोई पेश न जाए , \nओह ठहं के चरणी पै गये ते वणे निमाणे ।।\nओ पीरा दावी है बच्चेया नाल बच्चा , \nबडी मुश्किल दे नाल लभया गुरु दर्शन सच्चा , \nऐ जिस ते मेहरां कर देवे , ऐनू ओही पछाने ।।\nकलयुग दे अन्दर मुड फेर गुरु नानक आया , \nभई बाले वाली साखी ने एह सच सुनाया , \nउसने सब कुछ अखी वेखियां की होई कहानी ।।"},"en":{"t":"Kyo Luk-Luk Paap Kamana Hain","c":"Kyo Luk-Luk Paap Kamana Hain"}},

	{"id":1768494911158,
	"pb":{"t":"ਤਰ ਗਏ ਲੱਖਾਂ ਜਿਨ੍ਹਾਂ ਤੈਨੂੰ ਤੱਕਿਆ","c":"ਤਰ ਗਏ ਲੱਖਾਂ ਜਿਨ੍ਹਾਂ ਤੈਨੂੰ ਤੱਕਿਆ , ਧੰਨ ਗੁਰੂ ਦਰਸ਼ਨ ਨਾਮੁ ਜਪਿਆ ॥ ਆਉਂਦੇ ਨੇ ਜਿਹੜੇ ਦਰ ਤੇ ਮਰੀਜ਼ , ਬਣ ਜਾਂਦੇ ਨੇ ਉਹ ਤੇਰੇ ਮੁਰੀਦ , \nਮੁੱਕ ਜਾਂਦੇ ਦੁੱਖ ਚਿਹਰਾ ਖਿੜ-ਖਿੜ ਹੱਸਿਆ ॥ \nਕੱਟ ਦੇਵੇਂ ਤੂੰ ਦੁੱਖਾਂ ਦੀ ਜ਼ੰਜੀਰ , ਬਣ ਜਾਂਦੇ ਨੇ ਵਿਗੜੇ ਨਸੀਬ , \nਲਿਆ ਜਿਨ੍ਹਾਂ ਸੌਦਾ ਤੈਥੋਂ ਉਹਨਾਂ ਖੱਟਿਆ ॥ \nਮਹਿਮਾ ਤੇਰੀ ਕੀ ਦੱਸੀਏ , ਦਿਲ ਵਿਚ ਮੂਰਤ ਤੇਰੀ ਵੱਸੀ ਹੈ , \nਨੈਣਾਂ ਚ ਪਿਆਰ ਬੁੱਲ੍ਹੀਂ ਦਰਸਨ ਰਟਿਆ ॥ \nਰੂਪ ਵਟਾ ਕੇ ਰੱਬ ਧਰਤੀ ਤੇ ਆਇਆ , ਕੋਈ ਕਹੇ ਅੱਲ੍ਹਾ ਤੈਨੂੰ ਕੋਈ ਖੁਦਾਇਆ , \nਰੂਪ ਤੇਰੇ ਲੱਖਾਂ ਇਨ੍ਹਾਂ ਅੱਖਾਂ ਤੱਕਿਆ ॥ \nਮੁਖੜਾ ਨਿਰਾਲਾ ਚਿਹਰਾ ਚਮਕਾਂ ਮਾਰੇ , ਦੇਖ-ਦੇਖ ਮਦ ਭਰੇ ਨੈਣ ਕਜਰਾਰੇ ,\nਨੈਣਾਂ ਦੀ ਕਟਾਰੀ ਵਿਚ ਦਾਸ ਫਸਿਆ ॥"},"hi":{"t":"तर गये लखां जिना तैनू तकया","c":"तर गये लखां जिना तैनू तकया , धन गुरु दर्शन नाम जपया ।।\nआन्दे ने जेहड़े दर ते मरीज , बन जान्दे ने ओह तेरे मुरीद ,\nमुक जांदे दुःख चेहरा खिल-खिल हसिया ।।\nकट देवे तू दुःखा दी जंजीर , बन जांदे ने बिगडे नसीब , \nलिया जिनां सौदा तैथो ओहना खटिया ।।\nमहिमा तेरी की दसीये , दिल विच मूरत तेरी वसी है , \nनैनां च प्यार बुल्लां दर्शन रटया ।।\nरुप वटा के रब धरती ते आया , कोई कहे अल्लां तैनू कोई खुदाया , \nरुप तेरे लखां ऐना अखां तकया ।।\nमुखडा निरालां चेहरा चमका मारे , देख-देख मद भरे नैन कजरारे ,\nनैना दी कटारी विच दास फसिया ।।"},"en":{"t":"Tar Gaya Lakha Jinna Tennu Takaya","c":"Tar Gaya Lakha Jinna Tennu Takaya"}},

	{"id":1768495528046,
	"pb":{"t":"ਗੁਰੂ ਚਰਣਾਂ ਦੇ ਵਿਚ ਮੱਥਾ ਜਦੋਂ ਟੇਕਿਆ","c":"ਗੁਰੂ ਚਰਣਾਂ ਦੇ ਵਿਚ ਮੱਥਾ ਜਦੋਂ ਟੇਕਿਆ , ਨੂਰੀ-ਨੂਰੀ ਅੱਖਾਂ ਨਾਲ ਗੁਰਾਂ ਮੈਨੂੰ ਵੇਖਿਆ , \nਤਨੁ ਮਨੁ ਮੇਰਾ ਠਰਿਆ ਜੀ , ਮੈਨੂੰ ਨਸ਼ਾ ਨਾਮ ਦਾ ਚੜ੍ਹਿਆ ਜੀ ॥ \nਭੋਲਾ ਭਾਲਾ ਮੁਖੜਾ ਤੇ ਜਲਵਾ ਨੂਰਾਨੀ , ਦਰਸ਼ਨ ਕਰਕੇ ਮੈਂ ਹੋ ਗਈ ਦੀਵਾਨੀ , \nਰੂਪ ਨ ਜਾਏ ਝੱਲਿਆ ਜੀ ॥ \nਸੋਹਣਾ ਮਨ ਮੋਹਣਾ ਮੇਰੇ ਦਿਲ ਵਿਚ ਵੱਸਦਾ , ਦਿਲ ਲੁੱਟ ਲੈਂਦਾ ਜਦੋਂ ਹੌਲੀ-ਹੌਲੀ ਹੱਸਦਾ , \nਕੋਈ ਐਸਾ ਜਾਦੂ ਚੱਲਿਆ ਜੀ ॥ \nਨਾਮ ਜਪਣ ਦੀ ਰੀਤ ਸਿਖਾਵੇ , ਸੁਰਤਿ ਸਬਦ ਦੇ ਨਾਲੇ ਮਿਲਾਵੇ , \nਉਹ ਭਵਸਾਗਰ ਤੋਂ ਤਰਿਆ ਜੀ ॥ \nਵੇਖ ਗੁਰਾਂ ਦੀ ਉੱਚੀ ਕਰਨੀ , ਦਾਸਨ ਦਾਸੀ ਡਿੱਗ ਪਈ ਸ਼ਰਣੀ , \nਗੁਰਾਂ ਹੱਥ ਮਿਹਰ ਦਾ ਧਰਿਆ ਜੀ ॥"},"hi":{"t":"गुरु चरणां दे विच मत्था जदो टेकिया","c":"गुरु चरणां दे विच मत्था जदो टेकिया , नूरी-नूरी अखां नाल गुरां मैनू वेखिया , \nतन मन मेरा ठरिया जी , मैनू नशा नाम दा चड़िया जी ।।\nभोला भाला मुखडा ते जलवा नुरानी , दर्शन करके मैं हो गई दीवानी , \nरुप न जाये झलियां जी ।।\nसोहना मन मोहना मेरे दिल विच वसदां , दिल लुट लैंदा जदो होली होली हसंदा , \nकोई ऐसा जादू चलिया जीं ।।\nनाम जपन दी रीत सिखावे , सुरत शब्द दे नाले मिलावे , \nओह भवसागर तो तरिया जी ।।\nवेख गुरां दी ऊँची करनी , दासन दासी डिग पई शरणी , \nगुरां हथ मेहर दा धरिया जी ।।"},"en":{"t":"Guru Charna De Vich","c":"Guru Charna De Vich"}},

	{"id":1768496456945,
	"pb":{"t":"ਚਿੱਠੀ ਪਾਕੇ ਸੁਣ ਮੇਰੇ ਦਾਤਿਆ","c":"ਚਿੱਠੀ ਪਾਕੇ ਸੁਣ ਮੇਰੇ ਦਾਤਿਆ , ਦਰ ਤੇ ਤੂੰ ਅਪਣੇ ਬੁਲਾਈ ਜਾ , \nਲੋਕੀ ਕੁਝ ਵੀ ਕਹਿਣ , ਭਾਵੇਂ ਕਮਲੀ ਕਹਿਣ , \nਦਰ ਤੇ ਤੂੰ ਅਪਣੇ ਬੁਲਾਈ ਜਾ ॥ \nਮਹਿਮਾ ਤੇਰੀ ਸੁਣ ਕੇ ਜੋ ਦਰ ਤੇਰੇ ਆਂਦਾ ਐ , ਦੁੱਖਾਂ ਤੋਂ ਛੁੱਟ ਕੇ , \nਪਰਮ ਸੁਖ ਪਾਂਦਾ ਐ , ਦਾਤਾ ਦਰਸ ਦਿਖਾ ਕੇ , \nਖ਼ਾਲੀ ਝੋਲੀ ਖੈਰ ਪਾਕੇ , ਸਦਾ ਦਰ ਤੇ ਤੂੰ ਅਪਣੇ ਬੁਲਾਈ ਜਾ ॥ \nਅਰਜ ਕਰਾਂ ਵੇ ਦਾਤਾ ਦੋਵੇਂ ਹੱਥ ਜੋੜ ਕੇ , ਵਿਗੜੀ ਬਣਾ ਦੇ ਮੇਰੀ , \nਮੋਹ ਮਾਇਆ ਤੋੜ ਕੇ , ਮੇਰੀ ਕੱਟ ਦੇ ਚੌਰਾਸੀ , \nਨਾਲੇ ਜਮਾਂ ਵਾਲੀ ਫਾਂਸੀ , ਸਦਾ ਦਰ ਤੇ ਤੂੰ ਅਪਣੇ ਬੁਲਾਈ ਜਾ ॥ \nਤੇਰੀ ਮੈਂ ਪਤੰਗ , ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ਵੇ , \nਹੱਥੋਂ ਨ ਛੱਡੀਂ , ਲੁੱਟੇ ਨ ਕੋਈ ਹੋਰ ਵੇ , \nਤੈਨੂੰ ਵਾਸਤੇ ਮੈਂ ਪਾਵਾਂ , ਤੇਰੇ ਤਰਲੇ ਮੈਂ ਪਾਵਾਂ , \nਮੇਰੀ ਚਰਣਾਂ ਚ ਬਿਰਤੀ ਲਗਾਈ ਜਾ ॥ \nਮੇਰੀ ਜਹੀ ਲੱਖਾਂ , ਤੇਰੇ ਜਿਹਾ ਨ ਕੋਈ ਹੋਰ ਵੇ , \nਚਰਣਾਂ ਚ ਰੱਖੀਂ ਦਾਤਾ , ਦੇਵੀਂ ਨ ਵਿਛੋੜ ਵੇ ,\nਤੇਰੇ ਦਰ ਤੇ ਮੈਂ ਆਵਾਂ , ਆਕੇ ਸ਼ੀਸ਼ ਝੁਕਾਵਾਂ , \nਮੇਰੀ ਚਰਣਾਂ ਚ ਹਾਜ਼ਰੀ ਲਗਾਈ ਜਾ ॥"},"hi":{"t":"चिठी पाके सुन मेरे दातिया","c":"चिठी पाके सुन मेरे दातिया , दर ते तू अपने बुलाई जा , \nलोकी कुछ वी कहन , भावें कमली कहन , \nदर ते तू अपने बुलाई जा ।।\nमहमा तेरी सुन के जो दर तेरे आँदा ऐ , दुखा तो छुट के , \nपरम सुख पांदा ऐ , दाता दरस दिखा के , \nखाली झोली खैर पाके , सदा दर ते तू अपने बुलाई जा ।।\nअरज करा वे दाता दोवें हथ जोड़ के , बिगड़ी बना दे मेरी , \nमोह माया तोड़ के , मेरी कट दे चौरासी , \nनाले जमा बाली फांसी , सदा दर ते तू अपने बुलाई जा ।।\nतेरी में पतंग , दाता तेरे हथ डोर वे , \nहथों न छड़ी , लुटै न कोई होर वे , \nतैन वासले मैं पावाँ , तेरे तरले में पावाँ , \nमेरी चरणाँ च बिरती लगाई जा ।।\nमेरी जही लखाँ , तेरे जेहा न कोई होर वे , \nचरणा च रखी दाता , देवी न बिछोड़ वे , \nतेरे दर ते मैं आवाँ , आके शीश झुकावा , \nमेरी चरणों च हाजरी लगाई जा ।।"},"en":{"t":"Chithi Pake Sun Mere Dateya","c":"Chithi Pake Sun Mere Dateya"}},

	{"id":1768496925570,
	"pb":{"t":"ਮੰਗਤੇ ਹਾਂ ਤੇਰੇ ਅਸਾਂ ਤੇਰੇ ਕੋਲੋਂ ਮੰਗਣਾ","c":"ਮੰਗਤੇ ਹਾਂ ਤੇਰੇ ਅਸਾਂ ਤੇਰੇ ਕੋਲੋਂ ਮੰਗਣਾ , \nਝੋਲੀ ਚ ਪਾਦੇ ਤੂੰ ਖੈਰ , ਸਾਰਾ ਜੱਗ ਵੇਖਿਆ ਪਰ ਕਿਤੋਂ ਵੀ ਨ ਮਿਲਿਆ ,\nਮੈਨੂੰ ਤੇਰੇ ਜਿਹਾ ਪਿਆਰ ਦਰਸ਼ਨਾ , ਵੇ ਦਰਸ਼ਨਾ , ਸੁਣ ਦਰਸ਼ਨਾ ॥ \nਅਪਣੇ ਬੇਗਾਨੇ ਹੋਏ ਵੈਰੀ ਜ਼ਮਾਨੇ ਹੋਏ , ਬਣਿਆ ਨ ਕੋਈ ਹਮਰਾਜ਼ , \nਦਿਲ ਵਾਲਾ ਦੁਖੜਾ ਵਧਦਾ ਜਾਵੇ , ਹਾਲ ਹੋਇਆ ਬੇਹਾਲ ॥ \nਨਜ਼ਰਾਂ ਚੁਰਾ ਕੇ ਮੇਰੇ ਕੋਲੋਂ-ਕੋਲੋਂ ਲੰਘ ਜਾਂਦੇ , ਕੀਤਾ ਜਿਨ੍ਹਾਂ ਤੇ ਮੈਂ ਮਾਣ ,\nਆਸਾਂ ਦੀਆਂ ਬੇੜੀਆਂ ਨੂੰ ਲਹਿਰਾਂ ਵਿਚ ਡੋਬ ਦਿੱਤਾ , ਅਪਣਿਆਂ ਕੀਤਾ ਇਹ ਵਾਰ ॥ \nਜੱਗ ਭਾਵੇਂ ਰੁੱਸ ਜਾਵੇ , ਜਿੰਦ ਭਾਵੇਂ ਲੁੱਟ ਜਾਵੇ , \nਰੁੱਸੀਂ ਨ ਮੇਰੀ ਸਰਕਾਰ , ਨਿਓਟਿਆਂ ਦੀ ਓਟ ਤੂੰ ਨਿਮਾਣੀਆਂ ਦਾ ਮਾਣ , \nਖੁੱਲ੍ਹੇ ਰੱਖੀਂ ਦਰਬਾਰ ॥"},"hi":{"t":"मंगते हा तेरे असा तेरे कोलो मंगना","c":"मंगते हा तेरे असा तेरे कोलो मंगना , \nझोली च पादे तू खैर , सारा जग वेखिया पर कितो वी न मिलया ,\nमैनू तेरें जिहा प्यार दर्शना , वे दर्शाना , सुन दर्शना ।।\nअपने बैगाने होये वैरी जमाने होये , बनया न कोई हमराज , \nदिल वाला दुखड़ा वधदा जावे , हाल होया बेहाल ।।\nनजरां चुरा के मेरे कोलो-कोलो लंघ जांदे , कीता जिन्हां ते मै माण ,\nआसा दिया बेड़िया नू लहरा विच डोब दिता , अपनियां कीता एह वार ।।\nजग भावे रुसं जावे , जिंद भावे लुट जावे , \nरुसी न मेरी सरकार , निओटियां दी आटे तू निमाणीयाँ दा मान , खुले रखी दरबार ।।"},"en":{"t":"Mangte Haan Tere Assa","c":"Mangte Haan Tere Assa"}},

	{"id":1768497637587,
	"pb":{"t":"ਲਾ ਦੇ ਦਾਤਿਆ ਅਪਣੇ ਨਾਮ ਵਾਲੀ ਮਹਿੰਦੀ","c":"ਲਾ ਦੇ ਦਾਤਿਆ ਅਪਣੇ ਨਾਮ ਵਾਲੀ ਮਹਿੰਦੀ , ਨਾਮ ਵਾਲੀ ਮਹਿੰਦੀ ਜਿਹੜੀ ਕਦੇ ਵੀ ਨ ਲਹਿੰਦੀ ॥ \nਏਹ ਮਹਿੰਦੀ ਨਹੀਂ ਮਿਲਦੀ ਬਾਜ਼ਾਰੋਂ , ਨਹੀਂ ਮਿਲਦੀ ਏਹ ਲੱਖਾਂ ਤੇ ਹਜ਼ਾਰਾਂ ,\nਕਿਸਮਤ ਵਾਲੇ ਲਾਂਦੇ , ਤੇਰੇ ਨਾਮ ਵਾਲੀ ਮਹਿੰਦੀ ॥ \nਇਸ ਮਹਿੰਦੀ ਦੀ ਚਮਕ ਅਨੋਖੀ , ਮਿਲਦੀ ਨਹੀਂ ਹੈ ਸਭ ਨੂੰ ਸੋਖੀ , \nਜਾਨ ਗਵਾਨੀ ਪੈਂਦੀ ॥ \nਏਹ ਮਹਿੰਦੀ ਤੇਰੇ ਭਗਤਾਂ ਲਗਾਈ , ਬਣ ਗਏ ਤੇਰੇ ਨਾਮ ਦੇ ਸੋਦਾਈ , \nਚੜ੍ਹਿਆ ਰੰਗ ਸਵਾਈ ॥ \nਏਹ ਮਹਿੰਦੀ ਦਾਤਾ ਮੈਨੂੰ ਵੀ ਲਾਦੇ , ਨਾਮ ਅਪਣੇ ਦਾ ਰੰਗ ਚੜ੍ਹਾ ਦੇ , \nਇਕ ਵਾਰੀ ਚੜ੍ਹੇ , ਤੇ ਫਿਰ ਨ ਉਤਰੇ ॥"},"hi":{"t":"ला दे दातेया अपने नाम वाली मेंहदी","c":"ला दे दातेया अपने नाम वाली मेंहदी , नाम वाली मेंहदी जेहड़ी कदे वी न लहदी ।।\nएह मेंहदी नहीं मिलदी बाजारो , नही मिलती एह लखां ते हजारां ,\nकिस्मत वाले लांदे , तेरे नाम वाली मेंहदी ।।\nइस मेंहदी दी चमक अनोखी , मिलदी नहीं है सब नू सोखी , \nजान गवानी पैंदीं ।।\nएह मेंहदी तेरे भगतां लगाई , बन गये तेरे नाम दे सोदाई , \nचड़या रंग स्वाई ।।\nएह मेंहदी दाता मैनू वी लादे , नाम अपने दा रंग चढा दे , \nइक वारी चढे , ते फिर न उतरे ।।"},"en":{"t":"Laade Dateya Apne Naam Vali Mehndi","c":"Laade Dateya Apne Naam Vali Mehndi"}},

	{"id":1768497987533,
	"pb":{"t":"ਸਾਰੇ ਜਹਾਂ ਕੇ ਮਾਲਿਕ","c":"ਸਾਰੇ ਜਹਾਂ ਕੇ ਮਾਲਿਕ , ਤੇਰਾ ਹੀ ਆਸਰਾ ਹੈ , \nਰਾਜ਼ੀ ਹੈਂ ਹਮ ਉਸੀ ਮੇਂ , ਜਿਸਮੇਂ ਤੇਰੀ ਰਜ਼ਾ ਹੈ ॥ \nਹਮ ਕਿਆ ਬਤਾਏਂ ਤੁਝਕੋ , ਸਭ ਕੁਛ ਤੁਝੇ ਖ਼ਬਰ ਹੈ , \nਹਰ ਹਾਲ ਮੇਂ ਹਮਾਰੀ , ਤੇਰੀ ਤਰਫ ਨਜ਼ਰ ਹੈ , \nਕਿਸਮਤ ਹੈ ਵੋ ਹਮਾਰੀ , ਜੋ ਤੇਰਾ ਫੈਸਲਾ ਹੈ ॥ \nਹਾਥੋਂ ਕੋ ਹਮ ਦੁਆ ਕੀ ਖ਼ਾਤਿਰ ਮੇਂ ਲਾਏਂ ਕੈਸੇ , \nਸਜਦੇ ਮੇਂ ਤੇਰੇ ਆਕਰ , ਸਿਰ ਕੋ ਝੁਕਾਏਂ ਕੈਸੇ , \nਮਜਬੂਰੀਆਂ ਹਮਾਰੀ , ਸਭ ਤੂ ਹੀ ਜਾਨਤਾ ਹੈ ॥ \nਰੋਕਰ ਕਟੇ ਯਾ ਹੰਸਕਰ ਕਟਤੀ ਹੈ ਜ਼ਿੰਦਗਾਨੀ , \nਤੂ ਗ਼ਮ ਦੇ ਯਾ ਖ਼ੁਸ਼ੀ ਦੇ , ਸਭ ਤੇਰੀ ਮਿਹਰਬਾਨੀ , \nਤੇਰੀ ਖ਼ੁਸ਼ੀ ਸਮਝਕਰ , ਸਭ ਗ਼ਮ ਭੁਲਾ ਦਿਯਾ ਹੈ ॥ \nਦੁਨੀਆ ਬਨਾਕੇ ਮਾਲਿਕ ਕਹਾਂ ਛਿਪਾ ਹੈ , \nਆਤਾ ਨਹੀਂ ਨਜ਼ਰ ਤੂ ਬਸ ਏਕ ਯਹੀ ਗਿਲਾ ਹੈ , \nਭੇਜਾ ਹੈ ਇਸ ਜਹਾਂ ਮੇਂ ਜੋ ਤੇਰਾ ਸ਼ੁਕਰੀਆ ਹੈ ॥"},"hi":{"t":"सारे जहाँ के मालिक","c":"सारे जहाँ के मालिक , तेरा ही आसरा है , \nराजी है हम उसी में , जिसमें तेरी रजा है ।।\nहम क्या बताये तुझको , सब कुछ तुझे खंबर है , \nहर हाल में हमारी , तेरी तरफ नजर है , \nकिस्मत है वो हमारी , जो तेरा फैसला है ।।\nहाथो को हम दुआ की खातिर में लाये कैसे , \nसजदे मे तेरे आकर , सिर को झुकाये कैसे , \nमजबूरियाँ हमारी , सब तू ही जानता है ।।\nरोकर कटे या हंसकर कटती है जिन्दगानी , \nतू गम दे या खुशी दे , सब तेरी मेहरबानी , \nतेरी खुशी समझकर , सब गम भुला दिया है ।।\nदुनियाँ बनाके मालिक कहाँ छिपा है , \nआता नही नजर तू बस एक यही गिला है , \nभेजा है इस जहाँ में जो तेरा शुक्रिया है ।।"},"en":{"t":"Saare Jahan Ke Maalik","c":"Saare Jahan Ke Maalik"}},

	{"id":1768498472403,
	"pb":{"t":"ਤੇਰਾ ਨਾਮੁ ਹਰੀ ਹਰਿ ਪੂਰਾ","c":"ਤੇਰਾ ਨਾਮੁ ਹਰੀ ਹਰਿ ਪੂਰਾ , ਦੀਜੋ ਦਾਨੁ ਸਾਧੂ ਕੀ ਧੂੜਾ ॥ \nਸਤਿਗੁਰੂ ਮੇਰੇ ਗੁਰੂ ਨਾਨਕ ਸਾਈਂ , \nਗੁਰੂ ਨਾਰਾਇਣ ਸਤਿਗੁਰੂ ਦੀਨ ਕੇ ਦਾਤਾ ਜੀਉ ॥ \nਆਪਣੇ ਭਗਤੋਂ ਕੋ ਦੀਜੈ ਵਡਿਆਈ , ਸਚੁ ਅਟਲ ਨਿਧਾਨੁ ਕਮਾਈ , \nਸਚੁ ਸਾਹਿਬ ਸੰਗਿ ਹੋਵੋ ਸਹਾਈ ॥ \nਜਨ ਦਰਸਨ ਕੀ ਸੁਣੋ ਅਰਜੋਈ , ਬਿਨੁ ਨਾਮੈ ਨਾ ਮੁਕਤਿ ਪਾਵੈ ਕੋਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरा नाम हरी हरि पूरा","c":"तेरा नाम हरी हरि पूरा , दीजो दान साधू की धूड़ा ।।\nसतिगुरू मेरे गुरू नानक सांई , \nगुरू नारायण सतिगुरू दीन के दाता जीओ ।। \nआपने भगतों को दीजै वडियाई , सच अटल निधान कमाई , \nसच साहिब संग होवो सहाई ।।\nजन दर्शन की सुणो अरजोई , बिन नामै ना मुक्त पावै कोई ।।\n( यकीन )"},"en":{"t":"Tera Naam Hari Har Poora","c":"Tera Naam Hari Har Poora"}},

	{"id":1768498892863,
	"pb":{"t":"ਤੇਰੇ ਆਸ਼ਿਕਾਂ ਦੇ ਇਸ਼ਕ ਅਵੱਲੇ ਨੇ","c":"ਤੇਰੇ ਤੋਲ ਤਰਾਜ਼ੀ ਤੋਂ ਲੈ ਕੇ ਸ਼ਪਥ ਤਲਵਾਰ ਦੀ ਨੋਕ ਤਕ , \nਤੇਜ਼ ਧਾਰਾਂ ਆਰਿਆਂ ਦੀ , ਰੇਤਾਂ ਤੱਤੀ ਪਵਾਈਆਂ ਤੇਰੀ ਖ਼ਾਤਿਰ ॥ \nਤੇਰੀ ਸੋਚ ਵੇ ਸਦਕੇ , ਉਹਨਾਂ ਚੁੰਮੀਆਂ ਸੂਲੀਆਂ , \nਜਿਨ੍ਹਾਂ ਕਿੱਲ ਕੰਨਾਂ ਚ ਠੁਕਵਾਏ ਤੇਰੀ ਖ਼ਾਤਿਰ ॥ \nਤੇਰੇ ਆਸ਼ਿਕਾਂ ਦੇ ਇਸ਼ਕ ਅਵੱਲੇ ਨੇ , ਜ਼ਹਰ ਪਿਆਲੇ ਪੀਤੇ ਤੇਰੇ ਇਸ਼ਕ ਦੀ ਖ਼ਾਤਿਰ ॥ \nਜਿਸ ਸਾਂਝ ਨੂੰ ਤੂੰ ਕਦੇ ਜਗਾਇਆ ਸੀ , ਦਰਸਨ ਉਹ ਉਦੋਂ ਦੀ ਬੁੱਝੀ ਏ ਹੁਣ ਤਕ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तेरे आशिकां दे इश्क अव्वले ने","c":"तेरे तोल तराजी तों लैके शपथ तलवार दी नोक तक , \nतेज धारां आरेआं दी , रेतां तत्ती पवाईआं तेरी खातिर ।।\nतेरी सोच वे सदके , उहनां चुम्मी सूलीआं , \nजिहनां किल्ल कन्नां च ठुकवाये तेरी खातिर ।।\nतेरे आशिकां दे इश्क अव्वले ने , ज़हर पिआले पीते तेरे इश्क दी खातिर ।।\nजिस सांझ नूँ तूं कदे जगाया सी , दर्शन ओह उदों दी बुझी ए हुण तक ।।\n( यकीन )"},"en":{"t":"Tere Aashiqa De Ishq Avalle Ne","c":"Tere Aashiqa De Ishq Avalle Ne\nTere Tol Taraaji To Laike"}},

	{"id":1768499317862,
	"pb":{"t":"ਤਾਰ ਨਾਲ ਤਾਰ ਨੂੰ ਮਿਲਾਕੇ ਵੇਖ ਲੈ ","c":"ਤਾਰ ਨਾਲ ਤਾਰ ਨੂੰ ਮਿਲਾਕੇ ਵੇਖ ਲੈ , \nਆਵੇਗਾ ਜਵਾਬ ਤਾਰ ਪਾਕੇ ਵੇਖ ਲੈ ,\n\nਤਾਰ ਪਾਈ ਮੀਰਾ ਨੇ ਜਵਾਬ ਆਇਆ ਸੀ , \nਨਾਗ ਵਿਚੋਂ ਸ਼ਿਆਮ ਦਾ ਦੀਦਾਰ ਪਾਇਆ ਸੀ , \nਮੀਰਾ ਵਾਲੀ ਲਗਨ ਲਗਾ ਕੇ ਵੇਖ ਲੈ , \nਆਵੇਗਾ ਜਵਾਬ...\n\nਤਾਰ ਪਾਈ ਧੰਨੇ ਨੇ ਜਵਾਬ ਆਇਆ ਸੀ , \nਹਲ ਵੀ ਚਲਾਏ ਨਾਲ ਭੋਗ ਲਗਾਇਆ ਸੀ , \nਧੰਨੇ ਵਾਂਗੂ ਭੋਗ ਤੂੰ ਲਗਾ ਕੇ ਵੇਖ ਲੈ , \nਆਵੇਗਾ ਜਵਾਬ...\n\nਤਾਰ ਪਾਈ ਦ੍ਰੋਪਤੀ ਨੇ ਜਵਾਬ ਆਇਆ ਸੀ , \nਸਾੜੀਆਂ ਦੇ ਢੇਰ ਸਭਾ ਵਿਚ ਲਾਇਆ ਸੀ , \nਦ੍ਰੋਪਤੀ ਦੇ ਵਾਂਗ ਆਵਾਜ਼ ਲਾਕੇ ਵੇਖ ਲੈ , \nਆਵੇਗਾ ਜਵਾਬ...\n\nਸੱਚੇ ਦਿਲ ਨਾਲ ਜਿਹੜਾ ਤਾਰ ਪਾਏਗਾ , \nਕਹਿੰਦੇ ਨੇ ਜਵਾਬ ਉਸ ਵੇਲੇ ਆਏਗਾ , \nਇਕ ਵਾਰੀ ਤੂੰ ਵੀ ਅਜ਼ਮਾ ਕੇ ਵੇਖ ਲੈ , \nਆਵੇਗਾ ਜਵਾਬ..."},"hi":{"t":"तार नाल तार नु मिलाके वेख ले","c":"तार नाल तार नु मिलाके वेख ले ,\nआवेगा जवाब तार पाके वेख ले ,\n\nतार पाई मीरा ने जवाब आया सी ,\nनाग विचो श्याम दा दिदार पाया सी ,\nमीरा वाली लग्न लगा के वेख ले ,\nआवेगा जवाब....\n\nतार पाई धने ने जवाब आया सी ,\nहल भी चलाये नाल भोग लगाया सी ,\nधने वंगु भोग तू लगा के देख ले ,\nआवेगा जवाब....\n\nतार पाई द्रौप्ती ने जवाब आया सी ,\nसाड़िया दे डेरा सबा विच लाया सी ,\nद्रोपती दे वांग आवाज लाके देख ले ,\nआवेगा जवाब....\n\nसचे दिल नाल जेह्डा तार पायेगा ,\nकहंदे ने जवाब उस वेले आएगा ,\nइक वारी तू भी आजमा के देख ले ,\nआवेगा जवाब...."},"en":{"t":"Taar Naal Taar Nu Milake Vekhle ","c":"Taar Naal Taar Nu Milake Vekhle "}},
	
	{"id":1768500604684,
	"pb":{"t":"ਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਐ","c":"ਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਐ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਏਹਨੂੰ ਸਮਝਾਓ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ ...\n\nਬਾਰ ਬਾਰ ਮੋੜਾਂ ਏਹਨੂੰ ਏ ਨਹੀਂਓ ਮੁੜਦਾ , \nਦਾਤਾ ਤੇਰੇ ਨਾਮੁ ਨਾਲ ਏਹ ਨਹੀਂਓ ਜੁੜਦਾ , \nਏਹਨੂੰ ਸੰਗਲੀ ਪਾਓ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਐ ...\n\nਮਨੁ ਰਾਮ ਰਾਮ ਕਰੇ ਐਸਾ ਏਹਨੂੰ ਕਰ ਦੋ , \nਨਾਮ ਦੀ ਖੁਮਾਰੀ ਹੁਣ ਨਸ ਨਸ ਭਰ ਦੋ , \nਏਹਨੂੰ ਨਾਮੁ ਜਪਾਵੋ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਏਹਨੂੰ ਕੀਰਤਨ ਚ ਲਾਵੋ ਜੀ , \nਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਜੀ ...\n\nਮਨੁ ਕਾਮੁ ਕ੍ਰੋਧੁ ਅਹੰਕਾਰੁ ਮੋਹੁ ਕਰਦਾ , \nਗੰਦੀ ਮੰਦੀ ਸੋਚ ਵਿਚ ਰੋਜ਼ ਪਿਆ ਮਰਦਾ , \nਗੁਰੁ ਬਾਣੀ ਸੁਣਾਓ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਜੀ ...\n\nਨਿੰਦਿਆ ਤੇ ਚੁਗਲੀ ਕਰਦਾ ਬਥੇਰੀ ਐ , \nਕਹਿਣ ਨੂੰ ਐ ਮੇਰਾ ਪਰ ਮੰਨਦਾ ਨਾ ਮੇਰੀ ਐ ,\nਏਹਨੂੰ ਸਤਸੰਗੁ ਸੁਣਾਵੋ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਜੀ ...\n\nਮਨ ਦੀਆਂ ਠੋਕਰਾਂ ਨੇ ਅੰਦਰੋਂ ਰੁਲਾ ਦਿੱਤਾ , \nਗੁਰਾਂ ਦੇ ਚਰਣਾਂ ਚ ਮਨ ਨੂੰ ਬਿਠਾ ਦਿੱਤਾ , \nਏਹਨੂੰ ਝਿੜਕਾਂ ਪਾਓ ਜੀ , \nਗੁਰੂ ਜੀ ਨਾਮੁ ਨਾ ਜਪਦਾ ਤੇਰਾ , \nਸੀਧੇ ਰਸਤੇ ਪਾਵੋ ਜੀ , \nਚਰਣਾਂ ਨਾਲ ਲਾਓ ਜੀ , \nਮਨੁ ਤੰਗ ਬੜਾ ਕਰਦਾ ਜੀ..."},"hi":{"t":"मन तंग बड़ा करदा ऐ","c":"मन तंग बड़ा करदा ऐ ,\nगुरु जी नाम ना जपदा तेरा ,\nऐहनों समझाओ जी ,\nगुरु जी नाम ना जपदा तेरा ...\n\nबार बार मोड़ा ऐहनूं ऐ न‌ईयो मुड़दा ,\nदाता तेरे नाम नाल ऐह न‌ईयो जुड़दा ,\nऐहनों संगली पायो जी , \nगुरु जी नाम ना जपदा तेरा ,\nमन तंग बड़ा करदा ऐ ...\n\nमन राम राम करे ऐसा ऐहनूं कर दो ,\nनाम दी खुमारी हुण नस नस भर दो ,\nऐहनूं नाम जपावो जी गुरु जी नाम ना जपदा तेरा ,\nऐहनूं कीर्तन च लावो जी ,\nमन तंग बड़ा करदा जी ...\n\nमन काम  क्रोध अंहकार मोह करदा ,\nगंदी मंदी सोच विच रोज पेया मरदा ,\nगुरु वाणी सुनायो जी ,\nगुरु जी नाम ना जपदा तेरा ,\nमन तंग बड़ा करदा जी ...\n\nनिंदेया ते चुगली करदा बथेरी ऐ ,\nकैहन नूं ऐ मेरा पर मनदा ना मेरी ऐ ,\nऐहनूं सत्संग सुनावो जी , \nगुरु जी नाम ना जपदा तेरा ,\nमन तंग बड़ा करदा जी ... \n\nमन दियां ठोकरां ने अंदरों रूला दित्ता ,\nगुरां दे चरणां च मन नूं बिठा दित्ता ,\nऐहनूं चिड़कां पावो जी ,\nगुरु जी नाम ना जपदा तेरा ,\nसीधे रस्ते पावो जी ,\nचरणां नाल लाओ जी गुरु जी नाम ना ,\nमन तंग बड़ा करदा जी ..."},"en":{"t":"Man Tang Bada Karda Ae","c":"Man Tang Bada Karda Ae"}},

	{"id":1768571381956,
	"pb":{"t":"ਨਾਨਕ ਨਾਮੁ ਸਿਮਰੋ ਸੰਤੋ","c":"ਨਾਨਕ ਨਾਮੁ ਸਿਮਰੋ ਸੰਤੋ ਸੇਵਕ ਸੋਭਾ ਬਣਿ ਆਈ ॥ \nਹਿੰਦੂ ਕਹਤ ਰਾਮ ਰਾਮ ਮੁਸਲਿਮਾ ਪੀਰੇ ਖੁਦਾਈ ਜੀਉ ॥ \nਭਿੰਨ ਭੇਦ ਤੇ ਬਾਹਰ ਸਤਿਗੁਰੂ , ਹਰਿ ਸਿਉ ਏਕ ਜੋਤਿ ਸਮਾਈ ॥ \nਆਪ ਆਪੇ ਆਪਣੀ ਬਿਰਧਿ ਰਾਖੋ , ਦਰਸਨ ਤੁਝ ਸਿਉ ਪ੍ਰੀਤਿ ਲਗਾਈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"नानक नाम सिमरो संतो","c":"नानक नाम सिमरो संतो सेवक सोभा बण आई ।। \nहिंदू कहत राम राम मुसलिमा पीरे खुदाई जीओ ।। \nभिन्न भेद ते बाहर सतिगुरू , हरि सेओ एक जोत समाई ।। \nआप आपे आपनी बिरध राखो , दर्शन तुझ से प्रीत लगाई ।।\n( यकीन )"},"en":{"t":"Nanak Naam Simro Santo","c":"Nanak Naam Simro Santo"}},

	{"id":1768571758170,
	"pb":{"t":"ਪ੍ਰਭ ਜੀਉ ਮਨਿ ਚਾਉ ਲਾਗਾ ਹੈ","c":"ਪ੍ਰਭ ਜੀਉ ਮਨਿ ਚਾਉ ਲਾਗਾ ਹੈ , \nਰਾਮ ਨਾਮੁ ਸਿਮਰਿ ਸੁਖੁ ਪਾਵਾਂ , ਤੇਰੀ ਕਿਰਪਾ ਹਰਿ ਗੁਣ ਗਾਵਾਂ ॥ \nਮੈਂ ਨਾ ਜਾਣਾ ਤੇਰੀ ਵਡਿਆਈ , ਸਰਣਿ ਸਾਧੂ ਪਰਮ ਗਤਿ ਪਾਈ ॥ \nਸੁਣਾਂ ਪੜ੍ਹਾਂ ਨਿਤ ਤੇਰੀ ਬਾਣੀ , ਨਾਨਕ ਏਹ ਬਿਧਿ ਤੁਝ ਤੇ ਹੈ ਜਾਣੀ ॥ \nਗੁਰ ਪੂਰੇ ਮੇਰੇ ਗੋਬਿੰਦ ਗੋਪਾਲ , \n' ਦਰਸਨ ' ਹਰਿ ਆਪਣੇ ਜਾਉਂ ਕੁਰਬਾਨ ਜੀਉ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"प्रभ जीओ मन चाओ लागा है","c":"प्रभ जीओ मन चाओ लागा है , \nराम नाम सिमर सुख पावां , तेरी किरपा हरि गुण गावां ।।\nमैं ना जाणा तेरी वडियाई , शरण साधू परम गत पाई ।।\nसुणां पढ़ां नित तेरी बाणी , नानक एह बिध तुझ ते है जाणी ।।\nगुर पूरे मेरे गोबिंद गोपाल , \nदर्शन हरि आपणे जाऊँ कुरबान जीओ ।।\n( यकीन )"},"en":{"t":"Prabh Jiyo Mann Chao Laga Hain ","c":"Prabh Jiyo Mann Chao Laga Hain "}},

	{"id":1768571997434,
	"pb":{"t":"ਬਨਵਾਰੀ ਬਨਵਾਸੀ ਰਾਮ ਸ਼ਾਮ ਗੋਬਿੰਦਾ","c":"ਬਨਵਾਰੀ ਬਨਵਾਸੀ ਰਾਮ ਸ਼ਾਮ ਗੋਬਿੰਦਾ , \nਸ਼ਰਨਿ ਪ੍ਰਭ ਧਾਰੀ ਲਾਲ ਲਾਲ ਲਾਲ ਲਾਲ ਰੰਗ ਪੁਰਖੈ ਸੁਜਾਨ ॥ \nਹਉਂ ਕੁਝ ਨਾ ਜਾਣਾ ਤੁਝ ਰੰਗ ਰਾਤੇ ਮਨੁ ਮਾਨਾ , \nਮਨੁ ਮਾਨਾ ਮਨੁ ਭਾਣਾ ਮਨੁ ਮਾਨਿ ਜਾਣਾ ਮਨੁ ਸੰਗਿ ਨਾ ਜਾਣਾ ॥ \nਮਨੁ ਨਿਰੰਜਨੁ ਜੋਤਿ ਨਿਰੰਕਾਰ ਹੈ ਕਿਉਂ ਬਿਸਟਾ ਸੰਗਿ ਪ੍ਰੀਤਿ ਪਾਤਾ ॥ \nਤੁਝੇ ਧਿਆਣਾ ਸਭਨੀ ਥਾਂਈ ਪਾਣਾ , \nਜਿੱਥੇ ਧਿਆਣਾ ਜਿਤੁ ਜਿਤੁ ਮਨੁ ਭਾਣਾ ॥ \nਮੰਨਿਆ ਭਾਣਾ ਤਿਨ੍ਹੇ ਭਵਜਲੁ ਪਾਰ ਹੈ , ' ਦਰਸਨ ' ਜਾਣਾ ਹਰਿ ਰਾਇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"बनवारी बनवासी राम शाम गोबिंदा","c":"बनवारी बनवासी राम शाम गोबिंदा , \nशरन प्रभ धारी लाल लाल लाल लाल रंग पुरखै सुजान ।।\nहउँ कुझ ना जाणा तुझ रंग राते मन माना , \nमन माना मन भाणा मन मान जाणा मन संग ना जाणा ।।\nमन निरंजन जोत निरंकार है किओं बिष्टा संग प्रीत पाता ।।\nतुझे धिआणा सभनी थांई पाणा , \nजित्थे धिआणा जित जित मन भाणा ।।\nमंनेआ भाणा तिनहे भवजल पार है , दर्शन जाणा हरि राय ।।\n( यकीन )"},"en":{"t":"Banvari Banvasi Ram Shyam Gobinda","c":"Banvari Banvasi Ram Shyam Gobinda"}},

	{"id":1768572229681,
	"pb":{"t":"ਭਰੋਸਾ ਰੱਖ ਗੁਰੂ ਆਪਣੇ ਤੇ","c":"ਭਰੋਸਾ ਰੱਖ ਗੁਰੂ ਆਪਣੇ ਤੇ , ਕਾਰਜ ਜਿਹਨ੍ਹਾਂ ਸਵਾਰਿਆ , \nਆਦਿ ਨਾਰਾਇਣ ਸੰਗਿ ਲਛਮੀ , ਦਾਸਨ ਕੋ ਉਬਾਰਿਆ ॥ \nਦੀਆ ਨਾਮੁ ਦਾਨੁ ਪ੍ਰਭ ਆਪਣਾ , ਮੁਝ ਗਰੀਬ ਨਿਵਾਜ ਜੀਉ , \nਨਦਰਿ ਕੀਓ ਜਨ ਆਪਣੇ , ਅਉਗੁਣ ਨਾ ਵਿਚਾਰਿਆ ॥ \nਹੋਏ ਕਿਰਪਾਲ ਸਤਿਗੁਰੂ , ਮੇਰੇ ਮਨ ਤੈਨ ਹੋਆ ਨਿਹਾਲ ਜੀਉ , \nਦੀਓ ਦਰਸੁ ਆਪਿ ਨਾਰਾਇਣ , ਅਗੰਮ ਰੂਪੁ ਧਾਰਿਆ ॥ \nਮੇਰਾ ਸੋਹਣਾ ਸਤਿਗੁਰ ਸਾਂਈ , ਸੁੰਦਰ ਰੂਪੁ ਨਿਰਾਲਾ ਜੀਉ ,\n' ਦਰਸਨ ' ਜਾਊਂ ਬਲਿਹਾਰੇ ਤਿਨਕੇ , ਬਾਂਹ ਪਕੜ ਜਿਸੁ ਤਾਰਿਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"भरोसा रख गुरू आपणे ते","c":"भरोसा रख गुरू आपणे ते , कारज जिहनां सवारेआ , \nआदि नारायण संग लछमी , दासन को उबारेआ ।।\nदीआ नाम दान प्रभ आपणा , मुझ गरीब निवाज जीओ , \nनदर कीओ जन आपणे , औगुण ना विचारेआ ।।\nहोये किरपाल सतिगुरू , मेरे मन तैन होआ निहाल जीओ , \nदीओ दरस आप नारायण , अगंम रूप धारेआ ।।\nमेरा सोहणा सतिगुर सांई , सुंदर रूप निराला जीओ , \nदर्शन जाऊँ बलिहारे तिनके , बांह पकड़ जिस तारेआ ।।\n( यकीन )"},"en":{"t":"Bharosa Rakh Guru Apne Te","c":"Bharosa Rakh Guru Apne Te"}},

	{"id":1768572645518,"audio":"audio/MERE THAKUR GOBIND RAM JIO.mp3",
	"pb":{"t":"ਮੇਰੇ ਠਾਕੁਰ ਗੋਬਿੰਦ ਰਾਮ ਜੀਉ","c":"ਮੇਰੇ ਠਾਕੁਰ ਗੋਬਿੰਦ ਰਾਮ ਜੀਉ , ਹਮ ਸਭਿ ਠਹਿਰੇ ਭਿਖਾਰੀ ॥ \nਪੰਖੇਰੂ ਬਿਨੁ ਪੰਖ ਉਡਿ ਜਾਸੀ , ਮਨੁ ਲੋਚੈ ਸ਼ਰਣਿ ਤੁਮਾਰੀ ॥ \nਸੰਤ ਸਜਣ ਸੰਗਿ ਸੇਵ ਕਮਾਵਾਂ , ਪ੍ਰਭ ਜੀਉ ਦਇਆ ਮਿਹਰਿ ਕਰੀਜੈ ॥ \nਰਾਖੋ ਸ਼ਰਣਿ ਆਪਣੀ ਮੇਰੇ ਸਤਿਗੁਰੂ , ' ਦਰਸਨ ' ਨੀਚ ਕੋ ਨਾਮੁ ਦਾਨੁ ਦੀਜੈ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"मेरे ठाकुर गोबिंद राम जीओ","c":"मेरे ठाकुर गोबिंद राम जीओ , हम सभ ठहिरे भिखारी ।।\nपंखेरू बिन पंख उड जासी , मन लोचै शरण तुमारी ।।\nसंत सजन संग सेव कमावां , प्रभ जीओ दया मेहर करीजै ।। \nराखो शरण आपणी मेरे सतिगुरू , दर्शन नीच को नाम दान दीजै ।।\n( यकीन )"},"en":{"t":"Mere Thakur Gobind Ram Jiyo","c":"Mere Thakur Gobind Ram Jiyo"}},

	{"id":1768573015420,
	"pb":{"t":"ਯਸ਼ਵੰਤੀ ਸਹਕਾਰ ਲਾਵਾਂ ( ਪਹਿਲੀ ਲਾਂਵ )","c":"ਯਸ਼ਵੰਤੀ ਸਹਕਾਰ ਲਾਵਾਂ ( ਪਹਿਲੀ ਲਾਂਵ )\nਪਹਿਲੀ ਲਾਂਵ ਪ੍ਰਭ ਪੜ੍ਹਿਓ ਪੂਰਨ ਕਰੇਓ ਕਾਜ ॥ \nਸਤਿਗੁਰੂ ਨਾਨਕ ਦਇਆਲ ਮਾਹਿ ਮੇਰਾ ਮਨੁ ਤ੍ਰਿਪਤਿ ਅਘਾਈ ॥ \nਅੰਤਰ ਕੀ ਗਤਿ ਤੂੰ ਹੀ ਜਾਣੇ ਮੇਰੇ ਠਾਕੁਰ ਰਾਮ ਰਘੁਰਾਈ ॥ \nਤੁਮਰੇ ਕਾਜ ਤੁਮਹੀ ਸਾਜੇ ਮੋਹੇ ਨੀਚ ਕਿਆ ਚਤੁਰਾਈ ॥ \nਤੁਮਸੇ ਹਰਿ ਮਿਲਿਆ ਸੋਈ ਜਿਸ ਨਾਮੇ ਲਿਵ ਲਾਈ ॥ \n' ਦਰਸਨ ' ਕੀ ਲਾਜ ਰੱਖ ਲੀਜੋ ਆ ਗਯੋ ਤਉ ਸ਼ਰਣਾਈ ॥"},"hi":{"t":"यशवंती सहकार लावां ( पहली लांव )","c":"यशवंती सहकार लावां\n( पहली लांव )\n\nपहिली लांव प्रभ पढ़ेओ पूरण करेओ काज ।।\nसतिगुरू नानक दयाल माहि मेरा मन तृप्त अघाई ।। \nअंतर की गति तू ही जाणे मेरे ठाकुर राम रघुराई ।। \nतुमरे काज तुमही साजे मोहे नीच किआ चतुराई ।। \nतुमसे हरि मिलेआ सोई जिस नामे लिव लाई ।। \nदर्शन की लाज रख लीजो आ गयो तओ शरणाई ।।"},"en":{"t":"Yashwanti Sehkaar Laav ( Pehli Laav )","c":"Yashwanti Sehkaar Laav ( Pehli Laav )"}},

	{"id":1768573585612,
	"pb":{"t":"ਮੇਰੇ ਠਾਕੁਰ ਠਾਠੁ ਰਚਾਇਆ ( ਦੂਜੀ ਲਾਂਵ )","c":"( ਦੂਜੀ ਲਾਂਵ )\nਦੂਜੀ ਲਾਵੈਂ ਤਨੁ ਮਨੁ ਧਨੁ ਸੰਗਿ ਵਸੇਓ ਹਰਿ ਰਾਇ ॥ \nਮੇਰੇ ਠਾਕੁਰ ਠਾਠੁ ਰਚਾਇਆ , \nਸਾਧੂ ਸੰਗਿ ਹਰਿ ਪ੍ਰਭੁ ਪਾਇਆ ॥ \nਮਿਲਿਆ ਨਾਮੁ ਪ੍ਰਭ ਮੁਕਤਿ ਅਧਾਰਾ , \nਨਾਮ ਸੰਗਿ ਪ੍ਰਭ ਕੀਓ ਪਸਾਰਾ ॥ \nਸਗਲ ਜੀਵ ਕੇ ਦਾਤੇ ਸੁਆਮੀ , \nਹਰਿ ਥਾਂਓ ਵਸੇ ਮੇਰਾ ਪ੍ਰਭ ਅੰਤਰਯਾਮੀ ॥ \nਗੁਰੂ ਨਾਨਕ ਸਾਹਿਬੋਂ ਕੇ ਸਾਹਿਬਾ , \n' ਦਰਸਨ ' ਦਾਸੁ ਹੋਆ ਦਾਸਨ ਕੋ ਦਾਸੁ ॥"},"hi":{"t":"मेरे ठाकुर ठाठ रचाया ( दूसरी लांव )","c":"( दूसरी लांव )\n\nदूजी लावैं तन मन धन संग वसेओ हरि राय ।।\nमेरे ठाकुर ठाठ रचाया , \nसाधू संग हरि प्रभ पाया ।।\nमिला नाम प्रभ मुक्त अधारा , \nनाम संग प्रभ कीओ पसारा ।।\nसगल जीव के दाते सुआमी , \nहर थांओ वसे मेरा प्रभ अंतरयामी ।।\nगुरू नानक साहिबों के साहिबा , \nदर्शन दास होआ दासन को दास ।।"},"en":{"t":"Mere Thakur Thath Rachaya ( Dusri Laav )","c":"Mere Thakur Thath Rachaya ( Dusri Laav )"}},

	{"id":1768573819319,
	"pb":{"t":"ਚੌਥੀ ਲਾਵੈਂ ਪਤੀ ਪਤਿ ਸੇਵਾ ( ਚੌਥੀ ਲਾਂਵ )","c":"( ਚੌਥੀ ਲਾਂਵ )\n\nਚੌਥੀ ਲਾਵੈਂ ਪਤੀ ਪਤਿ ਸੇਵਾ ਰਾਖੋ ਲਾਜ ਪੈਜ ਨਾਨਕ ਸਾਹਿਬਾ ॥ \nਸੋ ਸੁਹਾਗਣ ਮੇਰੇ ਸਤਿਗੁਰੂ ਜੋ ਪ੍ਰੀਤਮ ਪਿਆਰੀ ॥ \nਨਾਮੁ ਸਿਮਰਿ ਹਰਿ ਆਪੇ ਸੁਆਮੀ , ਗੁਰਮੁਖਿ ਲੇਖਾ ਗੁਰੂ ਦਿਖਾਨੀ ॥ \nਸੇਵਾ ਸਿਦਕੁ ਰਾਖੋ ਹਰਿ ਮਨਿ , ਸੋ ਨਾਰਿ ਦਰਗਾਹਿ ਸਮਾਣੀ ॥ \nਨਾ ਵੈਰੁ ਨਾ ਆਪੇ ਤਾਪੇ ਦੇਖੇ , ਤਿਸੁ ' ਦਰਸਨ ' ਜਨ ਬਲਿਹਾਰੀ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"चौथी लावैं पती पत सेवा ( चौथी लांव )","c":"( चौथी लांव )\n\nचौथी लावैं पती पत सेवा राखो लाज पैज नानक साहिबा ।। \nसो सुहागण मेरे सतिगुरू जो प्रीतम पिआरी ।। \nनाम सिमर हरि आपे सुआमी , गुरमुख लेखा गुरू दिखानी ।। \nसेवा सिदक राखो हरि मन , सो नार दरगाहि समाणी ।। \nना वैर ना आपे तापे देखे , तिस दर्शन जन बलिहारी ।।\n( यकीन )"},"en":{"t":"Chauthi Laave Pati Patt Sewa ( Chauthi Laav )","c":"Chauthi Laave Pati Patt Sewa ( Chauthi Laav )"}},

	{"id":1768574628497,"audio":"audio/avarallahnoorupaya.mp3",
	"pb":{"t":"ਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ","c":"ਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ਕੁਦਰਤਿ ਕੇ ਸਭ ਬੰਦੇ ,\nਏਕ ਨੂਰ ਤੇ ਸਭੁ ਜਗੁ ਉਪਜਿਆ ਕਉਨ ਭਲੇ ਕੋ ਮੰਦੇ ,\nਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ...\n\nਲੋਗਾ ਭਰਮਿ ਨ ਭੂਲਹੁ ਭਾਈ ਭਰਮਿ ਨ ਭੂਲਹੁ ਭਾਈ ,\nਖਾਲਿਕੁ ਖਲਕ ਖਲਕ ਮਹਿ ਖਾਲਿਕੁ ਪੂਰਿ ਰਹਿਓ ਸ੍ਰਬ ਠਾਂਈ ,\nਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ...\n\nਮਾਟੀ ਏਕ ਅਨੇਕ ਭਾਂਤਿ ਕਰਿ ਸਾਜੀ ਸਾਜਨਹਾਰੈ ,\nਨਾ ਕਛੁ ਪੋਚ ਮਾਟੀ ਕੇ ਭਾਂਡੇ ਨਾ ਕਛੁ ਪੋਚ ਕੁੰਭਾਰੈ ,\nਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ...\n\nਸਭ ਮਹਿ ਸਚਾ ਏਕੋ ਸੋਈ ਤਿਸ ਕਾ ਕੀਆ ਸਭੁ ਕਛੁ ਹੋਈ ,\nਹੁਕਮੁ ਪਛਾਨੈ ਸੁ ਏਕੋ ਜਾਨੈ ਬੰਦਾ ਕਹੀਐ ਸੋਈ ,\nਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ...\n\nਅਲਹੁ ਅਲਖੁ ਨ ਜਾਈ ਲਖਿਆ ਗੁਰਿ ਗੁੜੁ ਦੀਨਾ ਮੀਠਾ ,\nਕਹਿ ਕਬੀਰ ਮੇਰੀ ਸੰਕਾ ਨਾਸੀ ਸਰਬ ਨਿਰੰਜਨੁ ਡੀਠਾ ,\nਅਵਲਿ ਅਲਹ ਨੂਰੁ ਉਪਾਇਆ ..."},"hi":{"t":"अव्वल अल्लाह नूर उपाया","c":"अव्वल अल्लाह नूर उपाया कुदरत के सब बंदे ,\nएक नूर ते सब जग उपजाया कौन भले को मंदे ,\nअव्वल अल्लाह नूर उपाया ...\n\nलोगा भ्रमी न भूलहु भाई भरमि न भूलहु भाई ,\nखालिकु खल्क खल्क माहि खालिकु पूरी रहियो सब थाई ,\nअव्वल अल्लाह नूर उपाया ...\n\nमाटी एक अनेक भाँती करी साजी सजन्हारे ,\nना कुझ पोच माटी के भांडे न कुछ पोच कुंभारे ,\nअव्वल अल्लाह नूर उपाया ...\n\nसब माहि सचा एको सोई तिस न किया सब कुछ होई ,\nहुक्म पछाने सु एको जाने बंदा कहिए सोई ,\nअव्वल अल्लाह नूर उपाया ...\n\nअलहु अल्हु न जाई लिखियाँ गुरु गरुड दीना मीठा ,\nकह कबीर मेरी शंका नासी शबर निरजन ढीठ ,\nअव्वल अल्लाह नूर उपाया ...\n"},"en":{"t":"Avar Allah Noor Upaya","c":"Avar Allah Noor Upaya"}},

	{"id":1768576307335,
	"pb":{"t":"ਸਤਿਗੁਰ ਨਾਨਕ ਪ੍ਰਗਟਿਆ","c":"ਸਤਿਗੁਰ ਨਾਨਕ ਪ੍ਰਗਟਿਆ ਮਿਟੀ ਧੁੰਧੁ ਜਗਿ ਚਾਨਣੁ ਹੋਆ ॥\nਜਿਉ ਕਰਿ ਸੂਰਜੁ ਨਿਕਲਿਆ ਤਾਰੇ ਛਪਿ ਅੰਧੇਰੁ ਪਲੋਆ ॥\n\nਸਿੰਘ ਬੁਕੇ ਮਿਰਗਾਵਲੀ ਭੰਨੀ ਜਾਇ ਨ ਧੀਰਿ ਧਰੋਆ ॥\nਜਿਥੇ ਬਾਬਾ ਪੈਰ ਧਰਿ ਪੂਜਾ ਆਸਣੁ ਥਾਪਣਿ ਸੋਆ ॥\n\nਸਿਧ ਆਸਣਿ ਸਭਿ ਜਗਤ ਦੇ ਨਾਨਕ ਆਦਿ ਮਤੇ ਜੇ ਕੋਆ ॥\nਘਰਿ ਘਰਿ ਅੰਦਰਿ ਧਰਮਸਾਲ ਹੋਵੈ ਕੀਰਤਨੁ ਸਦਾ ਵਿਸੋਆ ॥\n\nਬਾਬੇ ਤਾਰੇ ਚਾਰਿ ਚਕਿ ਨਉ ਖੰਡਿ ਪ੍ਰਿਥਮੀ ਸਚਾ ਢੋਆ ॥\nਗੁਰਮਖਿ ਕਲਿ ਵਿਚ ਪਰਗਟੁ ਹੋਆ ॥"},"hi":{"t":"सतिगुरु नानक प्रगटिआ","c":"सतिगुरु नानक प्रगटिआ मिटी धुंध जग चानण होआ ।।\nजिउ कर सूरज निकलिआ तारे छिपे अंधेर पलोआ ।।\n\nसिंघ बुके मिरगावली भंनी जाइ न धीरि धरोआ ।।\nजिथे बाबा पैर धरे पूजा आसण थापण सोआ ।।\n\nसिधासण सभ जगत दे नानक आद मते जे कोआ ।।\nघर घर अंदर धरमसाल होवै कीरतन सदा विसोआ ।।\n\nबाबे तारे चार चक नउ खंड प्रिथवी सचा ढोआ ।।\nगुरमुख कल विच परगट होआ ।।"},"en":{"t":"Satguru Nanak Pragatya","c":"Satguru Nanak Pragatya ,\nJithe Baba Pair Dhare"}},

	{"id":1768577153557,
	"pb":{"t":"ਗੋਬਿੰਦ ਮਿਲਣ ਕੀ ਇਹ ਤੇਰੀ ਬਰੀਆ","c":"ਭਈ ਪਰਾਪਤਿ ਮਾਨੁਖ ਦੇਹੁਰੀਆ ॥ \nਗੋਬਿੰਦ ਮਿਲਣ ਕੀ ਇਹ ਤੇਰੀ ਬਰੀਆ ॥ \nਅਵਰਿ ਕਾਜ ਤੇਰੈ ਕਿਤੈ ਨ ਕਾਮ ॥ \nਮਿਲੁ ਸਾਧਸੰਗਤਿ ਭਜੁ ਕੇਵਲ ਨਾਮ ॥\n\nਸਰੰਜਾਮਿ ਲਾਗੁ ਭਵਜਲ ਤਰਨ ਕੈ ॥ \nਜਨਮੁ ਬ੍ਰਿਥਾ ਜਾਤ ਰੰਗਿ ਮਾਇਆ ਕੈ ॥\n\nਜਪੁ ਤਪੁ ਸੰਜਮੁ ਧਰਮੁ ਨ ਕਮਾਇਆ ॥ \nਸੇਵਾ ਸਾਧ ਨ ਜਾਨਿਆ ਹਰਿ ਰਾਇਆ ॥ \nਕਹੁ ਨਾਨਕ ਹਮ ਨੀਚ ਕਰੰਮਾ ॥ \nਸਰਣਿ ਪਰੇ ਕੀ ਰਾਖਹੁ ਸਰਮਾ ॥"},"hi":{"t":"गोबिंद मिलण की इह तेरी बरीआ","c":"आसा महला ५\n\nभई परापित मानुख देहुरीआ ।।\nगोबिंद मिलण की इह तेरी बरीआ ।।\nअवर काज तेरै कितै न काम ।। \nमिल साधसंगत भज केवल नाम ।।\n\nसरंजिाम लाग भवजल तरन कै ।। \nजनमब्रिथा जात गि माइआ कै ।।\n\nजप तप संजम धरम न कमाइआ ।। \nसेवा साध न जानिआ हरि राइआ ।। \nकहु नानक हम नीच करमा ।। \nसरणि परे की राखहु सरमा ।।"},"en":{"t":"Gobind Milan Ki Eh Teri Bariyaa","c":"Gobind Milan Ki Eh Teri Bariyaa"}},

	{"id":1768577455915,
	"pb":{"t":"ਐਸੇ ਗੁਰ ਕਉ ਬਲਿ ਬਲਿ ਜਾਈਐ","c":"ਐਸੇ ਗੁਰ ਕਉ ਬਲਿ ਬਲਿ ਜਾਈਐ , \nਆਪਿ ਮੁਕਤੁ ਮੋਹਿ ਤਾਰੈ ॥ \nਨਾਰਾਇਨ ਨਰਪਤਿ ਨਮਸਕਾਰੈ ॥\n\nਕਵਨ ਕਵਨ ਕਵਨ ਗੁਨ ਕਹੀਐ , \nਅੰਤੁ ਨਹੀਂ ਕਛੁ ਪਾਰੈ ॥ \nਲੱਖ ਲੱਖ ਲੱਖ ਕਈ ਕੋਰੈ , \nਕੋ ਹੈ ਐਸੋ ਬੀਚਾਰੈ ॥\n\nਬਿਸਮ ਬਿਸਮ ਬਿਸਮ ਹੀ ਭਈ ਹੈ , \nਲਾਲ ਗੁਲਾਲ ਰੰਗਾਰੈ ॥ \nਕਹੁ ਨਾਨਕ ਸੰਤਨ ਰਸੁ ਆਈ ਹੈ , \nਜਿਉ ਚਾਖਿ ਗੂੰਗਾ ਮੁਸਕਾਰੈ ॥"},"hi":{"t":"ऐसे गुर कउ बलि बलि जाईऐ","c":"ऐसे गुर कउ बलि बलि जाईऐ ,\nआप मुकत मोहि तारै ।।\nनाराइन नरपति नमसकारै ।।\n\nकवन कवन कवन गुन कहीऐ ,\nअंत नही कछु पारै ।।\nलाख लाख लाख कई कोरै ,\nको है ऐसो बीचारै ।।\n\nबिसम बिसम बिसम ही भई है ,\nलाल गुलाल रंगारै ।।\nकहु नानक संतन रस आई है ,\nजिउ चाखि गूंगा मुसकारै ।।"},"en":{"t":"Aise Guru Ko Bal Bal Jaiye","c":"Aise Guru Ko Bal Bal Jaiye"}},

	{"id":1768577771614,
	"pb":{"t":"ਕਉ ਤਾਰਿ ਲੇ ਰਾਮਾ ਤਾਰਿ ਲੇ","c":"ਕਉ ਤਾਰਿ ਲੇ ਰਾਮਾ ਤਾਰਿ ਲੇ ॥\nਮੈ ਅਜਾਨੁ ਜਨੁ ਤਰਿਬੇ ਨ ਜਾਨਉ ਬਾਪ ਬੀਠੁਲਾ ਬਾਹ ਦੇ ॥\n\nਨਰ ਤੇ ਸੁਰ ਹੋਇ ਜਾਤ ਨਿਮਖ ਮੈ ਸਤਿਗੁਰ ਬੁਧਿ ਸਿਖਲਾਈ ॥\nਨਰ ਤੇ ਉਪਜਿ ਸੁਰਗ ਕਉ ਜੀਤਿਓ ਸੋ ਅਵਖਧ ਮੈ ਪਾਈ ॥\n\nਜਹਾ ਜਹਾ ਧੂਅ ਨਾਰਦੁ ਟੇਕੇ ਨੈਕੁ ਟਿਕਾਵਹੁ ਮੋਹਿ ॥\nਤੇਰੇ ਨਾਮ ਅਵਿਲੰਬਿ ਬਹੁਤੁ ਜਨ ਉਧਰੇ ਨਾਮੇ ਕੀ ਨਿਜ ਮਤਿ ਏਹ ॥"},"hi":{"t":"मोको तार ले रामा तार ले","c":"मोको तार ले रामा तार ले ।। \nमै अजान जन तरिबे न जानउ बाप बीठुला बाह दे ।।\n\nनर ते सुर होइ जात निमख मै सतिगुर बुध सिखलाई ।। \nनर ते उपजि सुरग कउ जीतिओ सो अवखध मै पाई ।।\n\nजहा जहा धूअ नारद टेके नैक टिकावहु मोहि ।।\nतेरे नाम अवलंब बहुत जन उधरे नामे की निज मति एह ।।"},"en":{"t":"Moko Taar Le Rama Taar Le","c":"Moko Taar Le Rama Taar Le"}},

	{"id":1768578469404,
	"pb":{"t":"ਤੂੰ ਠਾਕੁਰ ਮਾਤ ਪਿਤਾ ਹਮਾਰੇ","c":"ਤੂੰ ਠਾਕੁਰ ਮਾਤ ਪਿਤਾ ਹਮਾਰੇ ॥ \nਮਨ ਮੋਹੁ ਤਬ ਛੂਟਿ ਜਾਏ , ਜਾਂ ਸਤਿਗੁਰ ਕਿਰਪਾ ਧਾਰੇ ॥ \nਗੁਰ ਕੀ ਸੇਵਾ ਨਾਮੁ ਕਮਾਵਾਂ , ਸਤਿਗੁਰ ਆਪਣੇ ਬਲਿ ਬਲਿ ਜਾਵਾਂ ॥\nਸਿਮਰਿ ਸਿਮਰਿ ਪ੍ਰਭੁ ਆਪਣਾ , ਕੋਟਿ ਜਨਮ ਕੀ ਮੈਲੁ ਗਵਾਵਾਂ ॥ \nਗੁਰ ਕਿਰਪਾ ਸੁਖੀ ਜਨ ਸੋਏ , ਪਾਰਬ੍ਰਹਮ ਦਇਆਲ ਹੋਏ ॥ \nਗੁਰੂ ਗਿਆਨੁ ਪ੍ਰਗਟੇ ਤਾਂ ਜੀਵਾਂ , ' ਦਰਸਨ ' ਪ੍ਰੇਮ ਮਿਲੇ ਤਾਂ ਥੀਵਾਂ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं ठाकुर मात पिता हमारे","c":"तूं ठाकुर मात पिता हमारे ।। \nमन मोह तब छूट जाये , जां सतिगुर किरपा धारे ।। \nगुर की सेवा नाम कमावां , सतिगुर आपणे बलि बलि जावां ।। \nसिमर सिमर प्रभ आपणा , कोट जनम की मैल गवावां ।। \nगुर किरपा सुखी जन सोये , पारब्रह्म दयाल होये ।। \nगुरू गिआन प्रगटे तां जीवां , दर्शन प्रेम मिले तां थीवां ।।\n( यकीन )"},"en":{"t":"Tu Thakur Maat Pita Humare","c":"Tu Thakur Maat Pita Hamare || \nMan Moh Tab Chhoot Jaye , Jaan Satgur Kirpa Dhare ||\nGur Ki Seva Naam Kamawan , Satgur Aapne Bali Bali Jawan || \nSimar Simar Prabh Aapna , Kot Janam Ki Mail Gawawan || \nGur Kirpa Sukhi Jan Soye , Parbrahm Dayal Hoye || \nGuru Gian Pragte Taan Jeevan , Darshan Prem Mile Taan Theewan ||"}},

	{"id":1768579110547,
	"pb":{"t":"ਤੂੰ ਦਾਤਾ ਪਾਲਣਹਾਰਾ","c":"ਤੂੰ ਦਾਤਾ ਪਾਲਣਹਾਰਾ , ਸਤਿਗੁਰ ਪੁਰਖ ਹਮਾਰੇ , \nਬਖ਼ਸ਼ ਲੇਓ ਦੀਨ ਕੇ ਦਾਤੇ ਸਾਜਨ ਮੀਤ ਮੁਰਾਰੇ ॥ \nਬੇਅੰਤ ਸੁਆਮੀ ਜਲ ਥਲ ਮਹੀਅਲ , ਨਾਮੁ ਦੇਹੁ ਕਿਰਪਾ ਧਾਰੇ ॥ \nਤੇਰੀ ਵਡਿਆਈ ਤੁਧ ਤੇ ਪਾਈ , ਚਰਣ ਕਮਲ ਚਿੱਤ ਧਾਰੇ ॥ \nਦੁਸ਼ਟ ਵੈਂਤ ਦਾਮਨ ਸਭੈ ਪਾਵਨ ਪਾਰਿ ਉਤਾਰੇ ॥ \nਨਰ ਨਾਰਾਇਣ ਭੇਦ ਨਾਹੀ , ' ਦਰਸਨ ' ਰੰਕ ਪੁਕਾਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं दाता पालनहारा","c":"तूं दाता पालनहारा , सतिगुर पुरख हमारे , \nबख्श लेओ दीन के दाते साजन मीत मुरारे ।।\nबेअंत सुआमी जल थल महीअल , नाम देहु किरपा धारे ।। \nतेरी वडियाई तुध ते पाई , चरण कमल चित्त धारे ।। \nदुष्ट वैंत दामन सभै पावन पार उतारे ।। \nनर नारायण भेद नाही , दर्शन रंक पुकारे ।।\n( यकीन )"},"en":{"t":"Tu Data Palanhara ","c":"Tu Data Palanhara "}},

	{"id":1768579285971,
	"pb":{"t":"ਤੂੰ ਸਾਜਨੁ ਤੂੰ ਹਰਿ ਪ੍ਰਭੁ ਪੂਰਾ","c":"ਤੂੰ ਸਾਜਨੁ ਤੂੰ ਹਰਿ ਪ੍ਰਭੁ ਪੂਰਾ , ਮੋਹੇ ਭਯੋ ਦਇਆਲਾ ॥ \nਮਿਹਰ ਕਰੋ ਪ੍ਰਭ ਜਨ ਅਪਨੇ , ਪੂਰੀ ਹੋਵੈ ਮਨ ਕੀ ਆਸਾ ॥ \nਹਮ ਨੀਚ ਕਿਛੁ ਜਾਨੋ ਨਾਹੀ , ਤੁਮ ਭਯੋ ਮੀਤ ਹਮਾਰੇ ॥ \n' ਦਰਸਨ ' ਦਾਸ ਮਨਿ ਚਾਉ ਲਾਗਾ ਹੈ , ਨਾਮੁ ਦੇਉ ਮੋਹੇ ਪੁਰਖ ਮੁਰਾਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं साजन तूं हरि प्रभ पूरा","c":"तूं साजन तूं हरि प्रभ पूरा , मोहे भयो दयाला ।। \nमेहर करो प्रभ जन आपने , पूरी होवे मन की आसा ।। \nहम नीच किछ जानो नाही , तुम भयो मीत हमारे ।।\nदर्शन दास मन चाओ लगा है , नाम देओ मोहे पुरख मुरारे ।।\n( यकीन )"},"en":{"t":"Tu Saajan Tu Har Prabh Pura","c":"Tu Saajan Tu Har Prabh Pura"}},

	{"id":1768579448510,
	"pb":{"t":"ਤੂੰ ਸਾਹਿਬ ਮੈਂ ਤੁਮਰੋ ਦਾਸਾ","c":"ਤੂੰ ਸਾਹਿਬ ਮੈਂ ਤੁਮਰੋ ਦਾਸਾ , ਪੂਰੀ ਕੀਜੈ ਮਨ ਕੀ ਆਸਾ ॥ \nਤੂੰ ਠਾਕੁਰ ਹਮ ਚਾਕਰ ਤੇਰੇ , ਬਖ਼ਸ਼ੋ ਪ੍ਰਭ ਅਉਗੁਣ ਮੇਰੇ , \nਬਿਨੁ ਨਾਮੇ ਮਨੁ ਪਿਆਸਾ ॥ \nਨੀਚ ਨਿਮਾਣਾ ਹਉਂ ਕਰਮਹੀਣ , ਦੀਜੋ ਗੁਣ ਗੁਣੀ ਗਹੀਰ , \nਕੀਜੈ ਮੇਰੇ ਹਿਰਦੇ ਵਾਸਾ ॥ \nਸੁਣੋ ਬੇਨੰਤੀ ਪ੍ਰੀਤਮ ਪਿਆਰੇ , ਦੀਜੋ ਦਰਸਨੁ ਮੀਤ ਹਮਾਰੇ , \nਮੇਰੇ ਪੁਰਖ ਬਿਧਾਤਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं साहिब मैं तुमरो दासा","c":"तूं साहिब मैं तुमरो दासा , पूरी कीजै मन की आसा ।।\nतूं ठाकुर हम चाकर तेरे , बख्शो प्रभ अवगुण मेरे , \nबिन नामे मन पिआसा ।।\nनीच निमाणा हउँ करमहीण , दीजो गुण गुणी गहीर , \nकीजै मेरे हिरदे वासा ।।\nसुणो बेनंती प्रीतम पिआरे , दीजो दर्शन मीत हमारे , \nमेरे पुरख बिधाता ।।\n( यकीन )"},"en":{"t":"Tu Sahib Mein Tumro Dasa","c":"Tu Sahib Mein Tumro Dasa"}},

	{"id":1768579699103,
	"pb":{"t":"ਤੂੰ ਸਭਨੀ ਥਾਂਈ ਤੁਝ ਦੇਖੇ ਮਨੁ ਮਾਨਿ","c":"ਤੂੰ ਸਭਨੀ ਥਾਂਈ ਤੁਝ ਦੇਖੇ ਮਨੁ ਮਾਨਿ ਜਾਈ ॥ \nਮਨ ਮਹਿ ਮੋਹ ਮਮਤਾ ਮਾਇਆ , \nਏਹ ਸਭ ਫੀਕੇ ਬਿਨੁ ਹਰਿ ਰਾਇਆ ॥ \nਤੁਝੇ ਧਿਆਇਆ ਸਭਨੀ ਥਾਂਈ ਪਾਇਆ , \nਤੇਰਾ ਅੰਤੁ ਬੇਅੰਤ ਬੇਅੰਤ , ਬੇਅੰਤ ਬੇਅੰਤ ਹਰਿ ਰਾਇਆ ॥ \nਦੇਖਿ ਦੀਦ ਦੀਨ ਦਇਆਲ ਦੀਨਾ ਨਾਥ , \n' ਦਰਸਨ ' ਮੁਖਿ ਏਹ ਸੁਹਾਇਆ ਹਰਿ ਰਾਇਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तूं सभनी थांई तुझ देखे मन मान","c":"तूं सभनी थांई तुझ देखे मन मान जाई ।।\nमन महि मोह ममता माया , \nएह सभ फीके बिन हरि राया ।।\nतुझे धिआया सभनी थांई पाया , \nतेरा अंत बेअंत बेअंत , बेअंत बेअंत हरि राया ।।\nदेख दीद दीन दयाल दीना नाथ , \nदर्शन मुख एह सुहाया हरि राया ।।\n( यकीन )"},"en":{"t":"Tu Sabhni Thayi Tujh Dekhe Mann Maan","c":"Tu Sabhni Thayi Tujh Dekhe Mann Maan"}},

	{"id":1768580110015,
	"pb":{"t":"ਤੁਮ ਮੇਰੋ ਗੋਬਿੰਦ ਠਾਕੁਰ ਦਾਤਾਰ","c":"ਤੁਮ ਮੇਰੋ ਗੋਬਿੰਦ ਠਾਕੁਰ ਦਾਤਾਰ , ਹਮ ਨਾ ਜਾਨੋ ਤੇਰੀ ਵਡਿਆਈ ॥ \nਬੇਅੰਤ ਅੰਤੁ ਨਾ ਪਾਰਾਵਾਰੁ , ਆਪੇ ਸਾਜੇ ਸਹਜਿ ਨਿਵਾਜੇ , \nਈਹਾਂ ਊਹਾਂ ਕਰਤਾਰਾ ॥ \nਦੁਖ ਸੁਖ ਰਾਖੁ ਰਾਖਣਹਾਰੇ , ਦੇਉ ਨਾਮੁ ਮੇਰੇ ਨਾਨਕ ਦਾਸ ਪਿਆਰੇ ॥ \nਤੁਧੁ ਆਗੇ ਅਰਦਾਸਿ ਹਮਾਰੀ , ' ਦਰਸਨ ' ਕੂਕਰੁ ਗੁਣ ਗਾਵੇ ਨਿਸ ਤੇਰੇ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"तुम मेरो गोबिंद ठाकुर दातार","c":"तुम मेरो गोबिंद ठाकुर दातार , हम ना जानो तेरी वडियाई ।। \nबेअंत अंत ना पारावार , आपे साजे सहज निवाजे , \nईहां ऊहां करतारा ।।\nदुख सुख राख राखणहारे , देओ नाम मेरे नानक दास पिआरे ।।\nतुध आगे अरदास हमारी , दर्शन कूकर गुण गावे निस तेरे ।।\n( यकीन )"},"en":{"t":"Tum Mero Gobind Thakur Dataar","c":"Tum Mero Gobind Thakur Dataar"}},

	{"id":1768580440350,
	"pb":{"t":"ਜਿਸਨੇ ਖੋਜਿਆ ਉਸਨੇ ਪਾਇਆ","c":"ਜਿਸਨੇ ਖੋਜਿਆ ਉਸਨੇ ਪਾਇਆ , ਹਿਰਦੇ ਅੰਦਰਿ ਨਾਮੁ ਵਸਾਇਆ ॥ \nਪੂਰਨ ਪੁਰਖੁ ਅਚੁਤ ਅਬਿਨਾਸੀ , \nਅਗੰਮ ਰੂਪੁ ਹਰਿ ਸਚਖੰਡ ਵਾਸੀ , ਕਿਸੇ ਵਿਰਲੇ ਭੇਦੁ ਪਾਇਆ ॥ \nਹਰਿ ਸੰਗਿ ਪ੍ਰੀਤਿ ਗੁਰ ਸੰਗਿ ਨਾਤਾ , \nਪੂਰਨ ਗੁਰੂ ਗੁਣੀ ਗੁਣਿਅੰਤਾ , ਜਿਸਨੇ ਰਾਹੁ ਦਿਖਲਾਇਆ ॥ \nਗੁਰ ਕੀ ਟੇਕ ਗੁਰ ਕੀ ਓਟ , \nਇੱਛਾ ਪੂਰਨ ਨਾ ਆਵੈ ਤੋਟਿ , ' ਦਰਸਨ ' ਕੰਤ ਲਿਵ ਲਾਇਆ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"जिसने खोजा उसने पाया","c":"जिसने खोजा उसने पाया , हिरदे अंदर नाम वसाया ।। \nपूरन पुरख अचुत अबिनासी , \nअगंम रूप हरि सचखंड वासी , किसे विरले भेद पाया ।।\nहरि संग प्रीत गुर संग नाता , \nपूरण गुरू गुणी गुणिअंता , जिसने राह दिखलाया ।।\nगुर की टेक गुर की ओट , \nइच्छा पूरन ना आवे तोट , दर्शन कंत लिव लाया ।।\n( यकीन )"},"en":{"t":"Jisne Khoja Usne Paya","c":"Jisne Khoja Usne Paya"}},

	{"id":1768580696759,"audio":"audio/GHAT GHAT WASI.mp3",
	"pb":{"t":"ਘਟ ਘਟ ਵਾਸੀ ਪ੍ਰਭ ਅਬਿਨਾਸੀ ਬਖ਼ਸ਼ੋ","c":"ਘਟ ਘਟ ਵਾਸੀ ਪ੍ਰਭ ਅਬਿਨਾਸੀ , ਬਖ਼ਸ਼ੋ ਨਾਮੁ ਪਿਆਲਾ , \nਪ੍ਰੀਤਿ ਕੀਓ ਤੁਧੁ ਸਿਉਂ ਤੇਰਾ ਸੁੰਦਰ ਰੂਪੁ ਨਿਰਾਲਾ ॥ \nਸ਼ਾਂਤਿ ਸੀਤਲ ਚੇਤਨਾ ਪਿਆਰੀ , ਕਰਿ ਕਿਰਪਾ ਪ੍ਰਭ ਦੀਨ ਦਇਆਲਾ ॥ ਕੰਚਨ ਕਾਇਆ ਕੋਮਲ ਹਿਰਦੇ , ਬਖ਼ਸ਼ੋ ਜੋਤੀ ਹੋਵੈ ਉਜਾਲਾ ॥ \nਨਾਮੁ ਦਾਨੁ ਦੀਜੈ ਜਨ ਅਪਨੇ , ਹੋਵੈ ' ਦਰਸਨ ' ਜਨਮੁ ਸੁਖਾਲਾ ॥ \n( ਯਕੀਨ )"},"hi":{"t":"घट घट वासी प्रभ अबिनासी बख्शो","c":"घट घट वासी प्रभ अबिनासी , बख्शो नाम पिआला , \nप्रीत कीओ तुध सिओं तेरा सुंदर रूप निराला ।।\nशांत सीतल चेतना पिआरी , कर किरपा प्रभ दीन दयाला ।।\nकंचन काया कोमल हिरवे , बख्शो जोती होवै उजाला ।।\nनाम दान दीजै जन अपने , होवै दर्शन जनम सुखाला ।।\n( यकीन )"},"en":{"t":"Ghat Ghat Vaasi Prabh Abhinasi Baksho","c":"Ghat Ghat Vaasi Prabh Abhinasi Baksho"}},

	{"id":1768582749393,
	"pb":{"t":"ਦਾਤਾ ਹੋਰ ਦੇ ਹੋਰ ਦੇ ਕਹੀ ਜਾਂਦੇ ਹਾਂ","c":"ਦਾਤਾ ਹੋਰ ਦੇ ਹੋਰ ਦੇ ਕਹੀ ਜਾਂਦੇ ਹਾਂ , \nਤੁਸੀਂ ਦੇਈ ਜਾਂਦੇ ਓ ਅਸੀਂ ਲਈ ਜਾਂਦੇ ਆਂ ॥\n\nਤੇਰੇ ਭਗਤ ਪੁਰਾਣੇ ਤੇਥੋਂ ਰਹਿਣਾ ਮੰਗਦੇ , \nਅਸੀਂ ਮੰਗਦੇ ਹੀ ਰਹਿਣਾ ਭੋਰਾ ਨਹੀਂਓ ਸੰਗਦੇ , \nਅਸੀਂ ਭਰ ਭਰ ਝੋਲੀਆਂ ਨੂੰ ਲੁੱਟੀ ਜਾਂਦੇ ਹਾਂ ॥ \n\nਤੂੰ ਹੀ ਸਭ ਕੁਝ ਮੇਰਾ ਤੂੰ ਹੀ ਮੇਰਾ ਤਾਣ ਵੇ , \nਹਥ ਹੋਵੇ ਤੇਰਾ ਸਿਰ ਤੇ ਤੇਰੇ ਉੱਤੇ ਮਾਣ ਵੇ , \nਨਾਮ ਦੀ ਦਵਾਈ ਤੇਥੋਂ ਲਈ ਜਾਂਦੇ ਹਾਂ ॥\n\nਧ੍ਰਵ ਪ੍ਰਹਿਲਾਦ ਲਈ ਪ੍ਰਗਟ ਹੋ ਕੇ ਆ ਗਏ , \nਨਾਮ ਤੇਰਾ ਜਪਣ ਵਾਲੇ ਜਾਮਾ ਲੇਖੇ ਲਾ ਗਏ , \nਸਾਡੇ ਤੇ ਵੀ ਕਰੋ ਕਿਰਪਾ ਅਸੀਂ ਆਖੀ ਜਾਂਦੇ ਹਾਂ ॥\n\nਤਿਨ ਲੋਕ ਮੇਂ ਗੁਰੂ ਜੈਸਾ ਕੋਈ ਨਹੀਂ ਦੇਵਤਾ , \nਗੁਰੂ ਜੀ ਦੀ ਕਿਰਪਾ ਨੇ ਰੱਬ ਨਾਲ ਮੇਲਤਾ , \nਨਾਮ ਦਾ ਖਜ਼ਾਨਾ ਤੈਥੋਂ ਲਈ ਜਾਂਦੇ ਹਾਂ ॥\n\nਸਾਡੇ ਵਰਗੇ ਪਾਪੀਆਂ ਨੂੰ ਕੋਲ ਰੱਖਣਾ , \nਬਾਂਹੋਂ ਪਕੜ ਕੇ ਚਰਨਾਂ ਚ ਲਾਈ ਰੱਖਣਾ , \nਤੇਰੀ ਰਹਿਮਤਾਂ ਦੇ ਸੁਖ ਅਸੀਂ ਲਈ ਜਾਂਦੇ ਹਾਂ ॥\n\nਗੁਰੂ ਸ਼ਿਵ ਸ਼ਕਤੀ ਗੁਰੂ ਵਿਸ਼ਨੂੰ ਭਗਵਾਨ ਹੈ , \nਗੁਰੂ ਪਾਰਬ੍ਰਹਮ ਪਰਮੇਸ਼ਵਰ ਵੇਦ ਸ਼ਾਸਤਰ ਫਰਮਾਨ ਹੈ , \nਤੇਰੇ ਚਰਨਾਂ ਵਾਲੀ ਮੌਜ ਅਸੀਂ ਲਈ ਜਾਂਦੇ ਹਾਂ ॥"},"hi":{"t":"दाता होर दे होर दे कही जांदे हां","c":"दाता होर दे होर दे कही जांदे हां ,\nतुसीं देइ जांदे ओ असी लई जांदे आं ।। \n\nतेरे भगत पुराणे तेथों रहणा मंगदे ,\nअसीं मगदे ही रहणा भोरा नहीओ संगदे ,\nअसी भर भर झोलीयां नु लुटी जांदे हां ।।\n\nतूंही सब कुछ मेरा तूही मेरा तान वे ,\nहथ होवे तेरा सिर ते तेरे उत्ते मान वे ,\nनाम दी दवाई तेथों लई जांदे हां ।।\n\nध्रव प्रहलाद लई प्रगट हो के आ गए ,\nनाम तेरा तपन वाले जामा लेखे ला गए ,\nसाडे ते वी करो किरपा असीं आखी जांदे हां ।।\n\nतीन लोक में गुरू जैसा कोई नही देवता ,\nगुरू जी दी किरपा ने रब नाल मेलता ,\nनाम दा खजाना तैथों लई जांदे हां ।।\n\nसाडे वरगे पापीयां नूं कोल रखणा ,\nबांहो पकड़ के चरना च लाई रखणा ,\nतेरी रहमता दे सुख असीं लई जांदे हां ।।\n\nगुरू शिव शक्ति गुरू विषनूं भगवान है ,\nगुरू पारब्रहम परमेश्व्र वेद शासत्र फरमान है ,\nतेरे चरना वाली मौज असीं लई जांदे हां ।।"},"en":{"t":"Data Horde Horde Kahi Jaande Haa","c":"Data Horde Horde Kahi Jaande Haa"}},

	{"id":1768583001828,
	"pb":{"t":"ਕ੍ਰਿਸ਼ਨ ਗੋਪਾਲ ਹਰੇ ਮੁਰਾਰੀ","c":"ਕ੍ਰਿਸ਼ਨ ਗੋਪਾਲ ਹਰੇ ਮੁਰਾਰੀ , \nਹੇ ਨੰਦ ਲਾਲ ਹਰੇ ਮੁਰਾਰੇ ॥\n\nਚਾਰੋਂ ਕੁੰਟ ਮੇ ਹੋ ਉਜਿਆਰਾ , \nਦੇਵਕੀਨੰਦਨ ਗੋਵਿੰਦ ਗੋਪਾਲਾ , \nਅਧਰੋਂ ਪੇ ਮੁਰਲੀ ਧਰੇ ॥\n\nਮੋਰ ਮੁਕੁਟ ਕਾਨੋਂ ਮੇ ਕੁੰਡਲ , \nਮਦਨ ਮੋਹਨ ਮੋਰੇ ਨੰਦਗੋਪਾਲਾ , \nਰਾਧਿਕਾ ਸੰਗ ਹਰੇ ਮੁਰਾਰੇ ॥\n\nਗੋਵਿੰਦ ਵਲੱਭ ਸ਼ਰਨ ਤਿਹਾਰੀ , \nਪੂਰਵ ਸੰਚਿਤ ਕਸ਼ਟ ਨਿਵਾਰੇ , \nਸਭ ਕੇ ਦੁਖ ਹਰ ਲੇ ॥\n\nਰਾਧਾ ਵਲੱਭ ਬਾਂਕੇ ਬਿਹਾਰੀ , \nਕੋਟ ਸਖਾ ਸੰਗ ਗੋਪੀ ਤਿਹਾਰੀ , \nਨੈਨੋਂ ਸੇ ਕ੍ਰਿਪਾ ਕਰੇ ਬਿਹਾਰੀ ॥\n\nਸੂਰਜ ਚੰਦਾ ਨੈਨ ਤੁਮ੍ਹਾਰੇ , \nਮਨਮੋਹਨ ਘਨਸ਼ਿਆਮ ਮੁਰਾਰੇ , \nਮਾਖਨ ਚੋਰ ਹਰੇ ਮੁਰਾਰੀ ॥\n\nਮੁਖ ਮੰਡਲ ਤਪ ਤੇਜ਼ ਤੁਮ੍ਹਾਰਾ , \nਨਵਖੰਡਨ ਪ੍ਰਭੂ ਪ੍ਰੇਮ ਤੁਮਾਰਾ , \nਜਗ ਕੇ ਕਸ਼ਟ ਹਰੇ ਮੁਰਾਰੀ ॥\n\nਮੰਦ ਮੰਦ ਮੁਸਕਾਏ ਕਨ੍ਹਈਆ , \nਨੰਦ ਹੈ ਬਾਬਾ ਜਾਂਕੇ ਯਸ਼ੋਦਾ ਮੈਯਾ , \nਸ਼ਰਨ ਮੇਂ ਰਾਖੋ ਹਰੇ ਮੁਰਾਰੇ ॥"},"hi":{"t":"कृष्ण गोपाल हरे मुरारी","c":"कृष्ण गोपाल हरे मुरारी ,\nहे नंद लाल हरे मुरारे ।। \n\nचारो कुंट मे हो उज्यारा ,\nदेवकीनंदन गोविन्द गोपाला ,\nअध्रो पे मुरली धरे ।।\n\nमोर मुकुट कानो मे कुंडल ,\nमदन मोहन मोरे नन्दगोपाला ,\nराधिका संग हरे मुरारे ।।\n\nगोविंद वलभ शरण तिहारी , \nपूरव संचित कष्ट निवारे ,\nसभ के दुख हर ले ।।\n\nराधा वलभ बाँके बिहारी , \n कोट सखा संग गोपी तिहारी , \nनैनों से कृपा करे बिहारी ।।\n\nसूरज चंदा नैन तुम्हारे ,\nमनमोहन घनश्याम मुरारे , \nमाखन चोर हरे मुरारी ।।\n\nमुख मंडल तप तेज़ तुम्हारा ,\nनवखंडन प्रभु प्रेम तुमारा ,\nजग के कष्ट हरे मुरारी ।।\n\nमंद मंद मुस्काये कन्हैया ,\nनंद है बाबा जांके यशोदा मैया , \nशरण में राखो हरे मुरारे ।।"},"en":{"t":"Krishn Gopal Hare Murari","c":"Krishn Gopal Hare Murari"}},

	{"id":1768583454430,
	"pb":{"t":"ਮੈਂਹਦੀ ਤੇਰੇ ਨਾਮ ਦੀ ਰੰਗ ਚੜ੍ਹਿਆ ਗੂੜ੍ਹਾ","c":"ਮੈਂਹਦੀ ਤੇਰੇ ਨਾਮ ਦੀ ਰੰਗ ਚੜ੍ਹਿਆ ਗੂੜ੍ਹਾ , \nਰੱਬ ਦਾ ਰੰਗ ਪਛਾਣਦੀ ਰੰਗ ਪ੍ਰੀਤ ਦਾ ਗੂੜ੍ਹਾ ॥\n\nਏਹ ਮੈਂਹਦੀ ਦੀ ਚਮਕ ਨਿਰਾਲੀ , \nਭਾਗਾਂ ਦੇ ਨਾਲ ਚੜ੍ਹਦੀ ਲਾਲੀ , \nਭਗਤਾਂ ਦੀ ਵਖਰੀ ਸ਼ਾਨ ਦੀ ॥\n\nਏਹ ਮੈਂਹਦੀ ਤਾਂ ਗੁਰੂ ਲਗਾਂਦੇ , \nਨਾਮ ਵਾਲਾ ਰੰਗ ਚੜ੍ਹਾਂਦੇ , \nਰੱਬ ਦੇ ਘਰ ਨੂੰ ਜਾਣ ਦੀ ॥\n\nਰੰਗ ਮੈਂਹਦੀ ਦਾ ਜਿਸਨੂੰ ਚੜ੍ਹਦਾ , \nਦੁਨੀਆ ਦੀ ਪਰਵਾਹ ਨਹੀਂ ਕਰਦਾ , \nਨ ਭੁੱਖ ਰਹੇ ਕੁਝ ਖਾਣ ਦੀ ॥\n\nਏਹ ਮੈਂਹਦੀ ਕਿਸੇ ਮੋਲ ਨਾ ਮਿਲਦੀ , \nਸੋਨੇ ਚਾਂਦੀ ਤੋਲ ਨਾ ਮਿਲਦੀ , \nਕੀਮਤ ਸਿਰ ਨੂੰ ਕਟਾਉਣ ਦੀ ॥\n\nਮੈਂਹਦੀ ਵਾਲੇ ਲੈਣ ਨਜ਼ਾਰੇ , \nਉਹ ਨੇ ਰੱਬ ਦੇ ਭਗਤ ਪਿਆਰੇ , \nਸਤਿਗੁਰੂ ਬਲਿਹਾਰੇ ਜਾਣ ਦੀ ॥"},"hi":{"t":"मेंहदी तेरे नाम दी रंग चढिया गूढा","c":"मेंहदी तेरे नाम दी रंग चढिया गूढा ,\nरब दा रंग पछाणदी रंग प्रीत दा गूढा ।।\n\nएह मैंहदी दी चमक निराली ,\nभागा दे नाल चढ़दी लाली ,\nभगता दी वखरी शान दी ।।\n\nएह मैंहदी तां गुरू लगांदे ,\nनाम वाला रंग चढ़ांदे ,\nरब दे घर नू जाण दी ।।\n\nरंग मैंहदी दा जिसनूं चढ़दा ,\nदुनीयां दी परवाह नही करदा ,\nन भुख रहे कुछ खाण दी ।।\n\nएह मैंहदी किसे मोल ना मिलदी ,\nसोने चांदी तोल ना मिलदी ,\nकीमत सिर नू कटोन दी ।।\n\nमैंहदी वाले लैण नज़ारे ,\nउह ने रब दे भगत प्यारे ,\nसतगुरू बलीहारे जाण दी ।।"},"en":{"t":"Mehndi Tere Naam Di Rang Chadeya Guda","c":"Mehndi Tere Naam Di Rang Chadeya Guda"}},

	{"id":1768583759433,
	"pb":{"t":"ਭਗਤ ਪਿਆਰੇ ਰੱਬ ਨੂੰ","c":"ਜਿਵੇਂ ਮਾਪਿਆਂ ਨੂੰ ਪੁੱਤਰ ਪਿਆਰੇ ਜੀ , \nਭਗਤ ਪਿਆਰੇ ਰੱਬ ਨੂੰ ॥\n\nਅੰਮ੍ਰਿਤ ਵੇਲੇ ਉੱਠ ਨਾਮ ਨੂੰ ਧਿਆਉਂਦੇ ਨੇ , \nਸ਼ਰਧਾ ਦੇ ਨਾਲ ਜਿਹੜੇ ਹਰੀ ਗੁਣ ਗਾਉਂਦੇ ਨੇ , \nਗੁਰੂ ਚਰਨਾਂ ਚ ਵਕਤ ਗੁਜ਼ਾਰੇ ॥\n\nਗੁਰੂਆਂ ਦੇ ਦੱਸੇ ਹੋਏ ਰਾਹ ਅਪਣਾਉਂਦੇ ਨੇ , \nਹੱਸ ਹੱਸ ਸੂਲੀਆਂ ਨੂੰ ਸੀਨੇ ਨਾਲ ਲਾਉਂਦੇ ਨੇ , \nਐਸੇ ਭਗਤਾਂ ਤੋਂ ਜਾਵਾਂ ਬਲਿਹਾਰੇ ॥\n\nਹਰ ਵੇਲੇ ਰੱਬ ਨਾਲ ਜੁੜੀ ਰਹਿੰਦੀ ਤਾਰ ਜੀ , \nਸਾਧੂ ਅਤੇ ਸੰਗਤਾਂ ਨਾਲ ਕਰਦੇ ਨੇ ਪਿਆਰ ਜੀ , \nਸੱਚਖੰਡ ਵਾਲੇ ਲੈਂਦੇ ਨੇ ਨਜ਼ਾਰੇ ॥\n\nਮਿੱਠਾ ਮਿੱਠਾ ਬੋਲਣਾ ਉੱਚਾ ਉੱਚਾ ਸੋਚਣਾ , \nਹਰ ਵੇਲੇ ਗੁਰੂ ਦਾ ਦੀਦਾਰ ਇਕ ਲੋਚਣਾ , \n\\ਹਰ ਵੇਲੇ ਰਹਿਣਾ ਰੱਬ ਦੇ ਸਹਾਰੇ ॥\n\nਦੁੱਖ ਅਤੇ ਸੁੱਖ ਦੋਨੋਂ ਇੱਕੋ ਇੱਕ ਜਾਣਦੇ , \nਨਾਮ ਦੀ ਖੁਮਾਰੀ ਵਿਚ ਮੌਜਾਂ ਜਿਹੜੇ ਮਾਣਦੇ , \nਸਤਿਗੁਰ ਕਾਰਜ ਉਹਨਾਂ ਦੇ ਸਵਾਰੇ ॥"},"hi":{"t":"भगत प्यारे रब नू ","c":"जिवें मापयां नूं पुत्र प्यारे जी ,\nभगत प्यारे रब नू ।। \n\nअमृत वेले उठ नाम नूं धिऔंदे ने ,\nश्रृदा दे नाल जिहड़े हरी गुण गौंदे ने ,\nगुरू चरना च वक्त गुजारे ।। \n\nगुरूयां दे दसे होए राह अपनौंदे ने ,\nहस हस सुलीयां नूं सीने नाल लौंदे ने ,\nऐसे भगतां तों जावां बलिहारे ।।\n\nहर वेले रब नाल जुड़ी रंहदी तार जी ,\nसाधु अते सांगता नाल करदे ने प्यार जी ,\nसचखंड वाले लैंदे ने नजारे ।।\n\nमिठा मिठा बोलणा ऊचा ऊचा सोचणा ,\nहर वेले गुरू दा दीदार इक लोचणा ,\nहर वेले रहणा रब दे सहारे ।। \n\nदुख अते सुख दोनो इको इक जाणदे ,\nनाम दी खुमारी विच मौजा जिहड़े माणदे ,\nसतगुर काज ओहना दे सवारे ।।"},"en":{"t":"Bhagat Pyaare Rabb Nu","c":"Jive Maa Peya Nu Puttar Pyaare ,\nBhagat Pyaare Rabb Nu"}},

	{"id":1768586713108,
	"pb":{"t":"ਜਿਸ ਦਾ ਸਾਹਿਬੁ ਡਾਢਾ ਹੋਇ","c":"ਜਿਸ ਦਾ ਸਾਹਿਬੁ ਡਾਢਾ ਹੋਇ , \nਤਿਸ ਨੋ ਮਾਰਿ ਨ ਸਾਕੈ ਕੋਇ ॥\n\nਸਾਹਿਬ ਕੀ ਸੇਵਕੁ ਰਹੈ ਸਰਣਾਈ , \nਆਪੇ ਬਖਸੇ ਦੇ ਵਡਿਆਈ ॥ \nਤਿਸ ਤੇ ਊਪਰਿ ਨਾਹੀ ਕੋਇ , \nਕਉਣੁ ਡਰੈ ਡਰੁ ਕਿਸ ਕਾ ਹੋਇ ॥\n\nਗੁਰਮਤਿ ਸਾਂਤਿ ਵਸੈ ਸਰੀਰਿ , \nਸਬਦੁ ਚੀਨ੍ਹਿ ਫਿਰਿ ਲਗੈ ਨ ਪੀਰ ॥ \nਆਵੈ ਨ ਜਾਇ ਨਾ ਦੁਖੁ ਪਾਏ , \nਨਾਮੇ ਰਾਤੇ ਸਹਜਿ ਸਮਾਏ ॥\n\nਨਾਨਕ ਗੁਰਮੁਖਿ ਵੇਖੈ ਹਦੂਰਿ , \nਮੇਰਾ ਪ੍ਰਭੁ ਸਦ ਰਹਿਆ ਭਰਪੂਰਿ ॥"},"hi":{"t":"जिस दा साहिब डाढा होऐ","c":"जिस दा साहिब डाढा होऐ , \nतिस नु मार न साकै कोऐ ।। \n\nसाहिब की सेवक रहै शरणाई , \nआपे बखसे दे वडिआई ।।\nतिस ते ऊपर नाही कोऐ , \nकौण डरहे डर किस का होऐ ।।\n\nगुरमत शांत वसै शरीर , \nसबद चीन्ह फिर लगै न पीर ।।\nआवै न जाऐ ना दुख पाए , \nनामे रत्ते सहज समाए ।।\n\nनानक गुरमुख वेखै हदूर , \nमेरा प्रभ सद रहिआ भरपूर ।।"},"en":{"t":"Jis Da Sahib Dada Hoye","c":"Jis Da Sahib Dada Hoye"}},

	{"id":1768587477202,
	"pb":{"t":"ਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ","c":"ਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ , \nਊਚੇ ਅਪਾਰ ਬੇਅੰਤ ਸੁਆਮੀ , \nਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ , \nਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ...\n\nਗਾਵਤ ਉਧਰੇ ਸੁਣਤੇ ਉਧਰੇ , \nਬਿਨਸੇ ਪਾਪ ਘਨੇਰੇ , \nਊਚੇ ਅਪਾਰ ਬੇਅੰਤ ਸੁਆਮੀ , \nਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ ...\n\nਪਸੂ ਪਰੇਤ ਮੁਗਧ ਕਉ ਤਾਰੇ , \nਪਾਹਨ ਪਾਰਿ ਉਤਾਰੇ , \nਊਚੇ ਅਪਾਰ ਬੇਅੰਤ ਸੁਆਮੀ , \nਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ ...\n\nਨਾਨਕ ਦਾਸ ਤੇਰੀ ਸਰਣਾਈ , \nਸਦਾ ਸਦਾ ਬਲਿਹਾਰੇ , \nਊਚੇ ਅਪਾਰ ਬੇਅੰਤ ਸੁਆਮੀ , \nਕਉਣੁ ਜਾਣੈ ਗੁਣ ਤੇਰੇ ..."},"hi":{"t":"कौन जाने गुण तेरे","c":"कौन जाने गुण तेरे ,\nऊंचे अपार बेअंत स्वामी ,\nकौन जाने गुण तेरे ...\n\nगावत ऊधरे सुनते ऊधरे ,\nबिनसे पाप घनेरे ,\nऊंचे अपार बेअंत स्वामी ,\nकौन जाने गुण तेरे ...\n\nपशु परेत मुगद को तारे ,\nपाहन पार उतारे ,\nऊंचे अपार बेअंत स्वामी ,\nकौन जाने गुण तेरे ...\n\nनानक दास तेरी शरणाई ,\nसदा सदा बलिहारै ,\nऊंचे अपार बेअंत स्वामी ,\nकौन जाने गुण तेरे ..."},"en":{"t":"Kaun Jaane Gun Tere","c":"Kaun Jaane Gun Tere\nUch Apaar Beyant Swami\n"}},
	
	{"id":1768588175440,
	"pb":{"t":"ਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ","c":"ਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ , \nਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ , \nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਮੇਰੀ ਫ਼ਰਿਆਦ ਤੇਰੇ ਦਰ ਅੱਗੇ ਹੋਰ ਸੁਣਾਵਾਂ ਕਿਹਨੂੰ , \nਖੋਲ੍ਹ ਨਾ ਦਫ਼ਤਰ ਐਬਾਂ ਵਾਲੇ ਦਰ ਤੋਂ ਧੱਕ ਨਾ ਮੈਨੂੰ , \nਦਰ ਤੋਂ ਧੱਕ ਨਾ ਮੈਨੂੰ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਤੇਰੇ ਜੇਹਾ ਮੈਨੂੰ ਹੋਰ ਨਾ ਕੋਈ ਮੈਂ ਜੇਹੇ ਲੱਖ ਤੈਨੂੰ , \nਜੇ ਮੇਰੇ ਵਿਚ ਐਬ ਨਾ ਹੁੰਦੇ ਤੂੰ ਬਖ਼ਸ਼ੇਂਦਾ ਕਾਹਨੂੰ , \nਤੂੰ ਬਖ਼ਸ਼ੇਂਦਾ ਕਾਹਨੂੰ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਔਖੇ ਵੇਲੇ ਕੋਈ ਨਹੀਂ ਨਾ ਬਾਬੁਲ ਵੀਰ ਨਾ ਮਾਓ , \nਸਭੇ ਧੱਕੇ ਦੇਂਵਦੇ ਮੇਰੀ ਕੋਈ ਨਾ ਪਕੜੇ ਬਾਹੋਂ , \nਮੇਰੀ ਕੋਈ ਨਾ ਪਕੜੇ ਬਾਹੋਂ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਤੂੰ ਪਾਪੀ ਪਾਰ ਲੰਘਾਇਆ ਤੇਰਾ ਬਖ਼ਸ਼ਣਹਾਰਾ ਨਾਓ , \nਬਿਨ ਮੰਗਿਆ ਸਭ ਕੁਝ ਦੇਂਵਦਾ ਮੇਰਾ ਠਾਕੁਰ ਅਗਮ ਅਗਾਹੋ , \nਮੇਰਾ ਠਾਕੁਰ ਅਗਮ ਅਗਾਹੋ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਵੇਖ ਨਾ ਲੇਖ ਮੱਥੇ ਦੇ ਮੇਰੇ ਕਰਮਾਂ ਤੇ ਨਾ ਜਾਵੀਂ , \nਰੱਖੀ ਲਾਜ ਬਿਰਦ ਦੀ ਸਤਿਗੁਰੂ ਆਪਣੀ ਭਗਤੀ ਲਾਵੀਂ , \nਆਪਣੀ ਭਗਤੀ ਲਾਵੀਂ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਵਿਛੜ ਗਿਆ ਤੇਰੇ ਚਰਨਾਂ ਤੋਂ ਮੈਂ ਖੋਟਿਆਂ ਕਰਮਾਂ ਕਰਕੇ , \nਹਰੀ ਜੀ ਮੈਨੂੰ ਬਖ਼ਸ਼ ਲਵੋ ਪ੍ਰਭੂ ਆਪਣੀ ਕਿਰਪਾ ਕਰਕੇ , \nਪ੍ਰਭੂ ਆਪਣੀ ਕਿਰਪਾ ਕਰਕੇ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ ,\nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ ...\n\nਜਵਾਨੀ ਗਈ ਬੁਢੇਪਾ ਆਇਆ ਉਮਰਾਂ ਲੱਗੀ ਕਿਨਾਰੇ , \nਬੀਤੇ ਜੋ ਤੇਰੇ ਚਰਨਾਂ ਦੇ ਵਿਚ ਸੋਈ ਭਲੇ ਦਿਹਾੜੇ , \nਸੋਈ ਭਲੇ ਦਿਹਾੜੇ ਰੱਖੀ ਚਰਨਾਂ ਦੇ ਕੋਲ , \nਮਿਹਰਾਂ ਵਾਲਿਆ ਸਾਈਆਂ..."},"hi":{"t":"मेहराँ वालिया साइयाँ","c":"मेहराँ वालिया साइयाँ रखी चरना दे कॉल ,\nरखी चरना दे कोल रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nमेरी फ़रयाद तेरे दर अगे होर सुनावा किह्नु ,\nखोल न दफ्तर ऐबा वाले दर तो थक न मेनू ,\nदर तो थक न मेनू रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nतेरे जेहा मेनू होर न कोई मैं जेहे लख तेनु ,\nजे मेरे विच ऐब न हुँदै तू बखशेंदा कहणु ,\nतू बखशेंदा कहणु रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nऔखे वेले कोई नही न बाबुल वीर न माओ ,\nसबे थके देवदे मेरी कोई न पकड़े बाहों ,\nमेरी कोई न पकड़े बाहों रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nतू पापी पार लंगाया तेरा बक्शन हारा नाओ ,\nबिन मंग्या सब कुछ देवदा मेरा ठाकुर अगम अगाहो ,\nमेरा ठाकुर अगम अगाहो रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nवेख न लेख मथे दे मेरे करमा ते न जावी ,\nरखी लाज बिरद दी सतगुरु अपनी भगती लावी ,\nअपनी भगती लावी रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nविशड गया तेरे चरना तो मैं खोटियां कर्मा करके ,\nहरि जी मेनू बक्श लवो प्रभु अपनी किरपा करके ,\nप्रभु अपनी किरपा करके रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ...\n\nजवानी गई भुड़ापा आया उमरा लगी किनारे ,\nबीते जो तेरे चरना दे वोच सोई भले दिहाड़े ,\nसोई भले दिहाड़े रखी चरना दे कोल ,\nमेहराँ वालिया साइयाँ ..."},"en":{"t":"Mehra Valeya Saiyaan","c":"Mehra Valeya Saiyaan"}},

	{"id":1768588663192,
	"pb":{"t":"ਮੈਨੂੰ ਮੰਗਣਾ ਨਾ ਆਵੇ, ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ","c":"ਮੇਰੇ ਸਤਗੁਰ ਜੀ ਦਾਤਾਂ ਵੰਡਦੇ ਨੇ , \nਮੈਨੂੰ ਮੰਗਣਾ ਨਾ ਆਵੇ , ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥\n\nਲੱਖਾਂ ਦਰ ਆ ਕੇ ਐਥੋਂ ਮੰਗਦੇ ਨੇ , \nਮੂੰਹੋਂ ਮੰਗਦੇ ਨੇ ਨਹੀਂਓ ਸੰਗਦੇ ਨੇ , \nਮੇਰੇ ਸਤਗੁਰ ਜੀ ਕਿਰਪਾ ਕਰਦੇ ਨੇ , \nਮੈਨੂੰ ਲੈਣੀ ਨਾ ਆਵੇ ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥\n\nਗੁਰੂ ਦਰ ਆ ਕੇ ਜਿਹੜੇ ਝੁਕ ਜਾਂਦੇ , \nਉਹਦੇ ਜਨਮਾਂ ਦੇ ਪੈਂਡੇ ਮੁੱਕ ਜਾਂਦੇ , \nਫਲ ਨੀਵਿਆਂ ਰੁੱਖਾਂ ਨੂੰ ਲੱਗਦੇ ਨੇ , \nਮੈਨੂੰ ਝੁਕਣਾ ਨਾ ਆਵੇ ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥\n\nਗੁਰੂ ਘਰ ਜਿਹੜੇ ਸੇਵਾ ਕਰਦੇ ਨੇ , \nਉਹ ਜ਼ਿੰਦਗੀ ਚ ਮੌਜਾਂ ਕਰਦੇ , \nਦਾਤਾ ਸਾਰਿਆਂ ਨੂੰ ਦਾਤਾਂ ਵੰਡਦੇ ਨੇ , \nਝੋਲੀ ਅੱਡਣੀ ਨਾ ਆਵੇ ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥\n\nਲੱਖਾਂ ਦਰ ਆ ਕੇ ਦੁੱਖ ਦੱਸਦੇ ਨੇ , \nਰੋਂਦੇ ਆਉਂਦੇ ਨੇ ਜਾਂਦੇ ਹੱਸਦੇ ਨੇ , \nਦੁੱਖ ਕੱਟਦੇ ਨੇ ਮੇਰੇ ਸਤਗੁਰ ਜੀ , \nਮੈਨੂੰ ਦੱਸਣਾ ਨਾ ਆਵੇ ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥\n\nਗੁਰੂ ਨਾਮ ਵਾਲੀ ਐਸੀ ਮਸਤੀ ਐ , \nਬੜੀ ਮਹਿੰਗੀ ਐ ਨਾ ਇਹ ਸਸਤੀ ਐ , \nਪਿਆਲਾ ਨਾਮ ਵਾਲਾ ਸਤਗੁਰ ਪਿਲਾਉਂਦੇ ਨੇ , \nਮੈਨੂੰ ਪੀਣਾ ਨਾ ਆਵੇ ਤੇ ਮੈਂ ਕੀ ਕਰਾਂ ॥"},"hi":{"t":"मैनू मंगणा ना आवे , ते मै की करां","c":"मेरे सतगुर जी दातां वंडदे ने ,\nमैनू मंगणा ना आवे , ते मै की करां ।।\n\nलखां दर आ के एथों मंगदे ने ,\nमूंहों मंगदे ने नहींयों संगदे ने ,\nमेरे सतगुर जी किरपा करदे ने ,\nमैनू लैणी ना आवे ते मै की करां ।।\n\nगुरू दर आ के जिहड़े झुक जांदे ,\nओहदे जनमां दे पैंडे मुक जांदे ,\nफल नीवियां रुखां नूं लगदे ने ,\nमैनूं झुकणा ना आवे ते मैं की करां ।।\n\nगुरू घर जिहड़े सेवा करदे ने ,\nओह जिंदगी च मौजां करदे ,\nदाता सारेयां नूं दातां वंडदे ने ,\nझोली अडणी ना आवे ते मैं की करां ।।\n\nलखां दर आ के दुख दसदे ने ,\nरोंदे औंदे ने जांदे हसदे ने ,\nदुख कटदे ने मेरे सतगुर जी ,\nमैनू दसणा ना आवे ते मै की करां ।।\n\nगुरू नाम वाली ऐसी मस्ती ए ,\nबड़ी मंहगी ए ना एह सस्ती ए ,\nप्याला नाम वाला सतगुर पिलांदे ने ,\nमैनू पीना ना आवे ते मै की करां ।।"},"en":{"t":"Mainu Mangna Na Aave Te Mein Ki Kra","c":"Mainu Mangna Na Aave Te Mein Ki Kra"}},

	{"id":1768634053982,
	"pb":{"t":"ਸਤਗੁਰੂ ਮੇਰੇ ਕਲਮ ਹੱਥ ਤੇਰੇ","c":"ਸਤਗੁਰੂ ਮੇਰੇ ਕਲਮ ਹੱਥ ਤੇਰੇ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ , \nਮੈਂ ਵਾਰੀ ਮੈਂ ਵਾਰੀ ਵਾਰੀ ਜਾਵਾਂ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ ,\n\nਹੱਥਾਂ ਤੇ ਲਿਖ ਦੇ ਸੇਵਾ ਗੁਰਾਂ ਦੀ , \nਸੇਵਾ ਕਰਦੀ ਕਦੇ ਵੀ ਨਾ ਥੱਕਾਂ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ ...\n\nਪੈਰਾਂ ਚ ਲਿਖ ਦੇ ਸਤਸੰਗ ਜਾਣਾ , \nਸਤਸੰਗ ਸੁਣਦੀ ਕਦੇ ਵੀ ਨਾ ਥੱਕਾਂ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ ...\n\nਅੱਖਾਂ ਚ ਲਿਖ ਦੇ ਦਰਸ਼ਨ ਗੁਰਾਂ ਦਾ , \nਦਰਸ਼ਨ ਕਰਦੀ ਕਦੇ ਵੀ ਨਾ ਥੱਕਾਂ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ ...\n\nਸੁਆਸਾਂ ਚ ਲਿਖ ਦੇ ਨਾਮ ਗੁਰਾਂ ਦਾ , \nਨਾਮ ਜਪਦੀ ਕਦੇ ਵੀ ਨਾ ਥੱਕਾਂ , \nਕੇ ਸੋਹਣੇ ਸੋਹਣੇ ਲੇਖ ਲਿਖ ਦੇ ..."},"hi":{"t":"सतगुरु मेरे कलम हाथ तेरे","c":"सतगुरु मेरे कलम हाथ तेरे ,\nके सोहने सोहने लेख लिख दे ,\nमैं वारि मैं वारि वारि जावा ,\nके सोहने सोहने लेख लिख दे , \n\nहत्था च लिख दे सेवा गुरा दी ,\nसेवा करदी कदे वी ना थका ,\nके सोहने ...\n\nपैरा च लिख दे सत्संग जाना ,\nसत्संग सुंदे कदे वी ना थका ,\nके सोहने ...\n\nअखा च लिख दे दर्शन गुरां दा ,\nदर्शन करदी कदे वी ना थका ,\nके सोहने ...\n\nस्वासा च लिख दे नाम गुरां दा ,\nनाम जपदी कदे वी ना थका ,\nके सोहने ..."},"en":{"t":"Satguru Mere Kalam Hath Tere","c":"Satguru Mere Kalam Hath Tere"}},

	{"id":1768634929572,
