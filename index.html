	"pb":{"t":"ਕਰਦਾ ਏ ਦਿਲ ਯਾਦ ਤੈਨੂੰ ਮੇਰੇ ਦੋਸਤਾ","c":"ਕਰਦਾ ਏ ਦਿਲ ਯਾਦ , ਤੈਨੂੰ ਮੇਰੇ ਦੋਸਤਾ ,\nਕੋਈ ਨਹੀਂ ਵਸਾਹ ਹੁਣ , ਮੈਨੂੰ ਮੇਰੀ ਮੌਤ ਦਾ ,\nਹੁਣ ਰਹਿ ਗਿਆ ਆਖ਼ਰੀ ਸਾਹ , \nਅਬ ਤੋ ਆਜਾ ॥\n\nਮੇਰੇ ਖ਼ਿਆਲਾਂ 'ਚ , ਤੇਰੀ ਤਸਵੀਰ ਏ ,\nਮੇਰੇ ਨਾਲ ਰੁੱਸ ਗਈ ਮੇਰੀ ਤਕਦੀਰ ਏ ,\nਤਬੀਬ ਦਿੰਦਾ ਨਹੀਂ ਕੋਈ ਦਵਾ ॥\n\nਤੇਰਾ ਏਹ ਸਲੂਕ ਮੈਨੂੰ ਚੰਗਾ ਨਈਂਓਂ ਲੱਗਦਾ ,\nਤੇਰੇ ਬਗੈਰ ਮੇਰਾ ਜਨਾਜ਼ਾ ਨਈਂਓਂ ਫਬਦਾ ,\nਰਕੀਬ ਆਖਣਗੇ ਤੈਨੂੰ ਬੇਵਫ਼ਾ ॥\n\nਮੇਰਾ ਇਤਬਾਰ , ਮੇਰਾ ਯਕੀਨ ਸੀ ,\nਤੂੰ ਹੀ ਈਮਾਨ ਮੇਰਾ , ਤੂੰ ਹੀ ਦੀਨ ਸੀ ,\n' ਦਰਸਨ ' ਤੱਕਦਾ ਏ ਤੇਰਾ ਰਾਹ ॥"},"hi":{"t":"करदा ए दिल याद तैंनू मेरे दोस्ता","c":"करदा ए दिल याद , तैंनू मेरे दोस्ता , \nकोई नहीं वसाह हुण , मैनूं मेरी मौत दा , \nहुण रह गया आखिरी साह , \nअब तो आजा ।।\n\nमेरे ख्यालां 'च , तेरी तस्वीर ए , \nमेरे नाल रुस्स गई मेरी तकदीर ए , \nतबीब देंदा नहीं कोई दवा ।।\n\nतेरा एह सलूक मैंनूं चंगा नहींयो लगदा , \nतेरे बगैर मेरा जनाज़ा नईओं फबदा , \nरकीब आखनगे तैंनूं बेवफा ।।\n\nमेरा ऐतबार , मेरा यकीन सी , \nतूं ही ईमान मेरा , तूं ही दीन सी , \n' दर्शन ' तकदा ए तेरा राह ।।"},"en":{"t":"Karda E Dil Yaad Tenu Mere Dostaa","c":"Karda E Dil Yaad Tenu Mere Dostaa\nAb To Aaja"}},

	{"id":1769613864686,
	"pb":{"t":"ਸੁਣ ਸਾਹਿਬਾ ਸੁਣ","c":"\" \" \" \nਵੋ ਦਿਲ ਹੀ ਕਿਆ ਜੋ ਕਿਸੇ ਕਾ ਦਰਦ ਨਾ ਲੇ ,\nਵੋ ਮੁਹੱਬਤ ਹੀ ਕਿਆ ਜੋ ਜੁਦਾਈ ਨਾ ਦੇ ,\nਕਦਰਾਂ ਮੁਹੱਬਤ ਦੀਆਂ ਕੋਈ ਵਿਰਲਾ ਵਿਰਲਾ ਜਾਣੇ ,\nਮੁਹੱਬਤਾਂ ਦੇ ਸਿਤਮ ਸਿਰ ਆਸ਼ਕਾਂ ਦੇ ਲੱਗਦੇ ,\nਸੁਣਿਆ ਮੁਹੱਬਤਾਂ ਵਾਲੇ 'ਸੀ' ਨਹੀਂ ਕਰਦੇ ,\nਨੱਚ ਕੇ ਭਾਵੇਂ ਪੈ ਜਾਣ ਮਨਾਉਣੇ ,\nਮੁਹੱਬਤਾਂ ਵਾਲੇ ਨਹੀਂਓਂ ਮੁੜਦੇ ॥ \n\" \" \"\n\nਸੁਣ ਸਾਹਿਬਾ ਸੁਣ , ਤੂੰ ਵੀ ਖੱਟ ਪੁੰਨ ,\nਦੇ ਕੇ ਦੀਦਾਰ ਮੇਰੀ ਜ਼ਿੰਦਗੀ ਸੰਵਾਰ ਦੇ , \nਆਖੇ ਤੈਨੂੰ ਤੇਰੀ ਦਾਸਰੀ ॥\n\nਘਰ ਬਾਹਰ ਛੱਡਿਆ , ਛੱਡ ਦਿੱਤਾ ਜੱਗ ਵੇ ,\nਸੌਹਰੇ ਪੇਕੇ ਭੁੱਲੇ ਮੈਨੂੰ ਭੁੱਲ ਗਿਆ ਰੱਬ ਵੇ , \nਤੈਨੂੰ ਦਿਲ ਵਿਚ ਲਿਆ ਏ ਵਸਾ ॥\n\nਦਿਲ ਤੋੜ ਕੇ ਜਾਣ ਵਾਲੇ , ਮੇਰੀ ਵੀ ਸਦਾ ਲੈ ਜਾ ,\nਤੂੰ ਕੀ ਦਰਦ ਪਛਾਣੇ , ਜਾ ਵੇ ਤੂੰ ਬੇਦਰਦਾ , \nਕਿਉਂ ਸਜਣਾਂ ਨੂੰ ਭੁੱਲ ਗਯੋਂ ॥\n\nਵਫ਼ਾ ਦਿਆ ਵਾਲਿਆ , ਵਫ਼ਾ ਮੇਰੀ ਲੈ ਜਾ ,\nਲੋਕਾਂ ਦੇ ਸਾਹਮਣੇ ਮੈਨੂੰ ਆਪਣੀ ਕਹਿ ਜਾ , \nਸਾਡੇ ਦਿਲ ਵਿਚ ਏਹੋ ਚਾਅ ॥\n\nਟੁੱਟੇ ਹੋਏ ਦਿਲ ਦੀ ਤੋੜੀਂ ਨਾ ਆਸ ,\nਦੱਸ ਕੀਹਦੇ ਅੱਗੇ ਕਰੇ ' ਦਰਸਨ ' ਫਰਿਆਦ , \nਆਜਾ ਕੋਲ ਮੇਰੇ ਗਲ ਮੈਨੂੰ ਲਾ ॥"},"hi":{"t":"सुन साहिबा सुन","c":"\" \" \"\nवो दिल ही क्या जो किसी का दर्द न ले , \nवो मुहब्बत ही क्या जो जुदाई न दे ,\nकदरां मुहब्बत दीयां कोई विरला विरला जाणे , \nमुहब्बतां दे सितम सिर आशकां दे लगदे , \nसुणेयां मुहब्बतां वाले सी नहीं करदे , \nनच्च के भावें पै जाण मनाणे , \nमुहब्बतां वाले नहींयो मुड़दे ।। \n\" \" \"\n\nसुन साहिबा सुन , तूं वी खट्ट पुन्न , \nदेके दीदार मेरी जिंदगी सँवार दे , \nआखे तैनूं तेरी दासरी ।।\n\nघर बाहर छडिया , छड दित्ता जग वे ,\nसौहरे पेके भुले मैंनू भुल गया रब्ब वे , \nतेंनू दिल विच लेया ए वसा ।।\n\nदिल तोड़ के जाण वाले , मेरी वी सदा लै जा , \nतूं की दर्द पछाने , जा वे तूं बेदर्दा , \nक्यों सजनां नू भुल गेयां ।।\n\nवफ़ा देया वालिया , वफा मेरी लै जा , \nलोकां दे सामने मैंनूं आपनी कैह जा , \nसाडे दिल विच एहो चाअ ।।\n\nटुटे होए दिल दी तोड़ीं ना आस , \nदस कीहदे अगे करे ' दर्शन ' फरियाद , \nआजा कोल मेरे गल मैंनू ला ।।"},"en":{"t":"Sun Sahiba Sun ","c":"Sun Sahiba Sun "}},

	{"id":1769615306494,
	"pb":{"t":"ਮੇਰੀ ਝੋਲੀ ਵਿਚ ਖ਼ੈਰ ਤੂੰ ਪਾ ਦੇ","c":"ਪੂਜਿਆ ਵੇ ਤੈਨੂੰ ਮੈਂ , ਤੂੰ ਪੀਰਾਂ ਦਾ ਪੀਰ ਵੇ ,\nਤੇਰੇ ਕੋਲੋਂ ਮੰਗਦੀਆਂ ਪਿਆਰ ਵਾਲੀ ਭੀਖ ਵੇ ,\nਕਰ ਰਹਿਮਤਾਂ ਜਲਵਾ ਵਿਖਾਲ ਦੇ , \nਵੇ ਮੈਂ ਤੇਰੀ ਪੁਜਾਰਿਨ ॥\n\nਮੇਰੀ ਝੋਲੀ ਵਿਚ ਖ਼ੈਰ ਤੂੰ ਪਾ ਦੇ , \nਦਾਤਾ ਓ ਬਟਾਲੇ ਵਾਲਿਆ ,\nਮੇਰੀ ਸੁੱਤੀ ਹੋਈ ਕਿਸਮਤ ਜਗਾ ਦੇ , \nਦਾਤਾ ਓ ਬਟਾਲੇ ਵਾਲਿਆ ॥\n\nਖ਼ਾਲੀ ਨਾ ਮੋੜੋਂ ਮੈਨੂੰ , ਰੱਖ ਲਵੀਂ ਮਾਨ ਵੇ ,\nਮਾਰੇਗਾ ਬੋਲੀਆਂ ਸਾਰਾ ਜਹਾਨ ਵੇ , \nਵੇ ਤੂੰ ਪੀਰਾ ਕਰਮ ਕਮਾ ਦੇ ॥\n\nਦਿਲ ਚ ਵਸਾਇਆ ਤੈਨੂੰ , ਵਸਦਾ ਰੱਖੇਂ ਸਜਣਾਂ ,\nਦਿਲ ਚੀਰ ਕੇ ਮੈਂ ਕਿਸ ਤਰ੍ਹਾਂ ਦਿਖਾਵਾਂ ॥\n\nਦੁੱਖਾਂ ਦੇ ਸਿਰਹਾਣੇ ਦੇ ਕੇ ਗ਼ਮਾਂ ਦੀਆਂ ਚਾਦਰਾਂ ,\nਰੋਜ਼ ਸਵਾਵਾਂ ਫਿਰ ਵੀ ਨਹੀਂ ਸੌਂਦੀਆਂ , \nਤੇਰੀਆਂ ਮਿੱਠੀਆਂ ਤੇ ਫਿੱਕੀਆਂ ਯਾਦਾਂ ॥\n\nਸੁਣ ਕੇ ਸੋਭਾ ਤੇਰੀ ਮੱਲਿਆ ਦਵਾਰਾ ਵੇ ,\nਦੋ ਜਹਾਨੀਂ ਤੇਰਾ ਚਮਕਦਾ ਸਿਤਾਰਾ ਵੇ , \nਮੇਰੀ ਡੁੱਬਦੀ ਬੇੜੀ ਨੂੰ ਬੰਨੇ ਲਾ ਦੇ ॥\n\nਬੁੱਝਣ ਤੇ ਆ ਗਏ ਨੇ ਅੱਖੀਆਂ ਦੇ ਦੀਵੇ ,\nਥਰ ਥਰ ਕੰਬਦਾ ਐ ਮੇਰਾ ਦਿਲ ਵੇ , \nਜੀਭਾ ਜਪਦੀ ਨਈਂਓਂ ਤੇਰਾ ਨਾਉਂ ॥\n\nਪੀਰਾਂ ਦਾ ਪੀਰ ਵੇ ਤੂੰ ਸ਼ਾਹੀ ਫ਼ਕੀਰ ਵੇ ,\nਬਣਦੀ ਵੇਖੀ ਮੈਂ ਵਿਗੜੀ ਤਕਦੀਰ ਵੇ , \nਮੇਰੀ ਟੁੱਟੀ ਹੋਈ ਗੰਢ ਕੇ ਵਿਖਾ ਦੇ ॥\n\nਘਰ ਬਾਹਰ ਛੱਡਿਆ ਮੈਂ , ਛੱਡ ਦਿੱਤਾ ਜੱਗ ਵੇ ,\nਪੇਕੇ ਸੌਹਰੇ ਭੁੱਲੇ ਮੈਨੂੰ , ਭੁੱਲ ਗਿਆ ਰੱਬ ਵੇ , \nਤੈਨੂੰ ਦਿਲ ਚ ਮੈਂ ਲਿਆ ਏ ਵਸਾ ॥\n\nਜਾਗ ਜਾਗ ਕੱਟ ਦਿੱਤੇ ਜ਼ਿੰਦਗੀ ਦੇ ਦਿਨ ਸਾਰੇ ,\nਯਾਦਾਂ ਦੇ ਪਲੰਘਾਂ ਤੇ ਉਮੀਦਾਂ ਨੇ ਪਲਸੇਟੇ ਮਾਰੇ , \nਕਦੋਂ ਆਵੇਗੀ ਵਸਲ ਵਾਲੀ ਰਾਤ ॥\n\nਚਾਰੇ ਚਿਰਾਗ ਤੇਰੇ ਹਰਦਮ ਜਗਦੇ ,\nਮੇਰਾ ਦੀਵਾ ਬਾਲ ਜਿਵੇਂ ਬਾਲਦਾ ਐਂ ਸਭ ਦੇ , \nਮੇਰਾ ਬੁੱਝਿਆ ਦੀਵਾ ਜਗਾ ਦੇ ॥\n\n\" \" \"\nਨਾ ਮੈਂ ਪੂਜੀ ਪ੍ਰਾਤਹ ਕਾਲ , ਨਾ ਮੈਂ ਸੰਧਿਓ ਕੀਓ ,\nਨਾ ਮੈਂ ਨਿੱਤ ਨੇਮ ਪਾਠੀਆ , ਨਾ ਤੀਰਥ ਇਸ਼ਨਾਨ ਗੇਓ ,\nਜਬ ਸੇ ਸਾਂਈ ' ਦਰਸਨ ' ਮਿਲਿਆ \nਮੁੱਕ ਗਏ ਗਲਾਵੇ ਈਓਂ ॥\n\" \" \""},"hi":{"t":"मेरी झोली विच खैर तूं पा दे","c":"पूजेया वे तैनूं मैं , तूं पीरां दा पीर वे , \nतेरे कोलों मंगदीयां प्यार वाली भीख वे , \nकर रैहमतां जलवा विखाल दे , \nवे मैं तेरी पुजारिन ।।\n\nमेरी झोली विच खैर तूं पा दे , \nदाता ओ बटाले वालेया , \nमेरी सुत्ती होई किस्मत जगा दे , \nदाता ओ बटाले वालेया ।।\n\nखाली ना मोड़ों मैनूं , रख लवीं मान वे , \nमारेगा बोलीयां सारा जहान वे , \nवे तूं पीरा कर्म कमा दे ।।\n\nदिल च वसाया तैनू , वसदा रखें सजनां , \nदिल चीर के मैं किस तरां दिखावां ।।\n\nदुखां दे सिरहाने देके गमां दीयां चादरां , \nरोज सवावां फिर वी नई सौंदीयां , \nतेरीयां मिट्ठीयां ते फिक्कीयां यादां ।।\n\nसुन के सोभा तेरी मल्लेया दवारा वे , \nदो जहानीं तेरा चमकदा सितारा वे , \nमेरी डुबदी वेड़ी नृ बन्ने ला दे ।।\n\nबुझण ते आ गए ने अखीयां दे दीवे , \nथर थर कंबदा ऐ मेरा दिल वे , \nजीभा जपदी नईयों तेरा नाओं ।।\n\nपीरां दा पीर वे तूं शाही फकीर वे , \nबनदी वेखी मैं बिगड़ी तकदीर वे , \nमेरी टुट्टी होई गंड के विखा दे ।।\n\nघर बाहर छडिया मैं , छड दिता जग वे , \nपेके सौहरे भुल्ले मैंनू , भुल गया रब्ब वे , \nतैनूं दिल च मैं लिया ए वसा ।।\n\nजाग जाग कट दित्ते जिंदगी दे दिन सारे , \nयादां दे पलंघां ते उम्मीदां ने पलसेटे मारे , \nकदों आवेगी वसल वाली रात ।।\n\nचारे चिराग तेरे हरदम जगदे , \nमेरा दीवा बाल जिवें बालदा ऐं सब दे , \nमेरा बुझेया दीवा जगा दे ।।\n\n\" \" \"\nना मैं पूजी प्रातः काल , ना मैं संधियो कीओ , \nना मैं नित नेम पाठिया , ना तीर्थ इश्नान गेयो ,\nजब से सांई ' दर्शन ' मिलया \nमुक गए गलावे ईओं ।।\n\" \" \""},"en":{"t":"Meri Jholi Vich Khair Tu Paa De ","c":"Meri Jholi Vich Khair Tu Paa De "}},

	{"id":1769615733360,
	"pb":{"t":"ਇਕ ਸੀ ਰਾਜਾ ਤੇ ਰਾਣੀ","c":"ਹੁਣ ਸੁਣੋ ਰਾਜੇ ਰਾਣੀ ਦਾ ਕਿੱਸਾ , \nਹੁੰਦਾ ਪਿਆਰ ਕਿਸੇ ਨਾ ਡਿੱਠਾ ॥\n\nਰਾਣੀ ਨੇ ਮੰਨ ਲਿਆ ਰਾਜੇ ਨੂੰ ਰੱਬ ਸੀ , \nਰਾਜਾ ਮਿਲਿਆ ਰੱਬ ਦੇ ਸਬਬ ਸੀ ,\nਪਿਆਰ ਤੇ ਚੱਲੇ ਨਾ ਕੋਈ ਜੋਰ ॥\n\nਵਸਦੇ ਦੋਨੋਂ ਦੇਸ ਬੇਗਾਨੇ , \nਕੀਤੇ ਕੌਲ ਪੈਂਦੇ ਨਿਭਾਣੇ ,\nਕਹਿ ਗਏ ਪੀਰ ਫ਼ਕੀਰ ਸਿਆਣੇ , \nਪਿਆਰ ਹੋਵੇ ਨੀ ਜੋਰੋ ਜੋਰ ॥\n\nਮੇਰੇ ਰਾਜਾ ਮੇਰੇ ਮਹਾਰਾਜਾ , \nਤੈਨੂੰ ਪੂਜੇ ਸਾਰਾ ਸੰਸਾਰ ,\nਮੇਰੇ ਪਿਆਰ ਤੇ ਕਰ ਇਤਬਾਰ , \nਮੈਂ ਹਾਂ ਤੇਰੀ ਦੀਵਾਨੀ ॥\n\nਸੁਣੋ ਲੋਕੋ ਪਤੇ ਦੀ ਗੱਲ , \nਰੂਹ ਸੀ ਰਾਣੀ , ਰਾਜਾ ਸੀ ਰਾਮ ,\nਨਾਦ ਵਜੇ ਅਨਹਦ , \nਤੂੰ ਹੀ ਤੂੰ ਹੀ ਮੇਰੇ ਸਾਹਿਬਾ ,\nਇਕ ਸੀ ਰਾਜਾ ਤੇ ਰਾਣੀ , \nਕਹਿ ਗਏ ਪੀਰ ਫ਼ਕੀਰ ਸਿਆਣੇ ॥"},"hi":{"t":"इक था राजा ते रानी","c":"हुण सुनों राजे रानी दा किस्सा , \nहुंदा प्यार किसे ना डिट्ठा ।।\n\nरानी ने मन लिया राजे नूं रब्ब सी , \nराजा मिलिया रब्ब दे सबब सी , \nप्यार ते चल्ले ना कोई जोर ।।\n\nवसदे दोनों देस बेगाने , \nकीते कौल पैंदे निभाणें , \nकह गए पीर फकीर सयाणें , \nप्यार होवे नी जोरो जोर ।।\n\nमेरे राजा मेरे महाराजा , \nतैनूं पूजे सारा संसार , \nमेरे प्यार ते कर ऐतबार , \nमैं हां तेरी दीवानी ।।\n\nसुनो लोको पते दी गल , \nरूह थी रानी , राजा था राम , \nनाद वजे अनहद , \nतूं ही तूं ही मेरे साहिबा , \nइक था राजा ते रानी , \nकह गए पीर फकीर सयाणें ।।"},"en":{"t":"Ik Tha Raja Te Rani","c":"Ik Tha Raja Te Rani"}},

	{"id":1769615891272,
	"pb":{"t":"ਸਾਡੀਆਂ ਤੋੜ ਚੜ੍ਹਾ ਦੇ","c":"ਸਾਡੀਆਂ ਤੋੜ ਚੜ੍ਹਾ ਦੇ ਮੁਹੱਬਤਾਂ , \nਵੇ ਰੱਬਾ ਤੈਨੂੰ ਸੌਂਹ ਪਿਆਰ ਦੀ ॥\n\nਮੁੱਖ ਮੇਰੇ ਯਾਰ ਦਾ ਰੱਬ ਵਾਂਗੂੰ ਜਾਪਦਾ ,\nਯਾਰ ਦਾ ਦੀਦਾਰ ਮੇਰੀ ਸੋਹਣੀ ਸਰਕਾਰ ਦਾ , \nਮੈਨੂੰ ਇਕ ਵਾਰੀ ਦੀਦਾਰ ਕਰਾ ਦੇ ॥\n\nਯਾਰ ਆਵੇ ਤੇ ਆਵੇ ਬਹਾਰ , \nਕੋਈ ਸਾਡੇ ਨਾਲ ਕਰ ਕੌਲ ਤੇ ਕਰਾਰ ,\nਸਾਨੂੰ ਦੱਸ ਜਾ ਵੇ ਕੋਈ ਟਿਕਾਣਾ ॥\n\nਕੂਕ ਸੁਣੇ ਜੇ ਰੱਬ ਮੇਰੇ ਪਿਆਰ ਦੀ ,\nਮੈਂ ਮੰਗਤੀ ਵੇ ਤੇਰੇ ਦਰਬਾਰ ਦੀ , \nਪਾਵਾਂ ਵਾਸਤੇ ਤੇ ਅਰਜ਼ ਗੁਜ਼ਾਰਾਂ ,\n' ਦਰਸਨ ' ਦੀ ਝੋਲੀ ਖ਼ੈਰ ਪਾ ਜਾ ॥"},"hi":{"t":"साडीयां तोड़ चढ़ा दे","c":"साडीयां तोड़ चढ़ा दे मुहब्बतां , \nवे रब्बा तैनूं सौंह प्यार दी ।।\n\nमुख मेरे यार दा रब्ब वागूं जापदा , \nयार दा दीदार मेरी सोहनी सरकार दा , \nमैंनू इक वारी दीदार करा दे ।।\n\nयार आवे ते आवे बहार , \nकोई साडे नाल कर कौल ते करार , \nसानूं दस जा वे कोई टिकाना ।।\n\nकूक सुने जे रब्ब मेरे प्यार दी , \nमैं मंगती वे तेरे दरबार दी , \nपावां वासते ते अर्ज़ गुजारां , \n' दर्शन ' दी झोली खैर पा जा ।।"},"en":{"t":"Sadiyaan Tod Chada De","c":"Sadiyaan Tod Chada De"}},

	{"id":1769616070805,
	"pb":{"t":"ਛੋਟੀ ਛੋਟੀ ਬਾਤਾਂ ਪੇ ਨਾ ਲੜਿਆ ਕਰੋ","c":"ਛੋਟੀ ਛੋਟੀ ਬਾਤਾਂ ਪੇ ਨਾ ਲੜਿਆ ਕਰੋ ,\nਰੱਬ ਦੀ ਕਸਮ ਕੁਝ ਡਰਿਆ ਕਰੋ ॥\n\nਅੱਖੀਆਂ ਪਿਆਸੀਆਂ ਦੀ ਪਿਆਸ ਮਿਟਾ ਦੇ ,\nਦੋ ਘੁੱਟ ਮੈਨੂੰ ਵੀ , ਜਵਾਨੀ ਦੇ ਪਿਲਾ ਦੇ , \nਨੇਕੀ ਵਾਲਾ ਕੰਮ ਤੁਸੀ ਕਰਿਆ ਕਰੋ ॥\n\nਤੇਰੇ ਨਾਲ ਪਿਆਰ ਕੀਤਾ , ਦਿਲ ਚ ਵਸਾਇਆ ,\nਅੜੀਏ ਤੂੰ ਪਿਆਰ ਦਾ , ਕਦਰ ਨਈਂਓਂ ਪਾਇਆ , \nਪਿਆਰ ਵਾਲੀ ਗੱਲ ਕੋਈ ਕਰਿਆ ਕਰੋ ॥\n\nਹੱਸ ਹੱਸ ਸੋਹਣੀਏ ਤੂੰ ਹਰ ਰੋਜ਼ ਲੁੱਟਿਆ ,\nਹੁਣ ਤੇਰੇ ਰੋਸਿਆਂ ਨੇ ਮੈਨੂੰ ਮਾਰ ਸੁਟਿਆ , \nਗੁੱਸਾ ਤੁਸੀ ਐਵੇਂ ਨਾ ਕਰਿਆ ਕਰੋ ॥\n\nਚਿੱਠੀ ਸਾਡੇ ਪਿਆਰ ਵਾਲੀ ਕਰ ਮੰਜ਼ੂਰ ਵੇ ,\nਛੱਡ ਦੇ ਤੂੰ ਆਪਣੇ ਏਹ ਰੂਪ ਦਾ ਗਰੂਰ ਵੇ , \n' ਦਰਸਨ ' ਦਾ ਇਤਬਾਰ ਕਦੇ ਕਰਿਆ ਕਰੋ ॥"},"hi":{"t":"छोटी छोटी बातों पे ना लड़ेया करो","c":"छोटी छोटी बातों पे ना लड़ेया करो , \nरब दी कसम कुछ डरेया करो ।।\n\nअंखीयां प्यासीयां दी प्यास मिटा दे , \nदो घुट मैनूं वी , जवानी दे पिला दे , \nनेकी वाला कम तुसी करेया करो ।।\n\nतेरे नाल प्यार कीता , दिल च वसाया , \nअड़ीए तूं प्यार दा , कदर नईयों पाया , \nप्यार वाली गल कोई करेया करो ।।\n\nहस हस सोहणीये तूं हर रोज लुट्टेया , \nहुण तेरे रोसेयां ने मैनूं मार सुट्ट्या , \nगुस्सा तुसी एँवे ना करिया करो ।।\n\nचिट्ठी साडे प्यार वाली कर मंजूर वे , \nछड दे तूं अपने एह रूप दा गरूर वे , \n' दर्शन ' दा एतबार कदे करेया करो ।।"},"en":{"t":"Choti Choti Baato Pe Na Ladeya Karo","c":"Choti Choti Baato Pe Na Ladeya Karo"}},

	{"id":1769616256310,
	"pb":{"t":"ਮੈਨੂੰ ਤੇਰੀਆਂ ਉਡੀਕਾਂ ਵੇ","c":"ਮੈਨੂੰ ਤੇਰੀਆਂ ਉਡੀਕਾਂ ਵੇ ਆਜਾ ਘੜੀ ਦੀ ਘੜੀ ,\nਮੈਨੂੰ ਦੱਸ ਜਾ ਤਰੀਕਾਂ ਵੇ ਆਜਾ ਘੜੀ ਦੀ ਘੜੀ ॥\n\nਤੇਰੇ ਲਈ ਚੰਨਾ ਅਸੀਂ ਬੂਹੇ ਖੋਲ ਰੱਖੇ ,\nਕੋਈ ਮੈਨੂੰ ਆ ਕੇ ਏਹ ਗੱਲ ਦੱਸੇ ,\nਤੇਰਾ ਮਾਹੀ ਗਲੀ ਵਿਚ ਆ ਨੀ ਗਿਆ ॥\n\nਮੁੱਕ ਗਈਆਂ ਧੁੱਪਾਂ ਢਲ ਗਏ ਪਰਛਾਵੇਂ ,\nਦਿਲ ਵਿਚ ਉੱਠਦੀਆਂ ਸੋਹਣਿਆਂ ਹਾਵੇਂ ,\nਕਿਸ ਬੈਰਨ ਤੈਨੂੰ ਰੋਕ ਲਿਆ ॥\n\nਭੁੱਲ ਗਿਆ ਵਾਦਾ ਸਾਡੇ ਕੋਲ ਆਉਣ ਦਾ ,\nਲੱਭਾਂ ਕਿਹੜਾ ਪੱਜ ਯਾਰਾ ਤੈਨੂੰ ਮੈਂ ਮਨਾਉਣ ਦਾ ,\n' ਦਰਸਨ ' ਦਿਲ ਚ ਵਸਾ ਮੈਂ ਲਿਆ ॥"},"hi":{"t":"मैनूं तेरीयां उडीकां वे","c":"मैनूं तेरीयां उडीकां वे आजा घड़ी दी घड़ी ,\nमैनूं दस जा तरीकां वे आजा घड़ी दी घड़ी ।।\n\nतेरे लई चन्ना असीं बूहे खोल रखे , \nकोई मैनूं आ के एह गल दस्से , \nतेरा माही गली विच आ नी गया ।।\n\nमुक गईयां धुप्पां ढल गए परछावें , \nदिल विच उठदीयां सोहणेयां हावें , \nकिस बैरन तैनूं रोक लेया ।।\n\nभुल गया वादा साडे कोल औण दा , \nलभां केहड़ा पज यारा तैनूं मैं मनौण दा , \n' दर्शन ' दिल च वसा मैं लेया ।।"},"en":{"t":"Mainu Teriyaan Udika Ve","c":"Mainu Teriyaan Udika Ve"}},

	{"id":1769616498663,
	"pb":{"t":"ਅਸੀਂ ਲੱਭ ਬਹਾਨਾ ਲਿਆ","c":"ਅਸੀਂ ਲੱਭ ਬਹਾਨਾ ਲਿਆ , \nਮਾਹੀ ਦੇ ਕੋਲ ਜਾਣ ਵਾਲਾ ॥\n\nਦਿਲ ਮੇਰਾ ਆਖਦਾ ਏ ਮਾਹੀ ਕੋਲ ਜਾ ਕੇ ,\nਦਿਲ ਵਾਲਾ ਦੁੱਖੜਾ ਆਵਾਂ ਮੈਂ ਸੁਣਾ ਕੇ ,\nਕਿਹੜੀ ਗੱਲੋਂ ਮੁੱਖ ਮੋੜ ਲਿਆ , \nਮਾਹੀ ਮੇਰੇ ਹਾਣ ਦਿਆ ॥\n\nਆਵੇਗਾ ਮਾਹੀ ਗੱਲ ਕਰਾਂਗੀ ਜ਼ਰੂਰ ਮੈਂ ,\nਹੋਇਆ ਕੀ ਕਸੂਰ ਪੁੱਛ ਲਵਾਂਗੀ ਜ਼ਰੂਰ ਮੈਂ ,\nਸਾਨੂੰ ਸਾਡਾ ਕਸੂਰ ਦੱਸ ਜਾ , \nਵੇ ਕਿਹੜੀ ਗੱਲੋਂ ਮੁੱਖ ਮੋੜਿਆ ॥\n\nਦਰਦ ਸਾਡੇ ਦਿਲ ਦਾ ਕੋਈ ਨਾ ਜਾਣੇ ,\nਜਿਹਨੂੰ ਹੋਵੇ ਪਿਆਰ ਉਹੀ ਦਰਦ ਪਛਾਣੇ ,\nਬੇਦਰਦੀ ਹੁਣ ਆ ਵੀ ਜਾ , \nਵੇ ਕਿਹੜੀ ਗੱਲੋਂ ਦੂਰ ਨੀ ਗਯਾ ॥\n\nਮਿਲ ਜਾਵੇ ਰੱਬ ਜੇ ਮਾਹੀ ਦੇ ਬਹਾਨੇ ,\nਉਸਨੂੰ ਵੀ ਆਖਾਂ ਅਸੀਂ ਤੇਰੇ ਨਹੀਂ ਦੀਵਾਨੇ ,\n'ਦਰਸਨ' ਮਾਹੀ ਤੂੰ ਬਣ ਕੇ ਆ , \nਰੱਬਾ ਵੇ ਮੇਰੇ ਪਿਆਰ ਦੇ ਪਿੱਛੇ ॥"},"hi":{"t":"असी लब्ब बहाना लेया","c":"असी लब्ब बहाना लेया , \nमाही दे कोल जान वाला ।।\n\nदिल मेरा आखदा ए माही कोल जा के , \nदिल वाला दुखड़ा आवां मैं सुना के , \nकेहड़ी गल्लों मुख मोड़ लेया , \nमाही मेरे हाण देया ।।\n\nआवेगा माही गल करांगी जरूर मैं , \nहोया की कसूर पुछ लवांगी जरूर मैं , \nसानूं साडा कसूर दस जा , \nवे केहड़ी गल्लों मुख मोड़ेया ।।\n\nदर्द साडे दिल दा कोई ना जाणे , \nजीनूं होवे प्यार ओही दर्द पछाणें , \nबेदर्दी हुण आ वी जा , \nवे केहड़ी गल्लों दूर नी गया ।।\n\nमिल जावे रब्ब जे माही दे बहाने , \nउसनूं वी आखां असीं तेरे नई दीवाने , \n' दर्शन ' माही तूं बन के आ , \nरब्बा वे मेरे प्यार दे पिछे ।।"},"en":{"t":"Assi Lab Bahana Leya","c":"Assi Lab Bahana Leya"}},

	{"id":1769616781029,
	"pb":{"t":"ਅਸੀਂ ਚਿੱਟੇ ਦਿਨ ਦੇਖ ਲਿਆ","c":"ਅਸੀਂ ਚਿੱਟੇ ਦਿਨ ਦੇਖ ਲਿਆ , \nਨੀ ਮਾਹੀ ਮੇਰਾ ਬੁੱਕਲ ਦੇ ਵਿਚ ॥\n\nਯਾਰ ਆਉਣ ਦੀਆਂ ਮੈਨੂੰ ਉਮੀਦਾਂ ਸੀ ,\nਰੋਜ਼ੇ ਰੱਖੇ ਮਨਾਈਆਂ ਈਦਾਂ ਸੀ , \nਸ਼ਾਲਾ ਕਿਸੇ ਵੀ ਬਹਾਨੇ ਆ ਜਾ ॥\n\nਮੇਰੇ ਯਾਰ ਦਾ ਮੁਖੜਾ ਪਿਆਰਾ , \nਸਭ ਤੋਂ ਸੋਹਣਾ ਹੈ ਬੜਾ ਨਿਆਰਾ ,\nਅਸਾਂ ਵੇਖਿਆ ਏ ਸਵਰਗ ਦਾ ਨਜ਼ਾਰਾ ॥\n\nਮੇਰੇ ਯਾਰ ਦੇ ਮੱਥੇ ਤੇ ਤਿਉੜੀਆਂ , \nਗੱਲਾਂ ਕਰਨੀਆਂ ਨੇ ਪਿਆਰ ਦੀਆਂ ਗੂੜ੍ਹੀਆਂ ,\nਅਸਾਂ ਮਿਲਣ ਦਾ ਬਹਾਨਾ ਲੱਭ ਲਿਆ ॥\n\nਯਾਰ ਵੇਖਦਾ ਏ ਮੈਨੂੰ ਸ਼ਰਮਾ ਕੇ , \nਗੋਰੇ ਮੁੱਖ ਤੋਂ ਦੁਪੱਟਾ ਹਟਾ ਕੇ ,\nਨੀ ਅਸਾਂ ਕਰ ਦੀਦਾਰ ਲਿਆ ॥\n\nਉੱਠ ਯਾਰ ਨੇ ਫੜ ਲਈ ਮੇਰੀ ਬਾਂਹ ਨੀ ,\n'ਦਰਸਨ' ਕਰ ਨਾ ਸਕੀ ਮੈਂ ਨਾਂਹ ਨੀ , \nਡਰ ਕਜ਼ਾ ਵਾਲਾ ਮੁੱਕ ਨੀ ਗਿਆ ॥"},"hi":{"t":"असीं चिट्टे दिन देख लेया","c":"असीं चिट्टे दिन देख लेया , \nनी माही मेरा बुक्कल दे विच ।।\n\nयार आण दीयां मैनूं उम्मीदां सी , \nरोजे रखे मनाईयां ईदां सी ,\nशाला किसे वी बहाने आ जा ।।\n\nमेरे यार दा मुखड़ा प्यारा ,\nसब तों सोहणा है बड़ा न्यारा , \nअसां वेखिया ए स्वर्ग दा नज़ारा ।।\n\nमेरे यार दे मत्थे ते तिऊड़ीयां , \nगलां करनीयां ने प्यार दीयां गूड़ीयां , \nअसां मिलण दा बहाना लब्ब लेया ।।\n\nयार वेखदा ए मैनूं शरमा के , \nगोरे मुख तों दुप्पटा हटा के , \nनी असां कर दीदार लेया ।।\n\nउठ यार ने फड़ लई मेरी बांह नी , \n' दर्शन ' कर ना सकी मैं नांह नी , \nडर कज़ा वाला मुक नी गया ।।"},"en":{"t":"Assi Chitte Din Dekh Leya","c":"Assi Chitte Din Dekh Leya"}},

	{"id":1769617018241,
	"pb":{"t":"ਵੇ ਕਦੋਂ ਆਵੇਂਗਾ ਤੂੰ ਹਾਣੀਆਂ","c":"ਵੇ ਕਦੋਂ ਆਵੇਂਗਾ ਤੂੰ ਹਾਣੀਆਂ , \nਅੱਖਾਂ ਥੱਕ ਗਈਆਂ , ਤੱਕ ਤੱਕ ਰਾਹ ॥\n\nਜਦੋਂ ਦਾ ਤੁਰ ਗਯੋਂ ਛੱਡ ਕੇ ਤੂੰ ਹਾਣੀਆਂ ,\nਰੋਂਦੀਆਂ ਨੇ ਓਦੋਂ ਦੀਆਂ ਅੱਖੀਆਂ ਨਿਮਾਣੀਆਂ , \nਇਕ ਪਲ ਵੀ ਨਾ ਲੈਂਦੀਆਂ ਸਾਹ ॥\n\nਕੰਮਾਂ ਦੀ ਵਿਹਲ ਤੋਂ , \nਵਿਹਲੀ ਹੋ ਕੇ ਬੈਠ ਜਾਵਾਂ ,\nਤੇਰੇ ਆਉਣ ਦੀਆਂ ਮੈਂ ਅਉਸੀਆਂ ਪਾਵਾਂ , \nਮੈਂ ਕੋਠੇ ਤੋਂ ਉਡਾਂਦੀਆਂ ਕਾਂ ॥\n\nਹਾਲ ਮੇਰਾ ਵੇਖ , ਲੋਕ ਭੈੜੇ ਨੇ ਹੱਸਦੇ ,\nਨਾਂ ਤੇਰਾ ਲੈ ਕੇ , ਮੈਨੂੰ ਤਾਹਣੇ ਨੇ ਕਸਦੇ , \nਦਿਲ ਹੁਣ ਹੋ ਗਿਆ ਸਵਾਹ ॥\n\nਹਾਣੀਆਂ ਵੇ ਤੂੰ , ਇਕ ਵਾਰੀ ਆ ਜਾ ,\nਲੋਕਾਂ ਦੇ ਸਾਹਮਣੇ ਹਾਂ , ਆਪਣੀ ਬਣਾ ਜਾ , \nਹੁਣ ਦਿਲ ਪਿਆ ਏਹੋ ਆਖਦਾ ॥\n\nਦਿਲ ਨੂੰ ਤਸੱਲੀ ਦੇਵਾਂ , ਅੱਖੀਆਂ ਨੂੰ ਦਿਲਾਸੇ ,\nਪ੍ਰੀਤ ਕੀਤੀ ਹਾਣੀਆਂ , ਤੇਰੇ ਭਰਵਾਸੇ , \n' ਦਰਸਨ ' ਨੂੰ ਨਾ ਆਖੀਂ ਬੇਵਫ਼ਾ ॥"},"hi":{"t":"वे कदों आवेंगा तूं हाणीयां","c":"वे कदों आवेंगा तूं हाणीयां , \nअखां थक गईयां , तक तक राह ।।\n\nजदों दा तुर गेयों छड के तूं हाणीयां , \nरोंदीयां ने ओदों दीयां अखीयां निमाणीयां , \nइक पल वी न लैंदीयां साह ।।\n\nकम्मां दी वेहल तों , \nवेहली होके बैठ जावां , \nतेरे आण दीयां मैं औसीयां पावां , \nमैं कोठे तों उड़ांदीयां कां ।।\n\nहाल मेरा वेख , लोक भैड़े ने हसदे , \nनां तेरा लै के , मैनूं ताहने ने कसदे , \nदिल हुण हो गया सवाह ।।\n\nहाणीयां वे तूं , इक वारी आ जा , \nलोकां दे सामणे हां , अपणी बना जा , \nहुण दिल पेया एहो आखदा ।।\n\nदिल नूं तसल्ली देवां , अखीयां नूं दिलासे , \nप्रीत कीती हाणीयां , तेरे भरवासे , \n' दर्शन ' नूं ना आखीं बेवफा ।।"},"en":{"t":"Ve Kado Aavega Tu Haaniyaan","c":"Ve Kado Aavega Tu Haaniyaan"}},

	{"id":1769617282163,
	"pb":{"t":"ਅੱਜ ਯਾਰ ਮੇਰਾ ਸੌਂ ਨੀ ਗਯਾ","c":"ਅੱਜ ਯਾਰ ਮੇਰਾ ਸੌਂ ਨੀ ਗਯਾ , \nਆ ਕੇ ਮੇਰੇ ਪਲੰਘ ਤੇ ,\nਉਸ ਘੁੱਟ ਮੈਨੂੰ ਬਾਹਵਾਂ ਚ ਲਿਆ , \nਮੂੰਹ ਤੋਂ ਘੁੰਡ ਚੁੱਕ ਕੇ ॥\n\nਮੇਰਾ ਯਾਰ ਬੜਾ ਮਿਹਰਬਾਨ ਸੀ , \nਹੋਇਆ ਬੜਾ ਅੱਜ ਮੈਂ ਹੈਰਾਨ ਸੀ ,\nਯਾਰ ਮੇਰੇ ਨੂੰ ਕੀ ਹੋ ਗਿਆ ॥\n\nਯਾਰ ਮੇਰੇ ਦਾ ਰੰਗ ਬੜਾ ਲਾਲ ਸੀ , \nਪੁੱਛ ਨਾ ਸਕੀ ਮੈਂ ਕੋਈ ਸਵਾਲ ਸੀ ,\nਉਸ ਮੱਥਾ ਮੇਰਾ ਚੁੰਮ ਨੀ ਲਿਆ ॥\n\nਅੱਜ ਗਲ ਲਾ ਲਿਆ ਮੇਰੇ ਯਾਰ ਨੇ , \nਕੀਤਾ ਰੱਜ ਰੱਜ ਕੇ ਅਸਾਂ ਪਿਆਰ ਵੇ ,\nਡਰ ਉਹਦਾ ਖ਼ੌਰੇ ਲੱਥ ਨੀ ਗਯਾ ॥\n\nਯਾਰ ਵਾਲਾ ਕਿੱਸਾ ਮੈਂ ਦਿੱਤਾ ਜੇ ਦੱਸ ਵੇ \nਯਾਰ ਹੋਰ ਨਹੀਂ ਕੋਈ , ਉਹ ਮੇਰਾ ਰੱਬ ਵੇ , \nਯਾਰ ਰੁੱਸਿਆ ਮੈਂ ਮਨਾ ਨੀ ਲਿਆ ॥\n\nਯਾਰੋ ਸਿੱਖ ਲਏ ਮੈਂ ਯਾਰ ਵਾਲੇ ਚੱਜ ਵੇ , \nਅੱਜ ਕੰਮ ਜਾਣਾ ਸਾਡਾ ਫੱਬ ਵੇ ,\n' ਦਰਸਨ ' ਮਿਲ ਮੈਨੂੰ ਰੱਬ ਨੀ ਗਯਾ ॥"},"hi":{"t":"अज यार मेरा सौं नी गया","c":"अज यार मेरा सौं नी गया , \nआ के मेरे पलंघ ते , \nउस घुट मैनूं बाहवां च लेया , \nमुंह तो घुंड चुक के ।।\n\nमेरा यार बड़ा मेहरबान सी , \nहोया बड़ा अज मैं हैरान सी , \nयार मेरे नूं की हो गया ।।\n\nयार मेरे दा रंग बड़ा लाल सी , \nपुछ ना सकी मैं कोई सवाल सी , \nउस मत्था मेरा चुम नी लेया ।।\n\nअज्ज गल ला लेया मेरे यार ने , \nकीता रज्ज रज्ज के असां प्यार वे , \nडर ओहदा खौरे लथ नी गया ।।\n\nयार वाला किस्सा मैं दित्ता जे दस वे \nयार होर नहीं कोई , ओह मेरा रब्ब वे , \nयार रुस्सिआ मैं मना नी लिया ।।\n\nयारो सिख लए मैं यार वाले चज वे , \nअज्ज कंम जाणा साडा फब वे , \n' दर्शन ' मिल मैनूं रब्ब नी गया ।।"},"en":{"t":"Aaj Yaar Mera So Ni Gaya","c":"Aaj Yaar Mera So Ni Gaya"}},

	{"id":1769617612979,
	"pb":{"t":"ਗੋਰੀ ਦਾ ਪਰਾਂਦਾ","c":"ਗੋਰੀ ਦਾ ਪਰਾਂਦਾ ਕਾਲੇ ਰੰਗ ਦਾ , \nਕਾਲੇ ਨਾਗ ਵਾਂਗੂੰ ਡੱਸ ਨੀ ਗਯਾ ॥\n\nਗੋਰੀ ਦਾ ਮੁੱਖ ਜਿਵੇਂ ਚੰਨ ਅਸਮਾਨ ਤੇ , \nਗਸ਼ ਖਾ ਕੇ ਡਿੱਗਦੇ ਨੇ ਮੁੰਡੇ ਜਵਾਨ ਵੇ ,\nਵੇ ਰੱਬ ਵੀ ਸੋਚੀਂ ਪੈ ਗਯਾ ॥\n\nਗੋਰੀ ਦੀ ਚਾਲ ਜਿਵੇਂ ਬਾਗਾਂ ਵਿਚ ਮੋਰ ਨੀ , \nਪੈਰਾਂ ਦੀਆਂ ਝਾਂਜਰਾਂ ਦਾ ਪੈਂਦਾ ਏ ਸ਼ੋਰ ਨੀ ,\nਜਿਵੇਂ ਚੰਬੇ ਤੇ ਨਿਖਾਰ ਆ ਗਯਾ ॥\n\nਗੋਰੀ ਦੀ ਜਵਾਨੀ ਜਿਵੇਂ ਗੰਨੇ ਦੀ ਪੋਰੀ ਨੀ , \nਦਿਲ ਮੇਰਾ ਆਖੇ ਤਨ ਕਰ ਲਵਾਂ ਚੋਰੀ ਨੀ ,\n' ਦਰਸਨ ' ਰੱਬ ਜੇ ਚੋਰ ਦੇਵੇ ਬਣਾ ॥"},"hi":{"t":"गोरी दा परांदा","c":"गोरी दा परांदा काले रंग दा , \nकाले नाग वागूं डस नी गया ।।\n\nगोरी दा मुख जिवें चन्न असमान ते , \nगश खा के डिगदे ने मुंडे जवान वे , \nवे रब्ब वी सोचीं पै गया ।।\n\nगोरी दी चाल जिवें बागां विच मोर नी , \nपैरां दीयां झांजरां दा पैंदा ए शोर नी , \nजिवें चम्बे ते निखार आ गया ।।\n\nगोरी दी जवानी जिवें गन्ने दी पोरी नी , \nदिल मेरा आखे तन कर लवां चोरी नी , \n' दर्शन ' रब्ब जे चोर देवे बना ।।"},"en":{"t":"Gori Da Paranda","c":"Gori Da Paranda"}},

	{"id":1769617849103,
	"pb":{"t":"ਗੋਰੇ ਮੁੱਖ ਦਾ ਦੇ ਦੇ ਨਜ਼ਾਰਾ","c":"ਗੋਰੇ ਮੁੱਖ ਦਾ ਦੇ ਦੇ ਨਜ਼ਾਰਾ , \nਤੇਰਾ ਕਿਹੜਾ ਮੁੱਲ ਲੱਗਦਾ ,\nਮੈਨੂੰ ਤੇਰੇ ਨਾਲ ਸੋਹਣਿਆਂ ਬਹਾਰਾਂ , \nਜੱਗ ਨਈਂਓਂ ਚੰਗਾ ਲੱਗਦਾ ॥\n\nਗੋਰੇ ਮੁੱਖ ਤੇ ਦੁਪੱਟਾ ਲਾਲ ਰੰਗ ਦਾ , \nਵਿਚ ਘੁੰਡ ਦੇ ਯਾਰ ਮੇਰਾ ਹੱਸਦਾ ,\nਗੱਲ ਪਿਆਰ ਵਾਲੀ ਮੈਨੂੰ ਦੱਸ ਜਾ ॥\n\nਮੇਰੇ ਯਾਰ ਦੀ ਅੱਲ੍ਹੜ ਜਵਾਨੀ , \nਅੱਖਾਂ ਸ਼ਰਬਤੀ ਤੇ ਚਾਲ ਮਸਤਾਨੀ ,\nਕੋਈ ਹੋਰ ਨਾ ਉਹਦੇ ਜੇਹਾ ॥\n\nਯਾਰ ਆਵੇ ਵੰਡਾਂ ਮੈਂ ਪੇੜੇ , \nਦੁੱਖ ਯਾਰ ਦੇ ਨੇ ਮੈਨੂੰ ਬਥੇਰੇ ,\nਅਸਾਂ ਰੋਗ ਜੁਦਾਈਆਂ ਲਾ ਲਿਆ ॥\n\n' ਦਰਸਨ ' ਯਾਰ ਜੇ ਮਿਲ ਜਾਏ ਮੇਰਾ , \nਯਾਰ ਬਾਝੋਂ ਏਹ ਸੱਖਣਾ ਏ ਵਿਹੜਾ ,\nਅਸਾਂ ਦਿਲ ਨੂੰ ਲਿਆ ਏ ਸਮਝਾ ॥"},"hi":{"t":"गोरे मुख दा दे दे नज़ारा","c":"गोरे मुख दा दे दे नज़ारा , \nतेरा केहड़ा मुल लगदा , \nमैनूं तेरे नाल सोहणेयां बहारां , \nजग नईओं चंगा लगदा ।।\n\nगोरे मुख ते दुपट्टा लाल रंग दा , \nविच घुंड दे यार मेरा हसदा , \nगल प्यार वाली मैनूं दस जा ।।\n\nमेरे यार दी अल्हड़ जवानी , \nअखां शरबती ते चाल मस्तानी , \nकोई होर ना ओहदे जेहा ।।\n\nयार आवे वंडां मैं पेड़े , \nदुख यार दे ने मैनूं बथेरे , \nअसां रोग जुदाईयां ला लिया ।।\n\n' दर्शन ' यार जे मिल जाए मेरा , \nयार बाझों एह सखणा ए वेहड़ा , \nअसां दिल नूं लेया ए समझा ।।"},"en":{"t":"Gore Mukh Da De Nazara","c":"Gore Mukh Da De Nazara"}},

	{"id":1769618216117,
	"pb":{"t":"ਚੰਨਾ ਵੇ ਚਾਨਣੀ ਰਾਤ","c":"ਚੰਨਾ ਵੇ ਚਾਨਣੀ ਰਾਤ ਨਈਂਓਂ ਭਾਂਦੀ \nਵਾਂਗ ਚਕੋਰਾਂ ਰਵ੍ਹੇ ਮੈਨੂੰ ਤੜਫਾਂਦੀ , \nਪਰਦੇਸੀ ਨਈਂਓਂ ਸੱਕੇ ਕਿਸੇ ਦੇ ॥\n\nਹੱਸ-ਹੱਸ ਚੰਨਾ ਵੇ , ਪਿਆਰ ਅਸਾਂ ਕੀਤਾ ਸੀ ,\nਚੰਨ ਵਾਲੀ ਲੋਅ ਥੱਲੇ , \nਕਰਾਰ ਅਸਾਂ ਕੀਤਾ ਸੀ ,\nਹੱਸਦੀ ਏ ਚਾਨਣੀ ਨਾਲੇ ਆਖੇ ਉਹ ॥\n\nਹਾਸੇ ਅਸਾਂ ਮਾਰ ਲਏ , ਮਾਰ ਲਿਆ ਦਿਲ ਵੇ ,\nਅੱਖੀਆਂ ਥੱਕ ਗਈਆਂ ਹੁਣ ਰੋ-ਰੋ ਕੇ , \nਸੱਚ ਆਖਣ ਮੈਨੂੰ ਸਖੀਆਂ ਉਹ ॥\n\nਹੱਸਦੀ ਰਹਿੰਦੀ ਮੈਂ ਝੂਠੇ ਹਾਸੇ ,\nਜਦੋਂ ਦੇ ਨਜ਼ਰਾਂ ਨੇ ਦਿਲ ਵਟਾ ਲਏ , \nਰੱਖੀਂ ਨਜ਼ਰਾਂ ਚੰਨਾ ਉਹ ॥\n\nਹੱਸ-ਹੱਸ ਪਿਆਰ ਕੀਤਾ , \nਕੀਤਾ ਇਤਬਾਰ ਸੀ ਝੂਠੇ ਹਾਸੇ , \nਹੱਸ-ਹੱਸ ਮੈਂ ਗਈ ਹਾਰ ਸੀ \n' ਦਰਸਨ ' ਲਾਹ ਦੇ ਉਲਾਂਭਾ ਚੰਨਾ ਉਹ ॥"},"hi":{"t":"चन्ना वे चानणी रात","c":"चन्ना वे चानणी रात नईओं भांदी \nवांग चकोरां रवे मैनूं तड़फांदी , \nपरदेसी नईओं सक्के किसे दे ।।\n\nहस-हस चन्ना वे , प्यार असां कीता सी , \nचन्न वाली लोअ थल्ले , \nकरार असां कीता सी , \nहसदी ए चानणी नाले आखे औह ।।\n\nहास्से असां मार लए , मार लेया दिल वे , \nअखीयां थक गईयां हुण रो रो के , \nसच आखण मैनूं सखीयां औह ।।\n\nहसदी रैंहदी मैं झूठे हासे , \nजदों दे नजरां ने दिल वटा लए , \nरखीं नजरां चन्ना औह ।।\n\nहस-हस प्यार कीता , \nकीता एतबार सी झूठे हासे , \nहस हस मैं गई हार सी \n' दर्शन ' लाहदे उलाहमां चन्ना औह ।।"},"en":{"t":"Channa Ve Chanani Raat","c":"Channa Ve Chanani Raat"}},
	{"id":1769618703877,
	"pb":{"t":"ਇਕ ਹਮਸੇ ਭਲਾ ਤੇਰਾ ਕਿਆ ਕਹਿਣਾ","c":"ਇਕ ਹਮਸੇ ਭਲਾ ਤੇਰਾ ਕਿਆ ਕਹਿਣਾ ,\nਤੁਮ ਔਰੋਂ ਕੇ ਲੀਏ ਕੁਝ ਔਰ ਸਹੀ , \nਮੇਰੇ ਦਿਲ ਨੇ ਤੁਝੇ ਰੱਬ ਜਾਨਾ ,\nਓ ਤੇਰਾ ਕਿਆ ਕਹਿਣਾ ॥\n\nਹਮ ਸੇ ਨਾਜ਼ ਹਮ ਸੇ ਲੜਾਈ , \nਹਮ ਸੇ ਬਿਛੁੜਨਾ ਹਮ ਸੇ ਜੁਦਾਈ ,\nਕਿਆ ਕਹੇਗਾ ਯੇ ਜ਼ਮਾਨਾ , \nਓ ਤੇਰਾ ਕਿਆ ... \n\nਹਮ ਤੋ ਸਹੀ ਤੇਰੇ ਦੀਵਾਨੇ , ਹਮਸੇ ਛੁਪਾਨਾ ਹੈ ਕਿਆ ,\nਲੋਗ ਤੋ ਕਹਿਤੇ ਥੇ ਯੇ ਲੜਕਪਨ ਹੈ , \nਹਮੇਂ ਛੋੜ ਤੁਮਨੇ ਜਾਨਾ ਹੈ ਕਹਾਂ ,\nਓ ਤੇਰਾ ਕਿਆ ... \n\nਹਮਸੇ ਗਿਲਾ ਸ਼ਿਕਵਾ , ਹਮਸੇ ਗਿਲੇਗੁਜ਼ਾਰੀ ,\nਕਿਆ ਯੇ ਖ਼ੁਰਾਕ ਹੈ ਤੁਮ੍ਹਾਰੀ ॥\n\nਹਮ ਸੇ ਤਕਰਾਰ ਔਰੋਂ ਸੇ ਪਿਆਰ , \nਯਹ ਆਰਜ਼ੂ ਹੈ ਹਮਾਰੀ ,\nਉਫ਼ ਕੀਤੀ ਨਹੀਂ ਅਸੀਂ , \nਨਾ ਕਦੇ ਗੱਲ ਤੇਰੇ ਨਾਲ ਵਟਾਈ ਏ ,\nਜਿਸ ਤਰ੍ਹਾਂ ਵੀ ਤੂੰ ਚਾਹੁੰਦਾ ਰਿਹਾ , \n' ਦਰਸਨ ' ਕਦੇ ਵੀ ਨਾ ਨਹੀਂ ਪਾਈ ਏ ,\nਓ ਤੇਰਾ ਕਿਆ ਕਹਿਣਾ ॥"},"hi":{"t":"एक हमसे भला तेरा क्या कहना","c":"एक हमसे भला तेरा क्या कहना , \nतुम औरों के लिए कुछ और सही , \nमेरे दिल ने तुझे रब्ब जाना , \nओ तेरा क्या कहना ।।\n\nहम से नाज़ हमसे लड़ाई , \nहम से बिछुड़ना हम से जुदाई , \nक्या कहेगा ये ज़माना , \nओ तेरा क्या ...\n\nहम तो सही तेरे दिवाने , हमसे छुपाना है क्या , \nलोग तो कहते थे ये लड़कपन है , \nहमें छोड़ तुमने जाना है कहां , \nओ तेरा क्या ...\n\nहमसे गिला शिकवा , हमसे गिलेयाजारी , \nक्या ये खुराक है तुम्हारी ।।\n\nहम से तकरार औरों से प्यार , \nयह आरजू है हमारी , \nउफ कीती नहीं असीं ,\nनां कदे गल तेरे नाल वटाई ए ,\nजिस तरह वी तूं चाहदां रेहा , \n' दर्शन ' कदे वी ना नहीं पाई ए , \nओ तेरा क्या ..."},"en":{"t":"Ek Hamse Bhala Tera Kya Kehna","c":"Ek Hamse Bhala Tera Kya Kehna"}},

	{"id":1769619450607,
	"pb":{"t":"ਮੇਰੇ ਪਰਦੇਸੀ ਢੋਲਣਾ","c":"ਚੰਨ ਚੜ੍ਹ ਤੇ ਗਿਆ ਵਿਚ ਅਸਮਾਨੀ ,\nਚਕੋਰਾਂ ਵਾਂਗ ਮੈਂ ਹੋਈ ਦੀਵਾਨੀ , \nਮੈਂ ਤੇਰੀ ਹਾਂ ਨਹੀਂ ਹਾਂ ਬੇਗਾਨੀ ॥\n\nਮੇਰੇ ਪਰਦੇਸੀ ਢੋਲਣਾ, ਮੇਰੇ ਪਰਦੇਸੀ ਢੋਲਣਾ ,\nਜਾ ਰੇ ਜਾਵੇ , ਅਸਾਂ ਨਈਂਓਂ ਬੋਲਣਾ ॥\n\nਰੱਬ ਦੇ ਭੁਲੇਖੇ ਤੈਨੂੰ ਦਿਲ ਚ ਵਸਾ ਲਿਆ ,\nਲੋਕਾਂ ਦੇ ਤਾਹਣਿਆਂ ਨੇ ਦਿਲ ਮੇਰਾ ਸਾੜਿਆ , \nਛੱਡ ਜੱਗ ਤੈਨੂੰ ਆਪਣਾ ਬਣਾ ਲਿਆ ॥\n\nਦਿਲ ਵਾਲੀ ਘੁੰਡੀ ਚੰਨਾ ਦੇ ਹੁਣ ਖੋਲ੍ਹ ,\nਖ਼ਤ ਵਿਚ ਲਿਖ ਦੇ ਕੋਈ ਦੋ ਬੋਲ , \nਮੈਨੂੰ ਤੇਰੇ ਨਾਲ ਪਿਆਰ ਹੋ ਗਿਆ ॥\n\nਲੋਕ ਭੈੜੇ ਮੈਨੂੰ ਕਰਦੇ ਮਖੌਲ ਵੇ ,\nਜਿੰਦੜੀ ਮਲੂਕ ਨਾ ਕੰਡਿਆਂ 'ਚ ਰੋਲ ਵੇ , \nਤੈਨੂੰ ਦਿਲ 'ਚ ਵਸਾ ਏ ਲਿਆ ॥\n\nਰੋ ਰੋ ਕੇ ਅੱਖਾਂ ਵਿਚੋਂ ਪਾਣੀ ਗਿਆ ਸੁੱਕ ,\nਝੱਲਿਆ ਨਹੀਂ ਜਾਂਦਾ ਹੁਣ ਤੇਰੇ ਵਾਲਾ ਦੁੱਖ , \n' ਦਰਸਨ ' ਆ ਕੇ ਦਰਦ ਵੰਡਾ ॥"},"hi":{"t":"मेरे परदेसी ढोलना","c":"चन्न चढ़ ते गया विच असमानी , \nचकोरां वांग मैं होई दीवानी , \nमैं तेरी हां नहीं हां बेगानी ।।\n\nमेरे परदेसी ढोलना , \nमेरे परदेसी ढोलना , \nजा रे जावे ,\nअसां नईओं बोलना ।।\n\nरब्ब दे भुलेखे तैनूं दिल च वसा लेया , \nलोकां दे तानेआं ने दिल मेरा साड्या , \nछड जग तैनूं अपना बना लेया ।।\n\nदिल वाली घुंडी चन्ना दे हुण खोल , \nखत विच लिख दे कोई दो बोल , \nमैनूं तेरे नाल प्यार हो गया ।।\n\nलोक भैड़े मैनूं करदे मखौल वे , \nजिंदड़ी मलूक न कंडेयां 'च रोल वे , \nतें दिल 'च वसा ए लेया ।।\n\nरो रो के अखां विचों पानी गया सुक , \nझल्लेआ नहीं जांदा हुण तेरे वाला दुख , \n'दर्शन' आ के दर्द वंडा ।।"},"en":{"t":"Mere Pardesi Dholna","c":"Mere Pardesi Dholna"}},

	{"id":1769619858620,
	"pb":{"t":"ਆ ਕੇ ਬਨੇਰੇ ਜਦੋਂ","c":"\" \" \"\nਪੁੱਛਾਂ ਡਾਕੀਏ ਕੋਲੋਂ , \nਓਈ ਚਿੱਠੀ ਕੋਈ ਮੇਰੇ ਦਿਲਦਾਰ ਦੀ ,\nਜਦੋਂ ਡਾਕੀਆ ਆਵੇ ਮੈਂ ਡੱਕ ਕੇ ਖਲੋ ਜਾਂ ,\nਮੈਨੂੰ ਵੀ ਤਾਂ ਮੇਰੀ ਚਿੱਠੀ ਦੇ ਜਾ ਮੇਰੇ ਸੋਹਣੇ ਯਾਰ ਦੀ ,\nਦੇਵੇ ਚਿੱਠੀ ਨਾਂ, ਅੜੀਏ ਮੈਂ ਰਾਹ ਛੱਡ ਜਾਂ \n\" \" \"\n\nਆ ਕੇ ਬਨੇਰੇ ਜਦੋਂ ਕਾਂ ਕੋਈ ਬੋਲੇ , \nਅੱਖੀਆਂ ਦੀ ਤਾਂਘ ਜਾਗੇ ਦਿਲ ਖਾਵੇ ਡੋਲੇ ,\nਪੁੱਛਦੀ ਮੈਂ ਡਾਕੀਏ ਕੋਲੋਂ ॥\n\nਜਾ ਕੇ ਸੋਹਣੇ ਨੂੰ ਸੱਚ ਦੇਵੀਂ ਆਖ ਵੇ , \nਸਾਹ ਮੇਰੇ ਦੇ ਗਏ ਹੁਣ ਤੇ ਜਵਾਬ ਵੇ ,\nਦੇਰ ਐਨੀ ਕਿਉਂ ਸੂ ਲਾਈ ॥\n\nਕਾਂ ਵੀ ਨਹੀਂ ਉੱਡਦਾ , ਨਹੀਂ ਉੱਡਦੇ ਖ਼ਿਆਲ ਵੇ ,\nਸੌਣ ਦਾ ਮਹੀਨਾ ਆਇਆ , ਆ ਗਈ ਬਹਾਰ ਵੇ ,\nਹੁਣ ਜਿੰਦ ਮੇਰੀ ਮੁੱਕਣ ਤੇ ਆਈ ॥\n\nਤੇਰੇ ਵਿਛੋੜੇ ਮੈਂ ਬੜਾ ਦੁੱਖ ਦਿੱਤਾ ਏ ,\nਪਿਆਰ ਅਸਾਂ ਕੀਤਾ ਏ ਗੁਨਾਹ ਤੇ ਨਹੀਂ ਕੀਤਾ ਏ ,\nਵੇ ਤੂੰ ਅੱਡਿਆ ਛੇਤੀ ਫੇਰਾ ਪਾਈ ॥\n\nਗ਼ਮਾਂ ਦੀਆਂ ਗੁੰਝਲਾਂ ਮੈਂ ਖੋਲ ਖੋਲ ਥੱਕ ਗਈ ,\nਤੂੰ ਵੀ ਤੇ ਸੋਹਣਿਆ ਨਾ ਸਾਡੀ ਕੋਈ ਵਾਟ ਲਈ ,\nਕੀਤਾ ਵਾਅਦਾ ਤੂੰ ਭੁੱਲ ਨਾ ਜਾਈ ॥\n\nਅੱਜ ਕੱਲ ਕਰਦਿਆਂ , ਦਿਲ ਨੂੰ ਦਿਲਾਸੇ ਦੇਵਾਂ ,\nਅੰਦਰ ਬਾਹਰ ਆਵਾਂ ਜਾਵਾਂ , ਕੰਧਾਂ ਨਾਲ ਗੱਲਾਂ ਕਰਾਂ ,\n' ਦਰਸਨ ' ਚਿੱਠੀ ਕਿਉਂ ਨਹੀਂ ਪਾਈ ॥\n\nਪਿਆਰ ਵਾਲੀ ਰੁੱਤ ਆਈ ਰੰਗ ਮੈਨੂੰ ਚੜ੍ਹਿਆ ,\nਦਿਨ ਰਾਤੀ ' ਦਰਸਨ ' ਦਿਲ ਨਾਲ ਲੜਿਆ ,\nਦਿਲ ਡਾਕੀਆ ਤੇ ਅੱਖ ਕਾਂ ਬਣਾਈ ॥"},"hi":{"t":"आके बनेरे जदों","c":"\" \" \"\nपुछां डाकिए कोलों , \nओई चिट्ठी कोई मेरे दिलदार दी , \nजदों डाकिया आवे मैं डक्क के खलो जां , \nमैनूं वी तां मेरी चि‌ट्ठी दे जा मेरे सोहणे यार दी , \nदेवे चिट्ठी नां , अड़ीए मैं राह छड जां ।।\n\" \" \"\n\nआ के बनेरे जदों कां कोई बोले , \nअखीयां दी तांघ जागे दिल खावे डोले , \nपुछदी में डाकीए कोलों ।।\n\nजा के सोहणे नू सच्च देवीं आख वे , \nसाह मेरे दे गए हुण ते जवाब वे , \nदेर ऐनी क्यों सू लाई ।।\n\nकां वी नहीं उडदा , नहीं उडदे ख्याल वे , \nसौंण दा महीना आया , आ गई बहार वे , \nहुण जिंद मेरी मुकण ते आई ।।\n\nतेरे विछोड़े मैं बड़ा दुख दित्ता ए , \nप्यार असां कीता ए गुनाह ते नहीं कीता ए , \nवे तूं अड्या छेती फेरा पाई ।।\n\nगमां दीयां गुंझलां मैं खोल खोल थक गई , \nतूं वी ते सोहणेया न साडी कोई वाट लई , \nकीता वादा तूं भुल ना जाई ।।\n\nअंज कल करदेयां , दिल नूं दिलासे देवां , \nअंदर बाहर आवां जावां , कंधां नाल गल्लां करां , \n' दर्शन ' चिट्ठी क्यो नहीं पाई ।।\n\nप्यार वाली रुत आई रंग मैनूं चढ़ेया , \nदिन राती ' दर्शन ' दिल नाल लड़ेया , \nदिल डाकीया ते अक्ख कां बणाई ।।"},"en":{"t":"Aake Banere Jado","c":"Aake Banere Jado"}},

	{"id":1769620226992,
	"pb":{"t":"ਆਜਾ ਮਹਿਰਮ ਦਿਲਾਂ ਦਿਆ ਜਾਨੀਆਂ","c":"ਆਜਾ ਮਹਿਰਮ ਦਿਲਾਂ ਦਿਆ ਜਾਨੀਆਂ , \nਵੇ ਮੈਂ ਤੇਰੇ ਸ਼ਗਨ ਮਨਾਨੀਆਂ ॥\nਆਜਾ ਵੇਖ ਲੈ ਮੇਰਾ ਹਾਲ ਵੇ , \nਚੀਰੇ ਵਾਲਿਆ ਲੈ ਚੱਲ ਨਾਲ ਵੇ ॥\n\nਵੇ ਮੈਂ ਤਾਂਘਾਂ ਤੇਰੇ ਤੇ ਰੱਖੀਆਂ , \nਰਾਤਾਂ ਜਾਗ ਜਾਗ ਥੱਕ ਗਈਆਂ ਅੱਖੀਆਂ ,\nਸਾਡੀ ਦੀਦ ਤੇਰਾ ਦੀਦਾਰ ਵੇ ॥\n\nਤੇਰੇ ਹਿਜ਼ਰ ਦੀ ਬਲਦੀ ਏ ਅੱਗ ਵੇ , \nਨਈਂਓਂ ਬਲਦੇ ਬੁੱਢੇ ਮੇਰੇ ਹੱਡ ਏ ,\nਆ ਕੇ ਫੂਕਾਂ ਮਾਰ ਕੇ ਬਾਲ ਵੇ ॥\n\nਮੇਰਾ ਦਿਲਬਰ ਦਿਲ ਮੇਰਾ ਲੈ ਗਿਆ , \nਹਉਕੇ ਗ਼ਮਾਂ ਵਾਲੇ ਮੈਨੂੰ ਦੇ ਗਿਆ ,\nਸਾਡਾ ਜੀਣਾ ਹੋਇਆ ਮੁਹਾਲ ਵੇ ॥\n\nਵੇ ਮੈਂ ਗ਼ਮਾਂ ਦੀ ਮਾਰੀ , \nਦਿਲ ਲੱਗ ਗਈ ਏ ਤੇਰੀ ਬਿਮਾਰੀ ,\nਤੇਰੇ ਬਾਝੋਂ ਮੇਰਾ ਹੁੰਦਾ ਬੁਰਾ ਹਾਲ ਵੇ ॥\n\nਵੇ ਮੈਂ ਸੌਦਾ ਦਿਲਾਂ ਵਾਲਾ ਕੀਤਾ , \nਉਹ ਵੀ ਤੂੰ ਮੰਜ਼ੂਰ ਨਹੀਂ ਕੀਤਾ ,\n' ਦਰਸਨ ' ਦਿੱਤੀ ਜਿੰਦ ਤੇਰੇ ਉੱਤੋਂ ਵਾਰ ਵੇ ॥"},"hi":{"t":"आजा मैहरम दिलां देया जानीआं","c":"आजा मैहरम दिलां देया जानीआं , \nवे मैं तेरे शगन मनानीआं ।।\nआजा वेख लै मेरा हाल वे , \nचीरे वालेया लै चल नाल वे ।।\n\nवे मैं तांघां तेरे ते रखीयां , \nरातां जाग जाग थक गईयां अखीयां , \nसाडी दीद तेरा दीदार वे ।।\n\nतेरे हिज़र दी बलदी ए अग वे , \nनहीओं बलदे बुढ्ढे मेरे हड्ड ए , \nआ के फूकां मार के बाल वे ।।\n\nमेरा दिलबर दिल मेरा लै गया , \nहौके गमां वाले मैनूं दे गया , \nसाड़ा जीना होया मुहाल वे ।।\n\nवे मैं गमां दी मारी , \nदिल लग गई ए तेरी बिमारी , \nतेरे बाझों मेरा हुंदा बुरा हाल वे ।।\n\nवे मैं सौदा दिलां वाला कीता , \nओह वी तूं मंजूर नहीं कीता , \n' दर्शन ' दित्ती जिंद तेरे उत्तों वार वे ।।"},"en":{"t":"Aaja Mehram Dila Deya Jaaniyaan","c":"Aaja Mehram Dila Deya Jaaniyaan"}},

	{"id":1769620577356,
	"pb":{"t":"ਅੱਜ ਦਾ ਵੇਲਾ ਤੇਰੇ ਨਾਲ","c":"ਭਜ ਗੋਵਿੰਦਾ ਭਜ ਗੋਪਾਲ , ਅੱਜ ਦਾ ਵੇਲਾ ਤੇਰੇ ਨਾਲ ,\nਤੂੰ ਮੇਰੇ ਮੈਂ ਤੇਰੇ ਨਾਲ ॥\n\nਤਨ ਵੀ ਤੇਰਾ ਮਨ ਵੀ ਤੇਰਾ , ਸਭ ਕੁਝ ਤੇਰਾ ਤੂੰ ਪ੍ਰਭ ਮੇਰਾ ,\nਤੂੰ ਮੇਰੇ ਮੈਂ ਤੇਰੇ ਨਾਲ ॥\n\nਮੇਰਾ ਮੁਝ ਮੇਂ ਕਿਛੁ ਨਾਹੀ ਜੋ ਕਿਛੁ ਹੈ ਸੋ ਤੇਰਾ ,\nਤੇਰਾ ਤੁਝਕੋ ਸੌਂਪਤੇ ਕਿਆ ਲਾਗੇ ਮੇਰਾ ,\nਤੇਰੀ ਕਿਰਪਾ ਮੇਰੇ ਨਾਲ ॥\n\nਸਭ ਕੁਝ ਤੇਰੇ ਹਾਥ ਮੇਂ , ਤੂੰ ਹੀ ਕਰੇਂ ਕਰਾਏਂ ,\nਹਮਰੇ ਹਾਥ ਮੇਂ ਕੁਝ ਨਹੀਂ ਤੁਮ ਹੀ ਹੋਤ ਸਹਾਏ ,\nਤੇਰੀ ਰਹਿਮਤ ਮੇਰੇ ਨਾਲ ॥\n\nਸੁੰਦਰ ਕੁਦਰਤ ਤੇਰੀ ਕਾਦਰ , ਕਾਦਰ ਕੈਸਾ ਹੋਗਾ ,\nਤੇਰੀ ਸਾਰੀ ਰਚਨ ਰਚਾਈ ਉਸ ਮੇਂ ਬੈਠਾ ਹੋਗਾ ,\nਤੇਰਾ ਨੂਰ ਹੈ ਲਾਲੋ ਲਾਲ ॥\n\nਤੂਨੇ ਜਨਮ ਦਿਯਾ ਹੈ ਸਾਹਿਬਾ , ਤੂੰ ਹੀ ਮੇਰਾ ਮਾਲਕ ,\nਤੇਰਾ ਭਾਣਾ ਸਭਤੇ ਵਰਤੇ ਆਪੇ ਖ਼ਲਕਤ ਖ਼ਾਲਕ ,\nਆਪੇ ਸੁਰ ਔਰ ਆਪੇ ਤਾਲ ॥"},"hi":{"t":"अज्ज दा वेला तेरे नाल","c":"भज गोविंदा भज गोपाल , अज्ज दा वेला तेरे नाल , \nतूं मेरे मैं तेरे नाल ।।\n\nतन वी तेरा मन वी तेरा , सभ कुछ तेरा तूं प्रभ मेरा , \nतूं मेरे मैं तेरे नाल ।।\n\nमेरा मुझ में किछ नाहीं जो किछ है सो तेरा , \nतेरा तुझको सौंपते क्या लागे मेरा , \nतेरी किरपा मेरे नाल ।।\n\nसभ कुछ तेरे हाथ में , तूं ही करें करायें , \nहमरे हाथ में कुछ नहीं तुम ही होत सहाये , \nतेरी रहमत मेरे नाल ।।\n\nसुंदर कुदरत तेरी कादर , कादर कैसा होगा , \nतेरी सारी रचन रचाई उस में बैठा होगा , \nतेरा नूर है लालो लाल ।।\n\nतूने जन्म दिया है साहिबा , तूं ही मेरा मालक , \nतेरा भाणा सभते वरते आपे खलकत खालक , \nआपे सुर और आपे ताल ।।"},"en":{"t":"Ajj Da Vela Tere Naal","c":"Ajj Da Vela Tere Naal"}},

	{"id":1769620936549,
	"pb":{"t":"ਆਲਸੀ ਮਨਾ","c":"ਨਾਮ ਜਪ ਲੈ ਆਲਸੀ ਮਨਾ , \nਲਾਹਾ ਖੱਟ ਲੈ ਆਲਸੀ ਮਨਾ ॥\n\nਰੋਜ਼ ਰੋਜ਼ ਕਹਿੰਦਾ ਤੂ , ਸਵੇਰੇ ਛੇਤੀ ਉੱਠਾਂਗੇ \nਉੱਠਕੇ ਸਵੇਰੇ ਫੇਰ ਰਾਮ ਨਾਮ ਜਪਾਂਗੇ \nਭੁੱਲ ਕਿਉਂ ਗਿਆ ਆਲਸੀ ਮਨਾ ॥\n\nਅੱਜ ਕੱਲ੍ਹ ਕਰਦੇ ਨੂੰ ਬੀਤੇ ਸਾਲੋ ਸਾਲ ਨੇ \nਨਾਮ ਨੂੰ ਜੱਪਣ ਦਾ ਨਾ ਕੀਤਾ ਤੂ ਖ਼ਿਆਲ ਐ \nਵੇਲਾ ਬੀਤਿਆ ਆਲਸੀ ਮਨਾ ॥\n\nਪੋਥੀਆਂ ਪੁਰਾਣ ਤੂ ਤਾਂ , ਬਹੁਤ ਪੜ੍ਹ ਲਈਆਂ ਨੇ \nਰਾਹੇ ਮਾਰ ਲਏ ਪਰ , ਅਕਲਾਂ ਨਾ ਲਈਆਂ ਨੇ \nਇਕ ਨਾਮ ਰਟ ਲੈ ਆਲਸੀ ਮਨਾ ॥\n\nਹੁਣ ਕੋਈ ਚੱਲਣੀ ਨਹੀਂ ਤੇਰੀ ਮਨ ਮਰਜ਼ੀ \nਹੁਣ ਮੈਂ ਲਗਾ ਦਿੱਤੀ ਗੁਰੂ ਅੱਗੇ ਅਰਜ਼ੀ \nਗੁਰੂ ਆਪ ਦੇਖੇਗਾ ਆਲਸੀ ਮਨਾ ॥\n\nਗੁਰੂ ਮੇਰਾ ਬਹੁਤ ਵੱਡਾ , ਗੁਰੂ ਸਮਰੱਥਾ ਏ \nਓਹੀ ਤਰਿਆ ਜੋ ਗੁਰੂ ਚਰਨਾਂ 'ਚ ਬੈਠਾ ਏ \nਕੀ ਈ ਸੋਚਦਾ ਆਲਸੀ ਮਨਾ ॥"},"hi":{"t":"आलसी मना","c":"नाम जप लै आलसी मना , \nलाहा खट लै आलसी मना ।।\n\nरोज़ रोज़ केहंदा तू , स्वेरे छेती उठांगे \nउठके स्वेरे फेर राम नाम जपांगे \nभुल क्यू ग्या आलसी मन्ना ।।\n\nअज्ज कल करदे नु बीते सालो साल ने \nनाम नु जप्पन दा ना कीता तू ख्याला ए \nवेला बीतया आल्सी मना ।।\n\nपोथीयां पुराणां तू ता , बहुत पढ़ लईयां ने \nरहे मार लए पर , अकलां ना लईयां ने \nइक नाम रट लै आलसी मना ।।\n\nहुन कोई चल्नी नहीं तेरी मन मरज़ी \nहुन मैं लगा दिति गुरू अग्गे अर्जी \nगुरू आप देखेगा आलसी मना ।।\n\nगुरू मेरा बहुत वडा , गुरू समरथा ए \nओही तरया जो गुरू चरना च बैठा ए \nकी ई सोचदा आलसी मना ।।"},"en":{"t":"Aalsi Mana","c":"Aalsi Mana"}},

	{"id":1769621536725,
	"pb":{"t":"ਦੇਵਾ ਸ਼੍ਰੀ ਗਣੇਸ਼ਾ","c":"ਦੇਵਾ ਸ਼੍ਰੀ ਗਣੇਸ਼ਾ , ਦੇਵਾ ਸ਼੍ਰੀ ਗਣੇਸ਼ਾ ॥\n\nਜਵਾਲਾ ਸੀ ਜਲਦੀ ਹੈ ਆਂਖੋਂ ਮੇਂ  \nਜਿਸਕੇ ਭੀ ਦਿਲ ਮੇਂ ਤੇਰਾ ਨਾਮ ਹੈ ,\nਪਰਵਾਹ ਹੀ ਕਿਆ ਉਸਕਾ \nਆਰੰਭ ਕੈਸਾ ਹੈ ਔਰ ਕੈਸਾ ਪਰਿਣਾਮ ਹੈ ,\nਧਰਤੀ ਅੰਬਰ ਸਿਤਾਰੇ , ਉਸਕੀ ਨਜ਼ਰੈਂ ਉਤਾਰੇਂ ,\nਡਰ ਭੀ ਉਸਸੇ ਡਰਾ ਰੇ , ਜਿਸਕੀ ਰਖਵਾਰੀ ਆ ਰੇ , \nਕਰਤਾ ਸਾਇਆ ਤੇਰਾ , ਹੇ ਦੇਵਾ ਸ਼੍ਰੀ ਗਣੇਸ਼ਾ ॥\n\nਤੇਰੀ ਭਕਤੀ ਕਾ ਵਰਦਾਨ ਹੈ , ਜੋ ਕਮਾਏ ਵੋ ਧਨਵਾਨ ਹੈ ,\nਬਿਨ ਕਿਨਾਰੇ ਕੀ ਕਸ਼ਤੀ ਹੈ ਵੋ , ਦੇਵਾ ਤੁਝਸੇ ਜੋ ਅਨਜਾਨ ਹੈ ,\nਯੂੰ ਤੋ ਮੂਸ਼ਕ ਸਵਾਰੀ ਤੇਰੀ , ਸਬਪੇ ਹੈ ਪਹਰੇਦਾਰੀ ਤੇਰੀ ,\nਪਾਪ ਕੀ ਆਂਧੀਆਂ ਲਾਖ ਹੋਂ , ਕਭੀ ਜਯੋਤੀ ਨ ਹਾਰੀ ਤੇਰੀ ,\nਅਪਨੀ ਤਕਦੀਰ ਕਾ ਵੋ , ਖੁਦ ਸਿਕੰਦਰ ਹੂਆ ਰੇ ,\nਭੂਲ ਕਰ ਯੇ ਜਹਾਂ ਰੇ , ਜਿਸ ਕਿਸੇ ਨੇ ਯਹਾਂ ਰੇ , \nਸਾਥ ਪਾਇਆ ਤੇਰਾ , ਹੇ ਦੇਵਾ ਸ਼੍ਰੀ ਗਣੇਸ਼ਾ ॥\n\nਤੇਰੀ ਧੂਲੀ ਕਾ ਟਿੱਕਾ ਕਿਯੇ , ਦੇਵਾ ਜੋ ਤੇਰਾ ਭਕਤ ਜਿਯੇ ,\nਉਸੇ ਅੰਮ੍ਰਿਤ ਕਾ ਹੈ ਮੋਹ ਕਿਆ , ਉਸਕੇ ਵਿਸ਼ ਕਾ ਵੋ ਪਿਆਲਾ ਪਿਯੇ ,\nਤੇਰੀ ਮਹਿਮਾ ਕੀ ਛਾਇਆ ਤਲੇ , ਕਾਲ ਕੇ ਰਥ ਕਾ ਪਹੀਆ ਚਲੇ ,\nਏਕ ਚਿੰਗਾਰੀ ਪ੍ਰਤਿਸ਼ੋਧ ਸੇ , ਸਾਰੀ ਰਾਵਣ ਕੀ ਲੰਕਾ ਜਲੇ ,\nਸ਼ਤਰੂਓਂ ਕੀ ਕਤਾਰੈਂ , ਇਕ ਅਕੇਲੇ ਸੰਹਾਰੇ ॥"},"hi":{"t":"देवा श्री गणेशा","c":"देवा श्री गणेशा , देवा श्री गणेशा ।\n\nज्वाला सी जलती है आंखों में \nजिसके भी दिल में तेरा नाम है , \nपरवाह ही क्या उसका \nआरम्भ कैसा है और कैसा परिणाम है , \nधरती अम्बर सितारे , उसकी नज़रें उतारें , \nडर भी उससे डरा रे , जिसकी रखवारी आ रे , \nकरता साया तेरा , हे देवा श्री गणेशा ।।\n\nतेरी भक्ति का वरदान है , जो कमाये वो धनवान है , \nबिन किनारे की कश्ती है वो , देवा तुझसे जो अन्जान है , \nयूं तो मूषक सवारी तेरी , सबपे है पहरेदारी तेरी , \nपाप की आंधियां लाख हों , कभी ज्याति न हारी तेरी , \nअपनी तकदीर का वो , खुद सिकंदर हुआ रे , \nभूल कर ये जहां रे , जिस किसी ने यहां रे , \nसाथ पाया तेरा , हे देवा श्री गणेशा ।।\n\nतेरी धूलि का टिका किये , देवा जो तेरा भक्त जिये , \nउसे अमृत का है मोह क्या , उसके विष का वो प्याला पिये ,\nतेरी महिमा की छाया तले , काल के रथ का पहिया चले , \nएक चिंगारी प्रतिशोध से , सारी रावण की लंका जले , \nशत्रुओं की कतारें , इक अकेले संहारे ।।"},"en":{"t":"Deva Shri Ganesha","c":"Deva Shri Ganesha"}},

	{"id":1769622083287,
	"pb":{"t":"ਏਹ ਰੋਗ ਅਵੱਲੜਾ ਏ","c":"ਇਸ਼ਕ ਦਾ ਰੋਗ ਦਾ ਕਿਤੇ ਨਾ ਦਾਰੂ ਇਸ਼ਕ ਦਾ ਰੋਗ ਅਵੱਲਾ ,\nਮੇਰਾ ਇਸ਼ਕ ਸਤਗੁਰੂ ਨਾਲ ਲੱਗਿਆ ਮੈਂ ਵੀ ਹੋ ਗਿਆ ਝੱਲਾ ॥\nਏਹ ਰੋਗ ਅਵੱਲੜਾ ਏ ਜਿਸ ਤਨ ਲਾਗੇ ਸੋਈ ਤਨ ਜਾਣੇ , ਕੀ ਜਾਣੇ ਪੀੜ ਪਰਾਈ ॥\nਐਸ ਰੋਗ ਦਾ ਵੈਦ ਨਾ ਕੋਈ , ਢੂੰਡ ਢੂੰਡ ਮੈਂ ਕਮਲੀ ਹੋਈ , \nਨਾ ਲੱਭਣ ਸਿਆਣੇ ਜੀ , ਏਹ ਰੋਗ ਅਵੱਲੜਾ ...\n\nਐਸ ਰੋਗ ਦੇ ਮਾਰੇ ਮਰ ਗਏ , ਐਸ ਰੋਗ ਦੇ ਤਾਰੇ ਤਰ ਗਏ , \nਕਈ ਹੋਏ ਦੀਵਾਨੇ ਜੀ , ਏਹ ਰੋਗ ਅਵੱਲੜਾ ...\nਜੋਗੀ ਜੋਗ ਤੇਰਾ ਮੇਰੇ ਜੋਗੜਾ ॥\n\nਕਰਮ ਨਿਵਾਜ਼ੀ ਕਰਦਾ ਸੋਹਣਾ ਜ਼ਰਾ ਦੇਰ ਨਾ ਲਾਵੇ ,\nਝੋਲੀਆਂ ਭਰ ਭਰ ਵੰਡਦਾ ਦਾਤਾ ਬੇੜੀਆਂ ਬੰਨੇ ਲਾਵੇ ,\nਜੋਗੀ ਜੋਗ ਤੇਰਾ ਮੇਰੇ ਜੋਗੜਾ ॥\n\n7 ਦਿਸੰਬਰ ਖੁਸ਼ੀਆਂ ਲੈ ਕੇ ਦਿਨ ਵਡਭਾਗੀ ਆਇਆ ,\nਦੇਵਣ ਕਾਰਨ ਦਾਤਾ ਬਣਿਆ ਦਾਤਾਂ ਵੰਡਣ ਆਇਆ ,\nਜੋਗੀ ਜੋਗ ਤੇਰਾ ਮੇਰੇ ਜੋਗੜਾ ॥\n\nਸੋਹਣਾ ਮੇਰਾ ਮਾਹੀ ਸੋਹਣਾ ਸੋਹਣਾ ਉਹਦਾ ਨਾਓ ,\nਸਭ ਤੋਂ ਸੋਹਣੀ ਸੰਗਤ ਉਸਦੀ ਸੋਹਣਾ ਉਸਦਾ ਥਾਓ ,\nਜੋਗੀ ਜੋਗ ਤੇਰਾ ਮੇਰੇ ਜੋਗੜਾ ॥\n\nਤੇਰੇ ਬਾਝੋਂ ਹੋਰ ਨਾ ਕੋਈ ਕਿਸ ਪਾਸੇ ਮੈਂ ਜਾਵਾਂ ,\nਢੂੰਡਣ ਲੱਗੀ ਚਾਰੇ ਪਾਸੇ ਗੀਤ ਮੈਂ ਤੇਰੇ ਗਾਵਾਂ ,\nਜੋਗੀ ਜੋਗ ਤੇਰਾ ਮੇਰੇ ਜੋਗੜਾ ॥\n\nਦਮ ਦਮ ਲੂੰ ਲੂੰ ਯਾਰ ਸਮਾਇਆ ' ਦਰਸਨ ' ਉਹਦਾ ਨਾਓ ,\nਜੈ ਹੋ ਦਰਸਨ , ਧੰਨ ਹੋ ਦਰਸਨ ॥"},"hi":{"t":"ऐह रोग अवलड़ा ए","c":"इश्क दा रोग दा किते ना दारू इश्क दा रोग अव्वला , \nमेरा इश्क सतगुरु नाल लगेया मैं वी हो गया झल्ला ।\nएह रोग अवलड़ा ए जिस तन लागे सोई तन जाणे , की जाणे पीड़ पराई ।\nऐस रोग दा वैद ना कोई , ढूँढ ढूँढ में कमली होई , \nना लभण सियाणे जी , ऐह रोग अवलड़ा ...\n\nऐस रोग दे मारे मर गये , ऐस रोग दे तारे तर गये , \nकई होये दीवाने जी , ऐह रोग अवलड़ा ... \nजोगी जोग तेरा मेरे जोगड़ा ।\n\nकरम नवाजी करदा सोहणा जरा देर ना लावे , \nझोलियां भर भर वंडदा दाता बेड़ियां बन्ने लावे , \nजोगी जोग तेरा मेरे जोगड़ा ।\n\n7 दिसम्बर खुशिया लैके दिन वडभागी आया , \nदेवण कारण दाता बणेया दातां वंडण आया , \nजोगी जोग तेरा मेरे जोगड़ा ।\n\nसोहणा मेरा माही सोहणा सोहणा ओहदा नाओ , \nसभतों सोहणी संगत उसदी सोहणा उसदा थाओ , \nजोगी जोग तेरा मेरे जोगड़ा ।\n\nतेरे बाझो होर ना कोई किस पासे मैं जावां , \nढूँढणा लगी चारे पासे गीत मैं तेरे गावां , \nजोगी जोग तेरा मेरे जोगड़ा ।\n\nदम दम लूं लूं यार समस्या दर्शन ओहदा नाओ , \nजै हो दर्शन , धन हो दर्शन"},"en":{"t":"Eh Rog Avalda E","c":"Eh Rog Avalda E"}},

	{"id":1769622683040,
	"pb":{"t":"ਦੇਵ ਦੇਵ ਮਹਾਦੇਵ","c":"ਦੇਵ ਦੇਵ ਹੇ ਮਹਾਦੇਵ , ਦੇਵ ਦੇਵ ਹੇ ਮਹਾਦੇਵ ,\nਹੇ ਦੇਵੋਂ ਕੇ ਦੇਵ ਮਹਾਦੇਵ ,\nਦੇਵ ਦੇਵ ਹੇ ਮਹਾਦੇਵ , ਦੇਵ ਦੇਵ ਹੇ ਮਹਾਦੇਵ ॥\n\nਓਂਕਾਰੇਸ਼ਵਰ ਮਹਾਦੇਵ , ਹੇ ਸੋਮਨਾਥ ਮਹਾਦੇਵ ,\nਕੇਦਾਰਨਾਥ ਮਹਾਦੇਵ ਦੇਵ , ਹੇ ਰਾਮੇਸ਼ਵਰਮ ਮਹਾਦੇਵ ॥\n\nਮੱਲਿਕਾਰਜੁਨ ਮਹਾਦੇਵ ਦੇਵ , ਰਾਗ ਰਤਨ ਮਹਾਦੇਵ ,\nਹੇ ਕ੍ਰਿਪਾਲੂ ਮਹਾਦੇਵ , ਹੇ ਦਯਾਵਾਨ ਮਹਾਦੇਵ ॥\n\nਬ੍ਰਹਮਾ ਵਿਸ਼ਨੂੰ ਹੇ ਆਦਿਦੇਵ ਮਹਾਦੇਵ ,\nਭਵਮ ਭਵਾਨੀ ਮਹਾਦੇਵ , ਗੁਰੂ ਸਤਗੁਰੂ ਮਹਾਦੇਵ ॥\n\nਵਿਸ਼ਵਨਾਥ ਮਹਾਦੇਵ ਦੇਵ , ਹੇ ਅਮਰਨਾਥ ਮਹਾਦੇਵ ,\nਤ੍ਰਿਯੰਬਕੇਸ਼ਵਰ ਹੇ ਮਹਾਦੇਵ , ਹੇ ਨਾਮੇਸ਼ਵਰ ਮਹਾਦੇਵ ॥\n\nਭੀਮਾਸ਼ੰਕਰ ਮਹਾਦੇਵ , ਹੇ ਵੈਦਿਆਨਾਥ ਮਹਾਦੇਵ ,\nਗਿਰੀਸ਼ਾਨੇਸ਼ਵਰ ਮਹਾਦੇਵ , ਹੇ ਜੋਗੇਸ਼ਵਰ ਮਹਾਦੇਵ ॥\n\nਹੇ ਸ਼ਿਵ ਸ਼ੰਕਰ ਮਹਾਦੇਵ , ਹੇ ਜਟਾਧਾਰ ਮਹਾਦੇਵ ,\nਚੰਦਰਸ਼ੇਖਰ ਮਹਾਦੇਵ , ਹੇ ਗੰਗਾਧਰ ਮਹਾਦੇਵ ॥\n\nਕਰੁਣਾਧਾਰ ਮਹਾਦੇਵ ਦੇਵ , ਹੇ ਗਿਆਨ ਰੂਪ ਮਹਾਦੇਵ ,\nਵੇਦ ਸਵਰੂਪ ਮਹਾਦੇਵ , ਕਲਿਆਣਕਾਰੀ ਮਹਾਦੇਵ ॥\n\nਡਮਰੂਧਾਰ ਮਹਾਦੇਵ ਦੇਵ , ਭੁਝੰਗਧਾਰੀ ਮਹਾਦੇਵ ,\nਰੁਦਰਰੂਪ ਮਹਾਦੇਵ ਦੇਵ , ਤ੍ਰਿਸ਼ੂਲਧਾਰੀ ਮਹਾਦੇਵ ॥\n\nਭਸਮ ਰਮਈਆ ਮਹਾਦੇਵ , ਤਾਂਡਵ ਪ੍ਰਿਯ ਮਹਾਦੇਵ ,\nਸਦਾ ਵਸੰਤਮ ਮਹਾਦੇਵ , ਹੇ ਮਹਾਕਾਲ ਮਹਾਦੇਵ ॥\n\nਯੋਗੀਰਾਜ ਹੇ ਮਹਾਦੇਵ , ਕੈਲਾਸ਼ਪਤੀ ਮਹਾਦੇਵ ,\nਭੋਲੇਨਾਥ ਹੇ ਮਹਾਦੇਵ , ਹੇ ਸ਼ੰਭੂਨਾਥ ਮਹਾਦੇਵ ॥"},"hi":{"t":"देव देव महादेव","c":"देव देव हे महादेव , देव देव हे महादेव , \nहे देवों के देव महादेव , \nदेव देव हे महादेव , देव देव हे महादेव ।\n\nओंकारेश्वर महादेव , हे सोमनाथ महादेव , \nकेदारनाथ महादेव देव , हे रामेश्वरम् महादेव ।\n\nमल्लिकार्जुन महादेव देव , राग रतन महादेव , \nहे कृपालु महादेव , हे दयावान महादेव ।\n\nब्रह्मा विष्णु हे आदिदेव महादेव , \nभवम भवानी महादेव , गुरू सतगुरू महादेव ।\n\nविश्वनाथ महादेव देव , हे अमरनाथ महादेव , \nत्रियम्बकेश्वर हे महादेव , हे नामेश्वर महादेव ।\n\nभीमाशंकर महादेव , हे वैद्यानाथ महादेव , \nगिरिशानेश्वर महादेव , हे जोगेश्वर महादेव ।\n\nहे शिव शंकर महादेव , हे जटाधार महादेव , \nचंद्रशेखर महादेव , हे गंगाधर महादेव ।\n\nकरुणाधार महादेव देव , हे ज्ञान रूप महादेव , \nवेद स्वरूप महादेव , कल्याणकारी महादेव ।\n\nडमरुधार महादेव देव , भुझंगधारी महादेव , \nरूद्ररूप महादेव देव , त्रिशूलधारी महादेव ।\n\nभस्म रमैया महादेव , तांडव प्रिय महादेव , \nसदा वसंतम् महादेव , हे महाकाल महादेव ।\n\nयोगीराज हे महादेव , कैलाशपति महादेव , \nभोलेनाथ हे महादेव , हे शंभुनाथ महादेव ।"}, 	{"id":1769623501578,
	"pb":{"t":"ਮੇਰੇ ਪਿਆਰੇ ਸਤਿਗੁਰੂ ਜੀ ਮੈਨੂੰ ਆਪਣਾ ਬਣਾਵੋ ਜੀ","c":"ਮੇਰੇ ਪਿਆਰੇ ਸਤਿਗੁਰੂ ਜੀ , ਮੈਨੂੰ ਆਪਣਾ ਬਣਾਵੋ ਜੀ ,\nਬੰਦਾ ਹਾਂ ਮੈਂ ਤੇਰਾ ਜੀ , ਚਰਨਾਂ ਚ ਲਗਾਵੋ ਜੀ ॥\n\nਇਸ ਸਾਰੀ ਦੁਨੀਆ ਵਿਚ , ਕੋਈ ਬਣਿਆ ਨਹੀਂ ਮੇਰਾ ॥\nਹੁਣ ਤੂੰ ਹੀ ਹੈ ਮੇਰਾ , ਮੈਨੂੰ ਆਸਰਾ ਇਕ ਤੇਰਾ ॥\nਕਰੋ ਤਰਸ ਮੇਰੇ ਤੇ ਜੀ , ਮੈਨੂੰ ਰਸਤਾ ਦਿਖਾਵੋ ਜੀ ॥\n\nਪਾਪਾਂ ਦੀਆਂ ਪੰਡਾਂ , ਮੇਰੇ ਸਿਰ ਤੇ ਨੇ ਬੜੀਆਂ ॥\nਸਭ ਗੰਦੀਆਂ ਮੰਦੀਆਂ ਸੋਚਾਂ , ਮੈਨੂੰ ਘੇਰ ਕੇ ਹੈ ਖੜੀਆਂ ॥\nਤੁਸੀਂ ਕਰਕੇ ਮਿਹਰਬਾਨੀ , ਇਹਨਾਂ ਕੋਲੋਂ ਬਚਾਵੋ ਜੀ ॥\n\nਮੈਨੂੰ ਦਾਸ ਬਣਾ ਲਉ ਜੀ , ਮੈਨੂੰ ਦੇਵੋ ਨਾਮ ਆਪਣਾ ॥\nਹੁਣ ਛੱਡ ਕੇ ਮੈਂ-ਮੈਂ ਨੂੰ , ਇਕ ਤੂੰ ਹੀ ਤੂੰ ਹੀ ਜਪਣਾ ॥\nਮੈਨੂੰ ਦੇਵੋ ਸੰਗਤ ਆਪਣੀ , ਸੇਵਾ ਵਿਚ ਲਾਵੋ ਜੀ ॥\n\nਅਰਦਾਸਾਂ ਲੈ ਕੇ ਆਪਣੀ , ਦਰਬਾਰ ਤੇਰੇ ਮੈਂ ਆਇਆ ॥\nਝੋਲੀ ਮੇਰੀ ਖ਼ਾਲੀ ਹੈ , ਤੁਸੀਂ ਆਪ ਬੁਲਾਇਆ ॥\nਮੈਂ ਭੁੱਲਿਆ ਚਰਨੀ ਲਾਵੋ , ਮੈਨੂੰ ਰੱਜ ਕੇ ਨਾਮ ਜਪਾਵੋ ॥\n\nਤੂੰ ਮਾਲਿਕ ਹੈ ਸਭ ਦਾ , ਤੇਰਾ ਥਾਂ ਥਾਂ ਬਸੇਰਾ ॥\nਤੇਰੇ ਹੁਕਮ ਚ ਸਭ ਚੱਲਦਾ , ਮੁਹਤਾਜ ਹਾਂ ਮੈਂ ਤੇਰਾ ॥\nਕਿੰਝ ਸਿਫ਼ਤ ਲਿਖਾਂ ਤੇਰੀ , ਛੋਟਾ ਅਲਫ਼ਾਜ਼ ਮੇਰਾ ॥\nਮੇਰੀ ਜ਼ਿੰਦਗੀ ਚ ਆਵੋ ਜੀ , ਕਦੀ ਦੂਰ ਨਾ ਜਾਵੋ ਜੀ ॥\n\nਕਈ ਵਾਰੀ ਡਿੱਗਿਆ ਮੈਂ , ਤੇਰੀ ਕਿਰਪਾ ਨਾਲ ਉੱਠਿਆ ॥\nਦਰ ਦਰ ਤੇ ਭਟਕਿਆ ਸੀ , ਗਿਆ ਹਰ ਥਾਂ ਮੈਂ ਲੁੱਟਿਆ ॥\nਛੱਡ ਗਏ ਮੇਰੇ ਆਪਣੇ , ਮੈਂ ਅੰਦਰੋ ਅੰਦਰੀ ਟੁੱਟਿਆ ॥\nਦੁੱਖ ਦਰਦ ਮਿਟਾਵੋ ਜੀ , ਸਿੱਧੇ ਰਸਤੇ ਪਾਵੋ ਜੀ ॥\n\nਭੁੱਲ ਕੇ ਮੈਂ ਸਾਰੀ ਦੁਨੀਆ , ਤੇਰਾ ਫੜਿਆ ਸਹਾਰਾ ॥\nਮੈਂ ਤੇਰਾ ਆਸਰਾ ਹੈ , ਮੇਰਾ ਸਤਿਗੁਰੂ ਰੱਖਣਹਾਰਾ ॥\nਹਰ ਇਕ ਨੂੰ ਮਾਫ਼ ਕਰਦਾ , ਗੁਰੂ ਸਤਿਗੁਰੂ ਬਖ਼ਸ਼ਣਹਾਰਾ ॥\nਮੇਰੀ ਮੈਂ ਨੂੰ ਮਿਟਾਵੋ ਜੀ , ਮੈਨੂੰ ਦਾਸ ਬਣਾਵੋ ਜੀ ॥\n\nਤੂੰ ਰਾਖਾ ਤੂੰ ਹੈ ਸਵਾਮੀ , ਤੇਰੇ ਕਰਕੇ ਦੁਨੀਆਦਾਰੀ ॥\nਮੈਂ ਨੀਚ ਨਿਮਾਣਾ ਹਾਂ , ਮੇਰੀ ਸਤਿਗੁਰੂ ਨਾਲ ਯਾਰੀ ॥\nਅੰਦਰੋਂ ਵੀ ਦਾਤਾ ਸੋਹਣਾ , ਸੂਰਤ ਹੈ ਉਸਦੀ ਪਿਆਰੀ ॥\nਗੁਰੂ ਮੰਤਰ ਜਪਾਵੋ ਜੀ , ਭਵਸਾਗਰ ਤਰਾਵੋ ਜੀ ॥"},"hi":{"t":"मेरे पयारे सतिगुरू जी मैंनू अपना बनावो जी","c":"मेरे पयारे सतिगुरू जी \nमैंनू अपना बनावो जी \nबंदा हां मैं तेरा जी \nचरना च लगावो जी\n\nइस सारी दुनिया विच \nकोई बनिया नहीं मेरा \nहुण तूं ही है मेरा \nमैनु आसरा इक तेरा \nकरो तरस मेरे ते जी \nमैनूं रसता दिखावो जी\n\nपापां दिया पंडां \nमेरे सिर ते ने बड़ीयां \nसब गंदीया मंदीयां सोचां \nमैंनूं घेर के है खड़ीयां \nतुर्सी करके मिहरबानी \nएहना कोलों बचावो जी\n\nमैनूं दास बना लउ जी \nमैनूं देवो नाम अपणा \nहुण छड के मैं मैं नूं \nइक तूंही तूही जपणा \nमैनूं देवो संगत अपनी \nसेवा विच लावो जी\n\nअरदासा ले के अपनी \nदरबार तेरे मैं आया \nझोली मेरी खाली है \nतूसी आप बुलाया \nमैं भुल्या चरनी लावो \nमैनू रज के नाम जपावो\n\nतूं मालिक है सब दा \nतेरा थां थां बसेरा \nतेरे हुकम च सब चलदा \nमोहताज हां मैं तेरा \nकिंज सिफत लिखां तेरी \nछोटा अलफाज मेरा \nमेरी जिंदगी च आवो जी \nकदी दूर ना जावो जी\n\nकई वारी डिगया मैं \nतेरी किरपा नाल ऊठिया \nदर दर ते भटकया सी \nगया हर थां मैं लुटिया \nछड गए मेरे अपने \nमैं अंदरो अंदरी टुटिया \nदुख दर्द मिटावो जी \nसिधे रसते पावो जी\n\nभुल के मैं सारी दुनिया \nतेरा फडया सहारा \nमैं तेरा आसरा है \nमेरा सतिगुरू रखनहारा \nहर इक नूं माफ करदा \nगुरु सतिगुरु बखराणहारा \nमेरी मैं नूं मिटावो जी \nमैनू दास बनावो जी\n\nतूं राखा तूं है सवामी \nतेरे करके दुनियादारी \nमैं नीच निमाणा हां \nमेरी सतिगुरु नाल यारी \nअंदरो वी दाता सोहणा \nसूरत है उसदी प्यारी \nगुरु मंत्र जपावो जी \nभवसागर तरावो जी"},"en":{"t":"Mere Pyare Satguru Ji Mainu Apna Banavo Ji","c":"Mere Pyare Satguru Ji Mainu Apna Banavo Ji"}},

	{"id":1769623813421,
	"pb":{"t":"ਮੈਂ ਹਰਿ ਜੀ ਹਰਿ ਜੀ ਬੋਲ ਰਿਹਾ","c":"ਗੁਰੂਆਂ ਦੇ ਦੱਸੇ ਮਾਰਗ ਤੇ , \nਮੈਂ ਹਰਿ ਜੀ ਹਰਿ ਜੀ ਬੋਲ ਰਿਹਾ ॥\nਅਨਹਦ ਨਾਮ ਦਾ ਸਿਮਰਨ ਕਰਕੇ , \nਅੰਦਰੋਂ ਤਾਰਾਂ ਜੋੜ ਰਿਹਾ ॥\n\nਸਤਿਗੁਰੂ ਨੇ ਮੈਨੂੰ ਏਹ ਦੱਸਿਆ , \nਸੇਵਾ ਨੂੰ ਸਦਾ ਕਮਾਉਣਾ ਏ ॥\nਏਹ ਦੁਨੀਆ ਰੱਬ ਨੇ ਬਣਾਈ ਏ , \nਤੂੰ ਕਿਸੇ ਦਾ ਦਿਲ ਨਹੀਂ ਦੁਖਾਉਣਾ ਏ ॥\nਪ੍ਰਭੂ ਪ੍ਰੀਤਮ ਚਰਨੀ ਵੱਸਣਾ ਏ , \nਉਥੇ ਹਰਿ ਜੀ ਹਰਿ ਜੀ ਬੋਲਣਾ ਏ ॥\n\nਸਾਧੂ ਸੰਗਤ ਸੇਵਾ ਕਰਨੀ ਏ , \nਅਸੀਂ ਏਹੋ ਸਿੱਖਿਆ ਗੁਰੂਆਂ ਤੋਂ ॥\nਭਰੀ ਕੀਚੜ ਪਲੀਤੀ ਧੋ ਦੇਣੀ , \nਮਨ ਨਿਰਮਲ ਕਰਨਾ ਵਿਸ਼ਿਆਂ ਤੋਂ ॥\nਹੁਣ ਖ਼ੁਦ ਨੂੰ ਚਰਨੀ ਲਾ ਦੇਣਾ , \nਜੋ ਇੱਧਰ ਉੱਧਰ ਡੋਲ ਰਿਹਾ ॥\n\nਅਸੀਂ ਇੱਕੋ ਰੱਬ ਦੇ ਬੰਦੇ ਹਾਂ , \nਸਾਡਾ ਰੱਬ ਹੀ ਪਾਲਣਹਾਰਾ ਹੈ ॥\nਅਸੀਂ ਰੱਬ ਨੂੰ ਜਾ ਕੇ ਮਿਲਣਾ ਹੈ , \nਮਿਲਣ ਲਈ ਨਾਮ ਸਹਾਰਾ ਹੈ ॥\nਮੈਂ ਮਿਲਣਾ ਪ੍ਰਭੂ ਪਿਆਰੇ ਨੂੰ , \nਤਾਂ ਹੀ ਪ੍ਰਭ ਅਵਿਨਾਸੀ ਬੋਲ ਰਿਹਾ ॥\n\nਹਰਿ ਨਾਮ ਦੀ ਮਹਿਮਾ ਉੱਤਮ ਹੈ , \nਹਰ ਸੰਤ ਹੀ ਸਿਫ਼ਤਾਂ ਕਰਦਾ ਹੈ ॥\nਜੋ ਸ਼ਰਧਾ ਦੇ ਨਾਲ ਜਪਦਾ ਹੈ , \nਉਹੀ ਭਵਸਾਗਰ ਚੋਂ ਤਰਦਾ ਹੈ ॥\nਹਰ ਗ੍ਰੰਥ ਦਾ ਹਰ ਇੱਕ ਅੱਖਰ ਵੀ , \nਇੱਕ ਨਾਮ ਜਪੋ ਏਹ ਬੋਲ ਰਿਹਾ ॥\n\nਨਾ ਗੰਦਾ ਮੰਦਾ ਬੋਲਣਾ ਏ , \nਨਾ ਗੰਦਾ ਮੰਦਾ ਖਾਣਾ ਏ ॥\nਸਦਾ ਭਲਾ ਹੀ ਸਭ ਦਾ ਮੰਗਣਾ ਏ , \nਤੇ ਭਾਣੇ ਦੇ ਵਿਚ ਰਹਿਣਾ ਏ ॥\nਗੁਰੂਆਂ ਦੀ ਪਾਵਨ ਸਿੱਖਿਆ ਨੂੰ , \nਮੈਂ ਸਾਧ ਸੰਗਤ ਵਿਚ ਖੋਲ ਰਿਹਾ ॥"},"hi":{"t":"मैं हर जी हर जी बोल रिहा","c":"गुरूआं दे दस्से मार्ग ते \nमैं हर जी मै हर जी बोल रिहा \nअनहद नाम दा सिमरन करके \nअंदरों तारां जोड़ रिहा\n\nसतिगुरू ने मैनू एह दसया \nसेवा नू सदा कमेणा ए \nएह दुनिया रब ने बनाई ए \nतूं किसे दा दिल नहीं दुखौणा ए \nप्रभु प्रीतम चरनी वसणा ए \nओथे हर जी हर जी बोलणा ए\n\nसाधू संगत सेवा करनी ए \nअर्सी एहो सिखया गुरुयां तों \nभरी कीचड़ पलीती धो देणी \nमन निर्मल करना विषयां तों \nहुण खुद नू चरनी ला देणा \nजो एधर उधर डोल रिहा\n\nअसीं इक्को रब दे बंदे हां \nसाडा रब ही पालणहारा है \nअसीं रब नूं जाके मिलणा है \nमिलने लई नाम सहारा है \nमै मिलणा प्रभु प्यारे नूं \nता ही प्रभ अविनासी बोल रिहा\n\nहरि नाम दी महिमा उत्तम है \nहर संत ही सिफता करदा है \nजो श्रद्धा दे नाल जपदा है \nओही भवसागर चों तरदा है \nहर ग्रथ दा हर इक्क अखर वी \nइक्क नाम जप्पो एह बोल रिहा\n\nना गंदा मंदा बोलणा ए \nना गंदा मंदा खाणा ए \nसदा भला ही सब दा मंगणा ए \nते भाणे दे विच रहणा ए \nगुरूयां दी पावन सिखया नू \nमै साध संगत विच खोल रिहा"},"en":{"t":"Mein Har Ji Har Ji Bol Reha","c":"Mein Har Ji Har Ji Bol Reha"}},

	{"id":1769705847471,
	"pb":{"t":"ਜਿੰਦੜੀਏ ਜਪ ਲੈ ਜਪ ਲੈ","c":"ਰੱਬ ਨੇ ਹੈ ਬ੍ਰਹਿਮੰਡ ਸਜਾਇਆ , \nਰੱਬ ਨੇ ਸਾਰਾ ਖੇਡ ਰਚਾਇਆ ॥\nਹਰ ਸ਼ੈ ਵਿਚ ਉਹ ਆਪ ਸਮਾਇਆ , \nਉਹ ਵੱਸੇ ਹਰ ਇਕ ਥਾਂ ॥\nਜਿੰਦੜੀਏ ਜਪ ਲੈ ਜਪ ਲੈ , \nਜਪ ਲੈ ਗੁਰਾਂ ਦਾ ਨਾਂ ॥\n\nਤੇਰੇ ਬਾਝ ਨਾ ਹੋਏ ਗੁਜ਼ਾਰਾ , \nਹਰ ਇਕ ਦਾਸ ਦਾ ਤੂੰਹੀ ਸਹਾਰਾ ॥\nਉਹਦੇ ਬਾਝੋਂ ਅੰਬਰ ਸੁੰਨੇ , \nਉਹੀ ਚੰਨ ਤੇ ਉਹੀ ਤਾਰਾ ,\nਉਹ ਬਖ਼ਸ਼ੇ ਧੁੱਪ ਤੇ ਛਾਂ ॥\n\nਹਰ ਕੋਈ ਆਪਣੇ ਗੁਰੂ ਨੂੰ ਟੋਲੇ , \nਅਰਜ਼ ਕਰੇ ਤਸਵੀਰ ਦੇ ਕੋਲੇ ॥\nਅਰਜ਼ ਸੁਣੇ ਤਸਵੀਰ ਗੁਰਾਂ ਦੀ , \nਉਂਝ ਭਾਵੇਂ ਉਹ ਕੁਝ ਨਾ ਬੋਲੇ ॥\nਉਹ ਫੜਦਾ ਸਭ ਦੀ ਬਾਂਹ , \nਕੰਮ ਬਣਦਾ ਸਭ ਦਾ ਤਾਂ ॥\n\nਮਜ਼ਲੂਮਾਂ ਨੂੰ ਗੱਲ ਨਾਲ ਲਾਵੇ , \nਰੱਬ ਦੇ ਘਰ ਦਾ ਰਾਹ ਦਿਖਲਾਵੇ ॥\nਅਪਰੰਪਾਰ ਹੈ ਲੀਲਾ ਉਸਦੀ , \nਹਰ ਕਿਸੇ ਨੂੰ ਸਮਝ ਨਾ ਆਵੇ ,\nਸਭ ਉਹਦੇ ਹੰਸ ਤੇ ਕਾਂ ॥\n\nਜੋਤ ਆਈ ਨਾਨਕ ਦੇ ਘਰ ਤੋਂ , \nਖ਼ਾਲੀ ਕੋਈ ਨਾ ਜਾਵੇ ਦਰ ਤੋਂ ॥\nਨਿਰਭਉ ਨਿਰਵੈਰ ਸਤਿਗੁਰ ਮੇਰਾ , \nਬਦਲਿਆ ਨਹੀਂ ਉਹ ਕਿਸੇ ਡਰ ਤੋਂ ,\nਉਹ ਸਭ ਦਾ ਪਿਉ ਤੇ ਮਾਂ ॥"},"hi":{"t":"जिंदड़ीए जप लै जप लै","c":"रब ने है ब्रहमंड सजाया \nरब ने सारा खेल रचाया \nहर शै विच ओह आप समाया \nओह वसे हर इक थां \nजिंदड़ीए जप लै जप लै \nजप है गुरां दा नां\n\nतेरे बाझ ना होए गुजारा \nहर इक दास दा तुंही सहारा \nओहदे बाझों अंबर सुन्ने \nओही चनं ते ओही तारा \nओह बखशे घुप ते छां\n\nहर कोई अपने गुरु नू टोले \nअरज करे तस्वीर दे कोले \nअरज सुणे तस्वीर गुरां दी \nउंझ भावें ओह कुझ ना बोले \nओह फड़दा सब दी बांह \nकम बनदा सभ दा तां\n\nमजलूमां नू गल नाल लावे \nरब दे घर दा राह दिखलावे \nअपरंपार है लीला उसदी \nहर किसे नू समझ ना आवे \nसब ओहदे हंस ते कां\n\nजोत आई नानक दे घर तों \nखाली कोई ना जावे दर तों \nनिरभौं निरखैर सतगुर मेरा \nबदलेया नहीं उहना यह किसे डर तों \nओह सब दा पिओ ते मां"},"en":{"t":"Jindariye Jap Le Gura Da Naam","c":"Jindariye Jap Le Gura Da Naam"}},

	{"id":1769706461396,
	"pb":{"t":"ਸ਼ਾਮ ਪਈ ਪਰ ਸ਼ਿਆਮ ਨਾ ਆਇਆ","c":"ਸ਼ਾਮ ਪਈ ਪਰ ਸ਼ਿਆਮ ਨਾ ਆਇਆ ਦਿਲ ਮੇਰਾ ਘਬਰਾਵੇ ,\nਤੱਕ ਤੱਕ ਹਾਰੀ ਸੁੰਨੀਆਂ ਰਾਹਵਾਂ ਸ਼ਿਆਮ ਨਜ਼ਰ ਨਾ ਆਵੇ \nਨੀ ਸਈਓ ਮੈਂ ਗਈ ਗਵਾਚੀ ਸੁਧ-ਬੁਧ ਮੇਰੀ ਖੋਈ ,\nਮੈਨੂੰ ਕਮਲੀ ਕਮਲੀ ਆਖੋ ਮੈਂ ਤਾਂ ਸ਼ਾਮ ਦੀ ਕਮਲੀ ਹੋਈ ॥\n\nਕਦੇ ਮੈਂ ਅੰਦਰ ਵੜ ਵੜ ਰੋਵਾਂ , ਕਦੇ ਬਾਹਰ ਨੂੰ ਜਾਵਾਂ ,\nਜਾਣ ਵਾਲੇ ਨੂੰ ਮੋੜ ਲਿਆਵਾਂ , ਮਿਲ ਜਾਏ ਜੇ ਸਿਰਨਾਵਾਂ ,\nਉਸ ਜੋਗੀ ਮੈਨੂੰ ਕੀਤਾ ਰੋਗੀ ਮੈਂ ਉਸ ਜੋਗੀ ਹੋਈ ,\nਨੀ ਮੈਨੂੰ ਕਮਲੀ ... \n\nਪਿਆਰ ਦੀਆਂ ਦੋ ਗੱਲਾਂ ਕਰਕੇ , ਲੁੱਟ ਲਏ ਮੇਰੇ ਹਾਸੇ ,\nਕੀ ਆਖਾਂ ਕੁਝ ਸਮਝ ਨਾ ਆਵੇ , ਜਾਵਾਂ ਕਿਹੜੇ ਪਾਸੇ ,\nਜਿੰਦੜੀ ਮੇਰੀ ਮਲੂਕ ਜਿਹੀ , ਹੁਣ ਕਿੱਥੇ ਆ ਖਲੋਈ ,\nਨੀ ਮੈਨੂੰ ਕਮਲੀ ...\n\nਕਈ ਰੁੱਤਾਂ ਪਰਛਾਵੇਂ ਢਲ ਗਏ , ਕਈ ਸ਼ਾਮਾਂ ਲੰਘ ਗਈਆਂ ,\nਹਰ ਵੇਲੇ ਹਰ ਪਾਸੇ , ਉਹਦੀਆਂ ਰਾਹਵਾਂ ਤੱਕਦੀ ਪਈਆਂ \nਨਾ ਸੱਜਣਾ ਪਰਦੇਸ ਨਾ ਜਾਵੀਂ ਉਹਨੇ ਸੁਣੀ ਨਾ ਕੋਈ ,\nਨੀ ਮੈਨੂੰ ਕਮਲੀ ...\n\nਅੱਲ੍ਹਾ ਮਿਹਰ ਪਾਵੇ ਮਨ ਉਹਦੇ , ਉਹਨੂੰ ਮੋੜ ਲਿਆਵੇ ,\nਮੇਰੇ ਲਈ ਲੱਖ ਈਦਾਂ ਹੋਸਨ , ਉਸਦੀ ਦੀਦ ਕਰਾਵੇ ,\nਹੰਝੂਆਂ ਦੇ ਦਰਿਆ ਸੁੱਕ ਚੱਲੇ , ਅੱਖ ਐਨੀ ਅੱਜ ਰੋਈ ,\nਨੀ ਮੈਨੂੰ ਕਮਲੀ ..."},"hi":{"t":"शाम पई पर श्याम ना आया","c":"शाम पई पर श्याम ना आया दिल मेरा घबरावे , \nतक तक हारी सुन्नियां राहवां श्याम नजर न आवे \nनी सईयो मैं गई गवाची सुध बुध मेरी खोई , \nमैनूं कमली कमली आखो मैं तां शाम दी कमली होई ।\n\nकदे मैं अंदर वड़ वड़ रोवां , कदे बाहर नू जावां , \nजाण वाले नू मोड़ लयावां , मिल जाये जे सरनावा , \nउस जोगी मैंनू कीता रोगी मैं उस जोगी होई ,\nनी मैनुं कमली ...\n\nप्यार दीयां दो गल्लां करके , लुट लए मेरे हासे , \nकी आखां कुछ समझ ना आवे , जावां केहड़े पासे , \nजिंदड़ी मेरी मलूक जेई , हुण किथे आ खलोई ,\nनी मैनुं कमली ...\n\nकई रूतां परछावे ढ़ल गये , कई शामां लंघ गईयां , \nहर वेले हर पासे , ओदीया राहवां तकदी पईयां \nना सजना परदेस ना जावीं उन्हे सुणी ना कोई ,\nनी मैनु कमली ...\n\nअल्लाह मेहर पावे मन ओहदे , ओन्हू मोड़ लयावे , \nमेरे लई लख ईदां होसन , उसदी दीद करावे , \nहंजूआं दे दरिया सुक्क चले , अक्ख ऐनी अज रोई , \nनी मैनु कमली ..."},"en":{"t":"Sham Payi Par Shyam Na Aya","c":"Sham Payi Par Shyam Na Aya"}},

	{"id":1769706923900,"audio":"audio/Jind Duniya Uttoh Vaar Gya.mp3",
	"pb":{"t":"ਮਾਂ ਚੰਨਣ ਦਾ ਚੰਨ ਅਨੋਖਾ","c":"ਮਾਂ ਚੰਨਣ ਦਾ ਚੰਨ ਅਨੋਖਾ , \nਜੱਗ ਵਿਚ ਮਹਿਕ ਖਿਲਾਰ ਗਿਆ ਜਿੰਦ ਦੁਨੀਆ ਉੱਤੋਂ ਵਾਰ ਗਿਆ ॥\n\nਇਕ ਦਿਨ ਨੂਰ ਇਲਾਹੀ ਲੈ ਕੇ , ਸ਼ਹਿਰ ਬਟਾਲੇ ਆਇਆ ,\nਪਿਤਾ ' ਜਗਨ ' ਦਾ ਰਾਜ ਦੁਲਾਰਾ , ਮਾਂ ਚੰਨਣ ਦੇਈ ਦਾ ਜਾਇਆ ,\n' ਦਰਸਨਾ ' , ਸੱਤਿਆ ਭੈਣਾਂ ਦਾ ਉਹ , ਸੋਹਣਾ ਵੀਰ ਕਹਾਇਆ ,\nਕਰਦੇ ਸਭ ਦੀਦਾਰ ਕੇ ਦੇਖੋ , ਰੱਬ ਧਰਤੀ ਤੇ ਆਇਆ ,\nਮਾਂ ਚੰਨਣ ਦਾ ...\n\nਭਰੀ ਜਵਾਨੀ ਦੇ ਵਿਚ ਉਹਨੇ , ਪਾਇਆ ਫ਼ਕੀਰੀ ਬਾਣਾ ,\nਰੱਬ ਦੇ ਘਰ ਦੀਆਂ ਰੱਬ ਹੀ ਜਾਣੇ , ਮੈਂ ਕੁਝ ਸਾਰ ਨਾ ਜਾਣਾ ,\nਗਲੀ ਗਲੀ ਬਣਜਾਰਾ ਫਿਰਦਾ , ਦਿੱਤਾ ਨਾਮ ਦਾ ਹੋਕਾ ,\nਸਭ ਨੇ ਲੈ ਲਿਆ ਲਾਹਾ ਉਸ ਤੋਂ , ਕਿਸੇ ਨਾ ਛੱਡਿਆ ਮੌਕਾ ,\nਮਾਂ ਚੰਨਣ ਦਾ ...\n\nਜਿੱਥੇ ਕਦਮ ਟਿਕਾਏ ਉਹ , ਜੰਗਲ ਵਿਚ ਮੰਗਲ ਲਾਵੇ ,\nਸਿਫ਼ਤ ਕਰੇ ਉਸ ਰੱਬ ਦੇ ਘਰ ਦੀ , ਸਭ ਨੂੰ ਆਪ ਸੁਣਾਵੇ ,\nਸਾਰੇ ਪਾਸੇ ਉਸ ਦੀਆਂ ਸਿਫ਼ਤਾਂ , ਕਰਦਾ ਐ ਜੱਗ ਸਾਰਾ ,\nਬਣਿਆ ਮਾਣ ਨਿਮਾਣਿਆਂ ਦਾ ਤੇ ਨਿਰਬਲ ਦਾ ਸਹਾਰਾ ,\nਮਾਂ ਚੰਨਣ ਦਾ ...\n\nਦਾਸ ਧਰਮ ਦੇ ਬਾਨੀ ਨੇ ਇਕ ਖੇਡੀ ਖੇਡ ਨਿਆਰੀ ,\nਤੱਕਦੇ ਰਹਿ ਗਏ ਤੱਕਣ ਵਾਲੇ , ਮਾਰੀ ਉਸ ਉਡਾਨੀ ,\nਸਰਬ ਕਲਾ ਭਰਪੂਰ ਉਹ ਇਕ ਦਿਨ ਐਸੀ ਕਲਾ ਦਿਖਾ ਗਿਆ ,\nਆਪਣੀ ਜਾਨ ਤੇ ਖੇਡ ਕੇ ਉਹ , ਦੁਨੀਆ ਤੇ ਠੰਢ ਵਰਤਾ ਗਿਆ ,\nਮਾਂ ਚੰਨਣ ਦਾ ..."},"hi":{"t":"माँ चनन्न दा चन्न अनोखा","c":"माँ चनन्न दा चन्न अनोखा , \nजग विच महक खलार गया जिंद दुनिया उतों वार गया ।\n\nइक दिन नूर ईलाही लै के , शहर बटाले आया , \nपिता ' जगन ' दा राज दुलारा , माँ चन्नन देई दा जाया ,\n' दर्शना ' , सत्या भैणा दा ओ , सोहणा वीर कहाया , \nकरदे सब दीदार के देखो , रब्ब धरती ते आया ,\nमाँ चनन्न दा ...\n\nभरी जवानी दे विच ओहने , पाया फकीरी बाणा , \nरब्ब दे घर दीयां रब्ब ही जाणे , मैं कुछ सार ना जाणा , \nगली गली बंजारा फिरदा , दिता नाम दा हौका , \nसब ने लै लया लाहा उस तो , किसे ना छड्या मौका ,\nमाँ चनन्न दा ...\n\nजित्थे कदम टिकाये औह , जंगल विच मंगल लावें , \nसिफत करे उस रब्ब दे घर दी , सब नू आप सुनावे , \nसारे पासे उस दीयां सिफता , करदा ऐ जग सारा , \nबनया मान निमाणेया दा ते निर्बल दा सहारा ,\nमाँ चनन्न दा ...\n\nदास धर्म दे बानी ने ईक खेडी खेड न्यारी , \nतक दे रह गय तकन वाले , मारी उस उडारी , \nसरब कला भरपूर औ इक दिन ऐसी कला दिखा गया , \nअपनी जान ते खेड के औ , दुनिया ते ठंड वरता गया ,\nमाँ चनन्न दा ..."},"en":{"t":"Maa Chanan Da Chan Anokha","c":"Maa Chanan Da Chan Anokha"}},

	{"id":1769707224572,
	"pb":{"t":"ਵੱਜਦਾ ਧੁਨਕਾਰਾ","c":"ਸਾਹਾਂ ਦੀ ਚਰਖੀ ਦੇ ਉੱਤੇ ਨਾਮ ਤੇਰੇ ਦਾ ਰੂੰ ,\nਵੱਜਦਾ ਧੁਨਕਾਰਾ ਬੋਲੇ ਤੂੰ ਹੀ ਤੂੰ ...\n\nਮਾਟੀ ਬੋਲੇ ਪਵਨ ਵਜਾਵੇ ,\nਰੂਹ ਜਦ ਗੀਤ ਗੋਬਿੰਦ ਅਲਾਵੇ \nਪ੍ਰੇਮ ਦਾ ਦਰਿਆ ਬਣ ਕੇ ਵਗਦੇ ਨੈਣਾਂ ਦੇ ਅੱਥਰੂ ,\nਬੋਲੇ ਤੂੰ ਹੀ ਤੂੰ ...\n\nਪ੍ਰੀਤਮ ਆਣ ਵਸੋ ਮਨ ਮੇਰੇ \nਤੁਮ ਸੋ ਠਾਕੁਰ ਅੋਰ ਨਾ ਮੇਰੇ \nਰਖਿਆ ਕਰੋ ਗੋਸਾਈਂ ਮੇਰੇ , ਨਾਮ ਤੇਰਾ ਸਿਮਰੂੰ ,\nਬੋਲੇ ਤੂੰ ਹੀ ਤੂੰ ...\n\nਇੱਕ ਤੂੰ ਹੀ ਨਿਰੰਕਾਰ ਸੁਆਮੀ \nਸਗਲ ਘਟਾ ਕੇ ਅੰਤਰਜਾਮੀ \nਮੁਝ ਕੋ ਅਪਨੀ ਸ਼ਰਨ ਮੇ ਲੇ ਲੋ , ਤੁਝ ਕੋ ਯਾਦ ਕਰੂੰ ,\nਬੋਲੇ ਤੂੰ ਹੀ ਤੂੰ ...\n\nਪੀ ਪੀ ਸੁਣੋ ਪਪੀਹਾ ਬੋਲੇ \nਨੈਣਾ ਬਸ ਪ੍ਰੀਤਮ ਕੋ ਟੋਲੇ \nਪੀ ਕੇ ਪਾਵਨ ਚਰਨੋਂ ਮੇਂ , ਮੈਂ ਅਪਨਾ ਸਿਰ ਧਰਦੂੰ ,\nਬੋਲੇ ਤੂੰ ਹੀ ਤੂੰ ..."},"hi":{"t":"वजदा धुनकारा","c":"साहा दी चरखी दे उते नाम तेरे दा रूं , \nवजदा धुनकारा बोले तू ही तू ...\n\nमाटी बोले पवन वजावे , \nरूह जद गीत गोबिन्द आलावे \nप्रेम दा दरिया बन के वगदे नैना दे अथरू , \nबोले तू ही तू ...\n\nप्रीतम आन बसो मन मेरे \nतुम सो ठाकुर और ना मेरे \nरखिया करो गोसाई मेरे , नाम तेरा सिमरूँ , \nबोले तू ही तू ...\n\nईक तू ही निरंकार सुआमी \nसगल घटा के अतंरयामी \nमुझ को अपनी शरण मे ले लो , तुझ को याद करूँ , \nबोले तू ही तू ...\n\nपी पी सुनो पपीहा बोले \nनैना बस प्रीतम को टोले \nपी के पावन चरनो में , मैं अपना सिर धरदूँ , \nबोले तू ही तूं ..."},"en":{"t":"Vajda Dhunkara","c":"Vajda Dhunkara"}},

	{"id":1769707607597,
	"pb":{"t":"ਰਾਮ-ਰਾਮ ਬੋਲੋ ਪ੍ਰਭੂ ਰਾਮ ਆਉਣਗੇ","c":"ਰਾਮ-ਰਾਮ ਬੋਲੋ ਪ੍ਰਭੂ ਰਾਮ ਆਉਣਗੇ , \nਸਭਕੇ ਨਸੀਬ ਅੱਜ ਜਾਗ ਜਾਣਗੇ ॥\n\nਰਾਮ-ਰਾਮ ਜਪੋ , ਰਾਮ ਸੁੱਖਾਂ ਦਾ ਅਧਾਰ ,\nਭਵ ਤੋਂ ਲਗਾਉਣਗੇ ਨਈਆ ਨੂੰ ਵੀ ਪਾਰ , \nਬਣਕੇ ਖਿਵੱਈਆ ਪ੍ਰਭੂ ਆਪ ਆਉਣਗੇ ,\nਰਾਮ-ਰਾਮ ਬੋਲੋ ...\n\nਪ੍ਰਾਣੀ ਜੇ ਤੂੰ ਰਾਮ ਨਾਮ ਨਹੀਂ ਗਾਏਂਗਾ , \nਰਾਮ ਬਿਨਾ ਰਾਮ ਪੁਰ ਕੈਸੇ ਜਾਏਂਗਾ ,\nਰਾਮ ਜੱਪਣੇ ਸੇ ਦੁੱਖ ਭਾਗ ਜਾਣਗੇ ,\nਰਾਮ-ਰਾਮ ਬੋਲੋ ...\n\nਤਨ ਮਨ ਸੇ ਜੋ ਰਾਮ-ਰਾਮ ਬੋਲਦਾ , \nਜੀਵਨ ਕੇ ਪਥ ਪੇ ਵੋ ਨਹੀਂ ਡੋਲਦਾ ,\nਹਰ ਰਸਤੇ ਪੇ ਪ੍ਰਭੂ ਆਪ ਜਾਣਗੇ ,\nਰਾਮ-ਰਾਮ ਬੋਲੋ ...\n\nਕਰਲੇ ਭਰੋਸਾ ਬੰਦੇ ਰਾਮ ਨਾਮ ਕਾ , \nਰਾਮ ਬਿਨਾ ਜੀਨਾ ਤੇਰਾ ਕਿਸ ਕਾਮ ਕਾ ,\nਰਾਮ ਸੇ ਹੀ ਸਬ ਕਾਮ ਰਾਸ ਆਉਣਗੇ ,\nਰਾਮ-ਰਾਮ ਬੋਲੋ ...\n\nਜਿਨ੍ਹਾਂ ਨੇ ਭਰੋਸਾ ਰਾਮ ਨਾਮ ਪੇ ਕਿਯਾ , \nਏਕ ਮਨ ਹੋਕੇ ਯਾਦ ਰਾਮ ਕੋ ਕਿਯਾ ,\nਹਰ ਪਲ ਵੋ ਤੋ ਸੰਗ ਰਾਮ ਪਾਉਣਗੇ ,\nਰਾਮ-ਰਾਮ ਬੋਲੋ ..."},"hi":{"t":"राम-राम बोलो प्रभु राम आएंगे","c":"राम-राम बोलो प्रभु राम आएंगे , \nसबके नसीब आज जाग जाएंगे ।\n\nराम-राम जपो , राम सुखो का आधार , \nभव से लगाएंगे नैया को भी पार , \nबनके खिवड्या प्रभु आप आएंगे ,\nराम-राम बोलो ...\n\nप्राणी जे तूं राम नाम नहीं गाएगा , \nराम बिना राम पुर कैसे जाएगा , \nराम जपने से दुख भाग जाएंगे ,\nराम-राम बोलो ...\n\nतन मन से जो राम-राम बोलता , \nजीवन के पथ पे वो नहीं डोलता , \nहर रस्ते पे प्रभु आप जाएंगे ,\nराम-राम बोलो ...\n\nकरले भरोसा बंदे राम नाम का , \nराम बिना जीना तेरा किस काम का , \nराम से ही सब काम रास आएंगे ,\nराम-राम बोलो ...\n\nजिन्होने भरोसा राम नाम पे किया , \nएक मन होके याद राम को किया , \nहर पल वो तो संग राम पाएंगे ,\nराम-राम बोलो ..."},"en":{"t":"Ram Ram Bolo Prabhu Ram Ayenge","c":"Ram Ram Bolo Prabhu Ram Ayenge"}},

	{"id":1769708033952,
	"pb":{"t":"ਬੰਦਿਆ ਰੱਬ ਦੇ ਦੇਖ ਨਜ਼ਾਰੇ","c":"ਬੰਦਿਆ ਰੱਬ ਦੇ ਦੇਖ ਨਜ਼ਾਰੇ , ਸਭ ਦੇ ਵਿਗੜੇ ਕਾਜ ਸਵਾਰੇ ,\nਆਪਣੇ ਪਿਆਰੇ ਭਗਤਾਂ ਦੇ ਦੁੱਖ , ਧੋਈ ਜਾਂਦਾ ਏ ,\nਕੁਝ ਨਹੀਂ ਕਰਨਾ ਪੈਂਦਾ ਆਪੇ ਹੋਈ ਜਾਂਦਾ ਏ ॥\n\nਰੱਬ ਨੇ ਕੀਤੀ ਨਜ਼ਰ ਸਵੱਲੀ , ਜੇਲ੍ਹ ਚ ਚੱਕੀ ਆਪੇ ਚੱਲੀ \nਸਤਿ ਕਰਤਾਰ ਦੀ ਮਸਤੀ ਦੇ ਵਿਚ ਖੋਈ ਜਾਂਦਾ ਏ ,\nਕੁਝ ਨਹੀਂ ਕਰਨਾ ...\n\nਧੰਨਾ ਮੁੱਖ ਚੋਂ ਸ਼ਾਮ ਉਚਾਰੇ , ਆਪੇ ਮੁੜਦੇ ਵੇਖ ਕਿਆਰੇ ,\nਧੰਨੇ ਦੇ ਕੰਮਾਂ ਵਿਚ ਆਪ ਖਲੋਈ ਜਾਂਦਾ ਏ ,\nਕੁਝ ਨਹੀਂ ਕਰਨਾ ...\n\nਮੀਰਾ ਨੂੰ ਜਦ ਪਿਆਰ ਹੋ ਗਿਆ , ਨਾਗ ਵੀ ਕਾਲਾ ਹਾਰ ਹੋ ਗਿਆ ,\nਜ਼ਹਿਰ ਪਿਆਲੇ ਵਿਚੋਂ ਅੰਮ੍ਰਿਤ ਚੋਈ ਜਾਂਦਾ ਏ ,\nਕੁਝ ਨਹੀਂ ਕਰਨਾ ...\n\nਆਸਣ ਉੱਤੇ ਸਜੇ ਸੁਦਾਮਾ , ਚਰਨਾਂ ਦੇ ਵਿਚ ਬੈਠੇ ਸ਼ਾਮਾਂ ,\nਗਲੇ ਲਗਾ ਕੇ ਚਰਨ ਮਿੱਤਰ ਦੇ ਧੋਈ ਜਾਂਦਾ ਏ ,\nਕੁਝ ਨਹੀਂ ਕਰਨਾ ..."},"hi":{"t":"बंदेया रब्ब दे देख नजारे","c":"बंदेया रब्ब दे देख नजारे , सब दे बिगड़े काज सवारे , \nअपने प्यारे भगता दे दुख , धोई जांदा ए , \nकुज नही करना पैन्दा आपे होई जांदा ए ।\n\nरब्ब ने कीती नजर सवल्ली , जेल च चक्की आपे चल्ली \nसत करतार दी मस्ती दे विच खोई जांदा ए ,\nकुज नही करना ...\n\nधन्ना मुख चों शाम उचारे , आपे मुड़दे वेख क्यारे , \nधन्ने दे कमां विच आप खलोई जांदा ए ,\nकुज नही करना ...\n\nमीरा नूँ जद प्यार हो गया , नाग वी काला हार हो गया , \nजहर प्याले विचो अमृत चोई जांदा ए ,\nकुज नही करना ...\n\nआसन उत्ते सजे सुधामा , चरना दे विच बैठे शामां , \nगले लगा के चरण मितर दे धोई जांदा ए ,\nकुज नहीं करना ..."},"en":{"t":"Bandeya Rab De Dekh Nazare","c":"Bandeya Rab De Dekh Nazare"}},

	{"id":1769708392729,"audio":"audio/shamjishama.mp3",
	"pb":{"t":"ਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ਪਈਆਂ","c":"ਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ਪਈਆਂ , ਤੈਨੂੰ ਮੈਂ ਲੱਭਦੀ ਪਈਆਂ ,\nਤੇਰੇ ਬਿਨ ਕੂਚੇ ਗਲੀਆਂ , ਸਾਰੀਆਂ ਸੁੰਨੀਆਂ ਪਈਆਂ ,\nਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ...\n\nਮੈਂ ਸੁਣਿਆ ਸਭਦੀ ਸੁਣਦਾ , ਭਲਾ ਫਿਰ ਕਿਉਂ ਮੈਂ ਤਰਸਾਂ ,\nਹੋਵੇਗੀ ਦੀਦ ਤੇਰੀ ਜਾਂ , ਤਰਸਦੀ ਹੀ ਮੈਂ ਮਰਸਾਂ ,\nਕੀ ਦਿਲ ਨੂੰ ਆਸ ਬੰਧਾਵਾਂ , ਕਦੇ ਖ਼ਬਰਾਂ ਨਾ ਲਈਆਂ ,\nਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ...\n\nਤੇਰੇ ਬਿਨ ਚੈਨ ਨਾ ਆਵੇ , ਤੇਰੇ ਦਰਸ਼ਨ ਦੀ ਪਿਆਸੀ ,\nਤੂੰ ਰਹਿਬਰ ਹੈਂ ਇਕ ਮੇਰਾ , ਮੈਂ ਤੇਰੇ ਚਰਨਾਂ ਦੀ ਦਾਸੀ ,\nਤੇਰੇ ਜੇਹਾ ਹੋਰ ਨ ਕੋਈ , ਲੱਖਾਂ ਨੇ ਮੇਰੇ ਜਈਆਂ ,\nਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ...\n\nਕਦੀ ਤੂੰ ਭੁੱਲ ਭੁਲੇਖੇ , ਪਾਵੀਂ ਤਤੜੀ ਵੱਲ ਫੇਰਾ ,\nਸਾਰੇ ਜੱਗ ਦਾ ਤੂੰ ਚਾਨਣ , ਤੇਰੇ ਬਿਨ ਘੁੱਪ ਹਨੇਰਾ ,\nਕਾਲੀਆਂ ਸ਼ਾਹ ਰਾਤਾਂ ਵਿਚ , ਏਹ ਅੱਖੀਆਂ ਜਾਗਣ ਪਈਆਂ ,\nਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ...\n\nਕੋਈ ਨਾ ਮਿਲਿਆ ਐਸਾ , ਮੇਰਾ ਜੋ ਹੋਵੇ ਦਰਦੀ ,\nਲੋਕਾਂ ਦੇ ਮਿਹਣੇ ਤਾਹਣੇ , ਮੈਂ ਥੱਕ ਗਈ ਜਰਦੀ ਜਰਦੀ ,\nਆਉਣ ਦਾ ਭੇਜ ਸੁਨੇਹਾ , ਮੈਂ ਘੜੀਆਂ ਗਿਣਦੀ ਪਈਆਂ ,\nਸ਼ਾਮ ਜੀ ਸ਼ਾਮਾਂ ..."},"hi":{"t":"शाम जी शामां पईयां","c":"शाम जी शामां पईयां , तैनूँ मैं लबदी पईयां , \nतेरे बिन कूचे गलीया , सारीया सुन्निया पईयां , \nशाम जी शामां ...\n\nमैं सुणेया सबदी सुणदा , भला फिर क्यो मैं तरसां , \nहोवेगी दीद तेरी या , तरसदी ही मैं मरसां , \nकी दिल नूँ आस बंधावां , कदे खबरा ना लईया , \nशाम जी शामां ...\n\nतेरे बिन चैन ना आवे , तेरे दर्शन दी प्यासी , \nतू रहबर हैं इक मेरा , मैं तेरे चरणां दी दासी , \nतेरे जेहा होर न कोई , लखां ने मेरे जईयां , \nशाम जी शामां ...\n\nकदी तूं भुल्ल भुलेखे , पावीं ततड़ी वल फेरा , \nसारे जग दा तूं चानण , तेरे बिन घुप्प अंधेरा , \nकालीयाँ शाह रातां विच , एह अखीयां जागण पईयां , \nशाम जी शामां ...\n\nकोई ना मिलेया ऐसा , मेरा जो होवे दर्दी , \nलोकां दे मेहणे ताहने , मैं थक गई जरदी जरदी , \nऔण दा भेज सुनेहा , मैं घड़ीयाँ गिनदी पईयां , \nशाम जी शामां ..."},"en":{"t":"Shyam Ji Shama Paiya","c":"Shyam Ji Shama Paiya"}},

	{"id":1769709173531,
	"pb":{"t":"ਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ","c":"ਹਰ ਦਮ ਦੇ ਨਾਲ ਰੱਬ ਰੱਬ ਕਰ ਲੈ ਦਮ ਦਾ ਨਹੀਂ ਵਸਾਹ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ , ਹੋ ਕੇ ਮਸਤ ਕਲੰਦਰ ਗਾ ॥\n\nਮੁਰਸ਼ਦ ਨਾਲ ਲਗਾ ਲੈ ਯਾਰੀ , \nਰਹਿਣੀ ਨਹੀਂ ਐਥੇ ਸਰਦਾਰੀ ,\nਅਕਲਾਂ ਸ਼ਕਲਾਂ ਵਾਲੇ ਐਥੇ , ਸਭ ਕੁਝ ਗਏ ਗਵਾ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ ...\n\nਵੇਲਾ ਲੰਘਿਆ ਹੱਥ ਨਹੀਂ ਆਉਣਾ , \nਮੁਰਸ਼ਦ ਨੇ ਹੀ ਕੰਮ ਬਣਾਉਣਾ ,\nਮੁਰਸ਼ਦ ਦੇ ਦਰਵਾਜ਼ੇ ਉੱਤੇ , ਹੋ ਜਾ ਅੱਜ ਫ਼ਨਾ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ ...\n\nਤਖ਼ਤੋ-ਤਾਜ ਹਮੇਸ਼ਾ ਨਹੀਂ ਰਹਿਣੇ , \nਜੋ ਬਣਦੇ ਨੇ ਇੱਕ ਦਿਨ ਢਹਿਣੇ ,\nਢਹਿਣ-ਬਣਨ ਦੇ ਚੱਕਰ ਦੇ ਵਿਚ , ਕਿਤੇ ਨਾ ਜਾਵੀਂ ਆ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ ...\n\nਦਾਰੇ ਕਈ ਸਿਕੰਦਰ ਆਏ , \nਆਪਣੇ-ਆਪਣੇ ਰੰਗ ਦਿਖਾਏ ,\nਜਿੱਤੀਆਂ ਬਾਜ਼ੀਆਂ ਹਾਰ ਕੇ ਤੁਰ ਗਏ , ਕਾਹਦੇ ਹੈ ਸਨ ਸ਼ਾਹ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ ...\n\nਮੁਰਸ਼ਦ ਕਾਮਲ ਦਾ ਫੜ ਲੈ ਪੱਲਾ , \nਰਹਿਮ ਕਰੇਗਾ ਇਕ ਦਿਨ ਅੱਲ੍ਹਾ ,\nਘਰ ਸਾਈਂ ਦੇ ਜਾਵਣ ਦੇ ਲਈ , ਹੀਲਾ ਕੋਈ ਬਣਾ ,\nਮਸਤ ਕਲੰਦਰ ਹੋ ਜਾ ..."},"hi":{"t":"मस्त कलंदर हो जा","c":"हर दम दे नाल रब रब कर लै दम दा नहीं वसाह , \nमस्त कलन्दर हो जा , हो के मस्त कलन्दर गा ।\n\nमुरशद नाल लगा लै यारी , \nरहणी नई एत्थे सरदारी , \nअकलां शकलां वाले एत्थे , सब कुछ गए गवा , \nमस्त कलंदर हो जा ...\n\nवेला लंघेया हत्थ नई आणा ,\nमुरशद ने ही कम बनाणा , \nमुरशद दे दरवाजे उत्ते , हो जा अज फना , \nमस्त कलंदर हो जा ...\n\nतख्तो ताज हमेशा नहीं रहणे , \nजो बणदे ने ईक दिन ढहणे \nढहण बनण दे चक्कर दे विच , किते ना जावी आ , \nमस्त कलंदर हो जा ...\n\nदारे कई सिकन्दर आए , \nअपने अपने रंग दिखाए , \nजित्तीयां बाजीयां हार के तुर गए काहदे है सन शाह , \nमस्त कलंदर हो जा ...\n\nमुरशद कामल दा फड़ ले पल्ला , \nरहम करेगा इक दिन अल्ला , \nघर साई दे जावन दे लई , हील्ला कोई बणा , \nमस्त कलंदर हो जा ..."},"en":{"t":"Mast Kalandar Hoja","c":"Mast Kalandar Hoja"}},

	{"id":1769770395491,"audio":"audio/JA WE BADARIA GOKUL.mp3",
	"pb":{"t":"ਜਾ ਵੇ ਬਦਲੀਆ ਗੋਕੁਲ ਜਾ","c":"ਜਾ ਵੇ ਬਦਲੀਆ ਗੋਕੁਲ ਜਾ , ਗੋਕੁਲ ਜਾਕੇ ਮੀਂਹ ਵਰਸਾ ,\nਆਪਣੇ ਸ਼ਿਆਮ ਨੂੰ ਲਈਂ ਮਨਾ , ਜਾ ਵੇ ਬਦਲੀਆ ਗੋਕੁਲ ਜਾ ॥\n\nਸ਼ਿਆਮ ਸੁੰਦਰ ਕੀ ਬਾਤ ਨਿਰਾਲੀ , ਲੀਲਾ ਧਾਰ ਬਨਵਾਰੀ ,\nਗੋਪੀਆਂ ਕੇ ਸੰਗ ਰਾਸ ਰਚਾਤਾ , ਕਰਤਾ ਹੈ ਮਨਮਾਨੀ ,\nਵੋ ਸੋਹਣਾ ਮਨਮੋਹਣਾ ਨਟਖਟ , ਉਸਕੋ ਯੇ ਪੈਗ਼ਾਮ ਸੁਣਾ ॥\n\nਕਾਨ੍ਹਾ ਕ੍ਰਿਸ਼ਨ ਕਨ੍ਹਈਆ ਮਾਧਵ , ਗੋਵਿੰਦਾ ਗੋਪਾਲਾ ,\nਮੋਰ ਮੁਕੁਟ ਕਾਨੋਂ ਮੇਂ ਕੁੰਡਲ , ਮਾਖਨ ਚੋਰ ਨੰਦਲਾਲਾ ,\nਕੰਵਲ ਨੈਨ ਕੇਸ਼ਵ ਮਤਵਾਲਾ , ਭਜ ਗੋਵਿੰਦਾ ਭਜ ਗੋਪਾਲਾ ॥\n\nਮੀਠੀ ਸੀ ਮੁਸਕਾਨ ਪੇ ਉਸਕੀ , ਹਮ ਬੈਠੇ ਦਿਲ ਹਾਰੇ ,\nਮੈਂ ਉਸਕੀ ਕਮਲੀ ਦੀਵਾਨੀ , ਬਾਂਹ ਪਕੜ ਜੱਗ ਤਾਰੇ ,\nਮੈਂ ਉਸਮੇਂ ਵੋ ਮੁਝਮੇਂ ਸ਼ਾਮਿਲ , ਦੇਤਾ ਹੈ ਦਿਲ ਯਹੀ ਸਦਾ ॥\n\nਨੈਨ ਤਰਸ ਗਏ ਸ਼ਿਆਮ ਕੋ ਦੇਖੇ , ਸ਼ਿਆਮ ਮਿਲੇ ਸੁੱਖ ਆਏ ,\nਦਿਲ ਕੋ ਚੈਨ ਮਿਲੇ ਜਬ ਆਕੇ , ਮੁਰਲੀ ਪੇ ਸੁਰ ਵੋ ਬਜਾਏ ,\nਰਗ ਰਗ ਮੇਂ ਮੇਰੇ ਸ਼ਿਆਮ ਬਸਾ ਹੈ , ਉਸਕੇ ਗਾਊਂ ਗੀਤ ਸਦਾ ॥"},"hi":{"t":"जा वे बदलिया गोकुल जा","c":"जा वे बदलिया गोकुल जा , गोकुल जाके मींह वरसा , \nअपणे शाम नूँ लई मना , जा वे बदलिया गोकुल जा ।\n\nशाम सुंदर की बात निराली , लीला धार बनवारी , \nगोपियों के संग रास रचाता , करता है मनमानी , \nवो सोहणा मनमोहना नटखट , उसको ये पैगाम सुना ।\n\nकान्हा कृष्ण कन्हैया माधव , गोविंदा गोपाला , \nमोर मुकुट कानों में कुण्डल , माखन चोर नंदलाला , \nकँवल नैन केशव मतवाला , भज गोविंदा भज गोपाला ।\n\nमीठी सी मुस्कान पे उसकी , हम बैठे दिल हारे , \nमैं उसकी कमली दीवानी , बाँह पकड़ जग तारे , \nमैं उसमें वो मुझमें शामिल , देता है दिल यही सदा ।\n\nनैन तरस गये शाम को देखे , शाम मिले सुख आये , \nदिल को चैन मिले जब आके , मुरली पे सुर वो बजाये , \nरग रग में मेरे शाम बसा है , उसके गाऊँ गीत सदा ।"},"en":{"t":"Ja Ve Badaliya Gokul Ja","c":"Ja Ve Badaliya Gokul Ja"}},

	"pb":{"t":"ਗੁਰਾਂ ਨੂੰ ਮਨਾਵਾਂ ਮੈਂ","c":"ਗੁਰਾਂ ਨੂੰ ਮਨਾਵਾਂ ਮੈਂ ਹਰਿ ਗੁਣ ਗਾਵਾਂ ਮੈਂ ,\nਇੱਕੋ ਮੇਰਾ ਸੰਗੀ ਸਾਥੀ ਉਸਨੂੰ ਰਿਝਾਵਾਂ ਮੈਂ ॥\n\nਗੁਰੂ ਮੇਰੇ ਆਸੇ ਪਾਸੇ ਗੁਰੂ ਹੈ ਨਿਗਾਹਾਂ ਵਿਚ ,\nਗੁਰੂ ਹੀ ਸਹਾਰਾ ਇਕ ਮੁਸ਼ਕਿਲ ਰਾਹਵਾਂ ਵਿਚ ,\nਦੁੱਖਾਂ ਤੋਂ ਬਚਾਉਂਦਾ ਏ , ਨਾਮ ਨੂੰ ਜਪਾਉਂਦਾ ਏ ,\nਫਿਰ ਕਿਉਂ ਨਾ ਉਸ ਉੱਤੋਂ ਬਲ ਬਲ ਜਾਵਾਂ ਮੈਂ ॥\n\nਗੁਰੂ ਮੇਰੇ ਪ੍ਰਾਣ ਬਸ , ਗੁਰੂ ਮੇਰੀ ਰਾਸ ਏ ,\nਹਰ ਵੇਲੇ ਰਹਿੰਦੀ ਉਹਦੇ ਦਰਸ਼ਨ ਦੀ ਪਿਆਸ ਏ ,\nਦਰਸ਼ਨ ਪਾਵਾਂ ਮੈਂ ਆਸ ਨੂੰ ਪੁਗਾਵਾਂ ਮੈਂ ,\nਰੱਬ ਤੋਂ ਵੀ ਪਹਿਲਾਂ ਸੱਚੇ ਗੁਰੂ ਨੂੰ ਧਿਆਵਾਂ ਮੈਂ ॥\n\nਪੰਜਾਂ ਚੋਰਾਂ ਕੋਲੋਂ ਜਿਹੜਾ ਕਰੇ ਰਖਵਾਲੀ ਏ ,\nਜਿਹਦੇ ਚਰਨਾਂ 'ਚ ਹਰ ਵੇਲੇ ਹੀ ਦੀਵਾਲੀ ਏ ,\nਖ਼ਾਲੀ ਨਹੀਂਓਂ ਮੋੜਦਾ ਆਸ ਨਹੀਂਓਂ ਤੋੜਦਾ ,\nਜੋ ਵੀ ਵਰ ਚਾਹਵਾਂ ਮੈਂ ਇਹਦੇ ਕੋਲੋਂ ਪਾਵਾਂ ਮੈਂ ॥\n\nਕੀਤੀ ਜਦ ਕਿਰਪਾ ਮੇਰੇ ਤੇ ਹਜ਼ੂਰ ਨੇ ,\nਆਪਣਾ ਬਣਾਕੇ ਦੁੱਖ ਕਰ ਦਿੱਤੇ ਦੂਰ ਨੇ ,\nਆਪਣਾ ਬਣਾ ਲਿਆ ਚਰਨਾਂ 'ਚ ਲਾ ਲਿਆ ,\nਹੁਣ ਕਿਉਂ ਦਰ ਦਰ ਜਾਕੇ ਧੱਕੇ ਖਾਵਾਂ ਮੈਂ ॥\n\nਗੁਰਾਂ ਦੀ ਪ੍ਰੀਤ ਸੱਚੀ ਜੱਗ ਸਾਰਾ ਜਾਣਦਾ ,\nਹੋਕੇ ਗੁਰਾਂ ਦਾ ਮੌਜਾਂ ਜੱਗ ਵਿਚ ਮਾਣਦਾ ,\nਗੁਰਾਂ ਬਿਨਾ ਗਤ ਨਹੀਂ , ਸ਼ਾਹ ਬਿਨਾ ਪੱਤ ਨਹੀਂ ,\nਫਿਰ ਕਿਉਂ ਨਾ ਐਸੇ ਦਾ ਹੀ ਦਾਸ ਕਹਾਵਾਂ ਮੈਂ ॥"},"hi":{"t":"गुरां नूँ मनावां मैं","c":"गुरां नूँ मनावां मैं हरि गुण गावां मैं , \nऐको मेरा संगी साथी उसनूं रिझावां मैं ।\n\nगुरू मेरे आसे पासे गुरू है निगाहां विच , \nगुरू ही सहारा इक मुश्किल राहवां विच , \nदुखां तो बचौंदा ए , नाम नूँ जपौंदा ए , \nफिर क्यों ना उवे उत्तों बल बल जावां मैं ।\n\nगुरू मेरे प्राण बस , गुरू मेरी रास ए , \nहर वेले रहंदी ओहवे दर्शन दी प्यास ए , \nदर्शन पावां मैं आस नूँ पुगावां मैं , \nरब तो वी पहलां सच्चे गुरू नूँ ध्यावां मैं ।\n\nपंजां चोरां कोलो जेहड़ा करे रखवाली ए , \nजीहदे चरणां च हर वेले ही दीवाली ए , \nखाली नईओं मोड़दा आस नईओं तोड़दा , \nजो वी वर चाहवां मैं ऐहदे कोलों पावां मैं ।\n\nकीती जद किरपा मेरे ते हजूर ने , \nआपणा बनाके दुख कर दित्ते दूर ने , \nआपणा बणा लेया चरणां च ला लेया , \nहुण क्यों वर दर जाके धक्के खावां मैं ।\n\nगुरां दी प्रीत सच्ची जग सारा जाणदा , \nहोके गुरां दा मौजां जग विच माणदा , \nगुरां बिना गत नहीं , शाह बिना पत्त नहीं , \nफिर क्यों न ऐसे दा ही दास कहावां मैं ।"},"en":{"t":"Gura Nu Manava Mein","c":"Gura Nu Manava Mein"}},

	"pb":{"t":"ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ","c":"ਦੋਵੇਂ ਹੱਥ ਦਾਤਾ ਸਾਡੇ ਸਿਰਾਂ ਉੱਤੇ ਰੱਖਣਾ ,\nਚਰਨਾਂ ਦੇ ਕੋਲੋਂ ਕਦੀ ਕਰੀਂ ਸਾਨੂੰ ਵੱਖ ਨਾ ,\nਅੱਜ ਬੈਠ ਗਏ ਅਲਖ ਜਗਾਕੇ , \nਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥\nਰੱਖੀਂ ਤੱਤੀਆਂ ਹਵਾਵਾਂ ਤੋਂ ਬਚਾਕੇ , ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥\n\nਸੁਣਕੇ ਆਇਆ ਤੇਰੇ ਦਰ ਦੀ ਮੈਂ ਸ਼ੋਭਾ ਜੀ ,\nਹੋਕੇ ਰਹਾਂ ਹੁਣ ਤੇਰੇ ਜੋਗਾ ਜੀ ,\nਰੱਖੀਂ ਦੁਨੀਆ ਦੇ ਪਾਪਾਂ ਤੋਂ ਬਚਾਕੇ , ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥\n\nਜਦੋਂ ਦਾ ਮੈਂ ਫੜ ਲਿਆ ਦਾਤਾ ਤੇਰਾ ਪੱਲਾ ਜੀ ,\nਹੁਣ ਨਾ ਮੈਂ ਰਿਹਾ ਇਸ ਜੱਗ ਵਿਚ ਇਕੱਲਾ ਜੀ ,\nਧੁਰ ਧਾਮ ਤੱਕ ਰੱਖਣਾ ਨਿਭਾਕੇ , ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥\n\nਕਹਿੰਦੇ ਨੇ ਸਿਆਣੇ ਹੁੰਦੀ ਗੁਰਾਂ ਬਿਨਾ ਗਤ ਨਾ ,\nਰੁਲਦੇ ਸੀ ਰਹਿਣਾ ਜੇ ਤੂੰ ਦਿੰਦਾ ਸਾਨੂੰ ਮੱਤ ਨਾ ,\nਕੋਲੇ ਹੀਰੇ ਬਣੇ ਸ਼ਰਨ ਚ ਆਕੇ , ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥\n\nਏਹੋ ਅਰਦਾਸ ਤੇਰੇ ਚਰਨਾਂ ਦੇ ਪਾਸ ਜੀ ,\nਕਦੇ ਵੀ ਤੂੰ ਕੀਤਾ ਨਹੀਂ ਕਿਸੇ ਨੂੰ ਨਿਰਾਸ਼ ਜੀ ,\nਜਾਣਾ ਰਹਿਮਤਾਂ ਦੇ ਮੀਂਹ ਚ ਨਹਾ ਕੇ , ਦਾਤਾ ਜੀ ਬਟਾਲੇ ਵਾਲਿਆ ॥"},"hi":{"t":"दाता जी बटाले वालेया","c":"दोवें हत्थ दाता साडे सिरां उत्ते रखना , \nचरणां वे कोलों कदी करीं सानूँ वक्ख ना , \nअज बैठ गये अलख जगाके , \nदाता जी बटाले वालेया , \nरखीं तत्तीयां हवावां तो बचाके , दाता जी बटाले वालेया ।\n\nसुणके आया तेरे दर दी मैं शोभा जी , \nहोके रहां हुण तेरे जोगा जी , \nरखीं दुनिया दे पापां तों बचाके दाता जी बटाले वालेया ।\n\nजदों दा मैं फड़ लेया दाता तेरा पल्ला जी , \nहुण ना मैं रेहा इस जग विच कल्ला जी , \nधुर धाम तक रखणा निभाके , दाता जी बटाले वालेया ।\n\nकैंहदे ने सियाणे हुंदी गुरां बिना गत्त ना , \nरूलदे सी रहणा जे तू दिंदा सानू मत्त ना , \nकोले हीरे बणे शरण च आके , दाता जी बटाले वालेया ।\n\nऐहो अरदास तेरे चरणां दे पास जी , \nकदे वी तूं कीता नहीं किसे नू निराश जी , \nजाणा रहमतां दे मींह च नहा के , दाता जी बटाले वालेया ।"},"en":{"t":"Data Ji Batale Valeya","c":"Data Ji Batale Valeya Baba O Batale Valeya"}},

	{"id":1769772235739,
	"pb":{"t":"ਨੀ ਮਾਏ ਏਹ ਕੌਣ ਮਸੀਹਾ","c":"ਨੀ ਮਾਏ ਏਹ ਕੌਣ ਮਸੀਹਾ , \nਅਰਸ਼ਾਂ ਵਿਚੋਂ ਕੋਈ ਫ਼ਰਿਸ਼ਤਾ ਏ ਧਰਤੀ ਤੇ ਆਇਆ ,\nਡੁੱਲ ਡੁੱਲ ਪੈਂਦਾ ਨੂਰ ਨੀ ਉਹ ਕਿਸ ਅੰਮੜੀ ਦਾ ਜਾਇਆ ,\nਕਾਲੀਆਂ ਬੋਲੀਆਂ ਰਾਤਾਂ ਦੇ ਵਿਚ ਚਾਨਣ ਵੰਡਣ ਆਇਆ ,\nਮਹਿਕਾਂ ਵੰਡਣ ਥਾਵਾਂ ਜਿੱਥੇ ਉਹਨੇ ਕਦਮ ਟਿਕਾਇਆ ॥\n\nਮੁਖੜੇ ਉੱਤੇ ਤੇਜ ਨੀ ਉਹਦੇ ਸਭ ਦੇ ਹੋਸ਼ ਭੁਲਾਏ ,\nਚੰਨ ਸੂਰਜ ਵੀ ਕਰਨ ਸਲਾਮਾਂ ਟਹਿਲ ਕਮਾਵਣ ਆਏ ,\nਬੁੱਕ ਪਈ ਕੁੱਲ ਖੁਦਾਈ ਉਹਦੇ ਕਰਨ ਦੀਦਾਰ ਨੀ ਮਾਏ ,\nਅੱਜ ਤੱਕ ਨਾ ਕੋਈ ਤੱਕਿਆ ਐਸਾ ਨਾ ਕੋਈ ਹੋਣਾ ਮਾਏ ॥\n\nਬੋਚ ਬੋਚ ਕੇ ਉਹ ਡਗ ਭਰਦਾ ਚਾਲ ਤੁਰੇ ਮਸਤਾਨੀ ,\nਤੱਕ ਕੇ ਉਹਦੀਆਂ ਨਾਜ਼ ਅਦਾਵਾਂ ਮੈਂ ਹੋਈ ਦੀਵਾਨੀ ,\nਮੇਰੇ ਦਿਲ ਨੂੰ ਉਸਨੇ ਆਪਣਾ ਰੰਗਲਾ ਪਲੰਘ ਬਣਾਇਆ ,\nਮੈਂ ਹਾਰੀ ਮੈਂ ਹਾਰੀ ਜਬ ਉਸ ਪੈਰ ਪਲੰਘ ਤੇ ਪਾਇਆ ॥\n\nਉਸ ਜੋਗੀ ਨੇ ਮੋਢਿਆਂ ਉੱਤੇ ਜੋਗੀਆ ਲਿਆ ਦੁਸ਼ਾਲਾ ,\nਹਰ ਦਮ ਉਹ ਮੁੱਖ ਚੋਂ ਉਚਾਰੇ ਨਾਨਕ ਨਾਮ ਦੀ ਮਾਲਾ ,\nਗਲੀ ਗਲੀ ਵਿਚ ਪੈ ਰਹੀਆਂ ਬਸ ਨਾਮ ਉਹਦੇ ਦੀਆਂ ਧੁੰਮਾਂ ,\nਰਹਿਮ ਕਰੇ ਮੇਰੇ ਤੇ ਸਾਈਂ ਪੈਰ ਉਹਦੇ ਮੈਂ ਚੁੰਮਾਂ ॥"},"hi":{"t":"नी माये एह कौण मसीहा","c":"नी माये एह कौण मसीहा , \nअरशां विचों कोई फरिश्ता ए धरती ते आया , \nडुल डुल पैंदा नूर नी ओह किस अंमड़ी वा जाया , \nकालीयां बोलीयां रातां वे विच चानण वंडण आया , \nमहकां वंडण थावां जित्ये ओहने कदम टिकाया ।\n\nमुखड़े उत्ते तेज नी ओहवे सभवे होश भुलाये , \nचन्न सूरज वी करण सलामां टहल कामवण आये , \nबुक पई कुल खुदाई ओहदे करन वीदार नी माये , \nअज तक ना कोई तकेया ऐसा न कोई होणा माये ।\n\nबोच बोच के ओह ढग भरवा चाल तुरे मस्तानी , \nतकके ओहदीयां नाज अदावां मैं होई दीवानी , \nमेरे दिल नूँ उसने अपना रंगला पलंघ बणाया , \nमैं हारी मैं हारी जब उस पैर पलंघ ते पाया ।\n\nउस जोगी ने मोडेयां उत्ते जोगीया लेया दुशाला , \nहर दम ओह मुख चों उचारे नानक नाम दी माला , \nगली गली विच पै रहीयां बस नाम ओहदे दीयां धुम्मां , \nरहम करे मेरे ते साई पैर ओहदे मैं चुम्मां ।"},"en":{"t":"Ni Maye Eh Kon Masiha","c":"Ni Maye Eh Kon Masiha"}},

	{"id":1769772497185,
	"pb":{"t":"ਤੇਰੀ ਦੀਦ ਹੋਵੇ ਮੇਰੀ ਈਦ ਹੋਵੇ","c":"ਤੇਰੀ ਦੀਦ ਹੋਵੇ ਮੇਰੀ ਈਦ ਹੋਵੇ , \nਆ ਅੱਖੀਆਂ ਵਿਚ ਸਮਾ ਦਾਤਾ ,\nਏ ਅੱਖੀਆਂ ਤਰਸਣ ਦਰਸ਼ਨ ਨੂੰ , \nਕੋਝੀ ਤੇ ਕਰਮ ਕਮਾ ਦਾਤਾ ॥\n\nਹਰ ਵੇਲੇ ਤੈਨੂੰ ਲੱਭਦੀਆਂ ਨੇ , \nਕਿਸੇ ਹੋਰ ਨਾ ਆਹਰੇ ਲੱਗਦੀਆਂ ਨੇ ,\nਛਮ ਛਮ ਏਹ ਨੀਰ ਬਹਾਉਂਦੀਆਂ ਨੇ , \nਤੇਰੇ ਚਰਨ ਧੋਣ ਦਾ ਚਾਅ ਦਾਤਾ ॥\n\nਕਦ ਕੂਕ ਸੁਣੇਂਗਾ ਤਤੜੀ ਦੀ , \nਦੇਵੀਂ ਬਖ਼ਸ਼ ਖ਼ਤਾ ਮਨ-ਮਤੜੀ ਦੀ ,\nਮੈਨੂੰ ਸਮਝ ਕੇ ਦਰਦਾਂ ਮਾਰੀ ਵੇ , \nਕਿਤੋਂ ਮਹਿਰਮ ਬਣਕੇ ਆ ਦਾਤਾ ॥\n\nਦਿਲ ਯਾਦ ਸਦਾ ਤੈਨੂੰ ਕਰਦਾ ਏ , \nਦਮ ਨਾਮ ਤੇਰੇ ਦਾ ਭਰਦਾ ਏ ,\nਹੋਈਆਂ ਮੁੱਦਤਾਂ ਤੈਥੋਂ ਵਿਛੜੀ ਹਾਂ , \nਜਨਮਾਂ ਦੇ ਪੰਧ ਮੁਕਾ ਦਾਤਾ ॥\n\nਕਦ ਆਣ ਕਰੇਂਗਾ ਮੇਲੇ ਵੇ , \nਮੈਨੂੰ ਦੱਸ ਜਾ ਉਹ ਵੇਲੇ ਵੇ ,\nਕਿਤੇ ਰੋਂਦੀ ਨਾ ਮਰ ਜਾਵਾਂ ਮੈਂ , \nਮੇਰੀ ਆਕੇ ਧੀਰ ਬੰਧਾ ਦਾਤਾ ॥\n\nਤੂੰ ਸਾਹਿਬ ਮੈਂ ਤੇਰੀ ਦਾਸੀ ਹਾਂ , \nਜਨਮਾਂ ਜਨਮਾਂ ਤੋਂ ਪਿਆਸੀ ਹਾਂ ,\nਕੋਈ ਪੁੱਛਦਾ ਨਾ ਮੈਂ ਰੁਲ ਗਈ ਹਾਂ , \nਮੇਰਾ ਜਾਮਾ ਸਫ਼ਲ ਬਣਾ ਦਾਤਾ ॥"},"hi":{"t":"तेरी दीद होवे मेरी ईद होवे","c":"तेरी दीद होवे मेरी ईद होवे , \nआ अखीयां विच समा दाता \nए अखीयां तरसण दर्शन नूँ , \nकोझी ते करम कमा दाता ।\n\nहर वेले तैनू लभदीयां ने , \nकिसे होर ना आहरे लगदीयां ने , \nछम छम एह नीर बहौंदीयां ने , \nतेरे चरण धोण दा चा दाता ।\n\nकद कूक सुणेगा ततड़ी दी , \nदेवीं बख्श खता मन मतड़ी दी , \nमैनूँ समझ के दरदां मारी वे , \nकितों महरम बणके आ दाता ।\n\nदिल याद यदा तैनूँ करवा ए , \nदम नाम तेरे दा भरदा ए , \nहोइयां मुद्दतां तैथों विछड़ी हां , \nजन्मां दे पंध मुका दाता ।\n\nकद आण करेंगा मेले वे , \nमैनूँ दस्स जा ओह वेले वे , \nकिते रोंदी ना मर जावां मैं , \nमेरी आके धीर बंधा दाता ।\n\nतू साहिब मैं तेरी दासी हां , \nजन्मां जन्मां तों प्यासी हां , \nकोई पुछदा ना मैं रूल गई हां , \nमेरा जामा सफल बणा दाता ।"},"en":{"t":"Teri Deed Hove Meri Eid Hove","c":"Teri Deed Hove Meri Eid Hove"}},

	{"id":1769772646132,
	"pb":{"t":"ਟੁੱਟੇ ਨਾ ਪ੍ਰੀਤ ਸਾਡੀ","c":"ਟੁੱਟੇ ਨਾ ਪ੍ਰੀਤ ਸਾਡੀ ਏਹੋ ਇਕ ਮੰਗ ਜੀ ,\nਦਾਤਾ ਜੀ ਚੜ੍ਹਾ ਕੇ ਰੱਖੀਂ ਨਾਮ ਵਾਲਾ ਰੰਗ ਜੀ ॥\n\nਤੇਰਿਆਂ ਖ਼ਜ਼ਾਨਿਆਂ ਚ ਘਾਟਾ ਕੇਹੜੀ ਗੱਲ ਦਾ ,\nਸਾਨੂੰ ਕਾਹਦੀ ਥੋੜ ਜੇ ਤੂੰ ਹੋਵੇਂ ਮੇਰੇ ਵੱਲ ਦਾ ,\nਤੇਰੇ ਕੋਲੋਂ ਮੰਗਦਿਆਂ ਸਾਨੂੰ ਕਾਹਦੀ ਸੰਗ ਜੀ ॥\n\nਜ਼ਿੰਦਗੀ ਦੀ ਬੇੜੀ ਵਾਲਾ ਤੂੰ ਹੀ ਤਾਂ ਮਲਾਹ ਏ ,\nਸੱਚੇ ਘਰ ਜਾਣ ਲਈ ਤੂੰ ਹੀ ਤਾਂ ਗਵਾਹ ਏ ,\nਜਿਸ ਘਰ ਜਾਣ ਵਾਲਾ ਰਸਤਾ ਏ ਤੰਗ ਜੀ ॥\n\nਤੇਰੇ ਤੇ ਭਰੋਸਾ ਹੁਣ ਲਾਰਾ ਕੋਈ ਲਾਵੀਂ ਨਾ ,\nਫੜੀ ਰੱਖੀਂ ਬਾਂਹ ਸਾਡੀ ਦੂਰ ਸਾਥੋਂ ਜਾਵੀਂ ਨਾ ,\nਹਰ ਵੇਲੇ ਹਰ ਪਾਸੇ ਰਹਿਣਾ ਅੰਗ ਸੰਗ ਜੀ ॥\n\nਰੱਖੀਂ ਦੂਰ ਦਾਤਿਆ ਵਿਸ਼ਿਆਂ ਵਿਕਾਰਾਂ ਤੋਂ ,\nਦੁਨੀਆਂ ਦੇ ਝੂਠੇ ਮਾਨ ਸਤਕਾਰਾਂ ਤੋਂ ,\nਪਲ ਪਲ ਨਾਲ ਜਿਹੜੇ ਕਰਦੇ ਨੇ ਤੰਗ ਜੀ ॥"},"hi":{"t":"टुट्टे ना प्रीत साडी","c":"टुट्टे ना प्रीत साडी ऐहो इक मंग जी , \nदाता जी चढ़ा के रखीं नाम वाला रंग जी ।\n\nतेरेयां खजानेयां च घाटा केहड़ी गल्ल दा , \nसानू काहदी थोड़ जे तूं होवें मेरे वल्ल दा , \nतेरे कोलों मंगदेयां सानूं काहदी संग जी ।\n\nज़िदगी दी बेड़ी वाला तूं ही तां मलाह ए , \nसच्चे घर जाण लई तूं ही तां गवाह ए , \nजिस घर जाण वाला रस्ता ए तंग जी ।\n\nतेरे ते भरोसा हुण लारा कोई लावीं ना , \nफड़ी रखीं बांह साडी दूर साथों जावीं ना , \nहर वेले हर पासे रहणा अंग संग जी ।\n\nरखीं दूर दातेया विषेयां विकारां तों , \nदुनिया दे झूठे मान सत्कारां तों , \nपल पल नाल जेहड़े करदे ने तंग जी ।"},"en":{"t":"Tutte Na Preet Sadi","c":"Tutte Na Preet Sadi"}},

	{"id":1769772832490,
	"pb":{"t":"ਤੂੰ ਹੈਂ ਗੁਣਾਂ ਦਾ ਖ਼ਜ਼ਾਨਾ","c":"ਤੂੰ ਹੈਂ ਗੁਣਾਂ ਦਾ ਖ਼ਜ਼ਾਨਾ ਗੁਣਵਾਨ ਦਾਤਿਆ ,\nਬੜਾ ਅੌਖਾ ਤੇਰੀ ਮਹਿਮਾ ਦਾ ਬਿਆਨ ਦਾਤਿਆ ॥\n\nਪ੍ਰਥਮ ਪਿਆਰਾ ਪ੍ਰਭੂ ਇਕੋ ਓਅੰਕਾਰ ਹੈ ,\nਅੱਵਲ ਹੈ ਅੱਲ੍ਹਾ ਸਾਰੇ ਜੱਗ ਦਾ ਅਧਾਰ ਹੈ ,\nਪਹਿਲੀ ਇਕੋ ਪਰਮਾਤਮਾ ਦੀ ਸ਼ਾਨ ਦਾਤਿਆ ॥\n\nਦੂਜੀ ਕਰਾਂ ਉਪਮਾ ਤੇਰੇ ਵਿਸਥਾਰ ਦੀ ,\nਖੰਡਾਂ ਬ੍ਰਹਮੰਡਾਂ ਵਿਚ ਜੋਤ ਨਿਰੰਕਾਰ ਦੀ ,\nਛੋਟਾ ਵੱਡਾ ਸਭ ਤੇਰੇ ਲਈ ਸਮਾਨ ਦਾਤਿਆ ॥\n\nਤੀਜੀ ਗੱਲ ਸਾਨੂੰ ਤਿੰਨਾਂ ਤਾਪਾਂ ਤੋਂ ਬਚਾਉਣਾ ਏ ,\nਓਟ ਸਾਨੂੰ ਤੇਰੀ ਨੀਚੋਂ ਊਚ ਬਣਾਉਣਾ ਏ ,\nਅਸੀਂ ਫਿਰ ਭੁੱਲ ਜਾਈਏ ਤੇਰਾ ਧਿਆਨ ਦਾਤਿਆ ॥\n\nਚੌਥਾ ਤੂੰ ਤਾਂ ਰਹਿਬਰ ਹੈਂ ਰਹਿਨੁਮਾਈ ਕਰਦਾ ,\nਪੱਥਰਾਂ ਚ ਲੁਕਿਆਂ ਦਾ ਪੇਟ ਜਾਕੇ ਭਰਦਾ ,\nਅੌਖਾ ਸਾਡੇ ਲਈ ਤੇਰੇ ਲਈ ਅਸਾਨ ਦਾਤਿਆ ॥\n\nਪੰਚ ਘਰੋਂ ਤੇਰਾ ਪੰਚ ਅੱਖਰੀ ਜੋ ਨਾਮ ਜੀ ,\nਬਖ਼ਸ਼ੇ ਤੂੰ ਜੀਹਨੂੰ ਉਹਦਾ ਕਰੇਂ ਕਲਿਆਣ ਜੀ ,\nਉਹਨੂੰ ਸਚਖੰਡ ਕਰੇ ਪਰਵਾਨ ਦਾਤਿਆ ॥"},"hi":{"t":"तू हैं गुणां दा खजाना","c":"तू हैं गुणां दा खजाना गुणवान दातेया , \nबड़ा औखा तेरी महिमा वा बयान दातेया ।\n\nप्रथम पियारा प्रभु इको ओंकार है , \nअव्वल है अल्लाह सारे जग वा आधार है , \nपहिली इको परमात्मा दी शान दातेया ।\n\nदूजी करां उपमा तेरे विस्थार दी , \nखंडां ब्रह्मण्डां विच जोत निरंकार दी , \nछोटा वडा सब तेरे लई समान दातेया ।\n\nतीजी गल्ल सानूं तिन्नां तापां तों बचौंना ए , \nओट सानूं तेरी नीचों ऊच बणाँना ए , \nअसीं फिर भुल जाईये तेरा धयान दातेया ।\n\nचौथा तूं तां रहबर हैं रहनुमाई करदा , \nपत्थरां च लुकेयां दा पेट जाके भरदा , \nऔखा साडे लई तेरे लई असान दातेया ।\n\nपंच घरों तेरा पंच अख़री जो नाम जी , \nबख्शे तूं जीहनूं ओहदा करें कल्याण जी , \nओहनूं सचखण्ड करे परवान दातेया ।"},"en":{"t":"Tu Hain Guna Da Khajana","c":"Tu Hain Guna Da Khajana"}},

	{"id":1769773109717,
	"pb":{"t":"ਸਾਈਂ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ","c":"ਸਾਈਂ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ,\nਹਮ ਅਗਿਆਨ ਅਲਪ ਮਤਿ ਥੋਰੀ , ਸਰ ਪਰ ਹਾਥ ਧਰੋ ,\nਦਾਤਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥\n\nਇਕ ਤੁਮ ਹੀ ਹੋ ਸਰਬ ਪ੍ਰਤਿਪਾਲਕ , ਹਮ ਸਭ ਜੀਵ ਤੁਮ੍ਹਾਰੇ ,\nਔਰ ਨ ਕੋਈ ਠੌਰ ਹਮਾਰੀ ਚਿੰਤਾ ਦੂਰ ਕਰੋ ,\nਦਾਤਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ , ਪਿਆਰੇ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥\n\nਜੋ ਜਨ ਆਵੈ ਸ਼ਰਨ ਤੁਮ੍ਹਾਰੀ ਤਿਨਕੇ ਕਾਜ ਸਵਾਰੇ ,\nਦੋਇ ਹਥ ਜੋੜ ਮਾਂਗੂ ਇਕ ਦਾਨਾ , ਹਮਰੇ ਕਾਜ ਸਰੋ ,\nਮੌਲਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ , ਦਾਤਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥\n\nਨਉ ਨਿਧਿ ਤੇਰੇ ਮਾਲ ਖ਼ਜ਼ਾਨੇ ਨਾਹੀ ਤੋਟ ਦਿਆਲੂ ,\nਹਉ ਜਾਚਕ ਤੂੰ ਸਦ ਵਰਤੰਤਾ , ਅਵਗੁਣ ਚਿੱਤ ਨਾ ਧਰੋ ,\nਦਾਤਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ , ਸਾਈਂ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥\n\nਇਕੋ ਓਟ ਤੁਮ੍ਹਾਰੀ ਸੁਆਮੀ ਔਰ ਨ ਦੂਜਾ ਭਾਵੈ ,\nਨਿਮਖ ਨ ਵਿਸਰੂ ਹਰਿ ਜੀ ਮੇਰੀ ਦੁਵਿਧਾ ਦੂਰ ਕਰੋ ,\nਮੌਲਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ , ਦਾਤਾ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥\n\nਇਕ ਅਰਦਾਸ ਹਮਾਰੀ ਤੁਮਪੈ , ਖੰਡੋ ਪਾਪ ਹਮਾਰੇ ,\nਕਿਰਪਾ ਕਰੋ ਸੇਵਕ ਜਨ ਮੇਲੋ ਭਵ ਸੇ ਪਾਰ ਕਰੋ ,\nਸਾਈਂ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ , ਪਿਆਰੇ ਜੀ ਤੁਮ ਦਇਆ ਕਰੋ ॥"},"hi":{"t":"साई जी तुम दया करो","c":"साई जी तुम दया करो , \nहम अज्ञान अलप मत थोरी , सर पर हाथ धरो , \nदाता जी तुम दया करो ।\n\nइक तुम ही हो सरब प्रितपालक , हम सब जीव तुम्हारे , \nऔर न कोई ठौर हमारी चिंता दूर करो , \nदाता जी तुम दया करो , प्यारे जी तुम दया करो ।\n\nजो जन आवै शरण तुम्हारी तिनके काज सवारे , \nदोय हथ जोड़ मांगू इक दाना , हमरे काज सरो , \nमौला जी तुम दया करो , दाता जी तुम दया करो ।\n\nनौ निध तेरे माल खजाने नाही तोट दयालु , \nहऊ जाचक तूं सद वरतंता , अवगुण चित्त ना धरो , \nदाता जी तुम दया करो , साई जी तुम दया करो ।\n\nएको ओट तुम्हारी स्वामी और न दूजा भावै , \nनिमख न विसरू हरि जी मेरी दुविधा दूर करो , \nमौला जी तुम दया करो , दाता जी तुम दया करो ।\n\nइक अरदास हमारी तुमपै , खंडो पाप हमारे , \nकिरपा करो सेवक जन मेलो भव से पार करो , \nसाई जी तुम दया करो , प्यारे जी तुम दया करो ।"},"en":{"t":"Sai Ji Tum Daya Karo","c":"Sai Ji Tum Daya Karo"}},

	{"id":1769787259252,
	"pb":{"t":"ਇਕ ਤੰਦ ਆਵੇ ਔਰ ਇਕ ਤੰਦ ਜਾਵੇ","c":"ਇਕ ਤੰਦ ਆਵੇ ਔਰ ਇਕ ਤੰਦ ਜਾਵੇ ,\nਚਰਖੇ ਦੀ ਮਾਲ ਘੁੰਮੇ ਚਰਖਾ ਘੁਮਾਵੇ ,\nਨਾਲੇ ਘੁੰਮੇ ਤਕਲਾ ਤੇ ਕੱਤੀ ਜਾਵੇ ਰੂੰ ,\nਤੂੰ ਹੀ ਤੂੰ ਤੂੰ ਹੀ ਤੂੰ ॥\n\nਚਰਖਾ ਹੈ ਤੇਰਾ ਨਹੀਂਓਂ ਲੱਖ ਜਾਂ ਹਜ਼ਾਰ ਦਾ ,\nਕੱਤੀ ਚੱਲ ਪੂਣੀ ਜਪ ਨਾਮ ਕਰਤਾਰ ਦਾ ,\nਜਿਹੜਾ ਵੱਸਿਆ ਏ ਤੇਰੇ ਵਿਚ ਲੂੰ ਲੂੰ ,\nਤੂੰ ਹੀ ਤੂੰ ਤੂੰ ਹੀ ਤੂੰ ॥\n\nਤੂੰ ਹੀ ਤੂੰ ਚ ਵੱਸਿਆ ਏ ਨਾਮ ਨਿਰੰਕਾਰ ਦਾ ,\nਤੇਰੇ ਵਿਚ ਰਹਿ ਕੇ ਜਿਹੜਾ ਕਾਜ ਸਵਾਰਦਾ ,\nਅੱਜ ਕੱਲ੍ਹ ਛੱਡ , ਛੱਡ ਪਰ ਤੇ ਪਰੂੰ ,\nਤੂੰ ਹੀ ਤੂੰ ਤੂੰ ਹੀ ਤੂੰ ॥\n\nਲਾਈ ਰੱਖ ਧੁਨ ਉਸ ਸੱਚੇ ਰਾਮ ਨਾਮ ਦੀ ,\nਐਥੇ ਨਹੀਂਓਂ ਵਾਰੀ ਆਉਣੀ ਕ੍ਰੋਧ ਮਦ ਕਾਮ ਦੀ ,\nਜਿਹੜੇ ਤੈਨੂੰ ਸਾੜਦੇ ਨੇ ਰੋਜ਼ ਧੂੰ ਧੂੰ ,\nਤੂੰ ਹੀ ਤੂੰ ਤੂੰ ਹੀ ਤੂੰ ॥\n\nਟੁੱਟ ਜਾਣੀ ਮਾਲ ਹੋਣਾ ਚਰਖਾ ਪੁਰਾਣਾ ਏ ,\nਤੇਰੇ ਸਕਿਆਂ ਨੇ ਤੈਨੂੰ ਅੱਗ ਵਿਚ ਢਾਉਣਾ ਏ ,\nਲੰਘ ਗਿਆ ਵੇਲਾ ਦੱਸ ਫੇਰ ਕੀ ਕਰੂੰ ,\nਤੂੰ ਹੀ ਤੂੰ ਤੂੰ ਹੀ ਤੂੰ ॥"},"hi":{"t":"इक तंद आवे और इक तंद जावे","c":"इक तंद आवे और इक तंद जावे , \nचरखे दी माल घुम्मे चरखा घुमावे , \nनाले घुम्मे तकला ते कत्ती जावे रूँ , \nतूं ही तूं तूं ही तूं ।\n\nचरखा है तेरा नईयों लख जां हजार दा , \nकत्ती चल पूणी जप नाम करतार दा , \nजेहड़ा वसेया ए तेरे विच लूँ लूँ , \nतूं ही तूं तूं ही तूं ।\n\nतूं ही तूं च वसेया ए नाम निरंकार दा , \nतेरे विच रहके जेहड़ा काज सवारदा , \nअज कल छड , छड पर ते परूँ , \nतूं ही तूं तूं ही तूं ।\n\nलाई रख धुन उस सच्चे राम नाम दी , \nऐथे नइयों वारी औणी क्रोध मद काम दी , \nजेहड़े तैनू साड़दे ने रोज धूं धूं , \nतूं ही तूं तूं ही तूं ।\n\nटुट जाणी माल होणा चरखा पुराणा ए , \nतेरे सकेयां ने तैनू अग्ग विच ढौणा ए , \nलंघ गया वेला दस्स फेर की करूँ , \nतूं ही तूं तूं ही तूं ।"},"en":{"t":"Ik Tand Ave Ik Tand Jave","c":"Ik Tand Ave Ik Tand Jave"}},

	{"id":1769787697352,
	"pb":{"t":"ਮੇਰੇ ਸੋਹਣੇ ਕਮਲੀ ਵਾਲੜਿਆ","c":"ਮੇਰੇ ਸੋਹਣੇ ਕਮਲੀ ਵਾਲੜਿਆ , \nਅਸਾਂ ਨੇਹੁੰ ਤੇਰੇ ਨਾਲ ਲਾ ਲਿਆ ,\nਖੌਰੇ ਕੇਹੜੇ ਵੱਸਦਾ ਦੇਸ ਤੂੰ , \nਤੈਨੂੰ ਆਪਣਾ ਚੈਨ ਬਣਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਮੇਰਾ ਲੂੰ-ਲੂੰ ਰਗ ਤੇਰੇ ਨਾਮ ਵੇ , \nਹੋਇਆ ਦਿਲ ਵੀ ਤੇਰਾ ਗੁਲਾਮ ਵੇ ,\nਜਾਣੇ ਰੱਬ ਹੀ ਹੁਣ ਅੰਜਾਮ ਵੇ , \nਅਸੀਂ ਰੋਗ ਅਵੱਲੜਾ ਲਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਦਿਲ ਧੜਕੇ ਤੈਨੂੰ ਯਾਦ ਕਰੇ , \nਤੇਰੇ ਮਿਲਣੇ ਦੀ ਫ਼ਰਿਆਦ ਕਰੇ ,\nਤੂੰਹੀ ਮੇਰੀ ਝੋਕ ਆਬਾਦ ਕਰੇਂ , \nਤੈਨੂੰ ਦਿਲ ਦਾ ਮੀਤ ਬਣਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਹਰ ਵੇਲੇ ਬਿੜਕਾਂ ਲੈਂਦੀਆਂ , \nਅੱਖਾਂ ਚੁੱਪ ਕਰਕੇ ਨਾ ਬਹਿੰਦੀਆਂ ,\nਏਹਨਾਂ ਅੱਖੀਆਂ ਨੂੰ ਮੈਂ ਕਹਿੰਦੀਆਂ , \nਕਿਉਂ ਆਪਣਾ ਚੈਨ ਗਵਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਮੇਰੀ ਭੁੱਖ ਤੇ ਪਿਆਸ ਦੀਦਾਰ ਤੇਰਾ , \nਬਸ ਮੰਗਾਂ ਤੈਥੋਂ ਪਿਆਰ ਤੇਰਾ ,\nਇਕ ਤੂੰਹੀ ਹੈਂ ਸੰਸਾਰ ਮੇਰਾ , \nਪੱਲਾ ਦੁਨੀਆ ਤੋਂ ਛੁੜਵਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਜੇ ਕਰ ਲਏਂ ਵਾਦਾ ਆਣ ਦਾ , \nਰਾਹ ਖੁੱਲ੍ਹ ਜਾਏ ਮੇਰੇ ਜਾਣ ਦਾ ,\nਰਹੇਂ ਖ਼ੁਸ਼ੀਆਂ ਜੱਗ ਵਿਚ ਮਾਣਦਾ , \nਤੇਰਾ ਦਰਦ ਅਸਾਂ ਅਪਣਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ...\n\nਕਿਹੜੀ ਕਿੱਥੋਂ ਚੱਲੀ ਏ ਰੀਤ ਵੇ , \nਕਿਤੋਂ ਬਣਕੇ ਆਈ ਪ੍ਰੀਤ ਵੇ ,\nਪਹਿਲਾਂ ਲੱਗਦਾ ਠੰਢੜਾ ਸੀਤ ਵੇ , \nਹੁਣ ਭਾਂਬੜ ਐਸਾ ਮਚਾ ਲਿਆ ॥ ਮੇਰੇ ਸੋਹਣੇ ..."},"hi":{"t":"मेरे सोहणे कमली वालड़ेया","c":"मेरे सोहणे कमली वालड़ेया , \nअसां नेहों तेरे नाल ला लेया , \nखौरे केहड़े वसदा देस तू , \nतैनू अपणा चैन बणा लेया । मेरे सोहणे ...\n\nमेरा लूं लूं रग तेरे नाम वे , \nहोया दिल वी तेरा गुलाम वे , \nजाणे रब्ब ही हुण अंजाम वे , \nअसीं रोग अवलड़ा ला लेया । मेरे सोहणे ...\n\nदिल धड़के तैनू याद करे , \nतेरे मिलणे दी फरियाद करे , \nतूंही मेरी झोक आबाद करें , \nतैनू दिल दा मीत बणा लेया । मेरे सोहणे ...\n\nहर वेले बिड़कां लैंदीयां , \nअखां चुप करके ना बैंहदीयां , \nएहनां अखीयां नू मैं कैंहदीयां , \nक्यों अपणा चैन गवा लेया । मेरे सोहणे ...\n\nमेरी भुख ते प्यास दीदार तेरा , \nबस मंगां तेथों प्यार तेरा , \nइक तूंही हैं संसार मेरा , \nपल्ला दुनिया तों छुड़वा लेया । मेरे सोहणे ...\n\nजे कर लयें वादा आण दा ,\nराह खुल्ल जाए मेरे जाण दा ,\nरहें खुशियां जग विच माणदा ,\nतेरा दर्द असां अपना लेया । मेरे सोहणे ...\n\nगृह कित्थों चली ए रीत वे , \nकित्यों बणके आई प्रीत वे , \nपहलां लगदा ठंडड़ा सीत वे , \nहुण भांवड़ एस मचा लेया । मेरे सोहणे ..."},"en":{"t":"Mere Sohne Kamli Valadya","c":"Mere Sohne Kamli Valadya"}},

	{"id":1769788005604,
	"pb":{"t":"ਰਾਮ ਰੰਗ ਰੰਗਦੇ","c":"ਰਾਮ ਰੰਗ ਰੰਗਦੇ ਯਾ ਸ਼ਿਆਮ ਰੰਗ ਰੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥\n\nਜਿਸ ਰੰਗ ਵਿਚ ਮੀਰਾ ਹਰਿ ਗੁਣ ਗਾਂਦੀ ਏ ,\nਗਲੀ ਗਲੀ ਵਿਚ ਉਹ ਸ਼ਿਆਮ ਨੂੰ ਬੁਲਾਂਦੀ ਏ ,\nਮਸਤੀ ਦੇ ਤੇਰੇ ਕੋਲੋਂ ਜਾਮ ਇਕ ਮੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥\n\nਜਿਸ ਰਾਮ ਰੰਗ ਵਿਚ ਰੰਗੇ ਸੀ ਕਬੀਰ ਜੀ ,\nਓਹੀ ਰੰਗ ਮੰਗਦੇ ਹਾਂ ਤੇਰੇ ਕੋਲੋਂ ਪੀਰ ਜੀ ,\nਅਸੀਂ ਕੇਹੜਾ ਤੇਰੇ ਤੋਂ ਜਹਾਨ ਪੂਰਾ ਮੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥\n\nਤੇਰੇ ਕੋਲੋਂ ਮੰਗਦੇ ਹਾਂ ਰੰਗ ਏ ਪਿਆਰ ਦਾ ,\nਤੇਰੇ ਬਿਨਾ ਦੱਸ ਕਿਹੜਾ ਕੰਮ ਹੈ ਸਵਾਰਦਾ ,\nਤੇਰੇ ਕੋਲੋਂ ਲੈਣਾ ਏ ਸੰਗਣਾ ਨਹੀਂ ਮੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥\n\nਜਿਸ ਰੰਗ ਨਾਲ ਚੱਕੀ ਆਪੇ ਚੱਲ ਜਾਂਦੀ ਏ ,\nਦੁਨੀਆ ਤੇ ਆਈ ਹੋਈ ਹਨੇਰੀ ਠੱਲ੍ਹ ਜਾਂਦੀ ਏ ,\nਅਸੀਂ ਕੋਈ ਐਸ਼ ਤੇ ਆਰਾਮ ਨਹੀਂਓਂ ਮੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥\n\nਜਿਸ ਰੰਗ ਨਾਲ ਠੱਗ ਸੱਜਣ ਬਣਾ ਲਿਆ ,\nਕੌਡੇ ਜੇਹੇ ਰਾਕਸ਼ਾਂ ਨੂੰ ਸਿੱਧੇ ਰਾਹੇ ਪਾ ਲਿਆ ,\nਅਸੀਂ ਨਹੀਂ ਸਵਰਗ ਤਮਾਮ ਤੇਥੋਂ ਮੰਗਦੇ ,\nਦਾਤਾ ਸਾਨੂੰ ਅਪਣੇ ਹੀ ਨਾਮ ਵਿਚ ਰੰਗਦੇ ॥"},"hi":{"t":"राम रंग रंगदे","c":"राम रंग रंगदे या शाम रंग रंगदे , \nदाता सानूं अपणे ही नाम विच रंगदे ।\n\nजिस रंग विच मीरा हर गुण गोंदी ए , \nगली गली विच ओह शाम नूं बुलौंदी ए , \nमस्ती वे तेरे कोलों जाम इक मंगदे , \nदाता सानूं अपणे ही नाम विच रंगदे ।\n\nजिस राम रंग विच रंगे सी कबीर जी , \nओही रंग मंगदे हां तेरे कोलों पीर जी , \nअसीं केहड़ा तेरे तों जहान पूरा मंगदे , \nदाता सानूं अपणे ही नाम विच रंगदे ।\n\nतेरे कोलों मंगदे हां रंग ए प्यार दा , \nतेरे बिना दस्स किहड़ा कंम है सवारदा , \nतेरे कोलों लैणा ए संगणा नही मंगदे , \nदाता सानूं अपणे ही नाम विच रंगदे ।\n\nजिस रंग नाल चक्की आपे चल जांदी ए , \nदुनिया ते आई होई हनेरी ठल्ल जांदी ए , \nअसीं कोई ऐश ते आराम नइयों मंगदे , \nदाता सानूं अपणे ही नाम विच रंगदे ।\n\nजिस रंग नाल ठग सज्जण बणा लेया ,\nकोडे जेहे राक्षां नूं सिधे राहे पा लेया ,\nअसीं नहीं स्वर्ग तमाम तेथों मंगदे ,\nदाता सानूं अपणे ही नाम विच रंगदे ।"},"en":{"t":"Ram Rang Rangde","c":"Ram Rang Rangde"}},

	{"id":1769788565759,
	"pb":{"t":"ਦਾਤਾ ਤੇਰੇ ਵਰਗਾ","c":"ਲੱਖਾਂ ਹੋਰ ਦੁਆਰੇ ਐਸਾ ਦੁਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ,\nਦਾਤਾ ਤੇਰੇ ਵਰਗਾ ਕਿਤਿਓਂ ਪਿਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ॥\n\nਗੋਦ ਚ ਲੈਕੇ ਮਿੱਠੜੀ ਮਿੱਠੜੀ ਲੋਰੀ ਜਦੋਂ ਸੁਣਾਵੇਂ ,\nਭੁੱਲ ਜਾਂਦੀ ਏ ਦੁਨੀਆ ਐਸੀ ਮਸਤੀ ਜੇਹੀ ਚੜ੍ਹ ਜਾਵੇ ,\nਦੁਨੀਆ ਝੂਠੀ ਵਿਚੋਂ ਏਹ ਖ਼ੁਮਾਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ,\nਦਾਤਾ ਤੇਰੇ ਵਰਗਾ ਕਿਤਿਓਂ ਪਿਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ॥\n\nਪਿਆਰ ਤੇਰੇ ਤੋਂ ਸਦਕੇ ਸਾਹਿਬਾ ਪਿਆਰ ਤੇਰੇ ਤੋਂ ਵਾਰੀ ,\nਮੇਰੀ ਜ਼ਿੰਦਗੀ ਤੂੰਹੀ ਸਾਹਿਬਾ ਪਿਆਰ ਦੇ ਨਾਲ ਸ਼ਿੰਗਾਰੀ ,\nਪਰਖ ਪਰਖ ਕੇ ਵੇਖੇ ਐਸਾ ਯਾਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ,\nਦਾਤਾ ਤੇਰੇ ਵਰਗਾ ਕਿਤਿਓਂ ਪਿਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ॥\n\nਤੂੰ ਹੀ ਤੂੰ ਇਕ ਸੱਚਾ ਸਾਥੀ ਮੁਸ਼ਕਿਲ ਰਾਹਾਂ ਉੱਤੇ ,\nਪਿਆਰ ਤੇਰੇ ਤੋਂ ਵਾਂਝੇ ਉਹੋ ਭਾਗ ਜਿਨ੍ਹਾਂ ਦੇ ਸੁੱਤੇ ,\nਬਿਨਾ ਤੇਰੀ ਰਹਿਮਤ ਤੋਂ ਤਾਂ ਕਰਤਾਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ,\nਦਾਤਾ ਤੇਰੇ ਵਰਗਾ ਕਿਤਿਓਂ ਪਿਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ॥\n\nਸੱਚੀ ਤੇਰੀ ਪ੍ਰੀਤ ਮਾਲਕਾਂ ਰੰਗ ਪ੍ਰੀਤ ਦਾ ਗੂੜ੍ਹਾ ,\nਮਹਿਲਾਂ ਵਿਚ ਬਿਠਾਇਆ ਏ ਗਲੀਆਂ ਦਾ ਕੂੜਾ ਰੁੜ੍ਹਾ ,\nਐਸਾ ਹੋਰ ਲਲਾਰੀ ਕਿਸੇ ਬਜ਼ਾਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ,\nਦਾਤਾ ਤੇਰੇ ਵਰਗਾ ਕਿਤਿਓਂ ਪਿਆਰ ਨਹੀਂਓਂ ਮਿਲਣਾ ॥"},"hi":{"t":"दाता तेरे वरगा","c":"लखां होर दुआरे ऐसा दुआर नहीयों मिलणा , \nदाता तेरे वरगा कितेयों प्यार नहीयों मिलणा ।\n\nगोद च लैके मिठड़ी मिठड़ी लोरी जदों सुणावें , \nभुल जांदी ए दुनिया ऐसी मस्ती जेई चढ़ जावे , \nदुनिया झूठी विचों एह खुमार नहीयों मिलणा , \nदाता तेरे वरगा कितेयों प्यार नहीयों मिलणा ।\n\nप्यार तेरे तों सदके साहिबा प्यार तेरे तों वारी , \nमेरी ज़िदगी तूंही साहिबा प्यार दे नाल शिंगारी , \nपरख परखके वेखे ऐसा यार नहीयों मिलणा , \nदाता तेरे वरगा कितेयों प्यार नहीयों मिलणा ।\n\nतूं ही तूं इक सच्चा साथी मुश्किल राहां उत्ते , \nप्यार तेरे तो वांझे ओहो भाग जिन्हां दे सुत्ते , \nबिना तेरी रहमत तों तां करतार नहीयों मिलणा , \nदाता तेरे वरगा कितेयों प्यार नहीयों मिलणा ।\n\nसच्ची तेरी प्रीत मालकां रंग प्रीत दा गूढ़ा , \nमहलां विच बिठाया ए गलीयां दा कूड़ा रुड़ा , \nऐसा होर ललारी किसे बज़ार नहीयों मिलणा , \nदाता तेरे वरगा कितेयों प्यार नहीयों मिलणा ।"},"en":{"t":"Data Tere Varga","c":"Data Tere Varga"}},
