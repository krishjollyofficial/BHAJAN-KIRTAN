	"pb":{"t":"ਕਾਨ੍ਹਾ ਨੇ ਕੈਸੀ ਮਾਰੀ","c":"ਕਾਨ੍ਹਾ ਨੇ ਕੈਸੀ ਮਾਰੀ ਭਰ ਪਿਚਕਾਰੀ \nਮੋਰੀ ਚੁਨਰੀਆ ਕੈਸੇ ਰੰਗ ਡਾਰੀ ॥\n\nਭੀਗ ਗਈ ਮੇਰੀ ਕੈਸੀ ਚੋਲੀ , \nਕੈਸੀ ਚਟਕ ਰੰਗ ਖੇਲੀ ਹੋਲੀ ,\nਰੰਗੀ ਗਈ ਮੈਂ ਤੋ ਸਾਰੀ ਕੀ ਸਾਰੀ ॥\n\nਅਬ ਕਿਉਂ ਭਾਗੇ ਦੂਰ ਕੋ ਜਾਏ , \nਮੁਝ ਸੇ ਅਬ ਤੂੰ ਬਚਨਾ ਪਾਏ ,\nਜਾਨੇ ਨਾ ਦੂਂਗੀ ਕਸਮ ਤੁਮ੍ਹਾਰੀ ॥\n\nਓ ਰੇ ਕਾਨ੍ਹਾ ਓ ਨੰਦ ਲਾਲਾ , \nਮੁਝ ਪੇ ਯੇ ਕੈਸਾ ਰੰਗ ਡਾਲਾ ,\nਛੋਡੋ ਕਲਾਈ ਕਿਆ ਮਰਜ਼ੀ ਤੁਮ੍ਹਾਰੀ ॥"},"hi":{"t":"कान्हा ने कैसी मारी","c":"कान्हा ने कैसी मारी भर पिचकारी \nमोरी चुनरीया कैसे रंग डारी ।\n\nभीग गई मेरी कैसी चोली , \nकैसी चटक रंग खेली होली , \nरंगी गई मैं तो सारी की सारी ।\n\nअब क्यों भागे दूर को जाऐ , \nमुझ से अब तूं बचना पाऐ , \nजाने ना दूंगी कसम तुम्हारी ।\n\nओ रे कान्हा ओ नन्द लाला , \nमुझ पे ये कैसा रंग डाला , \nछोडो कलाई क्या मर्जी तुम्हारी ।"},"en":{"t":"Kanha Ne Kaisi Maari","c":"Kanha Ne Kaisi Maari"}},

	{"id":1769797195378,
	"pb":{"t":"ਆਉਂਦੇ ਜਾਂਦੇ ਹੱਸਦੇ ਗਾਂਦੇ","c":"ਆਉਂਦੇ ਜਾਂਦੇ ਹੱਸਦੇ ਗਾਂਦੇ ਇੱਕ ਕਰੋ ਬਸ ਕੰਮ ,\nਬੋਲੋ ਜੈ ਜੈ ਰਾਧੇ ਸ਼ਿਆਮ , ਬੋਲੋ ਜੈ ਜੈ ਰਾਧੇ ਸ਼ਿਆਮ ॥\n\nਜੈ ਜੈ ਰਾਧੇ , ਜੈ ਜੈ ਰਾਧੇ , ਜੈ ਜੈ ਕ੍ਰਿਸ਼ਨ ਕਨ੍ਹਈਆ ,\nਉਹ ਹੀ ਤਾਂ ਬਸ ਹੈ ਰੇ ਪ੍ਰਾਣੀ ਜੀਵਨ ਦਾ ਖਿਵਈਆ ,\nਮਨ ਸੇ ਬੋਲੋ , ਪ੍ਰੇਮ ਸੇ ਬੋਲੋ , ਬੋਲੋ ਸੁਬਹ ਸ਼ਾਮ ॥\nਬੋਲੋ ਜੈ ਜੈ ...\n\nਪਾਪ ਉਧਾਰੇ ਦੁੱਖ ਨਿਵਾਰੇ , ਕਸ਼ਟ ਕੋਈ ਨ ਆਵੇ ,\nਜਬ ਯਹ ਸੁੰਦਰ ਨਾਮ ਪਿਆਰਾ , ਮਨ ਮੇਂ ਯੂੰ ਬਸ ਜਾਏ ,\nਜੈਸੇ ਬਾਂਸੁਰੀਆ ਸੇ ਨਿਕਲੇ ਮੀਠੇ ਸਵਰ ਕੇ ਤਾਨ ॥\nਬੋਲੋ ਜੈ ਜੈ ...\n\nਇਸੀ ਨਾਮ ਕੇ ਸਗਲ ਜਗਤ ਮੇਂ ਗੁੰਜ ਰਹੇ ਜੈਕਾਰੇ ,\nਹਮ ਭੀ ਗਾਏਂ , ਤੁਮ ਭੀ ਗਾਓ , ਗਾਏਂ ਮਿਲਕਰ ਸਾਰੇ ,\nਸ਼ਾਂਤ ਸ਼ੀਤਲ ਮਨ ਹੋ ਜਾਏਗਾ ਜਪਣੇ ਸੇ ਯੇ ਨਾਮ ॥\nਬੋਲੋ ਜੈ ਜੈ ...\n\nਕਰ ਲੋ ਕਰ ਲੋ ਹਰਿ ਕਾ ਚਿੰਤਨ , ਕਾਹੇ ਕੋ ਸ਼ਰਮਾਨਾ ,\nਬੱਚੇ ਗਾਏਂ ਬੂਢੇ ਗਾਏਂ , ਗਾਏਂ ਯਹੀ ਤਰਾਨਾ ,\nਸੁੰਦਰ ਬਾਣੀ ਸੁਨਨੇ ਸੇ ਹੀ ਮਨ ਕੋ ਮਿਲੇ ਆਰਾਮ ॥\nਬੋਲੋ ਜੈ ਜੈ ..."},"hi":{"t":"आते जाते हंसते गाते","c":"आते जाते हंसते गाते एक करो बस काम , \nबोलो जै जै राधे श्याम , बोलो जै जै राधे श्याम ।\n\nजै जै राधे , जै जै राधे , जै जै कृष्ण कन्हैया , \nवो ही तो बस है रे प्राणी जीवन का खवैया , \nमन से बोलो , प्रेम से बोलो , बोलो सुबह शाम ।\nबोलो जै जै ...\n\nपाप उधारे दुःख निवारे , कष्ट कोई न आवे , \nजब यह सुन्दर नाम प्यार , मन में यूं बस जाऐ , \nजैसे बांसुरिया से निकले मीठे स्वर के तान ।\nबोलो जै जै ...\n\nइसी नाम के सगल जगत में गुंज रहे जैकारे \nहम भी गाऐं , तुम भी गाओ , गाऐ मिलकर सारे , \nशांत शीतल मन हो जाऐगा जपने से ये नाम ।\nबोलो जै जै ...\n\nकर लो कर लो हरि का चिंतन , काहे को शरमाना , \nबच्चे गाऐं बूढे गाऐं , गाऐं यही तराना , \nसुन्दर वाणी सुनने से ही मन को मिले आराम ।\nबोलो जै जै ..."},"en":{"t":"Ate Jate Haste Gate","c":"Ate Jate Haste Gate"}},

	{"id":1769797426626,
	"pb":{"t":"ਕਾਨ੍ਹਾ ਤੇਰੀ ਮੁਰਲੀ ਦੇ","c":"ਕਾਨ੍ਹਾ ਤੇਰੀ ਮੁਰਲੀ ਦੇ ਹਮ ਹੈਂ ਦੀਵਾਨੇ ,\nਕਬ ਆਓਗੇ ਤੁਮ ਮੁਰਲੀ ਬਜਾਨੇ ॥\n\nਦੁਨੀਆ ਮੇਂ ਨਹੀਂ ਕੋਈ ਅਬ ਰਖਵਾਲਾ ,\nਕੰਸੋਂ ਨੇ ਫਿਰ ਸੇ ਡੇਰਾ ਹੈ ਡਾਲਾ ,\nਕੌਨ ਆਏਗਾ ਹਮੇਂ ਇਨਸੇ ਬਚਾਨੇ ॥\n\nਆਸ਼ਾ ਕੀ ਜਯੋਤੀ ਬੁਝਨੇ ਕੋ ਜਾ ਰਹੀ ,\nਤੇਰੀ ਗਵਾਲਨੇਂ ਤੁਝ ਕੋ ਬੁਲਾ ਰਹੀ ,\nਕਬ ਆਓਗੇ ਹਮਰੀ ਆਸ ਬੰਧਾਨੇ ॥\n\nਧਰਤੀ ਪੇ ਤੇਰੀ ਦੇਖੋ ਕਾਲ ਕਾ ਹੀ ਜ਼ੋਰ ਹੈ ,\nਛਾਇਆ ਹੈ ਅੰਧੇਰਾ ਕੈਸਾ ਅਬ ਚਾਰੋਂ ਓਰ ਹੈ ,\nਆ ਜਾਓ ਅਬ ਰਾਸ ਰਚਾਨੇ ॥\n\nਸੁਨ ਲੋ ਅਰਜ ਅਬ ਆਓ ਬਨਵਾਰੀ ,\nਮੁਰਲੀ ਵਾਲੇ ਮੇਰੇ ਬਾਂਕੇ ਬਿਹਾਰੀ ,\nਆ ਜਾਓ ਹਮਰੀ ਬਿਗੜੀ ਬਨਾਨੇ ॥"},"hi":{"t":"कान्हा तेरी मुरली के","c":"कान्हा तेरी मुरली के हम है दिवाने , \nकब आओगे तुम मुरली बजाने ।\n\nदुनिया में नहीं कोई अब रखवाला , \nकंसों ने फिर से डेरा है डाला , \nकौन आऐगा हमे इनसे बचाने ।\n\nआशा की ज्योती बुझने को जा रही , \nतेरी गवालने तुझ को बुला रही , \nकब आओगे हमरी आस बंधाने ।\n\nधरती पे तेरी देखो काल का ही जोर है , \nछाया है अंधेरा कैसा अब चारों और है , \nआ जाओ अब रास रसाने ।\n\nसुन लो अरज अब आओ बनवारी , \nमुरली वाले मेरे बांके बिहारी , \nआ जाओ हमरी बिगड़ी बनाने ।"},"en":{"t":"Kanha Teri Murli Ke","c":"Kanha Teri Murli Ke"}},

	{"id":1769797696124,
	"pb":{"t":"ਯਸ਼ੋਦਾ ਮਈਆ ਯਸ਼ੋਦਾ ਮਈਆ","c":"ਯਸ਼ੋਦਾ ਮਈਆ ਯਸ਼ੋਦਾ ਮਈਆ ,\nਤੰਗ ਬੜਾ ਕਰਤਾ ਹੈ ਦੇਖੋ ਤੇਰਾ ਕ੍ਰਿਸ਼ਨ ਕਨ੍ਹਈਆ ॥\n\nਮਟਕੀਆਂ ਹਮਰੀ ਯੇ ਫੋੜੇ , ਜਬ ਪਨੀਆਂ ਭਰਨ ਕੋ ਹਮ ਜਾਏਂ ,\nਸੰਗ ਸਖਾ ਕੇ ਮਿਲਕੇ ਹਮਕੋ ਜਾਨੇ ਕਿਆ-ਕਿਆ ਨਾਚ ਨਚਾਏ ,\nਜੰਗਲ ਮੇਂ ਚਰਵਾਨੇ ਜਾਏ ਜਬ ਯੇ ਲੇ ਕੇ ਗਈਆ ॥\n\nਤੇਰਾ ਲਾਡਲਾ ਤੇਰਾ ਪਿਆਰਾ ਤੇਰਾ ਨੰਦ ਕਿਸ਼ੋਰ ਹੈ ,\nਦੇਖੋ ਕਿਤਨਾ ਭੋਲਾ ਬਨਤਾ ਯੇ ਤੋ ਮਾਖਨ ਚੋਰ ਹੈ ,\nਅਪਨੇ ਲੱਲਾ ਕੋ ਸਮਝਾਓ , ਪੜੇ ਤੋਰੀ ਹਮ ਪਈਆ ॥\n\nਕਈ ਬਾਰ ਸਮਝਾਇਆ ਇਸ ਕੋ ਪਰ ਯੇ ਸਮਝ ਨਾ ਪਾਏ ਰੇ ,\nਜਾਏਂ ਜਬ ਸਨਾਨ ਕੋ ਹਮਰੇ ਵਸਤਰ ਯਹੀ ਚੁਰਾਏ ਰੇ ,\nਤੰਗ ਆ ਗਏ ਇਨਸੇ ਨਾਚ ਨਚਾਏ ਤਾ-ਤਾ ਥਈਆ ॥\n\nਨਾ-ਨਾ ਮਈਆ ਕੁਛ ਨਾ ਕਹਿਨਾ ਹਮ ਤੋ ਯੂੰ ਹੀ ਕਹਿਤੀ ਹੈਂ ,\nਯੇ ਹਮਰੇ ਦਿਲ ਮੇਂ ਰਹਿਤਾ ਹਮ ਇਨਕੇ ਦਿਲ ਮੇਂ ਰਹਿਤੀ ਹੈਂ ,\nਅਪਨੇ ਸਰ ਪੇ ਲੇਲੇ ਹਮ ਤੋ ਇਸਕੀ ਸਭੀ ਬਲਈਆ ॥"},"hi":{"t":"यशोधा मईया यशोधा मईया","c":"यशोधा मईया यशोधा मईया , \nतंग बड़ा करता है देखो तेरा कृष्ण कन्हैया ।\n\nमटकीयां हमरी ये फोड़े , जब पनीयां भरन को हम जाऐं , \nसंग सखा के मिलके हमको जाने क्या-क्या नाच नचाऐ , \nजंगल में चरवाने जाऐ जब ये ले के गईया ।\n\nतेरा लाडला तेरा प्यारा तेरा नंद किशोर है , \nदेखो कितना भोला बनता ये तो माखन चोर है , \nअपने लल्ला को समझाओ , पड़े तोरे हम पईया ।\n\nकई बार समझाया इस को पर ये समझ ना पाये रे , \nजाऐं जब स्नान को हमरे वस्त्र यही चुराऐ रे , \nतंग आ गए इनसे नाच नचाऐ ता-ता थईया ।\n\nना-ना मईया कुछ ना कहना हम तो यूँ ही कहती है \nये हमरे दिल में रहता हम इनके दिल मे रहती है , \nअपने सर पे लेले हम तो इसकी सभी बलईया ।"},"en":{"t":"Yashoda Maiya Yashoda Maiya","c":"Yashoda Maiya Yashoda Maiya"}},

	{"id":1769798027388,
	"pb":{"t":"ਮਾਂ ਦੇ ਜੈਕਾਰੇ ਲਾਉਂਦਾ ਜਾ","c":"ਮਾਂ ਦੇ ਜੈਕਾਰੇ ਲਾਉਂਦਾ ਜਾ ਜੈ ਮਾਤਾ ਦੀ ਗਾਉਂਦਾ ਜਾ ,\nਚੜ੍ਹ ਜਾ ਚੜ੍ਹ ਜਾ ਪੌੜੀ-ਪੌੜੀ ਐਵੇਂ ਨਾ ਘਬਰਾਉਂਦਾ ਜਾ ॥\n\nਬਾਣ ਗੰਗਾ ਦਾ ਪਾਣੀ ਪੀ ਕੇ , ਅਮਰ ਤੂੰ ਵੀ ਹੋ ਜਾਵੀਂ ,\nਪਾਪ ਕਸ਼ਟ ਤੇਰੇ ਦੂਰ ਹੋਣਗੇ , ਰੱਜ ਰੱਜ ਡੁਬਕੀਆਂ ਲਾਵੀਂ ,\nਭਗਤਾ ਮਾਂ ਦੇ ਭਵਨ ਤੇ ਜਾਣਾ , ਹੌਲੀ ਹੌਲੀ ਆਉਂਦਾ ਜਾ ॥\n\nਚਰਨ ਪਾਦੁਕਾ ਆ ਗਈ ਏ ਹੁਣ ਚਰਨਾਂ ਵਿਚ ਅਰਦਾਸ ਕਰੀਂ ,\nਇਕ ਮਨ ਇਕ ਚਿੱਤ ਹੋ ਕੇ ਕਹਿਣਾ ਪੂਰੀ ਮੇਰੀ ਆਸ ਕਰੀਂ ,\nਸੁਣੀ ਜਾਣੀ ਏ ਅੱਜ ਤਾਂ ਤੇਰੀ , ਅਰਜ਼ੀ ਆਪਣੀ ਲਾਉਂਦਾ ਜਾ ॥\n\nਮੰਦਿਰ ਮਾਂ ਦਾ ਆਇਆ ਹੈ ਜੋ , ਇਹ ਹੈ ਆਦਿ ਕੁਆਰੀ ,\nਕੱਟੀ ਜਾਣੀ ਚੁਰਾਸੀ ਐਥੋਂ ਮਾਂ ਦੀ ਮਹਿਮਾ ਨਿਆਰੀ ,\nਕਰ ਕੇ ਐਥੇ ਸਜਦਾ ਮਾਂ ਨੂੰ ਹੋਰ ਅਗਾਹਾਂ ਵੱਲ ਆਉਂਦਾ ਜਾ ॥\n\nਹਾਥੀ ਮੱਥਾ ਚੜ੍ਹ ਕੇ ਆਪਾਂ , ਸਾਂਝੀ ਛੱਤ ਤੱਕ ਜਾਣਾ ,\nਓਥੋਂ ਦਰਸ਼ਨ ਹੋ ਜਾਂਦੇ ਨੇ ਮਾਂ ਦਾ ਜਿੱਥੇ ਟਿਕਾਣਾ ,\nਆਉਂਦੇ ਜਾਂਦੇ ਭਗਤਾਂ ਨੂੰ ਵੀ ਜੈ ਜੈਕਾਰ ਬੁਲਾਉਂਦਾ ਜਾ ॥\n\nਬਿੰਦਰਾ ਕਰ ਲੈ ਮਾਂ ਦੇ ਦਰਸ਼ਨ ਪਿੰਡੀ ਰੂਪ ਸੁਹਾਏ ,\nਉਹ ਹੋ ਗਏ ਪਾਵਨ ਜੇਹਨਾਂ ਮਾਂ ਦੇ ਦਰਸ਼ਨ ਪਾਏ ,\nਮੇਰੀ ਮਾਂ ਜੱਗ ਦੀ ਰੱਖਵਾਲੀ ਬਸ ਉਹਦੇ ਗੁਣ ਗਾਂਦਾ ਜਾ ॥"},"hi":{"t":"मां दे जैकारे लौंदा जा","c":"मां दे जैकारे लौंदा जा जै माता दी गौंदा जा , \nचढ़ जा चढ़ जा पौड़ी-पौड़ी ऐवे ना घबरांदा जा ।\n\nबांण गंगा दा पानी पी के , अमर तु वी हो जावीं , \nपाप कष्ट तेरे दूर होनगे , रज रज डुबकीयां लावीं , \nभगता मां दे भवन ते जाणा , हौली हौली औंदा जा ।\n\nचरण पादुका आ गई ऐ हुणं चरणां विच अरदास करीं , \nइक मन इक चित्त हो के कहणा पुरी मेरी आस करीं , \nसुणी जाणी ऐ अज तां तेरी , अरजी आपनी लौंदा जा ।\n\nमंदिर मां दा आया है जो , एह है आदि कुआरी \nकट्टी जानी चुरासी एथों मां दी महिमा न्यारी , \nकर के ऐथे सजदा मां तु होर अगांह वल औंदा जा ।\n\nहाथी मत्था चढ के आपां , सांझी छत्त तक जाना , \nओथो दर्शन हो जांदे ने मां दा जिथे टिकाणा , \nऔंदे जादे भगता नुं वी जै जैकार बुलांदा जा ।\n\nबिंदरा कर लै मां दे दर्शन पिण्डी रूप सहाये , \nओहो हो गये पावन जेहना मां दे दर्शन पाऐ , \nमेरी मां जग दी रखवाली बस ओहदे गुण गांदा जा ।"},"en":{"t":"Maa De Jaikare Londa Ja","c":"Maa De Jaikare Londa Ja"}},

	{"id":1769798478219,
	"pb":{"t":"ਮੇਰੇ ਗੁਰੂ ਦੇ ਪਿਆਰੇ ਨਾਮ ਜਪ ਲੈ","c":"ਮੇਰੇ ਗੁਰੂ ਦੇ ਪਿਆਰੇ ਨਾਮ ਜਪ ਲੈ ,\nਗੁਰੂ ਕਾਜ ਸੰਵਾਰੇ ਨਾਮ ਜਪ ਲੈ ॥\n\nਨਾਮ ਨਾਲ ਸੀ ਗੁਰੂ ਨਾਨਕ ਨੇ ਚੱਕੀ ਆਪ ਚਲਾਈ ,\nਪਰਬਤ ਉੱਤੇ ਪੰਜਾ ਲਾ ਕੇ ਜਲ ਦੀ ਨਦੀ ਵਗਾਈ ,\nਨਾਮ ਜਪੇ ਮੀਰਾ ਬਾਈ , ਨਾਮ ਜਪ ਲੈ ,\nਮੀਰਾ ਮਸਤ ਬਣਾਈ , ਨਾਮ ਜਪ ਲੈ ॥\n\nਸੈਣ ਭਗਤ ਨੇ ਰੱਬ ਨੂੰ ਜਪਿਆ ਰੱਬ ਨੇ ਰੂਪ ਵਟਾਇਆ ,\nਸੈਣ ਰੂਪ ਵਿਚ ਰਾਜੇ ਦੀ ਚੰਪੀ ਕਰਨੇ ਨੂੰ ਆਇਆ ,\nਨਾਮ ਧੰਨੇ ਨੇ ਧਿਆਇਆ , ਨਾਮ ਜਪ ਲੈ ,\nਹਲ ਰੱਬ ਨੇ ਚਲਾਇਆ , ਨਾਮ ਜਪ ਲੈ ॥\n\nਨਾਮ ਨੂੰ ਜਪਿਆ ਪੰਚਾਲੀ ਨੇ ਜ਼ਰਾ ਦੇਰ ਨ ਲਾਈ ,\nਆਪ ਨਰਾਇਣ ਵਸਤਰ ਰੂਪ ਚ ਉਸਦੀ ਲਾਜ ਬਚਾਈ ,\nਨਾਮ ਸ਼ਬਰੀ ਧਿਆਇਆ , ਨਾਮ ਜਪ ਲੈ ,\nਰਾਮ ਆਪ ਚੱਲ ਆਏ , ਨਾਮ ਜਪ ਲੈ ॥\n\nਜਿਹੜੇ ਗੁਰੂ ਦੀ ਸ਼ਰਣੀ ਆਉਂਦੇ ਪਾਉਂਦੇ ਸੁੱਖ ਘਨੇਰਾ ,\nਗੁਰੂ ਸ਼ਰਣ ਵਿਚ ਆਕੇ ਹੁੰਦਾ ਪਾਪਾਂ ਦਾ ਨਬੇੜਾ ,\nਗੁਰੂ ਕਰਦੇ ਕਮਾਲ ਜੀ , ਨਾਮ ਜਪ ਲੈ ,\nਅੰਗ ਸੰਗ ਰਹਿੰਦੇ ਨਾਲ ਜੀ , ਨਾਮ ਜਪ ਲੈ ॥\n\nਨਾਮ ਨਹੀਂ ਜਪਦੇ ਜਿਹੜੇ ਦੱਸੋ ਕੀ ਉਹਨਾਂ ਦਾ ਜੀਣਾ ,\nਬਿਨਾ ਗੁਰੂ ਦੇ ਦੁਨੀਆ ਦੇ ਵਿਚ ਜ਼ਹਿਰ ਹੀ ਪੈਂਦਾ ਪੀਣਾ ,\nਜਿਹੜੇ ਗੁਰੂ ਗੁਰੂ ਕਰਦੇ , ਨਾਮ ਜਪ ਲੈ ,\nਉਹ ਭਵ ਚੋਂ ਨੇ ਤਰਦੇ , ਨਾਮ ਜਪ ਲੈ ॥"},"hi":{"t":"मेरे गुरु दे प्यारे नाम जप लै","c":"मेरे गुरु दे प्यारे नाम जप लै \nगुरु काज संवारे नाम जप लै\n\nनाम नाल सी गुरु नानक ने चक्की आप चलाई , \nपरबत उत्ते पंजा ला के जल दी नदी वगाई , \nनाम जपे मीरा बाई , नाम जप लै \nमीरा मस्त बनाई , नाम जप लै\n\nसैन भगत ने रब नूं जपया रब ने रूप वटाया , \nसैन रूप विच राजे दी चंपी करने नूं आया , \nनाम धन्ने ने ध्याया , नाम जप लै \nहल रब ने चलाया , नाम जप लै\n\nनाम नूं जपया पंचाली ने जरा देर न लाई , \nआप नरायण वस्त्र रूप च उसदी लाज बचाई \nनाम शबरी ध्याये , नाम जप लै \nराम आप चल आए , नाम जप लै\n\nजेहड़े गुरु दी शरणी औंदे पौंदे सुख घनेरा , \nगुरु शरण विच आके हुँदा पापां दा नबेड़ा \nगुरु करदे कमाल जी , नाम जप लै \nअंग संग रहंदे नाल जी , नाम जप लै\n\nनाम नहीं जपदे जेहड़े दस्सो की उहनां दा जीणा , \nबिना गुरु दे दुनिया दे विच जहर ही पैंदा पीणा , \nजेहड़े गुरु गुरु करदे , नाम जप लै \nओह भव चो ने तरदे , नाम जप लै"},"en":{"t":"Mere Guru De Pyare Naam Jap Le","c":"Mere Guru De Pyare Naam Jap Le"}},

	{"id":1769799448374,
	"pb":{"t":"ਸਤਿਗੁਰੂ ਜੀ ਮੈਂ ਤੇਰਾ ਹਾਂ","c":"ਸਤਿਗੁਰੂ ਜੀ ਮੈਂ ਤੇਰਾ ਹਾਂ ਤੂੰ ਹੀ ਮੇਰਾ ਸੰਸਾਰ ,\nਤੂੰਹੀ ਮੇਰਾ ਪ੍ਰਾਣ ਅਧਾਰਾ ਤੂੰਹੀ ਹੈ ਪਤਵਾਰ ,\nਮੈਂ ਤੇਰਾ ਤੇਰਾ ਤੇਰਾ ਤੂੰ ਮੇਰਾ ਮੇਰਾ ਮੇਰਾ ॥\n\nਆਦਿ ਜੁਗਾਦੀ ਵਾਲੀ ਤੂੰ ਹੈਂ , ਤੱਕਿਆ ਤੇਰਾ ਟਿਕਾਣਾ ,\nਮੱਲ ਕੇ ਬਹਿ ਗਿਆ ਤੇਰਾ ਦੁਆਰਾ , ਹੋਰ ਕਿਤੇ ਨਹੀਂ ਜਾਣਾ ,\nਤੂੰ ਮੇਰਾ ਪਿਤਾ ਤੂੰ ਹੈਂ ਮੇਰਾ ਮਾਤਾ , ਤੂੰ ਹੀ ਰਿਸ਼ਤੇਦਾਰ ॥\n\nਤੂੰ ਪ੍ਰਭ ਦਾਤਾ ਅੰਤਰਯਾਮੀ , ਤੈਥੋਂ ਕਾਹਦਾ ਪਰਦਾ ,\nਰੁਲ ਜਾਣਾ ਸੀ ਮੈਂ ਤਾਂ ਦਾਤਾ , ਜੇ ਤੂੰ ਬਾਂਹ ਨਾ ਫੜਦਾ ,\nਚਰਨਾਂ ਦੇ ਵਿਚ ਲਾਕੇ ਮੈਨੂੰ , ਤੂੰ ਕੀਤਾ ਉਪਕਾਰ ॥\n\nਸਰਬ ਕਲਾ ਕੇ ਸੁਆਮੀ ਦਾਤੇ , ਸਰਬ ਜੀਆ ਪ੍ਰਤਿਪਾਲੇ ,\nਸ਼ਰਣੀ ਆਵੇ ਸਭ ਸੁੱਖ ਪਾਵੇ , ਤਿਲੁ ਨਹੀਂ ਭੰਨੈ ਘਾਲੇ ,\nਮਨੁ ਨੀਵਾਂ ਹੋ ਮਤਿ ਮੇਰੀ ਉੱਚੀ , ਹੇ ਪ੍ਰਭੂ ਕਿਰਪਾਧਾਰ ॥\n\nਆਪਣਾ ਨਾਮ ਦੇਓ ਮੇਰੇ ਪ੍ਰਭ ਜੀ , ਸਭ ਤੇਰੀ ਵਡਿਆਈ ,\nਦਾਸ ਜਾਣ ਕਰ ਕਿਰਪਾ ਕਰ ਦਿਓ , ਮੈਂ ਤੇਰੀ ਸ਼ਰਨਾਈ ,\nਬੰਧਨ ਕਾਟ ਸਾਧਸੰਗਤਿ ਬਖ਼ਸ਼ੋ , ਸਤਿਗੁਰੂ ਬਖ਼ਸ਼ਣਹਾਰ ॥\n\nਤਿੰਨ ਲੋਕ ਜੈਕਾਰਾ ਤੇਰਾ , ਤੇਰੀ ਮਹਿਮਾ ਗਾਵੈ ,\nਚਰਨ ਕਮਲ ਦੀ ਟੇਕ ਮਿਲੇ , ਅਠਸਠਿ ਤੀਰਥ ਨਾਵੈ ,\nਦੀਨ ਬੰਧੂ ਦੁੱਖ ਹਰਤਾ ਹਰਿ ਜੀ , ਹਮ ਕੂਕਰ ਦਰਬਾਰ ॥"},"hi":{"t":"सतिगुरू जी मैं तेरा हां","c":"सतिगुरू जी मैं तेरा हां तू ही मेरा संसार ,\nतूही मेरा प्राण अधारा तूंही है पतवार ,\nमैं तेरा तेरा तेरा तूं मेरा मेरा मेरा\n\nआदि जुगादी वाली तूं है , तक्या तेरा टिकाणा ,\nमल्लके बह गिया तेरा दवारा , होर किते नहीं जाणा ,\nतूं मेरा पिता तूं है मेरा माता , तूं ही रिश्तेदार \n\nतूं प्रभ दाता अंर्तयामी , तैथों काहदा परदा , \nरूल जाणा सी में तां दाता , ते तूं बांह ना फड़दा ,\nचरना दे विच लाके मैंनू , तूं कीता उपकार\n\nसरब कला के सवामी दाते , सरब जीआ प्रृतपाले ,\nशरणी आवे सब सुख पावे , तिल नही भन्ने घाले ,\nमन नीवां हो मति मेरी उच्ची , हे प्रभु किरपाधार\n\nअपना नाम देओ मेरे प्रभ जी , सब तेरी वडियाई , \nदास जान कर किरपा कर दो , मैं तेरी शरनाई ,\nबंधन काट साधसंग बखशो , सतगुरू बखशनहार\n\nतीन लोक जयकारा तेरा , तेरी महिमा गावै ,\nचरन कमल दी टेक मिले , अठसठि तीर्थ नावै ,\nदीन बंधू दुख हरता हरि जी , हम कूकर दरबार"},"en":{"t":"Satguru Ji Mein Tera Haa","c":"Satguru Ji Mein Tera Haa"}},

	{"id":1770025993938,
	"pb":{"t":"ਜੋ ਤੁਮ ਪੇ ਭਰੋਸਾ ਕਰਤੇ ਹੈਂ ਰੱਬ ਜੀ","c":"ਜੋ ਤੁਮ ਪੇ ਭਰੋਸਾ ਕਰਤੇ ਹੈਂ ਰੱਬ ਜੀ ਉਨਕਾ ਬੇੜਾ ਪਾਰ ਹੋਤਾ ਹੈ ,\nਬੇੜਾ ਪਾਰ ਹੋਤਾ ਹੈ , ਉਨਕਾ ਉੱਧਾਰ ਹੋਤਾ ਹੈ ,\nਕਿ ਸਾਰਾ ਜੀਵਨ ਹੀ ਉਨਕਾ ਸਦਾ ਖੁਸ਼ਹਾਲ ਹੋਤਾ ਹੈ ॥\n\nਆਸ਼ਾਓਂ ਕੀ ਜੋਤ ਜਲਾਕੇ ਕਰ ਦੋ ਤੁਮ ਉਜਿਆਰਾ ,\nਏਕ ਝਲਕ ਜੋ ਤੁਮ ਦਿਖਲਾ ਦੋ ਦੁੱਖ ਭੀ ਕਰ ਲੇਂ ਕਿਨਾਰਾ ,\nਤੁਮ ਚਾਹੋ ਕੁਛ ਭੀ ਕਰ ਦੋਗੇ , ਕਿਰਪਾ ਸੇ ਝੋਲੀ ਭਰ ਦੋਗੇ ,\nਕੁਛ ਭੀ ਮਾਂਗੇ ਸੇਵਕ ਤੁਮਸੇ ਤੁਮ ਇੱਛਾ ਪੂਰਣ ਕਰ ਦੋਗੇ ॥\n\nਜੋ ਤੁਮ ਕੋ ਪ੍ਰਭੂ ਯਾਦ ਕਰੇਂ , ਸੁਬਹ ਸ਼ਾਮ ਫ਼ਰਿਆਦ ਕਰੇਂ ,\nਉਨਕੀ ਵਿਨਤੀ ਤੂੰ ਸੁਨ ਲੇਤਾ , ਅਪਨੇ ਘਰ ਸੇ ਸੁਖ ਹੀ ਦੇਤਾ ,\nਕਰਤਾ ਤੂੰ ਰਹਿਮਤ ਉਨ ਸਬ ਪਰ , ਰਖਤਾ ਸਲਾਮਤ ਉਨ ਸਬ ਕੋ ,\nਲਗਤਾ ਦੇਰ ਨਾ ਇਕ ਪਲ ਕੀ ਸਬ ਮਾਲੋਮਾਲ ਹੋਤਾ ਹੈ ॥\n\nਜਿਸ ਸੇਵਕ ਪਰ ਹਾਥ ਹੋ ਤੇਰਾ ਵੋ ਸੇਵਕ ਕੈਸੇ ਡੋਲੇ ,\nਜਿਸਕੇ ਸਾਥ ਤੂੰ ਹਰਦਮ ਰਹਿਤਾ ਵੋ ਜੈ ਜੈਕਾਰ ਤੇਰੀ ਬੋਲੇ ,\nਐਸਾ ਹੀ ਅਕਸਰ ਹੋਤਾ ਹੈ , ਪ੍ਰੇਮੀ ਤੇਰੇ ਪ੍ਰੇਮ ਮੇਂ ਰੋਤਾ ਹੈ ,\nਹੋਤਾ ਵਹੀ ਇਸ ਜਗ ਮੇਂ ਜੋ ਤੁਝੇ ਮੰਜ਼ੂਰ ਹੋਤਾ ਹੈ ॥"},"hi":{"t":"जो तुम पे भरोसा करते है रब्ब जी","c":"जो तुम पे भरोसा करते है रब्ब जी उनका बेड़ा पार होता है ,\nबेड़ा पार होता है , उनका उद्धार होता है , \nकि सारा जीवन ही उनका सदा खुशहाल होता है ।\n\nआशाओं की जोत जलाके कर दो तुम उजियारा , \nएक झलक जो तुम दिखला दो दुख भी कर लें किनारा , \nतुम चाहो कुछ भी कर दोगे , किरपा से झोली भर दोगे , \nकुछ भी मांगे सेवक तुमसे तुम इच्छा पूरण कर दोगे ।\n\nजो तुम को प्रभु याद करें , सुबह शाम फरियाद करें , \nउनकी विनती तूं सुन लेता , अपने घर से सुख ही देता , \nकरता तूं रहमत उन सब पर , रखता सलामत उन सब को , \nलगता देर ना इक पल की सब मालोमाल होता है ।\n\nजिस सेवक पर हाथ हो तेरा वो सेवक कैसे डोले , \nजिसके साथ तूं हरदम रहता वो जै जैकार तेरी बोले , \nऐसा ही अकसर होता है , प्रेमी तेरे प्रेम में रोता है , \nहोता वही इस जग में जो तुझे मंजूर होता है ।"},"en":{"t":"Jo Tum Pe Bharosa Karte Hain Rab Ji","c":"Jo Tum Pe Bharosa Karte Hain Rab Ji"}},

	{"id":1770026255993,
	"pb":{"t":"ਸਤਗੁਰ ਪਿਆਰ ਦੀਆਂ ਗੱਲਾਂ","c":"ਸਤਗੁਰ ਪਿਆਰ ਦੀਆਂ ਗੱਲਾਂ ਕੋਈ ਅਣਜਾਣ ਕੀ ਜਾਣੇ ,\nਜੋ ਰਹਿਮਤ ਤੋਂ ਵਾਂਝਾ ਏ ਉਹ ਇਨਸਾਨ ਕੀ ਜਾਣੇ ॥\n\nਏਹ ਗੱਲਾਂ ਪਿਆਰ ਦੀਆਂ ਸਤਗੁਰ ਗ਼ਮਖ਼ਵਾਰ ਦੀਆਂ ,\nਅੰਮ੍ਰਿਤ ਦੀਆਂ ਘੁੱਟਾਂ ਨੇ ਹਿਰਦੇ ਨੂੰ ਠਾਰ ਦੀਆਂ ,\nਇਸ ਅੰਮ੍ਰਿਤ ਦੇ ਚਸ਼ਮੇ ਨੂੰ ਕੋਈ ਰੇਗਿਸਤਾਨ ਕੀ ਜਾਣੇ ॥\n\nਏਹ ਆਬ-ਏ-ਹਯਾਤੀ ਏ , ਏਹ ਜੀਵਨ ਜਯੋਤੀ ਏ ,\nਏਹ ਖ਼ਾਨ ਮੁਹੱਬਤਾਂ ਦੀ ਸਿਖ਼ਰਾਂ ਦੀ ਚੋਟੀ ਏ ,\nਇਸ ਦੁਨੀਆ ਦੇ ਸੂਰਜ ਨੂੰ ਕੋਈ ਢਲਦੀ ਸ਼ਾਮ ਕੀ ਜਾਣੇ ॥\n\nਏਹ ਰਹਿਮਤ ਮਾਲਿਕ ਦੀ , ਕੁਝ ਮਿਹਨਤ ਸਾਧਕ ਦੀ ,\nਏਹ ਦਾਤ ਅਮੁੱਲੀ ਏ ਮੇਰੇ ਪਿਆਰੇ ਸਤਗੁਰ ਦੀ ,\nਤੇਰੀ ਆਵਾਜ਼ ਦਾ ਆਸ਼ਿਕ ਕੋਈ ਸੁਰ ਤਾਲ ਕੀ ਜਾਣੇ ॥"},"hi":{"t":"सतगुर प्यार दीयां गल्लां","c":"सतगुर प्यार दीयां गल्लां कोई अनजान की जाणे , \nजो रहमत तों वांझा ए ओह इन्सान की जाणे ।\n\nएह गल्ला प्यार दीयां सतगुर गमखार दीयां , \nअमृत दीयां घुट्टां ने हिरदे नूं ठार दीयां , \nइस अमृत दे चश्मे नूं कोई रेगिस्तान की जाणे ।\n\nएह आब-ए-हयाती ए , एह जीवन ज्योति ए , \nएह खान मुहब्बतां दी शिखरां दी चोटी ए , \nइस दुनिया दे सूरज नूं कोई ढ़लदी शाम की जाणे ।\n\nएह रहमत मालिक दी , कुझ मेहनत साधक दी , \nएह दात अमुल्ली ए मेरे प्यारे सतगुर दी , \nतेरी आवाज़ दा आशिक कोई सुर ताल की जाणे ।"},"en":{"t":"Satguru Pyaar Diya Galla","c":"Satguru Pyaar Diya Galla"}},

	{"id":1770026490262,
	"pb":{"t":"ਗਣਪਤੀ ਬੱਪਾ ਮੋਰਿਆ","c":"ਗਣਪਤੀ ਬੱਪਾ ਮੋਰਿਆ ਮੰਗਲਮੂਰਤੀ ਮੋਰਿਆ ,\nਸਿੱਧੀ ਵਿਨਾਇਕ ਮੋਰਿਆ ਗਿਰਿਜਾ ਨੰਦਨ ਮੋਰਿਆ ॥\n\nਏਕ ਦੰਤ ਮੋਰਿਆ , ਗੌਰੀਸੁਤ ਜੈ ਮੋਰਿਆ ,\nਜੈ ਲੰਬੋਦਰ ਮੋਰਿਆ , ਅਗਰਦੇਵ ਜੈ ਮੋਰਿਆ ॥\n\nਵਿਘਨ ਵਿਨਾਸ਼ਕ ਮੋਰਿਆ , ਜੈ ਘੂਮੇਸ਼ਵਰ ਮੋਰਿਆ ,\nਗਜਾਨਨਾ ਜੈ ਮੋਰਿਆ , ਵਿਦਿਆਵਾਨ ਜੈ ਮੋਰਿਆ ॥\n\nਸੁਖਕਰਤਾ ਜੈ ਮੋਰਿਆ , ਦੁੱਖਹਰਤਾ ਜੈ ਮੋਰਿਆ ,\nਕ੍ਰਿਪਾਸਿੰਧੂ ਜੈ ਮੋਰਿਆ , ਬੁੱਧੀ ਵਿਧਾਤਾ ਮੋਰਿਆ ॥\n\nਭਵਾਨੀ ਨੰਦਨ ਮੋਰਿਆ , ਜੈ ਸ਼ਿਵ ਨੰਦਨ ਮੋਰਿਆ ,\nਜੈ ਮੋਦਕਪ੍ਰਿਯ ਮੋਰਿਆ , ਅਸ਼ਟ ਵਿਨਾਇਕ ਮੋਰਿਆ ॥"},"hi":{"t":"गणपति बप्पा मोरेया","c":"गणपति बप्पा मोरेया मंगलमूर्ति मोरेया , \nसिद्धि विनायक मोरेया गिरिजा नंदन मोरेया ।\n\nएक दन्त मोरेया , गौरीसुत जय मोरेया , \nजय लम्बोदर मोरेया , अग्रदेव जय मोरेया ।\n\nविघ्न विनाशक मोरेया , जय घूमेश्वर मोरेया , \nगजानना जय मोरेया , विधयावान जय मोरेया ।\n\nसुखकर्ता जय मोरेया , दुखहर्ता जय मोरेया , \nकृपासिंधु जय मोरेया , बुद्धि विधाता मोरेया ।\n\nभवानी नंदन मोरेया , जय शिव नंदन मोरेया , \nजय मोदकप्रिय मोरेया , अष्ट विनायक मोरेया ।"},"en":{"t":"Ganpati Bappa Moreya","c":"Ganpati Bappa Moreya"}},

	{"id":1770027284201,
	"pb":{"t":"ਕਮਲੀ ਨੂੰ ਮੌਜ ਬਹਾਰਾਂ ਨੇ","c":"ਕਈ ਜਨਮਾਂ ਤੋਂ ਭਟਕ ਰਹੀ ਸੀ , ਦੀਦ ਤੇਰੀ ਨੂੰ ਤਰਸ ਰਹੀ ਸੀ ,\nਐਸ ਜਨਮ ਵਿਚ ਮਿਲ ਗਿਆ ਮੈਨੂੰ , ਭੁੱਲੀਆਂ ਜੱਗ ਦੀਆਂ ਸਾਰਾਂ ਨੇ ,\nਸੁਣ ਕਮਲੀ ਦਿਆ ਸਾਈਆਂ ਕਮਲੀ ਨੂੰ ਮੌਜ ਬਹਾਰਾਂ ਨੇ ,\nਕਮਲੀ ਕਮਲੀ ਕਮਲੀ ਵੇ ਲੋਕੀ ਕਹਿੰਦੇ , ਕਮਲੀ ਕਮਲੀ ਕਮਲੀ ॥\n\nਬਿਨ ਤੇਰੇ ਕਿਸੇ ਬਾਤ ਨ ਪੁੱਛੀ , ਮੈਨੂੰ ਗਲ ਨਾਲ ਲਾਇਆ ਨਾ ,\nਤੂੰਹੀ ਏ ਮੇਰੇ ਦਿਲ ਦਾ ਜਾਨੀ ਜਿਸਨੇ ਲਈਆਂ ਸਾਰਾਂ ਨੇ ,\nਸੁਣ ਕਮਲੀ ਦਿਆ ਸਾਈਆਂ ...\n\nਇਸ਼ਕ ਤੇਰੇ ਵਿਚ ਕਮਲੀ ਹੋਈ ਦਰ ਦਰ ਅਲਖ ਜਗਾਂਦੀ ਰਹੀ ,\nਪੁੱਛਣ ਲਈ ਤੇਰਾ ਪਤਾ ਟਿਕਾਣਾ ਮਿੰਨਤਾਂ ਤਰਲੇ ਪਾਉਂਦੀ ਰਹੀ ,\nਸਬਨੇ ਮੈਨੂੰ ਦੂਰ ਹੀ ਦੱਸਿਆ ਸਾਰੇ ਦੁਨੀਆ ਦਾਰਾਂ ਨੇ ,\nਸੁਣ ਕਮਲੀ ਦਿਆ ਸਾਈਆਂ ...\n\nਜਿਸ ਕਰਮ ਲਈ ਜੀਉਂਦੀ ਸੀ ਮੈਂ ਮੰਜ਼ਿਲ ਆਪਣੀ ਪਾ ਲਈ ਏ ,\nਹੁਣ ਲੰਘਦੇ ਦਿਨ ਖੁਸ਼ੀਆਂ ਦੇ ਵਿਚ ਹਰ ਇਕ ਰਾਤ ਦੀਵਾਲੀ ਏ ,\nਨੂਰ ਤੇਰੇ ਦੀਆਂ ਪੈਂਦੀਆਂ ਹਰਦਮ ਚਮਕ ਚਮਕ ਚਮਕਾਰਾਂ ਨੇ ,\nਸੁਣ ਕਮਲੀ ਦਿਆ ਸਾਈਆਂ ...\n\nਤੱਕ ਤੱਕ ਤੈਨੂੰ ਰੱਜਣ ਨਾ ਅੱਖੀਆਂ ਦਿਲ ਕਰਦਾ ਵੇਖੀ ਜਾਵਾਂ ਮੈਂ ,\nਤੇਰੇ ਵਿਚੋਂ ਰੱਬ ਪਿਆ ਦਿਸਦਾ ਕਿਵੇਂ ਮੁਖੜੇ ਤੋਂ ਨਜ਼ਰਾਂ ਹਟਾਵਾਂ ਮੈਂ ,\nਚੰਦਨ ਤੋਂ ਵੱਧ ਮਹਿਕ ਹੈ ਸਜਣਾ ਹਾਸਿਆਂ ਵਿਚ ਬਹਾਰਾਂ ਨੇ ,\nਸੁਣ ਕਮਲੀ ਦਿਆ ਸਾਈਆਂ ..."},"hi":{"t":"कमली नूं मौज बहारां ने","c":"कई जनमां तों भटक रही सी , दीद तेरी नूं तरस रही सी , \nऐस जनम विच मिल गया मैनूं , भुल्लीयां जग दीयां सारां ने , \nसुण कमली देया साईयां कमली नूं मौज बहारां ने , \nकमली कमली कमली वे लोकी कैंहदे , कमली कमली कमली ।\n\nबिन तेरे किसे बात न पुछी , मैनूं गल नाल लाया ना , \nतूंही ए मेरे दिल दा जानी जिसने लईयां सारां ने , \nसुण कमली देया साईयां ...\n\nइश्क तेरे विच कमली होई दर दर अलख जगाँदी रई , \nपुछण लई तेरा पता टिकाणा मिनतां तरले पौंदी रई , \nसबने मैनूं दूर ही दस्सेया सारे दुनिया दारां ने , \nसुण कमली देया साईयां ...\n\nजेस करम लई जीउदी सी मैं मंजिल अपणी पा लई ए , \nहुण लंघदे दिन खुशियां दे विच हर इक रात दिवाली ए , \nनूर तेरे दियां पैदीयां हरदम चमक चमक चमकारां ने ,\nसुण कमली देया साईयां ...\n\nतक तक तैनूं रज्जण ना अखीयां दिल करदा देखी जावां मैं , \nतेरे विचो रब पया दिसदा किवें मुखड़े तों नजरां हटावां मैं , \nचंदन तों वध महक है सजणा हासेयां विच बहारां ने ,\nसुण कमली देया साईयां ..."},"en":{"t":"Kamli Nu Moj Bahara Ne","c":"Kamli Nu Moj Bahara Ne"}},

	{"id":1770028204620,
	"pb":{"t":"ਸੁਣ ਨੀ ਗੌਰਾ ( ਸ਼ਿਵ ਵਿਵਾਹ )","c":"ਸੁਣ ਨੀ ਗੌਰਾ ਗੌਰਾ ਨੀ ਅੜੀਏ  \nਬੁੱਢੜਾ ਤੇਰਾ ਪਰੌਹੁਣਾ ਨੀ \nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ਕਾਰਜ ਰਚਾਉਣਾ ਨੀ ॥\n\nਸ਼ਕਲ ਐਵੇਂ ਜਿਵੇਂ ਮੱਸਿਆ ਹੋਵੇ , ਵੇਖਕੇ ਸਾਡਾ ਦਿਲ ਪਿਆ ਰੋਵੇ ,\nਕੰਨਾਂ ਦੇ ਵਿਚ ਕੁੰਡ ਲਟਕਾਏ , ਗਲ ਦੇ ਵਿਚ ਫ਼ਨੀਅਰ ਪਾਏ ,\nਗਿੱਠਾ ਵੀ ਨਹੀਂਓਂ ਉੱਚਾ ਵੀ ਨਹੀਂਓਂ ਨਾ ਉਹ ਲਗਦਾ ਬੌਣਾ ਨੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ...\n\nਘੋੜੀ ਦੀ ਥਾਂ ਬੈਲ ਲਿਆਇਆ ਵਾਜੇ ਦੀ ਥਾਂ ਸ਼ੰਖ ਬਜਾਇਆ ,\nਲੂਲ੍ਹੇ ਲੰਗੜੇ ਆਏ ਬਰਾਤੀ ਵੇਖ ਤਾਂ ਸਹੀ ਜ਼ਰਾ ਪਾ ਕੇ ਝਾਤੀ ,\nਪਿਓ ਤੇਰੇ ਦੀ ਪੱਗ ਦਾ ਅੜੀਏ , ਦਾਗ਼ ਕਿਸੇ ਨਹੀਂ ਧੋਣਾ ਨੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ...\n\nਦਾੜ੍ਹੀ ਦੀ ਥਾਂ ਦਾੜਾ ਜਾਪੇ ਬਾਲ ਨਹੀਂ ਉਜਾੜਾ ਜਾਪੇ ,\nਜੰਜੂ ਦੀ ਥਾਂ ਖਲਸੂ ਪਾਏ ਉੱਠਦਾ ਬਹਿੰਦਾ ਲੱਗੇ ਸ਼ੁਦਾਈ ,\nਡਰ ਗਈਆਂ ਅਸੀਂ ਵੇਖਕੇ ਉਸਨੂੰ ਐਸਾ ਰੂਪ ਡਰਾਉਣਾ ਨੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ...\n\nਸੁਣਿਆ ਨੀ ਕੁਝ ਗੜਬੜ ਹੋਈ ਲਾਹ ਲਈ ਉਹਨਾ ਸ਼ਰਮ ਦੀ ਲੋਈ ,\nਜੰਝ ਦੇ ਵਿਚ ਦੋ ਆਏ ਨਿਆਣੇ ਖਾ ਗਏ ਭੈੜੇ ਸਾਰੇ ਖਾਣੇ ,\nਵੇਖਕੇ ਤੇਰੀ ਜੰਝ ਗੌਰੰਜਾ ਭੁੱਲ ਗਿਆ ਹੱਸਣਾ ਤੇ ਰੋਣਾ ਨੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ...\n\nਇਸ ਬੁੱਢੇ ਨੂੰ ਜੀਜਾ ਕਹੀਏ ਕਿਸਮਤ ਦਾ ਨਤੀਜਾ ਕਹੀਏ ,\nਕੀ ਕਹੀਏ ਸਾਨੂੰ ਸਮਝ ਨਾ ਆਵੇ ਸਮਝ ਆਏ ਤਾਂ ਜੀ ਘਬਰਾਏ ,\nਏਸ ਸੋਹਣੀ ਤਸਵੀਰ ਨੂੰ ਅੜੀਏ ਕੇਹੜੀ ਕੰਧ ਨਾਲ ਲਾਉਣਾ ਜੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ...\n\nਵਾਹ ਵਾਹ ਨੀ ਤੇਰਾ ਘਰਵਾਲਾ ਬਾਬਾ ਤੇਰਾ ਸੱਪਾਂ ਵਾਲਾ ,\nਐਸਾ ਰੂਪ ਵਟਾਇਆ ਸੋਹਣਾ ਨੂਰ ਨਾ ਉਸਦਾ ਝੱਲਿਆ ਜਾਏ ,\nਕਮਲੀ ਗੌਰਾ ਤੂੰ ਕਲੀਆਂ ਵਰਗੀ ਉਹ ਤੇਰੇ ਤੋਂ ਸੋਹਣਾ ਨੀ ॥\nਜੀਹਦੇ ਨਾਲ ਤੇਰਾ ..."},"hi":{"t":"सुण नी गौरां ( शिव विवाह )","c":"सुण नी गौरां गौरां नी अड़ीये \nबुढड़ा तेरा परौहणा नी \nजीहदे नाल तेरा कारज रचौणा नी ।\n\nशकल ऐवें जिवें मस्सेया होवे , वेखके साडा दिल पेया रोवे ,\nकन्नां दे विच कुंड लटकाये , गल दे विच फनियर पाये , \nगिठा वी नहीयों उच्चा वी नहीयों ना ओह लगदा बौणा नी ।\nजीहदे नाल तेरा ...\n\nघोड़ी दी थां बैल लिआया वाजे दी थां शंख बजाया , \nलूले लंगड़े आये बराती वैख तां सही जरां पा के झाती , \nपियो तेरे दी पग्ग दा अड़ीये , दाग किसे नही धोणा नी ।\nजीहदे नाल तेरा ...\n\nदाड़ी दी थां दाड़ा जापे बाल नहीं उजाड़ा जापे ,\nजंजू दी थां खलसु पाये उठदा बैंहदा लगे शुदाई ,\nडर गईयां असीं वेखके उसनूं ऐसा रूप डरौणा नी ।\nजीहदे नाल तेरा ...\n\nसुणेया नी कुझ गड़बड़ होई लाह लई ओहना शर्म दी लोई , \nजंज दे विच दो आये नियाणे खा गये भैड़े सारे खाणे ,\nवेखके तेरी जंज गौरंजा भुल गया हसणा ते रौणा नी ।\nजीहदे नाल तेरा ...\n\nइस बुढ़े नूं जीजा कहीये किस्मत दा नतीजा कहीये \nकी कहीये सानूं समझ ना आवे समझ आये तां जी घबराये , \nएस सोहणी तस्वीर नूं अड़ीये केहड़ी कंघ नाल लौणा जी ।\nजीहदे नाल तेरा ...\n\nवाह वाह नी तेरा घरवाला बाबा तेरा सप्पां वाला \nऐसा रूप वटाया सोहणा नूर ना उसदा झल्लेया जाये \nकमली गौरां तूं कलीयां वरगी ओह तेरे तों सोहणा नी ।\nजीहदे नाल तेरा ..."},"en":{"t":"Sun Ni Gora ( Shiv Vivah )","c":"Sun Ni Gora ( Shiv Vivah )"}},

	{"id":1770028697860,
	"pb":{"t":"ਮੁਝਕੋ ਮਨ ਕੀ ਸ਼ਕਤੀ ਦੇਨਾ ( ਪ੍ਰਾਰਥਨਾ ਦਰਸ਼ਨ )","c":"ਮੁਝਕੋ ਮਨ ਕੀ ਸ਼ਕਤੀ ਦੇਨਾ , ਧਰਮ ਪਥ ਪੇ ਚਲ ਸਕੂੰ ,\nਸਤਯ ਮਾਰਗ ਗਿਆਨ ਬੁੱਧੀ , ਭਕਤੀ ਚੇਤਨ ਕਰ ਸਕੂੰ ॥\n\nਗੋਪਾਲ ਗੋਬਿੰਦ ਦੀਨ ਬੰਧੂ , ਨਾਰਾਇਣ ਨਰਪਤੀ ,\nਦੇਵ ਦਾਨਵ ਰਚਨ ਕਰਤਾ , ਦਿਆਲ ਬੰਧੂ ਪ੍ਰਾਣਪਤੀ ॥\n\nਸਵਾਸ ਸੁਮਿਰਨ ਸੁਰਤ ਚੇਤਨ , ਹਿਰਦੇ ਤੇਰਾ ਵਾਸ ਹੋ ,\nਨਾਭੀ ਸੇ ਕਮਲਾਪਤੀ ਹੋ , ਅਨਹਤਾ ਕਾ ਨਾਦ ਹੋ ॥\n\nਵਿਸ਼ੁੱਧਾ ਆਗਿਆ ਸਹਸਰਾਰ ਔਰ ਕੁੰਡਲਿਨੀ ਕੇ ਯੋਗ ਸੇ ,\nਸਵਾਧਿਸਠਾਨ ਸੇ ਓਮ ਤਕ , ਓਂਕਾਰ ਮੰਡਲ ਯੋਗ ਹੋ ॥\n\nਜਬ ਭੀ ਬਾਧਾ ਆਏ ਮੁਝ ਪਰ , ਮਾਰਗ ਦਰਸ਼ਨ ਤੁਮ ਕਰੋ ,\nਮੇਰੀ ਤ੍ਰੁਟੀਆਂ ਮਾਫ਼ ਕਰਕੇ , ਕਸ਼ਟ ਕਾ ਖੰਡਨ ਕਰੋ ॥\n\nਸਤਯ ਹਿਰਦੇ ਸੇ ਮੈਂ ਤੁਝਸੇ , ਤੁਝਕੋ ਹੀ ਮੈਂ ਮਾਂਗਤਾ ,\nਔਰ ਕੁਛ ਨ ਮੈਂ ਚਾਹੂੰ ਬਸ , ਇਤਨਾ ਵਰ ਹੀ ਮਾਂਗਤਾ ॥"},"hi":{"t":"मुझको मन की शक्ति देना ( प्रार्थना दर्शन )","c":"मुझको मन की शक्ति देना , धर्म पथ पे चल सकूँ , \nसत्य मार्ग ज्ञान बुद्धि , भक्ति चेतन कर सकूँ ।\n\nगोपाल गोबिन्द दीन बन्धु , नारायण नरपति , \nदेव दानव रचन कर्ता , दयाल बन्धु प्राणपति ।\n\nस्वास सुमिरन सुर्त चेतन , हृदय तेरा वास हो , \nनाभि से कमलापति हो , अनहता का नाद हो ।\n\nविशुद्धा अजना सहस्रा और कुंडलिनी के योग से , \nस्वाधिस्तान से ओम् तक , ओंकार मण्डल योग हो ।\n\nजब भी बाधा आये मुझ पर , मार्ग दर्शन तुम करो , \nमेरी त्रुटियां माफ करके , कष्ट का खंडन करो ।\n\nसत्य हृदय से मैं तुझसे , तुझको ही मैं मांगता , \nऔर कुछ न मैं चाहूँ बस , इतना वर ही मांगता ।"},"en":{"t":"Mujhko Man Ki Shakti Dena ( Prathna Darshan )","c":"Mujhko Man Ki Shakti Dena ( Prathna Darshan )"}},

	{"id":1770029022970,
	"pb":{"t":"ਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ","c":"ਤੂੰ ਸੁਖ ਦੇ ਯਾ ਦੁਖ ਦੇ ਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ ,\nਲਾਗੇ ਰੇ , ਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ ॥\n\nਕੋਈ ਨ ਮੇਰਾ ਤੇਰੇ ਸਿਵਾ ਹੁਣ , ਐਹੋ ਗੱਲ ਹੁਣ ਦਿਲ ਸਮਝਾਈ ,\nਜਦ ਵੀ ਤੈਨੂੰ ਯਾਦ ਕਰਾਂ ਮੈਂ ਨਾਦ ਦੀ ਅਨਹਦ ਧੁਨੀ ਸੁਣਾਈ ,\nਹੁਣ ਮੈਂ ਦਾਤਾ ਤੇਰਾ ਬਣਿਆ , ਦੁਖ ਰੋਗ ਸਭ ਭਾਗੇ ,\nਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ ...\n\nਜੇ ਤੂੰ ਨਦਰ ਕਰੇਂ ਮੇਰੇ ਸਾਹਿਬਾ , ਮਨਮੁਖ ਸੰਗਤ ਗੁਰਮੁਖ ਹੋਈ ,\nਕਾਇਆ ਕਲਪ ਕਰੇ ਤੇਰੀ ਬਾਣੀ ਕਾਗੋ ਹੰਸ ਵੀ ਹੋਈ ,\nਜੋ ਜੋ ਤੇਰੀ ਸ਼ਰਨ ਚ ਜੁੜਿਆ , ਸੁੱਤੇ ਭਾਵ ਵੀ ਜਾਗੇ ,\nਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ ...\n\nਸੁੰਦਰ ਬਾਣੀ ਸੁੰਦਰ ਚੋਲਾ , ਸੁੰਦਰ ਰੂਪ ਤੁਮ੍ਹਾਰਾ ,\nਸੁੰਦਰ ਕਲਾ ਵਰਤਾਵੇਂ ਸਭਤੇ , ਧੰਨ ਧੰਨ ਭਾਗ ਹਮਾਰਾ ,\nਸਦਕੇ ਤੇਰੀ ਰਹਿਮਤ ਦਾਤਾ ਗੂੰਗੇ ਬੋਲਣ ਲਾਗੇ ,\nਤੇਰਾ ਭਾਣਾ ਮੀਠਾ ਲਾਗੇ ..."},"hi":{"t":"तेरा भाणा मीठा लागे","c":"तू सुख दे या दुख दे तेरा भाणा मीठा लागे , \nलागे रे , तेरा भाणा मीठा लागे ।\n\nकोई न मेरा तेरे सिवा हुण , ऐहो गल हुण दिल समझाई , \nजद वी तैनू याद करां मैं नाद दी अनहद धुनी सुणाई , \nहुण मैं दाता तेरा बणेया , दुख रोग सभ भागे ,\nतेरा भाणा ...\n\nजे तूं नदर करें मेरे साहिबा , मनमुख संगत गुरमुख होई , \nकाया कलप करे तेरी बाणी कागो हंस वी होई , \nजो जो तेरी शरण च जुड़ेया , सुत्ते भाव वी जागे ,\nतेरा भाणा ...\n\nसुंदर बाणी सुंदर चोला , सुंदर रूप तुम्हारा , \nसुंदर कला वरतावें सभते , धंन धंन भाग हमारा , \nसदके तेरी रहमत दाता गूंगे बोलण लागे ,\nतेरा भाणा ..."},"en":{"t":"Tera Bhana Meetha Laage","c":"Tera Bhana Meetha Laage"}},

	{"id":1770029689028,
	"pb":{"t":"ਤੇਰੇ ਹੱਥਾਂ ਦਾ ਖਿਡੌਣਾ ਹਾਂ ਮੈਂ ਦਾਤਿਆ","c":"ਤੇਰੇ ਹੱਥਾਂ ਦਾ ਖਿਡੌਣਾ ਹਾਂ ਮੈਂ ਦਾਤਿਆ , ਜਿਵੇਂ ਮਰਜ਼ੀ ਤੂੰ ਮੈਨੂੰ ਨਚਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ਏ , ਭਾਵੇਂ ਕੱਟਦੇ ਜਾਂ ਅੰਬਰੀਂ ਉਡਾਈ ਜਾ \n\nਜਦ ਤੱਕ ਮੇਰਾ ਦਿਲ ਏ ਧੜਕਦਾ , ਜੋੜੀ ਰੱਖਾਂ ਤੇਰੇ ਨਾਲ ਤਾਰਾਂ ਮੈਂ \nਭੁੱਲਾਂ ਵਿਚ ਭੁੱਲ ਮੈਥੋਂ ਹੋ ਜਾਵੇ ਮਾਫ਼ ਕਰੀਂ , ਏਹੋ ਦਾਤਾ ਅਰਜ਼ ਗੁਜ਼ਾਰਾਂ ਮੈਂ \nਹੈ ਬੱਚੜਾ ਭੀ ਤੇਰੇ ਹੀ ਭਰੋਸੇ ਤੇ , ਮੀਂਹ ਰਹਿਮਤਾਂ ਦਾ ਦਾਤਾ ਬਰਸਾਈ ਜਾ \nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਮੇਹਰਾਂ ਨਾਲ ਤੇਰੀਆਂ ਹੀ ਜ਼ਿੰਦਗੀ ਮਿਲੀ ਹੈ , ਦਾਤਾ ਮਿਲੀਆਂ ਨੇ ਸਾਹਵਾਂ ਏਹ ਉਧਾਰੀਆਂ\nਤੇਰੇ ਹੀ ਭਰੋਸੇ ਮੈਂ ਤਾਂ ਤੇਰੇ ਦਿੱਤੇ ਖੰਭਾਂ ਨਾਲ , ਮਾਰਦਾ ਹਾਂ ਲੰਬੀ ਉਡਾਰੀਆਂ\nਮੈਂ ਤਾਂ ਤੇਰੀ ਹੀ ਰਜ਼ਾ ਦੇ ਵਿਚ ਰਾਜ਼ੀ ਹਾਂ , ਅੱਖੀਂ ਹੰਝੂ ਦੇ ਜਾਂ ਮੈਨੂੰ ਤੂੰ ਹਸਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਜ਼ਿੰਦਗੀ ਦੀ ਰਾਹਾਂ ਵਿਚ ਠੋਕਰ ਮੈਂ ਖਾਵਾਂ ਜਦ ਡਿੱਗਦੇ ਨੂੰ ਆਪੇ ਲਈਂ ਸੰਭਾਲ ਤੂੰ \nਚੰਗਾ ਮਾੜਾ ਜੈਸਾ ਭੀ ਹਾਂ ਦਾਸ ਹਾਂ ਮੈਂ ਤੇਰਾ ਜੀ ਆਪੇ ਮੇਰਾ ਰੱਖ ਲਈਂ ਖ਼ਿਆਲ ਤੂੰ\nਏਹੋ ਅਰਜ਼ ਹੈ ਦਾਤਾ ਤੇਰੇ ਦਾਸ ਦੀ ਬਾਂਹੋਂ ਫੜ ਮੈਨੂੰ ਸਿੱਧੇ ਰਾਹੇ ਪਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਮੇਰੇ ਕੀਤੇ ਹੋਣਾ ਕੀ ਏ ਕਰਦਾ ਹੈ ਸਭ ਤੂੰ , ਮਿਲ ਜਾਂਦਾ ਮੈਨੂੰ ਯਸ਼ ਮਾਨ ਏ \nਮੈਂ ਤਾਂ ਸੇਵਾਦਾਰ ਤੇਰੇ ਦਰ ਦਾ ਭਿਖਾਰੀ ਹਾਂ , ਜੱਗ ਵਿਚ ਏਹੋ ਪਛਾਣ ਏ\nਪਾ ਕੇ ਮੇਰੇ ਗੁਨਾਹਾਂ ਉੱਤੇ ਪਰਦਾ ਮੇਰੇ ਐਬਾਂ ਨੂੰ ਤੂੰ ਦਾਤਿਆ ਲੁਕਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਦੇਖ ਨਾ ਲੇਖ ਮੱਥੇ ਦੇ ਮੇਰੇ , ਕਰਮਾਂ ਤੇ ਨਾ ਜਾਵੀਂ\nਰੱਖੀਂ ਲਾਜ ਬਿਰਦ ਦੀ ਸਤਿਗੁਰ , ਆਪਣੀ ਭਗਤੀ ਲਾਵੀਂ\nਬਾਂਹ ਫੜ ਲੋ ਗੁਰੂ ਜੀ ਮੇਰੀ , ਮੈਨੂੰ ਆਪਣਾ ਨਾਮ ਜਪਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਪਾਪੀਆਂ ਨੂੰ ਤੂੰ ਏ ਦਾਤਾ ਪਾਰ ਲੰਘਾਵਦਾ , ਬਖ਼ਸ਼ਣਹਾਰ ਤੇਰਾ ਨਾਉਂ\nਬਿਨ ਮੰਗਿਆ ਤੂੰ ਸਭ ਕੁਝ ਦੇਵਦਾ , ਠਾਕੁਰ ਅਗਮ ਅਗਾਉਂ\nਤੂੰ ਤਾਂ ਕਰਮ ਤੇ ਕਰਮ ਕਮਾਵਦਾ , ਮੇਰੇ ਉੱਤੇ ਵੀ ਤੂੰ ਕਰਮ ਕਮਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਜੇ ਮੈਂ ਵੇਖਾਂ ਅਮਲਾਂ ਵੱਲੇ ਕੋਈ ਨਾ ਮੇਰੀ ਥਾਉਂ \nਜੇਤੇ ਰੋਮ ਸ਼ਰੀਰ ਦੇ ਮੇਰੇ ਉਸਤੋਂ ਵੱਧ ਗੁਨਾਹੋਂ \nਕਰੋ ਕਿਰਪਾ ਏ ਮੇਰੇ ਹਜ਼ੂਰ ਜੀ , ਮੇਰੀ ਡੁੱਬਦੀ ਬੇੜੀ ਨੂੰ ਬੰਨੇ ਲਾਈ ਜਾ \nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ...\n\nਤੈਂ ਜਿਹਾ ਮੈਨੂੰ ਹੋਰ ਨਾ ਕੋਈ ਮੈਂ ਜਹੇ ਲੱਖ ਤੈਨੂੰ\nਜੇ ਮੇਰੇ ਵਿਚ ਐਬ ਨਾ ਹੁੰਦੇ , ਤੂੰ ਬਖ਼ਸ਼ਾਉਂਦਾ ਕੇਹਨੂੰ\nਮੇਰੀ ਅਰਜ਼ ਹੈ ਤੇਰੇ ਅੱਗੇ ਦਾਤਿਆ , ਮੈਨੂੰ ਚਰਨਾਂ ਚ ਆਪਣੇ ਬੁਲਾਈ ਜਾ\nਮੈਂ ਪਤੰਗ ਦਾਤਾ ਤੇਰੇ ਹੱਥ ਡੋਰ ..."},"hi":{"t":"तेरे हथां दा खिलोना हां मैं दातया","c":"तेरे हथां दा खिलोना हां मैं दातया , जिवें मर्जी तूं मैनू नचाई जा \nमैं पतंग दाता तेरे हाथ डोर ए , भावें कटदे जां अंबरीं उडाई जा\n\nजद तक मेरा दिल ए धड़कदा , जोड़ी रखां तेरे नाल तारां मैं \nभुला विच भूल मेतों हो जावे माफ करी , एहो दाता अर्ज गुजारा मैं\nहै बचड़ा भी तेरे ही भरोसे ते , मींह रहमता दा दाता बरसाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nमेहरा नाल तेरियां ही जिंदगी मिली है , दाता मिलिया ने साहवां एह उधारीआं \nतेरे ही भरोसे मैं ता तेरे दिते खम्भां नाल , मारदा हां लंबी उडारीआं \nमैं तां तेरी ही रजा दे विच राज़ी हां , अखीं हंझू दे जा मैंनू तु हंसाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nजिंदगी दी राहां विच ठोकर में खांवा जद डिगदे नू आपे लई संभाल तूं \nचंगा माडा जैसा भी हां दास हां मैं तेरा जी आपे मेरा रख लई ख्याल तू \nएहो अर्ज है दाता तेरे दास जी बांहु फड़ मैनू सिधे राहे पाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nमेरे कीते होणा की ए करदा है सब तूं , मिल जांदा मैनू यश मान ए \nमैं ता सेवादार तेरे दर दा भिखारी हां , जग विच एहो पहचान हां ए \nपाके मेरे गुणाहा उते पर्दा मेरे ऐबा नूं तू दातेया लुकाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nदेख ना लेख मथे दे मेरे , करमा ते ना जावीं \nरखीं लाज बिरद दी सतगुर , अपनी भगती लावीं \nबांह फड लो गुरु जी मेरी , मैनू अपना नाम जपाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nपापीयां नू तू ए दाता पार लंघावदा , बखषनहार तेरा नाउ , \nबिन मंगया तूं सब कुछ देवदा , ठाकुर अगम अगाउं \nतूं ता कर्म ते कर्म कमावदा , मेरे उते वी तू कर्म कमाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nजे मैं वेखां अमला वले कोई ना मेरी थाउं \nजेते रोम शरीर दे मेरे उसतों वध गुनाहों \nकरो किरपा ए मेरे हजूर जी , मेरी डुबदी बेड़ी नू बने लाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा\n\nतैं जिहा मैनू होर ना कोई मैं जहे लख तैनू \nजे मेरे विच ऐब ना हूंदे , तूं बखषौँदा केहनू \nमेरी अरज है तेरे अग्गे दातेया , मैनू चरना च अपने बुलाई जा \nमैं पतंग दाता तेरे हथ डोर है , भावे कटदे जा अंबरी उड़ाई जा"},"en":{"t":"Tere Hatha Da Khilona Ha Mein Dateya","c":"Tere Hatha Da Khilona Ha Mein Dateya"}},

	"pb":{"t":"ਬਮ ਭੋਲੇ ਬਮ","c":"ਯਹੀ ਵੋ ਮੰਤ੍ਰ ਹੈ , ਯਹੀ ਵੋ ਤੰਤ੍ਰ ਹੈ ,\nਪ੍ਰੇਮ ਸੇ ਜਪੋਗੇ ਤੋ ਮਿਟੇਂਗੇ ਸਾਰੇ ਗ਼ਮ ,\nਬਮ ਭੋਲੇ ਬਮ ...\n\nਨਮਾਮੀ ਸ਼ਮੀਸ਼ਾਨ ਨਿਰਵਾਣ ਰੂਪੰ , \nਵਿਭੁੰ ਵਿਆਪਕੰ ਬ੍ਰਹਮ ਵੇਦੰ ਸਵਰੂਪੰ ॥\nਨਿਰਾਕਾਰ ਓਂਕਾਰ ਮੂਲੰ ਤੁਰੀਯੰ , \nਗਿਰਾ ਗਿਆਨ ਗੋਤੀਤ ਮੀਸ਼ੰ ਗਿਰੀਸ਼ੰ ॥\nਕਰਾਾਲੰ ਮਹਾਕਾਲ ਕਾਲੰ ਕ੍ਰਿਪਾਲੰ , \nਗੁਣਾਗਾਰ ਸੰਸਾਰ ਪਾਰੰ ਨਤਾਹੰ ॥\nਮਹਾਦੇਵ ਸਾਥ ਹੋ ਸਰ ਪੇ ਹਾਥ ਹੋ ,\nਪ੍ਰੇਮ ਸੇ ਜਪੋਗੇ ਤੋ ਮਿਟੇਂਗੇ ਸਾਰੇ ਗ਼ਮ ,\nਬਮ ਭੋਲੇ ਬਮ ...\n\nਕਭੀ ਯੋਗੀ ਕਭੀ ਭੋਗੀ ਕਭੀ ਬਾਲ ਬ੍ਰਹਮਚਾਰੀ ,\nਕਭੀ ਆਦਿਦੇਵ ਮਹਾਦੇਵ ਤ੍ਰਿਪੁਰਾਰੀ ,\nਕਭੀ ਸ਼ੰਕਰ ਕਭੀ ਸ਼ੰਭੂ ਕਭੀ ਭੋਲੇ ਭੰਡਾਰੀ ,\nਨਾਮ ਹੈਂ ਬੇਅੰਤ ਤੇਰੇ ਜੱਗ ਬਲਿਹਾਰੀ ,\nਸ਼ਿਵ ਕਾ ਨਾਮ ਹੋ , ਸੁਬਹ ਸ਼ਾਮ ਹੋ ,\nਗਾਤੇ ਰਹੋ ਜਬ ਤਕ ਦਮ ਮੇਂ ਹੈ ਦਮ ,\nਬਮ ਭੋਲੇ ਬਮ ...\n\nਦਕਸ਼ ਪ੍ਰਜਾਪਤੀ ਜਬ ਅਹੰਕਾਰਾ , ਤ੍ਰਿਸ਼ੂਲ ਸੇ ਸ਼ੀਸ਼ ਉਤਾਰਾ ,\nਮਾਫ਼ੀ ਮਾਂਗੀ ਹੋਸ਼ ਮੇਂ ਆਯੋ , ਬਕਰੇ ਕਾ ਤਬ ਸ਼ੀਸ਼ ਲਗਾਯੋ ,\nਆਸ਼ੂਤੋਸ਼ ਭੋਲੇ ਬਾਬਾ ਭਏ ਪ੍ਰਸੰਨ ,\nਬਕਰੇ ਨੇ ਮੁਖ ਸੇ ਜੋ ਬੋਲੀ ਬਮ ਬਮ ,\nਬਮ ਭੋਲੇ ਬਮ ...\n\nਖੇਲ ਰਹੀ ਹੈ ਜਟਾ ਪੇ ਗੰਗਾ , ਬਾਜੇ ਡਮਰੂ ਪੀਕਰ ਭੰਗਾ ,\nਬੱਬਰ ਖ਼ਾਲ ਬਾਗ਼ੰਬਰ ਅੰਗਾ , ਮੇਰਾ ਜੋਗੀ ਮਸਤ ਮਲੰਗਾ ,\nਸ਼ਿਵ ਕਾ ਨਾਮ ਲੋ ਸੁਬਹ ਸ਼ਾਮ ਲੋ ,\nਗਾਤੇ ਰਹੋ ਜਬ ਤਕ ਦਮ ਮੇਂ ਹੈ ਦਮ ,\nਬਮ ਭੋਲੇ ਬਮ ..."},"hi":{"t":"बम भोले बम","c":"यही वो मन्त्र है , यही वो तन्त्र है , \nप्रेम से जपोगे तो मिटेंगे सारे गम , \nबम भोले बम भोले बम भोले बम ...\n\nनमामी शमिशान निर्वाण रूपम् , \nविभुम व्यापकम ब्रह्म वेदम् स्वरूपम् ।। \nनिराकार ओंकार मूलम् तूरंयियम् \nगिराज्ञान गौतीत मीशम गिरीशम् ।। \nकरालम् महाकाल कालम कृपालम \nगुंणागार संसार पारम नताहम् ।। \nमहादेव साथ हों सर पे हाथ हो , \nप्रेम से जपोगे तो मिटेंगे सारे गम ,\nबम भोले बम ...\n\nकभी योगी कभी भोगी कभी बाल ब्रह्मचारी , \nकभी आदिदेव महादेव त्रिपुरारी , \nकभी शंकर कभी शम्भू कभी भोले भण्डारी , \nनाम है बेअंत तेरे जग बलिहारी , \nशिव का नाम हो , सुबह शाम हो , \nगाते रहो जब तक दम में है दम ,\nबम भोले बम ...\n\nदक्ष प्रजापत्ति जब अहंकारा , त्रिशूल से शीश उत्तारा , \nमाफी मांगी होश में आयो , बकरे का तब शीश लगायो , \nआशुतोष बोले बाबा भये प्रसन्न , \nबकरे ने मुख से जो बोली बम बम \nबम भोले बम ...\n\nखेल रही है जटा पे गंगा , बाजे डमरू पीकर भंगा , \nबबर खाल बागम्बर अंगा , मेरा जोगी मस्त मलंगा , \nशिव का नाम लो सुबह शाम लो \nगाते रहो जब तक दम मे है दम \nबम भोले बम ..."},"e 	{"id":1770033715345,
	"pb":{"t":"ਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ","c":"ਪ੍ਰੀਤ ਗੁਰੂ ਨਾਲ ਪਾ ਲੈ ਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ \nਆਪਣੀ ਭੁੱਲ ਬਖ਼ਸ਼ਾ ਲੈ ਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ...\n\nਜਾਣਾ ਪੈਣਾ ਦੁਨੀਆ ਚੋਂ , ਤੈਨੂੰ ਕੱਲਮ-ਕੱਲਾ \nਕੋਈ ਨਹੀਂ ਹੋਣਾ ਨਾਲ, ਜਿਹਨੇ ਫੜ ਲੈਣਾ ਪੱਲਾ \nਸਾਥੀ ਗੁਰੂ ਬਣਾ ਲੈ \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ...\n\nਜਿਹਨਾਂ ਜਿਹਨਾਂ ਨੇ ਡੋਰਾਂ , ਆਪਣੇ ਗੁਰਾਂ ਤੇ ਸੁੱਟੀਆਂ \nਜੀਵਨ ਦੇ ਵਿਚ ਫੇਰ , ਉਹਨਾਂ ਨੇ ਮੌਜਾਂ ਲੁੱਟੀਆਂ \nਆਪਣੀ ਮੌਜ ਬਣਾ ਲੈ  \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ...\n\nਗੁਰੂ ਦੇਣਗੇ ਨਾਮ , ਜਪਣ ਨੂੰ ਪ੍ਰਭ ਅਵਿਨਾਸ਼ੀ \nਆਉਣਾ ਜਾਣਾ ਮੁੱਕ ਜਾਊ , ਜਮਾਂ ਤੋਂ ਹੋਊ ਖ਼ਲਾਸੀ \nਸੱਚੇ ਦਿਲ ਨਾਲ ਧਿਆ ਲੈ \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ...\n\nਨਾਮ ਸਹਾਈ ਹੋਇਆ , ਤੰਦੂਏ ਦੀ ਤੰਦ ਕੱਟੀ \nਦੁੱਖ ਮੁਸੀਬਤ ਵਾਲੀ , ਪੋਚੀ ਜਾਣੀ ਫੱਟੀ \nਆਲਸ ਮਨੋਂ ਭਜਾ ਲੈ \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ...\n\nਆਪਣੇ ਅੰਦਰ ਸੁਣ ਲੈ , ਵੱਜਦੇ ਨੇ ਧੁਨਕਾਰੇ \nਗੁਰੂ ਦਿਖਾਵੇ ਰਸਤਾ , ਦੇਖ ਲੈ ਰੰਗ ਨਿਆਰੇ \nਅੰਦਰ ਜੋਤ ਜਗਾ ਲੈ \nਤੇਰਾ ਫ਼ਾਇਦਾ ਹੋ ਜੂ ..."},"hi":{"t":"तेरा फैदा हो जू","c":"प्रीत गुरू नाल पा लै तेरा फैदा हो जू \nअपनी भुल बखशा लै तेरा फेदा हो जू\nतेरा फैदा हो जू ...\n\nजाणा पौणा दुनीयां चों , तैनूं कल्लम कल्ला \nकोई नहीं होणा नाल , जिहने फड़ लैणा पल्ला \nसाथी गुरू बना लै \nतेरा फैदा हो जू ...\n\nजिहना जिहना ने डोरां , अपने गुरां ते सुट्टीयां \nजीवन दे विच फेर , उहना ने मौजां लुट्टीयां \nअपनी मौज बना लै \nतेरा फैदा हो जू ...\n\nगुरू देणगे नाम , जपण नू प्रभ अविनासी \nऔणा जाणा मुक जाउ , जमां तों होऊ खलासी \nसच्चे दिल नाल धया लै \nतेरा फैदा हो जू ...\n\nनाम सहाई होया , तंदुए दी तंद कट्टी \nदुख मुसीबत वाली , पोची जाणी फट्टी \nआलस मनो भजा लै \nतेरा फैदा हो जू ...\n\nअपने अंदर सुण लै , वजदे ने धुनकारे \nगुरू दिखावे रसता , देख लै रंग नयारे \nअंदर जोत जगा लै \nतेरा फैदा हो जू ..."},"en":{"t":"Tera Faida Ho Ju","c":"Tera Faida Ho Ju"}},

	{"id":1770034025192,
	"pb":{"t":"ਜੇ ਤੂੰ ਨਾ ਫੜਦਾ ਸਾਡੀ ਬਾਂਹ","c":"ਜੇ ਤੂੰ ਨਾ ਫੜਦਾ ਸਾਡੀ ਬਾਂਹ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ \nਸਾਨੂੰ ਕਿਤੇ ਨਾ ਮਿਲਦੀ ਥਾਂ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ \n\nਮੇਰੀ ਬਲਦੀ ਤਪਦੀ ਇਹ ਜਿੰਦਗਾਨੀ ਹੋਣੀ ਸੀ \nਮੇਰੇ ਜੀਵਨ ਦੀ ਕੁਝ ਹੋਰ ਕਹਾਣੀ ਹੋਣੀ ਸੀ \nਜੇ ਤੂੰ ਨਾ ਕਰਦਾ ਮੇਹਰਾਂ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ \n\nਚਾਹੇ ਲੱਖਾਂ ਹੋਣ ਜ਼ੁਬਾਨਾਂ ਮੈਂ ਗੁਣ ਨਹੀਂ ਗਾ ਸਕਦੀ \nਮੇਰੇ ਦਾਤਾ ਤੇਰਾ ਕਰਜ਼ ਅਦਾ ਨਹੀਂ ਕਰ ਸਕਦੀ \nਜੇ ਤੂੰ ਨਾ ਦਿੰਦਾ ਠੰਢੀ ਛਾਂ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ \n\nਕਈ ਜਨਮਾਂ ਤੋਂ ਅਸੀਂ ਭਟਕੇ , ਨਾ ਰਸਤਾ ਮਿਲਿਆ ਸੀ \nਹੋਈ ਕਿਰਪਾ ਮੇਰੀ ਜ਼ਿੰਦਗੀ ਦਾ , ਫੁੱਲ ਖਿੜਿਆ ਸੀ \nਜੇ ਤੂੰ ਨਾ ਦਿੰਦਾ ਠੰਢੀ ਛਾਂ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ \n\nਤੂੰ ਮੇਰਾ ਹੈਂ ਮੈਂ ਤੇਰਾ ਇਹ ਰਿਸ਼ਤਾ ਟੁੱਟੇ ਨਾ \nਭਾਵੇਂ ਛੁੱਟ ਜਾਏ ਜੱਗ ਸਾਰਾ , ਤੇਰਾ ਦਰ ਛੁੱਟੇ ਨਾ \nਤੇਰੇ ਦਰ ਤੇ ਨਾ ਮਿਲਦੀ ਥਾਂ , ਅਸਾਂ ਰੁਲ ਜਾਣਾ ਸੀ "},"hi":{"t":"जे तूं ना फड़दा साडी बांह","c":"जे तूं ना फड़दा साडी बांह , असां रूल जांणा सी \nसानू किते ना मिलदी था , असां रूल जाणा सी\n\nमेरी बलदी तपदी ण्ह जिंदगानी होणी सी \nमेरे जीवन दी कुछ होर कहानी होणी सी \nजे तू ना करदा मेहरा , असां रूल जाणा सी\n\nचाहे लखां होण जुबानां मैं गुण नहीं गा सकदी \nमेरे दाता तेरा कर्ज अदा नहीं कर सकदी \nजे तू ना देंदां ठंडी छां , असा रूल जाणां सी\n\nकई जनमा तो असी भटके , ना रस्ता मिलिया सी \nहोई किरपा मेरी जिंदगी दा , फूल खिलया सी \nजे तू ना देंदा ठंडी छां , असां रूल जाना सी\n\nतू मेरा है मैं तेरा ये रिश्ता टुटे ना \nभावे छुट जाये जग सारा , तेरा दर छुटे ना \nतेरे दर ते ना मिलदी थां , असां रूल जाणां सी"},"en":{"t":"Je Tu Na Farda Sadi Bah","c":"Je Tu Na Farda Sadi Bah"}},

	{"id":1770034367134,
	"pb":{"t":"ਰੱਬਾ ਵੇ ਤੇਰੇ ਇਸ਼ਕ ਮੇਂ ਪਾਗਲ","c":"ਰੱਬਾ ਵੇ ਤੇਰੇ ਇਸ਼ਕ ਮੇਂ ਪਾਗਲ , ਹੋ ਗਈਆਂ ਤੇਰੇ ਪਿਆਰ ਮੇਂ ਪਾਗਲ ॥\nਮੁਝੇ ਲਗਨ ਲਗੀ ਹੈ ਸਬ ਜਾਣੇਂ , ਯੇ ਤੁਝਕੋ ਖ਼ਬਰ ਹੋ ਕਬ ਜਾਣੇਂ ,\nਅਬ ਹਾਲ ਕਿਆ ਹੋਗਾ ਰੱਬ ਜਾਣੇ ॥\n\nਪਲ ਪਲ ਤੜਪੇ ਬਿਰਹਾ ਮਾਰੀ , ਚਰਣ ਪ੍ਰੀਤ ਭਈਓ ਗਤੀ ਹਮਾਰੀ ,\nਤੂਨੇ ਮੁਝਕੋ ਸ਼ਰਣ ਲਗਾਕੇ ਬੇੜਾ ਪਾਰ ਕੀਆ ਬਨਵਾਰੀ ,\nਸੁਣ ਮੇਰੇ ਰੱਬਾ ਤੇਰੇ ਬਿਨ ਨ ਗੁਜ਼ਾਰਾ , ਤੂੰ ਹੈ ਜਾਨ ਸੇ ਪਿਆਰਾ ਮੁਝੇ ਪਿਆ\nਦਾਸ ਬਣਾ ਲੇ ਮੁਝੇ ਸ਼ਰਣਾ ਲਗਾਲੇ , ਤੂਨੇ ਚੈਨ ਚੁਰਾਇਆ ਜਾਏ ਨ ਜੀਆ ॥\n\nਤੁਮ ਵਿਵੇਕ ਬ੍ਰਹਮਗਿਆਨੀ , ਹਮ ਮੂਰਖ ਅੰਧਿਆਰ ਅਗਿਆਨੀ ,\nਚਰਣ ਕਮਲ ਮੇਂ ਬੈਠ ਗਿਆ ਹੂੰ , ਬਾਂਹ ਪਕੜ ਮੇਰੀ ਅੰਤਰਯਾਮੀ ,\nਤਰਸ ਕੀਆ ਉਪਕਾਰ ਕੀਆ , ਕ੍ਰਿਪਾ ਕਰੀ ਅਪਣਾ ਲਿਆ ,\nਪਰਉਪਕਾਰੀ ਸੁਣੋ ਹਮਾਰੀ , ਰਹੂੰ ਸ਼ਰਣ ਤੁਮ੍ਹਾਰੀ ਤੁਝੇ ਪਾ ਲਿਆ ॥\n\nਪ੍ਰਭੂ ਜੀ ਤੇਰੀ ਲਗਨ ਨਾਮ ਕੀ ਜਬ ਸੇ ਲਗੀ ਮਸ਼ਹੂਰ ਹੂਆ ਮੈਂ ,\nਤੁਮ ਹੀ ਮੇਰੇ ਅੰਗ ਸੰਗ ਬਸਤੇ , ਦੁਨੀਆ ਸੇ ਅਬ ਦੂਰ ਹੂਆ ਮੈਂ ,\nਕਾਹੇ ਇਤਨਾ ਸਤਾਏਂ , ਤੇਰੀ ਪ੍ਰੀਤ ਸੇ ਖੁਦ ਕੋ ਸਵਾਰ ਲੂੰ ॥\n\nਕੋਸ਼ਿਸ਼ ਕਰਕੇ ਦੇਖ ਲੇ ਕੋਈ , ਮੁਝਕੋ ਦੂਰ ਨ ਕਰ ਪਾਏ ,\nਤੇਰਾ ਤਨ ਮਨ ਤੁਝਕੋ ਅਰਪਣ , ਮੈਂ ਕਮਲੀ ਕੋਈ ਸਮਝ ਨਾ ਪਾਏ ,\nਕੈਸੇ ਸਮਝਾਊਂ , ਕੈਸੇ ਕੈਸੇ ਮੈਂ ਬਤਾਊਂ , ਕੈਸੇ ਹਾਲ ਸੁਣਾਊਂ , ਕੋਈ ਜਾਣੇ ਨਾ ,\nਅਰਮਾਨ ਜਗਾਊਂ ਬਸ ਤੁਮਕੋ ਬਤਾਊਂ ਹਾਲੇ-ਦਿਲ ਮੈਂ ਸੁਣਾਊਂ , ਤੂੰ ਸਾਹਿਬਾ ॥"},"hi":{"t":"रब्बा वे तेरे इश्क में पागल","c":"रब्बा वे तेरे इश्क में पागल , हो गईआं तेरे प्यार में पागल । \nमुझे लगन लगी है सब जाणें , ये तुझको खबर हो कब जाणे , \nअब हाल क्या होगा रब्ब जाणे ।\n\nपल पल तड़पे बिरहा मारी , चरण प्रीत भेयो गति हमारी , \nतूने मुझको शरण लगाके बेड़ा पार किया बनवारी , \nसुण मेरे रब्बा तेरे बिन न गुजारा , तूं है जान से प्यारा मुझे पिया \nदास बना ले मुझे शरणा लगाले , तूने चैन चुराया जाये न जिया ।\n\nतुम विवेक ब्रहमज्ञानी , हम मूरख अंधियार अगियानी , \nचरण कमल में बैठ गया हूं , बांह पकड़ मेरी अंतरयामी , \nतरस किया उपकार किया , कृपा करी अपना लिया , \nपरउपकारी सुनो हमारी , रहूं शरण तुम्हारी तुझे पा लिया ।\n\nप्रभु जी तेरी लगन नाम की जब से लगी मशहूर हुआ मैं , \nतुम ही मेरे अंग संग बसते , दुनिया दे अब दूर हुआ मैं , \nकाहे इतना सतायें , तेरी प्रीत से खुद को संवार लूं ।\n\nकोशिश करके देख ले कोई , मुझको दूर न कर पाये , \nतेरा तन मन तुझको अर्पण , मैं कमली कोई समझ ना पाये , \nकैसे समझाउं , कैसे कैसे मैं बताउं , कैसे हाल सुनाउ , कोई जाणे ना , \nअरमां जगाउं बस तुमको बताउं हाले दिल में सुनाउं , तूं साहिबा ।"},"en":{"t":"Rabba Ve Tere Ishq Mein Pagal","c":"Rabba Ve Tere Ishq Mein Pagal"}},

	{"id":1770034879583,
	"pb":{"t":"ਦੇਓ ਦਾਨ ਨਾਮ, ਆਪਣੇ ਦਾਸਨ ਕੋ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਦੇਓ ਦਾਨ ਨਾਮ , ਆਪਣੇ ਦਾਸਨ ਕੋ ॥\nਨਿਰੰਕਾਰ ਨਰ ਨਾਰਾਇਣ , ਨਰ ਨਿਰੰਜਨ ਨਰ ਨਿਰੰਜਨ \nਨਿਰੰਜਨ ਨਾਨਕ ਨਾਨਕ ਗੋਬਿੰਦ ॥\nਏਕ ਰੂਪ ਏਕ ਸਰੂਪ ਕਲਿ ਮਾਹਿ ,\nਜਹਾਂ ਦੇਖੂੰ ਵਹਾਂ ਤੂੰ ਹੈ ਦਰਸ਼ਨ ,\nਅਗੰਮ ਮਾਹੀਂ ਤੂੰ ਸਭਨੀ ਥਾਂਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"देओ दान नाम आपने दासन को ( शक्ति )","c":"( शक्ति )\nदेओ दान नाम , आपने दासन को ।। \nनिरंकार नर नारायण , नर निरंजन नर निरंजन , \nनिरंजन नानक नानक गोबिंद ।। \nएक रूप एक सरूप कलि माहि , \nजहां देखूँ वहां तूं है दर्शन , \nअगंम माहीं तूं सभनी थांई ।।\n( यकीन )"},"en":{"t":"Deyo Naam Daan Apne Dasan Ko ( Shakti )","c":"Deyo Naam Daan Apne Dasan Ko ( Shakti )"}},

	{"id":1770035106230,
	"pb":{"t":"ਦੀਓ ਮੋਹੇ ਨਾਮ ਦਾਨ","c":"ਦੀਓ ਮੋਹੇ ਨਾਮ ਦਾਨ , ਏਹ ਗੁਰ ਕੀ ਵਡਿਆਈ ,\nਨਾਮ ਧਿਆਊਂ ਹਰਿ ਗੁਣ ਗਾਊਂ , ਚਿੱਤ ਏਹੋ ਆਸ ਲਗਾਈ ॥\nਅਵਰ ਨਾ ਡਿੱਠਾ ਤੁਧ ਜੇਹਾ , ਮੈਂ ਸਭ ਜਗ ਢੂੰਢ ਆਲਾ ,\nਤੁਧ ਸੰਗ ਨੇਹ ਤੁਧ ਸੰਗ ਪ੍ਰੀਤ ਮਨ ਤਨ ਏ ਲਾਈ ॥\nਮੈਂ ਕਿਛੁ ਨਾਹੀ ਤੂੰ ਏ ਸਭ ਕਿਛੁ ,\nਤੇਰੀ ਕੁਦਰਤ ਤੂੰ ਏ ਸਭ ਵਿਚ , ਓ ਮੇਰੇ ਰਾਮ ਰਘੁਰਾਈ ॥\nਬਿਨ ਤੇਰੇ ਮੋਹੇ ਕਿਛੁ ਨਹੀਂ ਭਾਵੇ , ਤੇਰੀ ਉਪਮਾ ਜੀਹਵਾ ਗਾਵੇ ,\nਕਰੋ ਨਦਰ ਏ ਦਰਸ਼ਨ ਸਾਂਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"दीओ मोहे नाम दान","c":"दीओ मोहे नाम दान , एह गुर की वडिआई , \nनाम धिआऊँ हरि गुण गाऊँ , चित्त एहो आस लगाई ।। \nअवर ना डिट्ठा तुध जेहा , मैं सभ जग ढूँढ आला , \nतुध संग नेह तुध संग प्रीत मन तन ए लाई ।।\nमैं किछ नाही तूं ए सभ किछ , \nतेरी कुदरत तूं ए सभ विच , ओ मेरे राम रघुराई ।।\nबिन तेरे मोहे किछ नहीं भावे , तेरी उपमा जीहवा गावे , \nकरो नदर ए दर्शन सांई ।।\n( यकीन )"},"en":{"t":"Deyo Mohe Naam Daan","c":"Deyo Mohe Naam Daan"}},

	{"id":1770035277904,
	"pb":{"t":"ਦੀਜੋ ਦਰਸ ਮਾਹੇ ਮੇਰੇ ਠਾਕੁਰ ਜੀਓ","c":"ਦੀਜੋ ਦਰਸ ਮਾਹੇ ਮੇਰੇ ਠਾਕੁਰ ਜੀਓ , ਮੋਹੇ ਨੈਣਣ ਦਰਸ ਪਿਆਸ ॥\nਨੀਂਦ ਨਾ ਆਵੇ ਨਾ ਮਨ ਚੈਨ ਮਾਹੇ ,\nਤੁਧ ਕਿਰਪਾ ਧਾਰ ਕੰਤ ਪਿਆਰੇ , ਜੋਤੀ ਜੋਤ ਸਮਾਏ ॥\nਤੁਧ ਸੇ ਵਿਛੁੜੇ ਮਰ ਜਾਸੀ , ਜੈਸੇ ਮੀਨਾ ਪਾਣੀ ਪਿਆਸਾ ॥\nਇਕੋ ਆਸ ਦਰਸ਼ਨ ਜੀਵੇ , ਕਬ ਦਿਆਲ ਹੋਵੋਗੇ ਗੁਰਦੇਵ ਗਿਰਵਰਧਾਰੀ ॥\n( ਯਕੀਨ )"},"hi":{"t":"दीजो दरस माहे मेरे ठाकुर जीओ","c":"दीजो दरस माहे मेरे ठाकुर जीओ , मोहे नैनण दरस पिआस ।। \nनींद ना आवे ना मन चैन माहे , \nतुध किरपा धार कंत पिआरे , जोती जोत समाये ।। \nतुध से बिछुड़े मर जासी , जैसे मीना पाणी पिआसा ।। \nएको आस दर्शन जीवे , कब दयाल होवोगे गुरदेव गिरवरधारी ।।\n( यकीन )"},"en":{"t":"Dijo Daras Mohe Mere Thakur Jiyo","c":"Dijo Daras Mohe Mere Thakur Jiyo"}},

	{"id":1770035554719,
	"pb":{"t":"ਦੀਨ ਦਿਆਲ ਸਤਿਗੁਰ ਪੁਰਖ ਹਮਾਰੇ","c":"ਦੀਨ ਦਿਆਲ ਸਤਿਗੁਰ ਪੁਰਖ ਹਮਾਰੇ , ਹਰਿ ਸਾਜਨ ਮੀਤ ਪਿਆਰੇ ॥\nਦਿਆ ਕਰੋ ਪ੍ਰਤਿਪਾਲ ਠਾਕੁਰ ਜੀਓ ,\nਰਾਮ ਨਾਮ ਸਮੁੰਦ ਜੀਓ ਪੱਥਰ ਤਾਰੇ ॥\nਹਮ ਨੀਚ ਕਿਛੁ ਜਾਣੋ ਨਾਹੀ , ਤੁਮ ਭਯੋ ਖ਼ਸਮ ਹਮਾਰੇ ਹਰਿ ਰਾਇ ॥\nਰਾਖਿ ਲੇਹੁ ਰਾਖਨਹਾਰ ਸੁਆਮੀ , ਦਰਸ਼ਨ ਗਰੀਬ ਢਹਿ ਪਯੋ ਦੁਆਰੇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"दीन दयाल सतिगुर पुरख हमारे","c":"दीन दयाल सतिगुर पुरख हमारे , हरि साजन मीत पिआरे ।।\nदया करो प्रितपाल ठाकुर जीओ , \nराम नाम समुंद जीओ पत्थर तारे ।।\nहम नीच किछ जानो नाही , तुम भयो खसम हमारे हरि राय ।। \nराख लेओ राखनहार सुआमी , दर्शन गरीब ढहि पयो दुआरे ।।\n( यकीन )"},"en":{"t":"Deen Dayaal Satguru Purakh Humare","c":"Deen Dayaal Satguru Purakh Humare"}},

	{"id":1770035754468,
	"pb":{"t":"ਦੀਨ ਦਿਆਲ ਰਾਮ ਪ੍ਰਭ ਸ਼ਾਮ ਅਬਿਨਾਸ਼ੀ","c":"ਦੀਨ ਦਿਆਲ ਰਾਮ ਪ੍ਰਭ ਸ਼ਾਮ ਅਬਿਨਾਸ਼ੀ ॥\nਨ ਨਿਰੰਕਾਰ ਕਲਿ ਮਾਹਿ ਨਾਨਕ ,\nਦਰਸ਼ਨ ਦਾਸ ਤੇਰੀ ਸ਼ਰਣਾਈ ਹਰਿ ਰਾਇ ॥\nਤੂੰ ਸਭਨੀ ਥਾਂਈ ਜਿੱਥੇ ਹਉਂ ਜਾਈ ,\nਤੁਝ ਬਿਨ ਨੀਂਦ ਨੈਣਣ ਨਾ ਆਵੇ ,\nਤੁਧ ਬਿਨ ਮਨ ਲੋਚਦਾ ਹਰਿ ਰਾਇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"दीन दयाल राम प्रभ शाम अबिनासी","c":"दीन दयाल राम प्रभ शाम अबिनासी ।। \nन निरंकार कलि माहि नानक , \nदर्शन दास तेरी शरणाई हरि राय ।।\nतूं सभनी थांई जिथे हउँ जांई , \nतुझ बिन नींद नैनण ना आवे , \nतुध बिन मन लोचदा हरि राय ।।\n( यकीन )"},"en":{"t":"Deen Dayaal Ram Prabh Shaam Abinasi","c":"Deen Dayaal Ram Prabh Shaam Abinasi"}},

	{"id":1770035959441,
	"pb":{"t":"ਧਨ ਨਿਰੰਕਾਰ ਜੋ ਕਰੇ ਸੋ ਕਰਤਾਰ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਧਨ ਨਿਰੰਕਾਰ ਜੋ ਕਰੇ ਸੋ ਕਰਤਾਰ ,\nਨਾਨਕ ਏਕ ਓਂਕਾਰ ਸਤਿਨਾਮ ਵਾਹਿਗੁਰੂ ॥\nਨਾਨਕ ਸੱਚ ਹੈ ਨਾਨਕ ਹੈ ਭੀ ਸੱਚ ,\nਨਾਨਕ ਸੱਚ ਹੈ ਨਾਨਕ ਸਦਾ ਹੀ ਸੱਚ ॥\nਧਨ ਨਿਰੰਕਾਰ ਜੋ ਕਰੇ ਸੋ ਕਰਤਾਰ ,\nਨਾਨਕ ਏਕ ਓਂਕਾਰ ਸਤਿਨਾਮ ਵਾਹਿਗੁਰੂ ॥\nਅਕਾਲ ਮੂਰਤਿ ਕਰਤਾ ਪੁਰਖੁ , ਅਜੂਨੀ ਸੈਭੰ ਸਤਿਗੁਰ ਪ੍ਰਸਾਦਿ ॥\n( ਯਕੀਨ )"},"hi":{"t":"धन निरंकार जो करे सो करतार ( शक्ति )","c":"( शक्ति )\nधन निरंकार जो करे सो करतार , \nनानक एक ओंकार सतिनाम वाहिगुरू ।।\nनानक सच है नानक है भी सच , \nनानक सच है नानक सदा ही सच ।। \nधन निरंकार जो करे सो करतार , \nनानक एक ओंकार सतिनाम वाहिगुरू ।। \nअकाल मूरत करता पुरख , अजूनी सैभं सतिगुर प्रसादि ।।\n( यकीन )"},"en":{"t":"Dhan Nirankar Jo Kare So Kartaar ( Shakti )","c":"Dhan Nirankar Jo Kare So Kartaar ( Shakti )"}},

	{"id":1770040391261,
	"pb":{"t":"ਧੁਰੋਂ ਤ੍ਰਿਲੋਕੀ ਤਰਸ਼ੂਲੇ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਧੁਰੋਂ ਤ੍ਰਿਲੋਕੀ ਤਰਸ਼ੂਲੇ ਨਮੈ ਨਮੈ ਅਸ਼ਟ ,\nਹਉਮੀਏ ਅਸ਼ਟ ਓਮ ਨਮੈ ਸਮਾਏ ॥\nਓਮ ਓਂਕਾਰ ਤ੍ਰੈ ਭਵਨ ਧਰਤ ਅਵਤਾਰ ,\nਹਉਮੀ ਅਸ਼ਟ ਹਉਮੀ ਅਸ਼ਟ ਬਣਾਏ ਤੱਤ ਸੂਹਾ ॥\nਏਕ ਨਾਰੀ ਪੰਜ ਪਿਆਰੀ , ਦਰਸ ਪਿਆਸੀ ਕਰੇ ਅਰਜੋਈ ਤੁਧ ਆਗੇ ॥\nਇਕ ਰਾਤ ਗੋਬਿੰਦ ਮੁਰਾਰੀ , ਤੁਧ ਸੰਗ ਲਗ ਸੁਹਾਗਣ ਹੋਸੀ ,\nਦਰਸ਼ਨ ਚੇਤਨਾ ਹਮਾਰੀ ॥\n( ਯਕੀਨ )"},"hi":{"t":"धुरों त्रिलोकी तरशूले ( शक्ति )","c":"( शक्ति )\nधुरों त्रिलोकी तरशूले नमै नमै अष्ट , \nहउमीए अष्ट ओम नमै समाये ।।\nओम ओंकार त्रै भवन धरत अवतार , \nहउमी अष्ट हउमी अष्ट बणाये तत्त सूहा ।। \nएक नारी पँज पिआरी , दरस पिआसी करे अरजोई तुध आगे ।।\nइक रात गोबिंद मुरारी , तुध संग लग सुहागण होसी , \nदर्शन चेतना हमारी ।।\n( यकीन )"},"en":{"t":"Dhuro Triloki Tarshule ( Shakti )","c":"Dhuro Triloki Tarshule ( Shakti )"}},

	{"id":1770040610383,
	"pb":{"t":"ਨਮੋ ਗਣੇਸ਼ ਨਮੋ ਗਣੇਸ਼","c":"ਨਮੋ ਗਣੇਸ਼ ਨਮੋ ਗਣੇਸ਼ ਮਾਤ ਪਾਰਬਤੀ ਪਿਤਾ ਮਹੇਸ਼ ॥\nਜੋ ਧਿਆਵੇ ਫਲ ਪਾਵੇ , ਮੰਗਲ ਕਰੇ ਗੁਣੀ ਗਣੇਸ਼ ॥\nਗਜ ਕੋ ਦੀਆ ਬਹੁ ਮਾਨਾ , ਜਬ ਸੀਸ ਕੀਓ ਪਰਵਾਨਾ ,\nਗਣਪਤੀ ਦੇਵ ਨਾਮ ਸਦਾਵੇ , ਆਰੰਭ ਕਾਰਜ ਪੂਜਨ ਹਮੇਸ਼ ॥\nਸ਼ਿਵ ਸ਼ੰਕਰ ਭੋਲੇ ਭੰਡਾਰੀ , ਸ਼ਾਂਤ ਮੁਗਧ ਜਟਾ ਧਾਰੀ ,\nਮਨ ਚਿੱਤ ਲਾਏ ਜੋ ਆਰਾਧੇ , ਪੂਰਨ ਮਨਸਾ ਕਰੇ ਮਹੇਸ਼ ॥\nਮਾਂ ਪਾਰਬਤੀ ਨਵ ਸ਼ਕਤੀ ਧਾਰੇਓ ਰੂਪ ਅਨੇਕ ,\nਦੁਸ਼ਟ ਪੈਂਤ ਮਾਰੇ ਬਣ ਚੰਡੀ , ਦਰਸ਼ਨ ਕਾਟੇ ਦੁੱਖ ਕਲੇਸ਼ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नमो गणेश नमो गणेश","c":"नमो गणेश नमो गणेश मात पारबती पिता महेश ।। \nजो धिआवे फल पावे , मंगल करे गुणी गणेश ।।\nगज को दीआ बहु माना , जब सीस कीओ परवाना , \nगणपती देव नाम सदावे , आरंभ कारज पूजन हमेश ।।\nशिव शंकर भोले भंडारी , शांत मुगध जटा धारी , \nमन चित्त लाये जो आराधे , पूरन मनसा करे महेश ।।\nमाँ पारबती नव शक्ती धारेओ रूप अनेक , \nदुष्ट पैंत मारे बण चंडी , दर्शन काटे दुख कलेश ।।\n( यकीन )"},"en":{"t":"Namo Ganesh Namo Ganesh","c":"Namo Ganesh Namo Ganesh"}},

	{"id":1770040813935,
	"pb":{"t":"ਨਾਨਕ ਸੱਚ ਹੈ ਨਾਨਕ ਹੈ ਭੀ ਸੱਚ","c":"ਨਾਨਕ ਸੱਚ ਹੈ ਨਾਨਕ ਹੈ ਭੀ ਸੱਚ ,\nਨਾਨਕ ਸੱਚ ਹੈ ਨਾਨਕ ਸਦਾ ਹੀ ਸੱਚ ॥\nਯਾ ਯੂਸਫ਼ ਯਾ ਅਲੀ ਯਾ ਮੁਹੰਮਦ ਯਾ ਰਹੀਮ ॥\nਦ-ਦੀਨ ਦਿਆਲ ਹੈ , ਰ-ਰਾਮ ਹੈ , ਸ਼-ਸ਼ਾਮ ਹੈ , ਨ-ਨਾਨਕ ਹੈ ॥\nਨਾਨਕ ਕਲਿ ਮਾਹਿ ਯਾਦ ਹੈ ਤਾਂ ਸਭ ਕਿਛੁ ਹੈ ॥\nਤੂੰ ਯਹਾਂ ਹੈ ਵਹਾਂ ਹੈ ਦਰਸ਼ਨ ਅਗੰਮ ਰੂਪ ਜਗ ਮਾਹਿ ਤੂੰ ਸਭਨੀ ਥਾਂਈ ॥\nਭਰਮ ਭਉ ਸਭ ਛੂਟੇ ਦਾਸਨ ਦਾਸ ਦਸਾਈ ,\nਦਾਸ ਦਾਸ ਦਾਸਨ ਦਰਸ਼ਨ ਦਾਸ ਸਾਂਈ ਤੂੰ ਸਭਨੀ ਥਾਂਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नानक सच है नानक है भी सच","c":"नानक सच है नानक है भी सच , \nनानक सच है नानक सदा ही सच ।।\nया यूसफ या अली या मुहम्मद या रहीम ।।\nद दीन दयाल है र राम है श शाम है न नानक है ।।\nनानक कलि माहि याद है तां सभ किछ है ।।\nतूं यहां है वहां है दर्शन अगंम रूप जग माहि तँ सभनी थांई ।।\nभरम भौ सभ छूटे दासन दास दसाई , \nदास दास दासन दर्शन दास सांई तँ सभनी थांई ।।\n( यकीन )"},"en":{"t":"Nanak Sach Hain Nanak Hain Bhi Sach","c":"Nanak Sach Hain Nanak Hain Bhi Sach"}},

	{"id":1770041127140,
	"pb":{"t":"ਨਾਨਕ ਨਾ+ਨ+ਕ ਨਾਨਕ ਆਦਿ ਨਮੈ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਨਾਨਕ ਨਾ+ਨ+ਕ ਨਾਨਕ ਆਦਿ ਨਮੈ , ਨਾਨਕ ਜੁਗਾਦਿ ਨਮੈ ॥\nਨਾਨਕ ਹੈ ਭੀ ਨਮੈ , ਨਾਨਕ ਹੋਸੀ ਭੀ ਨਮੈ ॥\nਨਮੈ ਨਮੇਓ ਨਮੈ ਨਮੇਓ ਨਮੈ ਨਮੇਓ ,\nਨਾਸੂਰਾ ਨਾਸੂਦਾ ਨਿਆਸਾ ਨੌਰੰਗਾ ਨੌਰਿੰਦਾ ॥\nਨਿਰਭੈਤਾ ਨਿਰਵੈਰਤਾ ਨੌਰਿੰਜਾ ਨਿਰੰਕਾਰਾ ਨਿਓਟਾ ,\nਨੌਵੰਦਾ ਨਿਜੰਦਾ ਨਿਆਜੀ ਨਿਔਜਾ ਨਿਵਾਜਾ ਨਾਨਕ ਨਮੇਓ ॥\nਨਾਨਕ ਨਾਥ ਨਾਨਕ ਨਾਦ ਨਾਨਕ ਅੰਗਦ ,\nਨਾਨਕ ਅਮਰ ਨਾਨਕ ਰਾਮ ਨਾਨਕ ਅਰਜਨ ॥\nਨਾਨਕ ਹਰਿਗੋਬਿੰਦ ਨਾਨਕ ਹਰਿ ਰਾਇ ਨਾਨਕ ਹਰਿਕ੍ਰਿਸ਼ਨ ,\nਜਿਸ ਸੰਗ ਦੂਖ ਨਾਠੇ ਸੁਖ ਘਨੇਰੇ ਆਏ ॥\nਨਾਨਕ ਤੇਗ ਬਹਾਦਰ ਜਿਸੇ ਧਿਆਇਆ ਘਰ ਮਹਿ ਪਾਇਆ ,\nਨਾਨਕ ਗੋਬਿੰਦਾ ਮੇਰੇ ਹਰਿ ਰਾਇਆ ॥\nਨਾਨਕ ਨਿਰੰਜਨ ਨੂਰਾਨੀ ਨੂਰ ਦਰਸ਼ਨ ਦਾਸ ਸਦੇਂਦਾ ,\nਦਰਸ਼ਨ ਹੀ ਸੰਗ ਹੋਏ ਸਹਾਏ ਹਰਿ ਰਾਇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नानक ना+न+क नानक आदि नमै ( शक्ति )","c":"( शक्ति )\nनानक ना+न+क नानक आदि नमै , नानक जुगादि नमै ।। \nनानक है भी नमै , नानक होसी भी नमै ।।\nनमै नमेओ नमै नमेओ नमै नमेओ , \nनासूरा नासूदा निआसा नौरंगा नौरिंदा ।।\nनिरभैता निरवैरता नौरिंजा निरंकारा निओटा , \nनौवंदा निजंदा निआजी निऔजा निवाजा नानक नमेओ ।।\nनानक नाथ नानक नाद नानक अंगद , \nनानक अमर नानक राम नानक अरजन ।।\nनानक हरिगोबिंद नानक हरि राय नानक हरिकृशन , \nजिस संग दूख नाठै सुख घनेरे आये ।।\nनानक तेग बहादर जिसे धिआया घर महि पाया , \nनानक गोबिंदा मेरे हरि राया ।।\nनानक निरंजन नूरानी नूर दर्शन दास सदेंदा , \nदर्शन ही संग होये सहाये हरि राय ।।\n( यकीन )"},"en":{"t":"Nanak Na+Na+K Nanak Aadi Namey ( Shakti )","c":"Nanak Na+Na+K Nanak Aadi Namey ( Shakti )"}},

	{"id":1770042518306,
	"pb":{"t":"ਨਾਨਕ ਨਾਮ ਅਮੋਲਕ ਰਤਨ","c":"ਨਾਨਕ ਨਾਮ ਅਮੋਲਕ ਰਤਨ , ਤਿਸੁ ਅੰਤੁ ਨ ਪਾਰਾਵਾਰੁ ॥\nਸਤਿਗੁਰੂ ਸ਼ਰਨ ਹਰਿ ਨਾਮੁ ਧਿਆਇਆ , ਸਤਿਗੁਰੂ ਸ਼ਰਨ ਪਰਮ ਪਦੁ ਪਾਇਆ ॥\nਸਤਿਗੁਰੂ ਸ਼ਰਨ ਅਠਸਠਿ ਤੀਰਥ ਇਸ਼ਨਾਨੁ , ਸਤਿਗੁਰੂ ਆਪਣੇ ਜਾਉਂ ਕੁਰਬਾਨੁ ॥\nਸਤਿਗੁਰੂ ਸਮੁੰਦ ਹਰਿ ਗੁਣ ਭੰਡਾਰ , ਨਾਨਕ ਨਾਮ ਅਮੋਲਕ ਰਤਨ ,\nਤਿਸੁ ਅੰਤੁ ਨ ਪਾਰਾਵਾਰੁ ॥\nਤੁਮ ਮੇਰੋ ਸਤਿਗੁਰੂ ਅਟਲ ਸੁਲਤਾਨ , ਦਿਆ ਕਰੋ ਮੇਰੇ ਠਾਕੁਰ ਮੇਹਰਬਾਨ ॥\nਕੋਈ ਗੁਣ ਨਾਹੀ ਮੇਰੇ ਸੁਆਮੀ , ਗੁਣ ਦੀਜੈ ਗੁਰ ਪੂਰੇ ਗੁਣੀ ਨਿਧਾਨ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नानक नाम अमोलक रतन","c":"नानक नाम अमोलक रतन , तिस अंत ना पारावार ।। \nसतिगुरू शरण हरि नाम धिआया , सतिगुरू शरण परम पद पाया ।। \nसतिगुरू शरण अठसठि तीरथ इश्नान , सतिगुरू आपणे जाऊँ कुरबान ।। \nसतिगुरू समुंद हरि गुण भंडार , नानक नाम अमोलक रतन , \nतिस अंत ना पारावार ।।\nतुम मेरो सतिगुरू अटल सुलतान , दया करो मेरे ठाकुर मेहरबान ।। \nकोई गुण नाही मेरे सुआमी , गुण दीजै गुर पूरे गुणी निधान ।।\n( यकीन )"},"en":{"t":"Nanak Naam Amolak Ratan","c":"Nanak Naam Amolak Ratan"}},

	{"id":1770042731814,
	"pb":{"t":"ਨਾਮ ਕੀ ਦਾਤ ਮਿਲੇ ਗੁਰ ਸ਼ਰਣੀ ( ਦੋਹਾ )","c":"( ਦੋਹਾ )\nਨਾਮ ਕੀ ਦਾਤ ਮਿਲੇ ਗੁਰ ਸ਼ਰਣੀ ,\nਨਾਮ ਤੇ ਮਿਲੇ ਮੁਕਤ ਦੁਆਰ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नाम की दात मिले गुर शरणी ( दोहा )","c":"( दोहा )\nनाम की दात मिले गुर शरणी , \nनाम ते मिले मुक्त दुआर ।।\n( यकीन )"},"en":{"t":"Naam Ki Daat Mile Guru Sharni ( Doha )","c":"Naam Ki Daat Mile Guru Sharni ( Doha )"}},

	{"id":1770042995864,"audio":"audio/NAAM JAPAT PRABH.mp3",
	"pb":{"t":"ਨਾਮ ਕੀ ਮਹਿਮਾ ਅਪਰੰਪਾਰ ( ਪਦਮ )","c":"( ਪਦਮ )\nਨਾਮ ਜਪਤ ਮਨ ਭਯੋ ਨਿਹਾਲ , ਨਾਮ ਜਪਤ ਪ੍ਰਭ ਭਯੋ ਕਿਰਪਾਲ ॥\nਨਾਮ ਕੀ ਮਹਿਮਾ ਅਪਰੰਪਾਰ , ਸੱਚ ਨਾਮ ਏਕ ਕਰਤਾਰ ॥\nਨਾਮ ਕੀ ਵਡਿਆਈ ਕਥੀ ਨਾ ਜਾਏ , ਦੀਜੈ ਨਾਮ ਮੇਰੇ ਹਰਿ ਰਾਇ ॥\nਨਾਮ ਕੀ ਹਰਿ ਜਨ ਕਰੇ ਕਮਾਈ , ਨਾਮ ਸਿਮਰ ਹਰਿ ਹੋਏ ਸਹਾਈ ॥\nਹਰਿ ਜਨ ਨਾਮ ਪਾਵੈ ਕੋਏ , ਆਸਾ ਨਾਮ ਹਰਿ ਪੂਰੀ ਹੋਏ ॥\nਨਾਮ ਸਿਮਰ ਰਸਨਾ ਭਯੋ ਪੁਨੀਤ , ਜਿਸ ਹਰਿ ਸੰਗ ਲਾਗੇ ਪ੍ਰੀਤ ॥\nਦਰਸ਼ਨ ਦਾਸ ਕਰੇ ਬੇਨੰਤੀਆਂ , ਹਰਿ ਆਣ ਵਸੇਓ ਮੇਰੇ ਚੀਤ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नाम की महिमा अपरम्पार ( पदम )","c":"( पदम )\nनाम जपत मन भयो निहाल , नाम जपत प्रभ भयो किरपाल ।। \nनाम की महिमा अपरम्पार , सच नाम एक करतार ।। \nनाम की वडियाई कथी ना जाये , दीजै नाम मेरे हरि राय ।। \nनाम की हरि जन करे कमाई , नाम सिमर हरि होये सहाई ।। \nहरि जन नाम पावै कोये , आसा नाम हरि पूरी होये ।।\nनाम सिमर रसना भयो पुनीत , जिस हरि संग लागे प्रीत ।।\nदर्शन दास करे बेनंतीआं , हरि आण वसेओ मेरे चीत ।।\n( यकीन )"},"en":{"t":"Naam Ki Mahima Aprampar ( Padam )","c":"Naam Ki Mahima Aprampar ( Padam )\nNaam Japat Man Bhayo Nihaal"}},

	{"id":1770043259073,
	"pb":{"t":"ਨਿਓਟਿਆਂ ਕਾ ਆਸਰਾ ( ਓਟ )","c":"( ਓਟ )\nਨਿਓਟਿਆਂ ਕਾ ਆਸਰਾ ਨਿਮਾਣਿਆਂ ਕਾ ਮਾਨ , ਤੁਮ ਹੋ ਸਾਹਿਬਾ ਸਭ ਸੇ ਮਹਾਨ ॥\nਦੀਨ ਦੁਖੀ ਤੁਧ ਸਹਾਰੇ , ਨਿਰਬਲ ਤੇਰੀ ਰਾਹ ਨਿਹਾਰੇ ,\nਰਹਿਮਤ ਬਰਸੇ ਸਭ ਪੇ ਰਾਮ ॥\nਬ੍ਰਹਮਾ ਵਿਸ਼ਨੂੰ ਸ਼ਿਵ ਵੀ ਆਪੇ , ਰਾਮ ਕੋ ਦੇਖੇ ਸ਼ਾਮ ਹੀ ਜਾਪੇ ,\nਭੇਦ ਕਰੇ ਕੌਣ ਬਖਾਨ ॥\nਹਮ ਨੀਚ ਜਾਣੋ ਨਾਹੀ , ਕਿਨ ਬਿਧ ਰਿਝਾਊਂ ਤੋਹੇ ਬਨਵਾਰੀ ,\nਦਿਆ ਕਰੋ ਦਿਆਵਾਨ ॥\nਆਣ ਖੜੇ ਹਮ ਤੇਰੇ ਦੁਆਰ , ਦੀਜੋ ਦਰਸ਼ਨ ਖੋਲ ਕਿਵਾੜ ,\nਕਰ ਕਿਰਪਾ ਕਿਰਪਾ ਨਿਧਾਨ ॥\n( ਯਕੀਨ )"},"hi":{"t":"निओटेओं का आसरा ( ओट )","c":"( ओट )\nनिओटेओं का आसरा निमाणेओं का मान , तुम हो साहिबा सभ से महान ।। \nदीन दुखी तुध सहारे , निरबल तेरी राह निहारे , \nरहमत बरसै सभ पे राम ।।\nब्रह्मा विशनूँ शिव वी आपे , राम को देखे शाम ही जापै , \nभेद करे कौन बखान ।।\nहम नीच जानो नाही , किन बिध रिझाऊँ तोहे बनवारी , \nदया करो दयावान ।।\nआन खड़े हम तेरे दुआर , दीजो दर्शन खोल किवाड़ , \nकर किरपा किरपा निधान ।।\n( यकीन )"},"en":{"t":"Nioteya Ka Aasra ( Oat )","c":"Nioteya Ka Aasra ( Oat )"}},

	{"id":1770043417014,
	"pb":{"t":"ਨਿਸ ਦਿਨ ਜਪੀਏ ਪ੍ਰਭ ਕਾ ਨਾਮ","c":"ਨਿਸ ਦਿਨ ਜਪੀਏ ਪ੍ਰਭ ਕਾ ਨਾਮ , ਹਿਰਦੇ ਅੰਦਰ ਉਪਜੇ ਗਿਆਨ ,\nਮਨ ਨਿਰਮਲ ਹੋ ਜਾਈ ॥\nਗੁਰ ਸਿਉਂ ਪਾਈਏ ਨਾਮ ਨਿਧਾਨ , ਕਿਰਪਾ ਕਰੇ ਪ੍ਰਭ ਮੇਹਰਬਾਨ ,\nਜਨਮ ਸਫਲ ਹੋ ਜਾਈ ॥\nਨਾਮ ਹੈ ਮਨਵਾ ਮੁਕਤੀ ਦੁਆਰ , ਨਾਮ ਸੰਗ ਹੋਵੇ ਭਵਜਲ ਪਾਰ ,\nਨਾਮ ਬਿਨਾ ਕਿਛੁ ਨਾਹੀ ॥\nਨਾਮ ਅਰਾਧੇ ਭਉ ਨਾ ਲਾਗੇ , ਸਾਹਿਬ ਅੰਗ ਸੰਗ ਬਿਰਾਜੇ ,\nਦਰਸ਼ਨ ਗੁਰੂ ਸਦਾ ਸਹਾਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"निस दिन जपीये प्रभ का नाम","c":"निस दिन जपीये प्रभ का नाम , हिरदे अंदर उपजे गिआन , \nमन निरमल हो जाई ।।\nगुर सिओं पाइये नाम निधान , किरपा करे प्रभ मेहरबान , \nजनम सफल हो जाई ।।\nनाम है मनवा मुक्ती दुआर , नाम संग होवे भउजल पार , \nनाम बिना किछ नाही ।।\nनाम अराधे भौ ना लागे , साहिब अंग संग बिराजे , \nदर्शन गुरू सदा सहाई ।।\n( यकीन )"},"en":{"t":"Nis Din Japiye Prabh Ka Naam","c":"Nis Din Japiye Prabh Ka Naam"}},

	{"id":1770043636335,
	"pb":{"t":"ਨਿੱਤ ਨਿਮਾਣੀ ਕਰੇ ਅਰਜੋਈ","c":"ਨਿੱਤ ਨਿਮਾਣੀ ਕਰੇ ਅਰਜੋਈ , ਕਬ ਦਰਸ ਹੋਣਗੇ ਠਾਕੁਰ ਰਾਇ ॥\nਅਬ ਬੈਰਾਗਣ ਅਮੰਗਲ ਭਯੋ , ਬਿਰਹੋਂ ਤਾਂਘ ਹੋਸੀ ਸਵਾਏ ॥\nਚੈਨ ਨਾ ਆਵੇ ਰੈਣ ਨਾ ਵਿਹਾਵੇ , ਮਨ ਮੋਹ ਨਿੱਤ ਸਤਾਵੇ ॥\nਦਰਸ਼ਨ ਜਨ ਪ੍ਰਭ ਮੇਹਰ ਕਰੋ , ਗੁਰ ਸ਼ਬਦੀ ਲਿਵ ਲਾਏ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नित्त निमाणी करे अरजोई","c":"नित्त निमाणी करे अरजोई , कब दरस होंगे ठाकुर राय ।। \nअब बैरागण अमंगल भयो , बिरहों तांघ होसी सवाये ।। \nचैन ना आवे रैण ना विहावे , मन मोह नित्त सतावे ।। \nदर्शन जन प्रभ मेहर करो , गुर शब्दी लिव लाये ।।\n( यकीन )"},"en":{"t":"Nit Nimani Kare Arjoi","c":"Nit Nimani Kare Arjoi"}},

	{"id":1770043778170,
	"pb":{"t":"ਬਿਨੁ ਹਰਿ ਭਜਨ ਰੰਗ ਰਸ ਜੇਤੇ ( ਦੋਹਾ )","c":"( ਦੋਹਾ )\nਬਿਨੁ ਹਰਿ ਭਜਨ ਰੰਗ ਰਸ ਜੇਤੇ , ਸੰਤ ਦਿਆਲ ਯੇ ਨਹੀਂ ਸਭੀ ਝੂਠੇ ॥\nਨਾਮ ਰਤਨ ਪਾਯੋ ਜਨ ਨਾਨਕ , ਨਾਮ ਵਿਹੀਨ ਚਲੇ ਸਭ ਝੂਠੇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"बिन हरि भजन रंग रस जेते ( दोहा )","c":"( दोहा )\nबिन हरि भजन रंग रस जेते , संत दयाल ये नही सभी झूठे , \nनाम रतन पायो जन नानक , नाम विहीन चले सभ झूठे ।।\n( यकीन )"},"en":{"t":"Bin Hari Bhajan Rang Ras Jete ( Doha )","c":"Bin Hari Bhajan Rang Ras Jete ( Doha )"}},

	{"id":1770043997179,
	"pb":{"t":"ਨੀਲਕੰਠ ਨਾਰਾਇਣ ਨਿਰੰਜਨ ਨਿਮਾਣਾ","c":"ਨੀਲਕੰਠ ਨਾਰਾਇਣ ਨਿਰੰਜਨ ਨਿਮਾਣਾ ਨਿਆਸਰਾ ਨਿਓਟਿਆਂ ,\nਨਾਨਕ ਪ੍ਰਭ ਦੀਨ ਦਿਆਲ ਦਿਓ ਦਾਨ ॥\nਅੰਗਦ ਅਮਰਦਾਸ ਅਮਰ ਭਯੋ ਸੋਢੀ ਪਾਤਸ਼ਾਹ ਗੁਰੂ ਰਾਮਦਾਸ ਭਯੋ ,\nਦਿਆਲ ਨਦਰ ਕਰ ਅਰਜਨ ਹਰਿਗੋਬਿੰਦ ਕੋ ॥\nਹਰਿ ਭਯੋ ਹਰਿ ਰਾਇ ਹਰਿਕ੍ਰਿਸ਼ਨ ਕੋ ॥\nਹਰਿਕ੍ਰਿਸ਼ਨ ਕਰਤਾ ਕਰੀਮ ਕਰਮ ਪੁਰਖ ਗੁਰੂ ਤੇਗ ਬਹਾਦਰ ਜੀਓ ॥\nਹਰਿ ਹਰਿ ਹਰਿ ਗੋਬਿੰਦ ਰਾਇ ਦਰਸ਼ਨ ਨਿਮਾਣਾ ਕਰੇ ਬੇਨਤੀ ,\nਮੇਰਾ ਮਾਣ ਤੂੰ ਮੇਰਾ ਤਾਣ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नीलकंठ नारायण निरंजन निमाणा ","c":"नीलकंठ नारायण निरंजन निमाणा निआसरा निओटेआं , \nनानक प्रभ दीन दयाल देओ दान ।।\nअंगद अमरदास अमर भयो सोढी पातशाह गुरू रामदास भयो , \nदयाल नदर कर अरजन हरिगोबिंद को ।।\nहरि भयो हरि राय हरिकृशन को ।।\nहरिकृशन करता करीम करम पुरख गुरू तेग बहादुर जीओ ।।\nहरि हरि हरि गोबिंद राय दर्शन निमाणा करे बेनती , \nमेरा माण तू मेरा ताण ।।\n( यकीन )"},"en":{"t":"Neelkanth Narayan Niranjan Nimana","c":"Neelkanth Narayan Niranjan Nimana"}},

	{"id":1770044167838,
	"pb":{"t":"ਨੈਣ ਨਿਰੰਕਾਰ ਨਿਰੰਜਨ ਨਾਰਾਇਣ ਸੁਆਮੀ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਨੈਣ ਨਿਰੰਕਾਰ ਨਿਰੰਜਨ ਨਾਰਾਇਣ ਸੁਆਮੀ , \nਪੂਰਨ ਪੁਰਖ ਪਾਰਬ੍ਰਹਮ ਰਾ ਓਂਕਾਰਾ ॥\nਸੁਖ ਅਨੰਦ ਸੁਖਮਨੀ ਜਪੁ ਜਾਪੁ , \nਸਿਮਰਨ ਨਾਮ ਭਗਤ ਰਹਿਰਾਸ ਜੀਓ ॥\nਇਹਾਂ ਊਹਾਂ ਸੱਚਾ ਸੱਚ ਸਮਾਏ , \nਗੁਰਦੇਵਾ ਗੁਰਦੇਵ ਅੰਤਰ ਧਿਆਨ ,\nਦਰਸ਼ਨ ਸੁਰਤ ਸ਼ਬਦ ਅਨਹਦ ਲਿਵ ਲਾਏ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नैण निराकार निरंजन नारायण सुआमी ( शक्ति )","c":"( शक्ति )\nनैण निराकार निरंजन नारायण सुआमी , \nपूरण पुरख पारब्रह्म रा ओंकारा ।।\nसुख अनंद सुखमनी जप जाप , \nसिमरन नाम भगत रहिरास जीओ ।।\nइहां ऊहां सचा सच समाये , \nगुरदेवा गुरदेव अंतर धिआन , \nदर्शन सुरत शब्द अनहद लिव लाये ।।\n( यकीन )"},"en":{"t":"Nain Nirakar Niranjan Narayan Swami ( Shakti )","c":"Nain Nirakar Niranjan Narayan Swami ( Shakti )"}},

	{"id":1770044405083,
	"pb":{"t":"ਨੈਣ ਨੈਣਣ ਨੈਣਣ ਨਿਰੰਕਾਰ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਨੈਣ ਨੈਣਣ ਨੈਣਣ ਨਿਰੰਕਾਰ ,\nਨਿਰੰਜਨ ਨਿਰਵੈਰ ਨਿਰਭਉ ਨਿਰੰਕਾਰ ,\nਨਰ ਨਿਰੰਜਨ ਨਾਰਾਇਣ ਨਿਰੰਕਾਰ ॥\nਨਾਨਕ ਨੈਣਣ ਨਾਨਕ ਨੈਣਣ ਨਿਰੰਕਾਰ ,\nਓਂਕਾਰ ਸੈਭੰ ਅਜੂਨੀ ਸੁਖਮਣੀ , ਅਨੰਦ ਸਾਹਿਬ ਜਪੁਜੀ ਜੀਓ ॥\nਜਾਪੁ ਸਾਹਿਬ ਰਹਿਰਾਸ ਨਰ ਨਿਰੰਕਾਰ ॥\nਜਪੁ ਈਹਾਂ ਊਹਾਂ ਸੱਚ , ਓਹ ਕਲਿ ਮਾਹਿ ਸੱਚ ਸਮਾਏ ਅਵਤਾਰ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नैन नैनण नैननण निरंकार ( शक्ति )","c":"( शक्ति )\nनैन नैनण नैननण निरंकार , \nनिरंजन निरवैर निरभौ निरंकार , \nनर निरंजन नारायण निरंकार ।।\nनानक नैनण नानक नैननण निरंकार , \nओंकार सैभंग अजूनी सुखमणी , अनंद साहिब जपजी जीओ ।। \nजाप साहिब रहिरास नर निरंकार ।। \nजप ईहां ऊहां सच , ओह कलि माहि सच समाये अवतार ।।\n( यकीन )"},"en":{"t":"Nain Nainan Nainnan Nirankar ( Shakti )","c":"Nain Nainan Nainnan Nirankar ( Shakti )"}},

	{"id":1770044542315,
	"pb":{"t":"ਨੰਦ ਗੋਪਾਲ ਠਾਕੁਰ ਦਾਤਾਰ","c":"ਨੰਦ ਗੋਪਾਲ ਠਾਕੁਰ ਦਾਤਾਰ , ਜੋ ਕਰੇ ਸੋ ਕਰਤਾਰ ॥\nਤੂੰ ਪੂਰਨ ਪੁਰਖ ਨਾਨਕ ਸੁਜਾਨ ,\nਕਾਮ ਕ੍ਰੋਧ ਮੁਕਤ ਕੀਜੈ , ਮੇਰੇ ਹਰਿ ਕ੍ਰਿਸ਼ਨ ਭਗਵਾਨ ॥\nਨਾਮ ਸਿਮਰ ਦੁੱਖ ਕਟੇ ਜਾਣ ,\nਕਾਮਣ ਕੰਤ ਸੰਗ ਸੁਹਾਗਣ , ਦਰਸ਼ਨ ਪਿਰ ਬਿਨ ਮਰ ਜਾਣ ॥\n( ਯਕੀਨ )"},"hi":{"t":"नंद गोपाल ठाकुर दातार","c":"नंद गोपाल ठाकुर दातार , जो करे सो करतार ।।\nतूं पूरन पुरख नानक सुजान , \nकाम क्रोध मुक्त कीजै , मेरे हरि कृष्ण भगवान ।।\nनाम सिमर दुख कटे जाण , \nकामण कंत संग सुहागण , दर्शन पिर बिन मर जाण ।।\n( यकीन )"},"en":{"t":"Nand Gopal Thakur Datar","c":"Nand Gopal Thakur Datar"}},

	{"id":1770044638420,
	"pb":{"t":"ਪਹਿਲੇ ਘਰ ਤੋਂ ਇਕ ਸਜਾਇਆ","c":"ਪਹਿਲੇ ਘਰ ਤੋਂ ਇਕ ਸਜਾਇਆ ॥\nਤੀਜੇ ਘਰ ਤੋਂ ਬ੍ਰਹਮੰਡ ਰਚਾਇਆ ॥\nਚੌਥੇ ਘਰ ਤੋਂ ਓਂਕਾਰ ਵਰਤਾਇਆ ॥\nਪੰਜਵੇਂ ਘਰ ਤੋਂ ਮਨੁੱਖ ਸਜਾਇਆ ॥\n( ਯਕੀਨ )"},"hi":{"t":"पहले घर तों इक सजाया","c":"पहले घर तों इक सजाया , \nतीजे घर तों ब्रह्मण्ड रचाया , \nचौथे घर तों ओंकार वरताया , \nपँचवें घर तों मनुख सजाया ।।\n( यकीन )"},"en":{"t":"Pehle Ghar To Ik Sajaya","c":"Pehle Ghar To Ik Sajaya"}},

	{"id":1770045152949,
	"pb":{"t":"ਪੰਚ ਸਾ ਪੇ ਸਤਿਗੁਰ ਸੇਵਾ ( ਪਦਮ ਪਹਿਲਾ )","c":"( ਪਦਮ ਪੰਚਮਣੀ )\n\n( ਪਦਮ ਪਹਿਲਾ )\nਪੰਚ ਸਾ ਪੇ ਸਤਿਗੁਰ ਸੇਵਾ , ਪੰਚਮ ਸ਼ਬਦ ਅਨਹਦ ਲੇਵਾ ।।\nਪਹਿਲੇ ਸਾ ਪੇ ਸ਼ਹਾਦਤ ਪਾਵੇ , ਦੂਸਰੇ ਸਾ ਪੇ ਸੱਚ ਕਮਾਵੇ ।।\nਤੀਸਰੇ ਸਾ ਪੇ ਸਰਬੱਤ ਦਾ ਭਲਾ , ਚੌਥੇ ਸਾ ਪੇ ਸਿਦਕ ਸਰਬ ਕਲਾ ।।\nਪੰਚਮ ਸਾ ਪੇ ਸਾਧ ਕਾ ਸੰਗ , ਜਨ ਦਰਸ਼ਨ ਪ੍ਰਭ ਆਨੰਦ ਆਨੰਦ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पँच सा पे सतिगुर सेवा ( पदम पहला )","c":"( पदम पँचमणी )\n\n( पदम पहला )\nपँच सा पे सतिगुर सेवा , पँचम शब्द अनहद लेवा ।। \nपहले सा पे शहादत पावे , दूसरे सा पे सच कमावे ।।\nतीसरे सा पे सरबत्त दा भला , चौथे सा पे सिदक सरब कला ।।\nपंचम सा पे साध का संग , जन दर्शन प्रभ आनंद आनंद ।।"},"en":{"t":"Panch Sa Pe Satguru Sewa ( Padam Pehla )","c":"Panch Sa Pe Satguru Sewa ( Padam Pehla )"}},

	{"id":1770045532249,
	"pb":{"t":"ਪੰਚ ਸਾ ਪੇ ਜਾਉਂ ਕੁਰਬਾਨ","c":"( ਪਦਮ ਦੂਸਰਾ )\nਪੰਚ ਸਾ ਪੇ ਜਾਉਂ ਕੁਰਬਾਨ , ਪੰਚਮ ਆਪੇ ਲਾਗੇ ਧਿਆਨ ।।\nਪੰਚ ਸਾ ਪੇ ਉੱਤਮ ਸੰਗਤ , ਪੰਚਮ ਲਾਲ ਲਾਲ ਕੀ ਰੰਗਤ ।।\nਪੰਚ ਸਾ ਪੇ ਉਪਜੇ ਪ੍ਰੇਮ , ਪੰਚ ਸਾ ਦਾਤੇ ਕੀ ਦੇਣ ।।\nਪੰਚ ਸਾ ਪੇ ਆਵੇ ਗਿਆਨ , ਦਰਸ਼ਨ ਜਨ ਕੋ ਪ੍ਰਭ ਕਾ ਫਰਮਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पँच सा पे जाऊँ कुरबान ( पदम दूसरा )","c":"( पदम दूसरा )\nपँच सा पे जाऊँ कुरबान , पँचम आपे लागे धिआन ।। \nपँच सा पे उत्तम संगत , पँचम लाल लाल की रंगत ।। \nपँच सा पे उपजे प्रेम , पँच सा दाते की देण ।।\nपँच सा पे आवे गिआन , दर्शन जन को प्रभ का फरमान ।।\n( यकीन )"},"en":{"t":"Panch Sa Pe Jau Kurban ( Padam Dusra )","c":"Panch Sa Pe Jau Kurban ( Padam Dusra )"}},

	{"id":1770052303329,
	"pb":{"t":"ਪਤਿਤ ਪਾਵਨ ਪ੍ਰੀਤਮ ਗੋਸਾਈ ( ਦੋਹਾ )","c":"( ਦੋਹਾ )\nਪਤਿਤ ਪਾਵਨ ਪ੍ਰੀਤਮ ਗੋਸਾਈ , ਤੁਝ ਬਿਨ ਸਾਜਨੜੇ ਮਰ ਜਾਈ ,\nਮਰਨੇ ਸੇ ਜਗ ਸਭ ਡਰੇਓ , ਤੇਰੇ ਭਗਤ ਕੋ ਭੈ ਨਾਹੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पतित पावन प्रीतम गोसाई ( दोहा )","c":"( दोहा )\nपतित पावन प्रीतम गोसाई , तुझ बिन साजनड़े मर जाई , \nमरने से जग सभ डरेओ , तेरे भगत को भै नाही ।।\n( यकीन )"},"en":{"t":"Patit Paavan Pritam Gosai ( Doha )","c":"Patit Paavan Pritam Gosai ( Doha )"}},

	{"id":1770052453036,
	"pb":{"t":"ਪ੍ਰਭ ਸੁਖਦਾਈ ਸਤਿਗੁਰ ਦਿਆਲ","c":"ਪ੍ਰਭ ਸੁਖਦਾਈ ਸਤਿਗੁਰ ਦਿਆਲ , \nਸਾਜਨ ਮੀਤ ਮੁਰਾਰੇ ।।\nਨਾਮ ਬਿਸਾਰ ਮਰ ਜਾਊਂ , \nਚਰਨ ਕਮਲ ਚਿੱਤ ਧਾਰੇ ।।\nਚੌਂਹ ਵਰਣੋਂ ਸੇ ਇਕ ਵਰਣ ਹੋਸੀ ,\nਦਰਸ਼ਨ ਨੀਚ ਪੁਕਾਰੇ ਹਰਿ ਰਾਇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"प्रभ सुखदाई सतिगुर दयाल","c":"प्रभ सुखदाई सतिगुर दयाल , \nसाजन मीत मुरारे ।।\nनाम बिसार मर जाऊँ , \nचरन कमल चित्त धारे ।।\nचौंह वरणों से इक वरण होसी , \nदर्शन नीच पुकारे हरि राय ।।\n( यकीन )"},"en":{"t":"Prabh Sukhdai Satguru Dayaal","c":"Prabh Sukhdai Satguru Dayaal"}},

	{"id":1770052862632,
	"pb":{"t":"ਪ੍ਰਭ ਜੀਓ ਮੈਂ ਆਯੋ ਸ਼ਰਣ ਤੁਮਾਰੀ","c":"ਪ੍ਰਭ ਜੀਓ ਮੈਂ ਆਯੋ ਸ਼ਰਣ ਤੁਮਾਰੀ ,\nਚਿੰਤਾ ਮਿਟੈ ਮੇਰੇ ਮਨ ਤਨ ਕੀ , ਕਲਹ ਕਲੇਸ਼ ਨਿਵਾਰੀ ॥\nਜਾਪ ਤਾਪ ਕਰਨਾ ਨਾ ਜਾਣੋ , ਨਾ ਕੀਓ ਤੀਰਥ ਧਾਮ ,\nਨਾ ਫੇਰੂੰ ਮਾਲਾ ਮਣਕੇ , ਜਬ ਇਨਕਾ ਭੇਦ ਨਾ ਜਾਣੀ ॥\nਦੇਸ਼ ਬੇਗਾਨਾ ਪਰਦੇਸੀ ਪੀਆ , ਜਗ ਕੀ ਰੀਤ ਨਿਰਾਲੀ ,\nਸਾਕ ਸੰਗ ਸਭ ਝੂਠੇ ਨਾਤੇ , ਸੱਚੀ ਪ੍ਰੀਤ ਤੁਮਾਰੀ ॥\nਤੂੰ ਅੰਤਰਯਾਮੀ ਮੇਰਾ ਸੁਆਮੀ , ਕਣ ਕਣ ਤੇਰਾ ਬਸੇਰਾ ,\nਜਲ ਥਲ ਗਗਨ ਤੂੰ ਸਰਬ ਵਿਆਪੀ , ਦਰਸ਼ਨ ਏਹ ਖੇਡ ਨਿਆਰੀ ॥\n( ਯਕੀਨ )"},"hi":{"t":"प्रभ जीओ मैं आयो शरण तुमारी","c":"प्रभ जीओ मैं आयो शरण तुमारी , \nचिंता मिटै मेरे मन तन की , कलह कलेश निवारी ।। \nजाप ताप करना ना जानो , ना कीओ तीरथ धाम , \nना फेरूँ माला मणके , जब इनका भेद ना जाणी ।।\nदेश बेगाना परदेसी पीआ , जग की रीत निराली ,\nसाक संग सभ झूठे नाते , सच्ची प्रीत तुमारी ।।\nतूं अंतरयामी मेरा सुआमी , कण कण तेरा बसेरा , \nजल थल गगन तँ सरब विआपी , दर्शन एह खेड निआरी ।।\n( यकीन )"},"en":{"t":"Prabh Jiyo Mein Aayo Sharan Tumari","c":"Prabh Jiyo Mein Aayo Sharan Tumari"}},

	{"id":1770053107414,
	"pb":{"t":"ਪ੍ਰਭ ਜੀਓ ਮੋਹੇ ਨਾਮ ਦੀਜੋ","c":"ਪ੍ਰਭ ਜੀਓ ਮੋਹੇ ਨਾਮ ਦੀਜੋ , ਤੇਰੇ ਬੇਅੰਤ ਭਰੇ ਭੰਡਾਰ ॥\nਕੋਟ ਅਪਰਾਧ ਹਮ ਕੀਨੋ , ਤੁਮ ਹੋ ਦਾਤਾ ਬਖਸ਼ਣਹਾਰ ॥\nਊਚ ਅਪਾਰ ਤੇਰੀ ਮਹਿਮਾ , ਤੇਰੇ ਭਗਤ ਤੇਰੇ ਸਹਾਰੇ ॥\nਹਮ ਪੇ ਦਯਾ ਦਾਨ ਕੀਜੋ , ਚਰਨ ਪ੍ਰੀਤ ਲਾਗੀ ਮੋਹੇ ਪਿਆਰੇ ॥\nਤੁਮ ਪੇ ਆਸਾ ਤੁਮ ਪੇ ਓਟ , ਤੇਰੇ ਖੇਲ ਸਭ ਸੇ ਨਿਆਰੇ ॥\nਦਰਸ਼ਨ ਕਹੇ ਕਰੋ ਕਰਮ ਗੋਸਾਈ , ਅਬ ਨਾਹੀਂ ਕੋਈ ਬਿਨਾ ਤੁਮਾਰੇ ॥\n( ਯਕੀਨ )"},"hi":{"t":"प्रभ जीओ मोहे नाम दीजो","c":"प्रभ जीओ मोहे नाम दीजो , तेरे बेअंत भरे भंडार ।।\nकोट अपराध हम कीनो , तुम हो दाता बख्शणहार ।। \nऊच अपार तेरी महिमा , तेरे भगत तेरे सहारे ।। \nहम पे दया दान कीजो , चरन प्रीत लागी मोहे पिआरे ।। \nतुम पे आसा तुम पे ओट , तेरे खेल सभ से निआरे ।।\nदर्शन कहे करो करम गोसाई , अब नाहीं कोई बिना तुमारे ।।\n( यकीन )"},"en":{"t":"Prabh Jiyo Mohe Naam Dijo","c":"Prabh Jiyo Mohe Naam Dijo"}},

	{"id":1770054444606,
	"pb":{"t":"ਸਾਹਿਬ ਮੇਰੋ ਮੇਹਰਬਾਨ ਭਯੋ","c":"ਸਾਹਿਬ ਮੇਰੋ ਮੇਹਰਬਾਨ ਭਯੋ , ਸੰਤ ਸੰਗ ਹਰਿ ਨਾਮੁ ਧਿਆਇਆ ॥\nਪ੍ਰਭ ਦਰਗਾਹੇ ਸੰਤ ਕੀ ਸੋਭਾ , ਸਤਿਗੁਰੂ ਸ਼ਰਨ ਲਿਵ ਲਾਇਆ ॥\nਜਗ ਮਾਇਆ ਖੇਲ ਰਚਾ ਕੇ , ਹਰਿ ਆਪਣਾ ਭੇਦ ਛੁਪਾਇਆ ॥\nਭਗਤ ਭਉ ਭਰਮ ਨਾਹੀ ਠਾਕੁਰ , ਗੁਰਦੇਵਾ ਜਮ ਫੰਦਾ ਛੁਡਾਇਆ ॥\nਜਨ ਦਰਸ਼ਨ ਕਰਤਾ ਆਪ , ਆਦਿ ਜੁਗਾਦਿ ਸਮਾਇਆ ॥\n( ਯਕੀਨ )"},"hi":{"t":"साहिब मेरो मेहरबान भयो","c":"साहिब मेरो मेहरबान भयो , संत संग हरि नाम धिआया ।। \nप्रभ दरगाहे संत की सोभा , सतिगुरू शरन लिव लाया ।। \nजग माया खेल रचा के , हरि आपणा भेद छुपाया ।। \nभगत भौ भरम नाही ठाकुर , गुरदेवा जम फंदा छुडाया ।। \nजन दर्शन करता आप , आदि जुगादि समाया ।।\n( यकीन )"},"en":{"t":"Sahib Mero Meharban Bhayo","c":"Sahib Mero Meharban Bhayo\nPrabh Dargahe Sant Ki Sobha"}},

	{"id":1770054850263,
	"pb":{"t":"ਪੰਚ ਤਨ ਕੀਓ ਪਰਧਾਨਾ ( ਪਦਮ ਪਹਿਲਾ )","c":"ਪੰਚ ਤਨ ਕੀਓ ਪਰਧਾਨਾ , ਪੰਚਮ ਕੋ ਦੀਓ ਜੁਗ ਜੁਗ ਮਾਨਾ ।।\nਪੰਚ ਤਨ ਕੋ ਮਿਲਣੇ ਕੀ ਬਾਰੀ , ਪੰਚਮ ਮਾਹਿ ਸੋਝ ਤੁਮਾਰੀ ।।\nਪੰਚਮ ਸ਼੍ਰੇਸ਼ਟ ਨਾ ਸ਼ਾਸਤ੍ਰ ਬੇਦ , ਪੰਚਮ ਮਾਹਿ ਨਾ ਤੁਮਰਾ ਭੇਦ ।।\nਪੰਚ ਯਸ਼ਵੰਤੀ ਵਸੇ ਪਿਆਰੀ , ਪੰਚਮ ਸ਼ਬਦ ਸੁਰਤ ਨਾਮ ਖੁਮਾਰੀ ।।\nਪੰਚਮ ਚੌਰਾਸੀ ਰਹੇ ਨਿਆਰਾ , ਪੰਚਮ ਉਪਜੇ ਪ੍ਰੇਮ ਤੁਮਾਰਾ ।।\nਪੰਚ ਸਫਲ ਸੇਵ ਕਮਾਈ , ਪੰਚਮ ਪ੍ਰਥਮ ਮਹਿਮਾ ਗਾਈ ।।\nਪੰਚ ਤੀਰਥ ਅਠਸਠਿ ਇਸ਼ਨਾਨੀ , ਪੰਚਮ ਗਿਆਨ ਗੂੜ ਗਿਆਨੀ ।।\nਪੰਚ ਮੋਹ ਮਮਤਾ ਤਿਹਾਰੀ , ਪੰਚਮ ਦਰਸ਼ਨ ਜਾਏ ਬਲਿਹਾਰੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पँच तन कीओ परधाना ( पदम पहला )","c":"( पदम पहला )\nपँच तन कीओ परधाना , पँचम को दीओ जुग जुग माना ।। \nपँच तन को मिलणे की बारी , पँचम माहि सोझ तुमारी ।। \nपँचम श्रेष्ट ना शास्त्र बेद , पंचम माहि ना तुमरा भेद ।। \nपँच यशवंती वसे पिआरी , पँचम शब्द सुरत नाम खुमारी ।। \nपँचम चौरासी रहे निआरा , पंचम उपजै प्रेम तुमारा ।। \nपँच सफल सेव कमाई , पंचम प्रथम महिमा गाई ।।\nपँच तीरथ अठसठि इश्नानी , पंचम गिआन गूढ़ गिआनी ।।\nपँच मोह ममता तिहारी , पँचम दर्शन जाये बलिहारी ।। \n( यकीन )"},"en":{"t":"Panch Tan Kiyo Pardhana ( Padam Pehla )","c":"Panch Tan Kiyo Pardhana ( Padam Pehla )"}},
	{"id":1770055261685,
	"pb":{"t":"ਪੰਚਮ ਬਸਤ ਪੰਚ ਵਿਕਾਰ","c":"ਪੰਚਮ ਬਸਤ ਪੰਚ ਵਿਕਾਰ , ਕਾਮ ਕ੍ਰੋਧ ਲੋਭ ਮੋਹ ਹੰਕਾਰ ।।\nਪੰਚਮ ਮਨ ਹੁਕਮ ਚਲਾਏ , ਪੰਚਮ ਜਮ ਜਮ ਚੋਟਾਂ ਖਾਏ ।।\nਪੰਚਮ ਜਨ ਦਰਗਾਹਿ ਸਤਿਕਾਰ , ਪੰਚਮ ਬਿਨ ਨਾ ਮੁਕਤ ਅਧਾਰ ।।\nਪੰਚਮ ਛੱਤੀ ਪਦਾਰਥ ਬਨਸਪਤ , ਪੰਚਮ ਰਾਸ ਸੇਵਾ ਸਤਿਗੁਰ ।।\nਪੰਚਮ ਹਰਿ ਪ੍ਰਭ ਰਹੇਓ ਭਰਪੂਰ , ਪੰਚਮ ਧੁਨ ਨਾਦ ਹਾਦਰਾ ਹਦੂਰ ।।\nਪੰਚਮ ਹਰਿ ਆਪੇ ਰੂਪ , ਪੰਚਮ ਹਰਿ ਦਰਸ਼ਨ ਪੱਕਾ ਸਬੂਤ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पँचम बसत पँच विकार","c":"पँचम बसत पँच विकार , काम क्रोध लोभ मोह हंकार ।। \nपँचम मन हुकम चलाये , पँचम जम जम चोटां खाये ।।\nपँचम जन दरगाहि सतिकार , पँचम बिन ना मुक्त अधार ।। \nपँचम छत्ती पदारथ बनसपत , पंचम रास सेवा सतिगुर ।। \nपँचम हरि प्रभ रहेओ भरपूर , पंचम धन नाद हादरा हदूर ।। \nपंचम हरि आपे रूप , पँचम हरि दर्शन पक्का सबूत ।।\n( यकीन )"},"en":{"t":"Pancham Basat Panch Vikar","c":"Pancham Basat Panch Vikar"}},

	{"id":1770055813184,
	"pb":{"t":"ਪੀੜ ਪਤਿਤ ਪਾਵਨ ਪ੍ਰਿਤਪਾਲ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਪੀੜ ਪਤਿਤ ਪਾਵਨ ਪ੍ਰਿਤਪਾਲ ਗੋਸਾਈ , \nਤੁਝ ਬਿਨ ਨੀਂਦ ਨੈਣਣ ਨਾ ਆਏ ।।\nਦਿਓ ਦਰਸ ਪ੍ਰਭ ਅਬਿਨਾਸੀ , ਪੀੜ ਪੂਰੇ ਸਤਿਗੁਰ ਸੰਗ ਜਾਸੀ ।।\nਤੁਝੇ ਧਿਆਇਆ ਮਹਾਂ ਪਰਮ ਪਦ ਪਾਇਆ ਹਰਿ ਰਾਇਆ ।।\nਪਉੜੀ ਪੀੜ ਪੂਰੇ ਪ੍ਰਭ ਦਰਸ਼ਨ , ਅਗੰਮ ਗੋਸਾਈਂ ਹਉ ਤੂੰ ਮਾਨ ਜਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"पीड़ पतित पावन प्रितपाल ( शक्ति )","c":"( शक्ति )\nपीड़ पतित पावन प्रितपाल गोसाई , \nतुझ बिन नींद नैनण ना आये ।।\nदेओ दरस प्रभ अबिनासी , पीड़ पूरे सतिगुर संग जासी ।।\nतुझे धिआया महां परम पद पाया हरि राया ।।\nपउड़ी पीड़ पूरे प्रभ दर्शन , अगंम गोसांई हउ तूं मान जाई ।।\n( यकीन )"},"en":{"t":"Peed Patit Paavan Pritpaal ( Shakti )","c":"Peed Patit Paavan Pritpaal ( Shakti )"}},

	{"id":1770056190183,
	"pb":{"t":"ਬੰਧਨ ਮੁਕਤ ਹਰਿ ਦਰਸ਼ਨ ਕਉ","c":"ਬੰਧਨ ਮੁਕਤ ਹਰਿ ਦਰਸ਼ਨ ਕਉ , ਦਯਾ ਦਾਨ ਹਰਿ ਜਨ ਕਉ ।।\nਸਾਧੂ ਸੰਗ ਜਿਸੁ ਹਰਿ ਹਰਿ ਜਪਿਆ , ਮੁਕਤਿ ਭੁਗਤਿ ਜੁਗਤਿ ਗੁਰ ਪ੍ਰਸਾਦਿ ।।\nਤੁਧੁ ਜਾਣਿਆ ਹਰਿ ਮਨੁ ਮਾਨਿਆ , ਮੋਹ ਮਮਤਾ ਛੂਟਿ ਜਾਈ ।।\nਮੁਗਧ ਅਗਾਧ ਨਾਨਕ , ਦਰਸ਼ਨ ਪ੍ਰਭ ਹਰਿ ਥਾਂਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"बंधन मुक्त हरि दर्शन कओ","c":"बंधन मुक्त हरि दर्शन कओ , दया दान हरि जन कओ ।।\nसाधू संग जिस हरि हरि जपेआ , मुक्त भुगत जुगत गुर प्रसादि ।। \nतुध जाणेआ हरि मन मानेआ , मोह ममता छूट जाई ।। \nमुगध अगाध नानक , दर्शन प्रभ हर थांई ।।\n( यकीन )"},"en":{"t":"Bandhan Mukt Hari Darshan Kayo","c":"Bandhan Mukt Hari Darshan Kayo"}},

	{"id":1770056506655,
	"pb":{"t":"ਬਿਨੁ ਮਾਂਗੇ ਸਭ ਕਿਛੁ ਦੀਓ ( ਸ਼ਲੋਕ )","c":"( ਸ਼ਲੋਕ )\nਬਿਨੁ ਮਾਂਗੇ ਸਭ ਕਿਛੁ ਦੀਓ ਦੀਨਾ ਨਾਥ ,\nਮਨ ਕੀ ਆਸਾ ਪੂਰੀ ਕਰਦਾ ਰਾਖੈ ਦਾਸਨ ਕੀ ਲਾਜ ।।\nਐਸਾ ਦਿਆਲ ਪੁਰਖ ਮੇਹਰਬਾਨਾ , ਕੋਟ ਕੋਟਨ ਮੇਂ ਏਕ ,\nਸਭਨਾਂ ਦੇਵੇ ਦੇਵਨਹਾਰਾ , ਦਰਸ਼ਨ ਧਾਰੇ ਰੂਪ ਅਨੇਕ ।।\n( ਯਕੀਨ )"},"hi":{"t":"बिन मांगे सभ किछ दीओ ( श्लोक )","c":"( श्लोक )\nबिन मांगे सभ किछ दीओ दीना नाथ , \nमन की आसा पूरी करदा राखै दासन की लाज ।। \nऐसा दयाल पुरख मेहरबाना , कोट कोटन में एक , \nसभनां देवे देवनहारा , दर्शन धारे रूप अनेक ।।\n( यकीन )"},"en":{"t":"Bin Maange Sabh Kichh Diyo ( Shlok )","c":"Bin Maange Sabh Kichh Diyo ( Shlok )"}},

	{"id":1770056696927,
	"pb":{"t":"ਬੇ-ਡਰ ਬੇ-ਵੈਰੀ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਬੇ-ਡਰ ਬੇ-ਵੈਰੀ ਬੇ-ਅਵਾਜ਼ਾ ਨਾਦ ਵਜੇ ਅਨਹਦ ਬੇ-ਵਜੂਦ ,\nਬਾ-ਵਜੂਦ ਬਾ-ਪਰਵਾਹ ਬੰਧਨਾ ਬਾਂਧੀ ਬਾਂਧੇ ਬਾਂਧਨਹਾਰ ।।\nਬਿਨੁ ਗੁਰ ਬਾਂਧੀ ਨਾ ਛੂਟੇ ਨਾਨਕ ਬਾਰ ਬਾਰ ਨਮਸਕਾਰ ।।\n( ਯਕੀਨ )"},"hi":{"t":"बे-डर बे-वैरी ( शक्ति )","c":"( शक्ति )\nबे-डर बे-वैरी बे-अवाजा नाद वजे अनहद बे-वजूद , \nबा-वजूद बा-परवाह बंधना बांधी बांधे बांधनहार ।। \nबिन गुर बांधी ना छूटे नानक बार बार नमस्कार ।।\n( यकीन )"},"en":{"t":"Be-Dar Be-Vairi ( Shakti )","c":"Be-Dar Be-Vairi ( Shakti )"}},

	{"id":1770057042493,
	"pb":{"t":"ਭਗਤ ਕਮਾਈ ਠਾਕੁਰ ਤੁਧ ਤੇ ਪਾਈ","c":"ਭਗਤ ਕਮਾਈ ਠਾਕੁਰ ਤੁਧ ਤੇ ਪਾਈ , ਨਾਮ ਦੀਜੋ ਦਾਨ ਮੇਰੇ ਰਾਮ ਰਘੁਰਾਈ ॥\nਗੁਰੂ ਨਾਨਕ ਪੂਰੇ ਸਤਿਗੁਰੂ ਗੋਸਾਂਈ ਜੀਓ , \nਕਿਰਪਾ ਕਿਰਪਾਲ ਘਰ ਮਾਹਿ ਵਸਿਆ ॥\nਹਰਿ ਹਰਿ ਸਿਮਰੋ ਮੁਗਧ ਅਘਾਈ ,\nਜਿਨਹੀ ਦੀਓ ਜਨਮ ਤੋਹੇ , ਸੋਈ ਪ੍ਰਭ ਤੁਧ ਸਹਾਈ ॥\nਸੁਣੀ ਸੱਚੀ ਬਾਣੀ ਗੋਬਿੰਦ ਤੁਮਾਰੀ ਜੀਓ , ਮਨ ਤ੍ਰਿਪਤ ਤਨ ਸ਼ਾਂਤ ਹੋ ਜਾਈ ॥\nਦਰਸ਼ਨ ਦਾਸ ਦਾਸੋਂ ਕੇ ਦਾਸ ਹਰਿ ਜੀਓ , \nਸੱਚ ਸੇਵਾ ਸਫਲ ਹੋਵੇ ਘੋਲ ਕਮਾਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"भगत कमाई ठाकुर तुध ते पाई","c":"भगत कमाई ठाकुर तुध ते पाई , नाम दीजो दान मेरे राम रघुराई ।।\nगुरू नानक पूरे सतिगुरू गोसांई जीओ , \nकिरपा किरपाल घर माहि वसेआ ।।\nहरि हरि सिमरो मुगध अघाई , \nजिनही दीओ जनम तोहे , सोई प्रभ तुध सहाई ।। \nसुणी सच्ची बाणी गोबिंद तुमारी जीओ , मन तृप्त तन शांत हो जाई ।।\nदर्शन दास दासों के दास हरि जीओ , \nसच सेवा सफल होवे घोल कमाई ।।\n( यकीन )"},"en":{"t":"Bhagat Kamai Thakur Tudh Te Payi","c":"Bhagat Kamai Thakur Tudh Te Payi"}},

	{"id":1770057355409,
	"pb":{"t":"ਭਗਤ ਕਮਾਈ ਗੁਰ ਤੁਝ ਤੇ ਪਾਈ","c":"ਭਗਤ ਕਮਾਈ ਗੁਰ ਤੁਝ ਤੇ ਪਾਈ ,\nਸੇਵ ਕਮਾਵਾਂ ਨਾਮ ਜਪਾਵਾਂ , ਜੋ ਬਖਸ਼ੋ ਤੁਮ ਵਡਿਆਈ ।।\nਹਮ ਠਹਿਰੇ ਨੀਚ ਤੁਮ ਹੋ ਊਚ ਗੋਬਿੰਦ ,\nਹਥ ਜੋੜ ਕਰਾਂ ਬੰਦਨਾ , ਗੁਰਮਤਿ ਦੀਜੈ ਰਾਮ ਰਘੁਰਾਈ ।।\nਖਿਂਨ ਖਿਂਨ ਭੂਲਣਹਾਰ ਹਮ ਪਾਪੀ , ਮਨ ਬਾਵਰਾ ਆਤਮ ਕੁਰਲਾਤੀ ,\nਬਖਸ਼ਣਹਾਰ ਕੀਜੋ ਮੇਹਰ ਦਰਸ਼ਨ ਤੁਮ ਪੇ ਆਸ ਲਗਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"भगत कमाई गुर तुझ ते पाई","c":"भगत कमाई गुर तुझ ते पाई , \nसेव कमावां नाम जपावां , जो बख्शो तुम वडियाई ।।\nहम ठहिरे नीच तुम हो ऊच गोबिंद , \nहथ जोड़ करां बंदना , गुरमति दीजै राम रघुराई ।।\nखिंन खिंन भूलणहार हम पापी , मन बावरा आतम कुरलाती , \nबख्शणहार कीजो मेहर दर्शन तुम पे आस लगाई ।।\n( यकीन )"},"en":{"t":"Bhagat Kamai Guru Tujh Te Payi","c":"Bhagat Kamai Guru Tujh Te Payi"}},

	{"id":1770057548408,
	"pb":{"t":"ਭਲੇ ਚੰਗੇ ਪ੍ਰਿਤਪਾਲ ਠਾਕੁਰ ਜੀਓ","c":"ਭਲੇ ਚੰਗੇ ਪ੍ਰਿਤਪਾਲ ਠਾਕੁਰ ਜੀਓ , ਤੁਝ ਬਿਨੁ ਕੌਣ ਜਾਣੇ ਹਰਿ ਰਾਇ ॥\nਯਾ ਯਕੀਨ ਯਕੂਬ ਯਾ ਮੁਹੰਮਦ ਅੱਲਾ ਰਾਮ ਰਹੀਮ ॥\nਯਾ ਜਾਣਣਹਾਰ ਪ੍ਰਭ ਦੀਨ ਦਿਆਲ ਤੁਝ ਮਾਹਿ ਸਮਾਈ ॥\nਯਾ ਹੱਕ ਯਕੀਨ ਰੱਖ ਪ੍ਰਭ ਸੁਖਦਾਈ , ਦਿਓ ਹਰਿ ਨਾਮ ਪਿਆਰੇ ॥\nਯਾ ਹੱਕ ਨੂਰ ਸਮਾਧੀ ਅੰਤਰਯਾਮੀ ਅਬਿਨਾਸੀ ,\nਦਰਸ਼ਨ ਦਾਸ ਤੇਰੀ ਸ਼ਰਨਾਈ ॥\n( ਯਕੀਨ )"},"hi":{"t":"भले चंगे प्रितपाल ठाकुर जीओ","c":"भले चंगे प्रितपाल ठाकुर जीओ , तुझ बिन कौण जाणे हरि राय ।।\nया यकीन यकूब या मुहम्मद अल्ला राम रहीम ।।\nया जानणहार प्रभ दीन दयाल तुझ माहि समाई ।।\nया हक्क यकीन रख प्रभ सुखदाई , देओ हरि नाम पिआरे ।।\nया हक्क नूर समाधी अंतरयामी अबिनासी , \nदर्शन दास तेरी शरनाई ।।\n( यकीन )"},"en":{"t":"Bhale Change Pritpal Thakur Jiyo","c":"Bhale Change Pritpal Thakur Jiyo"}},

	{"id":1770059433993,
	"pb":{"t":"ਮਹਾਦੇਵ ਗੁਰੂ ਬ੍ਰਹਮਾ ਵਿਸ਼ਨੂੰ ( ਸ਼ਕਤੀ )","c":"( ਸ਼ਕਤੀ )\nਮਹਾਦੇਵ ਗੁਰੂ ਬ੍ਰਹਮਾ ਵਿਸ਼ਨੂੰ , \nਗੁਰੂ ਜਗਤ ਜਨਨੀ ਮਾਈ ।।\nਜੁਗਾਂ ਜੁਗੰਤਰ ਥਾਨ ਥਨੰਤਰ ਰਹਿ ਰਵੈ ਗੁਰਦੇਵਾ ।।\nਸੁਝਏ ਗੁਰਮੁਖ ਰਜ਼ਾ ਪਾਈ , \nਦਰਸ਼ਨ ਪ੍ਰੀਤ ਗੁਰ ਚਰਨੀ ਲਾਈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"महादेव गुरू ब्रह्मा विशनूँ ( शक्ति )","c":"( शक्ति )\nमहादेव गुरू ब्रह्मा विशनूँ , \nगुरू जगत जननी माई ।।\nजुगां जुगंतर थान थनंतर रह रवै गुरदेवा ।।\nसुझये गुरमुख रज़ा पाई , \nदर्शन प्रीत गुर चरनी लाई ।।\n( यकीन )"},"en":{"t":"Mahadev Guru Brahma Vishnu ( Shakti )","c":"Mahadev Guru Brahma Vishnu ( Shakti )"}},

	{"id":1770142290404,
	"pb":{"t":"ਮਨ ਤੂੰ ਕਾਹੇ ਕਰੇ ਚਤੁਰਾਈ","c":"ਮਨ ਤੂੰ ਕਾਹੇ ਕਰੇ ਚਤੁਰਾਈ ,\nਰਾਮ ਨਾਮ ਧਨ ਪਾਯੋ ਨਾਹੀ , ਬਿਰਥਾ ਉਮਰ ਗਵਾਈ ।।\nਵਡਭਾਗੀ ਮਿਲੇ ਗੁਰ ਕੇ ਦਰਸ਼ਨ ,\nਬਿਨੁ ਗੁਰ ਜੋਗੀ ਦਰ ਦਰ ਭਟਕਣ , ਗੁਰ ਬਿਨੁ ਗਿਆਨ ਨਾ ਭਾਈ ।।\nਗੁਰ ਕੇ ਪਾਸ ਨਾਮ ਭੰਡਾਰ , ਨਾਮੈ ਪਾਯੋ ਮੁਕਤ ਦਵਾਰ ,\nਹੋਣਗੇ ਦਰਸ ਗੋਸਾਈਂ ।।\nਸਾਧ ਸੰਗਤ ਮਨ ਨਿਰਮਲ ਹੋਏ ,\nਕੋਟ ਜਨਮ ਕੀ ਗੁਰੂ ਮੈਲ ਧੋਏ , ਦਰਸ਼ਨ ਛੂਟੈ ਜਮ ਕੀ ਫਾਹੀ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मन तूं काहे करे चतुराई","c":"मन तूं काहे करे चतुराई , \nराम नाम धन पायो नाही , बिरथा उमर गवाई ।।\nवडभागी मिले गुर के दर्शन , \nबिन गुर जोगी दर दर भटकण , गुर बिन गिआन ना भाई ।।\nगुर के पास नाम भंडार , नामै पायो मुक्त दवार ,\nहोंगे दरस गोसांई ।।\nसाध संगत मन निरमल होये , \nकोट जनम की गुरू मैल धोये , दर्शन छूटै जम की फाही ।।\n( यकीन )"},"en":{"t":"Man Tu Kahe Kare Chaturai","c":"Man Tu Kahe Kare Chaturai"}},

	{"id":1770142451024,
	"pb":{"t":"ਮਨ ਵਿੱਚ ਪਿਆਸ ਨਿੱਤ ਸਤਾਵੇ","c":"ਮਨ ਵਿੱਚ ਪਿਆਸ ਨਿੱਤ ਸਤਾਵੇ , ਭੁੱਖ ਪਿਆਰ ਦੀ ਵਧਦੀ ਜਾਵੇ ।।\nਨੈਣ ਮੇਰੇ ਨੀਰ ਨਾ ਵਿਹਾਵੇ , ਤੁਧ ਬਿਨ ਨੈਣਣ ਨੀਂਦ ਨਾ ਆਵੇ ।।\nਨਾ ਮਨ ਮੰਨੇ ਨਾ ਅੱਖਾਂ ਸੌਣ , ਨਾ ਸੁਪਨੇ ਵਿੱਚ ਖਿਆਲ ਆਉਣ ।।\nਦਰਸ਼ਨ ਜਨ ਫਿਰ ਵੀ ਤੁਮ੍ਹੇਂ ਨਾ ਭੁਲਾਵੇ ,\nਤੁਧ ਬਿਨ ਨੈਣਣ ਨੀਂਦ ਨਾ ਆਵੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मन में पिआस नित्त सतावे","c":"मन में पिआस नित्त सतावे , भुख पिआर दी वधदी जावे ।। \nनैन मेरे नीर ना विहावे , तुध बिन नैनण नींद ना आवे ।। \nना मन मन्ने ना अखां सौण , ना सुपने विच खिआल औण ।। \nदर्शन जन फिर वी तुमहें ना भुलावे , \nतुध बिन नैनण नींद ना आवे ।।\n( यकीन )"},"en":{"t":"Man Mein Pyas Nit Satave","c":"Man Mein Pyas Nit Satave"}},

	{"id":1770142617784,
	"pb":{"t":"ਮਨਮੁਖ ਉਪਜੇ ਪੰਚ ਵਿਕਾਰਾ","c":"ਮਨਮੁਖ ਉਪਜੇ ਪੰਚ ਵਿਕਾਰਾ , ਗੁਰਮੁਖ ਹਿਰਦੇ ਵਸੇ ਦਾਤਾਰਾ ।।\nਮਨਮੁਖ ਦੋਖੀ ਦੂਖ ਕਮਾਵੈ , ਗੁਰਮੁਖ ਨਾਮ ਸ਼ਬਦ ਲਿਵ ਲਾਵੈ ।।\nਮਨਮੁਖ ਮਨ ਨਾ ਆਵੇ ਸ਼ਾਂਤ , ਗੁਰਮੁਖ ਗੁਰ ਕਿਰਪਾ ਪਾਵੈ ਇਕਾਂਤ ।।\nਮਨਮੁਖ ਹੋਸੀ ਪ੍ਰੀਤ ਪਰਾਈ , ਗੁਰਮੁਖ ਸੱਚ ਸੱਚਾ ਪ੍ਰੇਮ ਰਘੁਰਾਈ ।।\nਜਨ ਦਰਸ਼ਨ ਦਾਸ ਬਣ ਐਸਾ , ਗੁਰਮੁਖ ਨਾਮੇ ਛੀਂਬੇ ਜੈਸਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मनमुख उपजे पँच विकारा","c":"मनमुख उपजे पँच विकारा , गुरमुख हिरवे वसे दातारा ।।\nमनमुख दोखी दूख कमावै , गुरमुख नाम शब्द लिव लावै ।।\nमनमुख मन ना आवे शांत , गुरमुख गुर किरपा पावै एकांत ।। \nमनमुख होसी प्रीत पराई , गुरमुख सच सच्चा प्रेम रघुराई ।। \nजन दर्शन दास बण ऐसा , गुरमुख नामे छींबे जैसा ।।\n( यकीन )"},"en":{"t":"Manmukh Upje Panch Vikara","c":"Manmukh Upje Panch Vikara"}},

	{"id":1770142779667,
	"pb":{"t":"ਮਨਮੁਖ ਮਨ ਹੋਵੇ ਪਰਧਾਨ","c":"ਮਨਮੁਖ ਮਨ ਹੋਵੇ ਪਰਧਾਨ , ਗੁਰਮੁਖ ਗੁਰ ਸ਼ਬਦ ਪਛਾਣ ।।\nਮਨਮੁਖ ਮੋਹ ਮਮਤਾ ਹੰਕਾਰ , ਗੁਰਮੁਖ ਪਾਯੋ ਅੰਤਰ ਪਿਆਰ ।।\nਮਨਮੁਖ ਲਾਗੇ ਮਾਇਆ ਧਿਆਨ , ਗੁਰਮੁਖ ਪਾਯੋ ਗੁਰ ਸੇਵਾ ਮਾਣ ।।\nਮਨਮੁਖ ਬਹੁਬਿਧ ਕਰੇ ਚਤੁਰਾਈ , ਗੁਰਮੁਖ ਪਾਯੋ ਗੁਰ ਭਗਤ ਕਮਾਈ ।।\nਗੁਰਮੁਖ ਸਦਾ ਰਹੇਓ ਤਾਣ , ਗੁਰਮੁਖ ਪੇ ਜਾਊਂ ਦਰਸ਼ਨ ਕੁਰਬਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मनमुख मन होवे परधान","c":"मनमुख मन होवे परधान , गुरमुख गुर शब्द पछाण ।।\nमनमुख मोह ममता हंकार , गुरमुख पायो अंतर पिआर ।। \nमनमुख लागे माया धिआन , गुरमुख पायो गुर सेवा माण ।। \nमनमुख बहुबिध करे चतुराई , गुरमुख पायो गुर भगत कमाई ।।\nगुरमुख सदा रहेओ ताण , गुरमुख पे जाऊँ दर्शन कुरबान ।।\n( यकीन )"},"en":{"t":"Manmukh Man Hove Pardhan","c":"Manmukh Man Hove Pardhan"}},

	{"id":1770142957840,
	"pb":{"t":"ਮਾਨਸ ਜਨਮ ਪਾਯਾ ਹੈ ਤੋ","c":"ਮਾਨਸ ਜਨਮ ਪਾਯਾ ਹੈ ਤੋ ਮਨ ਕੀ ਮੈਲ ਗਵਾ ,\nਹਰਿ ਸੇ ਪ੍ਰੀਤ ਲਗਾਨੀ ਹੈ ਤੋ ਗੁਰ ਕੀ ਸ਼ਰਨੀ ਜਾ ।।\nਪੰਚ ਤਨ ਮਿਲਾ ਹਰਿ ਸੇ , ਹਰਿ ਸੇ ਨੇਹਾ ਲਗਾ ,\nਪ੍ਰੇਮ ਕੀ ਬਾਤੀ ਨਾਮ ਕਾ ਦੀਪਕ ਹਿਰਦੇ ਅਪਣੇ ਜਗਾ ।।\nਜੀਵ ਜੰਤ ਭੀ ਕਰਤੇ ਪੁਕਾਰ , ਦਰਸ਼ਨ ਦੀਜੋ ਪ੍ਰਭ ਹੋ ਕੇ ਦਿਆਲ ।।\nਮਨਮਤੀ ਤੂੰ ਕਿਉਂ ਨਹੀਂ ਸਮਝੇਂ ਮਨ ਕੋ ਤੂੰ ਸਮਝਾ ।।\nਬਾਰੰਬਾਰ ਹਾਥ ਨਾ ਆਏ ਯਹ ਜੀਵਨ ਕੀ ਘੜੀ ,\nਹਰ ਪਲ ਘਟਤੀ ਜਾਏ ਉਮਰੀਆ ਕੁਛ ਤੋ ਕਰਮ ਕਮਾ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मानस जनम पाया है तो","c":"मानस जनम पाया है तो मन की मैल गवा , \nहरि से प्रीत लगानी है तो गुर की शरनी जा ।।\nपंच तन मिला हरि से , हरि से नेहा लगा , \nप्रेम की बाती नाम का दीपक हिरदे अपने जगा ।।\nजीव जंत भी करते पुकार , दर्शन दीजो प्रभ हो के दयाल ।।\nमनमती तूं किओं नहीं समझें मन को तँ समझा ।।\nबारम्बार हाथ ना आये यह जीवन की घड़ी , \nहर पल घटती जाये उमरीआ कुछ तो करम कमा ।। \n( यकीन )"},"en":{"t":"Maanas Janam Paya Hain To","c":"Maanas Janam Paya Hain To"}},

	{"id":1770143204970,
	"pb":{"t":"ਮੇਹਰਬਾਨ ਮੇਹਰਬਾਨ ਮੇਹਰਬਾਨ","c":"ਮੇਹਰਬਾਨ ਮੇਹਰਬਾਨ ਮੇਹਰਬਾਨ , ਦੀਨ ਦਿਆਲ ਮੇਰੇ ਮੇਹਰਬਾਨ ।।\nਮੇਰੇ ਸਤਿਗੁਰ ਪੁਰਖ ਸੁਜਾਨ ਹਰਿ ਰਾਇ , ਤੂੰ ਠਾਕੁਰ ਪ੍ਰਿਤਪਾਲ ਗੋਸਾਈਂ ।।\nਹਉਂ ਗਰੀਬ ਕਿਛੁ ਜਾਣੋ ਨਾਹੀਂ , ਤੇਰੀ ਮਹਿਮਾ ਅਪਰੰਪਾਰ ।।\nਤੂੰ ਬਖਸ਼ੰਦ ਬਖਸ਼ਣਹਾਰ , ਆਪੇ ਤਾਰੇ ਤਾਰਨਹਾਰ ।।\nਚਿੰਤਾ ਮਿਟੀ ਸਭੈ ਪੂਰਨ ਕਾਮ , ਜਬ ਤੇ ਲਾਯੋ ਤੇਰਾ ਧਿਆਨ ।।\nਤਨ ਮਨ ਧਨ ਤੁਧੁ ਸ਼ਰਨੀ ਲਾਵਾਂ , ਕਿਰਪਾ ਰਹਮਤ ਤੁਝ ਤੇ ਪਾਵਾਂ ।।\nਮਨ ਕੀ ਬੂਝੀ ਤੂੰ ਸੁਲਤਾਨ , ਦਰਸ਼ਨ ਦੀਆ ਮੋਕੋ ਗੁਜ਼ਰਾਨ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मेहरबान मेहरबान मेहरबान","c":"मेहरबान मेहरबान मेहरबान , दीन दयाल मेरे मेहरबान ।। \nमेरे सतिगुर पुरख सुजान हरि राय , तूं ठाकुर प्रितपाल गोसांई ।। \nहउँ गरीब किछ जानो नाहीं , तेरी महिमा अपरम्पार ।। \nतूं बख्शंद बख्शणहार , आपे तारे तारनहार ।। \nचिंता मिटी सभै पूरन काम , जब ते लायो तेरा धिआन ।। \nतन मन धन तुध शरनी लावां , किरपा रहमत तुझ ते पावां ।। \nमन की बूझी तूं सुलतान , दर्शन दीआ मोको गुज़रान ।।\n( यकीन )"},"en":{"t":"Meharban Meharban Meharban","c":"Meharban Meharban Meharban"}},

	{"id":1770143707550,
	"pb":{"t":"ਮਿੱਠਤ ਮੀਠੇ ਮਨਮੋਹਨ ਪਿਆਰੇ","c":"ਮਿੱਠਤ ਮੀਠੇ ਮਨਮੋਹਨ ਪਿਆਰੇ , ਤੜਪਦਾ ਮੋਰਾ ਜੀਆ ।।\nਪਾਣੀ ਅੰਨ ਨਾ ਭਾਵੇ ਮੋਹੇ ਦਿਨ ਰਾਤੀ , \nਤੁਧ ਬਿਨ ਘੜੀ ਪਲ ਨਾ ਥੀਵੇ ।।\nਨੈਣ ਨੀਦੜੇ ਪ੍ਰੀਤਮ ਬਾਝੋਂ , ਪ੍ਰੇਮ ਪ੍ਰੀਤ ਪੀਆ ਸਤਾਵੇ ।।\nਏਕ ਬੂੰਦ ਜਿਵੇਂ ਚਾਤ੍ਰਿਕ ਮਾਂਗੇ , ਦਰਸ਼ਨ ਤੜਪ ਤੜਪ ਮਰ ਜਾਵੇ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मिट्ठत मीठे मनमोहन पिआरे","c":"मिट्ठत मीठे मनमोहन पिआरे , तड़पदा मोरा जीआ ।। \nपाणी अन्न ना भावे मोहे दिन राती , \nतुध बिन घड़ी पल ना थीवे ।।\nनैन नीदड़े प्रीतम बाझों , प्रेम प्रीत पीआ सतावे ।। \nएक बूँद जिवें चात्रिक मांगे , दर्शन तड़प तड़प मर जावे ।।\n( यकीन )"},"en":{"t":"Mitthat Mitthe Manmohan Pyare","c":"Mitthat Mitthe Manmohan Pyare"}},

	{"id":1770143952226,"audio":"audio/MITHBOLDA HAR HAR.mp3",

	{"id":1770148880772,"audio":"audio/MITH BOLDA JI.mp3",

	{"id":1770149570722,
	"pb":{"t":"ਮੁਝ ਮਹਿ ਤੁਝ ਮਹਿ ਭੇਦ ਨਾਹੀ","c":"ਮੁਝ ਮਹਿ ਤੁਝ ਮਹਿ ਭੇਦ ਨਾਹੀ , ਤੁਮ ਭਯੋ ਖਸਮ ਹਮਾਰੇ ।।\nਜੀਅ ਦਾਨ ਦਯਾ ਕਰ ਭਗਤੀ ਲਗਸਾਂ ,\nਬ੍ਰਹਮ ਭਰਮ ਮਨ ਲੇਓ ਛੋਡਾਈ , ਮਨ ਵਿਸ਼ਟਾ ਸੰਗ ਪ੍ਰੀਤ ਜੋੜੇ ।।\nਕਾਮ ਕ੍ਰੋਧ ਲੋਭ ਮੋਹ ਹੰਕਾਰ ,\nਗੜ੍ਹ ਮੰਦਰ ਮਾਨ ਸੰਗ ਦੀਓ ਪੰਚ ਪਿਆਰ ।।\nਪਰਮੇਸ਼ਰ ਪ੍ਰਧਾਨ ਨਾਨਕ ਹਉਂ ਜਾਊਂ ਕੁਰਬਾਨ ਜੀਓ ।।\nਬਾਰਿਕ ਪ੍ਰੀਤਮ ਤੇਰੇ ਬੈਕੁੰਠ ਦਰਗਹਿ ਦਰਸ਼ਨ ਪਰਵਾਨ ਜੀਓ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मुझ महि तुझ महि भेद नाही","c":"मुझ महि तुझ महि भेद नाही , तुम भयो खसम हमारे ।।\nजीअ दान दया कर भगती लगसां , \nब्रह्म भरम मन लेओ छोडाई , मन विशटा संग प्रीत जोड़े ।। \nकाम क्रोध लोभ मोह हंकार , \nगढ़ मंदर मान संग दीओ पँच पिआर ।।\nपरमेशर प्रधान नानक हउँ जाउँ कुर्बान जीओ ।।\nबारिक प्रीतम तेरे बैकुंठ दरगहि दर्शन परवान जीओ ।।\n( यकीन )"},"en":{"t":"Mujh Mein Tujh Mein Bhed Naahi","c":"Mujh Mein Tujh Mein Bhed Naahi"}},

	{"id":1770149792119,"audio":"audio/MEGH BARAS.mp3",
	"pb":{"t":"ਮੇਘ ਬਰਸ ਮੇਘਰਾਜ ਮੇਰੇ","c":"ਮੇਘ ਬਰਸ ਮੇਘਰਾਜ ਮੇਰੇ , ਅੱਤ ਊਚੇ ਦਾਸ ਤੁਹੇਰੇ ।।\nਸੁਖ ਦੀਜੈ ਸਹਜ ਨਿਵਾਜੇ , ਰਾਖੋ ਪੈਜ ਮੇਰੇ ਰਾਮ ਰਾਜੇ ।।\nਨਿਰਗੁਣ ਨਿਰਬਾਨ ਮੇਰੇ ਮੇਹਰਬਾਨ , ਮੁਕਤ ਭੁਗਤ ਸੁਮੱਤ ਦੀਜੈ ਦਾਨ ।।\nਮਨ ਮਾਇਆ ਸੰਗ ਪ੍ਰੀਤ ਲਾਗੀ , ਕਿਰਪਾ ਆਪਨੀ ਕੀਜੈ ।।\nਦਰਸ਼ਨ ਕਹਤ ਕੀਰਤਨ ਤੇਰਾ , ਤਨ ਧਨ ਮਨ ਲੀਜੈ ।।\n( ਯਕੀਨ )"},"hi":{"t":"मेघ बरस मेघराज मेरे","c":"मेघ बरस मेघराज मेरे , अत्त ऊचे दास तुहेरे ।।\nसुख दीजै सहज निवाजे , राखो पैज मेरे राम राजे ।।\nनिरगुण निरबान मेरे मेहरबान , मुक्त भुगत सुमत्त दीजै दान ।। \nमन माया संग प्रीत लागी , किरपा आपनी कीजै ।। \nदर्शन कहत कीरतन तेरा , तन धन मन लीजै ।।\n( यकीन )"},"en":{"t":"Megh Baras Meghraj Mere","c":"Megh Baras Meghraj Mere"}},

	{"id":1770149994465,"audio":"audio/MERA SAJANDA HAR SAJANDA.mp3",

	{"id":1770150173866,"audio":"audio/MERA MAN TRIPAT AGHAI.mp3",

	"pb":{"t":"ਹਨੂਮਾਨ ਚਾਲੀਸਾ","c":"॥ ਜੈ ਸ਼੍ਰੀ ਰਾਮ ॥\nॐ\n॥ ਸ਼੍ਰੀ ਹਨੂਮਾਨ ਚਾਲੀਸਾ ॥\n\n॥ ਦੋਹਾ ॥\nਸ਼੍ਰੀ ਗੁਰੁ ਚਰਨ ਸਰੋਜ ਰਜ, ਨਿਜ ਮਨੁ ਮੁਕੁਰੁ ਸੁਧਾਰਿ ।\nਬਰਨਉ ਰਘੁਬਰ ਬਿਮਲ ਜਸੁ, ਜੋ ਦਾਯਕੁ ਫਲ ਚਾਰਿ ॥\nਬੁੱਧਿਹੀਨ ਤਨੁ ਜਾਨਿਕੇ, ਸੁਮਿਰੌ ਪਵਨ ਕੁਮਾਰ ।\nਬਲ ਬੁੱਧਿ ਬਿਦ੍ਯਾ ਦੇਹੁ ਮੋਹਿ, ਹਰਹੁ ਕਲੇਸ਼ ਬਿਕਾਰ ॥\n\n॥ ਚੌਪਾਈ ॥\nਜੈ ਹਨੁਮਾਨ ਗਿਆਨ ਗੁਨ ਸਾਗਰ । ਜੈ ਕਪੀਸ ਤਿਹੁੰ ਲੋਕ ਉਜਾਗਰ ॥\nਰਾਮ ਦੂਤ ਅਤੁਲਿਤ ਬਲ ਧਾਮਾ । ਅੰਜਨਿਪੁਤ੍ਰ ਪਵਨ ਸੁਤ ਨਾਮਾ ॥\nਮਹਾਬੀਰ ਬਿਕ੍ਰਮ ਬਜਰੰਗੀ । ਕੁਮਤਿ ਨਿਵਾਰ ਸੁਮਤਿ ਕੇ ਸੰਗੀ ॥\nਕੰਚਨ ਬਰਨ ਬਿਰਾਜ ਸੁਬੇਸਾ । ਕਾਨਨ ਕੁੰਡਲ ਕੁੰਚਿਤ ਕੇਸਾ ॥੪॥\n\nਹਾਥ ਬਜ੍ਰ ਔ ਧ੍ਵਜਾ ਬਿਰਾਜੈ । ਕਾਂਧੇ ਮੂੰਜ ਜਨੇਊ ਸਾਜੈ ॥\nਸ਼ੰਕਰ ਸੁਵਨ ਕੇਸਰੀਨੰਦਨ । ਤੇਜ ਪ੍ਰਤਾਪ ਮਹਾ ਜਗ ਬੰਦਨ ॥\nਬਿਦ੍ਯਾਵਾਨ ਗੁਣੀ ਅਤਿ ਚਾਤੁਰ । ਰਾਮ ਕਾਜ ਕਰਿਬੇ ਕੋ ਆਤੁਰ ॥\nਪ੍ਰਭੁ ਚਰਿਤ੍ਰ ਸੁਨਿਬੇ ਕੋ ਰਸਿਆ । ਰਾਮ ਲਖਨ ਸੀਤਾ ਮਨ ਬਸਿਆ ॥੮॥\n\nਸੂਕਸ਼ਮ ਰੂਪ ਧਰਿ ਸਿਯਹਿ ਦਿਖਾਵਾ । ਬਿਕਟ ਰੂਪ ਧਰਿ ਲੰਕ ਜਰਾਵਾ ॥\nਭੀਮ ਰੂਪ ਧਰਿ ਅਸੁਰ ਸੰਹਾਰੇ । ਰਾਮਚੰਦ੍ਰ ਕੇ ਕਾਜ ਸੰਵਾਰੇ ॥\nਲਾਯ ਸਜੀਵਨ ਲਖਨ ਜਿਯਾਯੇ । ਸ਼੍ਰੀ ਰਘੁਬੀਰ ਹਰਸ਼ਿ ਉਰ ਲਾਯੇ ॥\nਰਘੁਪਤਿ ਕੀਨ੍ਹੀ ਬਹੁਤ ਬੜਾਈ । ਤੁਮ ਮਮ ਪ੍ਰਿਯ ਭਰਤ ਸਮ ਭਾਈ ॥੧੨॥\n\nਸਹਸ ਬਦਨ ਤੁਮ੍ਹਰੋ ਜਸ ਗਾਵੈਂ । ਅਸ ਕਹਿ ਸ਼੍ਰੀਪਤਿ ਕੰਠ ਲਗਾਵੈਂ ॥\nਸਨਕਾਦਿਕ ਬ੍ਰਹਮਾਦਿ ਮੁਨੀਸਾ । ਨਾਰਦ ਸਾਰਦ ਸਹਿਤ ਅਹੀਸਾ ॥\nਜਮ ਕੁਬੇਰ ਦਿਗਪਾਲ ਜਹਾਂ ਤੇ । ਕਬਿ ਕੋਬਿਦ ਕਹਿ ਸਕੇ ਕਹਾਂ ਤੇ ॥\nਤੁਮ ਉਪਕਾਰ ਸੁਗ੍ਰੀਵਹਿ ਕੀਨ੍ਹਾ । ਰਾਮ ਮਿਲਾਯ ਰਾਜ ਪਦ ਦੀਨ੍ਹਾ ॥੧੬॥\n\nਤੁਮ੍ਹਰੋ ਮੰਤ੍ਰ ਬਿਭੀਸ਼ਨ ਮਾਨਾ । ਲੰਕੇਸ਼੍ਵਰ ਭਏ ਸਬ ਜਗ ਜਾਨਾ ॥\nਜੁਗ ਸਹਸ੍ਰ ਜੋਜਨ ਪਰ ਭਾਨੂ । ਲੀਲ੍ਯੋ ਤਾਹਿ ਮਧੁਰ ਫਲ ਜਾਨੂ ॥\nਪ੍ਰਭੁ ਮੁਦ੍ਰਿਕਾ ਮੇਲਿ ਮੁਖ ਮਾਹੀਂ । ਜਲਧਿ ਲਾਂਘਿ ਗਏ ਅਚਰਜ ਨਾਹੀਂ ॥\nਦੁਰਗਮ ਕਾਜ ਜਗਤ ਕੇ ਜੇਤੇ । ਸੁਗਮ ਅਨੁਗ੍ਰਹ ਤੁਮ੍ਹਰੇ ਤੇਤੇ ॥੨੦॥\n\nਰਾਮ ਦੁਆਰੇ ਤੁਮ ਰਖਵਾਰੇ । ਹੋਤ ਨ ਆਗਿਆ ਬਿਨੁ ਪੈਸਾਰੇ ॥\nਸਬ ਸੁਖ ਲਹੈਂ ਤੁਮ੍ਹਾਰੀ ਸਰਨਾ । ਤੁਮ ਰਕਸ਼ਕ ਕਾਹੂ ਕੋ ਡਰ ਨਾ ॥\nਆਪਨ ਤੇਜ ਸਮ੍ਹਾਰੋ ਆਪੈ । ਤੀਨੋਂ ਲੋਕ ਹਾਂਕ ਤੇਂ ਕਾਂਪੈ ॥\nਭੂਤ ਪਿਸਾਚ ਨਿਕਟ ਨਹਿ ਆਵੈ । ਮਹਾਬੀਰ ਜਬ ਨਾਮ ਸੁਨਾਵੈ ॥੨੪॥\n\nਨਾਸੈ ਰੋਗ ਹਰੈ ਸਬ ਪੀਰਾ । ਜਪਤ ਨਿਰੰਤਰ ਹਨੁਮਤ ਬੀਰਾ ॥\nਸੰਕਟ ਤੇਂ ਹਨੁਮਾਨ ਛੁੜਾਵੈ । ਮਨ ਕ੍ਰਮ ਬਚਨ ਧ੍ਯਾਨ ਜੋ ਲਾਵੈ ॥\nਸਬ ਪਰ ਰਾਮ ਤਪਸ੍ਵੀ ਰਾਜਾ । ਤਿਨ ਕੇ ਕਾਜ ਸਕਲ ਤੁਮ ਸਾਜਾ ॥\nਔਰ ਮਨੋਰਥ ਜੋ ਕੋਈ ਲਾਵੈ । ਸੋਈ ਅਮਿਤ ਜੀਵਨ ਫਲ ਪਾਵੈ ॥੨੮॥\n\nਚਾਰੋਂ ਜੁਗ ਪਰਤਾਪ ਤੁਮ੍ਹਾਰਾ । ਹੈ ਪਰਸਿੱਧ ਜਗਤ ਉਜਿਯਾਰਾ ॥\nਸਾਧੁ ਸੰਤ ਕੇ ਤੁਮ ਰਖਵਾਰੇ । ਅਸੁਰ ਨਿਕੰਦਨ ਰਾਮ ਦੁਲਾਰੇ ॥\nਅਸ਼ਟ ਸਿੱਧੀ ਨੌ ਨਿਧੀ ਕੇ ਦਾਤਾ । ਅਸ ਬਰ ਦੀਨ ਜਾਨਕੀ ਮਾਤਾ ॥\nਰਾਮ ਰਸਾਯਨ ਤੁਮ੍ਹਰੇ ਪਾਸਾ । ਸਦਾ ਰਹੋ ਰਘੁਪਤਿ ਕੇ ਦਾਸਾ ॥੩੨॥\n\nਤੁਮ੍ਹਰੇ ਭਜਨ ਰਾਮ ਕੋ ਪਾਵੈ । ਜਨਮ ਜਨਮ ਕੇ ਦੁਖ ਬਿਸਰਾਵੈ ॥\nਅੰਤ ਕਾਲ ਰਘੁਬਰ ਪੁਰ ਜਾਈ । ਜਹਾਂ ਜਨਮ ਹਰਿ ਭਕਤ ਕਹਾਈ ॥\nਔਰ ਦੇਵਤਾ ਚਿੱਤ ਨ ਧਰਈ । ਹਨੁਮਤ ਸੇਇ ਸਰਬ ਸੁਖ ਕਰਈ ॥\nਸੰਕਟ ਕਟੈ ਮਿਟੈ ਸਬ ਪੀਰਾ । ਜੋ ਸੁਮਿਰੈ ਹਨੁਮਤ ਬਲਬੀਰਾ ॥੩੬॥\n\nਜੈ ਜੈ ਜੈ ਹਨੁਮਾਨ ਗੋਸਾਈਂ । ਕ੍ਰਿਪਾ ਕਰਹੁ ਗੁਰੁ ਦੇਵ ਕੀ ਨਾਈਂ ॥\nਜੋ ਸਤ ਬਾਰ ਪਾਠ ਕਰ ਕੋਈ । ਛੂਟਹਿ ਬੰਦਿ ਮਹਾਸੁਖ ਹੋਈ ॥\nਜੋ ਯਹ ਪੜ੍ਹੈ ਹਨੁਮਾਨ ਚਾਲੀਸਾ । ਹੋਯ ਸਿੱਧ ਸਾਖੀ ਗੌਰੀਸਾ ॥\nਤੁਲਸੀਦਾਸ ਸਦਾ ਹਰੀ ਚੇਰਾ । ਕੀਜੈ ਨਾਥ ਹ੍ਰਿਦਯ ਮਹਂ ਡੇਰਾ ॥੪੦॥\n\n॥ ਦੋਹਾ ॥\nਪਵਨਤਨਯ ਸੰਕਟ ਹਰਨ , ਮੰਗਲ ਮੂਰਤਿ ਰੂਪ ॥\nਰਾਮ ਲਖਨ ਸੀਤਾ ਸਹਿਤ , ਹ੍ਰਿਦਯ ਬਸਹੁ ਸੁਰ ਭੂਪ ॥\n\nਸਿਯਾਵਰ ਰਾਮਚੰਦਰ ਕੀ ਜੈ ॥ ਪਵਨ ਸੁਤ ਹਨੁਮਾਨ ਕੀ ਜੈ ॥ ਉਮਾਪਤੀ ਮਹਾਦੇਵ ਕੀ ਜੈ ॥\nਸ਼੍ਰੀ ਰਾਮ ਜੈ ਰਾਮ ਜੈ ਜੈ ਰਾਮ ॥ ਸ਼੍ਰੀ ਰਾਮ ਜੈ ਰਾਮ ਜੈ ਜੈ ਰਾਮ ॥"},"hi":{"t":"हनुमान चालीसा","c":"॥ जय श्री राम ॥\nॐ\n॥ श्री हनुमान चालीसा ॥\n\n॥ दोहा ॥\nश्री गुरु चरण सरोज रज , निज मनु मुकुरु सुधारि ।\nवरनऊँ रघुवर विमल जसु , जो दायकु फल चारि ॥\nबुद्धिहीन तनु जानिके , सुमिरो पवन कुमार ।\nबल बुद्धि विद्या देहु मोहिं , हरहु कलेश विकार ॥\n \n॥ चौपाई॥\nजय हनुमान ज्ञान गुन सागर । जय कपीस तिहुँ लोक उजागर ॥\nराम दूत अतुलित बल धामा । अंजनिपुत्र पवन सुत नामा ॥\nमहावीर बिक्रम बजरंगी । कुमति निवार सुमिति के संगी ॥\nकंचन वरन विराज सुवेसा । कानन कुंडल कुंचित केसा ॥४॥\n\nहाथ बज्र औ ध्वजा विराजै । काँधे मूँज जनेऊ साजै ॥\nशंकर सुवन केसरीनंदन । तेज प्रताप महा जग बंदन ॥\nविद्यावान गुनी अति चातुर । राम काज करिबे को आतुर ॥\nप्रभु चरित्र सुनिबे को रसिया । राम लखन सीता मन बसिया ॥८॥\n\nसूक्ष्म रूप धरि सियहि दिखावा । बिकट रूप धरि लंक जरावा ॥\nभीम रूप धरि असुर सँहारे । रामचंन्द्र के काज सँवारे ॥\nलाय सजीवन लखन जियाये । श्री रघुबीर हरषि उर लाये ॥\nरघुपति कीन्ही बहुत बड़ाई । तुम मम प्रिय भरत सम भाई ॥१२॥\n\nसहस बदन तुम्हरो जस गावैं । अस कहि श्रीपति कंठ लगावैं ॥\nसनकादिक ब्रह्मादि मुनीसा । नारद सारद सहित अहीसा ॥\nजम कुबेर दिगपाल जहाँ ते । कबि कोबिद कहि सके कहाँ ते ॥\nतुम उपकार सुग्रीवहिं कीन्हा । राम मिलाय राज पद दीन्हा ॥१६॥\n\nतुम्हरो मंत्र विभीषन माना । लंकेश्वर भये सब जग जाना ॥\nजुग सहस्त्र जोजन पर भानू । लील्यो ताहि मधुर फल जानू ॥\nप्रभु मुद्रिका मेलि मुख माहीं । जलधि लाँघि गये अचरज नाहीं ॥\nदु्र्गम काज जगत के जेते । सुगम अनुग्रह तुम्हरे तेते ॥२०॥\n\nराम दुआरे तुम रखवारे । होत न आज्ञा बिनु पैसारे ॥\nसब सुख लहैं तुम्हारी सरना । तुम रच्छक काहू को डर ना ॥\nआपन तेज सम्हारो आपै । तीनों लोक हाँक तें काँपै ॥\nभूत पिसाच निकट नहिं आवै । महावीर जब नाम सुनावैं ॥२४॥\n\nनासै रोग हरै सब पीरा । जपत निरंतर हनुमत बीरा ॥\nसंकट तें हनुमान छुड़ावै । मन क्रम वचन ध्यान जो लावै ॥\nसब पर राम तपस्वीं राजा । तिन के काज सकल तुम साजा ॥\nऔर मनोरथ जो कोई लावै । सोइ अमित जीवन फल पावै ॥२८॥\n\nचारों जुग परताप तुम्हारा । है परसिद्ध जगत उजियारा ॥\nसाधु संत के तुम रखबारे । असुर निकंदन राम दुलारे ॥\nअष्ट सिद्धि नौ निधि के दाता । अस बर दीन जानकी माता ॥\nराम रसायन तुम्हरे पासा । सदा रहो रघुपति के दासा ॥३२॥\n\nतुम्हरे भजन राम को पावै । जनम जनम के दुख बिसरावै ॥\nअंत काल रघुबर पुर जाई । जहाँ जन्म हरि भक्त कहाई ॥\nऔर देवता चित्त न धरई । हनुमत सेइ सर्ब सुख करई ॥\nसंकट कटै मिटै सब पीरा । जो सुमिरैं हनुमत बलबीरा ॥३६॥\n\nजै जै जै हनुमान गोसाईं । कृपा करहु गुरू देव की नाईं ॥\nजो सत बार पाठ कर कोई । छूटहि बन्दि महासुख होई ॥\nजो यह पढै हनुमान चलीसा । होय सिद्धि साखी गौरीसा ॥\nतुलसीदास सदा हरि चेरा । कीजै नाथ हृदय महँ डेरा ॥४०॥\n\n॥ दोहा॥\nपवनतनय संकट हरन , मंगल मूरति रुप ।\nराम लखन सीता सहित , हृदय बसहु सुर भूप ॥\n\nसियावर रामचंद्र की जय । पवन सुत हनुमान की जय ॥ उमापति महादेव की जय ॥\nश्री राम जय राम जय जय राम । श्री राम जय राम जय जय राम ॥"},"en":{"t":"Hanuman Chalisa","c":"Hanuman Chalisa"}},

	"pb":{"t":"ਜਪ ਲੈ ਗੁਰੂ ਦਾ ਨਾਮ ਮਿੱਠਾ ਮਿੱਠਾ ਬੋਲ ਕੇ","c":"ਜਪ ਲੈ ਗੁਰੂ ਦਾ ਨਾਮ ਮਿੱਠਾ ਮਿੱਠਾ ਬੋਲ ਕੇ ,\nਰਹਿਮਤਾਂ ਦੇ ਬੈਠਾ ਏ ਦਵਾਰ ਦਾਤਾ ਖੋਲ ਕੇ ।।\n\nਅੱਜ ਹੋਏ ਨੇ ਸਤਿਗੁਰੂ ਰਾਜ਼ੀ , \nਹਾਰੀ ਹੋਈ ਜਿੱਤ ਲੈ ਬਾਜ਼ੀ ।।\nਐਸਾ ਗੁਰੂ ਨਹੀਂ ਲੱਭਣਾ , \nਸਾਰੀ ਦੁਨੀਆਂ ਦੇਖ ਲੈ ਫੋਲ ਕੇ ।।\n\nਗੁਰੂ ਚਰਣਾਂ ਵਿੱਚ ਦੇਖ ਲੈ ਆ ਕੇ , \nਪ੍ਰੀਤ ਗੁਰਾਂ ਨਾਲ ਦੇਖ ਲੈ ਲਾ ਕੇ ।।\nਗਿਣ ਗਿਣ ਕੇ ਨਹੀਂ ਦਿੰਦਾ , \nਦਾਤਾਂ ਦਿੰਦਾ ਏ ਦਿਲ ਖੋਲ ਕੇ ।।\n\nਪ੍ਰੀਤ ਗੁਰਾਂ ਦੀ ਬਹੁਤ ਨਿਆਰੀ , \nਸਭ ਦੀ ਲੈਂਦੇ ਜ਼ਿੰਮੇਦਾਰੀ ।।\nਸਸਤਾ ਜਾਣੀ ਗੁਰੂ ਨੂੰ ਦੇਣਾ , \nਸੀਸ ਤਲੀ ਤੇ ਤੋਲ ਕੇ ।।\n\nਦੇਖ ਗੁਰਾਂ ਦਾ ਚਾਕਰ ਬਣ ਕੇ , \nਹਰ ਮੁਸ਼ਕਿਲ ਵਿੱਚ ਖੜਦੇ ਤਣ ਕੇ ।।\nਜੇ ਕਰ ਗੁਰਾਂ ਦਾ ਹੱਥ ਨਾ ਹੋਵੇ , \nਮੁਸ਼ਕਿਲਾਂ ਰੱਖਦੀਆਂ ਰੋਲ ਕੇ ।।\n\nਆਓ ਸੰਗਤੋ ਗੱਲ ਸੁਣਾਵਾਂ , \nਗੁਰੂ ਦੀ ਮਹਿਮਾ ਉਸਤਤ ਗਾਵਾਂ ।।\nਮੰਨ ਲਓ ਮੇਰੀ ਗੱਲ ਨੂੰ ਸੰਗਤੋ , \nਭੇਦ ਮੈਂ ਸਾਰੇ ਖੋਲ ਤੇ ।।"},"hi":{"t":"जप लै गुरू दा नाम मिठ्ठा मिठ्ठा बोल के","c":"जप लै गुरू दा नाम मिठ्ठा मिठ्ठा बोल के\nरहमतां दे बैठा ए दवार दाता खोल के \n\nअज्ज होए ने सतगरू राजी\nहारी होई जित लै बाजी \nऐसा गुरू नही लभणा \nसारी दुनीयां देख लै फोल के\n\nगुरू चरणा विच देख लै आ के\nप्रीत गुरां नाल देख लै ला के\nगिण गिण के नही दिंदा \nदातां दिंदा ए दिल खोल के\n\nप्रीत गुरां दी बहुत नियारी \nसब दी लैंदे  जिम्मेदारी  \nसस्ता जाणी  गुरू नू देणा\nसीस तली ते तोल के\n\nदेख गुरां दा चाकर बण के\nहर मुश्किल विच खड़दे तण के \nजे कर गुरां दा हथ ना होवे\nमुश्किलां रखदीयां रोल के\n\nआउ संगतो गल सुनावां\nगुरू दी महिमा उस्तत गावां \nमन लौ मेरी गल नूं सगतो\nभेद मैं सारे खोल ते"},"en":{"t":"Jap Le Gura Da Naam Meetha Meetha Bol Ke","c":"Jap Le Gura Da Naam Meetha Meetha Bol Ke"}},

	{"id":1771858376963,
	"pb":{"t":"ਵੰਝਲੀ ਦੀ ਮਿੱਠੀ ਮਿੱਠੀ ਤਾਨ","c":"ਵੰਝਲੀ ਦੀ ਮਿੱਠੀ ਮਿੱਠੀ ਤਾਨ , ਸ਼ਾਮਾ ਤੂੰ ਸੁਣਾਈ ਆਣਕੇ ।।\nਵੰਝਲੀ ਤੋਂ ਜਾਵਾਂ ਕੁਰਬਾਨ , ਸ਼ਾਮਾ ਤੂੰ ਸੁਣਾਈ ਆਣਕੇ ।।\n\nਸ਼ਾਮਾ ਤੇਰੀ ਵੰਝਲੀ ਨੇ ਮਨ ਸਾਡਾ ਮੋਹ ਲਿਆ ,\nਸੁਖ ਚੈਨ ਨੀਂਦ ਸਾਡਾ ਸਭ ਕੁਝ ਖੋਹ ਲਿਆ ।।\nਕੱਢ ਲਈ ਵੰਝਲੀ ਨੇ ਜਾਨ ।।\n\nਸ਼ਾਮਾ ਤੇਰੇ ਉੱਤੇ ਨੇ ਉਮੀਦਾਂ ਬਹੁਤ ਰੱਖੀਆਂ ,\nਤੇਰੇ ਬਾਰੇ ਨਿੱਤ ਮੈਨੂੰ ਪੁੱਛਦੀਆਂ ਸਖੀਆਂ ।।\nਕਿੱਥੇ ਗਿਆ ਏ ਤੇਰਾ ਸ਼ਾਮ ।।\n\nਕਦੇ ਕਿਸੇ ਨਾਲ ਝੂਠਾ ਲਾਰਾ ਨਹੀਂਓਂ ਲਾਈਦਾ ,\nਆਪਣੇ ਪਿਆਰਿਆਂ ਨੂੰ ਇੱਦਾਂ ਨਹੀਂ ਸਤਾਈਦਾ ।।\nਹਰ ਵੇਲੇ ਰਹਾਂ ਪਰੇਸ਼ਾਨ ।।\n\nਸੁੱਖਾਂ ਮੈਂ ਮਨਾਵਾਂ ਦੀਵੇ ਘਿਓ ਦੇ ਜਗਾਵਾਂ ਮੈਂ ,\nਤੇਰੀਆਂ ਰਾਹਾਂ 'ਚ ਸ਼ਾਮਾ ਆਪ ਵਿਛ ਜਾਵਾਂ ਮੈਂ ।।\nਤੇਰੇ ਉੱਤੋਂ ਜਿੰਦ ਕੁਰਬਾਨ ।।\n\nਅਸੀਂ ਕਿਹੜਾ ਤੇਰੇ ਤੋਂ ਜਹਾਨ ਸਾਰਾ ਮੰਗਿਆ ,\nਦੂਰ ਦੂਰ ਰਹਿਕੇ ਸਾਨੂੰ ਸੂਲੀ ਕਾਹਤੋਂ ਟੰਗਿਆ ।।\nਤੇਰੇ ਬਿਨਾਂ ਕਾਹਦਾ ਏ ਜਹਾਨ ।।\n\nਮੁੱਕ ਚੱਲੇ ਸਾਹ ਜਿੰਦ ਡਗਮਗ ਡੋਲਦੀ ,\nਹਰ ਸਾਹ ਨਾਲ ਬੱਸ ਸ਼ਾਮਾ ਸ਼ਾਮਾ ਬੋਲਦੀ ।।\nਆਪਣੀ ਬਣਾ ਕੇ ਲੈ ਜਾ ਆਣ ।।\n\nਮੈਂ ਵੀ ਦੇਖਾਂ ਦੇਸ ਜੇਹੜਾ ਤੈਨੂੰ ਬੜਾ ਪਿਆਰਾ ਏ ,\nਸਾਡਾ ਤੇਰੇ ਬਿਨਾਂ ਇੱਕ ਪਲ ਨਾ ਗੁਜ਼ਾਰਾ ਏ ।।\nਹੋ ਜਾਈਏ ਇੱਕ ਜਿੰਦ ਜਾਨ ।।"},"hi":{"t":"वंझली दी मिठी मिठी तान","c":"वंझली दी मिठी मिठी तान\nशामा तूं सुणाई आणके\nवंझली तों जावां कुरबान\nशामा तूं सुणाई आणके\n\nशामा तेरी वंझली ने मन साडा मोह लिया\nसुख चैन नींद साडा सब कुछ खोह लिया\nकढ लई वंझली ने जान \n\nशामा तेरे उत्ते ने उमीदां बहुत रखीयां\nतेरे बारे नित मैनूं पुछदीयां सखीयां\nकिथे गिया ए तेरा शाम\n\nकदे किसे नाल झुठा लारा नहीयों लाईदा\nआपणे प्यारयां नूं एदां नहीं सताईदा\nहर वेले रहां परेशान\n\nसुखां मैं मनावां दीवे घियो दे जगावां मैं\nतेरियां राहां च शामा आप विछ जावां मैं\nतेरे उत्तों जिंद कुरबान\n\nअसीं केहड़ा तेरे तों जहान सारा मंगया\nदूर दूर रहके सानू सूली काहतों टंगया\nतेरे बिना काहदा ए जहान\n\nमुक् चले साह जिंद डगमग डोलदी\nहर साह नाल बस शामा शामा बोलदी\nआपणी बणा के लै जा आण\n\nमैं वी देखां देस जेहड़ा तैनू बड़ा प्यारा ए\nसाडा तेरे बिना इक पल ना गुजज़ारा ए\nहो जाईए इक जिंद जान"},"en":{"t":"Vanjhli Di Meethi Meethi Taan","c":"Vanjhli Di Meethi Meethi Taan"}},

	{"id":1771858664521,
	"pb":{"t":"ਗੁਰੂ ਜੀ ਤੇਰੇ ਦਰਸ਼ਨ ਨੂੰ","c":"ਜਦ ਦਾ ਗੁਰੂ ਜੀ ਤੇਰਾ ਦਰਸ਼ਨ ਕੀਤਾ , \nਨਾਮ ਦਾ ਪਿਆਲਾ ਅਸੀਂ ਭਰ ਭਰ ਪੀਤਾ ।।\nਤੇਰੇ ਬਿਨਾਂ ਨਹੀਂ ਦਿਲ ਲੱਗਦਾ , \nਗੁਰੂ ਜੀ ਤੇਰੇ ਦਰਸ਼ਨ ਨੂੰ ਵਾਰ ਵਾਰ ਚਿੱਤ ਕਰਦਾ ।।\n\nਲੋੜ ਮੁੱਕ ਗਈ ਹੁਣ ਹੋਰ ਕਿਤੇ ਜਾਣ ਦੀ , \nਦਰ ਦਰ ਉੱਤੇ ਜਾ ਕੇ ਐਵੇਂ ਧੱਕੇ ਖਾਣ ਦੀ ।।\nਚੇਤਾ ਭੁੱਲ ਗਿਆ ਹੁਣ ਸਾਨੂੰ ਸਾਰੇ ਜਗ ਦਾ , \nਸਾਰੇ ਪਾਸੇ ਸਾਨੂੰ ਇੱਕ ਤੂੰ ਹੀ ਤੂੰ ਏ ਲੱਭਦਾ ।।\nਮਿਲ ਗਿਆ ਰਾਹ ਤੇਰੇ ਘਰ ਦਾ ।।\n\nਭੁੱਖਾਂ ਮਿੱਟ ਗਈਆਂ ਸਾਡੀ ਨੀਂਦ ਮੁੱਕ ਗਈ ਏ , \nਜਦੋਂ ਦੀ ਗੁਰੂ ਜੀ ਤੇਰੀ ਓਟ ਤੱਕ ਲਈ ਏ ।।\nਫੜੀ ਰੱਖੀਂ ਬਾਂਹ ਹੁਣ ਤੇਰੇ ਹੱਥ ਡੋਰੀਆਂ , \nਮੁੱਖ ਵਿਚੋਂ ਕਹਿਦੇ ਹੁਣ ਤੇਰੀ ਹਾਂ ਮੈਂ ਤੇਰੀ ਹਾਂ ।।\nਚੁੱਕ ਦੇ ਜੁਦਾਈ ਵਾਲਾ ਪਰਦਾ ।।\n\nਤੇਰਿਆਂ ਖਜ਼ਾਨਿਆਂ 'ਚ ਘਾਟਾ ਕਿਹੜੀ ਗੱਲ ਦਾ , \nਸਭ ਕੁਝ ਉਹਦਾ ਹੋਵੇਂ ਤੂੰ ਜਿਹਦੇ ਵੱਲ ਦਾ ।।\nਮੰਗਤੇ ਹਾਂ ਤੇਰੇ ਦਾਤਾ ਸਾਨੂੰ ਐਨਾ ਪਿਆਰ ਦੇ , \nਨਾਮ ਨਾਲ ਰੰਗ ਸਾਡੀ ਜ਼ਿੰਦਗੀ ਸਵਾਰ ਦੇ ।।\nਸ਼ਰਨ ਤੇਰੀ 'ਚ ਬੰਦਾ ਤਰਦਾ ।।"},"hi":{"t":"गुरू जी तेरे दर्शन नूं","c":"जद दा गुरू जी तेरा दर्शन कीता\nनाम दा प्याला असीं भर भर पीता \nतेरे बिना नही दिल लगदा\nगुरू जी तेरे दर्शन नू बार बार चित करदा\n\nलोड़ मुक् गई हुण  होर किते जाण दी\nदर दर उत्ते जा के ऐवें धक्के खाण दी\nचेता भुल गया हुण सानू सारे जग दा\nसारे पासे सानू इक तू ही तू ए लभदा\nमिल गया राह  तेरे घर दा\n\nभुखां मिट गईयां साडी नींद मुक्क गई ए\nजदों दी गुरू जी तेरी ओट तक लई ए\nफड़ी रखीं बांह हुण तेरे हथ डोरीयां\nमुख विचों कहदे हुण तेरी हां मैं तेरी हां\nचुक दे जुदाई वाला परदा\n\nतेरयां खजानयां च घाटा केहड़ी गल दा\nसब कुछ ओहदा होवें तूं जिहदे वल दा\nमंगते हां तेरे दाता सानूं ऐना प्यार दे\nनाम नाल रंग साडी जिंदगी स्वार दे\nशरण तेरी च बंदा तरदा"},"en":{"t":"Guru Ji Tere Darshan Nu Baar Baar Dil Karda","c":"Guru Ji Tere Darshan Nu Baar Baar Dil Karda"}},

	{"id":1771859433711,"audio":"audio/yadaa vichde sajan diya.mp3",
	"pb":{"t":"ਯਾਦਾਂ ਵਿਛੜੇ ਸਜਣ ਦੀਆਂ ਆਈਆਂ","c":"ਈਦ ਮੁਬਾਰਕ ਮੈਂ ਕਿਸਨੂੰ ਆਖਾਂ ਜਿਸ ਈਦ 'ਚ ਪਈ ਜੁਦਾਈ ,\nਈਦ ਉਹਨਾਂ ਜਿਹਨਾਂ ਦੀਦ ਸਜਣ ਦੀ ਬਿਨਾ ਦੀਦੋਂ ਈਦ ਨਾ ਕਾਈ ।।\nਈਦ ਸਈਦ ਸ਼ਹੀਦ ਚਾ ਕੀਤਾ ਤੇ ਕਈ ਗੁਜ਼ਰੀ ਕਰਦ ਚਲਾਈ ,\nਯਾਰ ਫਰੀਦ ਲੱਖਾਂ ਈਦਾਂ ਥੀਸਣ ਜਦ ਵਿਛੜੇ ਮਿਲਸਣ ਮਾਹੀ ।।\n\nਯਾਦਾਂ ਵਿਛੜੇ ਸਜਣ ਦੀਆਂ ਆਈਆਂ ਅੱਖੀਆਂ ਚੋਂ ਮੀਂਹ ਵੱਸਦਾ ...\nਯਾਦਾਂ ਆਈਆਂ ਆਈਆਂ , ਯਾਦਾਂ ਆਈਆਂ ਆਈਆਂ ...\n\nਲੋਕੀ ਪੰਚ ਵੇਲੇ ਸਾਨੂੰ ਹਰ ਵੇਲੇ ਯਾਦਾਂ ਆਈਆਂ ਆਈਆਂ ...\nਲੋਕੀ ਯਾਦ ਖੁਦਾ ਨੂੰ ਕਰਦੇ ਨੇ ਪਰ ਸਾਨੂੰ ਯਾਦਾਂ ਆਈਆਂ ਆਈਆਂ ...\nਯਾਦਾਂ ਵਿਛੜੇ ਸਜਣ ਦੀਆਂ ਆਈਆਂ ਅੱਖੀ ਚੋਂ ਮੀਂਹ ਵੱਸਦਾ ,\nਸ਼ਾਲਾ ਮੁੱਕ ਜਾਣ ਜਗ ਤੋਂ ਜੁਦਾਈਆਂ ਅੱਖੀ ਚੋਂ ਮੀਂਹ ...\n\nਕਿਸੇ ਦਾ ਯਾਰ ਨਾ ਪਰਦੇਸ ਜਾਵੇ ,\nਵਿਛੋੜਾ ਨਾ ਕਿਸੇ ਦੇ ਪੇਸ਼ ਆਵੇ , ਸ਼ਾਲਾ ਮੁੱਕ ਜਾਣ ਜਗ ਤੋਂ ਜੁਦਾਈਆਂ ...\n\nਉੱਚੀਆਂ ਲੰਮੀਆਂ ਸਬਜ਼ ਖਜੂਰਾਂ ਪੱਤਰ ਜਿਹਨਾਂ ਦੇ ਸਾਵੇ ,\nਜਿਸ ਦਮ ਦੇ ਨਾਲ ਸਾਂਢਾ ਹੈ ਸਾਡੀ ਸਾਨੂੰ ਉਹ ਦਮ ਨਜ਼ਰ ਨਾ ਆਵੇ ,\nਗਲੀਆਂ ਮੁੰਜ ਉਜਾੜ ਦਿੱਸਣ ਤੇ ਸਾਨੂੰ ਵਿਹੜਾ ਖਾਵਣ ਆਵੇ ,\nਯਾਦ ਫਰੀਦ ਉੱਥੇ ਕੀ ਵੱਸਣਾ ਜਿੱਥੇ ਯਾਰ ਨਜ਼ਰ ਨਾ ਆਵੇ ।।\n\nਦੁੱਖ ਇਸ ਗੱਲ ਦਾ ਹੈ ਯਾਦ ਖੁੱਸ ਚੱਲੀ ਏ ,\nਰੁੱਸ ਜਾਣ ਵਾਲੇਆ ਹਯਾਤੀ ਰੁੱਸ ਚੱਲੀ ਏ ,\nਸਾਹਵਾਂ ਆਖਰੀ ਵੀ ਤੇਰੇ ਨਾਵੇਂ ਲਾਈਆਂ , ਅੱਖੀਆਂ ਚੋਂ ਮੀਂਹ ...\n\nਕਿੱਥੇ ਜਾਕੇ ਲੁੱਕ ਗਿਓਂ ਲੇਖਾਂ ਦਿਆਂ ਕਾਰਿਆ ,\nਦੇ ਗਿਓਂ ਜੁਦਾਈ ਸਾਨੂੰ ਜਿਊਂਦੀ ਜਾਨੇ ਮਾਰਿਆ ,\nਰੋ ਰੋ ਸਧਰਾਂ ਦੇਣ ਦੁਹਾਈਆਂ , ਅੱਖੀਆਂ ਚੋਂ ਮੀਂਹ ਵੱਸਦਾ ...\n\nਮਾਹੀ ਦੇ ਪਿਆਰਾਂ ਵਾਲਾ ਚੇਤਾ ਜਦੋਂ ਆਉਂਦਾ ਏ ,\nਗ਼ਮ ਦਿਆਂ ਬੱਦਲਾਂ ਤੋਂ ਦਿਲ ਘਬਰਾਉਂਦਾ ਏ ,\nਗੱਲ ਪੈ ਗਈਆਂ ਨੇ ਗ਼ਮ ਦੀਆਂ ਫਾਹੀਆਂ ਅੱਖੀ ਚੋਂ ਮੀਂਹ ..."},"hi":{"t":"यादां विछड़े सजण दीआं आईआं","c":"इंद मुबारक में किसनूं आखां जिस ईद च पई जुदाई , \nईद उहनां जिहनां दीद सजण दी बिना दीदों इंद न काई , \nइंद सईद शहीद चा कीता ते कई गुजड़ी करद चलाई , \nयार फरीद लक्खां इंदां थीसण जद विछड़े मिलसण माही।\n\nयादां विछड़े सजण दीआं आईआं अक्खीआं चों मींह बसदा ...\nयादां आईआं आईआं , यादां आईआं आईआं ...\n\nलोकी पंच वेले सानूं हर वेले वादां आईआं आईआं ...\nलोकी याद खुदा नूं करदे ने पर सानू यादां आईआं आईआं ...\nयादां बिछड़े सजण दीआं आईआं अक्खी चों मीह वसदा , \nशाला मुक्क जाण जग तों जुदाईआं अक्खी चों मीह ...\n\nकिसे दा यार ना परदेस जावे ,\nविछोड़ा ना किसे दे पेश आवे , शाला मुक्क जाण जग तों जुदाईआं ...\n\nउच्चीआं लम्मीआं सबज खजूरां पत्तर जिहनां दे सावे , \nजिस दम दे नाल सांड्रा है साडी सानू ओह दम नज़र ना आवे , \nगालीआं मुंज उजाड
